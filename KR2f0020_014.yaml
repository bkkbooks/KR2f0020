body:
  text: 關中奏議卷十四明楊一清撰提督類一為套中走回人口供報敵情事欽差提督陕西三邊都御史臣楊一清謹題為套中走回人口供報敵情事嘉靖四年七月二十日據鎮守延綏地方總兵官署都督僉事彭楧呈前事據榆林城把總都指揮僉事閻武呈䝉職等發下鎮靖等堡解到套中走回男婦十名口隨拘通事趙祿等到司審得一名蘇孟陽供年二十五嵗係定邊營軍人蘇堂男正德十一年失紀月日前去地名黃羊鎮打草忽遇敵人托和齊等搶去在營住過十年舊年十二月內跟隨衆敵人踏氷過河在套住牧止知我們一枝敵人約有一百餘騎其餘大勢敵人不知多少今年六月內見得衆敵人前往黃河畔上去了有我們敵人不知往那裏地方搶去未回是孟陽遇晚偷騎馬一匹脫走一晝夜於七月初一日從鎮靖堡永逺山墩走回一口王氏供年一十七嵗係嚮水堡餘丁宋端妻嘉靖四年六月二十五日前去本堡地名沙河種田忽遇敵人搶去在營住過十日見得衆敵人早晨起營間乘便脫走步行二晝夜於本年七月初六日從神木堡鎮逺墩走回一名薛二哇供年二十二嵗係花馬池軍人薛俊男正德十一年失記月日前去地名架炮梁打草忽遇敵人巴爾布等搶去在營住過十年嘉靖二年十一月內跟隨我們一枝敵人巴爾布等二百餘騎踏氷過河在套住牧三年不曽過河往來躲調不隨大營今年七月初間有小王子差十箇敵人過來調衆敵人過河去與烏梁海敵衆讐殺將五箇敵人河裏淹死五箇過在套內止知小王子部下頭兒吉納台吉諳達阿布該察納布哈等四人其餘大勢敵人不知多少俱在套內聽得衆敵人說如今水大害怕不敢過去要搶田禾布絹三梭有二哇遇晚見得衆敵人睡熟偷騎馬一匹脫走四晝夜至本月初七日從鎮靖堡河口墩走回一名王彪供年二十七嵗係大同城軍人王鉞下餘丁王遏男嘉靖三年八月內前去地名王將軍屯收田忽遇敵人托多羅等搶去在營約住十箇餘月一名秦伏供年一十九嵗係大同城軍人秦玉下餘丁秦鋭男失記年月日期前去地名西窊打柴忽遇敵人阿都齊等搶去在營約住過三年有餘舊年十二月內有伏與同王彪俱跟小王子部下頭兒吉納等部落敵人不知多少踏氷過河在套住牧聽得衆敵人說一半過河與烏梁海敵人讐殺一半整置鞍轡又說要過河去不知過去不過去是伏同王彪各偷馬一匹脫走三晝夜於今年七月初九日從神木堡一步墩走回一名張和尚供年一十三嵗係嚮水堡軍人張義男一名胡保住供年一十二嵗係嚮水堡軍人胡萬男一口胡旦旦供年一十四嵗係嚮水堡軍人胡洪女各供於嘉靖四年六月失記日期前往地內採打馬草掏菜忽遇敵人搶去在營約住過二十餘日是旦旦同胡保住張和尚遇晚脫走步行一晝夜於本年七月十三日從榆林城紅山墩走回一口張氏供年三十八嵗係波羅堡餘丁王釗妻嘉靖四年六月二十二日前去夾道地名韓家山鋤田忽遇敵人搶去在營住過二十七日氏見衆敵人往西地方搶去遇晚脫走步行一日二夜於本年七月十七日從雙山堡古塔平墩走回一名酆魚河供年一十七嵗係嚮水堡餘丁酆聰男失記年月日期趕驢二頭早往清平堡糴米出門約行十里忽遇敵人二十餘騎將魚河并驢搶去營中分與敵人昂哈博勒呼營裏放馬於河凍了過在河東住了一年舊年跟隨我們一營敵衆約四五萬又踏氷復過河西套裏住牧魚河省得畨語近日新月兒出來有魚河主兒一家三箇敵人殺晒乾羊二箇酪彈一袋㚷子兩箇騎牽馬六匹跟大敵人往西邉搶去了魚河思想家鄉偷騎牽馬二匹脫走五晝夜於七月十七日從黃甫川築祿臺墩走回在營中住過三年聽得夥內敵人說要糾同套內大勢衆敵人綁扎皮筏浮水過河與黃毛敵人讐殺遺剩老小在套住牧有我思想家鄉商同搶去漢人馬二哇子係靈州人偷騎虎刺扇馬青扇馬各一匹法庫兒偷土黃扇馬一匹赤扇馬一匹脫走四晝夜到邉收送前來等因據供備呈到臣又據延綏總兵官彭楧呈為套中走回人口供報夷情事據榆林城把總都指揮僉事閻武呈䝉職等發下懷逺等堡解到套中走回男婦隨拘通事趙祿等到司審得一名梁三哥則供年一十八嵗係涇州崇信縣陽保里民人梁源男在地名新集住坐嘉靖元年七月失記日期忽被敵人哈陶來搶去在營住過四年舊年十月內跟衆敵人踏氷過河在套住牧今年七月間有三哥則遇晚脫走步行一晝夜方出敵營又走二晝夜至七月十九日從懷逺堡古峯子墩走回一名鍾茂供年二十八嵗係榆林城軍人鍾臣弟一名張某兒供年一十七嵗係榆林城軍人張海男各供於嘉靖四年失記月日前往地名葉鹹灘打草忽遇敵人將某兒同鍾茂搶去在營約住過五六箇月是某兒等見得本家帳房內敵人前往大西邉地方搶去遇晚脫走步行五晝夜於本年七月二十一日從嚮水堡沙河墩走回等因備呈到臣又據協守寧夏地方副總兵都指揮同知劉玉呈為套中走回人口事嘉靖四年七月二十九日據守備靈州指揮同知沙金據迤東巡墩百户郁恩呈稱嘉靖四年七月二十七日卯時據紅山兒墩直日軍人趙良瞭見境外東北一人步行前來邉下同伏空夜不收王四兒審係套中走回人口扶弔過牆收送前來審得王氏供年三十嵗係靈州守禦千户所百户王經下餘丁馬表妻狀供嘉靖三年九月十七日在野收田忽遇敵衆三百餘騎將我搶去在營與敵人巴拉彭拾柴放羊住過一年衆敵人約有三百帳窠四五十處四散住牧夥內上馬敵人二百同糾合套內敵衆過河與黃毛敵衆讐殺去訖有我思想家鄉步走九晝夜到邉收送前來據此行間又據百户郁恩呈稱本月十七日午時據古寺墩直日軍人韓聰瞭見境外東北來二人騎牽馬四匹徑來邊下同伏空夜不收張祥審係套中走回人口將馬連人扶弔過牆收送到職審據潘庫兒供年一十八嵗係定邉營住人潘清男狀供嘉靖二年八月內失記日期同父前去鹽池䭾鹽忽遇敵人三十騎搶去前往大西邉搶去遇晚脫走步行四晝夜於本年七月二十一日從嚮水堡沙河山墩走回一名閻通供年二十四嵗係榆林城軍人閻隆弟嘉靖元年失記月日在歸德堡地名龍池灣忽遇敵人托克托博勒呼等搶去在營住過三年有餘舊年十二月間跟隨小王子部下頭兒吉納台吉諳達阿布該部落敵人不知多少踏氷過河在套住牧今年六月內有衆敵人要過河與烏梁海敵人讐殺到黃河畔扎筏浮渡淹了兩筏敵人不知多少其餘敵人因見水大害怕不敢過去復回在套住牧有我們一營敵人頭兒蘇爾齊巴爾圗等約有三千人每人晒乾羊一箇酪彈一袋收拾停當等田禾熟了要在平處地方搶是通遇晚見得衆敵人睡熟脫走步行二書夜至七月二十三日從清水營清水川墩走回一名小王兒供稱約年二十嵗係榆林城人忘記父母失記年月日期地名忽遇敵人搶去在營約住過十三四年舊年十二月間俱跟小王子部下頭兒吉納台吉諳達阿布該等部落敵人約有六萬餘多踏氷過河在套住牧有敵人三箇小頭兒托噶拉巴阿布該額實阿布該等帶領二萬敵人前往西黃河地名庫庫諾爾收捕額布勒敵人去了其餘敵人俱在套內不知搶不搶是小王兒見得衆敵人睡熟偷馬騎回等因據供備呈到臣看得延綏寧夏地方自去年十一月間敵衆入套之後走回人口無處無之本年七月以來一月之間走回男婦二十餘名口顯是在套之人數多中間供稱敵情或云要往西邉搶或云要往平地搶或云要搶田禾布絹三梭則此敵窺伺深入之謀決所必有近據總兵官彭楧呈稱據走回男子小王兒供報小王子部下頭兒吉納台吉諳達阿布該等部落敵人約有六萬餘多踏氷過河在套住牧有敵人三箇小頭兒托噶拉巴阿布該額實阿布該等帶領二萬敵人前往西黃河地方庫庫諾爾收捕額布勒敵人去了其餘敵人俱在套內不知搶不搶等情未知虛實若如所供敵衆二萬前去河西尋殺西海額布勒等寇其在套之數當亦不減數萬但沿邉一帶營窠帳房逺近聮絡止是零敵行走並無大衆近邉此其姦謀未可窺測除嚴督各鎮將官分布人馬嚴謹隄備若有緊急聲息另行具奏外緣係套中走回人口供報敵情事理為此具本順差承差趙禎親賫謹具題知一為聲息事題為聲息事嘉靖四年八月初一日據分守莊浪地方副總兵魯經呈為探哨夜不收被虜走回供報敵情事本年七月十七日據李名等供係莊浪衛夜不收本月初十日䝉差名同夜不收丘成邵六土軍敦只保卯三申保等六名各騎馬匹前去邉外探哨聲息十五日到髙廟兒巳時爪見敵人新行人馬踪跡約有三百餘騎奔往蘆塘行去各役回至斬石硤十六日未時瞭見敵人四五百跟襲前來各役四散奔走棄馬上山名等三名脫走回原丘成邵六申保不知存亡得此行間十八日據丘成邵六供報遇見敵衆將申保鎖綁去訖成同邵六奔入稠密林內藏伏至晚脫走隨據申保亦報十六日遇見敵衆精兵四五百騎牽馬匹將保鎖綁牽至速秃堡下營問說莊浪人馬有多少西畨在那裏住牧有保回言莊浪人馬有二三千西畨在河那邉住坐其人說稱我是小十王的兒子領頭哨五百走了一箇月才到這裏分些敵人往銀銅鎮羌西畨地面尋些乾糧歇馬十數日等我的老子後頭領著二萬人馬到來一同要去西海尋收額布勒阿爾托蘇敵人去裏將保綁縛在營至半夜時分聽得衆敵人俱往他頭目根前去了止留小敵人三人看守馬匹有保將繩掙脫乘黑走來等因據供備呈到臣本月十一日又據守備西寧地方署都指揮僉事彭濬生為敵營走回人口哨報聲息事本年七月二十六日申時據迤北小石山看柞夜不收李鎖住收送敵營走回男子一名劉長生供係鞏昌府禮縣人失記里分有我哥哥見在洮州衛當軍正德十三年十月內我去洮州與軍送食米行到中途撞遇敵人二千多把我搶去山後住了一箇月過黃河來到西海上趂草住牧搶我的敵人名達勒達格爾是頭目阿爾托蘇的人這七月內我聽得衆敵人說北邉小王子敵人要來尋殺都害怕那營躲住黃河南去我想父母家鄉與先年搶去莊浪人一箇商量黑地裏乘空騎牽馬十八匹脫去天明時敵人十箇趕來把他兩箇人同馬盡都捉著去了我藏在深草裏不曽尋見我步行走了七日到北邉石硤夜不收引送前來供的是實等因行間本日酉時又據差哨西海夜不收蔡王加等供報本月十九日䝉兵備守備官㑹差探哨依䝉從今納硤出境晝伏夜行二十一日申時哨至拉哩山瞭望並無營帳次日下山爪得敵人踪跡從海南徑透黃河腦去訖本月二十七日午時又據差哨迤北大小沙河夜不收焦彥才等供報依䝉從徹徹哩出境晝伏夜行二十二日酉時哨至蘇爾山瞭望大小沙河並無營帳火光次日下山爪得蹤影徑往海西去訖二十四日回還行至暖水塘瞭見敵人三十餘騎從北往南去訖等因各供得此㑹同兵備副使陳鼎議得走回人口劉長生供說阿爾托蘇部落畏懼小王子人馬尋殺那營南度夜不收蔡王加等供報哨爪聲息亦從海南透黃河腦去訖竊料此刻既已攜營南行必有侵犯洮河之勢但其情譎詐未可測度除嚴謹隄備呈乞照驗等因到臣案查先據延綏總兵官署都督僉事彭楧呈為套中走回人口供報夷情事據走回人口一名小王兒供稱約年二十嵗係榆林城人忘記父母失記年月日期地名因遇敵人搶去在營約住過十三四年舊年十二月間俱跟小王子部下頭兒吉納台吉諳達阿布該等部落敵人約有六萬餘多踏氷過河在套住牧有敵人三箇小頭兒托噶拉巴阿布該額實阿布該等帶領二萬敵人前往西黃河地名庫庫諾爾收捕額布勒敵人去了其餘敵人俱在套內不知搶不搶等因據供呈報到臣除具題外今據前因臣看得分守莊浪西寧副總兵魯經守備西寧地方署都指揮僉事彭濬㑹同整飭西寧兵備副使陳鼎各呈前項賊情與延綏總兵官彭楧所呈報事情相同為照夷狄相攻中國之利况額布勒等殘寇竊伏西海戕害我屬畨侵掠我邉境數年未曽寧息方議調兵征剿今迤北大舉逺來尋襲事恐不虛意其桀驁不馴同類相惡將互相仇殺以雪我兵民之憤亦未可知但此時既已先知那營南向臨河住牧恐其被逐無奈渡河犯我洮河地方深入屬畨境界臨鞏切近州縣難保無虞其一枝原在莊浪涼州五方寺巴薩等處住牧不時入境侵掠者若見迤北大舉逺來必將逃遁犯我靖邊蘭州等處防禦之計俱不可不謹已經行仰鎮守陜西署都督僉事鄭卿轉行提調洮岷河等處參將王璣整飭洮岷邉備副使翟鵬及固原靖邊蘭州各該守備等官各要嚴謹烽堠慎固邉防整㮶軍馬鋒利器械多差乖覺人役逺為哨探倘果過河入境即便督率官軍據守險隘隨宜截剿飛報鄰境官軍相機應援若彼勢衆大我兵寡少作急呈報軍門發兵䇿應不許畏縮觀望縱賊深入貽患地方外緣係邉境節報聲息事理為此具本順差承差趙禎親賫謹具題知一為乞留守備官員以慰邉人事題為乞留守備官員以慰邉人事據陜西等處承宣布政使司帶管固原兵備左參政成文呈前事內開固原州衛甘州羣牧所苑馬寺等衙門土漢軍民額森克等連名狀告固原地方比年以來兵荒相繼科索無已軍民困憊幾不聊生守備劉文奉勑前來留心撫恤並無纎毫科擾防邉事宜無不修舉至今四年地方保障無虞軍民皆得安堵近聞本官升任遊擊軍民土達殊失仰望如䝉准告乞賜轉達將本官存留照舊守備撫恤土人防禦寇患以慰邊人便益等因據此看得固原地方平漫千里是處通邊最為喉襟要地且有楚肅韓三府黔國公家人草場固原州衛苑馬寺羣牧所軍民土漢雜處尤難撫馭守備劉文乃能致衆心傾仰略無間言使非謀勇素能撫馭有道未必至是職與本官相處二年其立心制行誠有可取衆心愛戴原非幸致今雖升任未慊輿情况臨敵易將兵家所忌目今地方多事正望本官設備以安地方脫若轉去代之者未如本官之賢借使果賢然乍到地方人情土俗地里險易便未易知區畫布置難保無失合無俯順下情將本官保升參將職銜仍在固原統馭人馬參守地方便益呈乞照詳施行等因到臣隨據固原衛指揮使司申為保留恤軍將官以安邉人禦防寇患事內稱節據本衛在城左右中三所并在外鎮戎平邊西安州哈喇圗紅古城甘州羣牧所苑馬寺等衙門土漢軍民唐浩等狀告固原地方臨邉衝要土漢雜處連年敵衆侵犯深入平鞏腹裏地方殘害生民加以天年薄收軍民饑饉人不聊生軍逃馬死無人撫恤地方十分狼狽嘉靖元年九月內新任守備都指揮劉文前來見得軍馬消耗存恤招撫及清勾逃軍二千餘名并將倒死馬匹查審有力者督併買補貧難者呈禀上司乞計銀兩茶馬給領存恤其城堡墩臺邉情事宜無不留心修舉至今四年知軍艱苦絶無科擾軍民得蘇先年敵衆常駐本境邉外接界寧夏地方實保圗水住為窠穴窺伺搶掠頻擾受害本官隨到知有前敵統領官軍三百員名出邉追逐至今不敢在此駐牧邉人安堵且又熟知邉情遇有聲息謀算無失地方無虞今聞升任寧夏遊擊浩等人心傷痛無所仰望縱有新官前來不似本官存心軍馬終復消廢如䝉准告乞賜轉達上司將本官存留保障地方撫安土達有警兵將知心有賴保障便益等因據此照得本衛槩管地方軍民土漢雜處城堡百十餘座墩隘百十餘處若非才能守備撫處最為難守節因邊患地方殘害邉備廢弛自升守備劉文到任委的恤軍地方事宜無不修舉下人恱服今升别鎮官軍有失仰望呈乞施行等因隨據操守鎮戎所指揮千百户旗軍尹隆等操守西安州指揮千百户旗軍張塤等操守哈喇圗地方指揮千百户旗軍楊信等各具狀告稱本官善撫軍士衆心愛戴要乞保留撫安地方又據固原等州縣土達義勇民壯召募滿忠等告稱原係土人共有一千之數先年都指揮郭遡統領人各得所遇敵取勝後本官病故節被貪官營求管領剝削科害如見骨髓纍及逃竄止存五百有餘嘉靖元年䝉欽差總制李都御史將貪官革退行令守備劉文徑自統領到今三年存恤召撫禁革科害將前逃故土達屢行清補已復原額今聞將本官升任寧夏遊擊又委别官管領誠恐復遭毒害乞要垂念土人存留本官撫恤等情又據固原州衛甘州羣牧千户所各堡地方老人總小甲周大用等固原衛致仕閒住都指揮指揮千百户等官黃海等各呈保前情又據固原州儒學學正丁琰等生員徐尚文等聽選監生徐尚忠等亦各呈稱竊見固原實西北重地三邉總要遞年纍因敵衆深入搶掠狼狽前官勇懦貪廉不一自守備劉文任事以來諳練老成立心廉慎體察人情而撫恤有方整理兵馬而設備有法以此軍民仰賴地方靖安況禦敵勇猛軍士恱從今䝉推升寧夏遊擊一方人心失望又見敵衆在套不久出沒伏望憫念地方俯悉下情暫留本官區處便益等情各呈告到臣案查先為整理邉務以備寇患事該臣題准兵部咨該本部尚書金獻民題前事又該太監張忠題為陳言邉務事皆要於固原添設參將一員本部題奉欽依行臣議處臣查得延綏寧夏甘肅三鎮各有分守參將陜西近因畨人侵犯已於洮岷河州等處設參將一員合無照依各官所擬添設參將一員分守固原環慶靖虜蘭州地方仍在固原駐劄操練軍馬修理關隘撫安土人如各處有警往來應援截殺各守備防守等官俱聽調遣然添官非難得人為難任非其人權任雖重徒生厲階看得守備署都指揮僉事劉文老成練達曉暢軍旅以精强理邉務以廉慎得人心衆口一辭並無非議倘蒙采納許設分守官員乞勑兵部就將都指揮僉事劉文擢任參將分守固原環慶等處則委任得人地方有託等因已於本年六月初七日具題外未䝉查覆之先已聞將劉文推升寧夏遊擊將軍續又聞兵部覆臣前奏䝉准固原添設參將一員未知將何官推任今蒙前因臣切照固原等處委係防邊重地關中根本所繫內有監牧馬匹及各王府功臣草場土漢雜處最難撫馭前該守備官員廉貪相半勇怯不同人心向背亦復不一今一聞守備都指揮劉文升任闔境地方官軍民庶莫不咨嗟歎息羣聚告保喧動一方乃至學校諸生衆口一辭咸有乞留之願自來將官改任未有得人心如是者臣惟該部推舉固原等處參將必是老成練達熟知戎務但地利不如人和耳聞不如目見今大敵在套深入之謀旦夕難測若用劉文則兵將相知可以克敵制勝臨敵易將縱得其人而地利未能周知人心未必協服及照寧夏逰擊亦係緊要將軍但衝鋒破敵得一驍勇慣戰之人即可委用陜西三邉似此固多非若固原兼戰守之任繫軍民之心必須謀勇兼濟弛張合宜乃可勝任求之目前良不易得如䝉伏望聖明深念地方之重俯察邉人之情乞勑兵部再議合無將劉文升任分守固原環慶靖邊蘭州等處參將别推將官寧夏逰擊或就將推代劉文官員更任寧夏遊擊將軍則彼此俱便兵民有所繫屬地方獲安緣係乞留守備官員以慰邉人事理未敢擅便為此具本順差承差趙禎親賫謹題請㫖一為傳報邊情事題為傳報邊情事據花馬池按伏協守延綏地方副總兵署都指揮僉事趙瑛呈為乞請委官分守地方事為照敵衆在套住牧月久節次侵犯䝉調集兵馬擺邉拒遏追截剿殺彼知有備不敢再犯遂由靖邊地方渡河竊入幸䝉軍門傳督各路將士合兵截剿斬獲首級奪獲戰馬餘敵復至邉牆舉燒號烟答話尋接知被斬殺號哭歸巢糾衆復讐勢所難免防範之機時不敢怠緣今參將劉謹偶患傷寒缺官分守乞賜委官前來暫守本營地方操練兵馬有警㑹合截殺庶不誤事呈乞照詳等因到臣為照大敵在套住牧月久其從河西莊浪地方浮渡黃河入我靖邊境界者已該陜西寧夏各該地方將官斬獲數多餘賊拆邉歸巢糾衆復讐之計難保必無防範誠宜嚴謹緣花馬池地方乃敵衆侵犯必由之地分守參將劉謹既稱患病難以責成相應委官署管查得定邉營把總慶陽衛指揮僉事魏錕近奉欽依升任署都指揮僉事守備環慶地方緣環慶現有新任分守參將李勳在彼事情稍緩况定邉營與花馬池止隔一程除就行委本官前去花馬池暫署分守事務有警㑹合副總兵趙瑛相機戰守外但敵衆之性貪得無厭近雖遭銼遁歸其大衆尚在套中況沿邉一帶雖有邉牆低薄易於掏穵兵馬雖已分布而地里寬漫把截不敷臣今在寧夏地方親歷各該營堡閲視邉備䇿勵官軍振揚威武及通行延寧二鎮主副參遊大小將領等官加謹隄備遇警協力剿追外緣係傳報邊情事理為此具本専差舍人張偉謹具題知一為敵衆聲息事題為敵衆聲息事嘉靖四年八月十八日據分守莊浪地方副總兵魯經呈為大勢敵衆犯邉斬獲首級事本年七月二十三日辰時據土豹嶺夜不收許三保報二十二日未時瞭見敵衆約有一千五百陸續從頭水古城行來到土豹嶺一帶住歇本日巳時據松林墩夜不收胡以得報二十二日未時瞭見敵衆一千五百內五百在松林墩硤住歇一半透寡夫水行來得此一面差人拘收四野人畜一面整兵隄備間本日未時據馬場溝夜不收文得報本時瞭見鋪溝敵衆灰塵大起有賊三騎到壕站立本職當統在城漢土馬步守城官軍把總指揮陳璽等一千二百馳至本溝迎遇敵衆三百餘騎就與交鋒對敵間溝內突出伏賊七八百齊擁前來本職申嚴號令督勵官軍齊力箭炮相攻其衆答話我是小王子頭哨尋收西海敵人不要當路尋些乾糧等語自未戰至五更時敵見官軍勇猛方才退遁况兵馬數少掣軍回城慮得鎮羌岔口孤懸兵寡疾調紅城子守備楊和人馬前來合兵二千馳至岔口二十五日戌時據鎮羌夜不收徐友元報巳時有大寇六運聮絡約有一千五百突至鎮羌堡邉攻圍袁守備人馬得此兵至鎮羌堡二十六日巳時據打魚嶺夜不收宋名報卯時瞭見石板溝敵衆五六百徑奔鎮羌行來本職即時統兵出堡遇敵交鋒對敵其衆退往西古城行去趕至西古城硤敵已逺遁掣軍回堡二十七日二更時分據孤頭嘴夜不收劉回山報申時瞭見敵衆一千五百從野遜嶺行來板溝住歇本職當疾分布守備楊和袁英把總指揮陳璽等領哨本職督同千户魯瞻往來提調兵至柏楊溝腦巳時遇見敵兵撲來就與交鋒對敵戰至申時本職申嚴號令督勵官軍齊力用命衝攻數合就陳斬首一顆奪獲馬十二匹騾一頭軍器等件敵見我軍猛擊又見射死人馬數多其衆方退乘勝追至柏林口迎據孤頭嘴夜不收劉榮報酉時瞭見敵衆見有三千餘騎邀趕空馬到彼下營恐墮其計掣兵回堡查得守備袁英被敵射訖一箭二十八日據探哨夜不收王英等供報二十五日到青沙嶺登髙瞭見黑馬圈河敵衆約有二千餘騎伏瞭至晚乘黑偷騎其馬二匹前來三十日卯時據本堡瞭髙夜不收徐友元報瞭見迤東敵衆三千邀趕空馬約有一千五百順河行來本職出兵迎敵就與交鋒鏖戰一日有人答話我是小王子的頭哨後有人馬二萬來尋額布勒不要當路收了西海敵人你地方上安靜等語其衆徑奔西古城行去況人馬數少又無援兵掣軍回堡照得莊浪紅城子兵馬掣空恐其乘虛入寇掣軍回城除將守備楊和發回本堡防守外為照此敵連日大舉入寇鎮羌等處答話是小王子人馬尋收西海敵人雖被官軍斬獲微功追逐西遁近日探哨人役瞭見蘇海圗蘆塘烟霧不絶回水又有敵衆二百在彼住牧及照套中走回男子韓進保二名供說套人一萬尋收額布勒去訖遺下精兵三百在彼牧馬前後供詞果不為虛倘賊糾合西海回子大舉壓境住牧而本城兵馬不敷誤事非輕呈乞請調大兵併力防守等因到臣查得先該鎮守甘肅總兵官姜奭分守莊浪副總兵魯經各呈稱節有回寇作亂聲息缺兵防守已經行令陜西遊擊將軍陶文管領逰兵於安定㑹寧等處住劄及行延綏逰擊將軍張鳯領兵暫於腹裏附近去處按伏待河西有警調去應援截殺節經具題外後因河西聲息稍緩及查莊浪涼州等處糧草缺乏將二支兵馬俱留固原環慶地方防禦河套之衆今副總兵魯經既呈稱敵勢重大本城兵馬不敷相應調遣又經行令逰擊將軍陶文統領人馬仍住原擬㑹寧安定地方住劄倘有緊急即便調去應援及將遊擊將軍張鳯遊兵亦各整備聽調外本月十九日又據本官呈為整理邉務以防寇患事本月十三日據守備西寧署都指揮僉事彭濬呈開本月初六日酉時據夜不收趙驢兒傳報莊浪夜不收哨得小王子人馬一萬七千從後山一半鎮羌西古城地方一半由涼州永昌展展口齊哩克逹巴地方俱過大通河徑透西海行去初八日申時又據探哨夜不收史努爾等供報䝉差於八月初三日酉時哨到拉哩山瞭見海上並無營帳火光初四日下山爪得止有新舊馬蹤跡奔往南去跟蹤襲至巴圗爾山瞭見敵衆頭畜俱在倒塘順黃河一帶柳林內劄帳住牧約有四千餘騎往回程途約行一十二日初五日晚行至德沁山瞭見大海北營帳火光三十餘里次日天明又瞭敵有六七十騎亦無頭畜帳房往回程途約行六日小海約行九日初九日午時又據巴鄂特丹津蕃人本巴實迪等供報七月二十八日䝉差我們八箇人前去山後大通河哨探小王子敵人初二日到了大通河山上瞭見敵人單騎人馬有七八千從大通川過了三日徑往西南去了等情得此㑹同兵備副使陳鼎議得大夥敵衆自北而南俱係單騎精兵勢不徒行雖稱傳報小王子部內招尋西海窠敵但恐彼此合勢內侵上而甘涼下而莊古必被蹂踐而西寧乃邊人盤據之地尤切近災者本城兵馬數少其何能支乞要分兵併力防守等因備呈到臣本月二十三日又據副總兵魯經呈為大勢敵衆犯邉缺兵防守事本月十五日辰時據孤頭嘴夜不收張俊報十四日巳時瞭見敵衆約有八九千邀趕空馬陸續從黃草衝行來奔往伊遜嶺行去至晚方盡內有敵衆二三百到墩叫說我們是小王子的人馬去尋西海敵人因是馬乏跟不上前頭人馬且在這裏歇馬三四日去莊浪城邉尋搶乾糧等語照得前敵四五千於七月二十五日至三十日陸續入至鎮羌本職統兵到彼連日與敵鏖戰追逐西行今報前因㑹同遊擊將軍嚴鎧議得大敵復由原路來在境外伊遜嶺等處聲言歇馬三四日要來莊浪搶掠等情雖是故張聲勢其情叵測查得鎮羌見有備禦人馬三百二十岔口添設遊兵指揮張勇等二百相兼備禦步軍一百防守外却將遊兵人馬盡數掣去鎮岔二堡倘彼糾衆臨城兵力不支誤事非輕職等度其聲勢將主客兵馬分布武勝南大通及本城聨絡設伏有警互相併力戰守外切緣本城漢土馬步官軍除公差爪哨守墩等項并老弱不堪外見在堪征不上八百雖有遊兵一千五百委的兵寡不敷戰守而鎮羌岔口孤懸尤甚若不增兵防守臨期誤事未便呈乞照詳等因到臣看得分守莊浪副總兵都督同知魯經節次所呈與延綏寧夏甘肅總兵官彭楧姜奭等呈報大略相同為照北敵小王子部落人馬擁衆過我莊浪邉境尋襲額布勒等衆敵據西寧守備兵備官所報約有一萬七千之數其後運追趕前營不及見在莊浪地方聲言侵掠者當亦不減數千入境之初副總兵魯經督領守備都指揮楊和等交鋒對敵就陳斬獲首級一顆奪獲馬騾一十二匹頭及夷器等件數多雖係微功但大敵壓境我兵寡少乃能出軍交戰勞勛可嘉切恐西海邊寇被北部大勢追逐必有奔竄過河犯我洮河之勢而北部大營尋襲回還莊浪涼州一帶地方固難保其無患而我蘭州靖邊等處止隔一河窺伺深入之謀亦或有之雖調陜西遊擊陶文延綏遊擊張鳯各所領逰兵在於附近地方駐劄待彼處如果事情緊急速去䇿應但沿邉境外套人聨絡窺伺即今秋髙馬肥又在收成時月正在垂涎寇掠之時顧此失彼誠為可慮臣謹當居中節制酌量聲勢緩急輕重隨宜調遣待查各賊向往的確緣由另行具奏外緣係節次傳報敵衆聲息事理為此具本専差舍人張琥親賫謹具題知一為擢用繁難府分正官以從民便事題為擢用繁難府分正官以從民便事准吏部咨文選清吏司案呈奉本部送吏科抄出該臣題前事照得陜西平涼府所屬三州七縣地薄糧重民少差多田無豐厚之獲嵗多霜雹之災逃移者無顧戀而不歸見在者坐包陪而亦困內而宗室繁衍嵗增祭葬壙價不下千百餘兩外而節被敵騎深入殺虜人口搶掠頭畜殆盡舉目蕭然加以畨漢雜處盜賊不時竊發敵衆在套饋運自不容緩臣觀天下郡縣地方雕敝生民困苦未有甚於此也其府州縣正官必得精敏强幹之人乃克有濟近年銓選官員因見時勢難為或到任未久而求去或中途托疾而不來或憂憤成疾而物故或告辭不允而逃歸其在任者不過延捱月日茍圖糊口上司比較錢糧俯首受責一聞考察黜退欣然而往夫人之情既入仕途豈不思久任以規取利名哉蓋亦有甚不獲已焉者矣今本府佐二及州縣正佐缺官甚多除另行具奏外而知府乃一郡之領袖尤在得人查得本府自知府安惟學陳逵之後未有歷任至三四年者非改調則黜退近日知府孫聰到任未及一年又以養親告回致仕百務廢弛拖缺積年邉糧一十七萬有餘官吏師生廩糧經年不得支給所轄驛傳馬驢夫逃亡大半傳舍幾空使客經過或致稽延纍臣受命提督邉務錢糧重事因無正官難以責成聞升有知府竇明未知何日到任臣竊謂此等知府必得曽歷邉方習險難耐勞苦者超常格而用之庶肯勉修職業若照常例推升未曽到任先已灰心安能望其舉職竇明雖有才能曽任京堂未歷艱苦用之腹裏固有餘裕處之斯地恐亦難堪節據平涼縣里老耆民魏慶䝉釗等平涼府縣儒學廩增附學生員李文縉謝經等及致仕省祭等官連名告保本府同知任守德剛介自守不為勢利所怵欲將本官奏請升任知府小民得安等情臣因詢問本官民情邉務隨事應答俱有條理及查本官係山西靈石縣人歷任河南獲嘉縣保定清苑縣知縣推升山東東平州知州任內節經巡撫等官保舉及又博訪得慶陽府寧州知州王暘由進士歷任今寧州廢弛已久本官蒞事以來政務以漸修舉吏民畏服此二官者委的精勤强幹堪宰煩劇且年勞俱深亦堪擢用乞勑吏部再為訪議合無將新任知府竇明改任腹裏地方仍於任守德王暘二人內擇用一員升任平涼知府則人才器使不致於枉用小民稱便得藉以聊生不勝幸甚等因奏奉聖㫖吏部知道欽此欽遵抄出送司查得陜西平涼府知府先經推升南京户部郎中馮裕後訪得本官事故未任又經推升池州府同知竇明續又訪得馮裕無故起程赴任去訖已將多餘竇明調補鳯翔府知府訖今該前因案呈到部看得平涼府知府已經升補馮裕赴任外所據奏保任守德等難以覆奏合咨前去煩為知㑹等因備咨到臣照得平涼府委係臨邉險艱要衝之地節年知府俱不得人以致百務廢弛人民困苦奸弊橫生錢糧負缺數多新除官員往往畏難多不赴任其赴任者又多不能展布臣深念時勢之難勉從士民之願因見本府同知任守德及訪得寧州知州王暘才力有餘奏乞於各官內擇用一員升任極知僭踰但地方安危所繫職業相關誠非得已今准前因內開平涼府知府已經升補南京户部郎中馮裕切思本府缺官將及一年其馮裕未知何月日升補至今尚未到任恐亦畏險憚難不肯前來或别有事故亦未可知見今西北二邉各有大敵警報知府百責所萃政務浩繁似難久待除王暘已經升任外如蒙乞勑吏部再為議處合無准將本府同知任守德升任知府以從民願以濟時難其馮裕該部别為查處實為便益緣係擢用繁難府分正官事理為此具本順差舍人張琥親賫謹題請㫖一為緊急聲息事題為緊急聲息事嘉靖四年九月十九日據分守莊浪西寧等處地方副總兵都督同知魯經呈為大勢敵衆壓境住牧請兵併力防守事本年八月二十一日申時據擺哨青羊水夜不收馬義報本日早有兼稍土軍明中住兒押同夜不收馬見爪路時久不見回還午時有馬義登髙瞭見敵衆三十餘騎從青羊水行來奔謊徐兒行去其馬見明中住兒爪無下落不知存亡本役赴城來報二十二日寅時據鎮羌擺哨西古城夜不收吳英走報二十一日申時瞭見敵衆二十餘騎從黑古城行來奔鎮羌迤東行去除差人傳諭各堡守掌官軍堅壁清野及整兵隄備外本日申時據紅城子擺哨小川兒夜不收楊正發報本日巳時瞭見敵衆二十餘騎從蘆井兒行來到邉站立本役來報二十三日五更時分據常山兒夜不收閻尾山報二十二日戌時瞭見敵衆七八十從中馬路行來奔土豹嶺行去隨據四眼井夜不收黃海報二十二日戌時瞭見敵衆四十餘騎從五條嶺行來到昻吉爾水飲馬來報得此本日早差據夜不收徐剛報䝉差剛同土軍舍保爪尋土軍明中等二十二日晚行至青羊水遇敵五十餘騎將各役趕散舍保不知存亡本役脫走來報二十四日午時據四眼井夜不收蘇欽報本日早爪見敵衆馬蹤五十餘騎徑奔傳家水行去得此隨據大沙溝夜不收李聚報本日卯時瞭見敵衆八十餘騎從張匾食井行來到壕站立來報得此二十六日午時據小溝兒夜不收劉成報本日辰時瞭見敵衆三運約有一百餘騎沿河行來徑奔野猪溝行去本日酉時據岔口堡隨馬夜不收沈洪報本日巳時瞭見敵衆約有二百奔鏵尖堡行來徑投野猪溝行去隨據寬溝夜不收馮俊報本日瞭見敵衆約有一百餘騎徑奔岔口行去本日亥時據黃草衝夜不收姚三報本日未時瞭見野猪溝敵衆五百順河行來奔柏林溝行去來報得此二十七日寅時據鎮羌堡隨馬夜不收徐英傳報二十六日未時有擺哨黑古城夜不收翟居純西古城夜不收吳英各報瞭見敵衆一千餘騎內有駱駝四五隻上䭾行李邀趕空馬并馬駒三四運從黑古城行來徑奔迤東黃草衝行去隨據野遜嶺夜不收孟連孤頭嘴夜不收李英各報前敵從黃草衝行來俱奔爛泥河行去據此復差原報人役傳諭鎮羌岔口守備按伏等官嚴加隄備本日亥時據岔口堡隨馬夜不收施旺報有肅州襲職敵人二十名到岔口不聽阻當强行出堡行至馬營溝申時遇見敵衆二三十騎從杜家沙溝林內突出與敵人對敵報與武勝堡設伏百户范璋領兵追殺訖本役來報得此慮得大敵連運經過而敵人强行恐有疏虞分差莊浪把總指揮陳璽等帶領漢土有馬官軍三百夤夜前去䇿應續據本官回稱次日早兵至武勝堡有百户范璋說稱敵已回遁同敵人車輛到堡本職隨帶官通敵使人等復至馬營溝踏襲蹤跡由杜家沙溝行去差據夜不收張英襲得前敵奔張匾食井出境去訖拾獲勑書一道交與伴送敵人百戶金海收領外二十九日辰時據鎮羌擺哨黑古城夜不收馬連報二十八日巳時瞭見敵衆七八十騎從黑古城行來到牆兒牧馬來報隨據火石溝夜不收于伍報二十八日申時瞭見敵衆二十餘騎牽狗四隻從鎮羌行來奔火石溝行去得此據此探哨夜不收楊海土軍董只堡等八名供報䝉差各役襲探敵情依䝉出境晝伏夜行二十六二十七日分頭到於黑馬圈土豹嶺斬石硤蘇海圗蘆塘等處登山瞭見敵衆馬牛遍野撒放煙霧罩滿山川伏瞭至晚各掣回還行間及據火燒城遞運所申據夫丁趙玘告稱本年八月二十四日聞知敵人車輛前來有本所署印義官袁升因是帶管武勝遞運所事預先要去催攢車輛本日晚帶領趙玘步行出堡一更時分行至鷹窩山忽遇伏兵二十餘騎撲來將袁升射死趙玘脫走來報告乞施行得此又據武勝堡按伏秦州衛百戶范璋呈為敵衆出沒事本年八月二十五日䝉委本職帶領無馬步軍七十員名到堡按伏外本月二十七日酉時據岔口堡隨馬夜不收施旺報稱進貢敵人車輛前來職領軍出堡迎護間又據岔口堡夜不收張牛兒報稱馬營溝有敵二三十騎與敵人對敵馳至石嘴兒撞遇敵人車輛一同到堡審得伴送通事說稱被敵射中敵人一名至二十八日早領兵同敵人前到對敵處所查得敵匱一十八箇內被敵打開三箇俱是羊毛大黃照數交與伴送敵人官百户金海等收領載回呈乞施行隨據委官甘州衛百户金海呈為敵人告要襲職事承奉陜西都司批差本職伴送敵人且結本囉等赴京襲職進貢本年八月二十七日自鎮羌起程到於岔口各有人馬護送至石門河有岔口軍士掣回各人行至馬營溝申時分遇敵二十餘騎從東北撲來有使車人丁奔走上山其敵就與敵人對敵內中傷敵人一名射傷三名今巳平復射死自己馬一匹搶去自己䭾勑馬一匹上䭾勑書五道內今襲輝和爾普覺國師巴延保喇一道指揮同知納延保喇一道指揮僉事烏納阿林一道已襲指揮使蘇拉保喇一道指揮同知納延保喇一道俱各搶去呈乞施行又據趙玘等告係臨洮府蘭州火燒城遞運所牛夫連名狀告本年八月二十七日應付敵人恰濟保喇牛車三十二輛未時分行至馬營溝遇敵二十餘騎將拽車官牛搶去八隻各夫脫走回堡告乞施行得此行據操守鎮羌堡地方蘭州衛指揮匡鍾岔口堡按伏秦州衛總旗王星吉各呈稱伴送夷人百户金海等不聽阻留將堡門撞開强行出堡各領人馬送至地界掣軍回堡呈乞施行得此九月初五日據常山兒擺哨夜不收宋名收送被虜走回夜不收胡以得供報䝉撥在於回回墓水爪哨八月十九日巳時忽遇敵衆五十餘騎撲來將同哨夜不收許三楊保滕三射死將以得搶到松山地方住歇見得敵衆精兵四五千在彼下營內有一人說是宣府人聽得敵人說到河凍了方才入套去裏有以得至二十九日聽得衆敵人睡熟脫走來報得此初六日據探哨夜不收黃九兒等五名供報䝉紅城子守備官差去探哨晝伏夜行初五日行到一撮毛山登髙瞭見硤兒水敵衆五六百騎頭畜遍野撒放至晚掣回來報據此照得本境大敵萬餘占據蘇海圗等處久住不退時遣輕騎在於境外水頭瞧撲應哨人役及近邉往來行走顯有誘兵之計近日又有敵衆一千邀趕駱駝空馬從黑古城行來往東黃草衝行去意有大舉之謀難以測度除遵依提督軍門鈞帖內事理各守封疆慎固城堡按兵勿動不可與之爭鋒及相機剿殺追逐外參照管押夷人百户金海不度敵勢重寡不聽阻留强行撞打堡門致賊搶掠其應哨夜不收土軍忠於王事例該優賞及查得本城漢土馬步官軍除公差買馬等項外見在堪征不上八百值因追戰無暇兵馬疲憊遇戰不敷支持况糜穀登場尚未打碾若不再行請兵誠恐久驕不退倘彼乘虛糾衆萬一臨城而邉地失守纍罪非輕合無俯念極邉重地早賜兵馬併力防守便益擬合通行為此除外合行具呈伏乞照詳施行等因到臣案查先據副總兵魯經呈稱敵衆連日大舉入侵鎮羌等處答話說是小王子人馬尋收西海敵人雖被官軍斬獲微功追逐西遁近日探哨人役瞭見蘇海圖蘆塘等處煙霧不絶及照套中走回男子韓進祿等供說套衆一萬尋收額布勒去訖遺下精兵在彼牧馬倘更糾合西海敵人大舉入寇壓境住牧而本城兵馬不敷誤事非輕等因到臣節經帖仰本官通行逰擊將軍嚴鎧涼州副總兵周尚文西寧兵備副使陳鼎守備彭濬等各督令所屬整兵秣馬鋒利器械嚴謹斥堠差人逺為哨探如果大敵止是尋襲西海敵人不在我境搶掠只宜各守封疆慎固城堡按兵勿動不可與之爭鋒若犯我邉堡屯寨搶掠我丁口頭畜即便㑹合各枝官軍相機剿殺協力追逐母令深入久住貽患地方倘或賊勢十分緊急差人催調陜西延綏逰兵前去應援及行甘肅主副總兵督發大兵㑹剿去後今呈前因查得先據副總兵魯經等呈報大勢敵衆萬餘前去西海尋襲額布勒等寇仍留精兵數千在於莊浪地方住牧為照敵人相攻中國之利若前賊止是尋殺西海邊人不在我邉侵掠只宜按兵固守難與爭鋒倘或犯我邉堡搶掠即便㑹兵相機截殺節行事理已甚明白後據各官報稱前敵自西海復回一萬有餘俱在莊浪地方又經行令嚴加隄備及行甘肅鎮巡官查肅州回賊若退速將原擬莊浪按伏逰擊將軍嚴鎧人馬仍發前來㑹合戰守及督發陜西遊擊陶文領兵應援外參照各該官員既知大敵壓境不時侵掠不行申嚴號令却乃視常怠慢致將襲職敵人射傷搶去勑書五道其稱伴送百户金海等不聽阻留將堡門撞開强行出堡等情未委虛的所據操守鎮羌堡蘭州衛指揮匡鍾岔口堡按伏秦州衛總旗王星吉及伴送敵人百户金海俱各提問但未經查勘誠恐中間别有隱匿重情除行巡撫甘肅地方都御史寇天敘將失事人員查勘明白及被傷敵人量為優恤遺失勑書查究下落徑自施行外如䝉乞勑兵部照例行巡按陜西監察御史將指揮匡鍾等就行提問干礙其餘誤事官員一併參究惟復體念大敵壓境正在用人之際通候事寧施行伏乞聖明裁處緣係邉鎮呈報聲息事理為此具本専差承差張時親賫謹題請㫖一為急缺方面官員事題為急缺方面官員事臣切惟今天下民生之休戚係郡縣吏治之臧否係藩臬雖統之以撫臣巡之以臺使而上承下宣全在藩臬二司故巡撫之命非藩臬則不流郡縣之政非藩臬則不肅至於錢穀兵馬刑名賦役提綱挈領分理責成不有二司官員上承下糾何所倚賴我國家稽古定制三司分職彼此相維布按二司守巡官員分理各道飭兵督糧又有専責今藩臬官員有缺吏部必擇內外臣僚之能且賢者開具二員上請簡用可謂重矣若陜西一省為邉鎮之樞衡中原之鎖鑰較之他省尤為機要銓部所擇諒無不精夫何近日以來推升二司官員或憚地方之險逺而不來或取便道以還家而延住或稱病而求退或避嫌而乞改升者已去代者不來以致喫緊地方經年纍月缺官管理且如河西一道所管延安慶陽二府榆林一鎮邉儲拖缺至四十一萬有餘人户逃亡日甚一日分守分巡官員俱缺關南一道乃各處流民之萃淵藪也往年藍鄢之亂可為明鑑今分巡分守亦復缺員若固原靖邊蘭州等處極邉重地整飭兵備之官尤在得人原任副使成文已升參政代者未至臣先年間督理馬政奏准選委布政司參政車霆按察司副使王寅専聽委用彼時興廢補墜多得其力邇者荷䝉皇上不以臣為不才起之於衰朽之餘付之以艱大之任到邉以來惟是兵備數員相與維持然所理邉事其他政務難以兼攝二司員缺既多亦無他官可委雖曽查取副使韓士竒前來整理補軍召募等事未久聞升參政回司就留掌印肅州兵備副使趙載初來上任亦留科場監試是時左右布政按察司俱缺前項參政副使等官又復缺員撫巡委用實非得已令左右布政俱已到任參政韓士竒方得脫身出巡催糧夫政之興廢存乎其人以積弊大壞之餘而襲因循濶略之後必得精明振厲之人専理其事乃可責成若以一人兼理數事顧此失彼不過發行文移取足書簿而已臣又切思人臣任事雖在才足冇為亦須志欲有為陜西地方官員間關於戎馬之際出入於沙塞之中彼憚勞畏險之徒縱强之使來未免灰心喪氣安能望其有所建立其他員缺未敢槩言如固原兵備及河西道分巡撫民兼管兵備二員臣職業相關輒敢謬舉切見陜西按察司僉事桑溥王鈞皆剛敏聰察有荷重析分之力堪任固原兵備副使西安府知府趙伸漢中府知府張欽皆疏通振厲剸繁舉劇之才堪任河西道分巡撫民兼管延安兵備副使如䝉乞勑吏部查陜西布按二司員缺自副使孫樂升任張士隆病故之後曽推何官久不赴任及參政潘塤副使成文升任曽推何官俱未到來如其曽有陳情退避亦乞早為議處庶免曠官廢職仍乞於僉事桑溥王欽內推用一員升補固原兵備副使知府趙伸張欽內推用一員升補河西道分巡撫民兵備副使非惟各官才堪供職而地土相習心志相安可無推託曠廢之憂矣其原升官員應否改調别任該部另為定奪臣位忝大臣身荷重責地方安危所繫不敢不言伏惟聖明裁察緣係急缺方面官員事理未敢擅便為此具本順差承差張時親賫謹題請㫖一為緊急聲息事題為緊急聲息事嘉靖四年九月初六日據鎮守甘肅地方總兵官署都督僉事姜奭呈為大勢回寇入境為患請兵防禦事本年八月十六日午時據肅州參將雲冒差夜不收線英報稱本月十五日五更時分有在城墩報接清水河墩舉放煙火參將統兵迎火行至四頃堡見有敵衆約有一百餘騎穿戴盔甲在於樹林內藏伏參將就彼劄營本役來報本日戌時又據參將雲冒差原哨苦峪夜不收哈卜歹報稱本月十二日同蕃兵伊嚕勒前去迤西哨探行至苦峪沙山爪見新行賊馬蹤跡約有一千從西大鉢和寺往東柴城兒地方行去隨有回賊衛拉特敵衆共有七八百騎從斷山口入境到四頃堡地方參將人馬迎至將臺與之對敵數番其衆往西安逺寨去訖來報十七日辰時又據參將雲冒差原守哨嘉峪關夜不收馬聰報十五日未時瞭見回賊并敵衆約有七八百騎牽有䭾馬從東安逺寨前來到關徑往北九眼泉二墩穵倒壕牆往西透大草灘住劄內有回達四十騎復來到關西門上說稱我是蘇勒坦莽蘇爾王子的兄弟巴拜徹爾我來要通路和好若不和好便同哈密北山衛拉特敵人做一箇氣力大勢人馬前來侵奪城池說畢其賊回往大草灘去訖本役來報等因到職案查先准參將雲冒手本為屬畨傳報夷情聲息事據罕都左衛沙州頭目特默爾等差來畨人綽埒本等共稱舊年有蘇勒坦莽蘇爾領大勢軍馬來到沙州將頭目特穆爾圗卜人馬收拾跟著蘇勒坦莽蘇爾到甘肅州地方搶了漢人回來到了沙州差頭目托克托穆爾領著三百人馬來到肅州山後避住不要教沙州人投順著肅州去常去漢人地方上搶捉住漢人問他甘肅州有無調到人馬報來先差雅穆拉和黃敵人軍馬先去搶殺收田禾人畜蘇勒坦莽蘇爾和弟兄三箇的大軍馬隨後來等情續又准本官手本開送口外走回婦女朱氏供稱回賊在哈密造盔甲翎箭修哈密城上土垜還要往甘肅州搶掠據此又准本官手本開稱苦峪城爪見賊馬蹤跡一十二騎看得靴蹤俱是尖頭其蹤回往哈密大路去訖等因節經通行本鎮各該副參遊擊守備操守等官各整㮶兵馬修飭軍裝儧餧馬臕聽候截殺并行肅州分守等官差人分頭哨探嚴謹烽堠隄備外及節次具題請兵去後今准前因㑹同鎮守太監董文忠巡撫右僉都御史寇天敘議得吐魯畨回酋蘇勒坦莽蘇爾去嵗率領大勢回寇侵犯甘肅等處搶掠人畜攻穵堡寨被官軍截剿斬獲首級追逐遁還復遣頭目托克托穆爾領回賊四五百騎來境外南山伏住不時入境搶掠被我官軍節次斬獲首級今又糾合哈密北山住牧衛拉特敵人復來為患則前項畨人綽埓本走回婦女朱氏所傳之言皆足徵驗即今賊衆七八百騎已到肅州與我官軍對敵回往大草灘駐劄遣賊復回傳言要來通路和好緣回賊譎詐恐是故設前言緩我兵馬後面尚有大衆繼來乘機攻搶亦未可知再照西寧莊浪涼州等處又報小十王大衆人馬亦在南北境外駐劄往來行走聲言要去西海收捕額布勒阿爾托蘇敵人其因而糾合摽掠勢所必有本鎮兵馬數少不敷戰守纍經奏調陜西延寧三鎮竒遊兵馬至今未到其所奏新添遊竒官兵已䝉准允馬匹未有明文器械尚未解來除於鎮城挑選官軍一千員名肅州官軍一千員名行令西路遊擊將軍李義統領先去肅州應援及行左副總兵趙鎮遊擊將軍嚴鎧各統竒遊兵馬隨敵聲勢往來截殺仍通行各城副參守備操守等官一面整㮶馬步土兵舍餘人等并軍中應用軍火器械齊備待報聽候職等調用併力捕剿一面收斂人畜併入堅固大堡固守及再差人逺為哨探有無重大回賊入境及具題外緣前項敵情止據夜不收口報中間有無失事待參將雲冒文移至日另行為照本邉孤懸萬里回敵交侵兵馬數少難以支持勢甚危急萬一失事職等一身固不足惜其如地方生靈何如䝉軫念極邉重鎮敵情緊急缺兵戰守乞催行陜西延寧三鎮竒遊兵馬作急督發兼程前來本邉聽職等調度戰守庶緩急有備而地方可保無虞矣呈乞照詳施行等因又據本官呈為屬畨傳報敵情聲息事內開准分守肅州右參將都指揮同知雲冒手本前事㑹同鎮守太監董文忠巡撫右僉都御史寇天叙議得肅州分守官節次開稱要將綽埓本等暫且踈放發回肅州令都督日郭拉收領羈候及稱原差通事敵人馬能等探聽得沙州頭目特穆爾等云稱教漢人多收拾人馬前來沙州做一箇氣力殺他去若人馬不來差人調我每往肅州城根前坐去若不用我便不要差人來我也不差著人去又稱回賊和黃敵人大勢還要前來搶掠與他王子和好等情并乞發兵糧協濟防守一節為照特穆爾等所報敵情既稱和好又稱搶掠既曰要做一箇氣力殺賊又曰要往肅州住坐情詞不一向背兩途難以憑信再照吐魯畨王子蘇勒坦莽蘇爾并頭目雅穆拉去嵗犯邉已該畨夷特穆爾多爾濟供稱被我官軍射死今綽埓本并沙州特穆爾圗卜等又稱見在緣夷情譎詐事難遙度但安不忘危有備無患在我隄備則當嚴謹况所報托克托穆爾犯邉事已不虛其大衆復來勢不能免除將綽埓本等羈候甘州其所報事情催行分巡道僉事李孟旭㑹同行都司王輔等再行審問明白另行及行各該協守分守副參遊擊守備操守等官整㮶兵馬鋒利器械嚴謹烽堆堅壁清野修理城池并差人絡繹逺為哨探遇警互相應援除具題外緣本鎮兵馬錢糧委的不敷若不呈請大集兵糧設備倘致臨期不無誤事貽患非輕如䝉軫念河西孤懸重鎮危急之際乞催行陜西延寧鎮巡等官速將原擬竒逰兵馬督發本邉併力防禦仍乞多發錢糧解運本邉接濟軍餉庶緩急有備而地方可保無虞矣呈乞照詳等因到臣案查先據鎮守甘肅總兵官都督姜奭及分守參將雲冒節呈前項夷情為照吐魯畨蘇勒坦莽蘇爾先於正德十一年近於嘉靖三年兩次率領番人寇我甘肅殘壞我邉堡虜殺我軍民地方被其毒荼雖被官軍追逐出境不曽大遭銼衄今據沙州夷人供稱回子蘇勒坦莽蘇爾已往吐魯番留下頭目雅穆拉見在哈密到七八月馬壯之時領哈密北山衛拉特黃敵衆等寇往漢人地面搶掠一節容或有之觀其先差頭目托克托穆爾領人馬三百在我邉住牧乘間寇我永昌地方見被官軍斬殺此其明驗但沙州頭目特穆爾圗卜等係中國屬畨受恩深厚去年回賊入寇已率衆跟隨侵犯肅州去順從逆罪不勝誅今所供報言若效順心實難測恐其自知身負滔天之罪恐將來無容足之所設為張大之辭規我賞賚之利又或吐魯畨酋見我閉關絶貢與之通謀窺我意向亦未可知觀其言將進貢的放出來便好及講和便好不講和便不好等語大略可見且去嵗甘州蘇勒坦莽蘇爾不曽伏誅而頭目和卓塔濟迪音等俱死於箭射鎗打之手而近日所遣頭目托克托穆爾精鋭先鋒初入我境即被斬獲其氣必沮前項供報之言恐未可信但甘肅地方兵馬寡少錢糧缺乏內之不安何能攘外且今西海逋寇竊伏我邉莊浪劇賊剽掠官路比之回賊尤當急備已經節行彼處鎮巡副參遊擊等官各須申明紀律訓練士馬修葺城堡整備器械振威武以讋外夷之心明賞罰以作我軍之氣又經節行陜西布政司將解甘肅一鎮邉儲銀兩分投差官督發過河行令管糧參議僉事等官趂收成時月作急糴買糧料草束派發各城堡土納已將前項緣由具題外今該前因除綽埓本等已該本鎮鎮巡羈候委官審問得報另行處置外看得所呈情辭迫切各官均有地方安危之責亦不得已但兵當預練糧當預積教養有道兵在精不在多出納無方糧雖多無實用甘肅地方先該鎮巡官員既不能訓練士馬又不能預處邉儲結釁敵人貽患內地搶掠人畜攻穵寨堡雕傷愁苦之狀所不忍言臣到邉以來不次移文陜西巡撫及布政司督催解運甘肅錢糧近據布政司呈報解過甘肅一鎮京運軍餉并夏秋糧價銀共一十八萬八千一十四兩三錢一釐五毫臣近發去淮浙等運司鹽七萬五千引節據分巡僉事李孟旭平涼管糧參議王汝舟甘肅管糧僉事周汝勤揭帖開稱鎮城廣盈庫見在銀四萬三千兩有餘甘肅倉見在民運折糧銀二萬七千兩有餘涼州廣儲庫見在銀二萬五千兩有餘通融算扣除本色糧料草束外見在并解發銀兩其數儘多且腹裏糧草自來少有本色輸運到邉其折色銀兩必須趂時召糴奈何經該官員平時則相習因循遇警則倉皇無措節次移文督責未見有何處分參看所呈動以大發兵糧為辭及要催調陜西延寧遊竒兵馬彼亦自知倉儲缺乏供應不敷特以利害切身故欲張大其辭恐他日失事預為逃責宥過之地耳及照先因莊浪有警已調陜西遊擊陶文管領遊兵於蘭州附近州縣駐劄聽候河西有警來調即便前去赴援又調延綏遊擊張鳯領兵暫在固原附近城堡按伏遇有河西緊急聲息發去䇿應但因去嵗踏氷過河在套敵衆數多近報二萬前去西海尋殺額布勒等寇其在套者當亦不減數萬自延綏黃甫川起直抵寧夏靈州千四百里無處無賊營壘帳窠逺近相望火光馬蹤聨絡不絶雖是未曽深入而其志向不可測度倘或大舉侵犯腹裏地方根本動搖誠非細故以此延寧兵馬自顧不暇勢難逺掣况前項回賊酋首蘇勒坦莽蘇爾既回本境頭目雅穆拉亦在哈密不曽前來比之去嵗聲勢不同明是此賊見我閉關絶貢意圖和好故遣殘賊糾合屬畨衛拉特賊在邉出沒窺我意向既不得逞必將自退縱使敵人狂背敢萌非分之欲查得甘州左等五衛支糧主兵官軍一萬有餘副總兵趙鎮所統竒兵官軍二千餘員名遊擊將軍嚴鎧所統遊兵亦二千餘員名近又添設遊擊一員并肅州髙臺鎮夷等處各有主兵官軍若各將官同心戮力主將居中調度自可支持不足為慮惟涼莊地方大敵壓境雖稱尋襲西海敵人不曽得利而回却在我邉聨絡住牧不時入境侵掠近又以數百騎乘夜浮渡過河到於靖邊寧夏地方已遣陜西總兵守備等官追逐及行寧夏將官合兵截剿必是覘我道路探我虛實恐有約㑹套衆大舉入寇之謀防禦調度誠不敢緩但目前莊浪一帶事情緊急彼處兵馬委的寡少不敷支敵已經帖仰總兵官姜奭㑹同鎮守太監巡撫衙門即行副參遊擊各該將官務要加謹哨探協力隄備一有回敵等寇侵犯運謀以防遏之併力追逐之務使大遭銼衄以靖地方及督發陜西遊擊將軍陶文遊兵官軍過河協力防禦并行延綏遊擊將軍張鳯待報繼後應援及行巡撫衙門嚴督分守管糧等官上緊措辦糧儲務勾主客兵馬支用又將户部發到銀兩行令領回五萬兩接濟該鎮軍儲外待後如果聲勢十分重大臣當督大兵前去征剿不敢顧此失彼以貽宵旰之憂緣係邉鎮節報緊急聲息事理為此具本順差承差張時親賫謹具題知一為整理邉務以備敵患事題為整理邉務以備敵患事准兵部咨該本部題職方清吏司案呈奉本部送兵科抄出該臣題前事該本部覆題看得提督軍務兵部尚書楊一清題稱陜西地方固原環慶靖邊蘭州俱係防邊重地而固原最為要衝且土漢雜處易於生變內有監牧馬匹尤為敵所窺伺鎮守官統轄地方廣濶不特防禦敵衆如洮岷有西戎之警南山有羣盜之虞皆其責任萬一事變不測未免顧此失彼要照依太監張忠尚書金獻民所議添設參將一員分守固原環慶靖邊蘭州地方仍在固原住劄操練軍馬修理關隘撫安土人如各處有警往來應援截殺各守備防守等官俱聽調遣一節為照前事先據太監張忠尚書金獻民先後條奏節該本部議擬題奉欽依行移提督官議處今尚書楊一清遵奉勑㫖議處具奏前來相應依擬伏望皇上俯從所議於固原等處添設參將一員分守前項地方候命下之日本部從公推舉相應官二員疏名上請簡用一員充參將名目照例請給勑諭符驗旗牌前去行事其守備官員依擬革去不必再設遞年於附近衛分選委都指揮一員操守如無相應都指揮聽於指揮內選用奏請以都指揮體統行事如此庶官有常尊事無推避而地方可保無虞矣等因題奉聖㫖是固原等處准添設參將一員欽此欽遵備咨到臣案查先為前事已經具題去後今該前因照得固原守備已該兵部題奉欽依革去遞年於附近衛分選委都指揮一員操守如無相應都指揮聽於指揮內選用奏請以都指揮體統行事為照原任守備署都指揮僉事劉文已升寧夏遊擊將軍新任參將未到所據固原守備職掌政事頗繁分守參將難以兼管該設操守都指揮一員查無相應都指揮臣博訪得固原衛指揮黃振年力壯强性資明敏緣係世守武臣人情相附堪以委用如䝉乞勑兵部查議合無將指揮使黃振奏請以都指揮體統行事令其操守固原等處地方訓練人馬撫安軍民整理關隘墩臺嚴謹門禁果能守已愛軍行事無失蹟效有聞聽鎮巡官員奏保擢用緣係整理邉務以備寇患及兵部題奉欽依事理未敢擅便為此具本順差承差張時親賫謹題請㫖關中奏議卷十四
