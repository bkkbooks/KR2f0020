body:
  text: 關中奏議卷九明楊一清撰總制類一為激勵土兵事兵部覆於兵科抄出總制陜西延綏寧夏甘肅等處邉務都察院左副都御史楊一清題查得管領蕃人陜西都司秦州衛指揮同知郭遡原籍陜西平涼府靜寧州人成化四年間為因蕃人滿四反叛石城應例招集土兵自備鞍馬報效殺賊及親入賊巢招降叛賊節次有功升授錦衣衛所鎮撫職事願告改秦州衛歷升今職遞年管領蕃人并招募民壯等項土兵遇冬於固原等處備禦有警各該總督總制巡撫等官調往延寧洮岷大同等處勦殺邊敵屢立竒功𢎞治十八年十二月內達衆數萬深入陜西靜寧隆德地方搶掠出境鎮守署都督曹雄委令跟隨遊擊將軍陳善前去寧夏韋州小鹽池一帶邀截歸路彼時延綏遊竒土兵與寧夏主副將官所領官軍共一萬五千餘員名各因敵勢重大相顧莫敢發兵本官獨領家人土兵追趕至地名狼巴井斬獲首級二顆至今尚未論功升職臣切見本官膽氣過人起自編氓升授軍職管領土兵三十餘年大小戰陳數十餘次敢勇當先人所共知近年敵衆侵犯固原恆問郭遡在否是其威名雖敵人亦熟聞之緣各處領軍官員曽舉將才者多蒙推升署都指揮職事本官歷任年深效勞最久𢎞治十三年間節該兵部推訪才勇可取官員亦與其列獨未嘗一蒙拔擢人共惜之况其所管土兵一千餘名調往各鎮截殺與彼處領軍都指揮等官不相統屬職任獨輕難以行事今敵衆在套寧夏甘涼俱有聲息正在激勵土兵之際如蒙乞敕兵部查訪本官如果才勇可取不為常例量與署職照舊領管蕃人招募民壯聽臣隨宜調遣各鎮應援截殺則凡土官土兵感激奮發咸懷赴鬭之志矣等因具本該本部官欽奉聖旨兵部知道欽此欽遵抄出送司案呈到部看得總制陜西都御史楊奏稱秦州衛指揮同知郭遡起自編氓歷升今職管領土兵三十餘年屢立竒功及稱遇有警調職輕不便行事而套衆方謀入攻兵將尤宜激揚欲將本官量加都司署職照舊領兵截殺一節為照指揮郭遡既該總制官員奏保前來必其勤勞懋著任用克堪况領兵聽調委須官職稍重方易責成合無本部依其所奏不為常例將本官量升都司署職令其照舊管領蕃人民兵聽總制官員調度殺賊仍行總制轉行本官今後益要感恩思奮用圖報稱毋得宦成自怠僨事招尤緣係總制官員保升將官署職及奉欽依兵部知道事理未敢擅便正德二年閏正月十六日本部尚書閻仲實等具題本月十八日奉聖旨是郭遡準升陜西都司署都指揮僉事欽此欽遵擬合通行除外合咨前去煩照本部題奉欽依內事理欽遵施行一為經理要害邉防保固疆場事兵部覆本部職方司呈於兵科抄出總制陜西延綏寧夏甘肅等處邉務兼理馬政都察院左副都御史楊題近準兵部咨該本部等衙門題該本部題先該臣題前事本部會同太師兼太子太師英國公張懋吏部尚書焦芳等議擬上請奉聖旨是都準議行欽此欽遵備咨到臣仰惟聖明軫念關中重地采納臣下議奏花馬池興武營等處要害地方修濬牆塹添設衛所等事俱依擬施行一勞永逸兵民幸甚查得內一件臣原奏要將花馬池守禦千户所改設寧夏後衛興武營添設守禦千户所將選定新舊招募土兵起調前去入伍食糧永逺操備但合用旗軍五千名今止挑選得四千名尚欠一千名及查得花馬池守禦千户所額設軍人舊欠三百六十四名俱應撥補合無照依榆林靖邊等衛并陜西苑馬寺事例將陜西西安等八府正德元年以前清出該解南方軍人免其發解各改編前項新設衛所應當軍役待軍伍數足具奏停止會官議得前項地方委係要害處所必須兵力強盛庶克保障今總制官員奏要改設衛所委的事體相應合無令兵部仍行本官將花馬池守禦千户所改立寧夏後衛興武營添設守禦所文職等官并印信銅牌行各衙門照例銓選奏請給用仍行陜西清軍官將正德元年以後清出雲南貴州兩廣湖廣軍人改編今設衛所著役數足奏請停止其餘議處事情悉令查照原擬施行務期威武克振邉方有賴等因查得改編舊例止是兩廣雲貴四川湖廣等邉衛𢎞治十三年間該榆林巡撫都御史王嵩題該兵部議擬合無依其所奏不拘常例行移陜西清軍御史并布按二司清軍官員將延安慶陽西安三府所屬見今清出在官該解雲南兩廣福建湖廣江浙各都司衛所軍役不分例前例後逐一查勘明白免其起解原衛俱解延綏巡撫衙門改編榆林衛撥去各營堡操備仍行各軍原衛開豁名伍等因題奉孝宗皇帝欽依是欽此𢎞治十七年間為修舉馬政事該臣奏稱陜西苑馬寺缺人牧馬該本部議擬題準將陜西各府𢎞治十六年以前清出江南衛所軍人例該存留附近衛所者俱解陜西苑馬寺牧馬俱經通行欽遵外切緣南北衛所軍伍俱不可缺前項奏行事例一則因邉衛缺軍防守一則為邉方缺馬征戰况北人應當南軍畏其煙瘴炎熱終是不肯應役州縣清解雖勤而衛所空虛如故徒為里書官旗漁獵之資以此較彼權其輕重利害改編之計本非得巳今苑馬寺牧軍頗勾孳牧花馬池興武營地方添設衛所乃邉方兵勢強弱腹裏民生安危所繫尤重且急但今次議奏止開將正德元年以後清出雲南貴州兩廣湖廣軍人改編今設衛所著役查得陜西各府並無兩廣軍人其雲南貴州湖廣三處先曽清出者節經改編去訖雖有未盡數亦不多前項新設衛所終難填實如蒙乞敕兵部再議合無比照榆林奏行事例將陜西各府正德元年以後清出雲南貴州四川湖廣江西浙江等都司衛所軍人該起解者免解原衛改編新設寧夏後衛及興武營守禦千户所共輳一千名停止仍行原衛將名伍除豁如此庶幾威武振揚邉方有賴而腹裏人民獲安矣等因具本該本部官欽奉聖旨兵部知道欽此欽遵抄出送司查得先為缺軍防守邉備事該巡撫延綏都御史王嵩奏訪得延安慶陽西安三府所屬人民中間多有貴州雲南兩廣福建江西浙江湖廣四川南直𨽻等處都司衛所軍役清出見解并逺年無勾等項軍士照名改調本邉操備等因該本部依擬不拘常例行移陜西清軍御史等官將延安等三府見今清出在官該解貴州雲南兩廣福建湖廣四川江西浙江各都司衛所軍役不分例前例後逐一查勘明白免其起解原衛俱解發延綏巡撫衙門斟酌照名改編榆林衛著役操備仍行各軍原衛開豁名伍造册申繳本部備照其原衛有人應當不曽發册清勾者不許一概改編等因題奉孝宗皇帝聖旨是欽此已行欽遵外又查得為經理要害邉防保固疆場事該總制陜西都御史楊題稱要將陜西延安等八府正德元年以前清出該解南方衛所軍人改編寧夏新設衛所應當軍役該本部等衙門會官議擬仍行陜西清軍御史等官將正德元年以後清出雲南貴州兩廣湖廣軍人改編今設衛所著役數足奏請停止等因題奉欽依已經通行欽遵去後今該前因案呈到部看得總制陜西都御史楊題稱先因花馬池等處地方缺軍防禦奏要將陜西西安等府清出正德元年以前該解南方軍士通行改編前項新設衛所已蒙該部奏奉欽依準擬但各府原無兩廣軍人其雲貴湖廣者節經清解去訖改編之數終亦不多欲要比照榆林事例將前項府分正德元年以後清出解雲貴四川湖廣江浙等都司衛所軍人俱免起解改編寧夏新設衛所共輳一千名數足停止仍將原伍開除一節合無依其所奏本部仍行陜西清軍御史等官查照前該奏擬衛分但有正德元年以後清出原係南方軍士例該起解者俱令改編今設寧夏等衛所輳足一千名數照舊停止仍將巳改編者轉行原衛各將名伍開豁免致再行勾擾緣係總制官員奏要填實邉軍及奉欽依兵部知道事理未敢擅便正德二年閏正月三十日本部尚書閻仲實等具題本年二月初二日及奉聖旨是欽此欽遵擬合通行除外合咨前去煩為轉行彼處清軍等官照依本部題奉欽依內事理欽遵施行一為乞取醫士治療病疾事禮部覆該本部祠祭清吏司案呈奉本部送於禮科抄出欽差總制陜西延綏寧夏甘肅等處邉務兼督理馬政都察院右都御史楊奏臣元氣素弱舊有目疾少壯之時無嵗不發中年以來血氣既衰漸成昏眊視物如霧十步之外不能辨人近於正德元年十一月間前往寧夏花馬池等處地方閲視邉兵野行草宿為風沙所傷回至環縣目疾大作見風日則刺痛如割閲文字則涕淚交流兼以風熱上攻耳鳴頭暈腰膝無力行立艱辛臣之疾勢如此然而未敢言去者以受恩深重茫無寸補近蒙陛下加以崇秩假之重權寇患未消正臣子鞠躬盡瘁之日及又奉敕經理寧夏延綏一帶邉防責任重大分當以身徇國豈敢遽求便安但察臣脈候表裏俱病久而不治將成痼疾訪得陜西邉方多無明醫雖有一二頗通醫業之人緣南北風氣不同稟賦各異治療失宜雖多無效臣在江南素用鎮江衛醫士睦幹藥餌取效恆多臣是以不避斧鉞冒昧上陳伏望聖慈憐臣身在邉方乞敕該部轉行巡撫南直𨽻都御史行令鎮江衛將醫士睦幹督發前來隨臣軍門治療前疾痊可方竭股肱之力以報陛下生成之德等因具奏奉聖旨該部知道欽此欽遵抄出送司案呈到部看得總制陜西延綏寧夏甘肅等處邉務兼理馬政都御史楊奏稱舊有目疾漸成昏眊兼以風熱頭暈將成痼疾素用鎮江衛醫士睦幹藥餌多效乞行巡撫南直𨽻都御史行令鎮江衛將醫士睦幹督發前來軍門治療前疾痊可方令回還一節切惟三軍之司命全在乎主帥一身之運用莫先乎目力主帥安危關係甚重合無準其所奏但巡撫南直𨽻都御史今已取回本部移咨都察院轉行巡按直𨽻監察御史行令鎮江衛督發醫士睦幹前去總制陜西等處邉務都御史楊處調治前疾俟痊之日令其回籍如此則朝廷軫念邉方之計切而優禮重臣之典隆矣緣係乞取醫士療疾及奉欽依該部知道事理未敢擅便正德二年二月十一日具題十三日奉聖旨是欽此本年二月十五日咨都察院轉行訖一為預處儲蓄以安邉固本事户部覆陜西清吏司案呈奉本部送於户科抄出欽差總制陜西延綏寧夏甘肅等處邉務兼督理馬政都察院右都御史楊題行據陜西布政司呈查得𢎞治十八年西安延安鳳翔慶陽四府災傷遇例蠲免除豁過稅糧馬草延綏一帶糧料一十六萬七千八百六十二石零草四十三萬一千四百一十九束零寧夏一帶糧料三萬九千二百九十七石六升草一十萬九百八十三束零甘肅一帶糧料八萬七千六百二十七石五斗六升零固靖環蘭洮岷西固城糧料一十二萬六百三十四石二斗草二十一萬六千七百九十八束零存留糧料二十三萬一千五百石零草五千八百餘束及據本司呈稱查得本司廣積庫各項銀兩除呈蒙巡撫巡按案驗批準解輳補災免糧數并收買銅料鑄錢科舉應用原額年例給賞軍士冬衣布花官軍折俸銀兩寄庫馬價及户部送發寧夏甘肅糴糧銀兩外見在止有夏秋糧餘價缺官皂𨽻糴糧支剩農桑絲綿折銀并本庫陸續放出餘銀查算各項共二千四百二十二兩五錢四分四釐四毫八絲六忽及户部送到賑濟銀二十萬兩內除修邉十萬兩環慶糴糧二萬兩賑濟用過九千七百六十一兩二錢解去平涼府準折祿米一萬三千三百七十三兩二錢外見在五萬六千八百六十五兩六錢緣由前來案呈先準巡撫延綏本院右副都御史文貴咨為走回男子傳説寇情事開稱敵衆入套動調主客兵馬數多查得本鎮各倉見在糧料草束供給主兵頗勾支用若是供給客兵誠有不敷合無一面先將陜西布政司廣積庫收有稅糧等項銀兩酌量動支委官領解前來分投派往延安府地方收買糧料草束運赴附近衝要屯聚客兵按伏營堡上納一面行陜西布政司管糧并分巡分守等官將各年拖欠之數上緊催來以濟急用一面移文户部請益銀鹽以補缺乏等因為照延綏一鎮逼臨河套敵衆首先窺伺前項年分腹裏災傷蠲免起運糧草數多及寧夏甘肅固靖環蘭洮岷等衛俱係防邉處所原額應徵起運糧草既巳蠲免除豁必須措置補數已經節行該司查處去後今節據前因除支銀糴買及催徵稅糧另行外會同巡撫陜西本院右副都御史張泰議得陜西西安等八府人民額徵糧草供給陜西延綏寧夏甘肅四鎮官軍人馬支用若外無冦戎之警內無水旱之虞則一嵗之入自足以供一嵗之用奈何近年以來邊境驛騷東西侵擾動調客兵往來應援供億之費動加數倍會計所儲在在不足節該鎮巡等官具奏荷蒙皇上軫念邉方二三年間運送官銀多至五六十萬餘兩開中官鹽二百萬引但分給四鎮不見其多兼且地方連年薄收米價髙貴發銀易買較之先年僅得一半然各該邉倉自是稍有積蓄相兼嵗徵之數足可支持不意𢎞治十八年西鳳延慶四府大遭旱荒人民缺食流徙在途逺近動搖方賑恤撫安之不暇豈敢照常催科仰荷聖恩將勘實災傷應徵起存稅糧一體除豁小民始有生意地方獲安然糧草之出於民者固已蠲除而兵馬之食於官者不可減免遂令前項開中糴買之儲不足以備災傷蠲免之數而倉場所入不償所出漸至空虛總計各邉除豁起運稅糧馬草若論糴買用銀將及四十萬兩而存留之數不與焉且陜西雖云八府而財用所出西安一府實當其半西安既有全災七府全收不足以補况延慶鳳翔三府亦復有災餘四府雖不曽作災亦非全熟勢難通融撥補近因敵衆入套延綏守臣不次移文告乏雖行布政司將西鳳等八府在庫官銀酌量陸續解運補數與户部發到預備糴糧賣鹽銀兩俱送各邉巡撫衙門轉發彼處管糧官員招商糴買分發緊要倉場備用又將布政司收貯招納冠帶農民等項銀兩支出分派固慶洮岷兵備邉備副使等官斟酌糴買糧草及折支官軍俸糧大約所補不過十之三四而司府庫藏亦漸空虛其存留糧料草束俱係嵗用不可缺之數又各無從措補今陜西布政司查報在庫銀兩除各項動支及賑濟馬價二項外所剩官銀止有二千四百餘兩及查賑濟銀二十萬兩除奏準修邉十萬兩及已支賑濟糴糧外見在止有五萬六千餘兩夫以堂堂巨省而匱乏至此言之可為寒心查得先為旱災救荒等事該巡撫都御史張泰巡按監察御史邢纓會同奏要將山東河南起運折糧銀借支四十萬兩輳補前項災免糧草該户部議看得山東河南起運銀兩俱係供給京儲及宣大二鎮之數見今大敵在邉尚未逺遁萬一有警將何撥補訪得靈州等處大小鹽池係天産美利不勞人力其出無窮其課易辦合無行移巡撫都御史張泰查前項鹽課除近日開中買馬二十萬引外果有羡餘作急議擬上請盡數招商中納糧米助邉應用等因題奉欽依備行前來查得靈州大小鹽池原額鹽課共一萬四千三百三十七引舊例每引納銀一錢五分每年止該銀二千一百五十兩有餘輪年分送延寧二邉買馬近該臣議奏量增課程新舊共五萬九千三百三十七引每引納銀二錢五分為因行鹽路狹鹽利少通正德元年分二池除舊引外共支放過新引二萬四千九百九十八道該銀六千二百四十九兩五錢緣前項鹽課雖蒙送發二十萬引前來止可收貯遞年陸續招商挨放若以正德元年所放新引計之多則十年少則六七年二十萬引之鹽方可放盡豈有羡餘招商糴糧况所收銀兩查有兵部題奉孝宗皇帝欽依陜西茶鹽易馬備邉不許别項奏討事例擅難别項動支所據前項年分蠲免過起存稅糧馬草委的無從措置補完原數使寇知悔禍不來犯邉地方收成幸得全稔則以倉場見在之糧草支持主兵以庫藏見有之銀兩及開中未盡之引鹽陸續招商兼催徵拖欠逋賦輸納當年稅糧亦足勾用但敵情難測萬一有警未免徵調客兵臨期招買不出雖悔何及又恐年嵗似前災傷倉庫既空賑濟轉輸兩無所賴民窮盜起為患何可勝言臣等俱有地方重寄今若不言他日誤事罪將焉逭查得先為急處救荒事準户部咨該本部等衙門會題該臣題前事會官議擬內一件聽缺知印承差照依歷役年限納銀多寡數目悉依原擬施行并農民願納銀兩參充知印承差吏典者仍查照前例俱通行各布政司及順天應天南北直𨽻各照例收銀類總解部轉發陜西布政司支用候年榖頗熟邉方稍寧之日停止又一件舍餘民人先年上納軍職并今願告上納者悉照所擬施行至指揮使而止舍餘就於原衛民人於地方衛所帶銜間住俱聽巡撫衙門定奪銀兩類解户部轉發例至正德二年停止又一件上納隂陽醫學僧道官俱依擬施行各處軍民客商并仕宦子孫不係見有職役者納銀六十兩授正七品散官五十兩授正八品散官四十兩授正九品散官二十兩者冠帶榮身其銀兩係兩京順天應天地方赴户部及南京户部各布政司并直𨽻地方赴各司府州上納類解户部轉發例至年榖頗熟邉方稍寧之日停止等因題奉欽依備咨通行外近據陜西布政司呈稱查得止是收過本省上納隂陽僧道義官知印承差農民銀二萬六千六百六十九兩並無各布政司并南北直𨽻收解銀兩及户部亦無轉發并原開軍職無人告納銀兩緣由前來切緣前例俱因陜西地方奏開通行江西浙江四川湖廣河南及南北直𨽻所得銀兩類總解部若依原擬解發陜西支用事體相應及又查得近為處置邉儲預防邉患事亦該巡撫都御史張泰會同巡按監察御史邢纓奏要將陜西布政司查出成化年間兩淮山東運司餘剩未中殘鹽一百二十一萬五千七百八十六引未填勘合一百二十一道另定價值量為減輕招商報中糴買糧草未奉明示如蒙伏乞聖明俯念陜西三邉重鎮地方安危所係乞敕户部查照議奏合無將陜西奏開救荒通行江浙四川湖廣河南南北直𨽻事例所得類總解部銀兩照依原擬盡數查發陜西布政司收貯分給陜西延寧甘肅四鎮糴買糧草補完𢎞治十八年災傷蠲免之數仍乞將近日議奏開中報剩殘鹽早為定奪行令陜西布政司招商報中倘前項殘鹽有礙惟復仍開淮浙四川等處課鹽五六十萬引招商或收納銀兩以實庫藏或上納糧草以益邉儲臨期酌量地方豐歉施行如此則非惟邉方儲蓄有所仰賴不至缺乏且使腹裏人心有所係屬不至動搖實為便益等因具本奏奉聖旨户部知道欽此欽遵抄出送司案呈到部看得所奏要將浙江等處司府上納隂陽僧道義官知印承差等項解部銀兩查發陜西布政司收貯分給延寧甘肅糴買糧草并成化年間奏開兩淮山東運司餘剩未中殘鹽招商報中一節除成化年間兩淮山東運司中剩殘鹽歷年久逺未審有無見在已經行移各該運司查報至日另行議擬奏請定奪外其隂陽僧道義官知印承差等項上納銀兩先因陜西地方災傷擬行後因彼處收成頗豐并本部先因運送賑濟等項銀兩數多及因京邉賞賜官軍銀兩不敷間遇各處解到僧道等項銀兩補輳支用訖其未到者又係撫巡官員奏稱災傷存留本處借用即今本部見無收貯亦無解到銀兩况承差加納銀兩例已停止近因內府承運庫奏稱國用不足尚且行取各省在庫金銀解京送用及奉欽依今後各邉運送銀兩照正統景泰年間例行不許例外加添所據僧道等項上納銀兩難再類送為此合行移咨前去煩為查照施行一為經理要害邉防保固疆場事吏部覆本部送於吏科抄出總制陜西延寧甘肅等處邉務兼督理馬政都察院右都御史楊題查得臣欽奉敕先因花馬池等處邉防久弛敕爾用心整理近該爾會同議處各項事宜甚為周悉足見體國安邉至意敕至爾即照兵部會議過事理於去年賑濟官銀內動支十萬兩招商納米以備食用一應合用工料預為措置停當待相應時月督同各該鎮巡官將延綏定邉營迤西至寧夏橫城寧塞營迤西至定邉營橫城迤北至黑山營各處邉牆壕塹陸續興工修築髙厚挑濬深闊原無牆溝去處一體修築墩臺暖鋪小堡待前項工程稍緩以次修舉其餘悉依原擬施行敕內該載未盡者聽爾從宜區處事完之日將修過工程用過錢糧數目造册奏繳爾建此大議受兹重託必須殫心竭力務求事可功成一勞永逸人無嗟怨寇絶窺覦朝廷免西顧之憂邉民享太平之樂毋或虛費財力自貽咎愆欽哉欽此欽遵會同巡撫陜西右副都御史張泰巡撫延綏右副都御史文貴巡撫寧夏右僉都御史劉憲行令陜西布政司支取去年賑濟官銀十萬兩招商納米以備食用一應合用工料預為措置待黃河開消之後哨探套內無賊起倩軍民人夫先將原擬延綏定邉營迤西至寧夏橫城邉牆壕塹三百餘里分工修築挑濬寧塞營迤西至定邉營延綏鎮巡官一併興工其橫城迤北至黑山營牆塹待前項工程就緒寧夏鎮巡官一體修築整理及照依原擬會委陜西布政司左參政唐錦舟陜西按察司副使王寅陜西都司軍政掌印都指揮僉事房懷專涖其事務期一勞永逸潛消敵人窺伺之心以為腹裏人民經久無窮之利待事完通將修過工程用過錢糧造册奏繳外臣會同巡撫陜西右副都御史張泰議照前項經理要害邉防工力浩繁事體重大非旬月之間可以責成必須假以嵗年從容區畫則事集而人不告勞事干各鎮若無三司重臣專理誠難就緒但陜西地方政務繁冗布按二司官員各有專職今雖暫委各官管理其原管事務又令别官帶管未免顧此失彼况工程皆在沙漠邉逺之地必得有精力有巧思不避艱險能耐勞苦之人庶可倚託切見近年巡撫大同右副都御史劉宇修理邉牆奏保郎中李惟聰升授按察司副使提督工程事完改選緣今經理邉防事體相同臣等博訪得西安府同知張敏平涼府同知嶽思忠鞏昌府同知張檄陜西苑馬寺寺丞朱璜俱通敏老成精勤強幹歷官陜西年久熟知地方事情相應舉用如蒙伏望聖明軫念邉方大計全陜軍民安危所係乞敕吏部再行訪察合無比照大同事例於張敏嶽思忠張檄朱璜四人中定擬二員上請量升陜西按察司僉事職銜專令提督修理前項邉牆壕塹墩臺暖鋪營堡待原擬工程通完之日本司有缺具奏補缺管事如本司無缺起送改除如此則邉方大計既可責成而别項政務亦不妨廢實為便益等因具本該本部官欽奉聖旨吏部知道欽此欽遵行間隨該巡撫陜西等處地方右副都御史張泰亦題前事通抄送司查得布按二司自天順年以後添設官員俱奉欽依裁革訖今該前因案呈到部看得都御史楊題稱各處邉牆壕塹經理要害工力浩繁要將西安等府同知張敏等并苑馬寺寺丞朱璜四人中定擬二員量升僉事專令提督一節緣前項邉方工力委的重大相應專官管理但今添設官員俱奉欽依裁革所據前項官員似難添設為此合咨前去煩照原擬會委左參政等官唐錦舟等著令專一提督修理其各官原管事務徑自責委相應官員帶管施行一為器使將才以修戎務事兵部覆該本部送於兵科抄出總制陜西延綏寧夏甘肅等處邉務兼督理馬政都察院右都御史楊題臣惟三軍之命實係於將而戰守之將其用亦各不同今之參將分疆畫地各守一隅所謂守將遇警固未嘗廢戰而其用則先於守今之遊擊隨賊聲勢往來䇿應所謂戰將所至固未嘗無守而其用則專於戰守將之務修車馬備器械據要害固封守明斥堠謹禁防冦至而先為之備不必求取戰功求無所失而巳若遊擊之官披歷荆棘眠宿霜露非身先士卒不足以鼓勇齊力非躬冒矢石則不能解圍潰堅雖謀勇貴乎兼濟而常以勇為主是二者固未始不相通而目前之用則先其所急切見分守延綏東路右參將都指揮僉事時源性資果敢膽氣猛厲慣經戰陳驍勇著聞今分守一方雖亦未嘗廢事使當遊擊之任衝鋒破敵是其所長延綏遊擊將軍都指揮同知戴欽性資明爽才識疏通曉暢邉情熟間戎務今為遊擊非無可取若居分守其所建立必有過人且人才難得用違其長雖能者無以自見隨才器使則天下無不可用之人况延綏慣戰精鋭之兵東西應援必得驍將領之而神木孤山一帶營堡密邇河套敵衆遇冬首先窺伺分守得人有不戰自屈之勢如蒙乞敕兵部再行訪察如果臣言可採合無上請將時源改充遊擊將軍戴欽改任分守參將各換敕行事則此二人者易地而居各當其才戰守之寄兩有所托待其勞效顯著主副將官之基未必不由於此等因具本該本部官欽奉聖旨兵部知道欽此欽遵抄出送司查得先為黜不職以禦邊冦等事該巡按陜西監察御史燕忠題稱分守延綏東路右參將烏銘縱賊長志貽患地方要行提究選官更替等因該本部依擬推舉得指揮薑漢時源俱各相應題奉孝宗皇帝聖旨是時源升署都指揮僉事充右參將分守延綏東路地方欽此又為缺官事照得延綏缺遊擊將軍該本部推舉得都指揮戴欽烏銘俱各相應等因題奉聖旨是戴欽著充遊擊將軍欽此已經通行欽遵去後今該前因案呈到部看得陜西總制都御史楊奏稱分守延綏東路右參將時源性資果敢驍勇素著長於征戰延綏遊擊將軍戴欽才識疏通曉暢邉情長於分守欲將各官隨才更調一節既該總制官員議奏前來必其考驗有素參酌停當合無依其所奏將時源改充遊擊將軍戴欽改任分守參將候命下之日各換敕賫令各照今任地方行事仍行總制及各該鎮巡等官轉行各該一體欽遵施行緣係總制官員奏要更調將官及奉欽依兵部知道事理未敢擅便正德二年二月十三日本部尚書閻等具題本月十五日奉聖旨是時源改充延綏遊擊將軍戴欽改分守延綏東路參將都換敕與他欽此欽遵查得延綏遊擊將軍原擬責在統領原選遊兵三千操練聽調務要律己奉公撫恤軍士圖樹功名以副委用如或貪黷僨事罪有所歸仍聽總制鎮巡等官節制延綏東路參將責在操練軍馬修理城堡遇有賊冦即便相機勦滅凡事須聽總制鎮巡等官節制案呈到部擬合通行除外合咨前去煩為查照欽遵施行一為經理要害邉防保固疆場事題為經理要害邉防保固疆場事據鎮守寧夏總兵官都督僉事李祥呈抄蒙臣鈞帖前事會同鎮守太監葛全巡撫右僉都御史劉憲副總兵都指揮僉事衛勇備行各該營堡及寧夏等四衛催促原擬官軍扣期赴工及擇本年三月二十七日卯時本職親詣告祭破土四月初一日於本鎮橫城興工築打邉牆緣由到臣案查先於正德元年十二月初九日欽奉敕先因花馬池等處邉防久弛敕爾用心整理近該爾會同議處各項事宜甚為周悉足見體國安邉至意敕至爾即照兵部會議過事理於去年賑濟官銀內動支十萬兩招商納米以備食用一應合用工料預為措置停當待相應時月督同各該鎮巡官將延綏定邉營迤西至寧夏橫城寧塞營迤西至定邉營并橫城迤北至黑山營各處邉牆壕塹陸續興工修築髙厚挑濬深闊原無牆溝去處一體修濬墩臺暖鋪小堡待前項工程稍緩以次修舉其餘悉依原擬施行敕內該載未盡者聽爾從宜區處事完之日將修過工程用過錢糧數目造册奏繳爾建此大議受兹重託必須殫心竭力務求事可功成一勞永逸人無嗟怨寇絶窺覦朝廷免西顧之憂邉民享太平之樂毋或虛費財力自貽咎愆欽此欽遵正德二年閏正月內行據鎮守寧夏總兵官都督僉事李祥鎮守延綏總兵官都督僉事張安并各路分守參將等官閻綱葉椿等各呈稱在套敵衆俱各過河去訖套內並無聲息緣由前來臣會同巡撫陜西右副都御史張泰巡撫寧夏右僉都御史劉憲議照應修工程自寧夏橫城起至延綏定邉營迤東石潦池寧靜墩界止邉牆三百餘里連壕塹共該六百餘里原擬人夫九萬餘名若一併起派上工誠恐督工官員顧理不周致令茍且疏略合將應起人夫分為兩班每班做工一百日頭班自三月初一日為始至六月初十日止次班自六月十一日起至九月二十一日止各工完疏放并會行陜西布政司先支去年賑濟官銀八萬兩運至慶陽府寄庫出榜招商上納夫糧給領官價以備人夫食用及會委都布按三司官左參政唐錦舟副使王寅都指揮房懷專理其事外續因西安平涼固原一帶地方久旱無雨人心憂疑暫且停止自本年二月十九等日以來各該地方時雨連降田野沾足麥苗長茂秋田下種人心已安又經行令寧夏鎮巡衙門擇日祭告及先起頭班寧夏本鎮平涼慶陽固原一帶軍民人夫興工修築去後今據前因查得應起軍民人夫兩班共八萬名民夫西安府二萬二千名鳳翔府五千名平涼府五千六百名慶陽臨洮二府俱三千五百名鞏昌府九千名共四萬八千六百名軍夫寧夏三路一萬六千五百五十名陜西都司所屬衛所并護衛羣牧操牧等所一萬四千八百五十名共三萬一千四百名比之原先擬奏之數減去一萬名每班各做工三箇月頭班四月初一日為始至六月終疏放次班六月初一日為始至八月終疏放每夫日給口糧食米一升五合仍令户內量貼盤纒銀多不過二兩隨帶供送前來以補口糧不及每夫十名共備車一輛裝載煤炒器具每二名出一片椽一根到彼列車為營覆以椽用蔽風雨又遵照題奉欽依事理將漢中府衛棧道之外地方不起人夫量徵夫價運送工所買辦蔬肉每月犒勞二次仍支茶馬項下官銀二百兩行令陜西布政司置買藥餌選取醫生分派各委官處遇有人夫疾病即為撥醫給藥調治及查得合用撥木臣於去年已經差撥靖邊衛官軍於本處雪山採打共三十餘萬俱運至修邉處所牆完就為修蓋營房暖鋪等項取用及照延綏寧塞營起至定邉營止共該添造墩臺一百四十二座築打剷削邉牆壕塹共三萬七千二百六十丈五尺行準巡撫延綏右副都御史文貴會同鎮守太監劉保總兵官張安欽遵題準事例起倩本鎮東西中三路步軍土兵備禦軍人延綏榆林三衛抽選屯丁舍餘并延安一府所屬州縣民夫俱於本年二月十九日動土興工分派地方陸續築造其寧夏橫城以北至黑山營邉牆壕塹待前項大工就緒之後地方無事本鎮軍夫次第修理再照套內雖稱哨無敵衆但恐賀蘭山後之敵窺知修邉或有扎筏渡河之謀不可不防又經行令寧夏鎮巡官摘撥官軍二千員名聽參將閻綱管領於牆外架梁防護又摘撥一千員名聽協同都指揮保績管領於牆內巡邏䇿應及延綏地方巳該巡撫都御史文貴議行副總兵薑漢量領兵馬架梁防護各待工完通將修過工程用過錢糧數目造册奏繳外臣聞之易曰王公設險以守其國詩曰城彼朔方古之帝王制禦四夷未嘗不以險固城守為務今花馬池一帶邉備疏略地里平漫大敵每從此拆牆深入搶掠自花馬池靈州直抵固原平涼田不得耕畜不得牧生理蕭條日甚一日皇上軫念邉方命臣經理臣罄竭駑鈍建此大議興此重役一勞永逸誠非得已但興工之初動勞軍民難保無怨若憚勞恤怨不行趂時整理誠恐向後邊寇仍前擁衆深入侵擾則平慶臨鞏固原靖邊等處軍民不免重遭冦掠西安鳳翔等府地方賊雖難到徴調軍馬合用糧草浩繁穵運轉輸勢所不免破産陪納困苦轉甚今修濬前項牆塹每班不過一百日之工誠使邉牆完固向後敵衆不敢輕犯人民安業在邉者不被搶掠在內者不須穵運受百日之勞而享百年之利得失利害較然可知夫凡民不可與慮始而可與樂成人臣不難於論事而難於任事况以佚道使民雖怨不恤但恐傍觀坐談之人既不慮地方安危又不知事情本末且謂後來干係非已所當輒生異議輕為撓沮邉防大計付之若何仰惟聖謨淵深成命已定必無是事此臣私憂過計犬馬惓惓一寸之忠也臣近患目疾痰疾日久未痊已經具本陳情俟命外緣大工既興合當奏報為此今將經理處置略節緣由并祭告破土興工日期具本謹具題知一為遵明詔更置將官以蘇久疲邉人事題為遵明詔更置將官以蘇久疲邉人事準兵部咨該本部題該臣題前事本部看得臣奏稱查勘過洮岷河州西固階文等五處地方密邇諸番叛服靡常原設守備官員難以裁革但守備洮州都指揮趙寧岷州都指揮閻縉俱各不職欲要革罷另行推用一節緣前項各該地方守備官員既該總制官員勘稱裁革不便合無依其所奏本部行移本官除將趙寧行令替職閻縉令回原衛仍另推相應官員前來上請簡用其餘俱各照舊存留守備其稱各官家屬衆多未免分外供應甚又肆意侵漁潛交番賊誠為貽患地方相應禁治亦合通行本官轉行前該守備各官今後跟用家人止許存留十數名在彼其餘俱發回原衛不許仍前多帶以致供應太繁軍士受害及敢有侵尅交通等情聽總制巡按等官指實參奏拏問決不輕貸等因具題奉聖旨是欽此欽遵備咨到臣除趙寧行令替職閻縉令回原衛其餘守備官員俱各照舊存留仍通行嚴加禁約但有多帶家人擾害地方及有侵剋交通等項情弊指實參奏拏問外竊照岷州洮州二衛設在萬山之中極鄰番境守備將官撫馭番敵操練軍馬保障地方關繫不輕前項不職官員既革罷代之者若非從公慎擇其人不無仍蹈故轍貽患生弊博訪得守備階文署都指揮僉事張鎬京營協贊見在陜西聽用署都指揮僉事楊義俱明敏疏通長於撫馭堪以守備岷州平涼衛指揮使趙文西安左衛指揮僉事楊宏俱老成練達熟知番情堪以守備洮州如蒙乞敕兵部再行訪察如果各官才有可取合無奏請於張鎬楊義內擢用一員守備岷州地方趙文楊宏內擢用一員守備洮州地方各照例請敕行事庶幾兵民不至受害番夷可保無虞緣係該部題奉欽依行令推舉守備官員事理未敢擅便謹題請旨一為衰病乞恩休致事奏為衰病乞恩休致事臣年五十三嵗由成化八年進士任中書舍人歷升山西陜西按察司僉事副使太常寺少卿南京太常寺卿𢎞治十五年十二月內欽升都察院左副都御史督理陜西馬政尋兼巡撫陜西地方正德元年正月內荷蒙皇上簡命總制陜西等處邉務續蒙聖恩升本院右都御史臣稟賦素弱血氣早衰中年以來耳鳴如蟬目眩生花元氣受虧火邪乘之痰暈嘔逆時作時止腰膝無力行立艱辛去冬十一月間前往寧夏花馬池等處閲視邉兵兩目為風沙所傷回至環縣赤腫疼痛不能視物彼因敵衆在套又自念奉敕經理邉防責任重大不敢求退巳於今年正月內具本乞取醫士前來隨軍治療前疾痊可誓竭駑鈍以圖報稱閏正月間敵衆出套軍馬掣散回營臣亦暫回平涼整理馬政兼治前疾日復一日病勢愈增兩目轉加昏眊行立欹側漸成痿軟近又加患心疾夢寐不安神爽飛越稍勞思慮怔忡不巳緣臣受恩如天欲報無地方圖經營士馬修飭邉防使敵衆不敢侵犯軍民得安生業以少酬覆載生成之德奈何器質庸凡行能淺薄崇階厚祿踰分過量事權太重力不能勝是以不為造物所容未老而衰百疾並見若非急求休致實恐不得生還鄉里再念臣原籍雲南安寧州人臣父景任廣東化州同知致仕貧不能歸寄籍湖廣巴陵縣臣年一十二嵗以明經童子舉于朝臣父母偕來京師臣舉進士未一年臣父病故貧不能歸葬又依臣姊氏卜葬于直𨽻鎮江府丹徒縣地方臣無子以雲南堂兄之子紹芳為嗣寄籍丹徒看守臣父母丘塋臣之一身旅寓漂泊蹤迹孤單深慮却顧益難自處豈可久貪榮利驅巳衰之筋力犯不知止之戒乎况今達衆逺遁河套肅清軍情稍緩至於經理花馬池一帶邉防事宜合用人夫錢糧器具等項臣巳區畫停當若責成陜西延綏寧夏三鎮巡撫官員依擬整理自足濟事臣孱軀病體委的不能支持是以昧死瀝血上陳哀悃伏願皇上𢎞天地之量寬雷霆之誅憫臣衰病察臣誠欵放臣回還丹徒縣致仕居住使得與田夫野老歌詠太平或前病稍痊將以暮年餘力教鄉人子弟惟忠惟孝以為他日效用之地所以仰酬朝廷曠蕩之恩者庶幾其在此也臣不勝隕越俟命之至緣係衰病乞恩休致事理未敢擅便謹具奏聞伏候敕旨一為謝恩事奏為謝恩事準吏部咨該臣奏為衰病乞恩休致事奉聖旨卿盡心為國多效勤勞方切委任而乃纍陳有疾懇求休致特兹俞允給驛回去病痊之日有司來説起用吏部知道欽此欽遵備咨到臣除望闕叩頭謝恩欽遵回還外伏念臣本庸愚荷蒙聖朝作養甄拔歷官中外有年近者復蒙皇上授以崇階委之重任涓埃無補盛滿難堪方圖鞭䇿駑鈍不意病疾纒綿昧死陳情乞容休致仰荷聖慈矜允天語褒嘉既許其給驛還鄉又期其病痊起用天地之恩至深至厚豺獺雖微亦知報本回鄉之後若病候稍康則殘喘餘生皆陛下之所賜也惟當與田夫野老詠歌舞蹈祝萬年之聖夀樂四海之治安臣不勝感激仰戴之至緣係謝恩事理為此具本謹具奏聞一為經理要害邉防保固疆場事兵部等衙門尚書等官劉等題該本部題該總制陜西延綏寧夏甘肅等處邉務兼督理馬政都察院右都御史楊奏查得臣節該欽奉敕先因花馬池等處邉防久弛敕爾用心整理近該爾會同議處各項事宜甚為周悉足見體國安邉至意敕至爾即照兵部會議過事理於去年賑濟官銀內動支十萬兩招商納米以備食用一應合用工料預為措置停當待相應時月督同各該鎮巡官將延綏定邉營迤西至寧夏橫城寧塞營迤西至定邉營并橫城以北至黑山營各處邉牆壕塹陸續興工修築髙厚挑濬深闊原無牆溝去處一體築濬墩臺暖鋪小堡待前項工程稍緩以次修舉其餘悉依原擬施行敕內該載未盡者聽爾從宜區處事完之日將修過工程用過錢糧數目造册奏繳欽此巳經欽遵會議整理合用錢糧物料等項起倩軍民人夫巳於本年四月初一日興工及具題外臣近因有疾奏乞休致荷蒙聖恩俞允欽遵將前項修邉文卷簿籍咨送巡撫陜西右副都御史曹元接管施行臣回還原籍養病伏念前項修理邉防將以保障腹裏人民一勞永逸誠非得已臣凡有所見荷蒙采納今乃以病不克終事慙負國恩罪當萬死及查得巡撫陜西都御史張泰巡撫延綏都御史文貴巡撫寧夏都御史劉憲俱係經該會議官員奉敕同心協力共成大役今各官俱升任去訖竊恐此役人心懈怠茍且疏略徒費財力事不經久且邉牆雖固未有不資兵而能守者若既成之後守臣不能講求規畫布署官兵防守則亦不能阻遏敵騎負臣初志以貽後責伏望聖明早下該部計議責成各該新任巡撫會同鎮守官員照該部會議及臣等會處過事宜督同原委都布按三司官員趂時陸續整理務期成功既成之後遇冬敵衆入套尤須分布將士慎守藩籬使彼不生窺覦之念沿邉腹裏人民不至遭殘害此衰病臣犬馬朴忠不能自已之惓惓也等因具本該通政使司官奏奉聖旨該部知道欽此欽遵抄出送司查得先為前事該總制陜西等處都御史楊奏內開應築邉牆自延綏定邉營迤東石潦池地界起至寧夏地方橫城止共三百里沿邉舊有墩臺邉牆委的壕塹窄淺牆垣低薄墩臺稀疏乞要斟酌損益將舊牆內外幫築髙厚各二丈收頂一丈二尺兩面俱築垜牆髙五尺連牆共髙二丈五尺除垜牆根占兩面共四尺尚餘八尺之地每牆一丈開垜口一處安置轉關遮板牆外每里添築敵臺三座每座相離一百二十步底闊周圍四丈五尺收頂周圍二丈二尺上蓋暖鋪一間傍牆於空濶要害有水頭去處增添小堡髙厚丈尺略與邉牆相等墩空去處仍酌量添築墩臺牆外壕塹挑濬深二丈口闊二丈二尺底闊一丈五尺前項敵臺九百座暖鋪九百間每間用五人守之該用軍四千五百名無事之時止守舊墩每冬月河凍不拘敵衆曽否入套即便調撥鋪軍上牆防護及添撥軍人於新墩守哨河開無事疏放回營牆上設置籌牌梆鈴晝夜往來巡警廣張旗幟聨絡相應分委的當官員各定鋪分護守參將協同守備官各照所管地方提調敵人若果入套必似前窺伺侵犯原擬徵調延綏遊竒土兵及寧夏副總兵等人馬各於定邉花馬池興武營清水營靈州等處駐劄仍各分兵於新舊小堡內按伏䇿應其間應分應合事宜又在臨期調度如此則邉備嚴密威武振揚足以伐其邪謀不敢輕易近牆若是仍前填壕近牆攻穵官軍出列牆上敵臺兩邉各用鎗炮矢石攻擊所來愈衆則所傷愈多步兵擊之於牆上騎兵待之於牆內其鋒必沮其氣必喪彼自逺來利於速戰入既無䇿勢必遁歸縱使桀驁不肯悔過結衆攻圍邉牆受敵不支然相持之間未免少延時日烽火傳接環慶固原一帶人畜既斂兵備既嚴可保無失事不得巳則我邉兵姑斂入大小城堡以避其鋒敵果深入速將原拆牆口補塞量留官軍堅壁固守各挑精兵襲蹤而入陜西官軍撓之於內俟其將遁躡蹤而出延寧精兵邀之於中沿邉官軍拒之於外敵雖梟雄豈有善歸之理就令小有侵掠比至邉牆我軍仍於牆上裏面垜口用鎗炮矢石攻擊勢必潰亂諸軍乘之縱不能使其匹馬不旋亦必大遭挫衄可保數十年不敢入套犯邉及稱該用軍民人夫口糧欲要於賑濟官銀內動支十萬以補招商上納俱於今年措置停當期以明春邊方少靖四月興工八月完備等因該本部會議得敵性桀黠深入敢戰非得溝牆深髙墩堡聨絡鮮不坐受其敝况前項地方地廣兵分實難防遏連年失利可為明鑒今都御史楊所陳曲盡經營之計事非得已但今年民遭荒歉來嵗便未蘇息若將邉牆墩堡敵臺一時併修誠恐民不堪命合無令兵部仍行本官準令於前項官銀內動支十萬兩先行分委廉幹官員隨宜招商上納糧米務在充實足勾夫役關支待明年八月哨探河套無事年成有收起倩軍民人夫將邉牆壕塹先行依擬幫築挑濬其敵臺暖鋪小堡候待民力有餘然後漸次興工此外一切處置事宜悉依原擬施行其用工人役嚴督管理官員加意撫恤使忘其勞所築牆垣等件務須比舊堅久有益防守不為徒費財力及開奏延綏地方寧塞營之東有險可據騎難馳突寧塞營迤西至舊安邉營舊安邉營迤西至定邉營各九十里川原平漫與花馬地方相類既無邉牆雖有溝塹俱為沙土擁填平滿萬騎馳驟不能阻遏前此敵衆每從花馬池清水營地方拆牆深入取其捷徑今若將花馬池一帶邉防整飭完固萬一黠寇自定邉安邉之間擁衆而入西向花馬池邉牆以裏地方自西而南不過稍迂百餘里則修邉工程歸於無用誠如巡撫都御史文貴所言行據三司委官參政安惟學僉事胡經等勘量得定邉營迤西石潦池地界起至寧塞營迤西地界止共長一百六十三里三百四十五步內平漫相應築牆挑壕者一百三十一里三百四十九步山崖險峻堪以剷削者三十一里三百五十六步合無責成巡撫都御史文貴照依所擬應築牆者築牆應剷削者剷削但前項地方巳該文貴新築甎墩制度精巧非惟便於瞭望亦可按兵擊賊所患墩空隔越稀疏合準本官所擬於中空量為添築小墩臺安在邉牆居中墩依於牆尤便防守其餘溝塹敵臺暖鋪俱照寧夏邉牆一體整飭修理但邉牆髙厚丈尺比之寧夏地方稍省合用人夫除本鎮外聽於延安一府所屬州縣量數起用務令沿邉有備腹裏無虞等因又該本部會議得敵衆譎詐此沒則彼出東備則西侵必須在在戒嚴庶彼無間可投前項地方既該總制官員議處前來相應依擬但當嵗荒之餘而興此浩大之役民力或恐不勝合無令兵部仍行本官轉行彼處巡撫查勘本境地方今年果無災傷軍民安堵亦照花馬池事體起倩軍民人夫將邉牆壕塹先行依擬幫築挑濬其餘敵臺等項亦候年嵗豐稔民有餘力然後漸次興工中間一切處置事宜悉依原擬施行務使工程堅完民不告勞敵人絶西入之望邉方享永久之利斯為盛舉又開奏寧夏橫城北黃河東崖舊有邉牆一百八十五里壕塹一道髙厚深闊悉如花馬池一帶城塹之數自南而北有長城十八墩後守臣恐有稀疏每墩空內添設一墩共見在墩臺三十六座牆裏套內地方又設石嘴暖泉二墩瞭守其第十八墩與河西黑山營鎮逺關相對每年於黑山營屯聚人馬阻遏敵騎以為寧夏北門鎖鑰前人綜理周密深有所見節因寧夏守臣怯懦士馬削弱河東墩軍纍被套人撲捉既將石嘴暖泉二墩廢棄遂將新舊三十六墩俱廢而不守謂之備夏不備冬却止於河西築立墩臺一十五座守瞭由是套衆多寡逺近消息通不知覺又因黑山營曽被敵衆攻圍遂將官軍那入平邊城操備由是平邊城為極邉要害平人往往不得耕牧殊不知撲捉墩軍窺伺城堡乃敵衆常事顧吾所以待之者何如耳吾能往彼亦能往我退一尺則彼進一尺河東墩臺即不可守使敵乘凍渡河則西岸之墩獨不可掏穵乎黑山營有備則平邊為腹裏今廢黑山營而不守假使近窺平邊亦將并廢之乎是皆不通之論也今花馬池一帶邉牆既欲幫築髙厚又於牆盡頭橫城之南添築一堡量屯兵馬防禦河開之後縱有侵擾不能為患但恐冬深河凍踏氷而西仍謀入冦容或有之意外之防不可不謹所據河東三十六墩邉牆壕塹誠宜幫築修濬河西黑山營誠宜屯宿重兵但前既修延綏花馬池一帶邉牆工程浩大力不能及合無行令寧夏守臣明年將河東新舊三十六營坍塌損壞者量為修補照依舊規撥軍守瞭與河西墩臺烽火相接不至失誤官軍應援稍候一二年仍將前項橫城以北三十六墩牆塹悉照花馬池一帶邉防幫築髙厚挑濬深闊敵臺暖鋪護守官軍一體處置整理仍挑選精鋭人馬於黑山營按伏以為平虜城聲援等因又該本部會議得河東三十六墩并河西黑山營若使戍守嚴備踏氷渡河不敢輕忽平邊地方益重保障今若棄而不守是撤藩籬而守門庭堂陛之患勢將必至今總制官員奏要修復舊制誠得前人綜理至計相應依擬但大工併作民力委有不堪合無令兵部行令本官轉行寧夏守臣將前項河東新舊墩臺坍塌損壞者照依舊規暫且量為修補撥軍守瞭與河西墩臺烽火相接以備踏氷過河候各該工程稍集仍依原擬修築施行各該工完之日通將用過錢糧數目修過工程丈尺備造文册奏繳等因具題奉聖旨是都準擬行欽此已經通行請敕各官欽遵去後又為前事準工部咨該總制陜西等處都御史楊奏稱行據寧夏鎮巡等官回稱備行各該營堡及寧夏等四衛催促原擬官軍扣期赴工及擇本年三月二十七日本職親詣告祭破土四月初一日於本鎮橫城起興工築打邉牆緣由到臣案查正德二年閏正月內行據鎮守寧夏總兵官都督僉事李祥鎮守延綏總兵官都督僉事張安并各路分守參將等官閻綱葉椿等各呈稱在套敵衆俱各過河去訖套內並無聲息緣由前來臣會同巡撫陜西右副都御史張泰巡撫寧夏右僉都御史劉憲議照應修工程自寧夏橫城起至延綏定邉營迤東石潦池寧靜墩界止邉牆二百餘里連壕塹共該六百餘里原擬人夫九萬餘名若一併起派上工誠恐督工官員顧理不周致令茍且疏略合將應起人夫分為兩班每班做工一百日頭班自三月初一日為始至六月初十日止次班自六月十一日起至九月二十一日止各工完疏放并會行陜西布政司先支去年賑濟官銀八萬兩運至慶陽府寄庫出榜招商上納夫糧給領官價以備人夫食用及會委都布按三司官左參政唐錦舟副使王寅都指揮房懷專理其事及行令寧夏鎮巡衙門擇日祭告并先起取頭班寧夏本鎮平涼慶陽固原一帶軍民人夫興工修築去後今據前因查得應起軍民人夫兩班共八萬名民夫西安府二萬二千名鳳翔府五千名平涼府五千六百名慶陽臨洮二府俱三千五百名鞏昌府九千名共四萬八千六百名軍夫寧夏三路一萬六千五百五十名陜西都司所屬衛所并護衛羣牧所一萬四千八百五十名共三萬一千四百名比之原先擬奏之數減去一萬名每班各做工三箇月頭班四月初一日為始至六月終疏放次班六月初一日為始至八月終疏放每夫日給口糧食米一升五合仍令户內量貼盤纒銀多不過二兩隨帶供送前來以補口糧不及每夫十名共備車一輛裝載煤炒器具每二名出一片椽一根到彼列車為營覆以椽用蔽風雨又遵照題奉欽依事理將漢中府衛棧道之外地方不起人夫量徵夫價運送工所買辦蔬肉每月犒勞二次仍支茶馬項下官銀二百兩行令陜西布政司置買藥餌選取醫生分派各委官處遇有人夫疾病即為撥醫給藥調治及查得合用撥木臣於去年已經差撥靖邊衛官軍於本處雪山採打共三十餘萬俱運至修邉處所牆完就為修蓋營房暖鋪等項取用及照延綏寧塞營起至定邉營止共該添造墩臺一百四十二座築打剷削邉牆壕塹共三萬七千二百六十丈五尺行準巡撫延綏右副都御史文貴會同鎮守太監劉保總兵官張安欽遵題準事例起倩本鎮東西中三路步軍土兵備禦軍人延綏榆林三衛抽選屯丁舍餘并延安一府所屬州縣民夫俱於本年二月十九日動土興工分派地方陸續築造其寧夏橫城以北至黑山營邉牆壕塹待前項大工就緒之後地方無事本鎮軍夫次第修理再照套內雖稱哨無賊冦但恐賀蘭山後之衆窺知修邉或有扎筏渡河之謀不可不防又經行令寧夏鎮巡官摘撥官軍二千員名聽參將閻綱管領於牆外架梁防護又摘撥一千員名聽協同都指揮保績管領於牆內巡邏䇿應及延綏地方巳該巡撫都御史文貴議行副總兵薑漢量領兵馬架梁防護及又稱建此大議興此重役動勞軍民難保無怨若憚勞恤怨不行趂時修理誠恐向後敵衆仍前擁衆深入侵擾則平慶臨鞏固原靖邊等處軍民不免重遭冦掠西安鳳翔等處地方寇雖難到徵調軍馬各用糧草浩繁穵運轉輸勢所不免破産賠納困苦轉甚今修濬前項牆塹每班不過一百日之工誠使邉牆完固向後敵衆不輕犯人民安業在邉者不被搶掠在內者不須穵運受百日之勞而享百年之利得失利害較然可知夫凡民不可與慮始而可與樂成人臣不難於論事而難於任事况以佚道使民雖怨不恤但恐傍觀坐談之人既不慮地方安危又不知事情本末且謂後來干係非已所當輒生異議輕為撓沮邉防大計付之若何仰惟聖謨淵深成命已定必無是事此臣私憂過計犬馬惓惓一寸之忠也等因具本題奉聖旨該部知道欽此欽遵抄出備咨送司行間今準前因案呈到部看得陜西等處總制都御史楊奏稱花馬池一帶牆墩臺遵奉前該欽依巳於今年二月以來興工修築但伊近因養病還家而各經該巡撫官員張泰等又俱升任去訖誠恐此後人務茍簡事難經久又慮成功之後不能設法防守亦為無補欲要責成新任各該巡撫并鎮守等官查照原擬趂時陸續整理務期成功遇冬仍分兵慎守以絶邊患一節切緣前項地方墩牆疏薄既無地險可據兵將寡弱又無人力可倚所以彼易為患我常失利其都御史楊身任總制之責熟察邉患之由特建前議雖知大役之興民所難堪然為永逸之圖事非得已本部先已依擬題奉欽依行令欽遵去後今本官既巳患病解職而又該同事巡撫官員又俱遷轉别任前項工程雖已擇日興工委官督理然官非經由則錯繆之弊或有不免計失防禦則修築之功亦為徒勞况糴買口糧已費在官銀一十餘萬貼備盤費又起户役銀一十六萬以至犒勞藥餌之需撥木採運之勞皆本官精神運用計慮周悉所及一旦付之新任各該巡撫官員及更用别項未諳之輩切恐事無統紀人為異同不無錢糧徒費事工無成而邉方保障之功一隳而再難就緒矣以臣等愚見必須仍專諳練大臣一員前去總理提調方克有濟儻蒙聖明俯從所請候命下之日本部會官推舉歷練老成熟知邉事者數人上請簡用一員請敕前去督同各該鎮巡等官查照本部先今奏奉欽依及都御史楊等會處過事宜將前項議修工程逐一查勘各該起倩人夫是否見在用工即今有無修築多寡就便督率原委都布按三司官員趂時陸續用心整理務期經久完固足禆保障既不許玩愒遷延致妨邉務亦不許茍且疏略徒費財力如是各起工役俱已了完仍要規畫方略布署官兵委任各該鎮巡等官督屬慎固封守若中間尚有未盡應處事理從宜廣集忠謀區畫停當徑自施行惟在藩籬之勢既固軍士之威益壯可以絶邊外覬覦之念免邉民創殘之害工完之日徑自具奏回京仍將修築過工程丈尺用過錢糧數目造册奏繳本部差官閲實上請定奪庶使垂成之功不至廢弛而防邉之計可圖久逺矣等因具本題奉聖旨是便會推諳曉邉事的兩三員來看欽此欽遵臣等會同太師兼太子太師英國公張懋吏部尚書許進等從公推舉得兵部左侍郎文貴都察院右副都御史張鼐巡撫陜西右副都御史曹元俱各諳曉邉事堪以委任伏乞聖明於內簡命一員若用侍郎仍量兼憲職以便行事令其請敕前去查照兵部前該題奉欽依內事理欽遵施行仍令兵部行移各該鎮巡等官各查照原奉敕諭事理一體同心協力共成大事毋得視常怠玩致有妨誤緣係推舉總理邉務大臣及奉欽依是便會推諳曉邉事的兩三員來看事理未敢擅便正德二年六月初十日本部等衙門尚書等官劉等具題本月十三日奉聖旨官不必差修築邉牆且罷見在餘剩錢糧著巡撫等官查理稱盤見數銷鎔成錠差人解京欽此關中奏議卷九
