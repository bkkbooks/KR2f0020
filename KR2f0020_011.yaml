body:
  text: 關中奏議卷十一明楊一清撰提督類一為老病衰殘乞恩辭免新命事致仕少傅兼太子太傅吏部尚書武英殿大學士臣楊一清謹奏為老病衰殘乞恩辭免新命事嘉靖四年正月二十四日該兵部差千戶陳璽賫公文一角內準兵部咨為設總制以圗兩全事該本部等衙門會題該兵科都給事中鄭自壁等題前事兵部議擬題奉欽依準設陜西提督軍務官員會官推舉得臣及致仕兵部尚書彭澤服闋新建伯兼南京兵部尚書王守仁堪任奉欽依是楊一清改兵部尚書兼都察院左都御史少傅兼太子太傅仍舊著提督陜西三邊等處軍務寫勑并符驗旗牌關防都給與他著上緊前去欽此欽遵備咨到臣聞命驚懼不知所為力疾強起望闕叩謝外仰惟皇上以上聖之資光臨大寶萬方仰德四夷向風天下臣民凡抱一長挾一藝者皆思自效臣荷纍朝作養登用皇上嗣統之初即降勑存問褒贈上延先世廕録下逮子孫天地之恩至深至厚夫豺獺微物尚知報本臣雖至愚豈不思效涓埃之力以圗報稱緣舊患目疾老而增劇致仕以來又越十年今年七十二歲昏眊轉甚咫尺之地不能辨人面目舉筆作字點畫不分又兼痰火上攻時作昡暈足膝痿弱舉動須人攙扶前年秋冬感患瘧疾數月方得稍痊自是精神頓減血氣益耗兩耳重聽髮枯齒脫衆目所覩不敢自誣切思人臣任事必有精力而後可以有為况軍旅事重臣奄奄喘息之人豈能辦此心雖不敢自棄力實不能自強且言官論薦廷臣會舉止知臣昔年久任關陜粗有奔走之勞不知臣今老病衰弱大非前時之比臣不自言恐致誤國大事萬死何贖及聞甘肅地方近被回賊侵擾仰賴聖武布昭委任重臣舉兵征討醜類畏威逺遁延寧等處未聞有警彼邊境常冦各鎮守自能捍禦倘以權不歸一須設總理官員則賢俊滿朝堪當是任者必多其人臣之衰朽豈宜濫及臣是以昧死上陳伏望聖慈早收成命勑下該部别推相應官員委用容臣照舊致仕以終殘喘則自今以後未死之年皆皇上之賜也臣不勝戰兢隕越懇切願望之至緣係老病衰殘乞恩辭免新命事理為此具本順差鎮江衛舍人茅祖賫捧謹具奏聞伏候勑旨嘉靖四年二月十二日奉聖旨卿纍朝耆俊聞望素隆投間有年屢經論薦特兹起用付以全陜委任甚重豈可引老辭避况敵方在套邊患可慮卿嘗以體國自許諒不在趙充國馬援之下宜兼程前去督率文武將吏調度兵糧攘外安內以紓朕西顧之憂再不必辭吏部知道一為再陳懇悃乞容照舊休致事致仕少傅兼太子太傅吏部尚書武英殿大學士楊一清奏嘉靖四年二月初八日該兵部差官賫捧勑諭一道符驗一道旗牌十面副關防一顆并欽賜白金五十兩綵幣四表裏到臣方患痰嗽強起扶病迎接望闕叩頭領受外伏念臣先於本年正月二十四日準兵部咨該兵部等衙門會題節該奉欽依是楊一清改兵部尚書兼都察院左都御史少傅兼太子太傅仍舊著提督陜西三邊等處軍務欽此臣自度老病衰殘不能供職具疏辭免乞容照舊休致俞允未頒渥恩復降伏讀制詞有曰卿昔在先朝簡居祕閣任重望隆固宜出入禁闥謀謨廟堂軍旅之事若非可以勞卿者然古昔大臣若周之尹吉甫方叔召虎唐之裴度郭子儀宋之韓琦范仲淹皆出將入相茂建勳績為社稷之臣國有賴焉卿以古名臣自待忠義自許諒不以內外勞逸為輕重也欽此絲綸春溫金幣霞爛責以君臣之大義諭以出入之均勞感極而悲繼之以泣切惟君召行不俟駕乃聖門之明訓君言不宿於家亦人臣之常職臣本庸劣陛下起之於病廢之餘付之以節鉞之重分當即時戒行豈敢固為辭讓况臣歷官以來在外之日多立朝之日少謀謨廊廟匪臣所堪經營四方實臣素志若重內輕外好逸惡勞臣雖至愚決所不敢仰承聖諭愧懼交并續準兵部咨為傳奉事節奉欽依陜西三邉見今有事提督軍務楊一清著彼處巡撫都御史即其家敦遣務要上緊前去節制調度不必辭兵部知道欽此又準兵部咨為套中走回男子供報大敵入套整飭邊備以防侵擾事該本部題節該奉欽依是這大敵擁衆入套其情叵測便馬上差官賫文著陜西延寧鎮巡官務要嚴督各該副參遊擊守備等官加謹隄備遇有警報協力遏阻相機剿逐不許因循玩忽自分彼此致失事機新推提督三邉軍務官著上緊前去節制調遣欽此欽遵節行到臣伏覩天語丁寧知三邉敵患上軫聖懷當地方多事之秋非臣子辭勞之日自當力疾就道但年過七十精力既不如前智慮亦非昔比其最苦者兩目昏懵赤澀見風日則涕淚交流閲文字而點畫不辨縱令勉強到彼終恐無益邊防及思前次陳情之疏未奉明旨恐致稽誤不容自默伏望聖慈察臣先後辭免實情别求精健練達之臣往當提督軍務之任容臣照舊致仕豈徒保全愚臣殘生亦且不誤邉防大計臣不勝懇悃激切為此具本差鎮江衛舍人楚淵賫捧謹具奏聞伏候勑旨奉聖旨卿才猷練達精力尚健既有經營四方之志提督重任當為國黽勉一行不必再辭兵部還差聽事一員前去沿途催促著上緊去該衙門知道欽此一為謝恩事欽差提督陜西三邉軍務左都御史臣楊一清謹奏為謝恩事臣先任少傅兼太子太傅吏部尚書武英殿大學士致仕家居嘉靖四年正月二十四日準兵部咨該本部題奉欽依準設陜西提督軍務官員會官推舉得臣等堪任奉聖旨是楊一清改兵部尚書兼都察院左都御史少傅兼太子太傅仍舊著提督陜西三邊等處軍務寫勑并符驗旗牌關防都給與他著上緊前去欽此欽遵備咨到臣自度老病衰殘不能負荷具本辭免隨該兵部賫送勑諭符驗旗牌關防并欽賞銀五十兩紵絲四表裏到臣又該巡撫都御史吳廷舉受命即臣家敦遣啓行臣感激奮發即欲就道奈見患目疾并痰嗽未愈恐誤邊防大計又經具本懇辭一面於三月初七日扶病啓行沿途服藥調理俟命近日得報知先後辭本俱不蒙俞允又聞邊方有警不敢再為辭避兼程前進於四月初一日到於陜西地方欽遵行事外謹具本稱謝者伏以聖武布昭每軫懷於邊徼皇仁遍覆尤篤念夫舊臣起廢退之人治軍旅之事以保傅之重督邊閫之師稽古昔而有聞在今日為創見莫遂循牆之請徒增臨谷之危恭惟皇上代天撫世應運特生承眷命奄有萬方如帝堯之乃聖乃神乃文乃武起宗藩入繼大統邁王季之克明克類克長克君乾轉坤旋囿羣生於嘉靖春生秋肅舉一世而甄陶臣章句迂儒蓬蒿末質自垂髫以至白首遭際纍朝由近侍以至孤卿踐登極品固嘗授鉞未成安攘之功承乏代言豈有論思之益既遂休間之願偷安林壑之身樂與齊民共歌新化病驥不堪於服乘腐草無意於回春皇上念其往勞早塵存問之使采之公議付以節鎮之權周王不遺夀考之仁何以加諸虞舜樂取人善之公兹焉大矣且溫綸褒諭直欲期之古人寵賚便蕃又已超夫常格既懇恩而不獲當力疾以徂征誓竭庸虛少酬知遇顧人非三代何敢希方叔召虎之謀猷業本書生亦勉效韓琦仲淹之經略但世平易玩法久漸隳政習於因循人安於偷惰不大改絃轍無以作新士氣不力任怨怒無以奮起事功又恐居內地之安或罔念邊疆之苦持文墨之論不暇謀兵革之難任耳易至於傳訛浮言每興於所忌伏望宸𠂻獨斷廟議協心將委任而責之成必聽納而求其實若虛應故事如聖慮之所及則自貽厚責在國法以何逃待邊患稍寧地方無事願遂乞骸之請以終垂盡之年臣無任瞻戀感戴懇悃激切之至緣係謝恩事理為此專差指揮魏傑賫捧謹具奏嘉靖四年五月三十日奉聖旨卿具疏陳謝足見忠愛閫外之事宜竭誠展布務臻實效以副委任該部知道一為軍務事題為軍務事臣奉勑提督陜西三邊等處軍務欽此欽遵外案照先準兵部咨該本部題為設總制以圗兩全事內開跟隨書掾頭目家人聽從選帶仍具奏聞節該奉欽依是欽此欽遵備咨到臣除頭目另行外為照臣一到陜西地方即該題奏各項事情及發屬文移浩繁緣未奏討書掾缺人書寫訪得直隸鎮江府丹徒縣省祭官任漢本府兩考役滿吏李棠俱各寫字端楷諳曉行移已經行令該府開送跟隨前來書辦及思臣年老多病近又感患痰嗽日久未愈扶病前來供職誠恐西土之人風氣不同用藥亦異難以收效選帶鎮江府醫士錢汝儉跟隨軍門調治臣疾及又思得三邊地方險逺必多得親信家人跟隨使用內將二名照例支給口糧其餘俱於臣廪給內食用不支口糧緣係該部題奉欽依聽從選帶事理為此謹具題知一為急處邊儲以防敵患以安地方事題為急處邊儲以防敵患以安地方事準巡撫陜西地方都察院右副都御史王藎揭帖準戶部咨該本部題為套中走回男子供報大敵入套整飭邊備以防侵擾事該陜西鎮巡等官題前事奉聖旨該部看了來説欽此欽遵抄出送司覆奏間隨據委官署郎中胡宗明呈為回賊擁衆入境圍困城堡事通查案呈到部看得巡撫陜西都御史王藎并鎮守太監晏宏會題開稱本鎮固靖環蘭等處大敵入套誠恐動調兵馬錢糧缺乏乞要再添部屬官一員多帶內帑銀兩并開中淮浙各運司引鹽前來固原等處或委官分投糴買或召商報納糧料草束專備客兵人馬支用一節誠為思患預防至意但固原等處嵗用軍餉原係陜西所屬州縣起運糧草并本處衛所屯糧供給若所司官員果能及時催徴依限完納一歲之徴自足一歲之用此係地近腹裏自來無有年例銀兩先該巡撫等官連章具奏糧餉不足本部屢次題準給發銀鹽并總制衙門及部委郎中奏帶銀兩分𣲖陜西一鎮三年之間共計五十七萬一千八百餘兩比之延寧等邊有年例之處其數加倍况固原等處先年奏報邊敵出沒聲勢雖大然一時搶掠即回軍馬不曽久駐錢糧不至多費况近日運去軍前鹽銀雖稱七萬二千六百餘兩內止解去甘涼一萬六千餘兩其餘五萬六千餘兩俱在蘭州等處買辦糧草預備客兵支用不久大軍掣回錢糧尚多見在即今敵衆在套如或調兵就堪支用但恐客兵數多一時供億不繼相應計處查得甘肅一鎮近巳分發銀一十四萬兩前去比來邊情巳寧前銀足勾支給所擬署郎中胡宗明開報淮浙等運司鹽課共二十萬引可以不必分撥該鎮况今近在鎮城商人情願增價相應準呈為今之計部官不必再差合無候命下之日本部劄付先差署郎中胡宗明就留陜西督理固原等處軍餉即將原開嘉靖三年分各運司額鹽兩淮一十萬引每引原定價銀伍錢今每引加銀二錢共銀七萬兩兩浙五萬引每引原定價銀三錢二分今每引加銀一錢共銀二萬一千兩山東小引鹽五萬引每引原定價銀一錢五分今每引加銀五分共銀一萬兩通共該鹽銀一十萬一千兩會同巡撫都御史王藎坐委能幹官員查照緊關城堡分投召商上納本色糧料草束另項收貯專備客兵支用一面查出陜西布政司貯庫前巡撫都御史王珝奏開鹽價銀二十二萬四千九百九十八兩除提督尚書金獻民發去甘肅七萬二千餘兩尚餘一十五萬兩一體糴買糧料接濟或折色相兼放支一面催併所屬州縣將起運固原環慶等處邉糧并彼處衛所該徴屯糧上緊追完立限差人速解原定倉庫交納以備急用萬一前賊深入兵馬調多經費不繼聽提督大臣到彼相機議處另行具奏定奪等因題奉聖旨是陜西固原等處軍餉就留胡宗明在彼督理動支各項銀兩糴買糧料都依擬務要上納緊關城堡不許堆積無用處所有誤支給欽此欽遵合咨前去煩照本部題奉欽依內事理欽遵施行準此除行陜西布政司轉行守巡管糧等官催徴未完錢糧及行胡宗明查照施行外合將該部咨到緣由開具揭帖行來隨據委官署郎中胡宗明亦呈前事臣近到陜西省城閲視城操巡邉備冬各枝人馬原額數目雖多中間逃故缺伍十之三四其見存者身無完衣軍器缺壞馬匹瘦損飢寒困苦之狀見於顔面較之臣先年巡撫總制之時逈然不同詢其所以皆云近年以來月糧缺少有至一二年之上全無支給者又被先該鎮守官廖鏜等指以進貢為由侵尅斂派痛苦入骨近雖釐革安靜巡撫衙門按月放支每石亦止給銀三錢不敷食用已往年月無從補給以此雕傷之人元氣未復及節據固原環慶等處公差人員稟訴各稱沿邊一帶城堡糧料草束俱無蓄積有亦不多不勾供應主兵倘若添調客兵將何支給及訪得前項邊方官軍月糧欠缺亦多應賞冬衣布花經年不給雕傷困苦比之省城尤甚近查得提督尚書金獻民奏內據陜西按察司固原兵備副使成文分巡關西道僉事鍾錫會呈內開欠少本鎮官軍月糧二十三萬每每告討無從補給即此一處他處可知切惟克敵必資乎兵養兵必資乎糧軍食不充則軍氣不揚何以克敵制勝且沿邊官軍比之腹裏勞逸相懸平居家有父母妻子之纍身無飽食暖衣之樂一旦遇警驅之以盡死力顧不難哉近年各邊失事官軍不能奮勇力戰甚或因而生變實由於此近據延綏守臣奏稱入套之敵數多臣切緣此敵因是節年搶掠得利蔑我無能入敵之謀恐所不免縱使夏間無事秋冬難保不來今年無事明年難保不來來則必須動調客兵截遏今倉場糧草在在缺乏有地方之責者不得不憂所以陜西鎮巡等官都御史王藎等奏要添差部屬官一員多帶內帑銀兩並開中淮浙各運司引鹽星夜前來固原等處或委官分投糴買或召商報納糧料草束運赴緊要城堡收貯專備動調客兵人馬支用情辭懇切蓋不得已而提督尚書金獻民奏內又復論及蓋亦親到地方目擊其狀故以為言節該戶部題奉欽依就留原差郎中胡宗明督理固原等處軍餉然亦止是將原開嘉靖三年分各運司額鹽兩淮一十萬引兩浙五萬引山東小引鹽五萬引加銀召納約有一十萬一千兩之數及先年都御史王珝奏開鹽價銀除已支外見存一十五萬兩糴買放支終恐數少不敷且陜西一鎮固原環慶靖邊蘭州乃總會要害之處固原所轄則有黑水鎮戎平邊紅古版井彭陽等城西安州海剌都等營環慶則有走馬川青平山城甜水等城堡靖邊蘭州則有乾鹽池打剌赤一條城十字川西古城積積灘等堡處處可以通敵况套人多遣姦細入境探我道路知我虛實聲東擊西多窺我之無備倐來倐去每乘我之所忽故要害去處固當多積而僻小城堡亦難全虛不止供給按伏主兵又欲支用經過人馬夫以前項二十五萬餘兩之資而欲分應數十城堡之備委有不敷况前擬引鹽山東小引五萬引自來無人肯報縱欲抑勒均搭給與必須淮浙二處稍有餘利以淮浙之有餘補山東之不足庶其肯從今據陜西布政司官稟稱固原召報糧料草束商人為因加銀數多地方薄收俱各空回不肯報中若在該司納銀固其所願但沿邉正恐糧草無積有誤供餉若俱令納銀運送前去遇有緊急銀不可食何以為處臣查得陜西各鎮自來處置邉儲不過曰穵運曰召商曰糴買三者而已𢎞治十三年間大敵在套動調京軍欽差該部大臣督理軍儲穵運腹裏州縣糧草纍民陪補至於破産鬻兒今日斷不可行况腹裏空虛亦自無糧可穵惟有召商糴買二事可行銀買雖若簡易緣地方時值道里逺近不同計算腳程多致末踰其本若分𣲖州縣僉報人戶糴買未免纍民暗陪隂補而官吏里書放富拘貧侵尅抵換之弊又不能無省費於官斂怨於民亦非至計揆今事勢不得不然惟有召商報中似為得䇿客商射利雖小必趨官府儲糧小費何吝故在客商增一分之價則官司有一分之益但須革兜攬賣窩之弊豈可廢從古飛糧之法又聞之道路近年官司召商多至失信或所召價多所給則少或召納已完又復追價致令虧折資本怨聲載道以此各邉開中糧草多不肯報納率是以往倘有重大軍機路途阻塞車腳不通召中糴買兩無所措雖有智者不能善其後矣及又思得蘭州密邇河西額布勒殘敵竊伏西海萬一糾引番賊侵掠我河洮臨鞏等處此腹心之疾尤當嚴防不止河套之敵為當備也及照甘肅地方近被回賊蹂踐人馬已極困敝雖蒙發去銀一十四萬兩然分𣲖一十五衛所大小城堡數多百孔千瘡難以兼濟至於延綏官軍素稱勇悍各邉調發應援多得其力近年亦復疲敝之甚其官軍多臣舊所統轄每進見詢問輒以糧賞不足為辭貧苦之訴如出一口臣謂此鎮官軍尤當懷之以恩養其鋭氣庶幾緩急可倚若寧夏逺在河外賀蘭山後敵之出沒無時而花馬池興武營靈州一帶地方又侵犯腹裏必由之路屯兵積糧俱不可緩陜西巡撫專為固原等處議奏而臣則有提督三邉之責休戚相關事體一同不敢顧此失彼以貽後艱欲待通查四鎮見在錢糧多寡數目明白方才論奏恐蹈後時之愆將貽噬臍之悔查得𢎞治十八年間為因河套有警孝宗皇帝特差戶部侍郎顧佐帶領本部郎中吕賢陳䇿前來陜西督理邉儲奏準開中淮浙河東運司鹽課一百萬引運送折糧等項銀三十萬兩舉行冠帶等項事例續該臣接管巡撫陜西因見前項銀鹽侍郎顧佐俱發延寧甘肅三鎮陜西止得銀五萬兩不敷當即議奏尚書韓文等覆題以為邉防積蓄以預為先以多為貴若趂今盜賊逺遁年歲頗收不先事廣積倘或緊急將何為備依擬又開兩淮鹽二十五萬引兩浙長蘆四川鹽二十五萬引共鹽五十萬引聽臣定立斗頭召商糴買若有不足再查靈州并西漳二縣變賣鹽課銀兩一併召買務使緩急有備節該奉欽依是務要處置停當邊儲充實毋致臨期缺乏欽此欽遵行來臣即時督令兵備等官髙崇熙燕忠等召報糴買兼行參以奏開事例固靖環蘭一帶延寧甘肅三邉俱頗有積蓄自正德元年至正德四年俱得其用正德五年臣起廢西征查得各邊糧草仍前缺乏又即議奏該部題奉武宗皇帝欽依差戶部侍郎叢蘭帶領主事翟鵬常道袁經三員前來整理三邉之人皆仰賴先朝留神邉事前該大臣實心體國如此今錢糧缺乏比前加甚而寇勢驕橫亦非前比臣不先事極言他日僨事貽患臣之一身固不足惜如地方何及照原差郎中胡宗明委有才力足堪付託但今患病是實已經奏乞回家調治似難久留除將陜西所屬州縣起運各邉糧草并衛所該徴屯糧督令分守管糧管屯都布按三司官嚴限追併完足解赴原定倉庫交納及别項議處事宜另行具奏外伏望皇上念邉事之至重溥大賚之仁恩乞勑戶部議處合無深體先年該部議奏邊方積蓄以預為先以多為貴之意將嘉靖三年兩淮兩浙等運司開剩鹽引并嘉靖四年課鹽共開與一百萬引及再運送官銀五十萬兩仍照先年事例特命戶部堂上官一員帶領屬官二三員前來督理四鎮糧儲大要十分為率陜西固原等處須得四分延寧甘肅三鎮共得六分不拘召商糴買隨宜處置一半務收本色以供客兵支費一半量收折色以備主兵折放其召報本色酌量地方逺近年嵗豐歉定與斗頭斤數使人樂從若再不敷聽臣將陜西司府官庫各項銀兩陸續酌量動支行委布按二司公亷官員趂時召糴務令邉倉各有二三年之積庶使愚臣得以悉心規畫邊務遇警節制調遣勦殺冦衆以安地方臣本衰病廢棄之人誤蒙陛下采之衆論付以重權若因陋就簡諒亦無難投間置散亦其素分但念受恩深重自當為國逺圗倘蒙采而行之邉方幸甚愚臣幸甚緣係急處邊儲以防敵患以安地方事理未敢擅便為此具本專差承差馬廷璋親賫謹題請旨一為整理邊務以備敵患事題為整理邊務以備敵患事準兵部咨該提督陜西延綏寧夏甘肅等處軍務兵部尚書兼都察院右都御史金獻民題前事內一件議處兵將準巡撫陜西等處地方都察院右副都御史王藎揭帖據陜西按察司整飭固原等處兵備副使成文整飭鳳翔等處兵備兼分巡關西道僉事鍾錫會呈等因臣惟禦敵以兵馬為先以糧草為急固原一鎮為三邊喉襟要衝之所其總兵官所領官軍見在不過五百員名守備官見在不過六百員名兵馬之寡弱也甚矣倉卒有警委難支持訪得敵衆自𢎞治十四年大舉入敵得利而歸每每深入搶掠必由固原各該將領纍因兵馬數少不過嬰城自守任其出入以此地方多被殘破人畜多被殺掠見今大敵擁衆入套侵犯之舉又在旦夕若止照往年故事未免復遭荼毒各官所呈相應議處合無將總兵官部下除見在官軍外再於各城堡各衛禦冬防守官軍內選摘精壯二千三百員名共輳三千員名總兵官統領防守官軍仍照例每年十月初一日依期赴操二月河開無事放回有警留住本城支與行糧與見在官軍如法操練預備截殺守備官部下除見在官軍與今擬各城堡挑選共二千員名外未及之數照例懸賞於有丁人戶內召募一千名亦輳三千之數將守備改為參將名色統領殺敵仍聽總兵官調度該用馬匹就於茶馬并苑馬寺給領或行太僕寺收貯官價支買召募銀兩於司府官庫查有無礙銀兩動支庶兵馬充足緩急有備等因題奉聖旨該部知道欽此欽遵該兵部議得固原地方平坦可以馳驟敵衆搶掠多由此入陜西腹裏州縣連歲被害實由本處兵糧不足難以防守合無依其所擬將各城堡各衛禦冬防守官軍內選擇精壯二千三百員名連見在七百名共輳三千名聽總兵官統領其防守官軍上班放回并支給行糧悉如舊規其守備官部下除見在并各城堡挑選官軍二千員名外許於各項軍民丁多戶內召募一千名共輳三千之數就將守備改為參將統領聽調殺敵該用馬匹就於茶馬并苑馬寺給領如不足用許於太僕寺收貯官價支買召募銀兩於官庫動支俱各相應但事關地方軍務仍咨行提督尚書楊一清再加議處具奏施行等因具題節該奉聖旨固原守備照舊其餘準擬欽此欽遵備咨到臣切惟固原為陜西喉襟要害之地地平漫無險可據通其去處甚多自𢎞治十四年以來屢次擁衆深入延寧地方不能捍禦馳驟長驅兩日夜可至固原分散醜類靜寧隆德會寧安定一帶州縣俱被剽掠直抵鞏昌秦州地方近年又侵過平涼蹂踐我涇邠等州縣得利而歸不曽遭挫將來鳳翔西安內郡安保不遭毒害臣先年巡撫之時奏將陜西鎮守總兵移在固原常川住劄意正在此但所統官軍與守備官部下官軍俱不及千數委的數少難以出戰只得嬰城坐守甘受畏縮之罪今提督尚書金獻民要將總兵官部下除見在七百員名外再於各城堡各衛禦冬防守官軍內選摘精壯二千三百員名共輳三千員名總兵官統領守備官部下除見在外今擬增糧并各城堡挑選共二千員名外未及之數照例懸賞於有丁人戶內召募一千名亦輳三千之數統領殺敵仍聽總兵官調度該用馬匹就於茶馬并苑馬寺給領或行太僕寺收貯官價支買召募銀兩於司府官庫查有無礙銀兩動支誠為安邊禦敵至計除依擬行令嚴加挑選聽各官統領以助兵勢外至於懸賞召募一節尤為得䇿今日之務似難舍此查得𢎞治十八年間臣為巡撫準兵部咨為預防邊患事該本部題看得往年敵衆河開之後俱各在套即今桀驁非常事勢難料若果在套潛住未免肆意侵掠為患不已陜西一帶嵗遭大歉民財已窮合用軍馬除本省三邊之外别處客兵決難輕動况彼處土人生長邊方材力勇徑便於戰鬭若欲鼓舞用命必須激之以利故云重賞之下必有勇夫合無本部於太僕寺寄收馬價銀兩借支五萬兩差官賫送陜西布政司收貯聽都御史楊一清支用或隨勢給賞得用官軍或懸利召募本處土人務使精壯之民皆占行伍之籍勇敢之士悉為麾下之兵凡可以激勵各項之人殺賊以取功利者悉聽從宜處置必能得其樂於用命振揚軍威以禦邊敵不可坐委貪刻官員託故以召募為名用強逼勒致失人心若後敵衆出套前項銀兩聽其收買戰馬給軍騎操不許别項支用等因題奉聖旨是欽此欽遵隨該太僕寺寺丞楊信解送銀伍萬兩到於陜西布政司收庫臣於正德元年二年間賞軍召募等項陸續止用過銀一萬五百餘兩比臣奏準回還原籍養病其餘銀三萬九千四百餘兩俱在布政司并平涼慶陽二府寄庫待接管官員支銷及咨兵部并陜西巡撫查照外及又查得兵部先年題準事理臨邊各路土著軍民舍餘人等有能奮勇設謀斬獲首級一顆隨即賞銀三十兩生擒一名賞銀五十兩若能糾集鄉丁敵殺賊衆斬首至五顆以上者為首者加升署所鎮撫又一件今後各該官軍有能斬獲賊級一顆為首者賞銀牌十兩生擒一人者賞二十兩各為從者量為給賞仍將各人功次另行造册奏繳擬升是皆激勵人心鼓舞士卒之䇿與前項該部所奏所擬大意相同况常人之情見利則趨以速為貴邉軍艱苦萬狀俯仰不能聊生者十常八九一旦獲此厚利自然踴躍思奮雖有勢豪買功之人彼亦不肯舍應得之利以犯必禁之法矣然此例雖久官司多不肯行實亦因財用不足之故以致人心怠玩敵勢益張所惜者小所損者大及照臨邉軍民勇悍善鬭者在在有之召之有道自然應命及查先年召軍每名有給銀五兩者有三兩者是為常守之兵比之腹裏抽選召募者大段不同比年延綏寧夏二鎮召募土兵至今與遊竒正兵一體調遣截殺所向有功今各該衛所行伍空虛懸利召募相應舉行至於隨勢給賞有功官軍亦為要務軍門若無財用則有罰無賞何以盡人死力但陜西布政司在庫官銀不多各有頭項難以一槩取用伏望皇上軫念邉方重地防禦為急乞勑兵部議處合無查照先年該部奏行事理於太僕寺馬價銀內動支五萬兩差官運送前來聽臣督委都布按三司實心幹事官員設法召募不拘衛所軍餘舍餘村野土民但係年力精壯騎射間熟者籍名在官願領馬者給銀五兩步軍給銀三兩令其置辦軍裝弓矢器具團成隊伍聽總兵守備等官統領訓練不敢委用貪刻官員用強逼勒以失人心亦不敢濫收不堪之人徒費官錢無益於事至於給賞有功官軍土人銀兩銀牌等項聽臣於布政司無礙官銀內量為查取應用不拘官舍軍餘土人召募民壯等項但有斬獲首級一顆者驗係真正敵人不願升者軍門隨即賞銀三十兩生擒敵人一名者賞銀五十兩該升者照例先賞銀牌仍造册擬升既可鼓士卒立功之勇又可杜官豪買功之弊及照各邊官軍缺馬為急行太僕寺苑馬寺收貯銀兩專備買馬騎操難以别項支用若京運銀兩召募支用不盡亦收貯聽發各邊收買戰馬騎操不許别項動支事完通將支用過召募買馬銀兩數目造册奏繳如此則軍伍可增軍氣自倍可望收克敵制勝之功矣緣係整理邊務以備邊患事理未敢擅便為此具本專差承差馬廷璋親賫謹題請旨一為急缺邊方兵備官員事題為急缺邊方兵備官員事據陜西按察司呈為回避讐惡有病致仕以全國體事準本司副使周崇義關照得本職見年四十九歲係四川成都府灌縣守禦千戶所軍籍山西聞喜縣人由進士正德七年八月二十九日除授戶部雲南清吏司主事歷升員外郎郎中正德十六年九月二十五日升授陜西布政司右參議嘉靖元年三月內蒙巡按陜西監察御史喻茂堅許翔鳳案驗為邊軍聚衆殺害撫臣劫庫放囚搶奪軍器燒毁衙門等事節奏勘合會委本職前去甘州會勘李隆等謀殺許都御史并劫庫放囚等項重情本職會同陜西按察司副使劉大謨將凶犯楊淮等各拷訊鞫審殺害撫臣劫奪庫囚招認真情明白將楊淮蘇秀張璉王禮保賀保兒等六十五員名俱問擬死罪監候已經具奏定奪外嘉靖三年十月二十八日蒙升今職專在甘肅地方整飭兵備兼永昌等九衛所竊照本職歷任主事員外郎郎中九年有餘叨升參議又經三年每於地方軍民事務盡心幹理不敢怠廢復蒙轉升正當勉供職務以圖補報奈何殺害撫臣姦惡正犯楊淮蘇秀張璉范謙并徐通栗不老等六十餘員名俱係甘肅等衛都指揮指揮千百戶軍餘夜不收等項人役各犯主謀下手窮凶極惡神人共怒自古所無已該本職等問擬梟首等罪死者已多監者見在各犯父兄子弟俱在甘肅住居緣各犯生居邊方性本姦惡怨惡讐嫌切齒痛恨往年勘問之時雖出入飲食猶難防備况今久處地方常該巡歷一時一事安能保全且彼時許都御史素無讐嫌止因告添月糧稍不遂心就行謀害况本職以委官親詣地方將各犯嚴刑面審真情問擬謀殺撫臣梟首等罪至今讐恨方深本職若冒昧前去適逢其怒則凶徒逆黨蓄毒藏姦隂懷報復之讐暗肆陷害之惡命固難全時事亦壞關係國體誠非輕小又兼久因舊患風痰病症調理未痊見今飲食減少精神昏瞶不能供理職事除將前項緣由於嘉靖三年十二月并本年正月內已經三次具奏回避有病致仕未蒙準行續奉到都察院明文準吏部咨轉行陜西撫按衙門查勘本職曾否甘肅勘事與彼有無讐嫌於例應否回避會查明白徑自具奏定奪及照本職居官盡職豈敢避難但迫切之情實關於軀命久病之體難赴於邊方蒙今行勘不敢擅離起程兼前病未痊見今調治為此除候撫按衙門勘明具奏明降至日另行呈報今將前項緣由合行移關本司煩為轉呈施行等因備呈到臣為照肅州地方相離甘州五百餘里西七十里嘉峪關外皆係番戎部落肅州城外亦有寄住番回數多變態不一控馭實難朝廷設有兵備副使分守參將各一員無事則撫存隄備有警則調兵戰守而兵備之官禁姦以安人督儲以養兵所繫尤重去歲回部大舉入冦地方被其蹂踐雖遭挫逺遁難保其不復來為患昨者肅州兵備缺員吏部以陜西布政司右參議周崇義升補蓋亦取其就近便於赴任豈期本官始以回避讐惡為辭今又以患病未痊為託堅卧不肯前去已經奏行陜西撫按衙門查勘應否回避具奏定奪近因撫按官員俱去寧夏勘事未回不曾勘結遂使邊方兵備半年之上缺官管理若待撫按勘明奏報方才議處必又耽延數月不無愈加誤事臣惟人臣任事必有欲為之志而後可以有為今周崇義聞命逡巡稱疾不出縱令勉強到彼志意隳頽難以望其修舉職業其在國法似難輕恕節據陜西布按二司官各稱本官年力尚強平日作官儘肯幹理但前在甘州勘事盡法除惡委的結怨已深讐恨報復難保必無稽之人情亦當體悉但係窮邉極逺之地若將别省官員升補赴任稽遲愈至妨廢邊務臣近與新任巡撫甘肅都察院右僉都御史冦天敘計議周崇義似不可復待必於陜西二司官員內推補庶幾早得其用臣博訪得陜西布政司右參議趙載陜西按察司僉事姚文清俱生長北方年力壯強才識優裕付之斯任必有可觀如蒙乞勑吏部再為訪察如果趙載等可用上請簡用一員賫憑令其作急前去肅州整理兵備事務庶幾緩急可託兵民有賴周崇義合無待撫按官勘報果無别情查缺改用緣係急缺邊方兵備官員事理未敢擅便為此具本謹題請旨一為急處巡撫官員以安地方事題為急處巡撫官員以安地方事照得寧夏一鎮孤懸河外賀蘭山後密邇敵巢不時窺伺侵入搶掠况蕃封在內夷漢雜處鎮定安輯全在巡撫得人且河東靈州興武營花馬池一帶又套中入寇腹裏之門戶調度兵糧所繫尤重見任巡撫右僉都御史張璿本係風力任事官員但近日奏發親藩事情未知虛實見蒙欽差內外重臣查勘未結緣本官結怨已深縱使無礙亦難在彼行事及查得寧夏總兵官种勳亦復緣事一鎮之中鎮巡官各有掣肘日久不行更易未免人心渙散邊務廢弛恐有他虞誤事不細然目今正在撫安軍民防禦邊人之際若照常將在京并别省官員推用人情事體未便周知且恐到任稽遲有誤邊方大計臣切見陜西按察司按察使袁擯守身有不愧屋漏之嚴持法有南山不移之判陜西布政司右參政潘塤端慎之操可以服人宏厚之器可以致逺又皆久任兹省人望素歸畀之巡撫必能操弛張之用酌寬猛之宜上下相安兵民咸服如蒙乞勑該部再加詢訪如果臣言不妄將各官疏名上請簡用庶得就近赴任管事實為便益仍乞將張璿暫取回京待前事勘結有無干礙伏俟聖明裁處臣有地方安危之責故冒昧上言蓋亦采諸衆論之公非敢獨持一已之見緣係急處巡撫官員以安地方事理未敢擅便為此具本順差承差馬廷璋親賫謹題請旨一為急缺方面官員事題為急缺方面官員事據陜西布政司呈本司分守隴右道左參政王教於嘉靖四年三月十九日病故呈報到臣為照陜西布政司內統八府外供三邊參政等官分守地方撫安人民催徴錢糧完銷勘合政務浩繁額設官員平居無事足供幹理但中間事故遷除不一臨事差遣往往乏人前項參政員缺急當銓補但地方窵逺别省官員升調交代多遷延不至如僉事周鎬升任已經七月方才前來肅州兵備雖經升補半年之上尚未赴任必得就近升用一員庶免久曠誤事臣博訪得陜西按察司副使韓士竒成文俱操履端謹才識疏通兼且科甲年深先曽被誣黜謫初心不改蒞事益勤堪以升用如蒙乞勑吏部再行詢訪合無於韓士竒等二員內推升前職上請簡用倘蒙采納各官員缺亦望於附近山西河南等處官員內升補庶不久稽妨廢職務實為便益臣受命提督三邊戎務凡軍馬錢糧各項事情必須得人委用事干職守不敢不言緣係急缺方面官員事理未敢擅便為此具本謹題請旨一為軍務事題為軍務事臣奉勑提督陜西三邊等處軍務欽此欽遵到於陜西地方行事外查得先準兵部咨該本部題為設總制以圗兩全事內開合用跟隨書掾頭目家人聽從選帶仍具奏聞等因題奉欽依備咨到臣切緣陜西延綏寧夏甘肅三邊地方廣逺相隔動數千里軍務浩繁賫執旗牌督兵幹事必得明爽精練之人參隨委用博訪得南京羽林前衛正千戶楊評南京錦衣衛冠帶舍人徐鳳岐俱將家子弟諳曉戎務鎮江衛指揮僉事陳嶽生長於騎射間於韜略興州中屯衛正千戶劉欽錦衣衛冠帶總旗趙達冠帶舍人張濓葉澄張瑋羅玉崔堂胡灃崔杲興州中屯衛冠帶舍人楊舉俱各曉暢軍情熟知世務如蒙乞勑兵部奏請照依近年提督等官奏帶參隨事例行令各衙門查送前來陜西軍門聽用實為便益緣係該部題奉欽依聽從選帶事理未敢擅便為此具本順差承差馬廷璋親賫謹題請旨一為處置拖欠邊儲事題為處置拖欠邉儲事案照先準戶部咨為套中走回男子供報大衆入套整飭邊備以防敵患事該陜西鎮巡等官奏前事本部覆題奉欽依備咨到臣除召報鹽引發銀糴買等事另行外內稱固原等處嵗用軍餉原係陜西所屬州縣起運糧草并本衛所屯糧供給若所司官員果能及時催徴依限完納一歲之徴自足一歲之用此係地近腹裏自來無有年例銀兩及要一面催并所屬州縣將起運固原環慶等處邊糧并彼處衛所該徴屯糧上緊追完立限差人速解原定倉庫交納以備急用等因備咨到臣為照陜西延綏寧夏甘肅四鎮錢糧俱該陜西西安等八府及各該衛所軍屯糧草供給以八府之所出供四鎮之所費若儘數完納所少不多但年歲有豐歉地土有肥瘠西鳳等府多苦旱災平慶延安臨鞏等府兼苦早霜之災加以轉輸徴調差役浩繁人户逃移數多縣無完里里無完甲甚則十存三四拋荒田土白地相望蠲免折納節有事例實徴糧數豈能盡如原額若將應徴錢糧及時徴納猶可足供大半奈何近年以來法令廢弛上下因循有司官員以私滅公安常習怠合干上司計日數月坐待升遷多不肯實心幹理公事以致歲徴之數年復一年不得完結臣查據陜西布政司開報各府拖欠邊糧草束數目原派固靖延寧甘肅等倉庫除逺年外自正德十六年起至嘉靖三年止西安府所屬拖欠夏秋糧三十七萬六千三十一石馬草七十一萬八千四百六十六束延安府所屬拖欠夏秋糧三十二萬五千八百五十九石馬草一十三萬三千九百六十二束平涼府所屬拖欠夏秋糧一十六萬七千三百一十七石馬草三十萬八百八十束慶陽府所屬拖欠夏秋糧二十萬三千九百五十一石馬草二十八萬三千三百四十六束臨洮府所屬拖欠夏秋糧二萬六千一百四十二石馬草三萬五千六百一十六束鞏昌府所屬拖欠夏秋糧一十九萬六千八百五十三石馬草二十五萬二千八百七十九束鳳翔府所屬拖欠夏秋糧一十九萬六千一百六石馬草二十萬四百六十四束漢中府所屬拖欠夏秋糧四千一百七十五石馬草三萬三千二百七十五束總計一省共欠夏秋糧一百四十九萬六千四百三十四石馬草一百九十五萬八千八百八十八束中間如澄城一縣拖欠夏秋糧四萬九千三百石馬草五萬三千二百二十四束邠州一州拖欠夏秋糧四萬六千石馬草七萬一千束寧州一州拖欠夏秋糧九萬四千一百二十九石馬草一十一萬八千六百五十束寶雞一縣拖欠夏秋糧七萬三千九百二十石馬草二萬三千七十八束而蠲免折納之數不預焉臣經過州縣數處弔取錢糧文卷略為稽查有卷內取獲實收而無通關者有開稱已完不曽掣取通關者有數年以前通無案卷者不知前該官員因何通不查究即此數處他處可知論法俱該參究治罪但干礙衆人又多係去任官員見在布政司管糧分守等官俱係新任方將逐漸追徴難以責其速效至於衛所屯糧先年拖欠甚多今按察司管屯僉事桑溥遍歷督徴查究不及二年完過糧五十三萬七百三十五石草四十三萬九千二百一十九束折草糧四萬一千八百八石銀七萬六百八十六兩其職業頗為修舉臣舊官陜西嘗推原糧草拖欠之故始因布政司實徴糧數派發遲緩由府以及州縣展轉文移夏糧多至秋深秋糧多至春月方才徴收彼時百姓所收子粒多已花費正在青黃不接之際鞭追囚繫終不得完管糧分守官巡歷所至比較將各該官吏量加撲責去則仍前玩慢不才有司又多聽受賄囑將姦頑大戶僉作部運又或將不堪人戶一槩僉解名雖起解多被侵留貿易營幹家業官司比併止將戶丁一二人或雇覔姦猾慣受刑責之人應點監打並不曽嚴加設法根據追究延頸跂足以俟赦恩夫以小民之脂膏而充姦人之囊槖深可痛恨儒者之論以恤民固本為先殊不知小民拖欠者固當優恤而姦人侵盜者豈可故縱故今之錢糧以十分為率官司收入者居其半小民拖欠者居其二而姦豪侵盜者恆居其三積歲既多一旦併徴則怨讟蝟興雖有能官不得安其位矣若因循不理則倉庫愈空每冦戎有警軍儲不足相顧駭愕仰給朝廷內帑有限何以為繼此弊天下皆然而陜西為甚夫七年之病三年之艾及今圗之猶或可及且政之興廢未始不存其人臣觀諸近事南京軍儲逋欠數多京倉空虛軍士久無月糧怨聲載道節該內外守備具奏戶部題準江浙湖廣等處布政司管糧官務要親自督運赴南京交納直待合省通完方許回任因是利害切身各官嚴督催納該運錢糧並無拖欠京倉有二三年之積人心以安此其明效及照比年以來司府州縣掌印管糧官拖欠錢糧應該住俸提問黜罰等項必有奏行事例臣廢退年久不能盡知伏望皇上軫念邊方事重邊儲至急乞勑戶部通查事干邊儲一應奏行賞罰事例與臣知會再行議擬立法如各州縣拖欠邊儲幾分以上掌印管糧官除提問外或降調黜革或起送别用布政司管糧官所屬拖欠至幾分以上住俸幾分以上參問并分守官坐視不理拖欠數多者亦要定擬罰治事例俱奏行吏部遇缺不與推升甚則奏請降黜明立條格請勑臣及巡撫官欽遵施行其各該官員有能精勤幹理督完錢糧數多者亦聽臣及撫按官指實奏保旌異擢用庶幾人心有所警勵邊計可以振興失之於前者猶可救之於後至於災傷之當蠲免貧民之當賑恤弛張緩急又在臨時酌量而行不敢以苛切病人不敢以掊尅取怨臣受命提督軍務因見邊儲缺乏方上乞討引鹽銀兩之疏而推原缺乏之由如此敢併言之伏惟聖明采納緣係處置拖欠邊儲事理未敢擅便為此具本順差舍人趙經親賫謹題請旨一為易置重鎮主將以保固邊方事題為易置重鎮主將以保固邊方事近據鎮守寧夏總兵官署都督僉事种勛呈為套中走回人口供報敵情事嘉靖四年四月十七日據河西下三墩夜不收黑舍收送河東套中走回婦女一口陳氏到鎮行據寧夏衛申審得陳氏供年六十二歲係靈州守禦千戶所百户王亨下土軍馬力長妻狀供嘉靖三年九月內在田生理被畨搶去使喚見得套內帳窠遍野人畜數多説待馬壯要來腹裏搶掠等因隨據本官亦呈前事嘉靖四年四月二十五日準分守東路地方右參將都指揮僉事劉謹手本開據寧夏後衛申據圎山兒墩夜不收墩保收送男子一名王巴圗爾供年一十六歲係榆林衛人見在寧塞營操備軍人王江男狀供正德十四年十月內在於門外打柴忽遇敵衆三十餘騎撲來搶去在營住過七年與搶我敵人蒙果勒牧放頭畜走失馬五匹慌懼尋馬望見墩臺偷馬一匹騎走一晝夜到墩在營時聽得敵衆説稱在套敵人一萬內有三箇頭兒一箇濟農一箇納延説要過河與黃毛敵人讐殺一箇阿克塔布哈説要先搶漢人等因節呈到臣案照先準兵部咨本部題為套中走回男子供報大敵入套整飭邊備以防敵患事該陜西延綏鎮巡等官各奏稱據走回人口供報敵衆入套數多題奉欽依備行到臣四月初旬臣到陜西地方行據延寧守臣節報沿邊一帶各有敵人近邊駐劄數雖不多竊恐伏藏套內故遣輕騎覘我有無備禦待草飽馬壯之時大舉入邊亦未可知今據种勛所呈走回人口供報之言與延綏守臣前項所奏敵情亦頗相合防禦不可不謹巳經節行各鎮將官各要嚴謹斥堠整兵秣馬用心隄備如果前敵拆墻入境即便會合大小將官協力勦逐飛報鄰境官軍發兵䇿應不許畏縮退避以致敵人擁衆深入貽患腹裏地方去後為照沿邊花馬池興武營靈州一帶正係大敵侵犯腹裏必由之地俱屬寧夏鎮巡管轄雖分守協同參遊守備等官各有信地然綱維約束調遣指示全在主將得人况寧夏地方屢經變故人情翻覆未安兵民雜處難於控制見在總兵官种勛先因失事被參近又與都御史張璿等奏發親藩事情未曾勘結事有掣肘人心不服號令難行夫以防邊要害重鎮而使懷疑懼罪之人久為主將緩急何所倚賴必得早為更易老成練達威名素著衆情協服者授以節鉞之任庶可圗安攘之功竊見提督漕運總兵官署都督僉事楊宏新任大同鎮守取回在京提督捕盜都督桂勇俱才兼文武志存忠孝一時將領號為出色中外士夫素所推許楊宏係陜西世臣熟間韜略往來各邊歷年滋久山川險易夷漢情俗無不周知桂勇先以武舉曽在寧夏軍門操練聽調置鐇反叛之時與仇鉞協謀討賊人望素歸如二臣者使為寧夏主將既可以防禦邊患亦足以鎮定人心伏望皇上軫念邊方重鎮主將關係非輕乞勑兵部議處如果臣言可采合無將种勛令其暫回原衛待勘報至日有無干礙伏俟聖裁仍以楊宏桂勇內上請簡用一員鎮守寧夏地方兵民幸甚或謂漕運重事不可無楊宏總理臣竊思近年漕規以漸修舉弊政多所釐革又新任總督御史參將俱號得人足堪付托非若寧夏武備久弛振舉為難但楊宏先任四川總兵又歷兩京坐營管理府事推任提督漕運巳經四年之上如蒙簡用乞為量進一階則效忠宣力之臣有所奮勵矣臣極知僣踰無所逃罪但念本以衷庸分甘廢退皇上起而用之誓當竭忠圗報茍有所見敢不盡言伏惟留神省覽臣不勝大願緣係易置重鎮主將以保固邊方事理未敢擅便為此具本專差承差趙瑶親賫謹題請旨一為增解額以疏人材以均政體事題為增解額以疏人材以均政體事據陜西等處提刑按察司提學副使唐龍呈前事切照朴棫之賢生於王國冠帶之士圜諸橋門陜西自昔稱多士焉後因三邊不靖三輔殽函之地干戈穴于門庭兵刃交于原野詩書煨燼賢獻逋逸自兹蒿焉寖不如古洪惟太祖髙皇帝遹承明命撫有疆宇開科取士爰定解額陜西惟六十五名視天下獨少焉蓋其時正當蹂躪之餘草創之始人材稀少殆所宜然邇年以來列聖右文聿崇培養之功皇上承德益闡作新之化以故地各有人人各思奮竒瑰之士往往見之狀元及第且再出矣嘉靖元年該職考試科舉衣冠彚集文藝肆陳彬彬乎與中州而並盛是年場屋遴選之精採拔之公極稱得人然而人材本多額數本少所收十之二三所遺十之六七固其勢也二年三年間歷加覆試比之元年日且有加如西安府在城三學可中者至五十人其餘學分多者十餘人少者五六人或二三人雖荒州僻邑亦未嘗無之但出雖無窮取則有限定額之外别無速化之理其老于牖下者亦籍籍也譬之山多材木工師之所求則有數矣卒致明堂之器困于蓬蒿之間豈不深可惜哉及照陜西府州縣學凡一百二十有五後又增置衛所學一十有六共一百四十有竒舉人額數止得六十五人合二學尚不勾一人是天下學校則莫如陜西之多舉人之數則莫如陜西之少政之不均無過于斯大抵立法定制盈縮因乎時廣狹隨乎地古今之通義也是故陜西人材初年未盛則解額不得不加少于今盛矣又不得不加多蓋以時損益之道焉况列郡諸邊延袤數千餘里學校一百四十餘處岐周豐鎬遺澤洋洋金城朔方風教遐被量地增加尤不可緩夫為國惜材天下公情以人事君當今急務乞特為奏請俯念人材可惜政體當均將陜西舉人之數查照河南山東布政司定額斟酌增加至八十名或七十五名庶幾野鮮遺棄之材國無偏枯之典矣除具呈撫按衙門奏請外理合呈乞照詳施行等因具呈到臣切惟我國家稽古定制設立科目以網羅天下之賢才兩京十三省鄉試舉人近年以來俱有額數求才之廣擇才之精斟酌損益至為詳備切見陜西所屬八府二十州九十五縣又有寧夏榆林洮岷靖邊等衛直𨽻潼關衛及陜西行都司所轄各衛通計學校一百四十有餘東西綿亘三千餘里南北亦不減二千餘里山川雄秀靈氣所産宜多豪傑况當重熙纍洽之餘士生其間沭浴神化咸思自奮列聖相承皆以人文化成天下仰惟皇上以大聖人君臨大寶首幸太學崇重文教風聲所動士類勃興人才之出日新月盛臣於𢎞治年間叨任陜西提學七年之上經歷鄉試壬子乙卯戊午三科查得舉人解額洪武十七年四十一名二十三年五十五名永樂十五年一百五十五名十八年一百三十七名二十一年如十五年之數宣德元年至正統三年俱三十名六年至十三年俱四十名景泰元年開科取一百五名其後始如山西布政司所取舉人俱六十五名至今以為定額切緣山西布政司所轄止是三府五州其地方廣狹人材多寡似難相同且陜西三十年前止是西安鳳翔附近府縣人材衆多其餘僻逺州縣多無舉人近年以來所在人知向學遐州僻邑之士往往聮名掇科至於邊境衛所科名亦多不乏臣曩時聞之每科鄉試等官言場屋所取自六十五名之外三場平通宜在取列者不下百十餘卷拘於定額不敢多取亦嘗具呈撫按等官會本具奏未蒙施行厥後十年之內兩得狀元及第此其明驗今人材之盛比臣提學之時又復加倍而額數六十五名仍舊不增以一定之解額待倍加之人材士子窮年苦學無由階身未免有遺才之歎誠如副使唐龍所言近該巡撫巡按等官會本具奏乞增解額蓋皆親至地方目覩其盛不敢不言臣又查得雲貴二省鄉試舉人先年定額止三十名後因人材漸盛節該鎮巡等官具奏該禮部會議奏準今已增添至五十五名况陜西係中原重地人材數倍雲貴揆之人情事體亦宜照例增加若謂制額巳定難再更張臣竊以為我祖宗成規大法百世不易至於文章制度小過不及之間不能不因時與地少有變通古之聖賢所以能盡天下之才成天下之務者率由是道故舉人解額先朝屢有增減百年之後始著為今額我孝宗皇帝又納守臣之言增雲貴之額者正以此也如蒙準奏伏乞聖慈𢎞大明普照之仁廣玄造曲成之念乞勑該部查照近日陜西撫按官所奏參詳議處合無將陜西鄉試舉人解額比照河南額數增加至八十名照山東增至七十五名以拔遺逸之才以廣用賢之路斯文幸甚地方幸甚臣受命職專軍旅非敢出位而言但念文教武衛事體相須且嘗提學陜西年久恩義相關不能自默緣係增解額以疏人材以均政體事理未敢擅便為此具本順差承差趙瑶親賫謹題請旨一為急缺都司掌印僉書官員事題為急缺都司掌印僉書官員事臣受命提督軍務四月間到於陜西鎮城閲視得城垣坍塌樓櫓破壞旗幟不張什物不整既而閲視城操及備冬放回人馬軍裝事事不備馬匹大半瘦損管軍官員以科斂為得䇿視武備為故事縱容官旗并識字人役侵尅糧賞私役買間已發者見今追問未發者不可枚舉竊歎鎮城為三邊根本之地而廢弛至此詢其所以蓋鎮守主將近例專在固原駐劄綱維約束全在陜西都司奈何本司掌印僉書久不得人去年雖蒙銓注署都指揮僉事汪麟軍政掌印本官處邊塞之任則可觀當方面之寄則不稱行事疏略以致下人玩慢近又奏稱痼疾不能任事見在行勘且以方面掌印官員徒取充位展轉勘報愈加廢事及照本司例該僉書官二員今止有署都指揮僉事張鎬一員在任外一員久未銓補臣博訪得見任寧夏遊擊將軍都指揮僉事周倫心知向上官能自守衝鋒破敵非其所長而正已率人乃其自許使之掌管都司印信必能修舉廢墜禁革姦弊及又訪得西安前衛帶銜署都指揮僉事夏欽先任延綏遊擊因病告回間住今病痊可本官曉暢軍情熟諳事體堪以佐理僉書臣稽之衆論如此伏望聖明裁處乞勑兵部再行查訪合無將周倫銓注陜西都司軍政掌印夏欽僉書管事汪麟令其回還原衛調治病疾待病痊另行委用及照見今地方多事寧夏遊擊將軍合無於陜西延綏寧夏三鎮見在守備把總等官內推選英鋭驍勇慣經戰陳之人庶幾各邊調遣可得其用周倫務令交代方許離任如此則鎮城邊境兩得其人居中制外俱無所失實為便益緣係急缺都司掌印僉書官員事理未敢擅便為此具本順差承差趙瑶親賫謹題請旨一為調度邊兵預防敵患事題為調度邊兵預防敵患事臣奉勑提督陜西三邊等處軍務欽遵起程前來四月初一日到於陜西地方當即通行鎮守陜西署都督鄭卿鎮守延綏總兵官彭楧鎮守寧夏總兵官种勛各轉行各該副參遊擊守備等官速差的當夜不收分投訪探套衆二三月間曾否過河出套若是仍前在套務見數目多寡帳窠逺近事情緩急明白回報去後續訪得花馬池等處各有傳報煙火各該將官不見呈報又經差官賫牌前去寧夏遊擊將軍周倫中路參將苗鑾靈州守備沙金處并行該鎮主副總兵參將協同等官速查套內有無傳接煙火仍各嚴謹斥堠如法操練人馬多差人役逺為哨探如遇有警即便互相傳報協同截剿不許時刻怠慢重則飛報軍門以憑發兵䇿應仍將查過緣由回報本月十四日據鎮守陜西署都督鄭卿呈開自報大敵入套之後沿邊地方一向烽火少傳續該鎮守延綏總兵官彭楧咨稱套人每遣輕騎分犯嚮水等堡三十餘次節該按伏把總等官追逐出邊及據套中走回男子焦買則供報在套聽得衆敵人説稱黃河那邊無草要在套裏過夏即今二月初旬驚蟄已過顯有住套之機又該鎮守寧夏總兵官种勛咨稱自正月以來敵人衆寡不等拆邊進口乘氷未解越過河東近日西路收獲邊外馬牛必是遺寇盤據山後况東路地方哨報河套以內或百或十在於地名二沙子等處往來行走雖見煙火但未審大營住套逺近消息亦難憑據緣由節行前來又準延綏總兵官彭楧咨稱自報黃河開消之後節據榆林等城堡迭報敵衆多寡不一分犯各該地方雖該按伏兵馬逐退即今在於境外燒熰號煙營盤火光晝夜不絶敵衆在套已是顯著近據套中走回男子郝天喜等供報在套時聽得衆敵人説黃河開了不過去要在套過夏等語又該黃甫川差哨夜不收張傑等供報三月初六日哨至地名亂峯子等處俱有敵衆牛羊馬匹大敵在彼住牧瞭見黃河開消就彼旋回等情備由呈報案候間準巡撫陜西右副都御史王藎揭帖為申明舊例請勑各邊守臣防禦敵患及早差官整理軍餉以安地方事內開會同鎮守等官議照延寧所屬花馬池定邊營一帶地方接連河套地形寬漫大敵在套垂涎關隴深入搶掠必由此入先年三邊兵馬強勝敵雖在套住牧然尚畏我兵威出沒搶掠亦止於近邊去處不能侵犯腹裏自𢎞治十四年延寧兵馬不能阻遏遂深入腹裏聽其獲利而歸貪利無厭自是每歲入套必深入腹裏正德十三年搶平鞏一帶嘉靖元年搶邠涇一帶俱由各邊兵馬自取便利不肯阻遏之過也查得節管卷內該前巡撫都御史王珝因寧夏地方報有聲息照例會行該鎮移兵於韋州紅寺等營堡駐劄併力防禦該鎮官員不肯發一兵前來止以虛文抵阻未久該鎮亦不免於失事此亦自分彼此不肯應援之過也見今敵人住套號稱八萬有餘近雖差人探報俱於迤東近河住牧通不露形今青草漸茂馬臕將壯敵情叵測旦夕大舉入攻亦未可知乞勑延寧陜西甘肅各邊鎮巡等官早為防禦除具題外開具揭帖到臣為照延綏定邊營寧夏花馬池興武營靈州一帶地方委係大敵侵犯腹裏之門戶前項地方守臣若能捍禦則固原靖邊迤南俱係腹裏可以無患因是沿邊武備不修兵威不振以致套人掏穵邊墻長驅而入其所利不在延寧而在腹裏固靖安會靜隆等州縣俱被搶掠近年又越過平涼蹂踐邠涇等處地界藩籬不固禍及堂室誠如陜西鎮巡等官所言延寧守臣每以本處不曽失事為辭不知朝廷竭腹裏軍民之財力以供三邊令其幹理何事况各鎮互相應援不許自分彼此屢有勑旨及奏行事例今套內既稱有敵雖云不露形迹恐其竊伏深藏待後青草長茂馬匹臕壯之日難保其不大舉入攻防禦之計不可不謹但沿邊一帶地里寬漫平衍便於馳驟各守臣兵馬寡少豈能遏其初來之鋒必須徴調鄰境精兵會合截剿乃克有濟已經行仰各鎮總兵官彭楧种勛鄭卿查照原行差人哨探套衆多寡逺近先行回報仍照節行事例互相䇿應如果套內敵衆行令遊擊將軍張鳳統領遊兵於花馬池營住劄遊擊將軍劉淵統領遊兵於定邊營住劄副總兵趙楧統領竒兵暫於寧塞營住劄若哨探前敵有西行之勢遊兵二枝俱於花馬池副總兵趙楧移於定邊營各住劄量分人馬於安定栁楊等附近城堡寧夏副總兵劉玉統領竒兵於興武營遊擊將軍周倫參將苗鑾於紅寺兒堡韋州鹽池石溝等處住劄總兵官种勛待有的確警報統領正兵於靈州駐劄與各該守備等官各按兵秣馬鋒利器械以逸待勞仍要嚴謹斥堠多差夜不收逺為按哨沿途多設塘馬但有煙塵消息即便傳塘走報鄰境官兵隄備敵果近邊各分據要害占守水頭從宜阻遏敵小至則取便擊之如其大至即便會合各枝人馬相機截殺不許逗遛畏縮失誤事機亦不得輕率寡謀墮其姦計如果大舉深入陜西鎮巡徴調即便刻期赴援不許觀望推託陜西遊擊及主將兵馬待巡歷固原審勢分布另行外本年五月十一等日節據延綏總兵官彭楧呈一件為瞭見境外敵人事一件為聲息事一件為查探聲息事及據寧夏總兵官种勛呈為聲息事各備將本鎮各路敵人近邊緣由具呈到臣看得節次呈文內開本鎮地方東路則雙山柏林髙家神木等堡東路則榆林鎮城嚮水波羅等堡西路則寧塞新安邊三山等堡各有敵衆近邊或三五十人或七八十人營壘火光帳窠煙塵處處有之而東路為多及寧夏安定堡等處兩次被敵拆墻入境亦不過百十餘騎各該官員雖稱出兵追逐對敵並無斬殺之功延綏被敵將軍餘男婦王久住等六名口撲捉及將軍旗夜不收雷五兒等三名射傷身死內髙家堡失事尤甚及寧夏安定堡等處節被敵衆將夜不收麻伏等三名射死軍人楊阿伴等七名射傷及將軍人易寬捉去顯是各官平時失於設備遇警不能奮勇效力怯懦之狀昭然可知據其所呈如此中間隱匿不報情弊難保必無緣今正在用人之際合待邊方寧息通查功過具奏定奪及照即今五月將終套人多寡尚無的據參詳各鎮所呈節據各堡夜不收爪探套內敵衆新行蹤迹多至二三百道少則百十餘道或自西而東又或自東而西其數亦必不少及寧夏走回男子王巴圗爾供稱在套敵衆一萬內有三箇頭兒一箇濟農一箇納延説要過黃河與黃毛敵人讐殺一箇阿克塔布哈説要先搶漢人等情緣今黃河開消已久要搶漢人之言或恐是真竊料此敵頻年得利不曽遭銼必無懲戒今雖不露大衆形迹夏秋之間乘機大舉入攻不可不防又經行仰總兵官鄭卿彭楧种勛等轉行副參遊擊把總坐堡守備兵備等官各要加意防範嚴謹斥堠整槊兵馬申明紀律遇有警報即便督軍相機截剿飛報鄰境官軍互相䇿應若果擁衆向西切近定邊營花馬池境外必有深入之意延寧竒遊等兵照依原行按伏聽調不許自分彼此陕西主將督令守備等官各領兵駐劄要害地方防禦臣於固原慶陽居中調度外緣係傳報套人聲息調度邊兵預防寇患事為此具本專差千戶陳䇿親賫謹具題知一為擢用繁難府分正官以從民便事題為擢用繁難府分正官以從民便事照得陜西平涼府所屬三州七縣版籍僅一百二十八里田糧至一十六萬二百有餘額設驛傳二十處地薄糧重民少差多田無豐厚之獲歲多霜雹之災逃移者無顧戀而不歸見在者坐包陪而益困內而宗室繁衍歲增祭葬壙價不下千百餘兩外而節次邊疆蹂躪劫殺人口搶掠頭畜殆盡舉目蕭然加以番夷雜處盜賊不時竊發敵衆在套饋運勢不容緩臣觀天下郡縣地方雕敝民生困苦未有甚於此也其府州縣正官必得精敏強幹之人乃克有濟近年銓選官員因見時勢難為或到任未久而求去或中途託疾而不來或憂憤成疾而物故或告辭不允而逃歸其在任者不過延捱日月茍圗糊口上司比較錢糧俯首受責一聞考察黜退欣然而往夫人之情既入仕途豈不思久任以規取利名哉蓋亦有甚不獲巳焉者矣今本府佐二及州縣正佐缺官甚多除另行具奏外而知府乃一郡之領袖尤在得人查得本府自知府安惟學陳逵之後未有歷任至三四年者非改調則黜退近日知府孫聰到任未及一年又以養親告回致令百務廢弛拖欠積年邊糧一十七萬有餘官吏師生廪糧經年不得支給所轄驛傳馬驢夫逃亡大半傳舍幾空使客經過或致稽延纍日臣受命提督邊務錢糧重事因無正官難以責成聞升有知府竇明未知何日到任臣切謂此等知府必得曽歷邊方習險難耐勞苦者超常格而用之庶肯勉修職業若照常例推升未曽到任先已灰心安能望其舉職竇明雖有才能曽任京堂未歷艱苦用之腹裏固有餘裕處之斯地恐亦難堪節據平涼縣里老耆民魏慶蒙釗等平涼府縣廪增附學生員李文縉謝經等及致仕省祭等官連名告保本府同知任守德剛介自守不為勢利所怵欲將本官奏請升任知府小民得安等情臣因詢問本官民情邊務隨事應答俱有條理及查本官係山西靈石縣人歷任河南獲嘉縣保定清苑縣推升山東東平州知州任內節經巡撫等官保舉及又博訪得慶陽府寧州知州王暘由進士歷任今官寧州廢弛已久本官蒞事以來政務以漸修舉吏民畏服此二官者委的精勤強幹堪宰煩劇且年勞俱深亦堪擢用乞勑吏部再為訪議合無將新任知府竇明改任腹裏地方仍於任守德王暘二人內擇用一員升任平涼府知府則人才器使不至於枉用小民稱便得藉以聊生不勝幸甚緣係擢用繁難府分正官以從民便事理未敢擅便為此具本謹題請旨一為哨報回賊聲息事題為哨報回賊聲息事嘉靖四年五月十四日準巡撫甘肅地方都察院右僉都御史寇天敘咨照得本職於本年四月二十九日到於莊浪地方準分守副總兵都督同知魯經手本準平羌將軍鎮守甘肅地方總兵官署都督僉事薑奭開稱嘉靖四年四月二十四日卯時據甘州差哨古佛寺夜不收段興三報稱蒙差本役同陳驢兒前去古佛寺哨探四月二十一日行至孤山河撞遇回賊將本役捉綁到於雪打班見了回賊頭目將我用鐵繩拴絆見得營內回賊約有五百餘騎夜晚乘賊睡熟脫逃來報據此案查先節準肅州參將雲冒手本為屬番斬獲回賊首級事又為屬番傳報敵情聲息事已經通行各城哨探隄備去後今據前因會同鎮守甘肅太監董文忠巡撫都御史陳九疇協守甘州左副總兵趙鎮議得所報前賊從肅州境外移來我邊山後雪打班住劄捉我差哨人役問我兵力虛實謀為入冦旦夕莫測防範機宜不可不備查得鎮城兵馬除各堡按伏傳塘等項外見在者不多若不預為調集兵馬併力剿殺誠恐入寇為患未便合將遊擊所部兵馬二千通調併力剿殺庶克有濟及將各城精選過堪征兵馬整搠齊備各該將領守備等官親詣聽候調用及選差夜不收絡繹前去迤南通透雪打班賊路哨探擬合通行隄備等因備行到職看係哨報聲息事理除行各城分守副參遊擊守備等官整槊兵馬聽候調用及行甘肅鎮守衙門議處隄備本職星夜兼程赴鎮外緣係哨報聲息事理合咨前去煩請議處施行等因到臣案查先為訪探賊情事本年四月內臣在西安府永夀縣據甘州左衛冠帶舍人丁源經過投見稟稱甘州鎮巡三堂審據屬番頭目普兒咱等族頭目哈卜等告遞番文供説回賊要在本年五月內復來侵擾蒙三堂差源賫本赴京奏報等因據此為照西域回賊去冬深入甘州地方圍困城堡節被官軍勦逐遁回終是不曽大遭銼衄再舉入冦之謀難保必無未據彼處鎮巡明文未知的否緣由已經帖仰分守涼州副總兵周尚文即行甘肅鎮巡衙門轉行副參遊擊等官若果前賊侵犯各要慎守封疆嚴謹斥堠整槊人馬加謹隄備多差的當人役各逺為哨探果有侵犯消息率領精兵相機戰守徴調鄰境官軍協力剿逐不許退避畏縮失誤事機亦毋得輕率寡謀墮賊姦計先將訪探緣由賫報去後今準前因看得咨開夜不收段興三等供報前項賊情與前舍人丁源口傳之言大略相近顯是回賊貪心無厭姦謀未已若果止是五百餘騎彼處將官必能追殺但恐是打探先鋒後賊源源而來大舉深入亦未可知在我防禦不可不謹又經咨行巡撫甘肅右僉都御史寇天敘會同鎮守太監總兵轉行副參遊擊兵備守備等官務再差人逺為哨探整備軍火器械儧餧馬臕申明紀律果有回賊侵犯會合大小將官協力剿逐飛報鄰境城堡及鎮巡衙門發兵䇿應如是賊情重大差人星馳賫報軍門以憑施行及咨巡撫陜西右副都御史王藎行陜西布政司將該解甘肅一鎮各項糧銀逐一查取委官一員作急解發該鎮糴買糧料草束應用仍行彼處分守守備副參等官各差撥官軍照程護送去後除待查報賊情緩急及調兵防禦等項事宜另行具奏外緣係哨探回賊聲息事理為此具本專差承差杜廷選親賫謹具題知關中奏議卷十一
