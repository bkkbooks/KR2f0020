  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2f0020_WYG_002-1a, image: WYG0428/WYG0428-0030a.png}
body:
  text: 關中奏議卷二明楊一清撰馬政類一為正卿寺體統以修邦政事吏部等衙門尚書等官兼太子太師馬文升等題該本部題考功清吏司案呈奉本部送吏科抄出督理馬政都察院左副都御史楊題比者伏䝉皇上采納廷議以方面之賢推升行太僕寺苑馬寺卿少卿等官各推二人具名上請簡用待有成績照依兩京太僕寺官升擢誠前此未有之盛典也夫當改絃易轍之初膺簡賢拔能之命為各官者宜思自效臣因見各寺在前權任輕微人人得而侮之今雖奉有新例恐各該衙門官員習耳目之聞見計勢分之炎凉仍前輕忽沮撓巳經行令今後陜西各府衛州縣官與行太僕寺苑馬寺卿少卿等官相見相臨各要以兩京太僕寺及布按二司官體統相待不許與之抗禮布按二司官與兩寺官往來照例迭為賔主其班次兩寺卿在布政使按察使之下參政副使之上少卿在參政副使之下參議僉事之上通行外近該山西行太僕寺卿王琰等為因山西府州等官禮貌輕忽體統乖違難以行事查照臣陜西所行事理具奏該兵部覆奏合無通行巡撫山西甘肅遼東都御史并巡按監察御史轉行各該司府衛所大小衙門知㑹今後苑馬寺行太僕寺卿佐等官與都布按三司往來俱要迭為賔主班次坐立之序循例而行府衛州縣官員相見相臨各要以兩京太僕寺官體統相待不許輕視抗禮等因奏奉欽依是苑馬寺行太僕寺官行事體統俱照兩京太僕寺例司府衛所等衙門不許輕視沮撓欽此欽遵明命赫臨人心踴躍體勢增重耳目一新臣猶慮往時兩寺官體統與二司輕重實相懸絶而兩京太僕寺與二司官體統又復不同若遵新例兩寺官之自待與人所以待之者皆當頓改然非擬為定規著之明令將來遵承不一紊亂僣踰之弊難保必無且禮莫大於分分莫大於名名實相須未有不修其實而能副其名者夫衙門以寺為名官以卿少卿為名謂之京職明矣若凖兩京太僕寺體統以京官待之則班次坐立皆當在都布按三司之上往來則迭為賔主入朝則陛見陛辭考滿則吏部特引恩典則誥勑廕子庶幾實稱其名儻以其衙門開設在外雖凖內寺行事未得全與京堂為比則當待以方面之禮入朝則陛見陛辭考滿朝覲宜從布按二司官之列班序則如臣所擬卿當在參政副使之上少卿在參議僉事之上寺丞當在僉事之下不可令與知府為伍任內被旌舉者三年考滿得與誥敕如是較之舊時固已加重而於京寺體統尚有不同臣又查得先該陜西苑馬寺等衙門卿等官李克恭等奏稱陜西行太僕寺苑馬寺每遇巡撫巡按行取考語俱付之布按二司巡守官員而巡守官又付諸知府以此人多輕視官無光彩且臣監苑屬官臣反不能知其賢否而謂知府能知豈不差謬又如朝覲考察初必以此等衙門不多因而附諸布政司簿內以後因循遂或詢之二司官員此職非二司屬官乃以黜陟之權付之似亦未善乞行巡撫巡按官員今後逐年考語本衙門屬官必須臣等詢察賢否明白填注不必付諸巡守等官至於朝覲考察亦令臣等與山西遼東甘肅行太僕寺苑馬寺六衙門共立考察簿籍一扇吏部都察院參以巡撫巡按考語公同嚴加考察等因該吏部覆題通行各處逐年考語除該寺堂上官賢否止須巡撫巡按衙門開報不必由分巡分守等官主簿以下照舊施行其考察簿籍已有舊例不必變更若遇朝覲之年考察各寺屬官布按二司同本寺堂上官答應等因具題節該奉欽依是今後考察行太僕寺苑馬寺官不必㑹同布按二司欽此欽遵臣仰惟皇上日月之明洞燭幽隱深知積習之弊不將兩寺考察之柄付之兩司但監苑屬官賢否考語仍聼巡守等官開報兩寺堂上官賢否必由巡撫巡按考察斯固精嚴考課之法查得臣節該欽奉勑諭巡撫巡按等衙門不得干預爾職寺監官員惟爾所統不許各衙門凌轄欽此欽遵臣切惟巡撫巡按之職固無所不當問然官員賢否必親見其行事而後能知各該司府州縣衛所等衙門其於撫按無官不歸其管攝無事不聼其裁制能否易分旌别自當若兩寺監苑已有明命職事既不得干預官員又非其統轄今欲開報考語巡撫巡按難以臆度未免詢之二司二司亦不能知未免詢之知府中間是非或得之傳聞毁譽或生於愛惡一被考黜格於禁例不復敢辨他日必有隂受其害者近據陜西行太僕寺呈承准陜西布政司照㑹抄䝉陜西巡撫衙門案驗行令分巡分守知府查取兩寺監苑等官考語開報則是未免仍蹈舊轍况近例兩寺卿少卿俱由方面官有才望者推補彼為方面之時既能考察千百屬官及為兩寺豈有不能旌别十數屬官之理何必付之分巡分守官員且陜西既有專官督理馬政陛下不以臣愚不肖簡命而來則兩寺堂上官賢否臣知之宜審似亦不須巡撫等官考察及照各寺寺丞先是以其為在外六品官法司皆得徑提臣謂寺丞品秩雖輕係卿寺堂上官今既以兩京太僕寺官相待似亦不當徑自提問凡若此者皆體統所關名分所係輕重之機實懸於此當此作新之初一切釐正則不令而人自從不言而人自信臣所謂修其實以副其名者此也若因循舊規無所更改則雖日號於人曰吾今得准內寺體統與京堂無異誰其信之臣受命提督各官行事臣如不言誰為言者伏望聖明俯念邦政至重救弊為急乞勑吏部㑹同禮兵二部議處今後陜西山西遼東甘肅各行太僕寺苑馬寺卿佐等官赴京考滿朝覲一切禮儀班序恩典合無照依兩京太僕寺堂上官事例惟復止照布按二司官例擬議通行遵守以杜將來紊亂僣踰之弊仍乞將各寺卿少卿寺丞賢否考語陜西俱止聼臣開報吏部都察院以憑黜陟不必巡撫巡按干預若巡撫巡按訪知各官中果有貪婪不肖怠政誤事自當指實奏劾明正法典山西遼東甘肅等處仍止聼巡撫巡按開報不必布按二司干預其首領官屬官賢否止憑堂上官填注朝覲考察之際亦止憑堂上官應答俱不必詢之二司官員再乞俯從陜西苑馬寺等衙門前次所奏將陜西山西遼東甘肅共立考察簿籍一扇不必附之各布政司簿內庶得事體歸一各寺寺丞乞照京官事例凡有違犯參奏拏問不許徑提體統既明名分既正則人知激勸職業可舉如此則馬政不興實效不著黜罰之加將安所辭哉等因具本該通政使司官奏奉聖㫖該部看了來說欽此欽遵抄出送司案呈到部看得督理馬政都察院左副都御史楊題稱前因係𨽻本部及禮兵二部掌行合無照依本官所奏㑹同各該衙門議處明白另行奏請定奪等因具題聖㫖是你每還㑹議明白來說欽此欽遵臣等㑹同禮部尚書張升兵部尚書劉大夏等議得陜西山西甘肅遼東行太僕寺洪武年間開設専一印烙并追補本處官軍騎操馬匹其責甚重經今一百二十餘年遼東陜西苑馬寺永樂年間開設専一牧養茶易西蕃并買到朵顔等及海西夷人馬匹其任不輕經今九十餘年其衙門既稱陜西山西遼東甘肅係在外衙門不言可知雖有卿寺之名亦難盡比在京卿寺官行事今督理馬政都御史楊因見各官權任輕微馬政廢弛通照本官所擬定行太僕寺苑馬寺卿李克恭王琰等前後所奏并吏兵二部節次題奉欽依兩寺官行事體統乞要擬為定規著之明令將來遵承以免紊亂僣踰之弊又於例外事體所關名分所係者通行擬定上請大意欲激勵各官以興舉廢墜深為有見合無准其所奏兩寺官行御史中門正道皆如兩司官體統與兩寺卿少卿往來迭為賔主東西對坐若公差到京照依布按二司例許令陛見陛辭朝覲考滿悉依舊例而行其兩寺堂上官員任陜西者賢否皆從督理馬政都御史填注開報巡撫巡按官通不干預在山西遼東甘肅者賢否皆從撫按官填注開報兩司官通不干預其兩寺屬官賢否通從堂上官填注開報兩司官亦不得干預若中間果有不職貪婪聼撫按官具奏黜罷三年朝覲之時本部將陜西山西遼東甘肅各行太僕寺苑馬寺屬官共立考察簿一扇更不附之各布政司之下考察兩寺首領屬官之際止憑兩寺堂上官答應更不必詢之兩司官其寺丞雖係在外五品以下官員今既與兩司頡頏若有所犯按察司不許徑自提問係陜西者呈行督理馬政都御史係遼東山西甘肅者呈行巡撫官徑自提問各寺堂上官若任內曾䝉推舉者三年考滿一體給與誥勑本部仍類行陜西山西遼東甘肅等處巡撫巡按官轉行各屬永為定例不許沮撓紊亂如此則寺官體統大增重於常時馬政修明必增倍於舊日矣臣等又惟政務修舉固係於官之輕重尤係於人之賢否必兼有之而後能集其事難獨恃此而輒能有功其兩寺官既仰承增重之典亦宜思自重之道如果孳牧蕃息馬政修舉本部臨時斟酌相應員缺以憑上請升用不拘常例緣係議處正卿寺體統以修邦政及節奉欽依該部看了來說你每還㑹議明白來說事理未敢擅便𢎞治十七年十一月初十日吏部等衙門少師兼太子太師尚書等官馬文升等具題本月十二日奉聖㫖是兩寺官員體統都准議行永為定例各官果有政務修舉功績顯著的你每斟酌推舉升用不必拘定常例欽此欽遵擬合通行除外移咨前去照依題奉欽依內事理轉行陜西山西遼東甘肅各行太僕寺苑馬寺一體欽遵施行等因准此除外合就移咨前去煩為欽遵施行一為議處茶馬以便官軍給領事兵部覆車駕司呈奉本部送於兵科抄出督理馬政都察院左副都御史楊題行據陜西等處提刑按察司等衙門副使等官蕭翀等呈㑹同本司分巡西寧道僉事曹玉守備西寧地方都指揮同知徐亷議得西寧洮河三衛每年茶易馬匹例該甘肅延綏寧夏三邊各輪一年前去關領騎操因未論及道里逺近事多不便若將西寧馬匹専給甘肅洮河二衛專給延綏寧夏又似不論馬數多寡誠有不均合無將西寧每年所易茶馬量存一半遞年給與甘肅等處領養外存一半與洮河馬匹行令延寧二處輪年領回騎操如此則便於道途宜於風土人情頗順經久可行等因具呈到臣案照先據整飭西寧兵備陜西按察司副使蕭翀呈據西寧衛經厯司申呈准本衛照㑹照得本衛原設茶馬司遞年招畨易馬其騍馬解送陜西苑馬寺孳養兒扇馬匹給發甘肅寧夏延綏缺馬官軍騎操但常例易換畨馬暫給本衛步操軍士餧養奈何經年屢月官軍不肯前來給領倒死者負纍賠買况本衛地方僻在西北極邊天寒地冷霜雪早降畨人所産馬匹比與腹裏不同若使寧夏延綏官軍領養一則道路窵逺運送艱難一則馬匹不服水土生發㿋癩多致倒死無益官軍其洮河地方馬匹若令甘肅衛所官軍給領逺隔黃河甚為不便合無今後本衛畨人中納兒扇馬匹行令甘肅等衛所官軍以近就近領養及將洮河二茶馬司所易馬匹就近行令寧夏延綏缺馬官軍給領騎操庶使官軍兩便馬匹不致虧損纍及軍士等因備申到司據此照得西寧地方委的極邊天道嚴寒所易馬匹若給腹裏官軍領養實是水土不服倒死數多無濟於用若使寧夏延綏官軍給領洮河茶馬非但風土相宜又且地里相近似為便益呈乞照詳定示等因到臣查得陜西茶易馬匹已有先年兵部題准議定三邊輪年關領事例今呈要將西寧茶馬聽近邊甘肅等衛所官軍給領洮河馬匹行令寧夏延綏官軍給領一節緣三衛所易馬數多寡不同若依所擬則甘肅太多延綏似少恐有不均其稱運送艱難水土不服及寄養負纍軍士誠有此患已經劄付本官㑹同分巡西寧道僉事曹玉守備西寧地方都指揮同知徐亷查議務求長久利便之䇿㑹呈前來以憑奏請定奪去後今據前因查得先該巡撫延綏都御史劉忠奏稱洮河等衛茶易馬匹遞年俱被附近腹裏衛分官軍就彼領養騎操以致本邊缺馬等因該兵部於𢎞治六年題准自𢎞治七年寧夏為始八年甘肅九年延綏各照年分量帶軍人齎册關領巳經通行年久頗濟邉用之急亦無不均之弊但西寧衛係甘肅鎮巡管轄僻在河西相離延綏寧夏俱四十餘站官馬所過必用草料供給人夫牽送沿途驛遞疲敝創殘之餘往往失誤應付以致馬匹瘦損倒失數多經曰犬馬非其土性不畜西羌之馬畜之東北風土異宜多生㿋癩傳染死傷不得實用而甘肅官軍乃舍本鎮馬匹三年一次逺涉河東於洮河二衛領馬道途亦多跋涉水土復不相宜以此各鎮領馬官軍遞年來遲易過茶馬未兔暫發三衛領養纍及軍士不止西寧衛為然且往歲茶易除騍馬外兒扇馬不過數百匹猶可支持今年仰仗天威羌人效誠逺近畢至臣五月在河州六月在西寧親閲畨馬錦雲輻輳計其所易當有數千以後年分雖不必盡如今年亦終不止如往年之數若不因時變通稍更舊格恐將來寄養之纍輸運之難人將有不能堪命者矣然西寧易馬數多河州略少洮州尤少若如該衛所呈要將西寧茶馬每年全給甘肅一鎮不無過多其洮河二衛所易馬匹恐又不敷延寧二邊册給之數及照陜西固原靖邊環慶等處亦係沿邊重鎮其腹裏衛所有馬官軍多在各邊備禦先年茶馬被近衛官軍一槩領去以致延綏巡撫論奏但近例俱給延寧甘肅三鎮而陜西衛所邊堡全不霑惠亦恐未均合無量依副使蕭翀等所擬自𢎞治十八年為始除騍馬解送陜西苑馬寺孳牧外西寧茶易兒扇馬每年將一半聼甘肅鎮巡衙門羞撥官軍齎册就近關領給與河西衛分應給馬匹官軍領養騎征延寧二鎮照舊輪年十八年延綏十九年寧夏以後各照年分輪流關領先儘河州洮州二衛馬匹給與如有不敷聼於西寧衛馬內輳給餘剩之數仍解陜西苑馬寺暫發各苑軍人牧養以備陜西衛所邊堡缺馬官軍領給騎操中間分撥𣲖給事宜仍聼臣隨時斟酌通融處置如此則道途稍便風土稍宜甘肅一鎮為利甚博延寧二邊初無所損而輸送之勞倒傷之患亦可以省其半矣先民之言曰能寬一分人受一分之賜臣所見如此伏惟聖明鍳納乞下該部參詳可否覆奏行之地方幸甚臣愚幸甚等因具本該通政使司官奏奉聖㫖該部知道欽此欽遵抄出送司查得洮河西寧三處茶易馬匹先該本部奏准甘肅延綏寧夏三鎮輪年關給與軍騎操近該延綏鎮巡等官奏稱馬災倒死數多本部又經議行督理馬政都御史楊將本年所易洮河等處茶馬堪以給軍者不拘二千三千盡數給與騎操行間今該前因案呈到部參照西寧等處茶易馬匹甘肅延寧三鎮輪年關給雖有本部奏行定例緣甘肅切近西寧延寧便於洮河况馬有多寡風土異宜今都御史楊奏要變通前例將西寧之馬每年减半以給甘肅洮河之馬輪年輳數以給延寧揆之事體委的便利且欲將餘數聼給陜西以均實惠經國之計可謂周悉相應准其所奏合無本部仍行都御史楊查照近日本部題奉欽依事理將本年所易洮河馬匹盡數給與延綏仍斟酌將西寧茶馬補足原擬之數以備北方入套之謀以後年分悉依所擬通融均派甘肅一鎮每年减半關給西寧馬匹寧延二處輪年關領洮河茶馬并西寧一半之數自十八年寧夏為始十九年仍該延綏若有西寧餘剩馬匹仍發各苑寄養以備陜西固靖等處關給中間酌量𣲖發及在彼在路一應禁防事宜悉聼楊裁處本部仍行各該鎮巡等官務照今定年分委官齎册依期關領不許遲違貽纍附近衛所寄養賠補關領完日各將關過馬匹數目毛齒并領養官軍姓名造册奏繳仍造青册一本送部查考緣係斟酌定擬各邊關領茶馬及奉欽依該部知道事理未敢擅便𢎞治十七年八月二十四日本部尚書劉大夏等具題本月二十六日奉聖㫖是𣲖發馬匹并防禁事宜著楊一清酌量處置務要停當欽此欽遵擬合通行除外合咨前去煩照本部題奉欽依內事理欽遵施行一為禁約侵占牧馬草場事兵部覆該本部送於兵科抄出督理馬政都察院左副都御史楊題照得陜西苑馬寺所屬監苑原額牧馬草場地一十三萬三千七百七十七頃六十畝因與固原鞏昌等衛鎮戎甘州羣牧環縣等千户所固原通渭安定等州縣官舍軍民相攙住坐又有楚肅韓三府黔國公等草場參雜其間節被官豪勢要姦頑之人倚恃威力任意開墾耕種或通同牧軍盜賣年久草場日漸逼狹官馬無處牧放馬政廢弛節經委官清查又被各人恐嚇扇搖不得歸斷𢎞治十三年間兵部奏差主事李源奉勑前來㑹同布按二司官查理查得見在草場共止六萬六千八百八十頃八十畝其餘俱無下落內查出軍民唐釗等七百三十三名占種草場地二千七百二十頃零九十一畝將各犯發問地土斷退還官近該臣督委都布按三司官親詣前項地方查吊軍民納糧册籍從公踏勘丈量數十年埋沒之弊一旦清出共清查得兩監六苑實有荒熟地一十二萬八千四百七十三頃一十一畝八分九釐六毫比之原額止少五千三百四頃有餘乃是奉例撥為衛所屯地及曾告官升糧之數其軍民唐釗等原占地土雖經查革仍復占種不曾還官干礙人衆依律問斷量追例後花利入官發落訖已將清出原額并侵占退出地土坐落四至頃畝數目造册奏繳臣惟地土生物本以養人與民共之是為仁政然朝廷修舉牧事清理草場非供耳目玩好之欲直以三邊缺馬之故馬以給軍軍以衛民若草場逼窄則畜牧不蕃邊軍缺馬騎征何以克敵制勝以此各邊年年奏討馬價所費不資皆自民出今陜西監苑草場頗勾孳牧但疆畔相連窺伺者衆彼見先年開耕占種查出不過照常問罪發落旋復侵占略無忌憚恐將來如唐釗輩不止一人查得見行事例凡用强占種屯田者問罪官調邊衛帶俸差操旗軍軍丁人等發邊衛充軍民發口外為民管屯等官不行用心清查者紏奏治罪及查得成化十年七月十三日節該欽奉憲宗皇帝聖㫖陜西榆林等處近邊地土各營堡草場界限明白敢有那移條假盜耕草場者依律問擬追徴花利完日軍職降調甘肅衛分差操軍民係外處者發榆林衛充軍係本處者發甘肅充軍欽此今照監牧草場係祖宗開設舊額不為不重如蒙乞勑兵部議處凡侵占監苑牧馬草場除事發在前巳經發落外自今造册奏繳之後敢有用强開墾耕種及盜買盜賣情重者比照衛所屯田營堡草場事例官調邊衛帶俸差操旗舍軍民軍丁人等俱問發邊衛充軍情輕者依律問斷仍枷號一箇月發落各該監苑官不行查舉通提治罪著為定例出榜發仰各草場營堡張掛曉諭庶幾法嚴而人知懼治之於巳犯之後固不若禁之於未犯之前之為愈也緣係禁約侵占牧馬草場事理未敢擅便具本該通政使司官奏奉聖㫖兵部知道欽此欽遵抄出送司案呈到部照得陜西苑馬寺原額草場荒熟地共一十二萬頃有竒年久馬政廢弛被人侵占數多既該督理馬政都御史楊委官清出前數漸復原額造有青册各該衙門存照具見處事立法之詳復恐法立弊生欲照前例禁處誠為防姦善後之計合無依其所奏本部仍行都御史楊刋印榜文發仰各該草場營堡人煙輳集去處常川張掛曉諭官軍人等敢有似前將清出牧馬草場地土用强開墾耕種或盜賣盜買許地鄰人等首告及各該監苑舉呈應問者就行提發分巡官處問理干礙應參官員參提施行問擬明白追完花利情重者比照衛所屯田營堡草場事例軍職調邊衛帶俸差操旗舍軍民人等俱發邊衛充軍情輕者依律問擬仍枷號一箇月照常例發落監苑官不行查舉一體提問治罪仍將各監苑清出草場至界頃畝鎸刻石碣陷置㕔壁永為證據如此則法度嚴明而馬政可期興舉奸頑警懼而宿弊可冀祛除緣係立法禁約侵占牧馬草場及奉欽依兵部知道事理未敢擅便𢎞治十七年十一月三十日本部尚書劉大夏等具題本年十二月初四日奉聖㫖是著出榜通行曉諭禁約敢有仍前强占耕種及盜賣盜買的都重罪不饒欽此欽遵擬合就行除外合咨前去煩照本部題奉欽依內事理欽遵施行一為乞改提學官員以修學政事題為乞改提學官員以修學政事近訪得陜西按察司提學副使李遜學丁憂去任所有員缺例該銓補臣惟提學之任學校之興廢人才之盛衰係焉且陜西山川雄秀士生其間多竒偉英邁敦尚氣節提學誠得其人則鼓舞振興一變至道他日出仕負荷大責任樹立大勳業朝廷不患於乏人矣如臣之愚往時承乏七年雖仰遵聖諭不敢自怠顧學識空踈行能淺薄初無率人之具心力徒勤曾無補益幸免黜罰至今為愧訪得代臣提學陜西按察司僉事王雲鳯志向髙古行履端方巡督各府衛州縣學校不止校閲文字其鋤惡佐善崇正闢邪興禮讓以厚風俗拔英異以激頽懦學政肅清一方風動為臣掩瑕實多當時或議其過嚴及推升别任至今士子有向上為巳之志者則又思之不置此愚臣之所目擊耳聞者也夫提學而用憲臣非欲其以法比佐教化為作人善俗之地乎若校文之餘茫無所事則一賢學官固優為之矣今日之弊往往坐此及照本官見任整飭洮岷邊備陜西按察司副使臣竊謂邊備責雖重求其人尚易提學之官必欲真能舉職今之人才如王雲鳯者蓋不多得臣受命督理茶馬學校政務本無干涉似非臣所當言然以舊任提學一方師生恩義所關不忍恝視况職司風紀茍有所見不敢不言如䝉乞勑吏部再行訪察合無將王雲鳯改任提學别推相應官員整飭兵備如此則一方之士不令而行學政不為虛文提學不為徒設將來得人效用治道所補誠不少矣緣係乞改提學以修學政事理謹題請㫖一為舉用官員修舉馬政事題為舉用官員修舉馬政事臣督理陜西馬政一年有餘今草場地復牧軍數增孳牧之政次第興舉蕃息之效將來可望但修築馬營城堡建立馬廄營房非積以歲月不能了辦况聞北方大衆臨河住牧恐將踏氷入套蘭州以西失穴之衆竊伏近邊時出抄掠跋涉而來懼有窺伺官馬之謀意外之變不可不防先事而圖庶無後悔今年巳將清平安定二苑大城堡築完其城門營廄及各苑小城堡應該展拓創修者俱未建立期在明年小大畢舉庶幾考牧有憑依之地防邊無倉卒之憂但工程浩大經營規畫雖在愚臣分理責成必資庶職及照洮河西寧等處處置官茶招番納馬等事久廢之餘修復舊制中間事情極多委曲臣受恩隆重義存體國志將為深長久大之圖不敢襲茍簡滅裂之弊奔走得人易收實效獨謀坐運何以成功雖有新任兩寺官員緣行太僕寺官近奉勑分投前去各邊堡衛所行事歲不暇給苑馬寺官見今收買種馬數多分投提調孳牧不能摘離俱難别項差占各府州縣能幹官員又各有本等職業未免制於監臨上司暫時委用顧此失彼必得専官一二員隨臣整理庶不誤事博訪得平凉府通判張檄涇州知州嶽思忠俱平昔剛果有為材識兼茂臣嘗委令行事各官精勤强幹清查出積年埋沒草場地土五萬餘頃招集牧馬軍人三百六十戶其功可嘉况張檄厯任八年為因上司委用不得給由嶽思忠厯任通渭安定二縣知縣固原涇州二州知州年勞厯履亦頗深久稽之輿論俱堪擢用如䝉伏乞聖明念軍國戎馬之重修舉廢墜之艱乞敕吏部再行訪察合無將張檄等量為升擢添注平凉府或附近臨鞏等府職銜専聼臣委用修理監苑城堡營廄及處置茶馬政務待一二年間事巳就緒查有陜西各府見缺聼臣具奏補缺管事如無見缺起送赴部改除别省如此一以酬各官既往之勞一以期各官方來之績不但馬政有禆而凡庶職皆知所激勸興起矣臣不勝幸甚緣係修舉馬政事理謹題請㫖一為改任官員以便行事事題為改任官員以便行事事照得平凉府知府安惟學近因捉獲姦細有功該總制尚書秦紘奏請保升吏部題奉欽依升四川布政司右參政仍管平凉府事仰惟皇上天地之量不吝官賞以待有功凡在臣工孰不思奮但司府監臨名分素定本官既升前職其布按二司分守分巡等官相見相臨彼以衙門統轄為拘此以參政名銜自處為禮既多觖望行事未免乖忤及照平凉府城內設有陜西行太僕寺苑馬寺衙門近例兩寺官照依京官體統行事府衛等衙門官不許輕視抗禮行太僕寺提調有司民壯騎操馬匹與本府事有統攝今官職相軋易生嫌忌朝夕與處甚多不便臣督理陜西馬政駐劄平凉前項事情乃所親得不敢不言且先年以參政職銜管府事者多係南北直𨽻府分彼無布按二司管轄掣肘比之平凉事體不同臣又博訪得本官厯任六年之上守巳愛民政績顯著節經巡撫巡按薦舉旌異稽之材操年勞雖無捉獲姦細之功亦堪擢用如䝉乞敕吏部合無將安惟學查補各布政司參政員缺别推堪任知府一員管理府事實為便益緣係改任官員以便行事事理謹題請㫖一為薦舉賢能官員事題為薦舉賢能官員事伏念臣職司馬政雖無巡撫之責官居風紀亦有激揚之任况當奏功述職之年正黜幽陟明之日既巳諏詢而有得豈宜忌避而不言以人事君雖不敢竊比于大臣而薦賢為國實不忍自負于明主輒陳耳目之見聞用備朝堂之採擇臣竊見陜西苑馬寺卿車霆陜西按察司副使王寅俱耿介夙成峭直寡與有肅清彈壓之風無迎合詭隨之態持法不撓於權貴任事不避夫艱險車霆近司監牧雖未收蕃息之功而屢更藩府實久著賢勞之譽王寅守直道忤時好而不回拒請託遭流言而不悔陜西按察司整飭固原兵備副使髙崇熙老成端重持憲得體西寧兵備副使蕭翀通敏勤勵兵政一新西安府知府馬炳然志存乎守巳而愛民才足以剸繁而治劇漢中府知府周東以文學飾吏事以撫字得民心凡此數人車霆王寅臣所專委髙崇熙等皆曾經委用故知之為深其餘雖有才能未嘗親見行事不敢輕舉如䝉乞敕吏部廣詢博訪如臣言可采乞將車霆王寅等量加擢用使在外臣工守正者有所恃而不恐勤事者知所勸而不怠其於治道良有禆補緣係薦舉賢能官員事理謹題請㫖一為添設馬苑營堡以便收牧事題為添設馬苑營堡以便收牧事據陜西按察司副使王寅呈為告撥牧馬草場以便人心事行據委官平凉府衛同知朱裕署指揮使趙文呈稱㑹同帶領原勘委官華亭縣知縣尚俊崇信縣署縣事知事李如林平凉縣署印縣丞崔瑄拘集平凉縣大岔西橋東橋等里崇信縣拽兵里華亭縣窯頭里各里老人等并原告投牧軍茍通李文舉馬彥名等指引親詣逐一覆勘得所告草場地土西至馬鋪嶺第三道溝北至草子山麓金沱小圓山子石板莊窠東至土橋子大路并石人山南至徐家嶺紅土深垷各為界東西長六十里南北濶二十里除髙山陡峻溝澗外實有耕牧草地共二千六百六十頃與各縣民間地土俱無干礙水草便利堪以牧馬及勘得地名霧子鎮一處水泉兒灣一處石佛頭一處俱堪設營堡具㑹勘過地土頃畝坐落四至畫圖開呈到職案查先奉督理馬政都察院左副都御史楊劄付前事備仰本職即便㑹同陜西苑馬寺卿車霆選委平凉府衛能幹堂上官各一員公同指揮趙文親詣前項地方督同鄰境該縣正官查勘所指山場是否空門無糧地土應否開設草場水草有無便利并查彼處潜住逃民實有若干堪否領養馬匹如果相應就便丈量明白查審停當備開四至坐落草場荒地若干開墾熟地若干或堪設一苑或止可於附近苑分帶管其見住逃民堪留養馬若干就將地土給撥種牧不堪收發若干或令就便附籍應當民差或發遣回還原籍復業逐一勘處明白具由作急呈來以憑施行中間如有别項違礙亦要明白聲說不許觀望迎合虛文搪報奉此隨吊平凉府原行卷內查得先該分巡關西道副使歐陽旦䝉督理馬政左副都御史楊批據指揮趙文呈前事巳經行據平凉府通判張檄本衛指揮吳𢎞趙文各將踏勘前項山場四至頃畝堪以築堡牧馬緣由呈報在卷今奉前因㑹同陜西苑馬寺卿車霆又經改委平凉府同知朱裕公同指揮趙文督同鄰境該縣掌印官覆勘查處今據回報前來本職㑹同卿車霆親詣所指去處督同各該委官帶領各縣干審里老并原告茍通等指引逐一審勘得山場四至界內委係自來荒閒並無徴糧地土在內亦與軍民兩無相干地方廣闊水草便利及查得流民茍通等一百六十三戶計人丁五百四十一丁俱在彼處修莊開地住種年久一聞招集養馬莫不欣然樂從若於此處設立苑分營堡非惟牧馬有地遇警臨苑馬匹亦可收避保障無虞擬合開坐㑹案回報為此通行除行令同知朱裕指揮趙文將彼處招集潜住流民茍通等逐名查勘丁力相應者斟酌名數編設總小甲每名照例取便給地一頃住種聼候事完造冊另報并將本地軍民及逃來原衛缺伍正軍避重就輕犯罪脫逃人犯及無根絆者問罪遞回原籍官司復業當差外今將勘處過草場頃畝坐落四至并堪以建立苑分營堡地方畫圖貼說與苑馬寺卿車霆各呈報到臣又據平凉府掌府事四川布政司右參政安惟學呈為修舉馬政事行准本府同知朱裕平凉衛指揮趙文解送犯人顧成等二百六名并取勘供詞卷冊及據邠州申解犯人員祥等四十七名到職准此案查先奉督理馬政左副都御史楊劄付行仰本職㑹同陜西都司都指揮僉事房懷弔拘原委同知等官朱裕等勘取供詞人卷屯册到官將發去册造地土從公逐一覆審對查是否原先遺留屯田各該軍民隱種收租不行首官務要窮究明白如果别無違礙虧枉重取各人備細親供就將有罪人犯問擬如律照例呈詳發落中間若有干礙軍民徴糧地土亦要明白聲說分豁毋得偏重損民清出地土相應給撥何軍領種孳牧或招附近軍民承種照依原額子粒徴收折價以備監苑買馬之用計處停當造册繳報以憑施行備奉已經通行弔拘取勘供詞人卷㑹同覆審對查去後今准前因㑹同都指揮僉事房懷推問明白取具各犯供招在官審查得前項地土的係該所先年改調之時遺留屯地共一百九十九頃二十畝七分四釐各該軍民隱種收租不行首官是實中間並無干礙軍民徴糧地土亦無偏重損民等弊前項清出地土相應另招附近軍民承種照依該衛原額徴糧事例每地一頃徴地子粒豌豆六石草九束俱折收價銀與馬價銀一錢俱徴收在官送該寺交收専備監苑買馬之用計處停當别無異議及查得前項隱種軍民收過遞年花利例該入官但地方先遭𢎞治十四年敵衆搶擾後因節年災傷薄收委的艱難追補不前未敢擅専除將查對過前項屯田地土頃畝備造文册同計處㑹問過各犯招罪緣由與都指揮房懷各呈繳前來及又據陜西布政司分守關西道右參政胡瑞呈亦為修舉馬政事行據平凉府申行拘原勘犯人劉傑等并地方知因人等到府從公覆審勘得小山子荒熟田地共一百七頃三十三畝八分先年委係崆峒山寺常住無糧地土後因無僧節被劉傑等為因屯地窄狹各不合不行告官擅自開墾耕種今奉查審並無相干軍民徴糧之數相應作為牧馬草場除將劉傑等問擬明白具結呈詳到職案查先承准督理馬政左副都御史楊一清照㑹仰本職即便行拘前項地方并種地人戶親管官旗到官從公逐一審勘前項田地是否無糧先年崆峒山寺僧人曾否作為常住地土因何後被軍餘人等耕種不曾起科今要作為牧馬草場給與新役軍人耕牧有無相應逐一勘處明白如果無礙取具種地人戶親管官旗并地方知因人等不致扶同結狀在官就將種地人犯問擬應得罪名備招回報若有干礙軍民田地及應别項處置事宜亦要明白聲說回報承此巳經轉行原委官員勘報去後今據前因除覆審相同外今將勘問過各犯招罪緣由回報施行等因各節呈前來查得臣節該欽奉勑近該爾奏稱彼處苑監見缺養馬軍人欲將地方逃住并違例投入王府等項人役查訪問發養馬等因特准所奏其各苑地方潜住及投入各郡王將軍中尉儀賔等府家內并楚肅二府馬營草場莊所家人聼爾督同守巡等官出榜曉諭許令赴官自首免其問罪收集牧馬欽此已經通行欽遵出榜招諭外續為告撥牧馬草場以便人心事據原委平凉衛署指揮使趙文呈據招到流民茍通馬彥名陳文舉狀告先年各因本處過活艱難流移到於平凉城東地方伍道廟白水澗三股山拽兵里等處採打木植牧放頭畜趂食住坐不曾回還今䝉招募情願於陜西苑馬寺附籍領養官馬當差思得本處草子山一帶草場寬濶四至界內於平凉衛崇信華亭等縣三處軍民地土俱無相干乞將前地設為本寺所屬草場牧放官馬便益等因備告具呈前來批仰分巡關西道副使歐陽旦行委平凉府衛堂上官各一員㑹同指揮趙文親詣前項地方督同該縣正官查勘間本官丁憂去任該道缺官接管又經改委陜西按察司原委整理馬政副使王寅陜西苑馬寺卿車霆選委平凉府衛能幹堂上官公同指揮趙文親詣前項地方督同鄰境該縣正官查勘及查先據固原衛右所軍餘王友才首稱洪武年間祖父王周孫軍人吳順輕等原係平凉衛右所旗軍在於平凉縣東橋地名小寨兒各分撥屯地一分耕住後䝉將右所改調固原衛就彼各給撥屯地耕種辦納糧草彼時各軍將遺下屯地未曾首官俱被平凉衛軍餘石見等至今遞年隱種等情看得固原衛屯田多係監牧草場改撥今首該所原撥屯地在平凉等縣地方被人隱種盜賣未委虛的行仰陜西行太僕寺少卿郭珠查問間續該副使王寅呈為修舉馬政事清查得固原衛右所屯軍徐能等八十名原係平凉衛調來額設屯田坐落邠涇二州平凉華亭鎮原三縣成化六年將各軍奏那今改固原州地方海子口開荒住種彼時兵備官曾委官員查勘遺留屯地招人承種並無結報緣由在卷必是不曾查出以致徐能等兩處朦朧混種除將各軍准令歸併海子口每分扣撥地一頃照舊屯種辦納子粒其邠涇等處原撥屯地必須另委官員親詣㑹同平凉衛管屯官員拘弔屯田始末文册照依坐落四至沿丘履畝盡數清查明白責令退出還官等因前來又經批仰本官㑹同原委少卿郭珠親詣督委平凉府衛能幹官及該州縣掌印官提人弔册勘處回報續據委官同知朱裕指揮趙文開呈公同邠涇二州平凉華亭鎮原三縣各掌印官清出前項遺下屯地頃畝前來查得原委副使王寅别有差占少卿郭珠赴京朝覲又經改委平凉府掌府事右參政安惟學㑹同都指揮房懷勘問及又查得先為修舉馬政事據陜西苑馬寺卿車霆呈訪得平凉府城西崆峒山後地名小山子一帶約有五百頃先年崆峒寺僧人作為無糧常住地土耕種後因無僧節被平凉等衛軍餘劉傑等偷開耕種不曾起科今各人聞知本寺收集逃移軍民人等要將前地設為草場牧馬俱亦退避見今荒間委與軍民徴糧地土並無相干水草便利堪以牧放馬匹等因據此巳經批仰平凉府掌府事參政安惟學公同平凉衛指揮親詣彼處從公拘審如果空閒無礙即便踏勘丈量明白取具勘量過地土頃畝四至坐落緣由造册繳報續據本官呈稱拘集平凉衛左所軍餘劉傑等供稱見在城西二十里鋪地方居住成化年間各因屯地窄狹將臨近地名小山子等處拋荒地土開墾不等各遞年耕種並不曾承糧今䝉委官丈量委係無糧田地情願退出還官等因勘量頃畝界至明白造册呈繳前來看係腹裏地方恐有干礙軍民徴糧之數又經行委山西道右參政胡瑞覆勘俱各節行去後今據前因看得各官節次清查出草子山地二千六百六十頃平凉衛右所調去固原衛遺留屯地一百九十九頃二十畝七分四釐小子山地一百七頃三十三畝八分共地二千九百六十六頃五十四畝五分四釐招募過在地潜住流民實有堪充牧馬軍人茍通等一百六十三戶共人丁五百四十一丁其草子山小山子二處俱係空閒無糧地土右所遺留屯地各軍巳於監牧草場內給地領種却將原額屯地仍前混占私竊典佃與人正係應該入官之數俱與軍民並無相干竊緣平凉地方土廣人稀草子山一帶地宜水草堪以牧畜山多材木便於砍伐以致流民茍通等修打莊窠住成家業又無糧差縱欲驅之使還終是戀土趍利不肯復業積久漸繁恐貽他患今聞招募情願投軍養馬如此之多既節經陜西都布按三司苑馬寺官重復勘審明白别無異議除依擬照例編充牧軍聼候給地領馬及將隱種地土軍民員祥等問罪發落遞年該追花利宜從寬免外臣仰惟我祖宗開設陜西苑馬寺所轄六監二十四苑今止存長樂靈武二監開城廣寧安定清平萬安黑水六苑彼時河套無警地稱腹裏便於孳牧自北師入套之後節被搶掠人馬不得生息近該臣處置銀買茶易馬匹數多見今固原靖邊等處傳報緊急聲息不絶誠恐姦細潜伏河套不出時防深入官馬拘收城堡不敢牧放深為可慮前項地土俱係平凉縣腹裏相應開設草場增置苑廄以備不虞及查得永樂四年舊設未開有武安弼隆嘉靖保川天興永康等苑俱在平凉府所屬州縣內武安苑在本府隆德縣地方相離府治稍近合無於前勘草子山開設一苑仍以武安舊苑為名或就以平凉為名𨽻靈武監所轄苑設霧子鎮水泉兒灣石佛頭小山子四營本苑衙門於霧子鎮建立將原投牧軍流民茍通等一百六十三戶各隨原住坐處所分𨽻四營如軍數不敷將例該改調南方衛所軍人及各處問發永逺充軍人犯查撥共輳正軍二百名之數每軍一名給地一頃住種領牧先今見住投軍之人就便於附近山場採打木植燒造甎瓦築修營堡蓋造苑廄完備方才給與官馬牧養其遺留屯地附近草子山者一體給軍逺者另招軍民人等承種照依屯田事例每頃徴收豌豆六石草九束地畝銀一錢以備冬月餧養官馬支用如此非惟平時孳牧有利無虞倘邊報十分緊急臨邊監苑馬匹亦可在此收避人情事體委的經久便益如䝉乞敕兵部計議倘臣言可採依擬覆奏上請施行仍乞行吏部照依銓除圉長一員禮部鑄造印信令其齎領前來到任管事陜西布政司撥吏書辦待事完通將修建過營堡工程招募編發過牧軍姓名數目畫圖造冊奏繳緣係添設馬苑營堡以便收牧事理謹題請㫖一為防禦邊敵保障官馬事題為防禦邊敵保障官馬事據陜西等處提刑按察司副使王寅呈㑹同陜西苑馬寺分管少卿劉棠寺丞朱璜徐正將各苑新舊餘丁內通行揀選得身力强壯年貌相應堪以操守廣寧安定二苑各一百名開城黑水清平萬安四苑各二百名㸃驗得開城苑舊設操丁內七十六名原額見在盔甲弓箭各七十六副未領盔甲軍器一百二十四名黑水苑舊設操丁一百四十六名原領見在盔甲弓箭各一百四十六副未領盔甲軍器五十四名安定苑舊設操丁四十名內一十四名原領見在盔甲弓箭各一十四副未領盔甲軍器八十六名廣寧清平萬安三苑新選操丁五百名俱無盔甲軍器逐一選驗明白省令各苑帶回原有盔甲軍器者照舊披執其餘俱令隨便自備弓箭什物専一守護本堡無事之時踈放牧馬但前項操丁須有盔甲什物披執有警方可禦侮所據缺少軍器相應給領備將㑹選過各苑操丁姓名年甲并有無盔甲軍器數目造冊開送到臣案查先准兵部咨為處置馬營城堡事該臣題稱西人素勇敢善鬭待馬政就緒將各苑軍餘挑選壯丁設為操夫各一二百名給與盔甲授之弓矢令其不妨牧馬閒暇之時操習武藝就令寺監官員督視比較不許調遣専一防守本營城堡是雖為牧馬而設亦可壯邊城之聲勢資緊急之應援彼既覘知我保障有地防守有人縱然馬匹蕃盛不敢生垂涎之意該本部依擬覆奏奉欽依備咨前來近因敵衆入套各邊傳報聲息不絶各苑收牧官馬數多防禦不可不嚴挑選操丁守護城堡似不可緩已經批仰陜西按察司副使王寅親詣各苑㑹同該寺分管官將新舊軍人餘丁通行揀選堪以操守姓名數目總類造冊呈報仍查舊設操丁曽領盔甲軍器若干就行㸃檢明白即今應否給領盔甲軍器若干呈來定奪去後今據前因看得陜西監苑之設相離邊境不逺常年以邊敵為憂彼之所利者馬馬之羣聚益蕃則彼之窺伺益急縱有城堡若無軍兵安能捍禦臣於舉事之初固慮及此近自去年十一月以來傳報聲息無日無之馬匹拘收日久各營星散逺近不一固原等衛備冬官軍其數不多不能分布防禦如萬安一苑尤為孤懸現在螺山駐劄之衆一晝夜可到節被搶殺並無一軍一馬前來策應况各營堡俱憑髙據險不堪鑿井馬匹未免下飲溪河彼將暗伏草莽窺瞰侵掠勢難周防查得先年亦曽設有操夫正為防護官馬但數少不敷近年止是黑水苑遇冬操備其餘苑分俱各廢而不講今據副使王寅㑹同該寺分管官查驗揀選新舊相兼廣寧安定二苑各一百名開城黑水清平萬安四苑各二百名六苑共操丁一千名平時不妨牧馬遇警足資保障各軍委皆生長邊方耳目所習聞戰不懼然須有盔甲軍器披執庶幾緩急可倚及照監苑文官不諳軍務須委能幹知兵武臣一員遇冬提督操練及又查得各處招募民壯義勇舍餘備冬之時俱有行糧前選操丁既係身於官不得營辦衣食亦合比例給與行糧養其鋒鋭乞敕該部計議合無將各苑操丁一千名除舊領有盔甲軍器外今次增選者俱照數給與每名盔甲弓箭腰刀各一副每營堡仍各量給與火車銃炮圓牌旗幟等項以壯聲勢俱行令陜西所屬各衛所查取給發如見無收積嚴限成造送用聽臣選委平凉固原等衛諳曉操練指揮一員往來各苑㑹同該監苑官提督操練務令武藝精熟不許虗應故事每年二月至九月踈放照舊牧馬自十月初一日為始收操照例給與行糧於附近州縣關支若大敵在套雖夏秋時月一體收操支糧有警則與槩營軍人協力悍禦敵必不敢逼城堡而攻前項操丁雖為守護官馬而設練之既久未必不為克敵之兵是於牧馬之中而得千軍之用有備如此非惟官馬有所保障彼見我城堡碁布旗幟羅列軍器鋒利或少弭其邪心區區小醜不敢窺伺深入其於平凉鎮原一帶地方軍民不為無補至於大敵侵犯勢須動調官軍截殺此守臣之事非臣所敢與聞緣係防禦邊敵保障官馬事理謹題請㫖一為處置各邊馬匹事題為處置各邊馬匹事准兵部咨該本部題該陜西苑馬寺卿車霆奏訪得陜西慶陽府靈州鹽課司大小鹽池自祖宗以來與茶法並為供辦各邊馬匹以補本寺不及之數近來各處或因别故奏討榆寧二邊雖有間年事例此得彼失兩不相顧况二池額課止是一萬三千九百餘引縱使二邊間年全得招商中納馬匹給軍騎操數亦不多且每上馬一匹給一百引中馬一匹給八十引每引該支官鹽二百斤運去行鹽地方平慶二府卸賣因是路途窵逺其鹽俱是近邊腹裡軍民自備牛車下池攬載每引裝載一大車約有三十餘石出池分為伍陸小車運至卸所止交商人引錢鹽一石四斗或銀四錢餘皆屬之腳價又訪得先年招商多是勢要之家中納瘦小馬匹給軍騎操未久即又倒死纍軍買補𢎞治十三年寧夏都指揮傅釗奏改招商中納馬價每一百引布政司收貯銀一十五兩解送各邊給軍買馬間又值寧夏巡撫衙門將課鹽借去招商中納銀糧修理河渠功既未成鹽亦空費𢎞治十五年又該總制尚書秦紘奏於固原慶陽二處設立鹽厰令其擬奏年分俱二處上納其厰各因路近腳便攬載舊鹽腳户每年到池牛車不止萬數每引仍前裝載一大車出池分為五六小車運至卸厰亦止交商人引錢官鹽一石四斗餘屬之腳價大抵此課以十分為率官似僅得一分商人約得二分腳戶已得七分之上前此一年中馬不過一百五十匹中銀不過二千餘兩商人腳戶儘得其利又有姦人謀之者多今邊務方殷正在用馬之際乞敕兵部轉行督理馬政都察院左副都御史楊從長處置量將𢎞治十三年以前中過引鹽暫且停止𢎞治十五年以後未納引鹽俱令革罷行令陜西布政司將靈州鹽課司課引合無自𢎞治十八年為始量增添五六萬引不必招商聽令各邊腹裏但有牛車軍民人等以近就便於固慶兵備官處每引并卧引錢共納銀六錢該支鹽斤與𢎞治十三年以後未放引鹽舊引三分新引七分相兼放支每引止許中車一輛下池裝載鹽一十五石為則運至卸厰照彼中時價易賣其舊例此鹽止通平慶二府目今邊馬急缺暫通漢鳯等府地方發賣三五年間待至各邊馬不告乏庫有餘資之日照舊施行前項該收銀兩不許各邊互為爭兢就令固慶兵備官按季造冊送督理都御史驗過轉發附近府庫收貯如遇各邊缺馬聽彼處鎮巡等官移文楊都御史通融處分仍聽本官便宜立法或坐委附近府衛能幹官員運送前去督同該衛公正官員與官軍死馬樁頭銀兩相兼驗買堪中土産馬匹騎操等因具本奏行兵部該本部覆奏看得陜西苑馬寺卿車霆奏要增添靈州鹽課司鹽引設法納銀收貯官庫專聽督理馬政衙門分撥各邊買馬一節緣前項鹽引舊例相兼茶法供辦各邊騎操馬匹後因此法漸弛各邊互相奏討豪右夤緣為姦利歸私門公家不得實用一或缺馬動輒仰給京師今若車霆前擬則不特三邊馬匹足用而尚有餘利誠為國家永逺之計但今巡撫都御史楊一清兼理馬政前項事情是其職掌未經勘處難便定奪合無本部行移本官將車霆所奏逐一備細查勘明白如果相應依擬處置中間法有滲漏缺當者仍要斟酌停當次第舉行若有應奏事情徑自具奏定奪該添鹽引轉行户部自𢎞治十八年為始照數增添伏望皇上俯念三邊重地所急者止是馬匹斷自宸𠂻特降綸音著為定例務使鹽易茶易馬匹永為邊方之利不許别項奏討前此弊政應該革罷者盡行革罷如姦豪一時失利扇惑地方沮撓國是許楊一清指實參究置之重典年終通將納足銀兩買過馬匹并分撥各邊數目造册奏繳仍造青册一本送部查考等因題奉孝宗皇帝聖㫖是陜西茶鹽易馬備邊係是舊制今後不許别項奏討欽此欽遵備咨到臣切惟陜西地方內而固原環慶外則寧夏延綏皆防邊重鎮軍務所急莫先於馬頃自邊塵弗靖戰馬告乏各邊之仰給無窮公帑之所儲有限至厪宵旰之憂命臣督理馬政二年有餘孳牧之利粗雖興舉未獲收效惟茶馬較之先年號增數倍顧三邊戎廄倒亡相繼隨補隨耗支應不敷臣晝夜思惟恐孤委任不勝憂懼看得靈州鹽課司大小鹽池所産鹽斤與解池相類不勞煎煮不煩人力為利甚博取之無窮舊例止是招商中納馬匹分給邊鎮騎操後因各邊交爭互取多寡不均故有間年關領之例又因中馬之人勢囑賄通濫收不堪馬匹不得實用故有收價解邊之例畢竟為馬而設未嘗别用後因放鹽委官作弊多端奏添陜西按察司副使一員在於慶陽駐劄職雖整飭兵備實兼督理鹽法近年以來寧夏鎮巡衙門先因修理河渠借去𢎞治十四年十五年二年鹽課後因措置糧草借去𢎞治十六年十七年十八年三年鹽課河渠工程既未就緒倉場糧草亦未充足而鹽馬之制遂廢私鹽盛行姦豪得利以此總制尚書秦紘苑馬寺卿車霆先後論奏皆欲增廣靈州鹽課以供買馬節經該部題奉欽依茶鹽易馬備邊不許别項奏討邊方幸甚然當久玩積弊之餘為改絃易轍之舉思之不熟計之不審終恐法立弊隨有損無益行據陜西布按二司分巡分守兵備鹽法等官副使燕忠髙崇熙等親詣鹽池勘處各陳所見前來臣稽查舊卷採托羣言參酌計慮至於再三始有一得查得先該總制尚書秦紘奏准𢎞治十九年以後陜西布政司印刷十餘萬引送發監理通判處開放每引收銀四錢伍分准令裝鹽五石或六石今陜西苑馬寺卿車霆奏稱自𢎞治十八年為始量為增添五六萬引不必招商聽令臨邊腹裏有牛車軍民人等以近就便於固慶兵備官處每引并卧引錢共納銀六錢止許中車下池裝載鹽一十五石為則舊例此鹽止通平慶二府今邊馬急缺欲暫通漢鳯等府地方發賣待至各邊馬不告乏庫有餘資之日照舊施行查得靈州鹽課司大小二鹽池大池原額鹽課一萬一千二百三十二引小池三千一百四引有零共該額課一萬四千三百三十七引計今二池所産鹽斤委有餘饒常課之外雖增十倍似亦可辦而原額止於如此蓋因行鹽之地止是平凉慶陽二府及寧夏等衛榆林寧塞營迤西城堡又地臨邊境事變難測立法之初良有深意近有總制尚書秦紘要增鹽利及以便益處置出給小票許令前往西鳯延安漢中等府發賣故鹽商雲滃鹽厰山積固原荒凉之地變為繁華議者徒見其然遂謂二池鹽課可增十萬至二十萬然河東鹽法未免被其阻壞所司巳經奏行禁止若遵照舊例拘定前項地方則鹽生者多民食者少鹽商何從售賣原額一萬四千餘引之課尚恐不敷辦給安能復增五六萬至十萬引課額且陜西各府之人利於靈州食鹽先年課額雖未嘗增而私鹽實不能禁利之所在人必趍之又商民兩便雖日加刑戮末如之何夫以鹽池所産本有此數却為地方所拘自棄其利以為姦人私販之地深為可惜欲增鹽引而不稍廣行鹽之路徒生厲階以貽後議非計之得也該納引錢舊例每引止是銀一錢五分今欲增至銀五六錢訪得商人賣與腳戶所得不過銀四錢有餘彼無利息安肯中納若盡如車霆所奏不必招啇就池賣與附近有牛車軍民臣謂𣙜鹽招商自是正理専使公家紛紛與細人貿易非為政之體將來恐滋别弊至於所載鹽斤例該每引二百斤帶耗五斤今若許載至一十五石不無太濫但二池邊逺險阻腳價艱苦比之淮浙河東事體不同秦紘所擬似為得中及照大池原額課多然坐臨極邊而行鹽之途艱小池原額課少然地近腹裏而食鹽之人廣近年小池每季放支鹽斤反多大池數倍合無大池增鹽一萬五千引并舊課共二萬六千二百三十二引小池增鹽三萬引并舊課共三萬三千一百零五引通共二池新舊課鹽共五萬九千三百三十七引照例招商每引止可納銀二錢五分照鹽一車以六石為則外有多餘依律掣墊追問運至固原慶陽二鹽厰卸所每引仍照舊收卧引銀一錢通共每引該得銀三錢伍分每年得銀二萬七百六十餘兩此外若有餘鹽却依車霆所奏就池招人納銀給與引目聽其發賣倘遇旱潦鹽生不及或邊報緊急鹽路不通除舊額鹽課外新增鹽課明白除豁不可膠於一定嵗嵗取盈行鹽地方西安延慶二府密邇河東地廣人稠照例嚴加禁約不許靈州鹽斤私通販賣阻壞彼處鹽法止許於鳯翔漢中二府通行與河東之鹽相兼發賣兩不礙阻其𢎞治八九年以前中馬鹽引年久弊多莫可查考所宜一切革罷𢎞治十三年以前陜西布政司招中商人彼皆奉例納銀輸官後因寧夏借課耽遲數年虧折資本怨聲載道合准相兼放支新引七分舊引三分𢎞治十四年以後寧夏所借若有未支未中之數年分巳滿中間勢豪姦頑之人展轉影射冒支盜賣等弊不可枚舉難再復支未中引目陜西截取開中庶幾物論稱平所收鹽引銀兩俱送慶陽固原各官庫寄放聽慶陽兵備兼理鹽法副使及固原兵備副使提督稽察姦弊每季監理通判督同鹽課司將給過引目放過鹽數造册開報臣并布政司查考如遇各邊缺馬各該巡撫移文前來聽臣斟酌通融給發買馬支用不必拘定間年之例臣於年終通將納過銀兩買過馬匹并分撥過各邊數目造册奏繳若有餘銀仍發庫收貯照例查盤如此所處似為停當而於馬政大有禆益但兵部原擬自𢎞治十八年為始增添鹽引前項公文本年五月內方才行到彼時寧夏招過商人正在支鹽賣鹽之際事巳過期難再追改合自正德元年為始照依新例而行及查得陜西布政司並無收貯靈州鹽引即今將及放鹽之期誠恐遲誤如䝉乞敕户兵二部將臣所擬參詳可否上請施行合用鹽引作急差官南京戶部刷印二十萬引務在本年三月以裏降給陜西布政司收貯開放其餘該載不盡事情臣徑自處置一切弊政應革罷者徑自查革若有姦豪失利扇惑阻撓之人指實劾奏置之於法不敢姑息隱蔽緣係處置各邊馬匹及該部題准行令臣斟酌停當舉行應奏事情徑自奏請定奪事理謹題請㫖一為處置馬營城堡事奏為處置馬營城堡事據陜西苑馬寺卿車霆呈修完陜西苑馬寺長樂靈武二監開城廣寧黑水安定清平萬安等六苑城堡衙門公𪠘城樓城門馬廄營房倉厫屋宇買辦木石板棧燒造甎瓦雇覔賞勞各色人匠夫役等項用過各項銀兩并食用過米糧數目備造圖册呈繳到臣案查先准兵部咨前事該本部題看得都御史楊一清奏稱即今陜西修舉馬政俱無城堡馬廄恐後馬匹蕃息為敵所窺况今彼處見報聲息所宜先事預防乞要築城堡使人馬有所保障置馬廄使馬匹不至橫傷修營房使貧軍有所依棲建公衙使牧官得修職業前項工程必須量起附近軍民人夫動支贓罰馬價以備各項費用一節論辨剴切計處停當俱是為國興舉馬政用圖永久之計相應依擬定奪除地方規制巳該一一相度明白外所據該用人力合無行移本官并巡撫都御史周季麟計用若干行令都布按三司著落所屬附近軍衛有司量數起倩與同本苑軍夫相兼修理其應用錢糧本部再於太僕寺馬價銀兩支取八千兩與前給買種馬共輳五萬兩一併送去聽從本官於內支用若有不足仍依前擬於本省大小問刑衙門𢎞治十七年贖罪銀錢贓罰銀物并司府在庫官錢內支取以備輳辦木植甎瓦等項務圖成功經久不許虛應故事畢日通將用過錢糧築修過營堡備造圖册奏繳仍造青册送部查考等因題奉孝宗皇帝聖㫖著楊一清上緊提督整理務要完固欽此欽遵備咨前來巳經行委陜西苑馬寺卿車霆陜西按察司副使王寅陜西都司都指揮僉事房懷分投提督軍衛有司委官悉照原擬地方規制斟酌損益量起附近軍民人夫與各苑軍夫相兼修理查支兵部奏發馬價并馬政茶法衙門有行贖罪臟罰紙價銀兩置辦物料覔雇人匠貼備工食完日通併畫圖造册回報去後續因連年套敵有警地方薄收不敢急迫併興工作副使王寅别有差占都指揮房懷改任守備去訖止是苑馬寺卿車霆一人提督陸續整理經今二年原擬兩監六苑工程方才完備及查得後奏開設武安苑營堡亦皆築完其衙門倉厫營房馬廄等項次第蓋造緣係腹裏地方相應從緩除待完日另行奏報外臣竊惟陜西設立寺監衙門職専孶牧始雖規模宏逺而法制未備因陋就簡者百年于兹孝宗皇帝采納廷議詔圖修復臣猥被推薦仰承任使大懼無以稱塞明命始至固原求所謂監苑者雕落之餘頺垣敗甃莽為荒基而平凉迤北直抵環縣地方數百里深山野草居民星散崖窯堡洞逺近不一𢎞治十四年敵騎蹂踐屠戮驅掠丁口頭畜多至二十餘萬各苑官馬為之一空蔓延至于平凉滿所欲而去彼時為臣謀者皆曰敵人所利者馬馬之羣聚益繁則敵之窺伺益急將來恐不可保臣不得巳方修孳牧之規既上城堡之議仰荷朝廷嘉納臣得展布有為今固原迤西至鎮戎所新修展修營堡聨絡平凉迤北有彭陽大城有板井新堡安定苑僻在西南有中營大堡又奏設操丁給與盔甲弓矢各守本城比者酋帥擁衆數萬長驅而入聲言要搶各苑官馬至黑水苑劄營分遣輕騎窺我三營不得不復東向又一枝至板井堡即日出境不敢久住計今各苑見養官馬一萬有餘止是萬安苑搶去七十餘匹其餘俱幸保全蓋彼往來熟路忽見我髙城深塹樓櫓相望旗幟羅列將謂處處屯兵不知幾何有以懾其心而奪其氣故也但舉事之初勞費有所不免故好議論者有今日修馬廏明日築城堡之言今事巳就緒非惟官馬有所保障可望蕃息遇警附近軍民丁口頭畜亦可在此收避且我迎敵出哨之兵勞則可以少息急則可以為家有益于邊備實多及查得支用錢糧除解到馬價銀八千兩外止是將臣馬政茶法二項官錢輳用該部原擬𢎞治十七年分大小問刑衙門贖罪臟罰并在庫官錢並無分文動支臣竊恐議者不能深究地方利害事情本末習於任耳者之見視為無益將來敵不知修缺不能補隳廢前功深為可惜如䝉乞勑兵部通行陜西鎮巡三司及苑馬寺等衙門將前項修完城堡工程向後如有損壞隨即修補其未補者尚當及時增拓推廣而行共成國是以為地方逺圖不但孳牧一事之利而巳臣不勝惓惓體國之至緣係處置馬營城堡及奉欽依著上緊提督整理務要完固事理為此今將修完兩監六苑工程用過錢糧數目畫圖造册具本専差承差孫桂親齎進繳謹具奏聞一為修舉馬政事題為修舉馬政事臣節該欽奉勑諭陜西設立寺監衙門職専牧馬先年邊方所用馬匹全藉於此近來官不得人馬政廢弛殆盡今特命爾前去彼處督同行太僕寺苑馬寺官専理馬政爾須查照兵部奏准事理考究國初成法親厯各該監苑督委都布按三司能幹官員踏勘牧馬草場果有侵占即令退還查㸃養馬軍人果有逃亡者即令撥補見在種兒騍馬實有若干設法增添務足原額倒死虧折馬駒隨宜追補量為分豁布置巳定責令該管官員用心牧養各該寺監等官有闒茸不職者爾即具奏黜罷或起送别用另選才能以充任使其有盡心職務功績昭著者具奏旌擢欽此欽遵臣受命兢愓不遑寧處親詣兩監六苑查得牧馬草場原額一十三萬三千七百七十七頃六十畝見在止存六萬六千八百八十八頃八十畝其餘俱被人侵占原額養馬恩隊軍人一千二百二十名見在止有七百四十五名其餘俱逃故年久未曾勾補㸃視得見在牧養兒扇騍馬并孳生馬駒止有二千二百入十匹竊歎馬政之廢至於如此欲作新興舉非臣一人所能獨辦訪得陜西布政司右參政車霆陜西按察司副使王寅陜西都司都指揮僉事房懷俱堪委用巳經遵照勑㫖督委各官隨同行事節經具題外續䝉聖恩車霆升任陜西苑馬寺卿其後副使王寅别有分巡等項差占都指揮房懷改任守備去訖止是車霆一人常川幹理今查得各監苑清出實有草場荒熟地共一十二萬八千四百七十三頃一十一畝八分九釐六毫恩隊軍人補完見在新舊共一千九十三名招募新軍一千一百八十名及查得𢎞治十八年十二月終各苑見在牧養兒扇騍馬并駒共一萬一千六百二十匹頭修完馬營城堡共一十九處衙門倉厫營房馬廄等項屋宇共四千一百餘間又選設操丁一千名委官提督操練無事不妨牧馬有警可備調用前項事宜臣愚不過總其大綱至於經營布置實多車霆之力且天下之事襲巳成者易為力振久廢者難為功當馬政興舉之初羣咻衆閧恐喝搖撼無所不至急之則他變或生緩之則絃轍如故車霆等不急不徐寬嚴相濟委曲開導人情稍安經今二年之上復草場於滅沒之餘完牧軍於雕耗之後保障有地防守有人孳牧之規稽考之法粗皆就緒經久可行將來官員守而無失自足以收蕃息之效查得先為一事權以修邦政事該兵部節該題奉孝宗皇帝欽依今後行太僕寺苑馬寺官有缺照在京太僕寺官例務推素有才望的簡用待有成績亦照太僕寺官升擢欽此續為正卿寺體統以修邦政事該吏部等衙門㑹議節該題奉欽依兩寺官員體統都准議行永為定制各官果有政務修舉功績顯著的你每推舉酌量升用不必拘定常例欽此欽遵看得車霆原任陜西布政司右參政以新例被簡命為苑馬寺卿本官敡厯中外積有嵗年剛方有為清苦無玷年老而風節愈厲官久而初心不改節經撫按旌異言官奏保委的堪以重用其隨臣整理馬政修舉廢墜委的盡心職務功績昭著相應旌擢若止照常格升用無以激厲人心必須仰遵先帝成命照在京太僕寺官例推任兩京相應堂上官或巡撫都御史庶足以充其藴且今四方多事用人為急一時人才固多然守法任事不避艱險如車霆者亦不易得况本官年雖七十精力未衰若不早為甄拔將來衰邁可惜如䝉乞敕吏部再為訪察如果本官厯任年深公論允協合無查照新例不次拔擢大加委任仍乞給賜應得誥命使凡厥有位知所感發興起其於治道實有補益臣備員風紀不敢蔽賢干冒天威無任悚懼緣係修舉馬政薦舉賢能官員事理謹題請㫖關中奏議卷二
