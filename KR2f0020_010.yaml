心以靖邉境悉聽爾斟酌議處便宜行事爾其體朕至意以副委託事畢之日爾即星馳回京欽此欽遵外臣本年六月十二日到寧夏地方節據總兵官楊英等呈稱見監并殺死置鐇何錦等及今獲共謀反賊申居敬等連各賊家屬共四百五十五名口到臣會同欽差總督軍務御用監太監張永議得各賊未經查審恐有異詞已經會案通行帖仰陜西寧夏二鎮太監總兵巡撫等官巡按監察御史督同都布按三司委官審取供詞分别造意根因首謀共謀脅從等第呈來以憑覆審遵奉欽依起解釋放去後今據前因除覆審相同外臣會同太監張永議照革爵安化王置鐇係宗室懿親犯人何錦張欽等皆朝廷臣子世受國恩罔思報稱乃敢潛謀交結肆行反逆迫脅官軍占據城池殺害鎮巡重臣索要軍馬地圖鑄造關防偽封官爵傳檄邉境搖撼人心意欲結搆外冦併謀侵犯中原實地方非常之變覆載不容之賊也幸賴我祖宗厚德深仁皇上神謀妙算邉將宣力諸軍用命元惡首授餘黨成擒祖訓昭然憲章具在臣等固無别議伏覩節該欽奉敕諭除首惡何錦等三人不宥外脅從之徒果係迫脅為亂者悉與釋放毋得濫及無辜欽此欽遵仰見我皇上好生之德配合天地故雖窮凶極惡之人尚垂矜貸臣等敢不祗承德意緣搆亂之時寧夏本城官軍士庶人等仰面事讐相率朝賀接受賞賜聽從使令綱常為之蕩然名教為之掃地言之痛心切骨但干礙人衆遵奉明詔分釋脅從悉皆放免關過賞賜亦不追究其後獲人犯夜不收申居敬等一聞周昻逆謀即有樂從之意殺人劫財乘機為亂當虐熖方張之時實此輩黨惡所致若欲比諸脅從之流則情重法輕非禁姦止亂之道但舉事之日方才預謀義兵一動當即戢止比之元謀首惡似有不同數內古興兒初雖凶黨後乃聽受仇鉞使令傳話鄭卿捉賊若有去逆效順之意尤千係尤全親男王得成于伏佑係事後選補俱非原謀之數比之申居敬等又似不同平虜城官舍徐欽程保等一十一名聽信夏琳之調相從謀逆之舉路自外來情非迫脅但伊事後方才入城不曽相助殺掠除徐欽脫逃正犯程保等十名俱已誅斬其家屬丁口與申居敬等家屬俱各拿獲發仰寧夏靈州等處監候奏請定奪及照安化王府儀賓謝廷槐雖不知情係置鐇孫壻難以獨留故土教授髙元吉職在輔導顛而不扶焉用彼相通合解京發落再照事內納粟都指揮僉事胡顒領軍在外不顧諸將倡率士卒潰散回城寧夏左屯衛所鎮撫陳淮百戶阮宣聽齎偽旨召調將官寧夏前衛鎮撫楊綱奉承賊意尋捉分守官員揆以春秋誅心之法難照常人脅從之例管糧通判張江本以章縫之流忍聽逆賊之用情雖出於脅從義則難齒仕籍臣等所見如此伏望聖明大奮乾斷乞敕廷臣會同三法司詳議除何錦等正犯外合無將申居敬等明正典刑梟首於寧夏地方示衆其家屬丁口與程保等家屬俱免解京就彼押發南方煙瘴地面充軍隨住庶使情法兩盡可以警戒將來古興兒等四名應否俯從輕典并見解儀賓謝廷槐教授髙元吉在任都指揮胡顒所鎮撫陳淮百戶阮宣衛鎮撫楊綱通判張江等通併原情議法奏請明示竄謫庶幾少存無將之戒用防不道之萌臣等又竊思皇上御極以來何負於宗藩何負於武臣而置鐇何錦等忍為此事以厪宵旰之憂若一槩從寬不究誠恐釀成姑息之風重貽將來之害唐末覆車可為明鑒况好生者天子之德執法者人臣之義義有不共戴天法固難於寬縱此外果有原謀及殺人重犯待後事發明白具奏施行及照各犯脫放見監重囚四十四名燒毁各衙門文卷中間恐有别弊亦合挨究處治及置鐇册印冠服儀仗地土何錦等財産及遺失敕印關防財物等項俱另行為此今將各項人犯除先已誅斬病故及監候外脫逃未到徐欽王九兒等各拿解無干周升長等各釋放見在置鐇等連的親眷屬并何錦等各家屬分作三起差委陜西寧夏都指揮黃正鄭卿等管領官軍伴送押解其宫眷仍選取良善婦人看守供送飯食沿途軍衛有司添撥軍兵民快防護到京奏請定奪外緣係起解反叛賊冦事理為此謹題請旨一為災傷事題為災傷事節據寧夏左右前中護等衛左右中前等千戶所百戶李旻常泰等下屯種軍餘畢政朱選等各連名告稱本處地方去嵗蝗蟲生發食傷田苗不得收成正德五年四月以來各人布種夏田麥豆正當長茂結實之時天降霪雨連綿不絶熱氣濕蒸以致小麥生丹枯死豌豆亦被二蟲食傷大麥粃細無收見今軍民難過各家老稚男女尋挑野菜充飢度日切思徴糧在邇無從措辦告乞分豁等因到臣已行鎮巡衙門勘驗所告虛實災傷輕重明白行來以憑會處具奏去後未報臣親詣前項地方督同各該大小官員再三詢訪委的寧夏一鎮連年為因徴科繁急人民巳是困敝去嵗夏秋田苗蟲傷今年被反賊殘害加以敵衆不時入境搶掠愈加狼狽臣偕鎮巡等官宣布德意極力撫綏猶恐不能安業不料又遭霪雨蟲傷收成無望若再追徴稅糧救死扶傷之人奄奄喘息其何以堪未免逼令逃竄將來事變猶有可憂如蒙伏望聖慈憫念極邉地方傷殘困苦軍民乞敕該部計議上請合無不拘常例核勘特降綸音將寧夏一鎮前項該徴夏糧早為蠲免除豁以安人心以靖地方不勝幸甚緣係邉方災傷事理未敢擅便為此具本謹題請旨一為更易主將以撫安人心保障地方事題為更易主將以撫安人心保障地方事臣節該欽奉敕事寧之日仍要更易部領申明號令俾其經久無患欽此欽遵照得寧夏經變之後反側未安政務懈弛將欲一新號令全在部領得人除將各該領軍坐堡掌印管屯等官會同鎮巡從公推訪委用應更調者更調應黜革者黜革各施行外竊見新任總兵官署都督僉事楊英素諳邉務亦善治兵比嵗追勦敵衆多有斬獲但初為副總兵領軍在楊顯堡按伏一聞何錦等搆亂所統官軍潰散回城不聽約束致將旗牌賈欽祖打死本官只得罄身同指揮尹清奔往廣武隨即過河奔至靈州其後資藉曹雄史鏞黃正韓斌諸將兵力邀取船隻卒成桑榆之功彼時朝廷因見鎮巡官員俱被殘害就近推擢俾總戎務固為相應但本官喪失之餘士心不附蹤迹孤危欲御之以嚴則猜忌轉深欲撫之以寬則委靡不振臣自到寧城以來耳聞目擊衆口沸騰委的難以行事且極邉重鎮大亂初平撫定安輯全賴鎮巡仰惟皇上神謨妙算洞見萬里近日擢用新任官員如太監張弼之安靜不苛都御史馬炳然之亷平得體參將保績之志節兼優遊擊史鏞之才略出衆副總兵仇鉞世守武臣威名素著近又新建竒功一方兵民倚以為重凡此皆極一時之選而主將之任機要所關尤在得人况今山後之敵勢方張河套之情形未定遇警調度殺敵正係總兵之事傳曰地利不如人和身為主將坐失人心鋒鏑之間小有動搖誠非細故但人才難得如本官者用之寧夏固非所宜用之他鎮則無不可伏望聖明俯念邉方事重乞敕兵部再加訪察議擬上請合無將楊英取回京營或改調别鎮另推謀勇著聞士心素附邉將一員代總戎務與張弼馬炳然等各久任責成庶幾兵政一新經久無患臣責任重大茍有所見不敢緘默緣係更易主將以撫安人心保障地方事理未敢擅便為此具本謹題請旨一為撥補軍伍以實邉備事題為撥補軍伍以實邉備事據寧夏鎮巡等官太監張弼等呈會議得本鎮興武營新設守禦千戶所該設旗軍一千餘名今止有官軍四百一十五員名况本所極臨邉境外控河套內與花馬池清水營聲勢連絡防禦邊敵係是衝要緊關去處必須軍馬數足易於防守今查革爵安化王府原有隨侍百戶李蕃一所總旗二名小旗十名軍人一百名內除百戶李蕃同謀反逆巳就誅戮及逃故軍士九十一名外見在總旗二名小旗十名正軍七十九名餘丁成丁一百八十四名不成丁一百一十七名相應撥補合無將前見在旗軍盡數改撥興武營守禦千戶所當軍食糧餘丁亦隨營居住貼軍當差逃故二十一名行文原籍清勾前來本所補伍呈乞轉奏施行等因到臣會同欽差總督軍務御用監太監張永議得寧夏東路花馬池興武營二處俱係極邉沙漠敵衆入冦中原必由之處為因軍伍單弱先年往往失利已該臣一清總制邉務之時奏請將花馬池千戶所改設寧夏後衛興武營改設守禦千戶所各添撥軍人住種防守今花馬池巳添新軍五千餘名似勾保障惟興武營止撥到充發等項軍人數又不敷隨到隨逃不得實用武備依前單弱誠恐將來再敢窺伺侵犯少有失利貽患非輕今據鎮巡等官太監張弼等呈乞具奏要將革爵置鐇遺留隨侍一百戶旗軍改調前項地方充軍以實邉伍一節委的相應臣親在寧夏地方詢訪相同故敢冒昧上陳伏乞聖恩憫念極邉重地防守為急乞敕兵部議處合無將置鐇隨侍一百戶所旗軍盡數改撥興武營守禦千戶所當軍食糧餘丁亦隨營居住貼軍當差逃故之數行文原籍官司清勾前來本所補伍以嚴武備以壯邉城用消將來窺伺之患非惟邉方有幸實亦陜西腹裏軍民之福也緣係撥補軍伍以實邉備事理未敢擅便為此具本謹題請旨一為分别將官功過事題為分别將官功過事行據巡按陜西監察御史周廷徴呈稱奉臣等帖仰會同都布按三司委官即便吊查各該鎮巡等官各奏本內事情務取歸一何官發蹤何官運籌制勝領何項人馬得獲前功作急呈來以憑具奏毋得回護奉此遵奉會同陜西都布按三司都指揮僉事陳善參議許莊副使黃繡調取陜西延綏寧夏鎮巡等官曹雄等節次題奏過平定反賊何錦等始末案卷并節據各該將官開報手本查得正德五年四月二十八日據延綏總兵官馬昻差總旗紀順口報有領軍見在靈州等處截殺副總兵侯勛遊擊時源差人報稱反賊安化王并丁廣等被本鎮遊擊仇鉞等捉獲周昻自刎身死何錦走出大壩有總兵官曹雄等計議進城平亂等情該職看係捷音除具題訖五月初三日又準總兵官馬昻手本開稱有寧夏副總兵楊英差靈州夜不收張道同口報有反官何錦丁廣領了三千人馬往大壩看守不在本月二十一日楊英密地差人齎書與遊擊仇鉞二十三日仇鉞將首惡周昻等殺了捉了安化王二十四日楊英會同參將閻綱協同守備都指揮黃正保績史鏞各領兵馬過河等因該馬昻會同鎮守太監孟山巡撫都御史黃珂看係鄰土捷音亦各將情具題及用手本備行到職又查得五月初八日據今升副總兵仇鉞手本開稱正德五年二月初一日先該鎮守總兵官薑漢等會議手本為聲息事行移鉞統領遊兵三千員名分布迤西大壩玉泉等營副總兵楊英統領竒兵三千員名分布楊顯等堡各按伏四月初五日有寧夏都指揮等官何錦周昻丁廣同安化王置鐇叛逆將太監李增總兵官薑漢少監鄧廣請去飲酒何錦等帶領同謀指揮千百戶張欽等將李增等殺死何錦等又去各衙門將都御史安惟學少卿周東都指揮楊忠等亦各殺死及將各官原領制敕符驗印信關防旗牌家財盡行搶去無存分守參議侯啓忠知覺脫走次日尋獲肘鐐監禁管糧通判張江亦被捉拿拘收倉庫鎖鑰燒毁各衙門文卷簿籍脫放見監罪囚掣取渡河船隻安化王偽設官職本日何錦賺調鉞等兵馬至初六日領兵到城楊英逢遇指揮尹清同去廣武渡河靈州駐劄安化王何錦等又將慶府并各郡王將軍中尉家財逼索散軍節出令旨榜文扇惑人心鉞欲要召人刺殺但原領兵馬先被何錦等盡行拆散不容一人跟隨外無援兵恐獨力難成本月初八日得報總兵官曹雄統兵前來征勦先發都指揮黃正遊兵三千靈州住劄行令黃正與副總兵楊英守備史鏞等撥人沿河巡邏設法邀取船隻十四日楊英等領兵先用馬步水手二百餘人齊渡過河與何錦等原差看船官軍百戶薑永等對敵奪獲大小船一十七隻軍器等件本月十八日鉞家人仇書童在於靈州看收同尹敬等回還密藏副總兵楊英等書信準總兵官曹雄手本行移鉞召集義士約期裏應外合又令協同孫隆將大小二壩草垜燒毁及調集陜西各路兵馬并東西參將等官閻綱保績等大軍於二十日俱至靈州參將馮禎協同孫隆官軍前來大壩臨近城堡駐劄何錦等心生懼怯二十二日總兵官曹雄發把總指揮李禎等下官軍一千員名順河前去鳴沙州駐劄有河北巡視百戶薑永瞭見灰塵走報安化王議令何錦丁廣等領兵前去拒守大壩周昻在城護守鉞乘虛密切分付都指揮鄭卿等在外擒捉鉞在城密令心腹官舍家丁人等召撫官軍在家潛伏二十三日鉞詐病睡床周昻前來看望鉞撲出用刀將周昻亂砍身死領人前去將安化王并同謀將軍儀賓人等陸續擒斬拘羈又密差人前去大壩通知鄭卿等督軍就將何錦丁廣魏鎮等擒斬張欽等脫走及將黨惡家屬捉拿監候二十五日總兵官曹雄統兵前至寧夏城鄭卿等捉送何錦等赴軍門督同鉞等安撫軍民人心妥貼地方寧靖等因又查得先準鎮守陜西總兵官曹雄并寧夏副參守備等官楊英閻綱保績史鏞等各手本及各官奏題過本案卷內開報擒斬何錦等緣由逐一查對明白俱與仇鉞先報手本內情節亦各相同又查據寧夏參將馮禎手本開稱六月初三日禎於寧夏城領兵回至陳俊堡訪知首惡反賊張欽脫逃在堡親督官軍將張欽拿獲解送總兵官楊英處監候等因近又查準寧夏總兵官楊英手本開稱蒙欽差總督軍務御用監太監張永見得寧夏黨惡未盡地方未寧三次差遣指揮旗牌等官楊義山玉王瓛各授以成算齎捧鈞帖榜文前來寧夏指示鎮巡等官一遵號令將未獲同謀黨惡申居敬等六十二名程保等一十名俱各擒斬及將各犯家屬俱捉監候等因亦報前來查勘間今奉前因除將有功大小人員另行造册奏繳外今將查勘各官奏題過擒斬反賊何錦并革爵安化王置鐇父子人等始末來歷并各官功次輕重緣由理合具呈施行等因備呈前來案查先為前事看得各該守臣各呈原奏本內事情多有不同會案通行巡按御史周廷徴督同守巡官員查勘各官奏報功次事情務取歸一以憑具奏去後今據前因會同欽差總督軍務御用監太監張永議得置鐇何錦等背棄天常謀為不軌窮其逆志未可窺測皇上命將出師聲罪致討雖鼎魚假息不過斯須然兵刃所交未免玉石俱焚轉輸之苦復恐財力兩竭幸賴皇靈丕振聖武布昭各鎮將官同心協力旬月之間坐收偉績巳蒙聖恩或賜敕奬勵或就為升擢勸忠之典可為曲盡臣等切思各官勳勞有大小功過有多寡奏報之言未必皆實參評周廷徴所呈固巳得其情狀臣等復加廣詢博訪方悉其真看得鎮守陜西地方總兵官右軍都督府署都督同知曹雄以鄰境主將聞變奮興分布腹裏人馬拒守要衝徴調鄰境官軍揚兵討伐邀取船隻以絶渡河之謀榜示禍福以攜脅從之黨指畫以通仇鉞則內應克成權宜以用韓斌則土人斯附增中衛廣武之兵以捍其所欲攻燒大壩捲掃之草以攻其所必救凡此調度皆合機宜遂使叛酋倉皇而出義兵乘虛而起較其發蹤指示之功實出斬將搴旗之右遊擊將軍今升副總兵都指揮僉事仇鉞賺調入城迹雖可議潛謀結義心實靡他既而手斬元惡逆黨寒心襲執叛王闔城生氣奮臂一呼罪人盡得原情不失為忠論功何止掩過此二人者平亂之功當為一等但曹雄則有功而無過仇鉞則過少而功多分守寧夏東路右參將今升副總兵都指揮閻綱協同分守興武營今升右參將都指揮僉事保績分守寧夏西路左參將都指揮僉事馮禎協同分守廣武營都指揮僉事孫隆守備靈州今升遊擊將軍都指揮僉事史鏞寧夏都指揮僉事韓斌陜西都指揮僉事黃正皆能嚴兵固守以繫忠義之心約期進勦以奪梟雄之氣內保績及寧夏右衛指揮僉事尹清各有祖母妻子在於鎮城不恤私家堅守臣節尤為可嘉寧夏都指揮僉事鄭卿始雖曲從逆賊之用既乃卒成擒賊之功協守延綏副總兵今升總兵官署都督僉事侯勛延綏遊擊將軍都指揮僉事時源逺提策應之兵實為聲援之助凡此數人論平賊皆與有勞語效力不能無異再照寧夏副總兵今升總兵官右軍都督府署都督僉事楊英釀鎮城之禍而先機失於禁防督邉堡之師而聞變不能約束大呼而潰三軍之心巳離奉身而逃七尺之軀僅免但其後約會諸將協謀討叛奉承法令擒賊數多斯亦不為無功要之不足掩過其餘有功官員多係聽從驅使臣等不能悉數除待巡按監察御史勘明照例造册奏繳外今將查勘詢訪過緣由具實開奏伏望聖明省覽乞敕該衙門查照施行緣係分别將官功過事理為此具本謹題請旨一為議處宗藩以防患將來事題為議處宗藩以防患將來事臣到於寧夏地方詢問官僚士庶軍民人等皆云革爵安化王置鐇叛逆之時逼脅慶王日逐隨衆朝見跪拜從右門而入行君臣之禮將欽賜寶纛儀仗送與僭用又逼要金銀器皿等物一萬餘兩賞勞叛軍此固置鐇挾持叛將假借兵威迫之使然情非得巳而冠屨倒置亦甚矣及訪得置鐇平昔善營市利交通賓客又聽張會通王九兒等在府往來信其邪説妄生異志何錦等與之往來情熟貸其財以納級資其勢以害人鎮巡三司等官又多被其延接納其餽送動以賢王稱之此既不復禁防彼益肆無忌憚醖釀以成大禍蓋非一朝一夕之積言之可為痛心臣仰惟我太祖髙皇帝建立宗藩分布天下即成周大封同姓之意用以控制中外藩屏邦家凡親王建國之處郡王將軍以下皆其所統無事不聽其裁處無人不歸其約束凡有奏請事情皆須具啓親王與之轉達成法昭然千萬年之所當祗承而不敢失墜者也當置鐇反狀未露之時慶王若能先事禁防必不容其交通兵將邀結人心以成大亂及置鐇反形巳露之後慶府護衛儀衛司工正郡牧等所不下數千人若能仗義整兵嚴備以待密諭諸王共圖討賊播告鎮城官軍使之協心宣力戡定禍亂豈無忠義之士應召而興計不出此顧乃甘心屈辱聽賊指使致將朝廷法物棄而不保又終無一言奏報殊負皇上展親之仁有失諸侯維藩之義其輔導官員豈得無罪臣等又竊聞各處宗藩與文武官員交結往來及招誘邪説之人在府恣肆出入者比比有之履霜堅氷漸不可長近者鎮巡之禍起於府第杯酒之間可為殷鑒伏願皇上念祖宗創業之艱難思今日守成之不易存大義於親親之內謹事機於未發之先合無降敕慶王少示警戒其內外輔導承奉長史等官亦合提解赴京明正其罪别選相應官員代補其任仍申明舊章通行天下王府但有如置鐇私通賓客交結文武官員及招誘隂陽術數一切左道邪説之人在府出入往來者即便痛思改過嚴加禁絶親王建國去處郡王以下悉聽約束郡王建國去處將軍以下悉聽約束如有前項違犯事情輕則懲戒禁止重則具實奏聞區處除既往不究外將來不行悛改事發大義滅親不宜輕恕輔導官員不能匡正又隱匿不行具奏者提解赴京從重處治內外文武官員所過地方止許朝見親王其郡王獨自治國去處方許朝見此外敢有似前與郡王將軍中尉儀賓等府杯酒往來接受餽送禮物者拿問治罪罷職不敘如此則界限分明禮法嚴整邪人無由而接則邪念無自而生非惟地方之幸亦宗藩之福也臣等切見皇上嗣位以來於天下王府禮義隆洽過於先朝而置鐇乃敢負義背恩搆此大變不勝忠憤激切故敢冒昧上言緣係議處宗藩以防患將來事理未敢擅便為此謹題請旨一為遵奉敕諭起解後獲反逆賊冦事題為遵奉敕諭起解後獲反逆賊冦事據寧夏鎮巡等官太監張弼都御史馬炳然總兵官楊英御史周廷徴各呈為衆官反逆殺死鎮巡大臣事將後獲馮經等取出會同重復審據馮經供年三十六嵗寧夏左屯衛指揮僉事管屯正德五年四月初三日有巳故指揮丁廣請經在伊家飲酒彼有何錦等三十餘人同飲是經問這酒因何有何錦回説你到初五日跟我去便知等語各散次日有今在官徐文孝故兄充軍千戶徐欽與巳解何錦巳殺周昻巳故丁廣同革爵安化王置鐇謀反差巳殺儀賓夏琳去平邊城謀約徐欽等一十二人前來舉事各允本月初五日經在巡撫察院稟事只見丁廣等帶領人馬入院將安都堂楊都司殺死經才知謀反事情丁廣就呌經去殺清理屯田周少卿比時經因恨周少卿比較要增屯地當就取刀同到按察司是經用刀向周少卿砍訖二刀身死彼有在官夜不收閻添孫潘六十即潘成乘亂跟隨丁廣亦各用刀亂砍閻添孫潘成又用刀故將跟隨周少卿書吏屠成嶽寧亂砍身死俱剝去衣服後衆夜不收因怪在官指揮李杲平素刻剝聲言要殺本官知覺躲在安化王府內彼衆夜不收將伊家財亂行搶訖李杲告鳴置鐇却將寧夏衛官庫原該李杲收掌賞剩冬衣官布一千五百匹給與伊陪還家財本日未時徐欽等方才到城常在置鐇左右侍衛初六日置鐇要封何錦等官職喚到在官銅匠楊茂鑄造銀關防一顆令在官刋字匠王得洪篆寫討賊大將軍字樣在上令先未故銀匠王時雍剔鑿篆文完備後挂與何錦就封為大將軍又封徐欽為都護十一日置鐇令在官承奉司寫字人管珣已殺孫景文撰成省諭文書謄寫刋成板榜比時伊男管律在傍看寫二十日置鐇令徐欽挑選平邊城人馬一百名來用徐文孝亦在數內至二十三日來到寧夏城外得知周昻等被誅隨即帶領人馬回至姚福堡有今升仇副總兵著落平邊城王指揮差人到堡將原約百戶朱洗等殺死徐欽知覺帶同徐文孝各騎馬匹稍帶氊衫布帳逃躲在洪廣堡北邉沙窩內要出境外投順敵衆至二十六日行至地名蘆溝兒忽遇敵衆三騎追趕前來有徐文孝乘馬藏躲徐欽被敵衆殺死奪去馬匹衣服後敵衆退去徐文孝將徐欽所遺原戴馬尾帽一頂在傍拾回又尋獲原棄馬匹氊衫布帳回到韓信營潛住今蒙總督張太監差人督同夜不收趙汝舟等訪知經并將閻添孫潘成連楊茂王得洪管珣管律并李杲及徐文孝陸續擒獲有徐文孝就指引前去蘆溝兒尋見徐欽身尸朽爛止餘骸骨的係徐欽原尸取其頭骨并氊衫布帳馬尾帽一同送官今蒙審供是實及審閻添孫等八名各供與馮經供同理合照例起解呈乞施行等因到臣會同欽差總督軍務御用監太監張永議照前事已將先獲犯人申居敬等并何錦等分作三起差委都指揮黃正等先行起解赴京具奏外後獲馮經等未經查審徐欽係首謀重犯已被殺死恐有不的已行鎮巡等官查勘會審去後今據前因參照犯人馮經在先飲酒之時雖不知情及至臨期明知丁廣等謀為反逆殺害鎮巡大臣却乃依從指使挾讐同閻添孫潘成將公差少卿周東并書吏屠成嶽寧殺死正係凶惡黨類法難輕恕楊茂偽鑄關防王得洪偽篆討賊大將軍字樣事干謀反比之偽造印信情罪尤重管珣依聽謄寫告諭文書刋榜傳播扇惑人心情雖脅從其事亦重指揮李杲雖不與馮經同謀但因夜不收搶伊家財聽從置鐇指以陪賞為由將官布一千五百匹盜收入巳於法有違除將李杲行鎮巡官取問應得罪名徑自具奏發落其馮經等家屬與前解犯人申居敬等事體相同應否俯從輕典臣等未敢擅擬已行該衙門各捉拿并管律監候外今將馮經等正犯照例差委指揮解鉞等帶領軍人押解赴京與何錦等併問奏請定奪緣係遵奉敕諭起解後獲反逆賊冦事理為此開坐謹題請旨一為溥恩典以恤邉軍事題為溥恩典以恤邉軍事查得近該兵部題為存留備冬官軍事奉聖旨是陜西地方有事備冬官軍著仍舊存留聽調但念他每上班日久十分艱苦寧夏各城并延綏甘涼各鎮官軍亦皆艱苦可憐各賞官銀二兩在城官軍除從逆外有能悔罪效順出城的也各賞銀一兩户部再差官運送太倉銀三十萬兩著各該鎮巡官照名給散餘剩銀兩就在陜西官庫收貯以備各邉糧餉之用欽此欽遵照得陜西延綏寧夏甘肅四鎮官軍委多驍勇慣戰况世受國恩咸願效死盡力但因地方多事終嵗征調無休致令人馬困敝加以該管官員不善撫恤糧賞既不時給又行剝削無厭以此隊無完軍軍無完衣愁苦之狀所不忍言皇上仁同天地特加賞賚以供衣裝之用聞者孰不舉手加額仰戴聖恩但三鎮及寧夏各城官軍俱巳沾惠獨寧夏在城之人為因彼時反逆未平拘於出城之文未得均沾恩典切緣置鐇何錦謀逆之時寧夏在城官軍除同謀逆黨外近據總兵官署都督僉事楊英查報聞變出城止有官旗軍舍都指揮等官鄭亷等五十二員名其餘盡被脅從在內但遊擊仇鉞一舉義兵隨即去逆效順相助滅賊可見前日從逆非其本心今惡黨俱巳擒斬見在多係無罪之人大變之後憂疑未釋似宜少加矜恤以安其心伏望聖慈一視同仁憫念寧夏鎮城官軍近被反賊逼脅殘害之苦合無每員名照例各賞銀一兩仍於原送官銀內取給則彼萬死一生之餘感戴朝廷再造之恩出於尋常萬萬矣緣係溥恩典以恤邉軍事理未敢擅便為此具本謹題請旨一為旌死節以勵人臣事題為旌死節以勵人臣事準巡撫寧夏地方本院右副都御史馬炳然咨據寧夏等衛申稱正德五年四月初五日寧夏反賊何錦等作亂之日有陜西都司都指揮僉事楊忠正在巡撫都御史安惟學處稟事偶見反賊丁廣等持刀值衝前來要殺安都堂當被楊忠當堂大罵賊狗怎敢犯上謀反等語隨被丁廣等亂砍身死剖腹刳心又有寧夏衛納級都指揮李睿本日一聞反賊氣忿不過前去安化府前意要衝入因是閉門大罵悖天逆理反賊如何這等欺公罔上日後凌遲碎割等語致被門外夜不收申居敬等亂砍亂刴身無完膚而死又有寧夏右衛百户張欽被何錦等嗔怪本官不肯心悅臣順説知革爵置鐇於四月二十二日要拿來殺害本官知覺潛從西城牆溜下走到雷禍堡遇見反賊百戶雷英得知前情射死除行寧夏等衛覆勘相同具結回申前來切照置鐇何錦等作亂之日舉城之人無不被其逼脅朝賀使用而都指揮楊忠李睿獨能挺身罵賊不屈以死百戶張欽不肯臣順卒以殞亡此忠義之臣氣節凜然孤立若不别加恩典何以激勸人心合無具實上聞一體起立牌坊以表其門廬仍量升官職以廕其後裔未敢專擅為此合咨前去煩請照詳施行等因到臣照得寧夏大鎮素稱文獻之邦不幸為反賊汚辱闔城官軍士庶除逆黨外其餘盡被逼脅心雖不從外則順服禮義亷恥為之蕩然獨都指揮楊忠李睿以罵賊而死百戶張欽以逃難而亡使人人皆然何錦等數輩安能孑然稱亂是其忠憤激烈誠可嘉尚臣聞自古聖帝明王於死節之臣必加褒恤所以勵臣節而立大間也伏望聖明憫念楊忠等三人死於逆賊之手乞敕該部議奏或表其門廬或别為優恤仍將各應襲兒男量升一級以泄九泉之忠憤以勵天下之臣節其於名教不為無補緣係旌死節以勵人臣事理未敢擅便為此具本謹題請旨一為十分緊急缺乏糧料馬草事題為十分緊急缺乏糧料馬草事準巡撫寧夏地方本院右副都御史馬炳然咨會同鎮守太監張弼總兵官署都督僉事楊英查得寧夏在城五倉見在銀糧不勾主兵三箇月支用花馬池見在糧不勾主兵二箇月支用料草全無靈州糧不勾主兵二箇月支用馬草全無中衛糧料不勾主兵三箇月支用廣武營糧料不勾主兵二箇半月支用興武營糧雖頗有草料全無其餘應該按兵截殺去處數多糧料草束一切缺乏此惟計算主兵支費之數若徴調客兵到彼愈加不足即今賀蘭山後敵衆不時近邉窺伺河套之賊近據延綏報稱俱往西北去訖寧夏正在延綏西北恐其窺知寧夏反變之事意欲乘隙侵掠即目便是八月秋涼倘或山後河套兩路之冦或深入為患或約同夾攻未免調集客兵人馬臨時糧儲缺乏馬匹不敷倉卒之間憑何為計查得先為緊急聲息預備兵糧等事該職等奏蒙戶部運送銀五萬二千六百八十三兩有零四川運銀一十五萬兩俱纍催不曽解到後又亦為前事該戶部又運送銀一十萬與督理糧草都御史徐以貞前來接濟今止運到五萬兩其餘五萬亦尚未到即今米價騰貴每銀一錢止買粟米一斗四五升止買豌豆二斗止買小麥一斗兼以年穀不登客商稀少日貴一日不言可知况布政司原派舊糧俱巳停徴新派夏糧俱各運足亦不勾用查得先年但遇邉儲缺乏許令召商開中雖則易於集事其間作弊多端已蒙停止似難復議但舍此一途不過拘刷富家收買今寧夏富家前該都御史王一言已刷買一次後該都御史安惟學又刷買一次職等目下又要刷買一次拘刷巳盡情理難堪將欲差官糴買而防守地方為重顧此失彼將欲一切給軍以銀而或時乏賣銀不可食職等處此大壞極敝之餘百孔千瘡救之不暇晝夜憂惶計無所出萬一失誤地方雖將職等誅殛無遺亦無益於事矣合無轉奉乞恩再運銀數十萬兩就選委有才智著實幹事都御史一員前來設法措買糧草再差戶部有風力屬官一員前來催儹布政司稅糧并未運銀兩庶得專理其事易於集辦有備無患攻守有倚若止靠巡守官與管糧官整理則恐事緒多端不肯久住實幹徒費文移不能濟事為此除具題外合咨煩為照驗施行等因到臣照得寧夏一鎮東西中三路糧料草束委多缺乏而東路逼臨河套乃敵衆入冦腹裏必由之處糧儲缺乏尤甚且如花馬池每年遇冬有警常調延綏遊兵三千在彼按伏興武營遇冬常調寧夏竒兵三千在彼按伏今二處料草全無花馬池糧亦止勾主兵兩月支用倘或今冬踏氷入套擁衆近邉徴調客兵人馬將何支給既無糧草難以駐兵敵衆愈無忌憚萬一邉城失守貽患腹裏地方守臣何以辭責且寧夏鎮城大變之後人心易於動搖見在銀糧亦不勾主兵三箇月支用根本之地如此他尚何望况山後之敵不時窺伺誠恐兩路受敵尤難支持所以鎮巡官員因見事勢窘迫煩瀆聖聰乞討官銀乞差都御史及户部屬官前來專理其事情詞懇切蓋亦不得已也但陜西邉儲之乏不獨寧夏為然內而固原靖邊外而延綏甘肅在在空虛見今河西莊浪涼州一帶地方敵騎充斥餉道阻塞公差人員多從西畨地面迂路而行近據莊浪參將魯經呈稱敵衆深入迤西土人居住地方攻尋窖藏糧畜聲言要搶西寧沿邉境外墩臺俱巳丢棄烽火不能接舉臣方經理寧夏事務聞之不勝憂懼意將徴調陜西延綏兩鎮精兵萬餘與本鎮官軍分路夾攻痛加誅勦以祛邉患亦因彼處邉儲空乏難以輕動又漢中流賊嘯聚密邇郡城師老財竭迄無成功首尾受傷中外俱困事勢至此必得大有區畫之才而又假以便宜專制之柄乃克匡濟決非巡守等官所可勝堪臣任總戎務軍馬所至只合責成各該巡撫巡守管糧官員供給但今巡守管糧官既多坐視無為巡撫官員又復倉皇無措臣若不言日後誤事之罪雖死難贖伏願皇上軫念陜西三邉重鎮國家安危所係乞敕廷臣會議合無俯從寧夏鎮巡官員所奏再發官銀數十萬兩與同近日解送寧夏各邉并軍前合用銀兩專備整理邉儲簡命在京部院堂上官一員加以重權俾之督理并帶有才力部屬官三員趂今收成時月河水未凍之先分投整理延綏寧夏甘肅三鎮邉儲陜西沿邉及漢中地方責付巡守官整理布政司管糧官專一往來催督各府州縣今年夏秋邉糧俱聽差來大臣裁制務待邉儲處處充實方可具奏回京邉儲既充遇有敵警愚臣得以隨宜調遣各路官兵防遏誅勦庶寬宵旰西顧之憂不獨地方軍民之幸而巳臣又切思經畫邉儲不過招商派買二端而巳招商易於集事姦弊或不能無派買纍民暗陪怨讟有所不免兹欲救目前之急不須避招商之嫌於商人增一分之利則公家有一分之益前此招商多被官豪勢要託名報中致蒙停止但舍此一途而拘刷人户糴買緣地方時值道里逺近不同計算腳程欲不纍人則須髙其價省價於官而斂怨於民又非朝廷綏輯邉人之意也臣愚請敕差來大臣不拘招商派糴隨宜區畫俱要嚴加禁革姦弊不許勢要報中其舊報糧草商人納完久未給價雖有詔書明文所司猶稽於奉行蓋不止畏罪避嫌實因官銀無積之故亦須查明處給庶幾近悅逺來商販填委官事可集不然直待事情緊急竊恐招商則無肯應糴買則無從出不得巳而至於穵運陜西之民將不堪命況腹裏倉廩空虛無可穵者雖有巧智無善處之術矣臣誠愚昧不知忌諱干冒天威無任隕越待罪之至為此具本謹題請旨一為改調管糧官員事題為改調管糧官員事照得陜西各府州縣夏秋稅糧馬草分派運送各邉以供軍餉先年設有管糧參政一員專一督理如參政王琰安惟學輩不時往來巡歷比較催徴有司官吏憚其嚴明不敢偷安誤事近該參議管糧夫官無大小茍得其人皆可取辦近該巡撫寧夏地方本院右副都御史馬炳然咨稱山後敵衆不時出沒套內賊蹤又往西北移營防禦之計不可不慎今花馬池興武營料草升束皆無各邉倉分見在銀糧不勾主兵二三箇月支用未聞管糧等官親歷何處倉場設一謀一策為一人一馬之費參議許莊雖不知能幹與否未見著意邉儲依時巡歷地方似此官員若雖留幹事終難克濟合無另推舉著實幹事官員前來管糧替回本官量才别用庶能共濟邉事等因備咨到職查得陜西各鎮糧儲缺乏不止寧夏為然布政司管糧官例該督催八府糧儲以供各邉之用不止寧夏一鎮是其責任況今西有強敵之侵南有流賊之警督理邉儲政務之大莫急於此非得才力有為實心幹事之人安可倚賴參議許莊篤實有餘風力不足用之腹裏或有可取邉方軍餉非其所長直待失誤事機罪之無益臣博訪得陜西苑馬寺少卿陳璘陜西西安府知府陳祥俱勤勵幹固素著風采使當前項責任必有可觀伏願皇上憫念邉方多事之秋軍儲為第一重務乞敕吏部訪察議擬將參議許莊改調别省仍於陳璘陳祥內上請簡命一員暫升參政職銜令其盡心往來催督八府錢糧整理三邉糧草如果迹效顯著待後邉情寧息之日具奏升用仍照近例止選參議一員管理臣以地方安危所係利害切身不避煩瀆聖聽無任悚懼激切之至緣係改調推用管糧官員事理未敢擅便為此具本謹題請旨一為缺官催辦錢糧刑名等事題為缺官催辦錢糧刑名等事準巡撫寧夏地方本院右副都御史馬炳然咨會同鎮守太監張弼總兵官署都督僉事楊英查得寧夏一鎮有王府宗室有七衛三所六驛遞八十餘處營堡倉場事頗繁難糧草支費亦不為少近遭大變之後人心殆不如前禮義稍疏於昔各衙門卷簿盡被反賊燒毁夤緣作弊爭訟倍多況賀蘭山後敵衆不時出沒河套之賊又移營向寧夏方位防禦之計至為緊急今通查花馬池興武營及寧夏在城等緊要去處倉場見有銀糧不勾二三月主兵支用料草甚至升束皆無此項軍儲例該都布按三司分巡分守管糧管屯官整理缺乏失誤罪有攸歸今未聞各官親歷何處倉場設一謀一䇿為一人一馬之費萬一失誤軍機豈不一槩負纍若再靠前項官員幹事誠恐因襲故弊難以成功查得先年曽設按察司僉事一員常在寧夏居住管理錢糧刑名後奉事例裁革以後大小事務俱職等整理雖則大事不敢疏略至於小事亦有不周竊思職等邉方鎮巡官之責重在軍馬城池防姦禦侮與夫錢糧刑名等事之大經大法提綱挈領張主于上耳至於條分縷析上流下接職在三司今必得按察司官一員分理庶事則上下相維共成公務伏望轉奏合無暫設按察司僉事一員常在寧夏居住聽職等提調收放糧草問理刑名往來本鎮巡歷禁革各項姦弊不許腹裏鎮巡巡按衙門擅便差委但事干邉務比之腹裏事情不同若照常例推舉一則恐其到任稽遲一則恐其不知邉事宜從於陜西附近見任官內有才幹風力者訪得實疏名奏請擢用齎憑到任管事庶濟目前之急便益等因備咨到臣照得寧夏大鎮錢糧刑名事務繁多雖有分巡分守官員常在腹裏相離邉方窵逺顧藉不周所以先年專設按察司官一員常在寧夏居住管理各項事務專聽寧夏鎮巡官員提調後奉例裁革大小事務俱是鎮巡自行整理顧此失彼未免委托衛所官員代理以致弊姦橫生官軍受害今地方所遭大變錢糧缺乏詞訟繁興山後套中之敵兩該防禦鎮巡責任重大豈能親身庶務巡守管糧等官又皆畏難不來所以太監張弼都御史馬炳然都督僉事楊英議要照舊添設按察司官一員分理庶事一節不為無見節據寧夏等衛所官軍旗士赴臣訴告亦要添設按察司官以清錢糧姦弊所見皆同但事干邉務比與腹裏事情不同若照常例推舉恐其到任稽遲及不知邉事如見任分巡管糧等官雖有如無何濟於事博訪得陜西鞏昌府同知張檄慶陽府同知李賓俱通敏有為且久任邉方諳練事體相應擢用伏望聖明軫念邉事之難俯納守臣之見乞敕吏部查議合無暫設按察司官一員專在寧夏居住聽鎮巡官提調監放糧草問理刑名往來巡歷三路地方禁革各項姦弊不許腹裏撫按衙門輒便差委仍將臣所推張檄等二員再加訪察如果相應疏名上請擢用齎憑到任管事以濟目前邉務之急待後邉情稍寧事體巳定另為議奏裁革緣係缺官催辦錢糧刑名及推用官員事理未敢擅便為此謹題請旨一為調兵征勦犯邉敵衆事題為調兵征勦犯邉敵衆事案查先據分守莊浪等處右參將都指揮同知魯經呈為敵衆犯邉阻絶墩臺缺軍守瞭事照得莊浪地方自舊嵗十月到今敵衆犯邉侵擾會兵勦殺今驕不退連日糾衆深入過路往西徑奔土人居住黑臺西大同三岔等堡攻尋窖藏糧蓄聲言要割田禾去搶西寧地方節統官軍設伏歸路陸續擒斬首級及差人爪探臨境安帳晝瞭夜伏巳行開報甘肅衙門外查得境外該接烽火鹻灘等墩二十七座俱各丢棄無人止守順路墩臺欲便照前撥人守哨緣敵衆見在土豹嶺以裏分水嶺以外適中北自平嶺野遜嶺起至迤南四眼井台麻水等處敵帳數多約敵萬餘逺近不等撒畜牧放相離到城一百二十餘里月無虛日出沒往來尋搶絶道不通缺軍往彼瞭望況本城人馬不滿三千實是兵寡力弱不敷支敵乞念地方為重早為處置增添兵馬前來併力勦逐便益呈乞照詳等因到臣看係緊急軍情巳經備行甘肅鎮巡及副參遊擊等官整槊人馬用心隄備遇有侵犯小則相機戰守截遏大則傳報鄰境官軍互相應援不可自分彼此失誤事機去後續據參將魯經呈為敵衆犯邉事正德五年七月初三日至初八日時不等節據東山墩舉放炮火隨據迤南破山口等處夜不收張山住等迤北打柴溝夜不收尹奉等各報敵衆壕邉瞭望行走備報看得敵衆不次前來探道與同甘肅遊擊將軍吳英計議恐入為擾當日分布在城并遊兵人馬於南北二路站堡屯莊設伏遇警聨絡互相策應各職整兵外十三日午時據古城兒夜不收馬欽飛報前來有一千餘騎穿戴明盔明甲執打藍白旗號從東山突出過壕奔路順河行來近城當會遊擊吳英各率兵馬出城間及據沙溝鋪夜不收王三走報已時分瞭見敵衆一百餘騎遇見迎接甘州公差使客千户孫鑑人馬攻圍備報職等各統見在馬步官軍合陳擺列前到沙溝鋪兒迎見敵衆分作三路納喊衝來職身先士卒就與交鋒不意將本職左腿射訖二箭馬匹射死有遊擊吳英頭盔射訖一箭不次衝攻數分數合又瞭見墩口有一塊劄營自午戰至申時職等申嚴號令各督官軍把總指揮陳鎧等敢勇當先衝入陳中鏖戰陳鎧被射數箭未傷皮肉遊兵把總指揮趙珍馬匹射死內千户魯儀吳倫等奮不顧命就陳斬首六顆奪獲戰馬軍器欲再前追又值天晚收兵回城敵衆當夜仍往原路出境十四日據夜不收陳貴探得敵衆離城不逺在於教場山後放馬登由塔兒山行走據此查得陳亡旗軍充伯赤等二名被箭射傷官軍二十五員名射死馬二十一匹走死馬一十三匹及據莊浪等衛千戶孫鑑等呈稱蒙領有馬官軍一百員名於本月十二日前去岔口迎接甘州公差使客行至杜家沙溝口忽遇潛伏敵衆二百餘騎穿戴明盔衣甲撲向大路交鋒被衆攻圍對敵射死軍人徐友亮甘州都司承差閻宗魁將馬夫葉泰捉拿本役將原背包本丢棄被搶行李站馬一匹騾一頭戰間有武勝堡按伏遊兵馬步官軍指揮包英等即時帶領馬步官軍三百策應其衆復回原路去訖查得被箭射傷軍人朱遷等五名射死馬八匹開呈到此照得敵衆久住在邉不時出沒或遣輕騎而東西剽掠或佯乏馬而誘我官軍顯是糾衆部落恃倚人馬衆大深入況其情變詐難測除整兵隄備及將斬獲首級奪獲敵馬器械劄發莊浪衛收養聽候解驗外呈乞照驗施行隨據甘肅遊擊將軍都指揮僉事吳英亦呈相同行間又據守備蘭州地方署都指揮僉事閻縉呈為敵衆出沒事內稱本年七月初一日敵衆一運從鹽場溝入境按伏指揮魏時領軍追趕對敵射傷軍人劉來同及將猴子山墩攻圍射傷墩軍張彥方張成陳九一等三名又至地名滚巴川等處將常哨夜不收馮六兒殺死蔣貴八無有下落等因各呈到臣為照河西地方莊浪紅城子起直抵鎮番永昌等處俱有敵衆住牧帳窩聨絡離邉不逺不時突入搶掠為患而莊浪涼州尤甚道路阻塞炮火傳報月無虛日先因境外該接烽火墩臺年久丢棄不守以致此畨肆無忌憚即今深入迤西搶攘聲言要搶西寧地方雖據魯經吳英各呈報暫獲首級數亦不多似無懲戒又將公差人役捉殺中間或有别項隱情除查勘外近又侵犯蘭州境界攻圍墩臺殺死應哨人役黠桀性成未可窺測觀其事勢必須廣徴士馬痛加誅勦庶幾後患可弭地方可寧但臣撫制以來一向經理寧夏事務未據甘肅鎮巡官員一字呈報彼中軍馬多寡糧草虛實及賊營離邉逺近俱難遙度止是莊浪守將節呈前因欲便調集大兵前去策應行據各倉場查得莊浪糧料草束俱巳支銷盡絶紅城子倉止有糧七千餘石料草俱無軍馬到彼將何支給已經選委蘭州衛指揮陳松管領蘭州靖邊二處挑選精健有馬官軍八百員名前去莊浪駐劄暫聽參將魯經調度遇有賊冦侵犯併力追勦截殺及不次移文甘肅鎮巡督同副參遊擊等官從長計議酌量本鎮兵馬多寡強弱如是力能捍禦保得不致失誤大事宜從照舊戰守互相應援截遏不可養患殃民倘或賊勢重大兵力不敷相應大舉誅勦就便計議進兵方略應調主兵馬若干仍計算見在糧料草束可勾主客兵馬若干支用會處停當作急行來以憑調兵約期行事其糧儲缺之去處查支官銀上緊設法糴買措置毋待臨期失措責有所歸去後至今亦未回報竊料此冦先被小王子人馬讐殺殘敗去年潛伏河套又被我沿邉官軍尋襲斬獲數多今冬或恐不敢入套但河西地方尋搶月久野無所掠氷橋結凍之後恐有窺伺蘭州靖邊之謀彼處軍馬數少通敵隘口頗多萬一乘虛而入則會寧安定狄道金縣地方難保不遭搶掠見今漢中流敵劫聚未息調去洮岷西鳯環慶等衛馬步官軍召募民壯番兵五千六百員名續又調西安四衛備冬下班管項官軍三千員名難便掣回沿邉兵備比常單弱又恐冬間踏冰過河套無所不備則無所不寡首尾受敵誠難支持宜趂今河水未凍套內無警將前敵驅逐逺遁以袪河西患害以免隴西內顧之憂庶幾遇冬可以專意防禦保守欲待甘肅鎮巡會議回文至日方才具奏緣道途阻滯不知何日方得行來不無延誤訪得莊浪外境蘇海圗北至明水湖一百五十里處處俱有敵營東至靖邊達喇蘇亦一百五十里可通人馬合無徴調延綏副總兵王勛統領竒兵遊擊將軍時源統領遊兵二枝共六千員名寧夏各項兵馬內挑選令西路參將馮禎統領共二千員名并陜西遊兵挑選二千及固原環慶靖邊蘭州等處官兵內各挑選亦共二千員名通共客兵官軍一萬二千分作三路一路從靖邊達喇蘇渡河一路蘭州渡河從定火城而進一路從紅城子莊浪官道而行會合參將魯經遊擊吳英涼州分守副總兵徐謙涼州按伏甘州副總兵白琮官軍人馬刻期分投出境追逐與境外之兵俱至蘇海圗土豹嶺斬石硤蘆塘湖一帶隨敵所向尋襲追殺直抵明水湖地方敵腹背受敵必然潰敗不支莊浪涼州之敵既以驚潰則鎮番永昌甘肅之敵不戰而自走矣振中國之威奪外夷之氣莫要於此然事干各鎮必得大將一員統領約束乃克有濟推訪得鎮西將軍總兵官都督曹雄各鎮將官素所推服伏望聖明俯垂省覽乞敕兵部參詳議擬如果可采早為覆奏上請行令臣照依前擬調集官兵請敕都督曹雄提督各路將軍軍馬甘肅鎮巡官統領鎮兵專備永昌以西地方用防敵衆西走衝突之患臣統領中軍官兵於莊浪居中駐劄調度策應必期成功以副委任敵既逺遁一面具奏一面班師以備河套行令該鎮將沿邉舊守墩臺查照修築撥軍瞭守傳接烽火及將邉外舊設蘇海圗巴勒章等城堡以漸經營修復屯住軍馬方可經久無患但各處糧料草東十分缺乏除蘭州靖邊等處已行巡守兵備等官查支官銀糴買備用但恐不敷其莊浪涼州地方雖節行甘肅巡撫查處猶恐緩不及事仍乞俯從臣近日擬奏簡命大臣前來督處邉務職任專一易收成效及行各該巡撫管糧等官趂時作急整理勿再因循推調以誤大計食足則兵強逺人不患於不服地方不患其不寧矣臣聞自古帝王之於逺人來則薄伐去則不追搗虛窮追誠非至計但今失穴之敵竊伏我邉東突西馳彼入此出迎之則不至去之則復來昔人所謂窮邊易以計破難用兵碎者也若玩時愒日兵力兩匱未免坐困中國況官路久被阻截貢餉不通河西重鎮似為外境貽四夷之侮關係匪輕臣不勝惓惓體國之至敢用昧死上言貪功喜事非臣本志天日所鑒臣不敢欺但兵貴神速事難預料旬月之間機會或異若命下之後糧草未備或敵勢稍退及套內别有緊急敵情另為具奏待有機可乘不拘何月日即照題奉成命行事庶免臨期論奏以為後時之舉緣係調兵征勦犯邉敵衆事理未敢擅便為此具本謹題請旨一為謝恩事奏為謝恩事節該欽奉敕得爾奏行至陜西地方差官出榜撫諭寧夏軍民人等及會同總督軍務太監張永案行寧夏鎮巡等官將反賊置鐇何錦等并的親家屬及續獲反賊查審造意根因首謀共謀脅從等第及各官原報功次事情同異各起解釋放又追收册印冠服儀仗等物籍沒家産財物入官仍將同謀夜不收擒獲各項事情俱有次第具見爾奉命在邉運謀效力勤勞可嘉兹特降敕奬勵爾其益殫心力以恤軍民以安疆場庶不負委任之重爾其欽承之故敕欽此欽遵望闕叩頭謝恩外伏念臣本庸愚先年叨承任使患病不能供職後蒙聖恩放回致仕幸得生全邇者復蒙起用適因寧夏有事敕使臨門不敢辭避星夜兼程前進行至陜西地方聞知叛逆已平但人心憂疑未釋節差千戶王臣百户韋臣齎領告示榜文前去撫諭臣仍兼程到於寧夏會同欽差總督軍務御用監太監張永處置各項事情此皆人臣職分之常别無功能可録豈意天地之量不棄微勞降敕奬勵臣內自循省增愧增懼但蒲栁之質易衰犬馬之年漸老感恩徒切欲報未能一寸之誠不敢自負臣不勝瞻仰感戴之至緣係謝恩事理為此具本謹具奏聞一為衰病不能供職乞恩放回休致事奏為衰病不能供職乞恩放回休致事臣先任前職總制陜西邉務正德元年十二月內因在邉感冒風寒致將舊患目疾痰疾舉發不能任事陳乞休致蒙準馳驛回還養病後因公事連纍提解赴京復蒙聖慈寬貸容令致仕臣感恩如天圖報無地方與田夫野老沐浴清化歌詠太平正德五年五月初二日該吏部公文開稱臣蒙起用本月初四日該錦衣衛舍人王諌齎捧敕書為因寧夏反逆事情命臣仍總制陜西延綏寧夏甘涼各路軍務臣時卧病在於直𨽻鎮江府丹徒縣居住聞此大變自念主憂臣辱非臣下辭避之時扶病強起星夜兼程到於陜西地方又欽奉敕旨提督經營及陜西各路人馬勦殺賊冦時寧夏反逆巳平復奉敕會同太監張永前往彼處撫安軍民處置各項事情除將應行事宜會本條陳次第具奏外緣臣章句庸才栁蒲弱質中年多病齒髮漸落今耳鳴如蟬目眩生花數步之間不能辨物又兼腰膝無力行坐跪拜十分艱辛稍加勞苦輒欲欹仆雖受恩隆厚不忍自棄而筋力衰憊不能自強況陜西三邉責任重大軍旅之事實非所長若猶貪戀榮祿忌避不言終恐僨事貽患雖死莫贖臣是以不避斧鉞冒昧自陳伏望皇上天地之量憐臣衰病放回照舊致仕臣得保全骸骨生還鄉里不勝感戴天恩之至緣係衰病乞恩休致事理為此具本謹具奏聞伏候敕旨一為易置守備官員事題為易置守備官員事案查先據守備洮州地方署都指揮僉事髙謙呈為土豪不悛造意聚衆截路白晝搶劫財物執刀打傷人口謀陷地方欺凌異鄉官員等事內稱被洮州衛指揮張綸倚恃土豪聚衆家人毁罵趕打搶奪衣服器皿要乞調守别項地方另推官員前來代守等情巳經批行分巡隴右道陜西按察司僉事張瀾會同布政司分守官提人勘問備招參呈定奪未報訪得守備都指揮髙謙委被指揮張綸挾制欺凌毁罵趕打不止一次緣洮州衛僻在萬山之中極臨邉境番漢雜處最難控馭髙謙奉敕守備乃被一屬官凌侮出入之間動輒受制行事之際不得自由體統乖違下人玩慢若不早為易置倘或番人侵境不能統兵出禦貽患非輕但彼處土豪官舍軍民交結番人生事害人者不止張綸一人若止照常例將京營及别鎮官員推補恐其不知番情又為姦豪之人所制博訪得臨州衛納粟都指揮僉事趙濟世出將門人心素附讀書守已俱有可觀岷州衛指揮使葉勳練達戎務諳曉番情久掌衛印行事無失乞敕兵部再行訪察上請合無將髙謙取回京營或改任别處守備於趙濟葉勳二人中推用一員守備洮州地方仍行巡按陜西監察御史將張綸一干人證提拿勘問明正國法庶使人知警懼不敢效尤後來官員可以行事緣係易置邉方守備官員事理未敢擅便為此謹題請旨一為處置邉儲事題為處置邉儲事據陜西布政司呈蒙臣批據山西陜西等處商人李朝用等狀告前事仰布政司查去年總制衙門曽否奏開所告殘鹽有無明文行到及查勘合已填若干未填若干今告要將原報未納完糧草準令上納完足填給勘合一節有無相應計處停當呈報定奪蒙此案查正德四年七月初六日抄蒙總制尚書才鈞帖據固原并山西平陽等府衛商人黃河等狀告為告查勘合事仰本司查商人黃河等報中鹽引有無停止未收之數曽否準令上納出給實收繳報即今有無勘合填給或否支給銀兩明白呈來施行蒙此案查先為處置邉儲預防邉患事成化二十一年二月初七日承準戶部陜字一千六十五號勘合該侍郎李衍題為預備邉患事開中兩淮運司山東運司四川鹽課提舉司成化八年至十九年常股存積鹽共二百萬引撥榆林等處招商中納降到勘合二百道本司收填節承準巡撫延綏吕都御史照會收完商人田斌等共報納鹽七十八萬四千二百一十四引實收到司填給勘合七十九道發領訖未中鹽一百二十一萬五千七百八十六引未填勘合一百二十一道正德元年九月內本司見得本處地方自𢎞治十四年敵衆大舉入攻之後動調軍馬費用糧草數多以致嵗入不勾嵗用要將前報剩殘鹽另定價值量為減輕行令本司招商報中收銀完日分撥臨邉延慶等府糴買糧料草束以備邉方支用具呈巡撫陜西右副都御史張泰定奪奏請未示續蒙巡撫右副都御史柴升批蒙商人李朝用黃河等告稱先年開中淮鹽各商告撥固原新安等倉上納米豆穀草遇例停止將納過糧草出給實收未納之數見今在堡堆放要行中納前項殘鹽填給勘合等因到司為照未蒙明文難擅準行但各該倉場俱係軍馬駐劄要害之地李朝用等既稱買有糧草在彼堆放合無行移陜西按察司分巡關西道僉事李璣查照彼中糧草價值先行定擬的確價值省令各商明白供認在官行令該倉收受明立卷簿仍將收過糧草數目扣算明白造册備照每商給與小票執照待至正德三年二月終如前鹽準令中納照依引鹽價值行仰該倉扣出實收齎繳本司給與勘合前去該司支鹽若是不準招中查支官錢給還各商備由具呈定奪蒙批仰依擬施行巳經移文僉事李璣查照施行一向未準回報本司將查過緣由并各年勘合引鹽開呈照詳去後正德四年閏九月內準固原兵備副使王凱牒呈為告查勘合事奉總制尚書才劄付定擬商人黃河等截中兩淮運司成化十五年分中剩常股鹽一十三萬二千七百五十引每一千引上納粟米四百石或豌豆六百石或穀草一萬束仰司轉行固原等倉查黃河等原報引鹽糧料草束如果俱已納完是實扣算明白出給實收付各商齎赴布政司填給勘合前去運司支鹽亦不見開有題準字樣案候間節據商人楊得山等齎執納獲固原等倉原在總制衙門告報兩淮運司成化十五年鹽引糧草實收前來共該鹽一十二萬二千八百八十八引填給秦字二號起至十四號勘合一十三道付各商領齎訖今蒙前因今各邉糧草在在苦無多積各該鎮巡等官不時告乏奏請户部多方區處惟恐不及況此先年原剩鹽引若招商中納不猶愈於他項區處今將前項緣由并各年引鹽勘合開坐呈乞照詳定奪施行等因據此簿查先據商人李朝用等告前事巳經批行本司查報去後今據前因臣於接管卷內查得先為告查勘合事正德四年八月內該總制尚書才奏稱固靖環慶延綏寧夏各路倉場見在糧料草束不多要將前項中剩兩淮山東二運司殘鹽仍照原擬招商上納糧草但恐各該運司前項引鹽近來差官查賣盡絶乞敕户部照卷清查如果見在别無支賣內除商人黃河等該支二十三萬二千七百五十引之外其餘九十八萬三千三十六引乞準招商分撥糧草不多倉場上納以備支用等因在卷一向未奉欽依明文臣查得成化二十一年間原開兩淮山東二運司并四川鹽課提舉司成化八年至十九年官鹽二百萬引降到勘合二百道彼時招納商人田斌等兩淮并四川提舉司鹽七十八萬四千二百一十四引填過勘合七十九道近該總制尚書才奏稱巳招商人黃河等該支鹽二十三萬二千七百五十引止是商人楊得山等納過糧料草束該支鹽一十二萬一千八百八十八引巳填勘合一十三道前去兩淮運司支鹽訖其餘仍奉例停止通計前後二次中過鹽九十萬七千一百二引已填勘合九十二道未中殘鹽一百九萬二千八百九十八引見存勘合一百八道內除山東運司二十四萬九千四百六十八引無人報中實有兩淮運司中剩成化十五十六十七十八等年分常股鹽八十四萬三千四百三十引俱係見存勘合未填之數竊惟邉方儲蓄以預為先以多為貴陜西延綏寧夏甘肅四鎮邉堡倉場糧料草束查得委多缺乏見今漢中之流賊未殄河西之敵患未除賀蘭山後敵衆不時窺伺近據走回人口説稱敵衆起營往東北去訖冬寒在邇恐其乘凍踏氷入套寧夏邉牆如是不能阻遏則陜西腹裏根本之地誠有可憂臣於今年七月內巳將十分緊急缺乏糧草緣由具奏未奉明文近又行據各該兵備巡守等官副使黃繡等查勘固原環慶靖邊蘭州一帶倉場或有糧無料無草或有料無草無糧或有草無糧無料或糧料草束俱無本處主兵支用尚且不敷倘若動調客兵將何支給興言及此可為寒心陜西巡撫逺在漢中勢難內顧臣有地方之責豈敢坐視雖經節行布政司管糧分守等官督徴起運邉糧但各年拖欠糧草遇例停免止有該年夏秋稅糧數亦不多況地方人民雕敝催徴急難完納欲發官銀招商易買緣各該司府州縣庫藏官銀多無積蓄又因先年招中糧草商人節奉事例或將巳給銀兩追併減除或將巳納糧草不行給價以致虧折資本怨聲載途即今雖欲招之莫肯應命惟有前項殘鹽衆心樂趨告報者多中間亦有總制尚書才明文招報運送糧草到倉停止不得收受情詞激切尤為可憫臣節經行令該司查理明白欲候奏請明文至日方準報中但正在緊急缺乏之際若不趂今收成時月先令收買上納向後河凍報有聲息道路阻隔不能運送有誤供億巳經照依前巡撫都御史柴升批行事理行令兵備巡守等官將告報糧料草束商人逐一拘審分撥固原靖邊環慶蘭州及寧夏花馬池興武營等處缺乏倉場立限上納仍斟酌地方逺近險易年嵗收成厚薄定與值價如蘭州等處照依尚書才原擬每一千引上納粟米四百石或豌豆六百石或穀草一萬束固原靖邊環慶等處地方稍近收成頗可各量為增添花馬池興武營等處地方險逺腳價髙貴量減其數責令各供認在官各行該倉照數收受明立卷簿收完扣算明白備造方册開送布政司及兵備等衙門各收存備照各商給與該倉印信小票一紙令其執照待有明文至日如前鹽準令中納照依引鹽價值行仰該倉扣出實收齎繳該司給與勘合前去支鹽若是不準招中就於官庫或於該倉查支官錢給還商價各通行去後今將查處過緣由備陳始末上瀆天聽伏望聖明俯念邉事孔艱邉儲關係至重乞敕户部查議如是别無違礙具由上請合無將前項中剩兩淮運司成化十五十六十七十八等年常股殘鹽八十四萬三千四百三十引準令招中行仰陜西布政司轉行各兵備巡守等官查原報糧料草束商人如果上納完足行令該倉出給實收齎繳該司填給勘合前去運司支鹽不盡之數仍招商派撥延綏寧夏各缺乏倉場上納以濟目前邉儲之急以慰三邉軍民之望如事有窒礙難以招中亦乞降發官銀照依原擬糧料草束斗頭斤數時值給還各商庶不再虧公家之信重失商人之心將來邉方儲蓄猶有倚賴緣係查處邉儲事理未敢擅便為此具本謹題請旨一為交收符驗關防事題為交收符驗關防事據陜西都司署都指揮同知鄭亷呈抄蒙鎮守寧夏地方都知監太監張弼案驗會同總兵官楊英副總兵仇鉞議將開送符驗關防卷簿及跟隨書辦吏典於正德五年九月十一日眼同照依粘單內逐一暫且封收約束在官待新任巡撫到彼徑自一同交送緣由回報到臣案查先準吏兵二部并本院咨為缺官事照得巡撫寧夏地方本院右副都御史馬炳然近節奉欽依著他守制去吏部便推堪任巡撫的兩員來看欽此欽遵該吏部會同兵部議得寧夏地方新遭變故雖旋即事定而賀蘭山後尚多敵營撫禦正須得人右都御史楊一清見在彼處總督軍務合無行令暫在彼處居住從宜加意撫恤其三邉軍機係干征調重事仍聽節制待邊敵流賊寧靖之後另行具奏定奪等因題奉聖旨是欽此欽遵備咨轉行前來除欽遵於本年九月初一日前到寧夏駐劄行事外續準右副都御史馬炳然咨送達字二百八十九號符驗一道巡撫寧夏關防一顆臣暫且封收及將未完卷簿接管施行間本年九月初八日續準吏部咨本年八月十六日該司禮監太監溫祥傳奉聖旨總制都御史楊一清南京太子少保吏部尚書梁儲致仕工部尚書李鐩各寫敕著馳驛來京吏部知道欽此欽遵備咨前來除將原封收達字二百八十九號符驗一道巡撫寧夏關防一顆劄仰都指揮鄭亷轉送鎮守寧夏地方太監張弼暫且收貯待新任巡撫至日徑自交送去後今據前因除欽遵候敕旨至日馳驛赴京外緣係交收符驗關防事理為此具本謹具題知一為謝恩事奏為謝恩事據陜西布政司呈正德五年九月初九日抄蒙鎮守陜西等處地方司設監太監王興案驗為傳奉事奉司禮監印信揭帖本年八月十六日本監太監魏彬等於乾清宫欽奉聖旨賞差往寧夏等處勦殺賊冦回還提督軍務都察院右都御史一員楊一清銀五十兩紵絲四表裏內大紅織金胸背獬豸一表裏羊一隻酒十瓶該衙門知道欽此欽遵本監將奉到旨意事理備云前去陜西鎮巡并三司等官太監王興等欽遵給散施行等因轉呈到臣除將欽賜銀兩表裏羊酒等物望闕叩頭領受外伏念臣曩因謝病休致家居近者蒙恩起用奉敕征勦寧夏賊冦兼程前來彼時邉將宣力元惡授首其後擒獲逆黨撫安地方皆總督太監張永之功臣不過隨同行事據實奏報而巳曽無尺寸之勞顧荷駢蕃之賜榮非意及感與懼并金幣輝煌侈書生之服用牲醪醉飽頒餘惠於官兵兹蓋皇上天地涵育造化生成欲示勸於衆人不吝賞於片善踰涯之恩無補過分之寵奚堪矢竭螻蟻之微忱用答乾坤之大德臣不勝瞻仰感戴激切屏營之至緣係謝恩事理為此具本謹具奏聞一為推訪將材以備任用事題為推訪將材以備任用事臣自先年督理馬政巡撫總制俱在陜西地方近又蒙恩起用仍總制陜西各路邉務竊念禦戎為今日所急選將為戎政所先故於陜西延綏寧夏甘涼四鎮大小軍武官員頗嘗留心推訪即其行事兼察其用心驗其器識兼考其材藝雖人材難得未免得此而失彼然使人以器自當舍短而求長況當朝廷一新政令之秋正臣下以人事君之日茍有所知安敢隱默除見任主副將官及曽經臣論薦者不開外竊見分守寧夏西路地方左參將都指揮僉事馮禎器識雄偉號令嚴肅陜西都司掌印新任四川參將署都指揮僉事楊宏文武具備材節兼優是二人者皆可備西北大將之選馮禎久滯邉禆似不盡其用楊宏近擢川將似用違其材甘肅遊擊將軍都指揮僉事吳英延綏遊擊將軍都指揮僉事時源俱有摧鋒陷堅之勇三邉戰將號為出色延綏各堡把總都指揮僉事閻勳髙時彭楲鄭驃指揮使安國寧夏都指揮同知陳珣鄭亷陜西先任遊擊將軍今緣事復職署都指揮僉事張鎬守備岷州署都指揮僉事趙文西安後衛指揮使施傑西安前衛指揮同知蔣存禮是數人者俱各間於弓馬熟於戎陳事體頗皆疏通行檢亦無所失用之陜西各鎮大可以備偏禆之選小可以克守備之任或戰或守俱無不宜其餘堪任將領者固多臣未深知不敢濫舉如蒙乞敕該部再行訪察遇有相應員缺將各官量材擢用其於陜西三邉軍務必有補益緣係推訪將材以備任用事理未敢擅便為此具本謹題請旨一為薦舉賢能官員事題為薦舉賢能官員事臣竊見陜西布政司左布政使燕忠心知嚮正官有執守為御史風采素聞司馬政勤能匪懈比遷藩臬正官益自操持不怠當權姦劉瑾氣焰薰灼之時獨無附麗干謁臣比緣查處邉儲本官盡心區畫事有條理委係賢勞相應薦舉其餘布按二司官員雖有才能臣職在軍旅未經委用試驗不敢泛陳乞敕吏部再為詢訪如果臣言不謬待有相應員缺將燕忠早擢任用庶使方面臣僚有所激勸興起緣係薦舉賢能官員事理未敢擅便為此具本謹題請旨一為陳情乞恩辭免欽取升任容令休致事奏為陳情乞恩辭免欽取升任容令休致事正德五年九月十九日該固原衛指揮符深齎捧節該欽奉敕先因西邉有事特起爾總制軍務今地方已寧敕至爾即馳驛來京毋得稽遲故敕欽此欽遵於本月二十二日起程外本月二十八日準吏部咨為缺官事該本部等衙門題照例會推得臣等堪任戶部尚書等因具題節該奉聖旨楊一清升戶部尚書欽此欽遵備咨到臣綸音渙召既承馳驛之榮金部需才復玷尚書之選便蕃有命局蹐無容臣稟賦素薄血氣早衰往年因病休官幾莫逃於法網比者聞變強起幸適會夫成功自到寧夏以來苦於馳驅疲於案牘目疾屢作痰氣時攻巳於本年九月初一日備將衰病不能供職緣由具本陳情乞歸休致方屏營而候命忽徴拜以蒙恩益深覆餗之憂重切臨淵之懼伏念君命所召不敢稽違兼程前進行至河南懷慶衛輝等處地方加以風熱之侵舊疾轉甚心神怔忪頭目暈眩胸腹脹悶臟腑滑泄沿途服藥未見痊可自揣孱病之軀終非朝坐之器竊思户部掌人民財賦政務浩繁國家元氣所係必得疏通精練之才乃能負荷豈臣迂腐衰憊之人所克勝戡雖欲效陳力就列之忠恐難逃曠職素餐之誚況當朝廷一新政令之時正臣下奮庸熙事之日四海之內孰不延頸跂足以望太平臣非草木安忍自棄顧省躬度分以筋力則不勝以才能則不稱夙夜兢惕不知所處且今賢俊林立隨取隨足不患乏材而司徒重秩猥及不肖臣猶自駭人將謂何恐傷知人之明以為新政之纍此臣所以赧顔疚心而不能自安者也伏望聖慈收回成命俯從前懇容臣以舊官放回休致使得調養病軀偃伏林下以全餘年則仰戴天地生成之德又出於尋常萬萬矣臣瞻望闕廷不勝激切除扶病在途恭俟允命外緣係陳情辭免恩命放回休致事理為此具本謹具奏聞伏候敕旨一為患病事奏為患病事臣比在寧夏總制邉務奉敕行取馳驛來京行至中途舊患痰疾舉發時作眩暈後又感冒風寒咳嗽喘逆心腹不寧節經具本陳情放回休致未蒙俞允臣感恩益切不敢稽留扶病前來本月初四日到於京城宣武門外欲便進城報名朝見緣前患咳嗽眩暈等疾俱未痊可誠恐趨走跪拜之間致有失儀不便臣是以昧死上陳伏望聖恩容臣暫在門外延醫用藥調治前病痊可之日朝見庶得微軀保全誓當鞠躬盡節以報陛下天地生成之德緣係欽取官員未敢擅便為此具本謹具奏聞伏候敕旨一為懇乞天恩辭免加官升任事奏為懇乞天恩辭免加官升任事臣比者奉命征勦寧夏賊冦總制邉務本年九月十九日奉敕行取馳驛來京欽遵起程間又蒙聖恩升任户部尚書初寧夏事平臣即將衰病不能供職緣由具本陳乞休致及奉行取升職中途感患風熱痰嗽眩暈等病又經具本辭免俱未蒙俞允續該兵部題為捷音事節該奉欽依提督軍務都御史楊一清協同擒獲撫定地方功勤茂著加太子少保尚書仍舊賞銀五十兩紵絲五表裏欽此臣病中聞此感恩益切不敢留滯扶病前來到於京城宣武門外請醫調治瞻望闕廷咫尺不能朝見內自警惕寢食不寧伏念尚書乃今日文臣之極致户部實國家元氣之所關如臣庸愚誤蒙簡任分量固巳踰越盛滿實難勝戡未諧懇避之私益重貪榮之愧若寧夏之事臣未至地方邉將宣力元凶授首其後擒獲逆黨撫安軍民功皆常事實無異能金帛之賜巳為過分官秩之加豈所敢當且宫保位望隆重本非賞功之官而臣因人成事又無功能可録書曰德懋懋官功懋懋賞臣德不稱官恐貽負乘之誚無功受賞徒增淵谷之危況犬馬之年漸老蒲栁之質易衰縱使前病暫痊強顔班列而精力不健豈復能有所建立是以不避斧鉞昧死懇陳便望聖慈察臣誠欵收回太子少保尚書成命容臣仍以舊官放回休致不勝感戴天恩之至緣係辭免加官升任事理為此具本謹具奏聞伏候敕旨關中奏議卷十
