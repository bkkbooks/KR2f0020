body:
  text: 關中奏議卷十明楊一清撰後總制類一為邉務事欽差總制陜西延寧甘涼運務都察院都御史臣楊一清謹題為邉務事臣於本年五月初四日在於原籍直𨽻鎮江府丹徒縣該錦衣衛舍人王諫齎捧節該欽奉敕今仍命爾總制陜西延綏寧夏甘涼等處各路邉務欽此欽遵除具本謝恩及將起程日期奏報外伏念臣本書生不諳戎務誤蒙簡命夙夜兢惕不敢自寧兼程前進本月二十一日到於陜西地方訪得寧夏叛逆首惡周昻何錦等已就擒戮蓋由皇上神武布昭德威逺被不待加兵地方底定誠宗社萬億年無疆之休也臣切恐大變之後人心驚疑或有潛入套中遁往山後勾引套人重為後患已經出給榜文差官星馳齎往彼處地方張挂奉宣朝廷德意曉諭四衛官軍人等除有名首惡不宥外其餘脅從之徒巳有節奉詔敕宥免恩例各安職役照舊生理無懷驚疑各該部領官員務要加意撫恤不許聽人讐攀誣指濫及無辜若是原謀首惡未曽捉獲盡絶亦要設法擒拿毋令潛逃引敵為患臣仍兼程前去欽遵相機行事防禦套人外緣係緊急邉情事理為此今將臣到於陜西地方行事日期具本謹具題知一為衆官反逆殺死鎮巡大臣等事題為衆官反逆殺死鎮巡大臣等事準兵部咨該本部題前事會官議得慶府安化王置鐇叨居逺裔安享厚祿不知感恩圖報却乃逆理亂常交結逆賊何錦周昻丁廣等謀為不軌戕害重臣反形巳彰天誅難逭伏望皇上斷以大義先將置鐇削去封爵俟擒獲之日議罪再乞命將專征聲罪致討等因具題奉聖旨置鐇交結羣小殺害鎮巡重臣占據城池索要軍馬地圖反形巳露卿等既這等説遣官祗告宗廟革去置鐇王爵正名討罪著都察院右都御史楊一清提督軍務涇陽伯神英挂平朔將軍印充總兵官一同節制京營并陜西寧夏延綏甘涼各路軍馬前去勦殺各寫制勑與他欽此欽遵備咨到臣切照逆賊何錦周昻丁廣等交結置鐇潛謀不軌罪惡滔天神人共怒天討之所必加大義之不容巳皇上軫念西土蒼生恐遭荼毒致煩京營人馬冒暑逺征此與虞舜有苖之征髙宗鬼方之伐異世而同揆者也臣初到陜西提督軍務敕書尚未齎至各鎮將官相離尚逺未據呈報傳聞鎮守陜西總兵官曹雄與寧夏遊擊將軍仇鉞內外約應舉兵將周昻擒斬何錦等捉獲置鐇拘禁在官軍民安堵地方無事此皆仰荷宗社神靈之福皇上聖武之威將帥效忠士卒用命不逾兩旬罪人斯得若使曠日持久必至外引邊冦內扇人心為患誠難測度臣今仰遵敕旨星馳前去撫諭軍民申明號令務俾經久無事但入關以來道路相傳京軍將至此風傳至寧夏彼反側之徒未免心懷驚疑恐生他患况時方盛暑迤西一帶水土鹹苦人馬易生疾疫其可慮不獨縻費糧草而已竊料各鎮將官必巳將事寧緣由具奏此時廟謨必有區處若待親到彼處方才論列不無耽延日月徒勞人馬但地方安危所繫臣責任重大不敢不言伏望聖明乞敕該部查議如果各鎮奏報事寧合無將京營軍馬急為取回以安反側之心以免供億之費不勝幸甚緣係取回京營事理未敢擅便為此具本謹題請旨一為擒獲同謀叛賊撫諭軍民以靖邉境等事題為擒獲同謀叛賊撫諭軍民以靖邉境等事臣自到陜西地方節據鎮守陜西寧夏總兵官曹雄楊英各呈稱擒斬叛賊地方寧靖緣由前來訪得彼處人心驚疑未定此蓋愚昧之徒自知罪不勝誅故寬釋之詔雖降而反側之情未安臣將朝廷誅勦首惡分别脅從德意出榜差官齎去張挂曉諭一應官軍土漢人等各安職役勿懷驚疑部領官員加意撫恤不許聼人讐攀誣指濫及無辜及詢軍民疾苦禁革各衙門科擾剝害情弊俱通行外續該欽差總督軍務御用監太監張永訪得前項叛賊首惡造意者雖已斬獲其同謀黨惡者實多脫漏節差旗牌官楊義山玉王瓛谷大中等星夜兼程前去寧夏地方督同鎮巡等官將未獲同謀賊黨夜不收申居敬等五十八名陸續捉獲監候及又書寫大字榜文宣布皇上恩威曉諭本城官舍軍民人等俱要安心樂業各保身家彼處人心始漸安妥本年六月十二日臣等俱到寧夏靈州守禦千戶所據寧夏鎮巡等官總兵官楊英等呈稱先獲置鐇并的親宫眷台溍等及反賊何錦等連的親家屬并後獲同謀反賊申居敬等共四百五十五名口先解過河聽候等因臣會同欽差總督軍務御用監太監張永議照各賊未經查審恐有異詞及看得各該守臣各呈原奏本內事情多有不同會案通行帖仰鎮守陜西總兵官曹雄會同寧夏鎮守太監張弼總兵官楊英巡撫都御史馬炳然巡按御史周廷徴督同都布按三司委官審取供詞分别造意根因首謀共謀脅從等第及行巡按御史周廷徴督同守巡官員查勘各官原奏報功次務取歸一情詞回報續該太監張據置鐇男栝妻沈氏哭説被拿之時混失三嵗幼男喚名老哥兒等情看係置鐇嫡派親孫就差頭目劉奎及帖仰鎮巡等官當將幼男老哥兒尋獲見在及又看得置鐇見患傷寒病症何錦亦患噎食病症各令撥醫調治及宫眷人等已選良善婦人看守供送飯食各施行外為照置鐇肆行反狀非何錦等不能起事何錦等非申居敬等同謀不能張威彼此結搆為惡占據城池索要軍馬地圖殺害大臣鑄造銀印關防偽封官爵意欲內外搆連侵擾邉疆幸而仰仗宗社威靈聖神妙算旬月之間盡遭擒戮所據同謀叛賊實非脅從之比若不從重處治無以示懲天下除待各賊問明將置鐇眷屬伴送何錦等家口押解赴京并追收册印官服儀仗等物及追各賊家産財物籍沒入官與各鎮官軍獲功大小俱另行具奏外緣係擒獲同謀反叛賊冦及撫諭人心以靖邉境事理為此具本謹具題知一為謝恩事奏為謝恩事頃因寧夏賊臣何錦等叛逆臣奉敕總制陜西各路軍務前去撫諭誅勦正德五年五月三十日行至西安府乾州據寧夏差百戶蔡明赴京奏事回還齎捧節該欽奉敕諭今命太監張永總督軍務涇陽伯神英挂印充總兵官爾就彼提督軍務統領京營官軍三萬員名調集陜西寧夏延綏甘涼等處漢土官軍人等分路進勦一同行事事寧之日星馳奏報爾仍在彼總制軍務欽此欽遵續該冠帶舍人楊秀領齎內府公文欽奉聖旨賞差往寧夏等處勦殺賊冦提督軍務都察院右都御史一員楊一清銀三十兩紵絲二表裏內大紅織金胸背獬豸一表裏該衙門知道欽此欽遵備云到臣除欽遵收領望闕叩頭謝恩外伏念臣本書生不諳軍旅誤蒙簡命授以提督軍務之權重以白金文綺之賜仗天之威臣等未至地方將臣宣力士卒用命罪人斯得邉境底寧臣感恩徒切深愧無功惟當罄竭庸愚修舉邉務勉圖來效以塞厚責臣不勝感激仰戴之至緣係謝恩事理為此具本謹具奏聞一為遵奉敕諭起解反逆賊冦事題為遵奉敕諭起解反逆賊冦事據鎮守陜西總兵官署都督同知曹雄會同鎮守寧夏都知監太監張弼巡撫寧夏右副都御史馬炳然鎮守寧夏總兵官署都督僉事楊英巡按陜西監察御史周廷徴各呈前事行據陜西都司等衙門都指揮僉事陳善呈會同陜西布政司右參議許莊陜西按察司副使黃繡將先後擒獲何錦申居敬等取出責與革爵安化王置鐇面證逐一研審原先起謀根因首謀共謀脅從情節及見在殺死病故人犯姓名明白取具備細供詞除偽封將軍銀印關防并封官命詞告示板榜及各犯家財産業另行外今將取到供詞呈乞施行等因據此案查先蒙欽差總督軍務御用監太監張永鈞帖會同欽差提督軍務都察院右都御史楊一清議行前事巳經會行去後今據前因各職恐有不的會同重取何錦等一干人證到官審據何錦供年四十嵗原籍直𨽻廬州府六安州人先任寧夏右屯衛後所百户招軍升副千户正德三年納銀授都指揮僉事正德元年有先未殺寧夏衛儒學生員孫景文黜退生員孟彬史連不時常往今革爵安化王置鐇府行走情熟一日酒後置鐇向孫景文説曽有人相我有帝王像貌又有寄住未到師婆王九兒會跳鸚鵡神每神降時就呼置鐇是老天子以此置鐇動心因無兵權一向延捱不得起手正德三年七月十五日有例納銀升職錦與先未殺都指揮周昻借銀二百兩作保錦借置鐇銀二百七十兩周昻借銀二百兩俱納級升都指揮以後往來稠密正德四年八月內置鐇使令未到校尉史成邀請錦與周昻孫景文孟彬史連及先前在府唱詞無目人張會通到府喫酒間置鐇言説如今時世不同人民難過人説我有天分你們若肯扶我為主必成大事等語錦與周昻等各聽允當就對天發誓不許泄漏事情彼有今在官本府教授髙元吉不能覺察正德五年正月初六日遊擊將軍仇鉞因有聲息領兵往玉泉營按伏本年二月內有周少卿前來寧夏丈量地土三月二十三日又有分守關西道侯參議亦到寧夏催糧本月二十六日置鐇向錦等謀説你們拖欠錢糧馬價數多追徴緊急人心慌亂正好乘此機會將前者所謀大事舉行人無不從但恐人少不能成事錦等聽記因思先未殺指揮丁廣千户楊泰陳忠胡濟王輔百戶魏鎮陳賢朱霞姚鐸雷英李榮李森劉鉞何鋭胡璽等多係掌印管屯管隊官員常受比較必然忿恨易於糾合錦謀令孫景文置酒將各官與孟彬及教讀殷哲請到孫景文家內會飲間孫景文説你衆人錢糧馬價無從辦納不時比較何日是了今安化王算有天分要舉大事若肯取巧將三堂殺了扶立安化王為主必定成事我們同享富貴却不強如比較喫打丁廣等意正忿恨各稱情願等語隨即孫景文開具姓名當天焚香發誓及喫血酒就計説著安化王殿下置酒請三堂到府衆人齊來將他們殺死奪了兵權傳檄起兵有何不可謀畢衆人説好各散次日孫景文向置鐇備説前情回報甚喜本日置鐇思起平邊城充軍逃回千戶徐欽常在府內藏躲必肯從謀又令先未殺儀賓夏琳親去平虜城與徐欽約謀轉約先未殺百戶朱洗舍人蔣泰程保胡英賈浩朱成王卿孫浩張閠楊舉徐愷軍人陸原保并見在張欽等到家説稱安化王要替寧夏人做主起兵差人來約我們此事有益不可推却各人亦就依聽約定下月初五日早到城當令夏琳回説三月二十九日薑總兵分付周昻挑選精鋭夜不收五六十名遇警前哨殺賊周昻思得前項謀事人少正合機會於四月初三日選得在官夜不收申居敬馬官保鎖七兒耿婆孫史三張成陳孫陳均生陸升保楊敬先龎守信鄒貴二施官得宋驢兒朱千升陸巴子匡升王興古興兒任從義竇克敬韋名四孫升保林伏進夏保保張成李榮關朱永年王天惠張友文郁小一馬五安伯狗陳拜拜陳士中郭雙孫謝官音奴張禮谷顯中劉文善李安子侯得朵列哥李伏二吳成林雄韓當兒芮和姚正楊長孫倪小弟張來兒汪成沈官兒王子厚先未故尤全羅漢藍真鄧全戴平共六十名著令常在身邉跟用本日辰時置鐇差今在官同謀百戶李蕃前去邀請三堂并周少卿假説與新來李太監接風約至本月初五日會飲初三日午時副總兵楊英因有聲息領兵往楊顯堡按伏初五日早周昻聚集申居敬等到家將大門關閉向申居敬等言説如今追併你們欠的馬錢至急今日又該比較人説安化王有福你衆人肯跟隨我扶助安化王為主得了天下你我衆人都做了大官各人欣喜承應當即取出線香一把令衆人當天各拈香説誓及各與酒三鍾飲訖就令在家伺候隨差先未死夜不收藍真前來與錦説知錦就使令未到周全保前去請丁廣孫景文胡璽分投相約楊泰等俱至周昻家內取齊周昻等又計説今在官指揮張欽係管夜不收把總官若不用他恐有後害就令魏鎮前去賺請張欽亦到周昻家內備