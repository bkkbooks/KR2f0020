body:
  text: 關中奏議卷十五明楊一清撰提督類一為敵衆入境官軍斬獲首級奪獲敵馬等事欽差提督陜西三邉都御史臣楊一清謹題為敵衆入境官軍斬獲首級奪獲敵馬敵器等事嘉靖四年九月二十一日據鎮守陜西地方署都督僉事鄭卿呈前事據守備靖邊地方都指揮同知辛忠呈本年八月十八日辰時據山後扯木硤墩架塘夜不收王春兒走報本月十七日酉時瞭見河北敵衆二百餘騎從莊浪地方五方寺溝前來黃河北岸往來行走離城二百餘里來報得此本職即時統領有馬官軍指揮朱扆等六百員名馳至地名水泉迎遇白楊川架塘夜不收王六十走報本日午時瞭見河北敵衆二百餘騎從扯木硤墩空各用渾脫浮渡過河徑到裴家川劄營本墩隨即舉烟三桶放炮三箇得此督併官軍徑奔裴家川十九日卯時至地名分水嶺據八泉墩架塘夜不收侯三走報前敵從本墩徑往東行本職嚴督官軍前進二十日卯時追至寧夏中衛地名七眼井其衆瞭見灰塵逺遁香山去訖當差夜不收馮岩兒等傳報中衛預防隄備本職掣兵邉外黑水池劄營本日夜三更據哈蘇濟架塘夜不收仇喜喜走報十九日酉時瞭見河北敵衆約有四百餘騎亦從扯木硤接連哈蘇濟一帶各用渾脫浮渡過河仍從先過敵衆舊路裴家川行走河北劄立敵衆三簇不知其數隨即舉煙三桶放炮三箇二十一日寅時當差仇喜喜馳報鎮守陜西總兵官鄭卿處本職領兵追襲續蒙總兵官鄭卿鈞票備行本職分兵設伏相機戰守依蒙分布指揮吳英有馬官軍二百員名在地名青沙峴千户劉夔龍有馬官軍一百員名在池名小石溝本職統領靖邊衛有馬官軍并續調土達共七百七十員名在於衝要嚮泉兒聮絡設伏二十二日寅時據八泉墩架塘夜不收李瘦兒走報敵衆二百餘騎騎牽馬匹從本墩徑奔迤南夲職即時領兵拆墻出邉馳追迎遇前敵衝突前來督令官軍奮勇射斫就陳斬獲首級一顆奪獲敵馬二匹收獲夷器衣物弓箭二十六件枝中傷軍人一名餘衆見我官軍勢猛遁往東北奔走追至鎖黃川其衆逺遁因見天晚恐墮其計掣兵復回邉外黑水池劄營查得連日追殺促死軍人李三等馬四匹二十三日未時䝉總兵官鄭卿鈞票備行本職統調乾鹽池達喇齊馬步官軍前去敵行道路設伏把截本職依䝉統調靖邊等城堡有馬官軍朱扆等一千七十員名在於適中道路水泉按伏分布指揮馬世經管領步隊軍餘三百五十名前去沿河扯木硤一帶擺列仍差人接連哨探本年九月初三日辰時據爪哨夜不收謝和甫等報稱從本境八泉爪至中衛蘆溝兒紅寺兒一帶並無敵蹤直抵長樂堡探得夲堡差去伍百户聽探鄉導李奈說稱中衛參將爪得前敵俱奔迤東過邉得此緣所部兵馬連日缺乏糧料本職隨即掣兵回衛防守仍行所屬城堡嚴謹隄備外查得前敵渡河徑奔迤東逺遁並無深入夲境搶掠人畜及行巡墩指揮千百户劉信等踏勘前敵經行墩塘隘口有無撲殺走報人役明白至日另行呈報除將斬獲首級奪獲敵馬敵器等件解赴提督軍門驗發固原衛寄庫外理合具呈施行據此及據固原守備地方署都指揮僉事劉文呈為傳報聲息事夲年八月二十日午時該靖邊守備辛忠差夜不收王六十走報前項敵情當䝉提督尚書楊一清督發鎮守總兵官鄭卿統領固原馬隊官軍指揮季臣等三百五十餘員名巡邉西安左等衛官軍指揮劉申烏浩等六百八十餘員名本職部下固原并甘州羣牧所官軍指揮趙欽百户侯松等八百六十餘員名土達千戶王依仁等六百四十餘員名及差參隨張瑋等賫執旗牌督軍截殺二十一日未時至哈喇圗本日辰時有特伯哩墩架塘夜不收王友仁瞭見本墩邊外敵衆五十餘騎往來行走又該靖邊守備辛忠差地名哈蘇濟架塘夜不收仇喜喜走報二十日辰時瞭見敵衆四百餘騎從地名扯木硤浮渡過河仍從先起蹤跡行走河外還有三簇不知其數據此䝉總兵官鄭卿議照前敵先後入境河外還有劄立敵衆誠恐聲東擊西墮其奸計一面差人出邊爪哨前敵向往領兵截殺一面㑹知鎮戎所按伏延綏遊擊將軍張鳯統兵前來應援二十三日卯時據辛忠差夜不收髙明逺走報二十二日有前報敵衆四百到於地名哈蘇濟分散一半順河透中衛地名紅泉一半徑往嚮泉兒去訖辛忠統兵出邊前去追襲等情總兵官鄭卿當統各枝兵馬本日夜一更時分到於關橋堡二十四日早拆邊出境徑往實巴爾圗韓家水等處尋蹤追殺遇合張鳯兵馬聨營跟襲天晚下營二十五日黎明時候起營分路跟追本日辰時據原差爪哨夜不收王世洪等回還報稱到於長流水爪得敵衆馬蹤三路約有二百餘道徑奔中衛地名米鉢寺去訖夜不收張義等報稱到托卜實哈木得敵衆馬蹤約寬一十五步從李安子渡口奔往寧夏韋州地方去訖相離我境窵逺又見兵馬跟襲兩日一夜未見水草計議掣兵回至紅古城按伏防禦外理合具呈施行又准固原等處遊擊將軍署都指揮僉事陶文手本為聲息事本年八月二十二日卯時䝉提督軍門鈞帖前事仰夲官即便統領所部官軍從萌城小鹽池韋州預旺城靖邊等處到於㑹寧安定兩處駐劄待河西再報别有明文督發中路遇敵即便㑹合參將苖鑾都指揮髙時等人馬相機截剿等因蒙此本職於本日巳時當統所部兵馬自紅德城堡起程於本月二十四日到於小鹽池與參將苖鑾㑹兵二十五日酉時據本營瞭西南角軍人尹滿報稱本時分迤西舊城子墩舉單烟一把據此㑹同參將苖鑾整兵至二十六日丑時分據紅寺堡沙葱溝墩伏空夜不收楊璽走報二十五日巳時分瞭見本墩迤西敵衆五十餘騎各騎牽馬匹往東透渾水溝行又據黑山墩夜不收于安走報二十五日酉時分瞭見本墩南空西來敵衆二簇約有百十餘騎俱騎牽馬匹邀趕牛驢到於紅城子水頭駐劄等因㑹同參將苗鑾出兵瞭見本營迤南棗岡墩舉單火二把燒柴堆一座放炮一箇當督所部官軍襲𤇺馳過地名王伏山迤南迎據平山鋪墩伏空夜不收孫廷璽走報本日五更時分本墩南空西來敵衆約有一百五十餘騎各騎牽馬匹邀趕牛驢過路徑往東透蘆溝子去訖本職等督兵驟馬追至地名黑羊房其衆瞭見兵馬灰塵臨近將原趕牛驢丢棄奔馬東走又督官軍追至膠泥井敵見兵馬勢衆追急將原搶男女二名口并夷器等件丢棄輕騎奔走復又督兵襲蹤追至花馬池地方長山兒迤北天晚落雨就彼結營設伏至次日天明爪襲敵蹤往駝房迤南逺遁方才收兵回營隄備外隨據遊兵中軍千户趙隆小鹽池中軍指揮王濬各呈開奪獲被掠幼男一名陳瞎子幼女一口張存兒牛二百四隻驢一十二頭號旗杆一根水渾脫二箇毛口袋五條鐵鍋二口皮可可四箇皮水斗一箇皮襖一領沙氈一條毯子一條并追敵促死慶陽等衛軍人陳璽等馬一十九匹除將奪回被掠人口頭畜敵器等件㑹發小鹽池遞運所牧養聽候明文施行外合具手夲乞請照驗施行又據守備靖邊地方都指揮同知辛忠呈為前事本年九月初六日寅時據原差塘馬軍人王三賫帖傳報本月初四日紅寺堡地名黑嶺岡伏路夜不收李景原等傳報本日巳時敵衆五十餘騎從東往西行走得此本職當統有馬官軍前去沿河設伏本月初九日巳時䝉總兵官鄭卿鈞帖并暫署固靖環蘭等處參將劉文明文俱該䝉提督軍門鈞帖備行本職速便分投差人於賊行隘口水頭哨探仍撥官軍沿河擺列䝉此本職切慮達喇蘇陡城旱平水泉等處通敵要害恐其奔此過河當分指揮吳英千户劉夔龍帶領有馬官軍三百員名指揮劉信帶領官軍土達一百員名指揮馬世經帶領步隊官軍三百員名疾去沿河擺列堵截本職統領有馬官軍朱扆等六百五十員名在於山後邊外適中地方亂谷堆設伏截剿十一日寅時據原差中衛蘆溝兒接哨夜不收同蟲喜走報本日子時爪得敵衆從迤北墩空前來徑奔迤西地方本職當領官軍追襲馳至地名裴家川追見前敵知我兵至俱由捷徑陡路奔走本職督併官軍驟馬追至地名黃沙坡敵見我兵卒至迎衝對敵本職督令官軍奮勇當先向前撲殺就陳斬獲首級二顆奪獲敵馬一十七匹收獲敵器敵箭等件後有提督軍門督發旗牌指揮安世領軍都指揮瞿江等兵馬敵見灰塵來近慌懼奔走本職與安世瞿江合兵一處追至臨河精騎敵衆復來對敵職等申嚴號令齊力射斫就陳斬首三顆奪獲敵馬一十六匹收獲敵箭敵器等件敵見我兵勢勇奔遁臨岸直入黃河乘騎浮渡淹沒中半過河敵衆號哭往北去訖因見天晚就彼劄營查得本職部下共斬獲首級五顆奪獲敵馬三十三匹收獲敵箭一百二十七枝敵器衣物等件共六十三件中傷旗軍文仲先等八名被敵射死軍人張居子等下馬四匹促死軍人王仲下馬三匹至十二日掣兵十三日酉時到防守外隨據巡墩指揮劉信呈報前敵經過山後邊外射死墩軍樊孝中捉撲墩軍催二十三再無損傷軍馬及侵犯腹裏搶掠人畜除將斬獲首級奪獲敵馬收獲敵箭敵器等件批差委官百户馬政管解前赴提督軍門紀驗外理合具呈施行又准寧夏遊擊將軍署都指揮僉事劉文手本本年九月初四日本職欽奉勑諭升寧夏遊擊將軍欽此隨䝉提督尚書楊行仰暫署固靖環蘭參將事遇警督調各守備等官防禦勦殺待新設參將至日方許交代䝉此本月初六日巳時抄䝉鈞帖行仰本職即便統率固原官軍速到紅古城㑹同延綏遊擊將軍張鳯選帶精健人馬出邊隨便相機追截剿殺哨探無人方才回還仍先行靖邊守備官沿河把截毋得縱放過河䝉此隨行靖邊守備辛忠領軍沿河把截本職統兵前去㑹同延綏遊擊張鳯及管領戰鋒官軍都指揮瞿江合兵追剿本月初八日從半箇城出邊到於寧夏地方棗山據先差爪哨夜不收武勝二報稱爪得敵蹤奔地名紅溝往西去訖初九日襲至地名庫庫諾爾天晚就彼劄營初十日追至中衛近河地名氷溝遇寧夏中衛指揮何盛領兵在彼說稱前敵於初九日在地名深井對敵看見人馬灰塵徑奔地名三眼井去訖為照三眼井一帶通透乾鹽池西安州哈喇圗等處誠恐此賊見得沿河有備復來東侵職等議發固原等處官軍五百名跟隨督軍旗牌指揮安世都指揮瞿江由地名深井本職同張鳯由地名香山七眼井鎖黃川等處各分路襲搜十二日未時據靖邊夜不收劉讓報稱前敵被靖邊守備辛忠都指揮瞿江等兵馬追趕急奔扯水硤渡河與官軍對敵斬獲首級餘衆落水淹死數多本職掣兵回達喇齊防禦查得部下追兵促死官軍張添福宋績等馬二十一匹别無損傷合具手本乞請照驗施行又准延綏遊擊將軍署都指揮同知張鳯手本又據戰鋒都指揮瞿江呈俱相同及張鳯部下收獲連鞍敵馬一匹追兵促死軍人韓謙等騎征馬二十九匹及據固原衛領軍指揮季臣呈查得本職部下追兵促死軍人馮孟陽等馬五匹别無所傷官軍等因各行到職案查本年八月二十等日節據守備靖邊都指揮辛忠差人報到前項敵情纍䝉提督軍務兵部尚書楊督發本職并調各枝主客兵馬前去固靖邊外直抵中衛鎖黃川跟襲截殺去後今該前因職㑹同鎮守陜西太監宴巡撫右副都御史王議看得守備靖邊都指揮辛忠暫署固原參將事寧夏遊擊將軍劉文延綏遊擊將軍張鳯戰鋒都指揮瞿江固原領軍指揮季臣各開稱前項月日敵衆衆寡不等從靖邊地方扯木硤浮渡過河各官領兵先後出邊直抵寧夏中衛鎖黃川敵行水頭要路晝夜襲蹤跟追前敵見我官軍追趕緊急徑往鹽池石溝大路去訖又有敵衆五十餘騎復回原路渡河各官亦又領兵襲踪追殺辛忠部下二次斬獲首級六顆奪獲敵馬三十五匹敵器衣物弓刀等件二百一十六件枝中傷軍人孫多多等九名追趕射死促死軍人李三等馬一十一匹被敵射死捉去墩軍樊孝中等二名劉文部下促死官軍張添福等馬二十一匹陶文部下奪獲被掠幼小男女二名口牛驢二百一十六隻頭敵器一十九件促死軍人陳璽等馬一十九匹張鳯部下收獲連鞍敵馬一匹促死軍人韓謙等馬二十九匹季臣部下促死軍人馮孟陽等馬五匹及稱前敵見我官軍勢惡直入黃河乘騎浮渡淹沒中半得逃之衆號哭北去等情一節為照本鎮沿邊地方久無警報今不知何枝兵馬自莊浪境外而來卒至靖邊渡河入境計將奔歸河套被我兵襲追前遇寧夏擺邊兵馬堵截邀殺痛遭銼衄奔潰之敵不能出邊又被我兵搜剿斬獲首級奪獲敵馬敵器大敗而歸但今冬臨靖邊河外延寧河套俱有敵衆住牧窺伺復舉難保必無防禦之機尤當嚴謹又恐此外别有隱匿失事情弊除行本鎮參遊守備領軍等官各整㮶兵馬鋒利器械嚴督墩隘守瞭架塘官軍人等比常十分用心瞭望加意隄備如遇有警一面領兵㑹合各該主客官軍相機戰守一面通行飛報發兵應援并行巡按陜西監察御史鄭氣胡體乾照例查勘此外有無失事情弊及驗看斬獲首級奪獲敵馬敵器是否真正强壯徑自施行及具題外今將前項緣由呈乞照驗施行等因到臣隨據鎮守寧夏地方總兵官都督僉事杭雄呈為斬獲犯邊敵衆首級等事本年八月二十三日辰時據石溝驛地方石溝兒墩夜不收王升報二十二日巳時瞭見迤南地名三塘水敵衆五十餘騎牽馬匹駝隻奔大路往東行走將遊兵買馬回還軍人薛友能等射傷搶去買來馬六匹隨據鎮城東南角軍人謝成報接迤東空塔兒墩舉放烟炮據此職議料腹裏敵衆過路東行必奔邊墻出境當令副總兵劉玉先統本部有馬官軍四百餘員名渡河前去截剿及令坐營指揮曹江管領正兵有馬官軍五百員名繼後職整兵待報應援二十四日辰時據分守西路左參將蘇勇差夜不收華官保報二十日夜二更時分據靖邊衛夜不收馮牛兒傳報夲月十七日酉時有河西敵衆約三百餘騎從地名扯木硤浮水過河往迤南腹裏地名七眼井透長流水行走參將蘇勇當領人馬渡河跟襲追殺前來走報隨據靈州地方長流水墩夜不收尚蘭州鄉導王祥各報二十二日未時瞭見舊石溝兒墩迤南達衆七八十騎騎牽馬駝來到水泉飲馬往正東地名許直山去訖又據守鳴沙州城指揮彭鎮差夜不收巫讓報二十二日辰時瞭見地名馬官人井寶峪兒山敵衆三簇約有一百五十餘騎往紅寺堡地方梁家泉去訖據此職料敵浮水越境奔往東行况在秋成時月經行人畜遍野恐被搶掠行令都指揮王鋭整㮶無馬步軍在鎮防守職統標下官軍把總指揮羅賢等四百餘員名由橫城堡渡河前去沿邊調度各枝兵馬運謀剿殺本日酉時分馳至地名馬鞍山迎據木井墩夜不收吳天秀報二十三日夜二更時分聽見境裏迤南敵衆一百餘騎邀趕馬匹頭畜來到本墩東空掏墻當即舉放火炮隨有副總兵劉玉遊兵都指揮髙時人馬追襲到彼與之對敵斬獲首級奪獲馬牛駝隻前來走報得此職督兵馳進夜二更時分至清水營分布官軍擺邊拒守二十五日天明聽得邊墩炮響職督調各路人馬從地名哈喇烏蘇溝爪襲據前哨夜不收張鐸報哨見正南山上敵衆百十餘騎奔邊前來當令官軍兩下夾攻與彼對敵就陳斬獲首級二顆奪獲戰馬三匹中傷軍人王淮等二名比因天晚收兵回營隨准副總兵劉玉手本開稱本年八月二十三日夜二更時分統兵馳至清水營暗門墩沿邊傳接火炮前來督軍至木井墩西空遇㑹暫管遊兵都指揮髙時合兵一處追至本墩東空敵衆約有一百五十餘騎在彼掏墻聽見人馬臨近其衆多半出境一半衝突前來職等督令官軍堵口奮勇撲斫對敵就陳奪獲敵馬頭畜器械等件前敵慌懼奔往境裏迤南去訖至次日天明襲蹤追至地名火山等處收獲敵馬三匹賊已去逺兵回清水營駐劄及據興武營按伏竒兵把總指揮季連呈稱本月二十三日卯時領兵在於瞭馬山截其歸路至辰時分聽得迤西墩臺放炮一箇即督官軍驟馬馳至古寺墩東空敵衆在彼掏墻看見人馬奔往迤南去訖督令官軍追至地名西亂井與彼對敵奪獲敵馬人口敵器等件衆見官軍勇猛換馬往東遁去復追至地名王牢井天晚黑暗就彼下營次日天明爪得敵蹤去逺掣兵回營查得見在奪獲敵馬一十四匹騾子一頭牛五隻傷重倒死敵馬三匹駝二隻被虜男子郭三哇子等五名中傷旗軍王四兒等五名射死軍人王興受等官馬二匹收獲敵器三十三件合用手本施行又准提督委官暫管寧夏遊兵都指揮僉事髙時手本開稱本年八月二十三日夜二更時分追敵至清水營遇㑹副總兵劉玉合兵一處據木井墩小旗殷大走報敵衆五十餘騎在於本墩東空掏墻疾督官軍到彼其衆多半出境少半衝突前來職等督令官軍齊力射斫就陳斬獲首級一顆奪獲戰馬敵器等件敵見官軍奮勇不得出邊往南奔遁次日天明襲蹤追至地名火山等處收獲敵馬前敵換馬去逺天晚收兵清水營防禦查得陳前斬獲首級一顆奪獲敵馬三十一匹見在二十六匹被傷倒死五匹駝一隻男婦藩哇子等一十四名口收獲敵器敵箭三十六件副枝中傷旗軍髙鐸等六名射死軍人武成等官馬四匹合具手本施行二十六日據鳴沙州棗山墩夜不收劉純報二十四日辰時有同墩夜不收徐子成下墩南空爪蹤行至地名李安子步口迎遇腹裏迤南敵衆一百餘騎撲來將徐子成斫訖一刀并挑水軍人髙僧加一同捉拴往東去訖二十七日據紅寺堡地方沙葱溝墩夜不收楊洗報二十五日巳時瞭見腹裏敵衆一百餘騎騎牽馬匹往東行走本役下墩走報行至地名石板泉被敵將洗原騎紅寺堡站馬一匹搶去二十九日申時據清水營墩直日軍人王士通報接木井墩烟炮前來得此職當即督調各枝兵馬分路追截馳至鎮北墩東空敵衆約有二百五十餘騎在彼掏墻其衆瞭見人馬將近擺列衝突前來職申明號令嚴督官軍齊力奮勇首尾夾擊攻戰中哨正兵官軍斬首一顆右哨遊兵官軍斬首二顆其衆慌懼退往南行復督官軍追至地名倒塔兒左哨副總兵劉玉督率官軍把總指揮何湧等撲入陳中斬獲首級四顆比因天晚敵已去逺欲要窮追恐墮姦計至二更時分收兵拆墻處所下營次日天明掣兵回營防守隨據督軍把總指揮羅賢呈查得各營官軍斬獲首級七顆奪獲戰馬一十五匹被掠男女張自當等七名口陳亡軍人王玘等二名中傷旗軍舍餘王淮等三十五名射死官軍孫經等下馬一十三匹追敵走死馬六匹收獲敵器等件二百五十六件副枝九月初一日夜二更時分據廟兒墩夜不收馮遇賢報境裏敵衆一簇約六七十騎驟馬來到本墩西空掏墻隨即舉放火炮前來走報據此當遣暫管遊兵都指揮髙時正兵把總指揮王範各統官軍襲烽前去堵截職同副總兵劉玉統兵繼後五更時分馳至拆墻處所前敵聽見人馬聲勢將近復奔往南山遁去職督令官軍襲蹤跟追至初二日申時至地名海子等處敵已去逺天晚收兵隨據廟兒墩夜不收吳鐸收送套中走脫男子一名葉三三供係延綏定邊營軍人葉欽男被敵人們都布拉克搶去在營住過五年今年六月跟隨頭兒阿勒呼達勒一千人馬在套住牧浮水過河西山後西番地方搶掠被迤西敵人殺敗一半往山後迤北逃遁一半從靖邊地方扯木硤浮水過河往迤南腹裏搶掠被各處人馬殺敗不得出邊三三偷馬二匹藏躲山溝得脫到墩收送前來又准分守中路左參將都指揮僉事苖鑾手本開稱本年八月二十六日據黑山夜不收于安走報二十五日酉時瞭見迤西敵衆二蔟約有百十餘騎騎牽馬匹邀趕牛驢來到紅城子水頭駐劄據此本職㑹同遊擊將軍陶文出兵馳至地名王伏山迎據平山鋪墩夜不收孫廷璽走報本日五更時分瞭見迤西敵衆一百五十餘騎近路往來蘆溝子去訖督兵驟馬追至地名黑羊房其衆瞭見兵馬灰塵臨近丢棄原搶頭畜往東奔走又督軍馳至膠泥井兵馬追急丢棄男女二名口并夷器等件復又襲蹤追至花馬池地方長山兒天晚落雨就彼結營次日天明合兵爪襲敵蹤往駝房迤南逺遁收兵回營查得追敵奪獲被搶男女陳瞎子等二名口牛二百四隻驢一十二頭夷器等件一十七件副枝走死官軍王濬等官馬三匹合具手本施行初五日據守備靈州指揮同知沙金呈開本年九月初一日夜四更據許直井墩伏哨夜不收晏祥報本日酉時瞭見東北敵衆一百餘騎騎牽馬匹撲到井上飲馬奔往西南去訖據此當即分遣把總千户韓選帶領有馬官軍二百員名往大沙井伺敵截殺指揮李真吳俊管領步軍三百員名聮絡襲追續據把總千户韓選呈稱本月初二日卯時行至上十里墩迎遇小沙井伏空夜不收鄉導李興朱達各報本日天明時分爪見敵衆馬蹤五六十道過路往亂山兒去訖督令官軍跟蹤徑奔紅栁井黑溝迤西硤口到於地名紅圪坦天晚就彼下營次日五更時分選差夜不收王洪郭自當等先行爪蹤官軍繼後卯時馳至河口瞭見河邊敵衆亂攘浮水過河職等嚴督官軍持刀向前直衝其陳敵人前來迎敵數合就陳前斬獲首級射死敵馬餘衆奔往東南去訖復督官軍追至地名張湃言井寇已去逺天晚收兵中營堡駐劄查得陳前斬獲首級三顆射死敵馬三匹收獲浮水馬皮渾脫并夷器六十八件枝中傷軍人于子中等四名初四日掣兵回營防守具呈施行等因各開報到職除將斬獲首級奪獲戰馬駝騾夷器等件并陳亡中傷有功官軍量為犒勞奪獲被掠牛驢招主認領人口送發寧家外今將獲功官軍備造文册理合呈繳施行等因到臣及據副總兵劉玉參將苖鑾都指揮高時守備沙金等各呈報相同又據總兵官杭雄呈亦為前事本年九月初三日據河西賀蘭山宿􅒈口出哨夜不收陳伏保報本月初二日酉時瞭見境外敵衆三路約有二三百騎從南近邊往北行走初四日據白土岡墩夜不收王升伏路鄉導王榮報本日卯時瞭見腹裏敵衆約有三十餘騎從東過路往西去訖據此職分布坐營指揮曹江把總指揮楊時各統正兵有馬官軍八百餘員名竒兵把總指揮郭鑑官軍三百八十員名在於清水營設伏仍令把總指揮李翰管領無馬官軍五百員名沿邊墩空把截拒守二十七日據坐營指揮僉事曹江呈稱㑹委本職統領正兵有馬官軍五百員名渡河前去清水營㑹合指揮楊時郭鑑等按伏擺邊截殺本月二十日巳時據夜不收蔣得六等報稱爪至地名駝房沙窩見得敵衆新行馬蹤五道戳死馬匹在彼其衆往西行走據此當分指揮劉勇等官軍於沿邊堵截本職即統有馬官軍一百餘員名襲追至地名石井兒爪見敵衆二騎往西奔遁職督官軍馳追前敵拚命各持弓箭迎射前來官軍奮勇撲砍就陳斬首二顆奪獲敵馬二匹收獲敵器敵箭四十一件枝中傷軍人一十七名具呈施行二十八日准分守東路參將都指揮僉事劉謹手本開稱九月十八日酉時據石溝驛按伏夜不收張三馳報十七日申時哨見地名雙山兒敵衆二三十騎從西過路往東行走據此當㑹延綏副總兵趙瑛各統官軍二百餘員名前去襲追及省諭擺邊官軍用心拒守十九日申時馳至地名許直山迎遇前敵二十餘騎呐喊衝突前來職等嚴督官軍持刀向前劈砍就陳斬獲首級二顆敵見我兵勢猛潰散復督官軍追至地名碗者度斬首三顆餘衆奔走天晚黑暗風雨大作就彼下營次日天明爪得前敵蹤跡徑往西南敗遁欲再追趕馬力不敷收兵定堡駐劄二十一日掣兵回營查得本職部下官軍指揮季潭等斬獲首級三顆奪獲敵馬三匹收獲敵器一百五件枝重傷官軍劉越等二十五員名射死軍人孟斌等官馬四匹延綏副總兵趙瑛部下官軍劉棟等斬首二顆奪獲達馬二匹射中倒死一匹見在一匹收獲敵器八十四件枝中傷官軍蕭漢等一十九員名射死軍人齊買兒等官馬一十一匹合具手本施行隨准協守延綏副總兵署都指揮僉事趙瑛手本亦開對陳緣由相同又准分守中路左參將都指揮僉事苖鑾手本開稱九月十一日本職統領馬步官軍前去紅寺堡設伏截殺十二日未時據本堡瞭髙軍人王仲賢報瞭見察家窪墩舉雙煙一把據此當統官軍襲烽馳過本墩迎遇原差鳴沙州城地方哈達蘇墩夜不收常能報本時瞭見夲墩迤北敵衆二十餘騎往東地名黑嶺岡行走急督官軍襲蹤馳至烽臺墩地方與之對敵就陳斬首一顆射死敵馬一匹餘衆往北奔走復追至靈州地名紅圪坦水前衆復來衝敵就陳斬首一顆收獲敵馬一匹天晚收兵党千戶井下營次日天明據襲蹤夜不收劉保兒報爪得前蹤俱往地名白土岡行走馳追間迎遇暫管寧夏遊兵都指揮髙時議料前敵未曽過路必在金積山溝澗潛伏㑹兵搜剿隨據遊兵夜不收李茂報稱爪得舊石溝墩南空馬蹤五道北空馬蹤三道俱各過路往東去訖本職又㑹都指揮髙時各另統兵分襲敵蹤追剿本職追剿吳家廟溝長流水等處敵衆徑奔東北去逺天晚收兵石溝驛駐劄據中軍指揮王濬呈查得對敵斬獲首級三顆奪獲見在敵馬一匹射中倒死一匹中傷軍人錢山等二名射死軍人田剛等官馬三匹追敵走死軍人周官保等官馬七匹收獲器械弓箭共五十三件副枝行間續據紅寺堡把總千户張從善呈稱原差本堡夜不收陸能王三鄉導王洗前去鳴沙州地方紅桞溝爪探忽遇前敵將陸能王三殺死王洗中傷回營合具手本施行又准委官寧夏遊兵都指揮僉事髙時手本開稱九月十二日夜一更時分據靈州城東南角樓小旗石成報節次烟墩火一把據此隨即統兵襲烽馳至舊石溝兒天明迎遇小鹽池參將苖鑾說稱敵衆十騎往東行去本職爪得前敵過路督令官軍奔馬追襲至地名卾勒郭克齊其衆戳死敵馬一匹在彼又督官軍由蘇哲巴河泥大沙窩跟追約逺四百里天晚恐敵近邊督發指揮馬賢李幹等先統官軍奔邊防備本職於四更時分馳至廟兒墩駐劄十四日天明從地名哈喇烏蘇溝爪襲見有死馬三匹空馬八匹在彼夷器弓箭埋藏其衆於紅山兒墩東空不知時分用繩弔扯過邊出境去訖合具手本施行又據協同分守興武營署都指揮僉事吳雲呈據守禦千户所申本月十八日卯時據守南門軍人李義盤詰得男子一名楊六十供年一十八嵗係鞏昌府人失記年月在莊遇敵薩巴沙津搶去在營住過六七年今年跟隨搶我敵人一千有餘浮過黃河被西邊敵人揚巴布殺散內有一百五十餘騎復回過河去了薩巴沙津等衆皆奔邊行走遇見兩邊人馬前來追趕殺散六十等八箇一處又到不知名水頭住下看見人馬追來别賊四散不知去向是六十原騎青騸馬一匹乏弱下馬藏躲沙窩內聽得敵人說邊上有人馬擺列不得出邊六十丢棄勞蹄將原戴達帽藏放懷內往邊步走四晝夜到營盤獲得出具呈施行等因各開報到職卷查先為申明舊例請勑各邊守臣防禦邊患事抄䝉提督尚書楊鈞帖前事巳經㑹議遵照分布各該副參遊協守備等官㑹合各枝人馬相機截殺去後今該前因㑹同巡撫都御史林琦議得前項敵衆自去冬入套雖不時分遣輕騎窺伺為因邊備嚴密未敢深犯今却自西浮過黃河侵擾靖邊紅寺等處地方是又前此所無職遵照軍門預先運布方略調度各枝官兵擺邊拒截連日分襲追剿斬獲首級奪獲戰馬器械敵遂奔潰出邊功雖不多而敵人緣此大銼邊境之患似亦少除但今秋髙馬肥正彼馳騁時月惟恐復來侵擾又經通行鎮屬各該將領等官整㮶兵馬愈加設伏防範相機戰守及照脫走男子楊六十雖稱先年被掠人數却乃隨賊肆惡侵犯比與邊外走回人口不同除將獲功官軍量為激勵外今將獲功緣由理合開坐呈繳施行等因節呈到臣案查先為敵衆入境等事夲年八月二十日午時據守備靖邊地方都指揮同知辛忠差夜不收飛報夲月十八日有河西達衆二百餘騎從本境扯木硤浮渡過河見在本邊住牧等因為照敵衆既入我境必有侵犯搶掠之謀隨經督發鎮守陜西署都督僉事鄭卿固原守備都指揮劉文并行鎮戎所按伏延綏遊擊將軍張鳯各領兵前去追截剿殺猶恐敵人被我官軍追逐奔往寧夏地方出邊入套當即馬上差人帖仰寧夏中路參將苖鑾靈州按伏暫管寧夏遊兵都指揮髙時靈州守備沙金各整㮶人馬差人哨探如遇敵人奔遁前來即便㑹兵剿殺又恐沿邊興武營花馬池一帶只防套內聲息不知腹裏有警失誤截遏亦即馬上差人帖仰花馬池按伏延綏副總兵趙瑛寧夏東路參將劉謹興武營協同都指揮吳雲各整兵相機阻截剿殺復恐敵人因見腹裏并寧夏中路小鹽池等處有備潛從黃河水淺去處浮渡過河奔往賀蘭山後藏躲又經帖仰寧夏總兵官杭雄量發本城正竒兵馬於河西緊關城堡分布擺列仍量撥兵馬於河東地方駐劄㑹剿及照陜西遊擊將軍陶文統領遊兵見在慶陽山城等處防禦套人本枝兵馬係先具題應援河西之數見今莊浪河西凉州等處敵兵壓境相應調發又經帖仰本官即便統領所部遊兵從萌城小鹽池韋州靖邊等處到於㑹寧安定駐劄待河西有報督發應援倘若中路遇敵即便㑹合參將苖鑾等人馬相機剿殺續據都督鄭卿揭帖禀稱本職領兵到於哈喇都設伏間據靖邊守備辛忠原差哈蘇濟架塘夜不收仇喜喜走報二十日辰時敵衆四