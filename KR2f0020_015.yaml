等變既起於不測勢復駭於方張逺近驚疑上下私恐皆畏難以遽圖速定如近年趙風子之變蓋可監也仰賴九重之上神武素昭天威逺布及提督鎮守撫按清軍總兵各衙門宣力協忠督兵設䇿立消大變以靖一方城野既無殘破之憂兵糧亦無耗費之患此實地方之福何俟職言所據分守陜西布政司右參政楊叔通分巡按察司僉事王鈞始嘗設備全城終復奮身剿賊土巡檢于鰲親擒首惡用杜後虞以上三人功俱可嘉管屯僉事桑溥計執逆黨都指揮使孫昌張鎬䇿布兵威西安府知府趙伸均宣調布之勞同知王暘克著分擒之績西安前等衛指揮把鉞張鵬鄭養民千户王相宋沉郭良穆希周葛宇俱嘗䇿應盩厔縣知縣王䀻武功縣知縣姜恩興平縣縣丞鄭濟醴泉縣主簿侯㑹各有捕獲乾州知州趙時雖經失事於前卒能效勞于後以上各官之功亦皆難泯但該府掌印巡捕及領軍并守巡各官始雖失覺厥過猶微誠難掩功趙時之功亦堪贖罪變之方興則舉其過以責其功事之既定則録其功而略其過政亦宜然伏乞通為奏請將樊紳樊綬樊緯與同楊朴等五名俱明正典刑其餘臨時從謀并家衆捕首者嚴其一身之誅减其家衆之坐則刑政之典正而國法既舉好生之德全而人心亦安其諸有功人員略其微過俱分别等第以行賞格土巡檢于鰲仍照軍升軍職事例授以百戶填注西安衛所以寓羇縻之術知州趙時准其以功贖罪庶幾不失宥過之方尤全勸功之典矣等因備招具呈到臣案查先為前事夲年九月二十八日午時據陜西布政司分守關內道參政楊叔通呈本月二十二日丑時據西安府同知王暘禀及據乾州知州趙時禀帖內開本月二十一日辰時分强賊樊紳等率領馬步人約有五百餘名各帶弓箭器械張打旗號將夲州四門圍困喊聲殺害本職率領城內居民對敵內有劉啓東將賊射傷二人馬一匹賊將城上守把老人李森等二人射傷見今攻圍不退理合禀乞早發兵馬前來救援一州生靈等因先該各道㑹同巳將賊首樊紳窩主韓恭等六名口拿獲在縣供稱該縣地方多有無籍光棍暗行順從先時張勢挾財節經首告取供間今據前因看得賊首樊紳合謀結黨巳非一日雖稱烏合之衆然當民窮易亂之時若不早為撲滅恐致蔓延逺近為患不淺况今省城兵馬單弱合無量調邊兵三五百員名行令將官一員統領前來隨宜剿殺以安地方等因到臣查得固原等處邊兵俱發各邊城堡按伏防禦見今河套河西俱有大賊窺伺難以掣調隨行鎮守陜西都督鄭卿將西安左前後等衛備冬官軍挑選有盔甲馬匹精鋭六百員名行委都指揮孫昌指揮楊茂分領并巡撫衙門跟隨巡邊官軍指揮劉啓等三百員名㑹合撲剿及照巡撫陜西地方都察院右副都御史王藎見在固原議行親督前去調度外為照參政楊叔通等呈稱賊首樊紳合謀結黨已非一日各該府州官員不行早為緝捕又不見呈請合干上司作何定奪布按二司分守分巡官既知有前項賊情亦未聞督併軍衛有司官員設法挨拿究治直待聚齊人衆攻圍州城射傷人命方才告急請兵俱難辭責但舊官俱已去任見今分巡分守俱係新任官員到任未久似宜責效將來切緣各府州縣地方俱有盜賊時出剽掠若不早為撲滅將來結聚蔓延之患難保必無又經通行都布按三司并關內道守巡官嚴督軍衛有司整㸃城操官軍舍餘民壯機兵快手鄉導人等各置備弓矢器械隨處把截防守如遇官軍到彼指引道路㑹合擒剿務期盡絶以靖地方再照腹裏賊情比之外寇不同中間多係無知愚民聽人哄誘誤陷賊黨軍馬一臨未免玉石俱焚情有可憫已行各司轉呈巡撫衙門設立賞格出給告示曉諭但能悔罪自首與免本罪查發寧家聽其家屬里老鄰佑保管不許仍前為非有能擒獲賊徒或指引官軍拿獲賊衆者分别等第從重給賞示出之後果能自相解散免致濫及若稔惡不悛敢與官軍拒敵痛加誅剿母得姑息都布按三司仍行關西關南二道分守分巡防守等官各嚴加防範如遇前賊遁入各境一體督兵捕剿及具題去後今據前因參照犯人樊紳釀禍伏姦鞠凶逞悖憑藉邪術藏布妖書敢奮蜉蝣之羽欲攘螳螂之臂結惡黨以誘愚民聚凶徒而攻州治甚至暗署僞官私竊稱號實蹈滔天之罪難逃赤族之誅楊朴等并楊大學等跡夲冥頑性多獷戾共聽邪謀隂懷異志初本惑於妖言既乃陷於不軌仰仗聖武布昭皇威逺被鎮巡官員督發官兵指授方略變不移時而凶翼自剪兵不血創而首惡就擒原情定罪夫復何辭已該鎮巡官督同都布按三司官員審取供招議擬奏請定奪臣十月初旬聞前賊解散因河套有警出巡延寧等邊相離省城地逺十一月初三日在於花馬池地方據都布按三司差人賫送原問招擬到臣根究既明議擬亦當廟堂必有所處何俟贅言但竊聞此輩聽信邪術容蓄妖徒結搆不止一方醖釀已非一嵗各該官司坐視不理或知而輕縱以致逺近愚民承訛效尤恬無畏忌如乾州之事衆所共知因循失舉直待聚衆攻城方才請兵告急匍匐入井在赤子以何知崑岡火炎恐玉石之俱毁故陷百餘生靈於必死之地者有司之過也切詳樊紳樊綬樊緯與楊朴等原謀之人情無可原法應全坐其楊大學等一百六十六名本非原謀陷於極惡或隨衆以攻城或入山而拒敵各官所論謀有久近則情有淺深情有淺深則法有全减似為合中但恐中間亦有臨時脅從及讐攀誣指之人事在陜西淺深之情法司無由而知全减之科朝廷恐難定處且執法者人臣之義好生者天子之仁近年如寧夏置鐇江西宸濠之亂脅從多從末减皇上嗣極以來於大辟死刑詳慎再三不輕論决凡以存欽恤之念而廣好生之德也况前賊蓄謀雖久凶跡未張既不曾流劫鄉村又不曾殺死人命假妖言以惑人挾寸布以為號聚衆攻城不踰時日一聞官兵追逐羣衆多所解散跟隨入山者不過二十餘人其陸續擒獲者多係互相攀引而藏匿山谷逃躲未獲者尚多恐其自相驚疑反為不靖又恐三司等官倉卒鞫問萬一未得其平將貽多殺之悔臣心有未安不敢不言而獄非親鞫亦未敢自以為是伏惟聖明裁斷乞下法司參詳議擬合無差給事中刑部郎中各一員到於陜西㑹同撫按督同三司官員再行虛心審鞫務要詢謀僉同除原謀樊紳等外其楊大學等一百六十六名酌情議擬跡顯情重者照依各官所議誅其身而免其連坐其餘或發南方烟瘴地靣永逺充軍惟復别有定奪中間若有讎攀誣指及審無實跡者亦要從公開釋如此則法無幸免足以警動人心罪無濫及不致感傷和氣而未獲愚民聞之亦有自新之路矣緣係地方賊情事理未敢擅便為此具夲專差馮逺親齎謹題請㫖關中奏議卷十五
