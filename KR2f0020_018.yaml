body:
  text: 關中奏議卷十八明楊一清撰提督類一為處置屬番以安邊徼以杜後患事欽差提督陜西三邊都御史臣楊一清謹題為處置屬番以安邊徼以杜後患事嘉靖五年正月十八日准巡撫甘肅等處地方都察院右僉都御史寇天叙咨據陜西按察司分巡西寧道帶管肅州兵備僉事李孟旭呈奉本院㑹案前事依奉㑹同分守肅州右參將都指揮同知雲冒本司甘肅管糧僉事周汝勤督同肅州衛掌印指揮使李堂并撫敵官通議得哈喇輝輝和爾及川邊王子莊齊勤苦峪柴城兒扇馬城大草灘等處各種番部俱是我哈密䝉古罕都等衛屬番皆屬肅州衛帶管先年俱被吐魯番哈密回子侵奪搶殺窮迫求生來投本衛依住節䝉總制鎮巡等衙門奏請差官撫遣回還本土各敵畏懼吐魯番吞併殺戮不敢回還鎮巡衙門憫其窮無所歸不忍驅就死地且恐驅迫之急反生别患又察各敵情形無他從宜將哈喇輝輝和爾二種敵人暫且安插肅州東關廂居住川邊王子莊齊勤苦峪柴城兒扇馬城大草灘等處各敵暫且安插肅州境外金塔寺地方居住令其自為耕牧待後西事稍寧哈密復立仍各遣還住守故地中間有住居四十餘年者有十數年者內哈喇輝輝和爾二種屢曾與吐魯番死戰原係哈密忠臣未嘗有過住居我邊年久時有調遣未嘗敢違亦未嘗作惡川邊等處番人住居金塔寺地方去肅州一百二十餘里亦各安居樂業未敢生事近該前巡撫都御史陳九疇等及兵部尚書金獻民慮恐前項哈喇輝輝和爾并川邊等處番人原係敵國非我族類誠恐日後馭非其人主不制客尾大不掉遺患地方欲要早為議處將哈喇輝輝和爾揀擇肅州城外空閒堡寨安置將川邊等處番人修築前古丢棄威武舊城安置庶番漢異域可免後憂奏行兵部轉行提督軍務兵部尚書楊一清復行鎮巡衙門通行詣肅州處職等又督同撫夷官通拘調各番頭目親職等審城北查勘惟有新城一處空堡離城三十里又有暖泉板橋二堡各離城十里俱係肅州軍餘春夏務農住居之所冬間空閒相應安置各夷因曉諭各國番漢雜居終相疑二徙居别所兩取便安等情內哈喇輝有二種欲將新哈喇輝安置新城兒舊哈喇輝安置暖泉堡輝和爾安置板橋堡內新哈喇輝云此是鳥雀不落之地我們如何住的舊哈喇輝與輝和爾云我們東關住居年久各有置買房屋不能割捨我們情願入堡將我們家小仍留在東關也罷職等又諭以既容你輩入堡你原置買房屋聽你賣與漢人或自行拆缷堡中修蓋你原無房屋者官司替你另蓋務要使你得所因諭以回子去年每每遺言反間說你哈喇輝輝和爾教他來犯邊倘若鎮巡不察其姦你們也不安穩處你别處居住則你輩有畜牧之業我無疑猜之嫌兩相便安豈不是好各敵方云我們俱是朝廷管的屬番任從三堂所處豈敢不從方各承認看得新哈喇輝原無房屋一向趁逐水草搭帳住居合無將新城堡修理城門堅完令其在內自搭帳房居住暖水板橋二堡城門破損令舊哈喇輝輝和爾東關原有房屋者或轉賣或拆缷自行堡內修蓋居住舊無房屋者官司替伊起蓋并將城門修理堅完待恩克保喇之子襲職回日令其管轄在內居住前項修門修房工費不多本鎮可以自處又看得威武城在肅州正北去肅州二百五六十里金塔寺在肅州東北去肅州一百二十里川邊等處各敵舊巢去金塔寺近而去威武城逺况各敵現今俱在金塔寺耕牧居住今使之舍近而就逺恐非其情且金塔寺去肅州巳逺處之於彼亦無所妨况先年鎮巡原擬暫留居住事寧遣歸本土亦非久住之地且威武城頗大城垣倒塌者多城門俱各損壞無存所費工力頗多大約修築牆門除木料外可用人夫六七千人又要軍馬二百里之外架梁防護人夫所用食米不資况今肅州年成薄收米糧髙貴回賊不時在外窺伺疲中國而役逺敵非計之得者也且各敵住居金塔寺年久亦巳安便所據欲要修築威武城安置川邊等處番人似非所急職等愚見如此呈乞裁奪回覆施行等因據此案查先節准提督軍務兵部尚書楊一清咨前事煩為㑹同鎮守太監總兵副參等官督同二司兵備分巡管糧等官議處停當明白咨報以憑參酌回奏定奪等因又准兵備咨為整理邊務以備寇患事俱經節行各官議處踏勘去後今據前因㑹同鎮守太監董文忠總兵官署都督同知姜奭協守甘州左副總兵趙鎮㑹議得弭患貴防於未然弭患不預則引蔓滋長後將難圖舉事宜乘夫機㑹機㑹不至則本欲集事而反以僨事前項敵人哈喇輝輝和爾住居肅州關廂番漢雜處久逺之慮誠有如兵部尚書金獻民及前巡撫都御史陳九疇等所奏者安置别所使番漢異域後患可消深慮曲防防微杜漸之意固為有見但各敵住居肅州關廂四十餘年並未嘗為惡時常聽我調遣且所居房屋或有典買或有自蓋安土重遷亦人之常情今無故一旦遷之於外雖因巡守官曉諭一時屈從探其本心終有未安者觀其對各官之言可以槩見本院與總兵官姜奭近日出巡至肅州亦曾拘調各敵帶領撫夷官通親到前項堡寨曉諭前意各夷所對之言與前大略相同况今西域吐魯番搆怨方深正諸敵杌陧不安之秋在我惟當以鎮靜安輯為主若又遷置各敵紛紛多事以拂其心臨期倘有生拗則事雖中止欲事必成又恐患生意外所據川邊等敵見住金塔寺地方者不必遷動又徙威武舊城徒費工力自取騷擾其哈喇輝輝和爾見在東關住居者亦且暫令仍舊居住待後西事頗寧年歲豐稔人情洽和本鎮措處錢糧有緒將新城兒暖泉板橋二堡合用修築房屋城門等項工料計處停當另行奏請明示修蓋完備將各敵撫諭安置其中暫住待候哈密復立仍照原擬遣還本土如此則乘時舉事事庶可集各敵不至驚疑而地方可免後患矣緣係處置屬番以安邊徼以杜後患事理合就備咨前去煩請裁處具奏施行等因到臣案查先准兵部咨該本部題該巡撫甘肅等處地方都察院右副都御史陳九疇題前事內開㑹同鎮守太監董文忠總兵官署都督僉事姜奭議得哈密本元人托克托國洪武年間以其國來降改為哈密衛封托克托忠順王與之金印使掌西域入貢之戎於時吐魯番尚為小國其部落回子臨近哈密者遂臣服托克托托克托部下有三種曰輝和爾曰哈喇輝皆西北之敵而回子則吐魯番之遺孽也托克托後王母當國吐魯番欲奪哈密乃因哈密回種夜半獻門遂殺王母而輝和爾哈喇輝致死巷戰始卻回賊保全哈密此其結讐之始也其後哈尚繼守哈密吐魯番仍因哈密姦回襲殺哈尚而輝和爾哈喇輝與難者又數百人此其成讐之漸也逮夫善巴復立恩克保喇掌國討殺國內姦回皆於二種之力此其積怨之深迄今而未解者也至蘇勒坦伊蘭既已去西域而恩克保喇亦奔肅州二種敵人亦挈家而至此大槩也至於沙瓜即漢之燉煌郡我朝改為䝉古衛川邊苦峪齊勤即漢時屯田郎中地改為罕都衛沙瓜齊勤等處番部本皆一種枝大散處故因地取名各異耳川邊齊勤之番各當吐魯番哈密入貢之路貢回敵人須有獻遺方得過往不然則攫取而殺害者時亦有之以此西域賈回遂與成讐正德七八年間舍音和珊雅穆拉等率吐魯番哈密之衆將川邊王子莊苦峪齊勤等番殺掠數千人以去以此諸番窮迫不能自立來依我邊已經前鎮巡等官奏請安插今已十二三年此其大略也據此各種番人舊屬肅州管轄節與回賊搆難故各投邊依住其瓜州番人叛服不常巳經臣等㑹奏另候處分外照得川邊苦峪齊勤之番為數雖多而精壯者少且各安插逺堡縱有異謀勢亦易制至於哈喇輝輝和爾本皆强敵為數雖少精壯者多且處關廂近地何異抱虎而眠跡其今日似若無事然家人父子尚有嫌隙異類雜居終難輯睦一旦馭非其人變生不測必危邊境誠有如兵備參將之所議者今若必欲邊境奠安俾無後患惟有遣還屬敵各回本土使虺蛇不隱於室閭虎豹不飼於㭱檻庶免後日竊發噬齧之患但今哈密沙瓜巳順吐番嘉峪關外即為賊境西域從此不通地方滋益多事其輝和爾哈喇輝斷不敢歸還哈密而罕都之衆亦不能住守川邊苦峪齊勤等城亦明矣必欲圖我之安而不恤夷人之苦既逆其情必失其心窮無所歸勢將返噬彼北合衛拉特西連察克台不又生一敵所謂借寇以兵而資盜以糧為計不已拙乎為患曷其休巳若欲姑留依住又恐日後患生肘腋禍起蕭牆究根坐由罪在今日臣等雖死亦不瞑目是二者遣之有患而留之亦有害也去留之際處置實難臣等愚昧誠未知處如䝉伏望乞敕兵部㑹集多官詳加議處明示進止以憑施行臣等又查得𢎞治年間吐番阿哈瑪特王子憑藉哈密姦回襲奪哈密城池虜去忠順王善巴殺死阿穆爾都督恩克保喇挈輝和爾哈喇輝二種夷人二千餘名口來奔肅州鎮巡等官將各夷分寄涼莊山永等衛月與口糧寄養數嵗朝廷思患預防恐其有變敕兵部侍郎張海都督侯謙令其撫處哈密兼察哈密寄食夷人動定與恩克保喇向背之心其辭有曰自哈密失守之後隨哈尚內附者處之苦峪既而復返今又來奔中間未必皆出自哈密或有别種豈無異心恩克保喇不知其心向背如何使居其地一旦有事足以拒乎否乎其行都司在外七衛二所并嘉峪關外近邊之地更有堪以屯聚耕牧之所可以開創營寨擢用頭目分統其衆如苦峪者否又苦峪近地其間有無前古廢城遺壘可以興復建置如苦峪事例散處敵衆者否一一仔細詳加尋訪踏勘是實熟思審處必有利而無患的然可以為安內方略來上以俟朝廷再加審處伺便乘機而行之以為制外之張本觀此則先時廟堂之上所以計慮而安處屬番者未嘗不委曲詳盡如此之至也既而張海等覆稱訪得陜西行都司在外衛所西寧地險敵人雜處鎮番地窄偏在一隅髙臺鎮夷地小俱不堪開創嘉峪關外近有大草灘白楊林兩地廣漠斥鹵彈丸黑子不堪耕牧惟甘肅等衛俱係鎮守分巡重地可以安輯防微杜漸終宜驅出但阿哈瑪特逆命哈密未復善巴未歸無時可乘無機㑹可遣欲要先行於哈密衆敵之內推舉根基頭目數人分管各種回敵分别應否遣還人口給與布花種食令其盡數歸還本土下兵部可其奏又可見先時撫邊大臣計處周詳雖知終當驅出然不忍以內附屬敵驅而置之必死之地所以含容隱忍姑且安插甘肅寄住兩地蓋其當時理勢使然不得不姑為是處耳後阿哈瑪特悔過送出善巴復令守國前項敵人因寄住年久安土重遷半隨善巴之國半在甘肅寄住迄今殆將四十餘年矣曩者蘇勒坦莽蘇爾去國恩克保喇奔肅其輝和爾哈喇輝二種敵人巳竭族避難而來其在哈密者止有回回一種耳今此二種敵人既巳居住年久又與回種世讐一旦逆情遣出必生變故為患遂在目前此又不可不長慮也臣等又訪得哈喇輝輝和爾惟事畜牧不善耕作合無揀擇肅州北邊久棄空閒堡寨水草便利之所少費官錢為其修理城郭改造屋廬諭以番漢雜居終相疑二徙居别所兩取便安之理况恩克保喇之幼子近據該衛起送襲職待其回還令其管轄部落且容不去哈密令其暫住臨邊彼亦無不樂從者至於川邊王子莊苦峪齊勤等衆人頗訓順亦善耕牧先年嘗令住牧境外百里地名金塔寺者彼亦安居樂業不敢生事合無因前古丢棄威武舊城再加修築挑濬壕隍以處其衆是肅州地面又添一藩籬也良於地方有益如此則與先年處置內附番夷者事體相同但使逺去城郭何患包藏禍心縱有不逞之徒呌跳於藩籬之外既絶內應亦不足以病邊城矣雖然此暫處耳若欲久安長治必須界破疆域漢自漢而番自番庶乎邊地可守今哈密沙瓜俱巳叛順回賊嘉峪關外未可輕議也等因題奉聖㫖兵部看了來說欽此欽遵該兵部議擬看得都御史陳九疇題稱瓜州番達促克布等狼子野心終難訓化若不痛加誅戮無以威制諸番其哈喇輝輝和爾本皆土番為數雖少精壯者多今處關廂近地何異抱虎而眠欲遣還本土又恐窮無所歸勢將返噬若姑留依住又恐日後生患乞要敕下㑹官議處及稱哈喇輝輝和爾惟事畜牧不善耕作合無揀擇肅州北邊久棄空閒堡寨水草便利之所少費官錢為其修理城郭改造屋廬諭以番漢雜居終相疑二徙居别所兩取便安待恩克保喇之幼子襲職回還令其管轄無不樂從至於川邊王子莊苦峪齊勤等衆人頗訓順亦善耕牧合無因前古丢棄威武舊城再加修築挑濬濠隍以處其衆良於地方有益若欲久安長治必須界破疆宇漢自漢而番自番庶乎邊地可守今哈密沙瓜俱巳叛順回賊嘉峪關外未可輕議一節為照逺人固所當柔而後患亦所當慮各處敵人非我族類其心必異前代徙居內地其患可鑒但今既稱寄住年久一旦驅之出關窮無所歸不北合衛拉特必西連察克台未免又貽後患今各官既稱肅州北邊空閒堡寨水草便利可以安插哈喇輝輝和爾二種威武舊城可以安插川邊王子莊苦峪齊勤等衆必其相度地宜審察敵情俱各停當似宜依擬但今都御史陳九疇巳䝉升職取回難責幹理及照新任提督三邊軍務尚書楊一清不久到彼似此重大敵情合無行移本官再行酌處如果事體穩便照依原擬遷發安插仍具由回奏如果未便應該别處亦要具由奏請定奪等因題奉聖㫖這安插諸敵事宜還行與提督軍務官著再行酌處務要停當欽此欽遵備咨到臣行間又准兵部咨為整理邊務以備寇患事該提督軍務兵部尚書金獻民題內一件議處屬番照得哈密衛都督恩克保喇自正德六七等年節被吐魯番殘害率其部下輝和爾哈喇輝二種生達投來肅州依住節該鎮巡官奏請差官撫遣歸還本國各敵畏懼前敵吞併殺戮俱不肯回迄今寄住該衛關廂者十有四年頃聞男婦不下千口帶甲挽彊之士近五六百人此固心腹之患也竊以邊腹自有界限卧榻之側豈宜容人鼾睡故番漢雜居致有五部之亂邊隅無備卒遺三晉之禍蓋以此等苗裔終非我族况本以畜牧為生者擅富彊之部落住切近之門牆譬之饑鷹餓虎一時搖尾附人終有山林雲霄之志茍不亟為一處以杜其漸將來潛住日久窺伺日熟誠恐患生不測必有噬臍之悔合無行移甘肅鎮巡官查照𢎞治年間侍郎張海等撫處哈密事例將前項敵人通行查出或以禮省諭遣歸本土或憫其窮迫安劄别地務要計慮周悉區處停當期於內外肅清彼此兩便既不可因循玩視失誤事機又不可處置乖方激生他變等因該兵部覆題查得先為處置屬番以安邊徼以杜後患事該本部議擬題奉欽依行移提督軍務尚書楊一清酌處奏請定奪去後今所奏議處事宜大略相同合再行本官酌處等因節該奉聖㫖准議欽此欽遵通咨前來為照肅州寄住輝和爾哈喇輝二種夷人乃哈密之部落亦哈密之忠臣先年吐魯番戕殺王母既致死巷戰其後襲殺哈尚又死難數多至於善巴復國討殺姦回亦多效力要其心跡本非有過乃因窮迫歸我求生寄住年久未嘗作惡比與哈密回回不同今都御史陳九疇等議以異類雜居終難輯睦一旦馭非其人變生不測必危邊境深慮曲防不為無見但欲遣回哈密則彼與吐魯番讐怨巳深斷不敢歸還故土今要揀擇肅州北邊空閒堡寨水草便利之所少費官錢為其修理城郭改造屋廬諭以番漢雜居終相疑二徙居别所兩取便安待恩克保喇幼子襲職回還令其管轄部落且容不去哈密令其暫居臨邊稽之事體似亦相應但恐各敵安土重遷不肯樂從若强之使去致失其心反生厲階及修理城郭蓋造屋廬等項未審工程多寡本鎮財力堪否供辦巳經移咨巡撫甘肅都御史寇天叙㑹同鎮守太監總兵副參等官督同二司兵備分巡管糧等官議處先行曉諭各敵使知彼有畜牧之業我無疑猜之念如果樂從仍計議修理城郭改造屋廬合用工料若干先期整理完備方可督發遷移川邊王子莊苦峪齊勤柴城兒扇馬城大草灘各種回敵亦被吐魯番殘害窮迫來歸不敢復還原土故該鎮巡議處准令暫安插金塔寺地方彼亦安居樂業不敢生事今要因前古丢棄威武舊城再加修築挑濬壕隍以處其衆既為肅州北面添一藩籬又使逺去城郭不患包藏禍心前項所處似得柔逺防姦之意且與先年該部所處大略相同但前項地方大草灘扇馬城柴城相離嘉峪關不逺王子莊則在苦峪之西離邊稍逺大約皆齊勤䝉古衛番族住牧之地近年節被回賊驅掠傷殘棄地方而不守投內地以求生今所議威武古城未知相離嘉峪關外地里若干修築城垣挑濬壕隍應用工力若干委官踏勘明白就煩㑹同議處即今臨邊有無回賊窺伺并修築之後防護之兵作何區處方得一一就緒料彼夷人以帳窠為宫室以耕牧為芻糧既有城郭可以自保無不樂從之理俱要議處停當明白咨報以憑回奏定奪去後今據前因竊惟防患當於未形防之太過反生意外之虞作事當謀諸始始謀不臧將無善後之策看得前巡撫甘肅都御史陳九疇等并兵部尚書金獻民後先議奏其說有二一則欲將肅州關廂寄住哈喇輝輝和爾二種夷人揀擇肅州北邊久棄空閒寨堡水草便利之處安插居住一則欲將川邊王子莊苦峪齊勤柴城兒扇馬城大草灘等處先年安插暫住金塔寺夷人因前古丢棄威武舊城再加修築以處其衆是皆欲嚴彼此之辨謹內外之防深慮却顧誠皆體國安邊至意但懷柔逺人之道當順其情情有未協強而使之恐生他釁且哈密乃朝廷封國吐魯番敢於殘破之使其播遷離析而我不能為之所以失中國懷逺恤患之義矣彼哈喇輝輝和爾二種敵人皆忠於哈密被其戕害率衆來奔先朝從守臣之議許其肅州關廂居住歷年滋久彼無反側之心我得調遣之用今一旦疑其後日之終不靖也而欲徙之北邊空閒寨堡安土重遷豈敵情之所欲哉觀其對各官之言曰此是鳥雀不落之地我們如何住的又曰我們東關住久各有置買房屋不能割捨我們情願入堡將我們家小仍留住東關也罷等語其情可見後各官諭之以好語動之以危言方才承認終非所樂明矣其川邊王子莊苦峪齊勤柴城兒扇馬城大草灘各種番人俱係境外屬番肅州衛羇縻帶管之數節被吐魯番哈密回回侵奪搶殺窮迫來歸先該總制鎮巡等官奏請暫且安插肅州境外金塔寺地方居住令其自為耕牧有住四十餘年者有住十餘年者今欲驅而置之三百里之外舍近就逺必非其情且原擬待後西事稍寧哈密復立仍各遣還住守故地是猶存興滅繼絶作我藩籬之意若依前擬則恢復之念荒哈密之望絶矣及照各官所擬新城兒暖泉板橋等堡堪以安插二種敵人之地修門修房等項雖費用不多亦未免勞擾又奪肅州軍餘春夏務農之地以與之似俱有礙至於威武城修築約用人夫六七千名又勞軍馬架梁防護且今肅州地方番回之窺伺未巳我兵之警備方嚴豈暇逆探未形之患以供不急之役乎倘或番回乘我工作之際率衆侵擾禍且不測推原各官論奏蓋見前年回賊退遁誤信蘇勒坦莽蘇爾雅穆拉巳死之言遂謂肅州自此無事故有是言若體諸各敵之情參以今日之勢非惟不能亦所不敢據今鎮巡所言土魯番搆怨方深正諸敵杌陧不安之秋在我惟當以鎮靜安輯為主若又遷置各敵紛紛多事以拂其心臨期倘有生拗又恐患生意外等語似為有見如䝉乞敕兵部參詳議擬合無將前項川邊王子莊等處番敵令其照舊於金塔寺地方住牧以為後日恢復之圖以存興滅繼絶為我藩籬之意其哈喇輝輝和爾二種敵人亦且令其照舊肅州關廂居住不必預為遷徙之說以離其心待後番情寧謐財力有餘之日如果事勢可為另為具奏定奪庶使敵人無疑二之情地方無勞擾之患而我得以專意內修可收攘外之績矣緣係處置屬番以安邊徼以杜後患及節奉欽依這安插諸敵事宜還行與提督軍務官著再行酌處務要停當事理未敢擅便為此具本謹題請㫖一為整理邊務以備敵患事題為整理邊務以備敵患事准兵部咨該本部題該提督軍務本部尚書金獻民題前事內一件議處邊情照得額布勒等殘賊自正德四年節被小王子趕殺率其殘黨達蘭哈哈等假息西寧境上計今十五六年春夏則趁逐水草住牧遇冬則踏氷過河搶劫先該巡按陜西監察御史潘倣為陳言邊務節該本部議得合候明年黃河凍消敵衆復回西海之時查照先年宣城伯衛潁巡撫都御史吳琛等大𠞰番賊方略選調主客官兵乘機併力𠞰殺題奉欽依行移甘肅鎮巡官議處去後迄今未見作何區處臣竊料該鎮官員非敢故違遲遲也顧在我者以兵力則寡弱以糧餉則不繼兵機重務未容輕議夫帝王制馭邊人之道惟有撫𠞰兩端宜加𠞰者我既不能奮力若不早為議處將來黨與日熾其禍殆有不可勝言者矣臣查得嘉峪關外齊勤罕都哈密三衛夷人俱以永樂年間率衆來降我太宗文皇帝授官降印蓄為藩籬迄今百五十年堅守臣節此固聖主深謀逺慮措置得宜斷敵人右臂之微意也臣愚以為前敵地本富饒人亦强悍西海之地彼既盤據有年我終不得為用合無查照前例於該鎮撫敵官內選差才識敏給周知番情者二三人或四五人前去近邊地方諭以朝廷恩威軍門殺伐利害令其各安生理毋自作歹以速滅亡如果革心向化聽我招致就彼安插設為衛所與齊勤等衛相掎捔許其以時通貢量加賞賚以結其心仍擇其雄傑一二人授以職事立為頭目使之鈐束部落遇有緊急聲息量調人馬為我策應有功之日一體犒賞庶在我不失制馭之道於彼或有感戴之誠而地方可保無虞矣但事體重大臣不敢擅擬合候命下㑹同府部院寺及科道等官從長計議轉行甘肅鎮巡官再加議處如果可撫依擬施行或於敵情地方俱有窒礙即便查照御史潘倣建言及本部節行事理催儹兵糧相機剿捕務要草剃禽獮以靖地方毋貽後患該本部議得前項敵衆久據西海吞併番衆勢益彊盛亟宜處置所據撫諭安插設為衛所授以職事許其通貢量加賞賚使彼有歸向之誠在我增藩籬之固如大寧之諾延等衛所故事藉外以衛內豈非邊方經久之圖但恐人情黠詐遽難馴擾且事體重大未敢遙度合咨提督軍務尚書楊一清督同甘肅鎮巡等官將所奏事情審度機宜酌量事勢前項敵衆果堪招降立衛授官許其通貢以示羇縻如或人性獷悍未可卒致必須加兵征剿再為從長計處具奏定奪題奉欽依備咨前來照得額布勒等邊人竊伏西海蹂踐番敵侵擾洮河地方先該巡按陜西監察御史潘倣奏要催儹兵糧相機剿捕事理相應但我兵力尚屈未及區處今提督尚書金獻民奏要照依祖宗朝嘉峪關外設立齊勤罕都哈密三衛事例於該鎮撫夷官內選差前去近邊諭以朝廷恩威軍門殺伐利害令其各安生理如果革心向化聽我招致就便安插設為衛所許其以時通貢量加賞賚以結其心仍擇其雄傑一二人授以職事立為頭目使令鈐束部落遇有緊急聲息量調人馬為我策應有功一體犒賞或於敵官地方俱有窒礙即便查照御史潘倣建言及本部准行事理催儹兵糧相機剿捕務要草剃禽獮以靖地方毋貽後患一節緣前項事情必須親詣河西地方計處但敵衆數萬見在河套住牧臣方督調陜西延寧各鎮官軍分布防禦勢難摘離巳經移咨巡撫甘肅都御史寇天叙㑹同鎮守三司等官集議所奏召致安插前項敵衆設立衛所授以職事許其通貢聽我調遣應否如擬施行若於敵情地方有礙必須加兵征剿就為密切從長計處用兵方略明白咨報以憑回奏定奪去後延今半年之上未見回報蓋因事體重大各官不敢輕有議擬今套人漸逺邊境少寧臣方欲親詣莊浪西寧地方議處回奏忽奉敕㫖行取回京緣前項賊情臣先今久曾有意經畫節嘗論奏謹以所見為陛下陳之切惟自古帝王制馭逺人文德固所當先武功亦不可緩文德可敷則干羽之舞固足以格有苗武功當用則鬼方之伐亦事勢之不容巳前項賊寇黠詐之性惟利是貪恐非文告所能招致亦非官職所可羇縻况戕我屬番侵我內地彼有必誅之罪許其通貢加以賞賚我施非分之恩虧中國之體納外夷之侮非所以示四裔也及照奏內所引齊勤罕都哈密等衛敵人事例皆當國初開創之時率衆來降所以我祖宗授官降印以羇縻之使之為我藩籬今額布勒等寇賊背叛其主投我屬番境界大肆侵掠橫加吞噬又侵入我腹裏地方此正田中之禽利用搏執固非漢武稱兵於隂山之窟喜功好大者之所為也臣正德五年復起總制陜西軍務之時此賊被小王子人馬讐殺殘敗遁來河西地方臣慮其異時必為邊患建議欲調集大兵誅剿規畫巳定不意旋即奉敕取回兵部題欽依行令甘肅鎮巡官整理因循至今十五六年種類漸蕃聲勢日盛臣於去年六月內奏為敵衆出沒計處用兵機宜事欲待套內無警糧草有積之日量調陜西延綏精兵與河西兵馬㑹合尋襲痛加誅剿但兵貴神速機難預定必待臨期奏請非惟緩不及期且恐事機先泄欲乞上請及早行令密㑹各該將官不拘何月日相機取便行事若無可乘之機不敢輕動兵部覆奏欲令臣將一應制勝機宜用兵方略一一㑹計停當先行差人具奏議請定奪緣兵家變態不常旬月之間事機頓異况地方相去京師五六千里奏報往回動經數月雖有成算亦難取必議處間忽報北部二萬前去西海收捕前賊臣方慶逺人相攻中國之利不須煩我師旅不意為彼所覺移巢南面留其精兵據守彼千里而趨利此以逸而待勞反為其所敗失勢而遁後聞阿爾托蘇賊衆恐北部仍來報讐挈營隨順渡河入套止是額布勒一枝半在西海半渡河寇我洮州即今未曽盡數歸巢且西寧洮河等處番族國初分散部落設有國師禪師指揮千百戶鎮撫驛丞等官管領給與金牌令其三年一次輸納差發馬匹而以官茶酬之若與王官王民無異伏覩金牌上篆文中曰皇帝聖㫖其下左曰合當差發右曰不信者死實欲借其為我藩籬捍備北部即前漢斷敵人右臂之意百十年來河西之衆不能逼侵我洮河恐番人之議其後也今二種殘賊將番族戕害巳甚不能生存遂與之糾合為寇西寧最被其害洮州之番近亦被脅合夥為之指引道路番人合勢我之邊境其何能安此膏肓之疾腹心之患也議者動以不可輕舉為言雖兵凶戰危誠宜慎重而玩寇養患亦非所宜嘗竊譬之套人勢雖猛烈如風寒暑濕之病來則疾於風雨治之不善即能殺人然得遇良醫一汗而愈一汗而安西海之人如痞結胸腹間目前飲食起居雖若無恙久而不療元氣日漸消耗後將難圖興言及此豈得不思所以處之而徒玩時愒日以僥幸於無事哉且阿爾托蘇巳遁止是額布勒一枝大約精騎不過二三千人其餘皆脅驅番人勢非得巳然地土被其奪占骨肉被其殺戮帳房被其燒毁孳畜被其搶掠欲報怨讐而復其故産人豈無是心哉此間諜之用亦不可廢也切見新推提督三邊軍務尚書王憲剛果有謀多才善斷昔嘗管理茶馬遍歷西寧洮河地方又曾督處河西屯田至今邊人頌其風力合無請敕本官力任此事若今年迤北大勢無尋捕西海之舉及套衆回賊不曾大舉深入或雖入而即遁宜密諭甘涼莊浪等處將官部署兵馬待冬末春初草枯馬弱之時調集延綏遊竒二枝兵馬及陜西寧夏二鎮遊兵共萬二千人甘涼之兵自涼州而進延寧之兵自莊浪而進陜西之兵自河州歸德而進與各該守臣所統兵馬刻期聮絡併力夾攻如昔年宣城伯衛潁都御史吳琛征番故事仍先設法厚募壯勇識事之人暗入西海諜我屬番使為內應一鼓成功以驅河西腹心之害以為我邊久安長治之圖尤須精擇將領如魯經李義馬雲甘禎輩及涼州革任參將都指揮楊佑皆熟知此事可以付託西寧兵備副使陳鼎沈毅有機陜西布政司左參政成文固原兵備副使桑溥皆曾巡歷河西地方素有才略可以翊贊兵機督處糧餉然事干各鎮必得主將一員居中調度該部必有所處臣不敢言顧兵馬不難於調集而糧草實難於措處臣到邊督催運送甘肅一鎮民糧銀兩及分發戶部送到官銀其數巳多而倉儲未見有積及照蘭州督理糧儲戶部署郎中婁志德實心幹事宜令往來莊浪涼州一帶督處仍於布政司選委有幹力善經畫官一員專一整理河西錢糧一面於莊浪涼州西寧或召商或糴買一面於蘭州安定㑹寧等處收積蓋專恃河西則所積不多蘭州安㑹如有厚積臨期可以帶運臣之所見如此如䝉伏乞聖明軫念河西重鎮冦患為急乞敕兵部將臣所言參詳可否若謂事體重大乞㑹多官從長計處早為定奪然須如臣去年所奏令提督大臣相機行事可為即為不必臨時上請待報以致事機漏泄無益有害若無可乘之機或兵糧未集照常戰守不可輕動以貽後艱仍乞敕戶部降發內帑官銀十數萬兩或開鹽課一二十萬引聽提督官督令甘肅管糧衙門上緊設法措置庶得有備無患倘失今不圖而專持慎重之說襲為怠緩之計臣恐一二年間甘涼地方西備回賊東備敵衆我兵疲於奔命而套內大賊又復撓亂其間不能掣兵往援則河西之地恐非國家所有事勢至此雖有智者不能為之謀矣臣老矣非但乞骸且將就木巳未及行而欲委勞於後之人知罪知愧况前事先該御史潘倣奏行兵部議處其後甘肅巡撫都御史陳九疇亦欲舉行未曾就緒而去臣既灼見其故豈敢終為隱蔽而不吐露一言伏惟陛下留神省察緣係整理邊務以備敵患事理未敢擅便為此具本順差承差王經邦親齎謹題請㫖一為邊務事題為邊務事據陜西按察司整飭固原兵備副使桑溥呈嘉靖四年十二月十八日欽奉敕今特命爾前去固原髙橋靖邊等處專一往來巡歷撫安土達仍整飭固原靖邊甘蘭等處兵備操練軍馬修理城池墩臺關堡撫恤士卒防禦敵衆保障地方兼理詞訟及督理糧儲禁革奸弊凡一應邊情軍務須與分守參將等官㑹議停當而行仍聽陜西鎮守巡撫官節制不許偏執違拗妨政害事若有軍職及守備官員賣放軍士縱容官攢人等通同豪滑刁潑軍民兜攬錢糧虛出盜賣并隱藏逃囚等項許爾徑自參奏拿問爾為憲臣受兹委託務須持廉秉公禁革奸弊盡心竭力以安邊境如違罪不輕宥爾其勉之慎之故敕欽此欽遵外為此今將前項欽奉敕內事宜呈乞照驗施行等因到臣查得固原兵備衙門係成化年間開設原請敕內開載所管地方事宜與今略有不同且如髙橋即靈州守禦千戶所舊該固原兵備官往來巡歷撫安土達後因添設環慶靈州兵備𨽻其管轄固原相去地逺似無相干誠恐地方有事兩處兵備官得以互相推調其固原靖邊甘蘭等處衛所軍民與平涼府所屬州縣鞏昌府所屬安定㑹寧二縣臨洮府所屬蘭州金縣二處并平涼安東二衛監苑羣牧所等衙門軍民雜處墩臺關堡多在各該軍衛有司所轄之地凡緝捕盜賊問理詞訟督理糧儲遇警收斂人畜俱與軍衛有司官員干涉敕內未曾開載有礙行事緣前項所管固原靖邊蘭州俱係極邊要害地方寇衆不時侵入關係至重比之其他兵備不同如䝉乞敕該部議處合無將固原兵備官原奉敕書上請更換除去髙橋地方仍開固原靖邊甘蘭等處凡干礙墩臺關堡詞訟糧儲及遇警收斂人畜等項事務與各該軍衛有司相干者俱聽提調約束不許違拗其餘軍民一切政務不得干預開載明白庶幾事權歸一可以責成修舉不至失誤邊方大事實為便益緣係邊務事理未敢擅便為此具本專差承差楊鸞親齎謹題請㫖一為比例列銜支俸以便行移事題為比例列銜支俸以便行移事據分守固靖環蘭等處地方參將署都指揮僉事劉文呈前事切照本職原任陜西都司慶陽衛指揮同知推選延寧地方把總管事節該欽奉敕諭升署都指揮僉事守備固原地方後充寧夏遊擊改任分守參將欽遵任事外伏念本職一介草茅叨任重地敢不努力圖報將來緣分守地方廣濶軍民雜處凡百文移與都布按三司有行奈本職俸銜仍在原衛帶支各司文移不肯徑行卻由衛所轉行以致耽延往往誤事且本職係陜西省鎮屬衛指揮濫任本鎮參將况慶陽原衛又係參將所轄地方環慶守備亦該提調凡本衛一應公文呈行彼處守備開列本職職名屬衛未免輕視比與延寧甘肅隔鎮地方分守副參遊擊事體不同及查得先任固原守備署都指揮僉事楊宏陳善并固靖遊擊陶文及延安衛帶銜都指揮閻武俱在本都司列銜支俸今本職既授都司署職叨任分守參將責任頗重俸銜不䝉開列行事有礙如䝉軫念地方衝要事體重大乞賜轉達准於都司列銜支俸庶使文移便於徑行本職得以展布為此理合具呈伏乞照詳定奪施行等因到臣行間隨據陜西遊擊將軍署都指揮僉事夏欽亦呈前事看得分守固靖環蘭等處參將署都指揮僉事劉文所呈乞要都司比例列銜支俸一節切緣本官既授都司署職又推任參將分守地方比與楊宏陳善等事體相同關係尤重况慶陽衛係其所轄環慶守備又其統屬一應文移開寫本官名銜委於名分不宜行事有礙及照署都指揮僉事夏欽原係西安前衛指揮後升署都指揮僉事推任寧夏遊擊將軍因病革回本衛帶銜閒住近該臣奏薦兵部題奉欽依奉敕充陜西遊擊將軍緣西安前衛亦有遊兵選撥官軍追補馬匹俱與本衛有行文移往來亦多不便如䝉乞敕兵部查照前項事例將劉文夏欽俱准於本都司列銜支俸將官之體勢稍尊得以盡心舉職下人不敢輕視不致違誤軍情重務矣緣係比例列銜支俸以便行移事理未敢擅便為此具本順差承差楊鸞親齎謹題請㫖一為軍務事題為軍務事案照先准兵部咨為設總制以圖兩全事該本部題內開跟隨書掾頭目家人聽從選帶仍具奏聞等因節該奉聖㫖是欽此欽遵備咨到臣除頭目另行外為照臣一到陜西地方即該題奏各項事情及發屬文移浩繁緣未奏討書掾缺人書寫訪得直𨽻鎮江府丹徒縣省祭官任漢本府兩考役滿吏李棠俱各寫字端楷諳曉行移巳經行令該府取具備細腳色開送跟隨前來書辦及具題去後續准兵部咨該本部覆題奉聖㫖是准照例奏帶應付欽此欽遵外續又據書辦吏李棠呈為給由事開稱以農民充鎮江府吏兩考役滿給由間䝉臣行取前來書辦又䝉本府給與給由批申赴吏部投下誠恐違限日久乞要容令赴部給由等因為照本吏一向在於軍門書辦今要容令赴部給由相應准送但三邊軍務浩繁案牘填委緣未奏討書掾一應文移俱係省祭官任漢與本吏經手書辦若容令前去未免缺人應用况係題奉欽依選帶人役巳將本吏原領本府批申順差承差趙禎咨送吏部照收候合無將本吏准作提督軍務官員下書掾之數就准當該惟復止作辦事隨准吏部咨稱看得吏典辦事役滿方撥當該此係照舊例今李棠既係奏帶人數合無准作辦事於例相應咨煩查照施行等因到臣除將吏李棠准作辦事在於軍門書辦外今照臣奉敕行取回京所據原奏帶省祭官任漢辦事吏李棠相應起送吏部聽用查得節年提督官員奏書掾事畢回京多得霑被恩典省祭官或不拘年限就與選用掾吏可不待補辦就撥當該今省祭官任漢辦事吏李棠跟隨臣巡歷各邊沙塞戎馬之區涉歷艱苦一年之間書寫案牘文移無時休息及查得任漢亦係省祭十年之上巳該行取之數如䝉乞敕吏部查照節年提督官書掾事例將任漢就為收選李棠就撥當該庶使將來從事軍門者有所勸勉而不憚勤勞矣緣係節奉欽依選帶書掾比例選用收撥事理未敢擅便為此具本順差承差楊鸞親齎謹題請㫖一為薦舉舊任官員以慰人望事題為薦舉舊任官員以慰人望事臣聞兵有先聲而後實然不獨兵也凡為政者先聲有以動人則不令而自行不言而自信得效速而成功易矣陜西舊任臺察藩憲等官才賢最多清議所歸輿情所屬嵗不乏人除巳在顯位及見任臺端者不敢論薦外博訪得浙江左布政使今守制孫修督儲有精勤振厲之風持憲有嚴明剛果之譽四川按察使今守制王廷相山西提學副使今歸養劉天和山西按察司副使陳軾山東按察司副使整飭徐州兵備趙春俱曾按治陜西地方皆能彈壓勢豪肅清風紀剔除奸蠧而不蹈苛察之弊激揚清濁而不失老成之體至今官吏憚其風采兵民望其復來臣得之聞見如此如䝉乞敕吏部再為查訪合無待孫修服闋遇有陜西三邊巡撫缺員早為推用其王廷相等四員遇缺推補藩憲之長以為登用之階不獨慰一方軍民之望而凡為臣者皆有所感慕興起矣臣今老病衰殘方上乞骸之疏竊念用人為當今第一急務薦賢為大臣第一職業故不敢隱蔽而冒昧一言然亦不敢泛及他省官員者恐知之未真或於民情土俗有不相宜耳伏惟陛下裁察緣係舉薦舊任官員以慰人望事理未敢擅便為此具本順差承差楊鸞親齎謹題請㫖一為獻愚忠以答聖眷事題為獻愚忠以答聖眷事伏念臣章句孱儒栁蒲弱質遭際盛時久塵仕籍既廢而興任每兼乎文武求退而進位乃躐乎臺衡頃當近幸干紀之時獲遂山林優老之願駑駘久病豈有意於騰驤朽木不雕分宜供於釜爨恭遇新皇御極圖任舊臣改授今官俾總邊鎮伏讀制詞屢有寬朕西顧之憂之諭夫主憂臣辱安敢避難用是扶疾以起千里遐征誠願以其力之所能為者圖報聖恩於萬一也邇者遽䝉召還內閣之命屢疏悃誠未荷俞允進退維谷不知所為仰惟陛下應運挺生代天化育日新庶政而機柄獨操器使羣材而權度在巳虞舜之好問好察知何加焉大禹之克儉克勤德斯懋矣嗣位以來五年於兹敬天法祖愛民勤政日有孳孳不自暇逸然而求治之心徒切至治之效未𢎞臣竊觀正德年間乾綱下移權姦竊柄始則劉瑾中而錢寧後乃姜彬海內騷然幾成大亂陛下起而振之政務歸於內閣裁斷出於宸衷近臣非惟不能與力亦且不敢與聞是宜天人協應海嶽效靈奈何近嵗日蝕地震旱乾水溢之災層見疊出至於物異人妖有近代之所罕聞者聖德清明豈宜有此皆臣下奉職不效之過也臣年老久衰非但乞骸且將就木既不能仰承聖眷任事供職若終無一言以去則上負恩私下干物議其罪莫可自贖矣謹以今日至切至要者疏為五事為陛下陳之倘䝉留神覽觀俯賜施行於治道不為無補臣雖屏居田野與世長辭復何憾哉然此特其大要耳若夫陛下有愛民之心而民未阜康有任官之誠而事多茍簡兵政密矣而夷狄不免於侵凌法令彰矣而姦頑未見其懲艾其他弊政尚多臣昏眊之餘不能盡述陛下責公卿之所有事責臺諫使得盡言必有陳其顛末以俟采擇者矣臣不勝拳拳愛君體國之至除患病乞休另行具奏外緣係獻愚忠以答聖眷事理謹題請㫖計開一曰聖學臣惟人君一心萬化之本原也然方寸之微而衆欲攻之茍無詩書理義以維持之百凡聲色貨利狗馬竒珍之物遊觀畋獵騎射俳優之技與凡異端邪術之流投間抵隙皆足以動搖吾心而讒諂面諛之人又從而從諛之日積月纍幾何不蕩蕩然而陷溺於物欲之中乎既為物欲之所溺則於天下之事安能真知其是非得失之所在務決去而必得之哉此謂講學所以為人君圖治之第一義也臣竊聞陛下在藩邸時恭穆獻皇帝專教之讀書令紀善伴讀等官誦說經史一切玩好俱不令至前一切憸人俱不得在側故幽潛之德孚於上下恭默之化洽於臣民嗣位之初首開經筵祇循舊章選擇儒臣日侍講讀又聞命內閣取尚書以俗說訓釋且為韻語以便諷詠至於無逸洪範等編尤加研究書史之外凡百玩好悉無所用天下之人皆謂仲虺稱成湯不邇聲色不殖貨利周公旦稱文王不敢盤于遊田以庶邦惟正之供陛下盛德何以加諸是雖天性髙明而獻皇帝之善教有足徵矣臣愚竊謂帝王之學與書生異不必求諸文辭之幽深不徒事夫章句之尋摘要在繼其功得其要而巳經筵有定期然儀衛森嚴勢分隔越恐講官不得效其忠日講乃帝典然往年或廢於寒暑或阻於風雨所謂一暴十寒之弊或不能免焉書曰惟學遜志務時敏厥修乃來詩曰日就月將學有緝熙于光明所謂時敏者謂勉於學如有所不及也所謂緝熙繼續光明無少間斷也臣昔官京師每見舊時講官其進講也摘取書中好語稍有嫌忌者即不以講且其所講不過隨文釋義不能推廣言外之意以開聖聰又或於講終獻諛佞以驕上心臣知今日必不為此伏願經筵之餘退朝之後日御文華殿命官進講仍乞降之霽色接以溫言令其從容開說不許嫌忌其講經也各發明身心義理之大要其講史也務推演興亡治亂之大原所謂必求諸道于焉能自得師因而推及今日之政事某事有合乎古某事當用於今某事善可為法某事惡所當戒陛下凝神定慮默識深思聞聖賢義理之論譬猶學近其人監古人隆替之原設若身處其地有所疑必形諸顧問有所得必措諸躬行如此則講讀之制不虛行講讀之官不虛設心常在於詩書理義之中百凡外物自不能奪之本源澄徹而物理自明推之仁民愛物而無不通放之家國天下而無不凖致治之大本實在於此易曰正其本萬事理大學曰其本亂而末治者否矣伏惟聖明留意二曰聖政自古三公論道六卿分職我聖祖稽古建官以政事大權分任六部即六卿分職之意我太宗皇帝始設內閣簡儒臣居之以備顧問職論思資望深者薦加師保職銜以輔養君德翊贊化猷即三公論道之意列聖相承皆不時召見部院大臣面議政務日與內閣之臣裁決可否金匱石室之藏不可見其見於御製五倫書及故大學士楊士竒李賢等所著三朝聖諭録天順日録等編君臣答問儼然唐虞都俞吁咈之風百餘年來政事修舉道化隆洽實由於此至於臺諫論列事情天下方面官述職來京亦得入覲天顔面承清問不惟周知事之利弊亦得考見人之賢否逮至憲廟稀接大臣而上下之情始覺疏逺我孝宗皇帝𢎞治十三年以後時召大學士劉健李東陽謝遷并尚書馬文升劉大夏都御史戴珊等咨訪政務面賜裁決昌大休明之氣象至今思之正德年間視朝稀濶大臣不復接見以此威福之權下移近幸紀綱法度幾於蕩然天啓聖皇誕膺寶厯積年弊政剗除無遺廢黜姦佞登崇俊良嘉靖之治號為中興今天下之政務必由六部擬議必由內閣皇上總攬乾綱萬幾獨斷近臣不敢干預可謂千載一時矣但內閣之官自經筵日講之外未聞時時接見六部等衙門官未聞召對商髙宗之命傅說曰朝夕納誨以輔台德又曰若作酒醴爾惟麯蘖若作和羮爾惟鹽梅爾交修豫夫既不得常接天顔則交修無所用其力納誨輔德亦或托諸空言及其久也壅蔽之患生竊弄威福之人或由是出矣臣願陛下退朝之暇進講之餘不時召見內閣重臣將一切機務面議可否取㫖裁決六部都察院等官凡章疏之上并臺諫之臣有所論列亦乞時賜宣召面加質問聽其盡言不許忌避庶幾朝無失政國無隱姦非惟大臣不敢欺蔽行私怠忽荒政而陛下亦得以明習天下之事矣三曰聽言臣聞朝廷之有言路猶人身之有氣血也血氣一日不流則百病生言路一日不通則百邪作古昔盛時嗇夫庶人皆得進言官師相規工執藝事以諫後世以諫設官其途已狹若為諫官而復不得盡其言則朝廷耳目將誰託耶我國朝設立六科十三道皆以言為責列聖相承未嘗不以開言路為事言路開則庶政清言路塞則庶政荒矣陛下即位之初求言如渴納諫如流凡科道官有所論列輒下該衙門看了來說又或褒之以所言有理其所建白多見采行言路可謂大開矣奈何各官人品不同識見各異通達國體實心效忠者固多事體未練輕率妄言者亦有以抗直為髙者每過乎激襲見聞之偏者多失其真或一事而辨論無休或數人而自相矛盾遂至上干天威每加詰責雖所寬貸亦或因而貶黜者有之甚至有下之詔獄者有械繫入京者似與聖王從諫弗咈之美不侔似與初政聽言之意不類然此非聖德之不能優容其實諸臣有以自取之耳顧彼言官雖涉狂妄猶勝緘默雖涉戅直猶勝軟美論事有過當其心必自諉曰我所見如此不敢不盡也論人有失真必曰我風聞如此不得不言也若從而詰責之罪黜之自非灼有定見確有定守者孰不思全身逺害而為容容唯唯之歸邪竊恐中外相傳以言為諱弊政無由而祛官邪無從而糾民隱無從而達天下之事日入於弊矣嘗聞唐臣陸贄之言曰諫者多表我之能好諫者直示我之能容諫者之狂誣明我之能恕諫者之漏泄彰我之能從有一于斯皆為盛德李絳之言曰人臣死生繫人主喜怒敢發口諫者有幾就有諫者晝度夜思朝刪暮減比得上達什無二三故人主孜孜求諫猶懼不至况罪之乎近嵗以言得罪者臣不能知其詳悉不敢泛有所指且如去嵗冬間御史侯秩論臣不宜復入內閣上激聖怒降二級逺方用秩之論臣辭雖無據心實匪私臣之昏老委不當復用陛下雖誤用之臣亦不能自强侯秩所言不為無見伏願陛下逺師帝王聽言納諫之德近循初政樂聞讜言之美今後給事中御史論列事弊指陳缺失及糾彈官僚者一一親賜省覽擇其言之當者或即賜施行或令該衙門看詳覆奏上請定奪其有未當亦乞曲賜優容置之不問仍召還侯秩復其舊官或令吏部量才升用豈但臣之心獲安而兩京言官皆得安心舉職矣再乞敕吏部通查二三年來以言得罪之官開具事由疏名上請或復其舊職或量為叙遷如此則聖德彌光治功有補凡有言責者感激奮發孰不思所以自效哉四曰宥過仰惟恭穆獻皇帝至仁大德克享天心篤生我皇上潛龍升御出震繼明奠萬國於熙平囿羣生於嘉靖推厥本源功德隆矣皇上嗣極首議尊崇之典考經據禮至再至三既而采納廷議斷自聖心尊尊親親亦既兩盡無復遺憾夫何一時言禮之臣不能推廣聖上因心之孝紛紜抵捂力持初說終乃率衆伏闕喧攘無忌在禮法為不恭在事體為不順上厪聖怒將學士豐熙郎中余寬等下之詔獄加之箠楚或充軍或為民甚至有斃於杖下者罪誠自取夫復何尤但推原各官大抵狃於學術之偏襲於聞見之陋其心惟恐陛下之所處者有乖典禮將為聖德之纍不思陛下之所處者正所以為禮也今經二年矣充軍者羇管遐裔有同戍役之夫為民者編齒村氓不與衣冠之列雖有自新之念無復自致之門所以節說大臣言官屢有論列未荷俯從近該御史張兖具奏奉聖㫖該部看了來說中外臣工欣然稱頌既而吏部覆題又復報罷衆心惑焉夫陛下之罪諸臣者亦因其可怒而怒之俟其改悟固未嘗深絶之也譬如上天之於萬物霜雪雨露皆所以為恩然霜雪摧折必有雨露之沾涵然後羣生得遂未有嚴寒之後不繼之以陽春也陛下始因諸臣罪狀可惡而竄謫之又因其能自改悔而收復之正合天道生長肅殺之意臣湖南人也稔聞獻皇帝容人恕物之量陛下體而行之獻皇帝在天之靈必無不喜且慰矣孟軻氏曰人恆過然後能改困於心衡於慮而後作諸臣抱罪既久悔悟已深叙而復之必當有以自效伏願日月回照雷霆霽威乞敕該部通查言禮被罪之人充軍者令其生還鄉里為民者量授一官叙用不幸因箠致死者亦令有司優恤其家庶足以見聖德如天無所不包非惟被罪之人感再造之恩而凡為臣工皆興踴躍愛戴之誠矣五曰和衷臣聞之書曰同寅協恭和衷哉釋之者曰君臣上下當同其寅畏協其恭敬誠一無間融㑹流通民彞物則各得其正所謂和衷也夫君尊如天臣卑如地其情易疏而難親其分易睽而難合故天氣下降地氣上騰然後嵗功成君澤下流臣誠上達然後理道立上下不交則德業不成有國者之深忌也陛下即位之初召用耆舊委任忠良視大臣如腹心崇奬臺諫聽受讜言待羣臣如四體上下可謂交矣中外欣欣謂和衷之化可成自夫大禮議興小大臣僚不能仰體聖心推廣聖孝各持初見務求必勝朝廷之上如聚訟然二三言禮之臣乃援古典執經義以釐正之於是衆論歸一而大禮告成矣然自是上下之情不通和德之風不著是皆羣臣負陛下而陛下何負於羣臣哉夫虞廷九官濟濟相讓推賢讓能庶官乃和竊觀近嵗臣僚正直忠厚之道微乖爭凌犯之風起惡聞人善而樂談人之過失務矯伉者不顧朝廷之事體喜攻訐者不究事情之虛實公卿降志於庶僚賢否混淆於橫議或因一事之失而槩其平生或信一人之言而輒相附和忿戾之氣每形於奏章交搆之辭幾成乎罵詈自古太平有道之世未嘗有此不可聞於四夷不可訓於後世伏望陛下恭已責成虛懷聽納元首股肱上下相須手足腹心相視一體使上之情必宣於下無壅蔽之憂下之情必達於上無扞格之患仍乞天語丁寧戒以中外臣工各以恭遜相師毋襲猜忌之風以惇大成俗無崇猥薄之行協心以理國事如輔車之相依同德以亮天工如巨川之共濟然大臣者庶僚之表也尤當廓有容之德體包荒之量求賢如恐不及見善若已有之正身以率下則孰敢不恭平心以應物則孰敢不服于以和典禮之衷于以迓衡平之治大臣和則庶官無不和矣然所謂和非和光同塵之謂也不矯為異所以為和不茍為同亦所以為和古之大臣上殿論事互有異同下堂則不失和氣何者其心公也公故和凡其比周朋興相非相怨者皆私心為之也臣願陛下和德於上百官和於朝萬民和於野漢臣所謂心和則氣和氣和則形和形和則聲和聲和則天地之和應焉由是三光全而寒暑平五穀熟而人民育諸福之物可致之祥無不畢得豈但災殄可消而已老臣垂盡之年拳拳一寸之忠所以望於今日者如此伏惟留神省察奉聖㫖覽卿奏足見忠愛事關朝廷的朕自處置其餘知道了卿宜即赴閣辦事該部知道關中奏議卷十八
