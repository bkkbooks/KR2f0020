body:
  text: 闗中奏議詔令奏議𩔖二奏議之屬提要臣等謹案闗中奏議十八巻明楊一清撰一清字應寧安寧人成化壬辰進士官至華蓋殿大學士諡文襄事蹟具明史本傳此書皆其生平章疏之文分為六類巻一巻二曰馬政𩔖巻三曰茶馬𩔖則以副都御史督理陜西馬政時所上巻四巻五巻六曰巡撫𩔖則巡撫陜西時所上巻七巻八巻九曰總制𩔖則總制延綏寧夏甘肅邊務時所上巻十曰後總制𩔖則其病歸復起時所上巻十一至巻十八則嘉靖四年以故相復提督三邊軍務以後所上也以所陳多陜甘邊事故以闗中為名嘉靖初始刋行於南京其間所載不盡皆一清奏稿凡當時部臣覆疏及前後所奉諭㫖悉編入之故於時事本末頗為詳盡一清負經濟材其督學陜西時即詳究邊情利弊其後官陜又最久故所指畫皆中窽要云乾隆四十三年六月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:504f69be510209017a556afe5168dee85a88ef7610cd3fce5f7ea02791156a09
