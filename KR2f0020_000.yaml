body:
  text: 關中奏議詔令奏議類二奏議之屬提要臣等謹案關中奏議十八卷明楊一清撰一清字應寧安寧人成化壬辰進士官至華蓋殿大學士諡文襄事迹具明史本傳此書皆其生平章疏之文分為六類卷一卷二曰馬政類卷三曰茶馬類則以副都御史督理陜西馬政時所上卷四卷五卷六曰巡撫類則巡撫陜西時所上卷七卷八卷九曰總制類則總制延綏寧夏甘肅邊務時所上卷十曰後總制類則其病歸復起時所上卷十一至卷十八則嘉靖四年以故相復提督三邊軍務以後所上也以所陳多陜甘邊事故以關中為名嘉靖初始刋行於南京其間所載不盡皆一清奏稿凡當時部臣覆疏及前後所奉諭旨悉編入之故於時事本末頗為詳盡一清負經濟材其督學陜西時即詳究邊情利弊其後官陜又最久故所指畫皆中窽要云乾隆四十三年六月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:2024016a439a9dff7630c871ab43b0f4c2708f8dc91a3dc9820b1a5689f463f7
