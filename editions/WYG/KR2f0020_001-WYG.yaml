body:
  text: 闗中奏議巻一明楊一清撰馬政𩔖一為修舉馬政事兵部覆該督理馬政都察院左副都御史楊一清題節該欽奉勑諭陕西設立寺監衙門職専牧馬先年邊方所用馬匹全藉於此近來官不得人馬政廢弛殆盡今特命爾前去彼處督同行太僕寺苑馬寺官専理馬政爾須查照兵部奏准事理考究國初成法親歴各該監苑督委都布政三司能幹官員踏勘牧馬草塲果有侵占者即令退還查㸃養馬軍人果有逃亡者即令撥補見在種兒騾馬實有若干設法增添務足原額倒失虧折馬駒隨宜追補量為分豁布置巳定責令該管官員用心牧養欽此欽遵臣章句迂儒本無致用之具伏䝉皇上簡擢總理陕西馬政且馬政雖是一事闗係軍國大計正愚臣効忠宣力之秋重荷温㫖褒嘉揣分捫心實深愧懼有君如是其忍負之誓竭駑鈍以圗報稱本年八月内到於陕西地方奉宣徳意備行兩寺監苑官員共修職業以副委任臣親詣兩監六苑查得牧馬草塲原額一十三萬三千七百七十七頃六十畝見在各苑止存六萬六千八百八十八頃八十畝其餘俱被人侵占原額養馬恩隊軍人一千二百二十名見在牧馬止有七百四十五名牧軍包攬代役及私回原衛住坐挨拏未獲九十九名逃故累行勾補未觧三百七十六名㸃視得見在牧養兒騸騍馬并孳生馬駒止有二千二百八十匹及查倒死虧欠馬駒𢎞治六年起至𢎞治十三年九月止該本寺卿李克恭奏䝉兵部題准折買事例該追折買馬七千八百匹八分三釐俱各不曾追補𢎞治十三年十月起至𢎞治十六年六月終止陸續倒死并被盗走失馬共三千二百八十三匹虧欠駒三千七十三匹馬政之廢至此極矣臣考究國初牧馬成法行據該寺回稱先年被火將文案燒毁無從查考查得永樂四年兵部節奉欽依開設甘肅陕西苑馬寺衙門每寺管六監每監管四苑各有分撥草塲水泉地方坐落四至上苑牧馬一萬匹中苑七千匹下苑四千匹僉撥恩隊軍人牧養恩軍將各處有罪人犯發充隊軍於各衞丁多軍人内選撥每軍一名養馬十匹仍月支口糧六斗俱係舊例其後陕西苑馬寺不知何年將原設監苑裁省止存長樂靈武二監管轄開城廣寧安定清平萬安五苑後又革去甘肅苑馬寺衙門將原發恩軍遷設黑水苑於平凉府開城縣地方亦附長樂監管轄前項裁革監苑其地散在臨洮鞏昌延安慶陽四府之間各入軍民版籍固未能盡復其舊即今見在監苑觀之土地廣衍水草便利使典牧得人畜養有法豈有馬不蕃息之理臣親閱安定萬安諸苑見養馬匹中間率多奮迅騰躍不可控馭始知西方畜産土地所宜而牧事頓廢非法之過乃人之罪也臣曩為陕西按察司官彼時馬政巳稱廢弛猶有馬七八千匹每嵗給軍騎操猶可數百餘匹邇年以來該部屢經建白朝廷注意修舉奈何積習之弊難祛頽靡之勢轉甚查得該寺奏報册内𢎞治十五年終實在馬三千八百一十四匹臣今㸃查見在止有前數則是半年之間又少馬一千五百三十四匹若皆委之天數則本處官員軍民之家私養馬匹不聞消耗若此典守非人其責惡可辭哉且今見在馬匹除作種外餘下兒騸馬不多設遇有警將何給軍既無益於邊方又焉用夫彼苑幸賴皇上廟謨英斷深念邦政之重采納廷議增置風憲重臣委以便宜専制之柄使圖興復臣雖無狀承乏而來敢不夙夜孜孜一新舊䂓痛革宿弊總率寺監各苑官僚勤考牧攻駒之政謹騰㳺調習之宜務期馬匹蕃息雲錦成羣上紓九重宵旰之懐下濟一方戎務之急此臣之志也亦臣之分也顧興廢補敝之初改絃易轍之際事多干涉軍衞有司非臣一人之身所能獨理亦非寺監等官之力所能自遂必得委用都布按三司官員分理乃能濟事訪得陕西布政司右叅政車霆陕西按察司副使王寅俱風力素著練達有為陕西都司都指揮僉事房懐亦素稱勤幹巳經遵照勑㫖督委各官隨同臣遍歴各苑行事將草塲見奪者查出改正軍人缺役者責限撥補凡馬政一切興舉修復事宜逐一經畫整理務令上下相安軍民兩便不敢苛切以貽意外之憂不敢因循以踵前車之失待布置巳定然後責令該管官員用心孳牧至於事體重大臣難擅専者當次第條具以聞乞下該部覆奏行之使臣言聽計從動無沮遏如是而馬政不修實効不著臣甘從黜罰無所辭避矣為此今將查㸃過見在牧馬草塲恩隊軍人見養并倒死虧欠馬匹數目具本該通政使司官奏奉聖㫖該部知道欽此欽遵抄出送司案呈到部看得奏内所查監苑草塲地畝軍人馬匹原額及今被侵逃亡消耗之數興舉修復俱有條理將來孳牧之盛計日可待至於事體重大次第奏請定奪者必無沮遏為此合咨前去煩為徑自施行一為黜罷不職官員以修馬政事都察院准吏部咨考功司呈本部送吏科抄出督理馬政都察院左副都御史楊一清題前事節該欽奉勑諭各該寺監官員有闒茸不職者爾即具奏黜罷或起送别用另選才能以充任使欽此欽遵臣猥以庸愚荷䝉皇上簡命擢任今職前來陕西地方督同行太僕寺苑馬寺官専理馬政除親詣兩監六苑將馬政一切事宜逐一查處整理另行奏報外臣聞政之興廢存乎其人得人則興失人則廢天下之事皆然不獨馬政仰惟國初開設陕西監苑衙門當時官得其人馬匹蕃息足供各邊之用成化天順年間以前原額牧養馬數行據該寺回稱先年被火將文巻燒毁無從查考查得𢎞治二年為因種馬數少兵部奏發太僕寺馬價銀一萬二千兩收買種馬二千匹發寺孳牧依例科駒又有節年西寧洮河等衞解到茶易馬匹因是官不得人倒失虧欠數多孳生未見蕃息𢎞治十三年間本部奏差主事李源查㸃得實有見在馬驘并駒七千九百四十三匹新追補過馬一千一百一十四匹共馬九千五十七匹𢎞治十四年本寺卿李克恭奏䝉兵部題準將先年倒失虧欠馬匹分豁折買彼時見養馬八千一百六十一匹比與主事李源查報之數巳少八百九十六匹本年被敵衆搶去馬驘三千九百六十二匹頭餘下種兒騍騸馬四千一百九十九匹及查得𢎞治十四年十五年内節次解到茶馬共八百六匹新孳生駒五百五十八匹通原數共該馬五千五百六十三匹臣今查㸃見在止有種兒騍騸馬并駒共二千二百八十匹比之原數該少馬三千二百八十三匹見在者又多瘦損矮小不堪作種騎操馬政廢弛莫此為甚夫解發孳生之馬有增於前而實在馬匹愈少於昔以銀買茶易百姓膏血之餘徒免該寺歳報倒失虧欠之數典牧之設無益有損邊方之用何所倚賴興言及此良可痛心臣訪得本寺止是寺丞武戩頗勤職務遞年前去各苑㸃視追補馬匹但官卑職輕人不畏服隨追隨亡實效未著其卿少卿等官俱不曾親歴監苑卿李克恭到任未及三年倒失馬匹多至三千二百有餘虧欠之駒亦如此數例前折買者既不追補例後牧養者愈加消耗其稱倒失被盗等項查無告行相剥緝拏案巻亦無追收騣尾皮張耳記在官止憑該苑官軍報數即與開除多被姦巧之之徒將官馬盗賣與人孳生官駒匿為巳物又聽富豪軍人將草塲儘力侵占耕種解到牧軍任意包攬得錢放回月糧按月冒支馬匹全不牧養及縱容各苑貪官指稱公私使用科歛錢物數多逼累軍人逃竄即今查出告發不止一端前項馬政廢弛雖非一嵗之積一官之責而近年馬數消耗姦弊愈滋實由見任官不職所致除事發圉長邢恭等送發究問外叅照陕西苑馬寺卿李克恭叨任卿寺正官位髙禄厚正當勉盡職業使馬匹蕃息馬政修舉以圗報稱豈期本官因見衙門無權事多掣肘遂敢改節易行無向進之心縱欲任情為歸老之計聽其言似若有為察其事全然未舉貪聲大著物議沸騰以致監苑官軍視牧馬為虚文以科歛為能事强者因而脇持弱者亦復玩慢大壊馬政重干國典自知公論不容却稱患病巳成痼疾要得放回雖經勘實終涉推避駁勘未報及照靈武監監正李謙在京負欠人債到任未久需索借貸該管收軍錢物償還以此牽制難於行事廣寧苑圉長衞昌愚闇無識懦弱無為所據各官俱係闒茸不職人數相應黜罷如䝉乞勑吏部合無將李克恭李謙衞昌俱照不謹罷輭官員事例黜罷放回冠帶閒住惟復將李克恭更加削奪以為髙官廢職者之戒别選才能官員以補前缺如此則宿弊可革來効可圗朝廷興舉馬政之意斯無負矣等因具本該通政使司官奏奉聖㫖吏部看了來說欽此欽遵抄出送司案呈到部㸔得督理馬政左副都御史楊一清題稱陕西苑馬寺卿李克恭因見衙門無權事多掣肘遂改節易行縱欲任情貪聲大著物議沸騰靈武監監正李謙在京負欠人債到任未久需索借貸該管牧軍錢物償還廣寧苑圉長衞昌愚闇無識懦弱無為所據各官俱係闒茸不職相應黜罷要將各官照不謹罷輭官員事例放回冠帶閒住惟復將李克恭更加削奪以為髙官廢職者之戒一節照得陕西苑馬寺卿李克恭監正李謙圉長衛昌俱係職專馬政官員既該都御史楊一清劾奏前項不職縁由合無將各官照依朝覲考察官員不謹罷輭事例放回冠帶閒住惟復行令就彼回還原籍致仕本部未敢擅便定擬伏乞聖裁縁奉欽依吏部看了來說事理𢎞治十六年十二月二十六日少師兼太子太師本部尚書馬文升等具題本月二十八日奉聖㫖是馬政重事管理須要得人李克恭等都着冠帶閒住堪任苑馬寺卿的你每查照前㫖從公推舉素有才力兩員來看欽此欽遵擬合通行除外移咨前去煩為轉行督理馬政都御史照依本部題奉欽依内事理行令苑馬寺等衙門卿等官李克恭等欽遵就彼回還原籍冠帶閒住移咨前去煩照該部題奉欽依内事理欽遵施行一為起送别用官員事題為起送别用官員事節該欽奉勑諭各該寺監官員有闒茸不職者爾即具奏黜罷或起送别用欽此欽遵切照陕西行太僕寺管轄衞所營堡數多其少卿例該每年巡歴㸃視比較官軍騎操馬匹及禁革姦弊陕西苑馬寺卿少卿等官職専督責監苑官軍孳牧馬匹即今朝廷興舉馬政前項官員必得才力素優實心幹事之人乃克有濟臣切見陕西行太僕寺少卿李宗商謹畏有餘才力不逮到任未久臣嘗委令行事雖性能執持而事不達變人心不服陕西苑馬寺少卿徐文英雖有才幹疎散不拘到任二年因見衙門久廢將馬政置之不理坐視卿李克恭縱情壊事全不匡正所據各官當此紀綱大壊之餘責其作新振舉終難濟事但人才難得取其所長猶可别充任使除遵照勑諭行令各寺將各官起送前赴吏部奏請别用外縁係起送别用官員事理謹具題知一為修舉馬政事兵部覆車駕清吏司案呈奉本部送於兵科抄出督理馬政都察院左副都御史楊一清題臣受命以來夙夜孜孜不遑寧處深懼奉職不効以負陛下登簡作興之意博采羣言講求孳牧事宜頗得其槩臣嘗考之載籍唐初鳩括殘騎僅得牝牡二千匹肇自貞觀訖于麟徳四十年間至七十萬餘匹垂拱以後馬耗太半開元初稍稍修復始二十四萬至十三年乃四十三萬議者謂其監牧之置得其地監牧之官得其人而牧養之有其法也今其地固陕西之地當時領牧事者張萬嵗王毛仲之流耳竊意生當熙洽全盛之朝名為儒者其所建立豈宜出張萬嵗王毛仲之下然稽之事勢實有不同唐都闗中所置八坊四十八監初在岐豳涇寧間後分析列布河西豐曠之野繇京度隴跨隴西金城平凉天水數郡即今西安鳳翔平凉鞏昌臨洮諸府之地員廣數千里其間善水草腴田皆𨽻之故其馬蕃盛如此我朝定都北京永樂四年以陕西地宜畜牧乃詔開設監苑其始䂓畫亦甚宏逺與唐制無大相異苑馬寺所轄六監每監轄四苑威武監所轄武安隆陽保川㤗和四苑在平凉府開城隆徳二縣地方同川監所轄天興永康嘉靖安勝四苑在開城縣及慶陽府安化縣地方熙春監所轄康樂鳳林香泉㑹寧四苑在臨鞏二府隴西㑹寧狄道金縣地方順寧監所轄雲驥昇平延寧永昌四苑在延安府保安縣及慶陽府安化縣地方蓋亦跨陕西數郡二千餘里之地後皆革去止存長樂靈武二監又革去弼隆慶陽安邊三苑今見存牧地在開城通渭二縣地方者不過環數百里又有衞所屯田及王府功臣草塲參雜其間况原設牧軍數少臣故謂事勢不同者此也然不以供京師以供陕西各邊戰士之用宜無不足惟監牧非人牧養無法坐是頽廢上厪宵旰之憂臣竊謂西安鳳翔諸内郡編戸日繁版籍巳定固難别議臨鞏二府土曠人稀原設監苑處所必有空閒不耕之地宜修復者謹當深察利害徐議可否及馬政一切事宜應施行者徑自施行應具奏者具奏定奪外今將切要二事先行條具上請乞勑兵部覆奏行之臣不勝幸甚為此開坐具本該通政使司官奏奉聖㫖該部看了來說欽此欽遵抄出送司案呈到部㸔得都御史楊一清奉命修舉馬政於廢墜之後首奏後項二事俱係𦂳要事宜理合逐一議擬開立前件伏乞聖明裁處縁係修舉馬政及奉欽依該部看了來說事理未敢擅便開坐𢎞治十七年正月初七日本部尚書劉大夏等具題本月十四日奉聖㫖準議欽此欽遵擬合通行除外合咨前去煩照本部題奉欽依内事理欽遵施行計開一增種馬以廣孳息查得永樂四年開設監苑衙門兵部節奉欽依事例上苑牧馬一萬匹中苑七千匹下苑四千匹當時種馬及後來孳生數目雖不可考而原擬養馬定䂓却是如此臣今遍歴兩監六苑酌量草塲廣狭軍額多寡戸口盈縮事勢難易議處得開城苑原額恩隊軍人四百四名安定苑原額恩隊軍人二百六十五名俱草塲寛闊水泉便利地宜畜牧堪為上苑使官得其人政令修舉各牧養萬馬誠不為難廣寧苑原額恩隊軍人二百一十八名後因添設固原州衞草塲地方多占修城郭及撥為屯地萬安苑原額恩隊軍人雖止九十四名草塲亦頗寛闊俱堪為中苑黑水苑係甘肅苑馬寺遷撥恩軍一百六名草塲逼窄清平苑原額恩隊軍人一百三十三名地狭土瘠人無生業俱止可為下苑前項苑分恐不能遽如原定養馬之數大要開城安定二苑俱可牧馬一萬匹萬安苑可牧馬五千匹廣寧苑可牧馬四千匹清平苑可牧馬二千匹黑水苑止可牧馬一千五百匹通計六苑除每嵗給軍騎操外可常牧馬三萬二千五百匹足勾陕西三邊之用國初之盛諒無以逾此然欲廣孳息必先多蓄種馬種馬既少則孳生遽難收効查得各苑見在馬二千二百八十匹堪作種者止有一千三百餘匹臣今將倒失虧折馬匹隨宜追補及𢎞治十六年分茶易種馬通止可勾三千匹必須增置七千匹共種馬萬匹以兩年一駒計之五年之内可勾前數將來孳息牝復生牝駒復生駒源源不息數十萬匹之數可計嵗而得矣及看得西寧洮河等衞茶易畨馬以之給軍騎操固濟邊用以之作種則風土異宜孳牧多損養馬軍人甚以為累必須收買内地馬匹易於牧養成効可圗且西人以畜牧為生要在不虧其直自然樂售考之周官馬質掌質馬量三物蓋三代盛時民有餘畜者官以價直易之養之閑廐之中以備不時之用意正如此臣欽奉勑㫖雖許其設法增添但陕西地方軍民邇年以來困於抄掠困於嵗饑困於轉輸困於修築公私匱竭帑藏空虚別難措置查得𢎞治二年為因種馬數少兵部奏准將太僕寺收貯馬價銀一萬二千兩送發陕西布政司勑巡撫督令布按二司官員收買種馬二千匹發寺牧養合無比照前例支取太僕寺馬價銀四萬二千兩差官作急齎送陕西布政司交割聽臣督同都布按三司官於平慶臨鞏等府衞地方官員軍民之家收買堪以作種好馬七千匹派發各苑孳牧趂時搭配羣蓋依例科駒如有倒失虧欠隨即追補不許似前玩慢以致逋課數多自取罪責前項太僕寺儲蓄銀兩本為濟邊之用且如各邊奏討銀四萬兩不過收買戰馬四千匹較之孳牧之利何如暫費而大蠲惟陛下裁之前件查得𢎞治二年本部奏給太僕寺銀兩請勑陕西巡撫官收買種馬事理與今所奏相同今都御史楊一清備查各苑地畝軍人馬匹數目斟酌土地之宜計扣孳牧之利詳細平正俱係確論既欲責其成功必須備其種馬所據奏討收買種馬銀兩相應准理合無本部於太僕寺收貯馬價銀兩依數支出四萬二千兩用木鞘裝盛沿途應付車輛撥軍防䕶差官送去陕西布政司交割仍照舊例請勑都御史楊一清擇委都布按三司亷能官員分投前去腹裏各該産馬地方兩平收買堪以作種好馬七千匹行令陕西行太僕寺委官印烙派給各苑軍人餵養依時搭配羣蓋孳牧其中收買分撥孳牧追陪與凡一應事宜悉聽本官斟酌裁處所委官員敢有不行用心故違誤事者亦聽本官叅奏拏問仍將買過馬匹毛齒領養軍人姓名造册繳部以備查考一增牧軍以便畜養切照陕西苑馬寺兩監六苑原額養馬恩隊軍人共一千二百二十名見在七百四十五名在逃事故等項四百七十五名縱使勾補完足數亦不多且如每軍一名照例養馬十匹亦不過一萬二千二百匹夫犬馬待人而食若不增置牧軍則畜養乏人難收蕃息之効查得養馬恩軍係先年將各處有罪人犯發充隊軍例於各衞丁多有力軍人内選撥縁陕西各該衞所行伍空虚征操備禦尚且缺人似難額外增補况各苑天氣髙寒地土磽燥生理素少又鮮有居室多在崖窯堡洞住坐腹裏軍人解補者隨到隨逃不安其業馬政廢弛亦多由此訪得各府衞州縣百姓軍餘多有逃來各苑地方潜住年久不當差役又無官司管束查考往往别生事端及至被人告發却行調躱因無戸籍無憑挨捉嵗復一嵗為數漸繁夫物聚則必争争則易於生亂今不為之所將來恐貽他患此等流民論法俱該問罪發遣回還原籍當差但念其故鄉生計巳失無可復之業而此地依棲既久有可戀之資必盡法處之非死則散而為盗耳若編為養馬軍人給撥草塲地土使之往牧則官有畜養之役民無驅逐之苦且其耐貧寒習畜牧比與新撥隊軍萬萬不同公法私情似為兩便欲通行查拘編發誠恐愚民無知畏懼罪責驚擾藏匿急難濟事臣巳經遵奉勑諭便宜處置事理出給告示曉諭但有逃來潜住人民許其赴官投首與免治罪量其人丁多寡給與草塲地土領養官馬依例科駒就近編入該苑籍册内帶管及行守備固原都指揮僉事苗英固原州知州岳思忠查訪招諭去後續據逃民赴臣投首情願養馬者巳及百名之上俱暫收發各苑聽候給地領馬外近訪得前項逃民節年多有投在平凉各郡王將軍中尉等府及儀賔之家跟隨使用娶妻生子出入府第生事害人官司莫能禁治有告發者各府輒稱先年收買家人不肯歸斷縁王府招集外人明有禁例况陕西地方軍民疲困巳極戸口凋耗日甚若姦頑之徒躱重就輕一槩似前投托影射愈加靠累見在軍民如䝉乞勑該部查議宗室收買家人有無事例果於禮法有礙乞行臣委令分巡分守等官通查平凉各郡王將軍中尉等府及儀賔之家并楚肅二府馬營草塲莊所家人除例應得者不動外但有收集各處逃來軍民投托作為家人者着落地方火甲隣佑人等訪報捉拏到官審問明白編發監苑養馬軍人一體分撥草塲地土領馬耕牧若有占恡藏匿各輔導官及儀賔叅奏治罪逃民及撥置主使旗校人等俱照例問發邊衞充軍如此既以增公家畜牧之人又以杜私門招集之釁其於朝廷大體軍國重計俱有禆益仍乞查照永樂年間發充恩軍事例今後北直𨽻山東河南山西陕西法司問擬人犯有例該邊衞永逺充軍者俱發陕西都司轉解陕西苑馬寺編發各苑永逺牧馬連原額及新収發軍人共及三千名之數具奏停止另為施行以三千之軍人牧三萬之種馬孳息既廣戸丁亦增不出十年數十萬匹之盛不難致矣臣愚所見如此未知是否惟陛下察之前件查得𢎞治十三年該刑部等衙門尚書等官白昂等奏准見事例各王府不許擅自招集外人凌辱官府擾害百姓違者巡撫巡按等官奏聞先行追究設謀撥置之人杖罪以上官員奏請降調邊方旗校舍餘人等發邊衞充軍及行准禮部儀制清吏司手本回稱各王府及儀賔例該撥與儀從跟隨查無家人事例今都御史楊一清為因各苑牧馬軍人數少見得彼處潜住流逋及投入各王府儀賔之家者數多俱要查收與同北直𨽻山東河南山西陕西法司問擬邊衞永逺充軍人犯通發各苑牧馬一節縁馬匹必須得人牧養而後可以望其蕃盛今各苑見缺養馬軍人而本處地方又有前項逃住及違例投托之人若不因而收集非特缺人養馬且恐重貽後患合無同前買馬事宜一併請勑都御史楊一清督同都布按三司守巡等官出榜曉諭各苑地方潜住之人及有投入各該郡王將軍中尉等府并儀賔之家楚肅二府馬營草塲莊所家人者俱許赴官自首免其問罪收集牧馬如或占恡不首着落各衙門官員設法訪察擒拏問罪枷號畢日仍發監苑養馬各該輔導撥置之人依擬問發應奏者奏聞定奪其編發安挿前項人役悉聽本官從宜裁處本部仍通行北直𨽻山東河南山西陕西巡撫巡按各行所屬問刑衙門并在京法司凡有問擬永逺充軍人犯及陕西各府十六年以前清出江南衞所軍人例該存留附近衞所者俱解陕西都司轉解苑馬寺定發各苑牧馬務輳足三千名之數若再不足另行定奪仍將編發過姓名繳部查考及照牧馬軍人最為𦂳要買到種馬即要軍人領養若前項清查流民并行補隊軍等項委官敢有視常怠慢者輕則住俸重則叅提不容姑息容令悞事一為遵成命重卿寺官員以修馬政事題為遵成命重卿寺官員以修馬政事臣竊惟修政於廢墜之餘者當求變通之術救弊於積習之久者必有作新之機故曰琴瑟不調甚者必解而更張之乃可鼓也若徒安於故常則未免因陋就簡其何以成天下之大務哉臣奉勑督同陕西行太僕寺苑馬寺官専理馬政陕西馬政其弊極矣臣於别疏巳備言之不敢復論大抵人存而後政舉任法不若任人此古聖哲之明言而歴千萬世莫之能違也照得各處行太僕寺苑馬寺卿少卿等官比與兩京太僕寺事體相同在祖宗朝其選至重故官得其人馬政修舉數十年來士大夫重内輕外又見兩寺衙門無權多不樂為用人者因而俯就之凡遇缺員茍取充數積習既久遂為遷人謫宦之地人人得而輕之成化年間又令巡撫提督巡撫不得親理其事徒委之布按二司巡守兵備官員文移所及每以督同該寺為詞遂使卿寺之官若為二司統屬纔得與府衞為偶勢分既輕職任愈廢雖有才能一統是職終身不展垂首齎志坐待罷黜夫事勢至此中人之性欲其奮發有為斯亦難矣邇者皇上重念邊方多事用馬為急采納該部建議講求孳牧事宜以陕西苑馬之利獨優簡命愚臣前來督理肅清弊政布置成䂓愚臣事也顧法立非難行之為難今天下良法美意動為有司所遏令出於上而隳於下者以為恒患使卿寺任非其人臣雖罄竭駑鈍一法立一弊生事事而求之時時而騐之亦不勝其繁瑣苛察之病矣為今之計慎擇卿寺官員最為急務切照陕西苑馬寺卿李克恭少卿徐文英陕西行太僕寺少卿李宗商俱該臣遵照勑諭具奏黜罷及起送别用前項員缺合當銓補查得先准兵部咨為處置茶馬以便地方事該本部題稱今後凡遇各行太僕寺苑馬寺缺少卿於各省叅議僉事内缺卿於各省叅政副使及本寺少卿内各推舉有才力者陞任如果牧養有方馬政興舉照依太僕寺卿并少卿事例推舉在京相應堂上官或巡撫都御史其餘各該監苑亦要於北方少壯素知養馬者選任庶使各寺官員皆得其人馬政可以保其久逺不廢等因具題節該奉聖㫖是今後各寺監官員務選才力素優的去待有成効一體不次擢用欽此欽遵續准兵部咨為一事權以修邦政事該本部題該南京科道等官奏前事本部議擬具題節該奉聖㫖是今後行太僕寺苑馬寺官有缺照在京太僕寺官例務推素有才望的簡用待有成績亦照太僕寺官陞擢欽此欽遵中外臣民恭覩成命皆知皇上崇重卿寺興舉馬政之意變通之術作新之機誠無出此然臣到陕以來聞二司之於兩寺輕忽如故臣嘗行委二司官㑹同行太僕寺少卿李宗商查處官軍騎操馬匹事務其二司恥與之同事不容並列習俗之弊至於如此彼見先年亦嘗奉有成命而卿寺之選格不加嚴體勢不加重耳目相襲以為宜然未能遽革今前項卿少卿員缺若不遵奉明㫖照在京太僕寺官例推用及照依兵部題奉欽依於二司叅政副使叅議僉事内推選陞任則無以轉移人心將來馬政難望修舉及照兩京太僕寺卿員缺多於在外按察使内推補然則行太僕寺苑馬寺官於叅政副使等官内推任亦正相應且使二司之於兩寺視如一體不至輕侮沮撓則府衞以下官僚素所服屬於二司者自然嚴憚奉行之不暇矣論者或以為今之行太僕寺苑馬寺卿求為叅政而不可得若將叅政等官推任恐於人情不堪殊不知低昂輕重之機正在用之何如耳昔以遷謫視之則其勢自輕今以推擢視之則其勢自重正名分以作其氣懸禄秩以待其成人臣之分隨所位任豈敢有所擇亦豈可狥人之情而聽其擇哉但今正在整理修復之際急缺官員若將各布政司按察司官一例推陞恐其相雜陕西地方遥逺到任稽遲不無誤事伏望聖明斷自宸衷乞勑吏部將陕西苑馬寺卿員缺於陕西及山西河南附近布按二司年淺素有才望叅政副使或年深曾經旌異叅議僉事内推陞其兩寺少卿員缺亦於前布按二司年淺素有才望叅議僉事内推陞各推二員上請簡用齎憑令其到任管事待有成效聽臣奏保旌異吏部查照在京太僕寺官事例不次擢用如此則耳目一新士氣自倍勢分由此而尊職任由此而重使人人得自展布馬政不日可復國初之盛矣臣誠愚昧職業所闗不勝激切縁係遵成命重卿寺官員以修馬政事理謹題請㫖一為遵復舊制量添官員以脩馬政事題為遵復舊制量添官員以脩馬政事臣查得永樂四年開設陕西苑馬寺衙門額設卿一員少卿二員寺丞四員主簿一員長樂靈武二監各設監正一員監副二員録事一員開城苑設圉長八員安定苑六員清平苑三員廣寧萬安二苑各二員後該本寺少卿嚴信等奏稱本寺見在孳牧止有馬驘驢六千餘匹頭官多事少要乞裁減該行在吏兵二部議得合無本寺存留卿少卿主簿各一員寺丞二員長樂靈武二監各存留監正一員錄事一員開城苑存留圉長三員安定苑存留二員清平廣寧萬安三苑各存留一員管事其餘盡數起送赴部别用官制不動以後馬匹増添照舊銓選正統二年十二月二十三日題奉英宗睿皇帝聖㫖是欽此欽遵通行外成化年間該陕西巡撫都御史余子俊奏添設黑水苑照廣寧等苑例銓除圉長一員𢎞治二年又該陕西巡撫都御史蕭禎奏革寺丞一員及查得開城苑近年止有圉長二員外一員不曾裁革久未選除靈武監錄事董真安定苑圉長周安俱於𢎞治十五年朝覲黜退所有員缺亦未選補臣仰惟我太祖文皇帝以神武御天下深念軍國之務用馬為急立法定制䂓模宏逺遵而行之馬政豈有不舉實效豈有不著數十年来選用太輕典牧之官徒存故事孳牧之政名存實亡論者不能深考祖宗設官之意講求探本救弊之術動以官多議革惜小費而忘大體狥近利而昧逺圗因循至今馬政廢弛殆盡致妨邊務以厪宵旰之憂夫官本因事而有設政當因時而制宜以陕西馬政論之若止如近年故事則見在巳為贅員必欲大圗修舉則舊額似當量復且正統初年裁革之時本寺見養馬驘驢止有六千餘匹頭今見在馬匹雖不及此數臣巳經奏添種馬明年銀買茶易及追補倒失虧欠期得種馬萬匹方勾孳牧嵗復一嵗為數漸廣典守之官豈可缺人臣又看得安定萬安等苑相離苑馬寺各數百里因是本寺官不行巡視查考以致該苑官軍任情作弊臣欲令自明年為始照依布按二司分巡分守官事例行本寺輪委堂上官一員分管廣寧開城黑水三苑一員分管安定苑一員分管清平萬安二苑不時下營巡視㸃閘驗看定駒顯駒重駒比較官軍牧養勤怠年終交代量其所管苑分孳生多寡以定各官賢否用行旌黜之典如此則人人効職成績可圗縁本寺除正官外止有少卿寺丞各一員必再添除堂上官一員乃能濟事及照廣寧黑水清平萬安四苑各止設圉長一員中間或有事故去任又無空閒官員可委不無誤事如萬安一苑草塲廣闊極臨邊境亦止設官一員委的看管不周前項苑分似當照舊設圉長二員乃可責其成效如䝉乞勑吏部查照舊例合無將陕西苑馬寺不拘少卿寺丞添設一員廣寧黑水清平萬安四苑各添設圉長一員并靈武監録事開城安定二苑園長員缺各銓補前來管事其餘原額官員待馬匹蕃盛之日另行奏請定奪縁係遵復舊制量添官員以脩馬政事理謹題請㫖一為處置馬營城堡事兵部覆本部於兵科抄出督理馬政都察院左副都御史楊一清題看得陕西苑馬寺各苑多不曾修建衙門城堡及雖有城堡年久坍塌又皆無營房馬廐苑官多僦屋而居或宿窯洞所養官馬晝夜在野且春夏之時趂水草牧放固可􅃴其騰㳺之性至於冬寒時月若不蓄積草莝攅槽餧養山野之中草枯水凍加以風雪侵凌凍餓損傷寧不致死臣謹按周官圉師掌教圉人養馬必順四時冬則燠之以廐夏則凉之以庌藉蓐以禦其寒塗釁以除其穢先王畜牧之善如此查得永樂四年兵部為開設衙門事將各項合行事件開坐内一件起蓋馬廐合行工部轉行陕西都行二司并布政司令軍衞有司差撥軍夫於附近各苑去處量其馬數起蓋馬廐以備冬月牧養合用木植仍從工部定奪題奉欽依通行外此係國初牧馬成法年久廢弛一向不曾申明舉行及照𢎞治十四年間敵衆大舉侵犯官馬因無處收避被搶去三千九百餘匹况各苑地方木植艱得土人以窯洞為家乃其素習各該衞所解來隊軍因無棲止隨到隨逃廢弛之故亦多由此今朝廷大修馬政所宜深慮却顧用圗久逺豈可仍前因陋就簡又恐數年之後我馬蕃息為敵人所窺或貽前年之禍雖悔何及處置馬營城堡誠為急務臣巳經督委布按二司右叅政車霆副使王寅本寺少卿徐文英寺丞武戩督同固原靖邊等州衞官親詣各苑地方眼同該苑官吏軍人相度地勢斟酌事宜逐營逐堡一一勘處停當勘得長樂監廣寧開城黑水三苑俱在平凉府固原州地方廣寧苑原設鞏昌臨洮青州平凉四營鞏昌臨洮青州三營俱原無城堡合當創置鞏昌營堡於地名石羊溝創置周圍二百三十丈廣寧苑衙門在此設立臨洮營堡於地方紅崖子創置周圍一百五十丈青州營堡於地名龍王廟創置周圍一百六十丈平凉營巳有成堡一座周圍一百二十六丈因舊修理開城苑原設八營頭營二營舊有城堡俱各逼狭頭營合於本城迤東展拓共二百三十六丈開城苑衙門在此設立二營於本城迤南展拓共二百九十五丈三營舊城堡被河水衝浸不堪安挿人馬今於本城迤西坐落地名第二灣創置周圍二百八十丈四營六營七營各舊有城堡年久坍塌俱因舊修理五營原無城堡於地名廟兒平創置周圍一百六十丈八營舊有城堡鎮戎千戸所開設在内别無空閒地基今於本城迤南展拓共一百六十丈黑水苑舊有城堡一座固原衞備冬人馬在此安挿亦無空閒地基今於本城迤南展拓共七百三十五丈黑水苑衙門在此設立安定苑坐落鞏昌府通渭縣地方原設中營原川稠泥河衙門石硤口雙井共六營中營就附本苑舊有城堡一座年久損壊地基逼狭今各將本城迤南展拓三十五丈北面因山斬削成墻其餘各因舊墻幇築東西共二百歩南北二百七十步周圍共二里六分四毫本苑衙門仍在此修置原川稠泥河衙門石硖口四營先年各軍因被敵衆搶擄自行用力各於本山修有小堡年久亦多損壊督令各軍隨宜修補雙井營原無城堡亦合就於本營地方照依各營修築小堡一座靈武監清平苑坐落平凉府固原州地方舊有小城堡一處不堪安挿人馬今勘得古跡彭陽舊城基址西倚髙山東瞰平川周圍九百丈合於此修置大城堡一座平川東南北三面共四百五十丈髙山西南北三面亦如平川丈數内修建本監本苑衙門闔苑人馬俱堪在此收集居住萬安苑坐落固原州及慶陽府環縣地方原無城堡衙門今勘得地名板井川見有新修城堡一座周圍四百三十五丈五尺四面皆距深溝天然斬削不煩人力合在此修設萬安苑衙門但本苑草塲廣闊地臨邊境恐卒遇聲息人馬急難收集一處今於草塲界内勘得舊有孫家堡楊家堡基址二處各離板井川三十里亦合各修建小城堡一座收集附近人馬前項城堡量其大小各修城門一二座城上修垜墻更鋪以備瞭望四圍各濬城壕於内隨其地勢廣狭各修營房馬廐多者數百間少者百十餘間開立街市以通貿易種植樹株以供䕃息各存留隙地堆積草束以備支用春夏時月如無聲息官馬聽其在野牧放一有烽火傳報即便收掣回營及冬春寒凍時月俱收入城堡餧養黑水安定清平萬安四苑相離本寺地逺仍各建立官㕔一所每年輪令少卿寺丞一員分管不時下營㸃閘在此居住夫築城堡則人馬有所保障置馬廐則馬匹不至横傷修營房則貧軍有所依棲建公衙則牧官可修職業揆之事理皆所宜為誠非浪設且清平萬安二苑地方與各該軍衞有司軍民雜處相離邊堡窵逺前年敵衆四散抄掠如入無人之境殺戮人民如殺狐兎驅逐丁口如驅犬羊臣巡視所過血痕漬地凋落之狀難以模冩呻吟之聲所不忍聞前項彭陽板井川諸城堡既立非惟監苑人馬可保或遇敵患附近軍民丁口頭蓄亦可收避况西人素勇敢善鬭待馬政就緒將各苑軍餘挑選壯丁設為操夫各一二百名給與盔甲授之弓矢令其不妨牧馬遇閒暇之時操習武藝就令寺監官員督視比較不許調遣専一防守本營城堡是雖為牧馬而設亦可壯邊域之聲勢資𦂳急之應援古者寓兵於農今藏兵於馬無不可者敵人覘知我保障有地防守有人縱然馬匹蕃盛不敢生垂涎之意矣但經營造作所費不貲合用工力必須計處除因舊展拓修理用工不多者就令本營正軍餘丁自行修築外其創置城堡工程浩大必須量起附近軍衞有司軍民人夫與本營軍夫相兼修理至於建立城門衙門起蓋營房馬廐合用工料等價數多其木植俱於平凉府華亭縣及鞏昌府漳縣採打縁各處人民節年因穵運修邊等項負累貧困臣實不忍重勞必得官錢雇人採打輸運則公私兩便况今嵗地方薄收來年人民必然缺食若有官錢雇募趨者自倍官事易集昔人有以㓙年興大役成大功者意正如此查得陕西在官庫藏别無蓄積官錢堪以動支合無通行陕西司府衞州縣大小問刑衙門將𢎞治十七年正月起至本年十二月終止一應經問囚犯該納贖罪折收銀錢者連賍罰銀物各衙門追完俱發各府貯庫按季𩔖送平凉府收貯聽臣督委布按二司官陸續查取雇人採打木植燒造甎瓦及輸運等項支用但所問囚犯有力者少以一省一年計之數亦不多惟復再將太僕寺收貯馬價銀多支一二萬兩通前買種馬之數共送發銀六萬兩則事事可辦成功不難臣當嚴加督察稽考不敢茍且粗率委用非人浪費錢糧自取罪責事完備圖造册奏繳臣又竊見世之好議論者見人有所舉動輒以勞民費財為辭殊不知不一勞者不永佚不暫費者不大蠲要在擇可勞者而勞之不為無益之費而巳古者問國君之富數馬以對矧今堂堂天朝據全陜畜牧之地而馬政廢弛至此各邊缺馬動輒來京奏討十數年間送發馬價銀多至數十萬兩是皆百姓膏血之餘率是以往何有紀極夫七年之病三年之艾茍為不畜終身不得及今圖之五年之後可以急陕西三邊之用十年之後可以備京師不時之需將來所省不知㡬何且以壯中國富彊之勢而潜消外夷輕侮窺伺之心其所闗係良非小補若憚勞惜費狥流俗之浮言襲目前之故跡則是為一身之謀而非所以為國家深長久大之圗者也臣所見如此乞勑兵部詳議可否如或可采依擬覆奏行之地方幸甚臣愚幸甚縁係處置馬營城堡乞請官錢動煩軍民人夫事理未敢擅便為此具本該通政使司官奏奉聖㫖兵部看了來說欽此欽遵抄出送司查奏間隨奉本部送於兵科抄出都御史楊一清又題為傳報聲息預防敵患事據固原衞申據瞭髙樓守瞭軍人史新收報稱𢎞治十六年十二月初八日申時瞭接迤東東山墩傳火一十一把初九日夜二更時分又據本軍報瞭接迤北袁家墩舉火二把本夜三更時分亦據本軍報接前墩舉火五把傳煙一把至初十日辰時據守瞭軍人倪九瞭接迤東東山墩傳火二把至本日巳時又據本軍亦報前墩傳火二十八把本日夜一更時分續據軍人梁孟釗報接迤北袁家墩火三把本夜二更又據本軍亦報前墩舉火二把本更隨據軍人彌九又報袁家墩傳砲十箇煙二把等因據此隨據陕西布政司右叅政車霆掲帖呈稱訪得敵衆俱巳過河在套住牧晝夜火砲不絶本年十二月初二日將寧夏邊墻剜開六處與墩軍荅話云我每三十萬人馬要來搶殺先着我每來拆墻思得各苑見在馬匹俱無牢固城堡為今之計除行自巳有堡去處隄備外無堡去處合無行令附近各苑不分軍民築有塞堡人家不許獨占先令無堡軍人與伊通知將積有草束搬運於内一遇有警將馬收入便益等因據此照得各該監苑委多不曾設立城堡及間有城堡者又多年深坍塌不堪堡障臣於本月初八日巳將查處馬營城堡縁由具題定奪但目下傳報聲息𦂳急其稱三十萬人馬要來搶殺乃張大之言固難盡信然敵衆既巳過河在套住牧不得不防除依擬行令隄備外臣聞陕西監苑國初馬匹蕃盛自正統年間以來節被敵衆入境因無城堡收避多被搶掠馬數消耗數十年來未能完復𢎞治十四年各軍丁口官私頭蓄被掠尤多呻吟創殘至今狼狽以事勢論之彼既明知固原地方被搶蕭索方及二年頭畜未曾生息似無復來之理况近該總制尚書秦紘修築邊墻剗削山崖挑濬溝塹自靖邊花兒岔起至環慶饒陽水堡止七百餘里俱巳完固防守之計比前不同人心恃以無恐但邊人無常終難測度恐其因見前年深入厚獲不曾遭挫有􅌸視我軍之志萬一河開不出窺覘糾結地方安得晏然無事且各該邊城人馬數少糧草缺乏將領無堪倚之人行伍無敢死之士深慮郤顧臣實疚心書曰惟事事乃其有備有備無患兵法曰無恃其不來恃吾有以待之無恃其不攻恃吾之不可攻然一切戰守之事各有司存非臣所敢輕議臣晝夜思惟欲修孳牧之政即當為備禦之圗今見在馬匹并追補孳生加之明年銀買茶易為數漸繁前項修築營堡工程非一時可辦必先事預防趂時兼舉庶免後艱若謂今日種馬數少不宜輒議營堡待馬匹蕃息之後另行定奪臣恐意外之憂或生於所忽不測之患或起於目前徒竭公私之力顧為仇敵之資後時而悔亦無及矣如䝉乞勑兵部查照臣先今擬奏事理早為上請施行臣不勝幸甚縁係傳報聲息防預慮敵事理未敢擅便具本該通政使司官奏奉聖㫖兵部看了來說欽此欽遵抄出送司案查先為修舉馬政事該都御史楊一清題要於太僕寺支取馬價銀四萬二千兩送去聽伊收買種馬孳牧巳該本部依擬具題奉聖㫖准議欽此通行欽遵去後今該前因案呈到部看得都御史楊一清奏稱即今陕西修舉馬政俱無城堡馬廐恐後馬匹蕃息為敵所窺况今彼處見報聲息所宜先事預防乞要築城堡使人馬有所保障置馬廐使馬匹不至横傷修營房使貧軍有所依棲建公衙使牧官得修職業前項工程必須量起附近軍民人夫動支賍罰馬價以備各項費用一節論辯剴切計處停當俱是為國興舉馬政用圗永久之計相應依擬定奪除地方䂓制巳該一一相度明白外所據該用人力合無行移本官并巡撫都御史周季麟計用若干行令都布按三司着落所屬附近軍衞有司量數起倩與同本營軍夫相兼修理其應用錢糧本寺再於太僕寺馬價銀内支取八千兩與前給買種馬銀共輳五萬兩一併送去聽從本官於内支用若有不足仍依前擬於本省大小問刑衙門𢎞治十七年贖罪銀錢賍罰銀物并司府在庫官錢内支取以備輳辦木植甎瓦等項務圗成功經久不許虚應故事畢日通將用過錢糧築修過營堡備造圖册奏繳仍造青册送部查考其所擬每年輪差寺官㸃視馬匹挑選苑軍防禦外患悉依所擬次第施行奏内所開固原衞申報邊情本部亦合通行總制尚書并寧夏延綏守臣查勘隄備縁係處置修理馬營城堡動支官銀起倩軍民人夫及節奉欽依兵部看了來說事理未敢擅便𢎞治十七年二月初七日本部尚書劉大夏等具題本月初九日奉聖㫖是着楊一清上𦂳提督整理務要完固欽此欽遵擬合通行除外合咨前去煩照本部題奉欽依内事理欽遵施行一為稽考官軍騎操馬匹事兵部覆該本部送於兵科抄出督理馬政都察院左副都御史楊一清題節該欽奉勑諭官軍騎操之數亦令該管官員如法㸃視比較毋致倒失虧欠爾仍不時往來提調稽考欽此欽遵臣本年八月内到於陕西地方督委都布按三司左布政使文貴按察使張㤗都指揮使楊敬等將陕西城操備冬并延綏寧夏二鎮下班官軍騎操馬匹逐一㸃視續據各官掲帖内開各項馬匹瘦損倒失數多除各行懲治追究外近該臣經過各衞所地方看得各處官軍騎操馬匹臕壯者十無二三瘦損者恒居其半或皮破脊穿或骨髙毛脱或瘡瘸可騐而揑故遮瞞或行動欲仆而借人扶䇿平居騎坐且或不堪况望其追風逐電於沙漠之區䧟陣摧堅於矢石之下哉前年邊寇深入搶掠我軍退縮不聞截殺之功大率由此至於倒死拐欠之數月積嵗增行伍之間殆無完隊詢其所以多因管軍官員不能嚴督軍人用心餧養所致又有一等無知官員將各軍應給草料尅減或扣除在官而應荅上司或指稱公用而私賣覔利訪得各邊營堡其弊尤甚其鎮守分守副叅遊擊把總等官奉公守法者固有假公營私者實多非因公務輒差旗牌官舍人等及容令弟姪子男買賣營運濫給官馬應付多者二三十匹少者五七匹䭾載私物重至百十餘斤程送前途逺至七八十里往來相繼馳驟無休馬匹因而損傷軍士莫敢聲說及至追補之際又被官豪勢要之人將矮小瘦損不堪馬匹威壓勢逼髙價領買有交手未㡬而旋即倒死者臣為提學之時蓋巳熟知其弊乃今聞之道路此風猶不能無近年朝廷軫念邊方多事或發太僕寺馬價或支陕西布政司官庫銀兩收買戰馬給與出境追斬截殺燒荒等項官軍亦或見侵於狐鼠漁獵之徒不得實用衆口嗷嗷可為切齒既往者不可勝罪將來者所宜嚴防案查先為修舉馬政者行據陕西行太僕寺呈查得洪武三十年二月十三日右軍都督府官同左軍等都督府官早於奉天門欽奉聖㫖如今陕西等都司開設行太僕寺恁都府行文書去說與都司衞所知道這箇衙門職専提調馬匹比較孳生但有作弊虧欠馬匹許令本寺舉問品職雖小所掌事重如同御史出巡按治該管指揮千百戸衞所鎮撫首領官吏務要將所養一應馬驘盡數開報聽從㸃視提督敢有非理抗拒許本寺官奏聞拏問欽此欽遵及查得先奉兵部劄付該本部題奉欽依内事理備由劄付本寺照依京營事例將所管各該衞所營堡官軍騎操馬匹差官一員逐一㸃閘比較瘦損者督令如法餧養務在臕壯倒失者督令設法追補務在完足查出官軍姦弊聽令一體叅奏問罪每於年終將㸃視比較過馬數回奏齎册送部稽考等因備行到臣仰惟我太祖髙皇帝創制設官體統甚嚴防範甚宻又有節年題准通行事例陕西都司衞所及延綏寧夏各邊營堡官軍騎操馬匹比較瘦損倒失訪察奸弊皆行太僕寺官職業今馬政廢弛乃至此極該寺明知前弊不能舉正縁各該犯摠領班管隊指揮千百戸鎮撫等官俱係軍職又有鎮巡分守協守遊擊兵備守備為之統領各官憑藉威寵倚仗聲勢因見行太僕寺職冷􅁠輕往往抗違不服柔者猶相沮撓剛者動生欺侮該寺官員進不得展退無所訴輒􅈥其志徒有比較之名全無比較之實甚至嵗報馬數亦多不行造册雖嘗叅奏玩慢如故該寺畏懼違例被叅只得止憑先年舊册填冩上下因循應行故事其所由來巳非一嵗之積矣夫銀買茶易浪費公家之財物朋合地畆重剥軍人之脂膏而其弊至此及今不為之處將來為弊益甚軍國大計為之奈何查得在京各營坐營多係公侯伯都督掌號頭把總多係都指揮等官又有内外重臣提督尚有太僕寺官一員每年奉勑不時親詣各營及牧馬草塲㸃閘比較其馬匹瘦損倒失各有定擬住俸遞加則例况外省衞所各邊營堡去京師數千里日月之明或有遺照雷霆之嚴或有遺威若非仰遵祖宗之舊典崇重卿寺之事權雖使孳牧政舉給領嵗加彼失養之禁令如常私乘之故轍不改所得不能償其所亡所利不能藥其所傷徒殫公私之力何補邊疆之事臣以職業不得不言如蒙聖明采擇乞敕兵部議擬上請合無照依京營事例請勑陕西行太僕寺每年行令堂上官二次分投前去該管衞所營堡將官軍騎操馬匹㸃閘比較亦照京營定與則例如管隊官以一隊為率内瘦損至十五匹倒失至十匹者住俸一箇月以上瘦損每十匹倒失每五匹遞加住俸至三箇月為止把總領班坐堡等官以三隊為率内瘦損至三十匹倒失至二十匹者住俸一箇月以上瘦損每二十匹倒失每十匹遞加住俸亦至三箇月為止不及數者量情發落各責令將瘦損者用心餧養臕壯倒失者嚴限追補完足如下次㸃閘瘦損者仍前瘦損及數外又有瘦損管隊官仍以十五匹為則把總等官以三十匹為則遞加住俸倒失者不曾完補及數外又有倒失管隊官仍以十匹為則把總等官以二十匹為則遞加住俸俱至六箇月為止不及數者量情發落各邊官軍下班回衞一體㸃閘比較每年終將某官分管某處㸃閘比較過縁由回奏照例齎册赴部稽考如守備分守以上官員不能申嚴號令以致所部官軍馬匹瘦損倒失數多屢經比較不行畏憚遵守者聽其指實叅奏定奪敢有仍蹈舊轍扣除軍人該給料草侵尅官發買馬價銀將官馬縱令家人頭目私擅騎坐營幹私事䭾載私物以致損傷或仍前將自巳不堪馬匹髙價勒買靠累軍人者亦聽行太僕寺官查訪得實指名劾奏伏俟宸斷黜革一二以警其餘臣當遵奉勑㫖不時往來提調稽考倘行太僕寺官不行用心如法㸃視比較徒應故事甚或操持不謹致招物議聽臣具奏黜罷别選賢能代補其任如此則庶㡬不負我聖祖創制設官之意將見邊城多充廐之良邊將增敵愾之氣戰勝攻克其機在此區區之敵不足為邊方慮矣縁係稽考官軍騎操馬匹事理未敢擅便為此具本該通政使司官奏奉聖㫖該部看了來說欽此欽遵抄出送司查得成化二年八月内本部題為區畫馬政事議得在京各營在外各邊騎操馬匹欲得可以征戰必須請勑專差太僕寺少卿一員無太僕寺地方從巡撫并巡按官時常往來各營牧馬草塲㸃閘比較臕息倒失等項定限陪償等因題奉憲宗皇帝聖㫖是馬政多廢弛了恁區畫的皆准行欽此欽遵續為違例騎死官馬事該巡撫寧夏都御史張禎叔奏本部議得今後除傳報聲息并幹辦𦂳急公務外敢有擅將官馬騎幹私事及䭾載貨物或撥送與人者五匹以下罰馬一匹六匹以上罰馬二匹十匹以上罰馬三匹就給與無馬官軍領養騎操若致走傷倒失者五匹以下降一級六匹以上降二級馬各抵數追陪還官仍各革見任帶俸差操不許管事其鎮守副叅監鎗等官擅自撥馬與人有違前例者奏請定奪等因題奉聖㫖是欽此欽遵又為比較馬匹事該本部題准行移各該行太僕寺照依京營事例將所管各該衛所營堡官軍騎操馬匹差官一員逐一㸃閘比較瘦損者督令如法餧養務在臕壯倒失者務令設法追補務在完足查出官軍奸弊聽令一體叅奏問罪每年終將㸃閘過馬數回奏去後今該前因及查甘肅山西遼東俱設有行太僕寺案呈到部叅照都御史楊一清奏稱陕西行太僕寺之設専一比較馬匹國初任専故職業修舉近年廢弛致戰馬消耗歴言流弊之極欲行立法救弊論議親切深為有見合無准其所奏比照京營之例請勑二道不必注定官員職名順齎前去陕西行太僕寺每年差堂上官二員二次分投遍歴所轄衞所城堡將一應操備馬匹用心㸃閘比較如有瘦損倒失悉依所擬照例住俸餧養追補凡查出有本官所言前項各種情弊該追罰者照例追罰該叅奏者指實叅奏其罰俸罰馬降級黜革等項俱照本官所擬與本部原奏施行每年終將㸃閘過數目比較過縁由回奏造册繳部以憑查考若該寺官不行用心㸃閘狥情容隠聽都御史楊一清稽考叅究各該鎮巡大臣母輕沮撓共成國事仍照此例通請勑甘肅山西遼東行太僕寺無太僕寺去處行令巡撫都御史一體㸃閘依擬施行如此則戰馬可令臕壯邊軍不至怯敵縁係請勑稽考官軍騎操馬匹及奉欽依該部看了來說事理未敢擅便𢎞治十七年三月十一日本部尚書劉大夏等具題本月十六日奉聖㫖是欽此欽遵擬合通行除外合咨前去煩照本部題奉欽依内事理欽遵施行一為改調官員以修馬政事題為改調官員以修馬政事照得陕西行太僕寺管轄陕西衞所營堡查㸃比較官軍騎操馬匹禁革姦弊祖宗成法具在體統甚嚴奈何近年以來任隨勢輕官因人廢平凉衞指揮與該寺官員迭為賔主杯酒往來行則中門坐則並列體統既巳乖張政令何由修舉邇者伏䝉皇上軫念邦政至重簡命陕西布政司右叅政車霆為陕西苑馬寺卿王琰為山西行太僕寺卿山西按察司僉事郭珠等為陕西兩寺少卿天下之人改觀易聽馬政修復之機端在是矣臣切念陕西行太僕寺所管馬政比之山西不啻數倍况敵衆近年不時潜伏河套内則固原靖邊等衞外則延綏寧夏二邊追敵制勝全藉馬力稽考防範不得不嚴該寺正官必得素有風力才望之人乃能彈壓羣情肅清弊政竊見陕西行太僕寺卿袁宏為人詳慎居官練達由漢中府知府陞任將及六年守身不聞非議但因循舊弊未能釐革臣巳經行令改正本官雖知砥礪自新終是人情稔熟事多牽制急難振作及訪得叅政王琰公嚴有威巡歴各衞所州縣督理糧儲令行禁止下人畏服若將王琰改任陕西袁宏調任山西則陕西官軍素知王琰嚴明自然畏憚夙弊可革而袁宏以其才力施之山西地任既新必能自効兩省馬政俱可修舉臣是以昧死上陳如蒙乞勑吏部再行訪察合無將王琰改任陕西行太僕寺卿袁宏調山西行太僕寺卿惟復將袁宏於附近各布政司叅政内仍推選一員調用管事實為便益縁係改調官員以修馬政事理謹題請㫖闗中奏議巻一
