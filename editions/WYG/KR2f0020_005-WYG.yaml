body:
  text: 關中奏議巻五明楊一清撰巡撫𩔖一為易置主將以保固地方事兵部覆題該本部送於兵科抄出巡撫陜西等處地方兼督理馬政都察院左副都御史楊一清題臣巡歴陜西沿邊軍衛城堡閱視軍馬多非素練之兵或弓矢器械之不習或坐作進退之不知其間勇徤壯丁又多困憊身無完衣而備冬人馬狼狽尤甚詢其所以盖因近年領軍官員以操練為故事以科歛為得䇿遇冬主將巡邊各枝各隊輳辦銀兩官則或馬或幣獻其所有軍則或糧或草任其侵尅至於河開將放每軍歛銀一二錢謂之卸甲驛站所過料草不支本色謂之打乾頭目虚張聲勢打㸃過送以為孝順將官佯若不知端居坐受以為當得承應不及而箠楚隨之錢物到手則諸事不問故凡把總管隊等官但知媚上豈復顧下但求免禍豈暇恤軍以致軍日貧馬日耗武備日弛職此之由去冬河套侵犯勢甚危急鎮守武安侯鄭英統兵固原不聞揚兵耀武之謀仍為尅科聚歛之舉夫三軍之命皆係於將驅冐水火蹈白刃之人而奪其衣食戕其肌膚使之懷憤積怨深入心骨倉卒遇敵其不渙然離散者㡬希矣况望其捐軀效死以成尺寸之功哉臣觀陜西武臣非無善戰之人沿邊營伍亦多敢死之士要在主帥得人智者效謀勇者宣力士氣自倍兵勢自張今鄭英所至邊官解體上下離心勇氣索然怨聲載道夫將官如有折衝禦侮之才摧堅陷陣之勇則貪可使詐亦可使如往時劉寜輩既取其長當棄其短若鄭英素無謀勇聞敵怯懦𢎞治十四年聞大舉之敵侵犯固原嬰城自保不敢出戰彼時到鎮未久猶為可辭去年十二月及今年正月殘寇累次侵掠不聞設一籌策運一方畧所至則徴兵自衛坐費芻糧以致敵騎出入自由如蹈無人之境所謂有是病而無是徳者將安用之傳曰君不擇將以其國與敵也朝廷柰何以全陜重地而畀之斯人不早為易置擇人而任之待其僨事貽患雖置之重典亦無益矣臣竊聞近日聲勢猖獗尤非前比冬間如不悔過逺遁必又踏冰入套臣受命經畧練兵蓄糧信賞必罰作新士氣訪用人材愚臣事也若擁衆内侵縂率官軍衝鋒出戰乃將官之事臣本書生安能辦此已將應設逰擊縁由具奏但主將之任尤為機要所關查得先該總制尚書秦紘奏稱傳聞敵衆要從延綏西路入搶西安府地方欲將西安四衛原擬固靖備冬官軍暫留一半在西安府城内與延寧二邊備禦下班官軍行令鄭英嚴謹操練候將來相機戰守以保人民一節正恐伊巡邊有害無益故為此言以阻其出耳不然豈有身為主帥専守一鎮城之理況敵衆欲寇西安必由環慶固原而入延綏相離地逺山川阨塞豈能飛度所謂因噎而廢食者此論是也議者或又欲於固原添設副總兵一員提調各邊人馬然既有鎮守主將又添副總兵不無官多人擾且副總兵既以提調各邊人馬為職則主將徒擁虚名置之無用亦恐未通但固靖環蘭𦂳隘地方數多若得常守之將委的事有統紀武備自嚴軍威自壯臣廣詢愽訪熟慮深思誠得易置相應鎮守主將一員就於固原常川駐劄則官不加多事為有益伏望聖明念全陜疆土之重憫生民塗炭之急乞勅兵部議擬上請合無將鎮守陜西武安侯鄭英行取囘京别推驍勇知兵善撫軍士在内如都督楊玉神英輩在外如吳江曹雄輩將官一員鎮守陜西等處地方節制諸軍常川固原駐劄提調防守遇警往來各邊統率官軍盡力𠞰殺則邊方可保無虞邊方安則腹裏安矣陜西城内自有鎮守巡按都布按三司官員臣今往來經畧以後巡撫未免多住鎮城不待將官保障如果事情十分寜息邊方無事主將仍回鎮城駐劄另行具奏定奪臣於鄭英素無睚眦直以地方安危所繫利害切身若因循隠黙忌避不言則欺君負國之罪萬死莫可自贖等因具本該通政使司官奏奉聖㫖兵部知道欽此欽遵抄出送司查得近該鎮守陜西地方武安侯鄭英奏伏念臣本一介菲才荷蒙先帝聖恩不以為愚不肖授以藩鎮之寄自臣到鎮以來迨今四載夙夜憂遑莫能補報臣見年五十七嵗筋力巳衰况舊患痰疾因去嵗邊方侵凌騷擾欽奉勑諭隨宜䇿應欽此欽遵正臣子効勞之時臣疾雖在身待報躬親統兵往來截殺但邊地風寒致將前疾舉發至今用藥調治百無一効又加半身頑麻不能騎射若不辭解兵柄緣臣所守實為三邊根本重地倘遇有警恐悞朝廷大事如蒙伏望聖恩憫臣在邊染疾容臣回京調理另推謀勇將官前來代臣管事臣干冐天顔不勝戰慄之至等因具本該通政使司官奏奉聖㫖兵部知道欽此欽遵議奏間今該前因案呈到部㸔得巡撫都御史楊一清奏稱陜西地方軍務廢弛鎮守官員不堪厥任誠恐臨期悞事要將武安侯鄭英行取回京别推驍勇知兵官一員前去更替鎮守陜西地方専在固原駐劄及武安侯鄭英亦自奏患不能騎射乞要回京調理縁關中係國家重地主將實官軍司命况近來情勢比昔不同萬一冰凍入套必須防禦得人合無俯從所奏將鄭英取回候命下之日本部就將楊一清所薦官員另行議擬奏請簡命一員前去代替鄭英鎮守陜西令其常在固原駐劄撫安軍士遇警𠞰殺防守地方不許仍往省城復蹈前轍縁係更擬將官及奉欽依兵部知道事理未敢擅便𢎞治十八年十月初四日本部尚書劉大夏等具題本月初五日奉聖㫖是鄭英取回京欽此欽遵擬合通行為此除外合咨前去煩照本部題奉欽依内事理欽遵施行一為慎固地方以遏邊人事兵部覆該本部送於兵科抄出巡撫陜西等處地方兼督理馬政都察院左副都御史楊一清題准兵部咨前事該本部題該寧夏鎮巡等官太監葛全都御史劉憲等各題稱陜西逰兵三千員名已經革去逰擊將軍合無仍設將官統領前來兩界韋州往來駐劄外可以策應花馬池内可以保障固靖等處地方等因該本部看得未審前項人馬見今改調何處應用合行臣查明定奪等因題奉欽依備咨到臣查得先該總制尚書秦紘奏於環慶固原等處添設逰擊將軍𢎞治十七年九月間該巡按陜西監察御史季春奏要裁革兵部依擬題准行移陜西鎮巡等官行令逰擊將軍都指揮楊敬照舊回司所統逰兵俱令掣回原營以後地方如或多事仍該復設逰兵另行具奏定奪等因備咨前來巳經欽遵將原選逰兵掣回原營間續因邊報拆墻進入韋州螺山住牧侵犯固原環慶軍馬不敷鎮守武安侯鄭英隨將前項逰兵調取前來分委都指揮陳善黄正管領防守後日事寜仍照原擬掣回臣接管巡撫受任經畧因慮前項地方委的人馬寡少敵情難測原選逰兵若盡數掣散有警急難收拾除西安等衛及環慶官軍掣回原營外其洮岷河臨四衛官軍又經委官重復挑選精鋭人馬共一千一百員名暫委都指揮管領策應荘浪見在蘭州地方駐劄又於洮岷秦平等衛原擬備冬官軍内挑選一千餘員名委官管領操練聴調正慮河套為患逰擊之官恐當復設故為先事料理一旦用之但得統領之人兵可立集不然直待敵至方議設官有官方議選軍經時累月緩不及事臣之鄙見如此今寜夏鎮巡等官太監葛全等所奏要將陜西逰兵三千員名仍設將官統領一節盖亦以為陜西逰擊當設又因裁革未久故為此言以俟廟堂采擇臣請究竟本末言之寜夏花馬池興武營清水營直抵髙橋兒等處地方乃河套出入之門户然彼之所入雖經於寜夏而其所利則在於腹裏寜夏如能捍禦使之不敢拆墻而入則腹裏可以無患但恐地方散漫墩堡稀疎士馬單弱不能遏其方張之勢彼既拆墻進入必將抄我環慶犯我固原深入我安㑹静寜隆徳諸處内有監牧馬匹尤為素所窺伺加之土漢雜處易於生變一失保障則根本動搖故延寜為手足之疾其禍速而小環固乃心腹之疾其禍遲而大尚書秦紘原擬推選宿將充逰擊將軍操練軍士用防不虞深為有見但當時委任非人致招物議又因邊事稍寜議者遂謂官多人擾奏行革罷未及兩月潛師竊發分抄邊鄙無處寧帖守備等官各有信地彼衆我寡徒閉壘以自全分疆畫界至相望而不救於是衆論囂然盖謂逰擊不當革逰兵不當散方議奏復而邊情已寜矣臣謂兵無常形事有萬變因時制宜固難執一奏設逰擊者乃安内攘外之圖奏革逰擊者亦省事惜費之意也今敵得志而驕冬間難保不入河套萬一拆墻深入數必不少陜西逰擊將軍似當復設隨處應援截遏以安人心且諸鎮一體如大同逰兵應援宣府延綏逰兵應援大同寜夏逰兵應援延綏則陜西設有逰兵既可保障内地亦可為延綏寜夏𦂳急之援不為無益既設之後不宜亟罷庶使事有定規人有定志但添官非難得人為難任非其人平時恣為剥削臨事安可倚仗非惟來議者之口抑且壞地方之事博采得守備固原署都指揮僉事陳善老成歴練慣戰知兵平時撫士有方遇敵當先不怯且歴官年久山川道路險易熟諳使當折衝禦侮之任則兵將相知地利人心兩得可責成功如蒙乞勅兵部再行詳議如果陜西逰擊相應復設合無將陳善奏請充逰擊將軍將原選見在官軍二千員名聴其統領仍在慶陽駐劄不拘環慶固原靖邊蘭州等處但有𦂳急聲息往來應援截殺若尚在河套不曾拆墻進入照依寜夏鎮巡官所擬前去韋州等處與延寜逰兵掎角併力防禦倘或大同宣府一有𦂳急延綏官軍調去城堡空虚地方有警聴各該鎮巡官行臣處相機調發前去䇿應前項官軍缺少馬匹於各監苑補賠倒失虧欠兒扇馬内給領不必照依各鎮搶兌以致損此益彼兩相妨碍以後如果各處地方寜息秋夏時月將官軍放回原衛休息遇冬徴調聴用永為定規不必暫設亟罷使人懷茍簡事無成效若任非其人訪有貪汚怯懦實跡巡撫巡按官指實劾奏革退别選相應之人代補及照固原地方最為要害守備官員不可暫時缺人如臣言可采陳善果蒙委用就乞於陜西武臣曾經舉保堪用官員内推選一員代替守備庶㡬地方有託緩急不至悞事等因具本該通政使司官奏奉聖㫖兵部知道欽此欽遵抄出送司查得陜西固原等處逰擊先該巡按陜西監察御史季春奏稱官多人擾本部巳經依擬奏革續該寜夏鎮巡等官奏要將革退逰兵照舊設官統領以備内外策應本部又經議奏行令查勘去後看得巡撫陜西都御史楊一清奏稱勘報前項逰擊將軍應該復設縁由所言地方利害興廢始末議論詳悉事體明白及處置該集逰兵該用領兵將官俱各停當况今寜夏見報邊情𦂳急用人預備合無准其所奏請勅原擬都指揮僉事陳善充逰擊將軍名目統領前項逰兵三千員名専在環慶固靖等處往來截殺仍聴鎮巡官員節制調度此後尤須守法奉公正巳率下慎終如始以副委任合用符驗旗牌照例請給差人䝴去本官應用其固原地方今既擬令鎮守武臣常在彼處駐劄所據陳善守備員缺不必再補合止行令都御史楊一清徑自照例選委堪用都指揮或指揮一員在彼備禦縁係添設逰擊官員及奉欽依兵部知道事理未敢擅便𢎞治十八年十月初八日本部尚書劉大夏等具題本月初九日奉聖㫖是欽此欽遵擬合通行除外合咨前去煩照本部題奉欽依内事理欽遵施行一為傳報聲息預防邊患事兵部覆該本部送於兵科抄出巡撫陜西等處地方兼督理馬政都察院左副都御史楊一清題據暫署守備蘭州地方蘭州衛指揮僉事陳松呈云云等因節呈到臣照得鎮守太監劉雲武安侯鄭英俱在陜城臣看得蘭州地方自本年五月十一日以來傳報荘浪紅城子炮火柴堆聲息絡繹不絶訪得敵衆俱在荘浪後山伏同兒水彬草溝等處劄營節次入境搶掠因是近來荘浪人馬寡少動輒失利以此彼勢愈張我威愈挫况與蘭州壤地相接無關隘溝墻之限荘浪既巳被搶蕭索虎狼無厭之欲必將窺伺蘭州已將原奏留甘蘭二衛官軍李勤等摘撥分布河北地方東路鹽場堡西路􅌯子坪二處按伏防守遇警截殺但􅌯子坪舊無城堡鹽場雖有舊堡不曽修盖房舍不堪屯軍又經行令兵備守備等官量起本處軍民人夫築打􅌯子坪城堡一座及於鹽場堡修盖官㕔營房以便官軍屯住及又遵照節該欽奉隨宜斟酌調度成命行委都指揮黄正管領洮岷臨河等衛官軍一千員名前去莊浪暫聴分守㕘將蘇泰調遣殺敵指揮郭遡督率所領土兵亦於蘭州駐劄隨其聲勢所向往來應援外縁荘浪雖係甘肅所轄而與陜西腹裏聲勢相倚臣實不敢顧此失彼但往年荘浪紅城子力足捍禦北人不敢越境南侵則蘭州似為腹裏今荘浪巳不能支衆刼肆行剽剠無忌根本喉襟之地所繫尤重若彼窺覘糾結日久不退則陜西官軍急當内防勢恐不能分兵外援且秋冬將臨北方大衆難保再不入套前項郭遡黄正所領軍馬乃固原環慶𦂳關禦敵之數又當先期掣回休息養其鋭氣以挫敵鋒臣又切思荘浪之人横遭兵禍巳非一日訪得前項敵衆初本不多近來鳩集醜𩔖日漸繁夥恒在荘浪涼州地方明水湖等處住牧假我逋降為之鄉導不時突出鈔掠聲東擊西倐來忽去委的難以隄防其勢非大遭挫衂則不肯逺遁將來勾引羌戎寜夏陜西二鎮皆受其毒不止荘浪之害而已夫田中之禽利用搏執聖王所不得巳如蒙乞勅該部詳擬合無行甘肅鎮巡等官行令逰擊率領所統逰兵或再推驍勇都指揮一二員摘發甘州各衛招募土兵舍餘軍餘等項二三千名前來荘浪紅城子協同㕘將等官戰守以紓地方目前之急其陜西發去官軍取回固原環慶等處以備北人入套之謀再乞預行寜夏甘肅陜西守臣密切㑹議若是今冬寧謐不入河套明年春二三月草枯馬弱之時遣人哨探住牧處所的確諸鎮各選精兵甘肅官軍自荘浪涼州分道並進以殺其勢寜夏軍馬出其後背以邀其歸陜西官軍自蘭州掎角而入以防其衝突必痛加誅𠞰以洩數年兵民之憤一勞永佚計無出此舍是弗圗因循玩愒茍度嵗時如養癰疽不施鍼砭使其日漸潰蝕雖有知者不能善其後矣此事重大必仗廟堂成算詢謀僉同乃可舉動愚臣一人之言豈可自以為是但承乏經畧調度之任有所見聞不敢自黙等因具本該通政使司官奏奉聖㫖該部知道欽此欽遵抄出送司案查先為敵衆擁衆犯邊缺兵戰守事該分守荘浪地方左㕘將蘇泰奏稱敵衆節次犯邊兵力寡少乞要增兵戰守等因本部已經議擬題奉欽依備行陜西鎮巡官將聲息少緩地方或附近各衛官軍内輳撥精壮一千員名委官管領前去荘浪聽調殺敵指揮郭遡原管土兵一千員名領去蘭州地方駐劄以便荘浪固原兩處䇿應續該巡撫甘肅等處地方右副都御史畢亨奏為易將官以安邊境事該本部議擬題准將副總兵把琮改調荘浪逰擊將軍徐謙帶領所部逰兵常在莊浪駐劄聴把琮調用俱經通行去後今該前因案呈到部看得都御史楊一清所奏極言河西敵衆屢為荘浪之害又慮冬臨河套入寇固原環慶所當戒嚴計處各鎮分設防禦之兵甚為得策除逰擊將軍徐謙領兵荘浪駐劄已有前議外合無依其所擬本部一面鋪馬䝴文與都御史楊一清徑將所屬郭遡等原領蘭州等處䇿應軍馬掣囘聴其調用一面䝴文甘肅鎮巡等官查調各衛招募土兵舍餘二三千推委謀勇都指揮一二員帶領前往荘浪紅城子等處隨同副總兵把琮等防禦中間事宜或有未盡未允亦要從長議處以固地方其稱今冬寧謐不入河套欲候明春草枯馬弱之時密㑹三鎮誅𠞰明水湖等處積年犯邊之敵尤見經畧深逺但事干重大難以遥度而甘肅寜夏二鎮守臣未經謀議恐亦各有所見况掩襲境外之敵必須兵馬加倍精强將帥謀勇兼濟方能措手一或言動欠密事機先露恐難成功合無仍行陜西并甘肅寜夏鎮巡等官密切移文㑹議從長再加斟酌如果此舉有利無害詢謀僉同時勢可乗不貽後艱㑹同奏報相機舉行務要計出萬全以期克捷如果事有異同難便輕舉或别有安邊良策亦要明白囘奏縁係守臣建言邊務及奉欽依該部知道事理未敢擅便𢎞治十八年十一月十二日本部尚書劉大夏等具題本月十三日奉聖㫖是欽此欽遵擬合通行除外合咨前去煩照本部題奉欽依内事理欽遵施行一為急缺領軍官員事兵部覆該本部送於兵科抄出巡撫陜西地方兼督理馬政都察院左副都御史楊一清題臣受命經畧巡撫節奉欽依或廣收人物以資其方畧或重懸爵賞以鼓舞人心等因備咨前來為照禦戎莫急於練兵練兵莫先於選將將非其人兵雖衆不足恃將得其人怯可化勇弱可化强廣收人物誠備邊第一義也况今北人得志而驕冬深難保不入河套近日環慶地方節次傳報炮火聲息防禦不可不嚴陜西各該守備將官皆新任可用但各有信地難以摘撥至於管領備冬官軍及召募土兵民壯等項調遣委用不可缺人本處都指揮把總指揮等官才局雖有可觀多是不曾經戰倘或敵衆大舉侵犯使之衝鋒破敵恐未必能近該臣奏保緣事都指揮烏銘充軍指揮楊宏荷蒙皇上湔洗楊宏重罪止䧏二級聴臣隨宜委用天地再造之恩凡為武臣孰不感激思奮但烏銘兵部題稱已經奏取赴京難又别為定奪及又博訪得先任花馬池㕘將西安後衛指揮馬隆蘭州衛指揮同知楊義俱各熟閑戎務諳曉邊情先年慣經戰陣比之新進未試者不同亦該本部奏取京營領軍去訖且京營領軍所係尤重臣何敢以一方之事致妨天下大計但京師人材所聚如烏銘輩必多大同宣府聲息巳寜陜西之患方自兹始况此三人用之陜西則地利素知人心素服不違其材可責其効若領京營士馬恐亦無以逾人伏望聖明垂念關中三邊根本之地防禦事重用人為急乞勅兵部合無將烏銘馬隆楊義三人仍發囘陜西聴臣隨宜委用統領備冬官軍及土兵召募義勇民壯等項併力𠞰殺或分守要害或策應各邊有功具奏推陞誤事責不輕貸待後陜西地方寜靖大同宣府聲息𦂳急京營領軍缺官該部移文行取仍督發前去應用等因具本該通政使司官奏奉聖㫖兵部知道欽此欽遵抄出送司查得先為軍務事該巡撫陜西都御史楊一清奏奉欽依事理咨送馬隆等前來又該本部議擬題奉欽依將馬隆楊義俱陞署都指揮僉事與烏銘協贊鼓勇等營去後今該前因案呈到部看得都御史楊一清題稱要將烏銘馬隆楊義發囘陜西聴其委用統領備冬官軍及土兵等項堵截𠞰殺待後京營領軍缺官仍督發前來應用一節照得烏銘等先因宣大二鎮聲息𦂳急故將各官取來聴候領兵即今二鎮稍寜况陜西地方目今河凍正係敵衆侵犯之時用人尤為𦂳急相應准其所奏除數内馬隆巳該本部題奉欽依充四川㕘將協守松潘地方去訖所據烏銘楊義合無着令馳驛前去都御史楊一清處聴調領兵若後京營要用另行具奏行取各官務要竭忠奮勇圖立後功以副舉用之意緣係奏討領軍官員及奉欽依兵部知道事理未敢擅便𢎞治十八年十一月二十二日本部尚書劉大夏等具題本月二十二日奉聖㫖是欽此欽遵擬合通行除外合咨前去煩照本部題奉欽依内事理欽遵施行一為預防邊患以保固地方事兵部覆該本部送於兵科抄出巡撫陜西等處地方兼督理馬政都察院左副都御史楊一清題近准巡撫寜夏地方本院右僉都御史劉憲咨為大敵入套請兵防禦事𢎞治十八年八月二十九日據畨中走囘男子賈羊羔兒供係山丹新河人失記衛所年月日七八嵗時被小王子部落頭兒巴罕搶去邊外牧放牛羊一十三年見在賀蘭山後駐劄近聴得夥裏衆人説稱俱往迤北迎接小王子到來本日又據套内迤北石嘴兒墩暖泉兒墩夜不收王文奴等報稱本日已時瞭見河西相離黑山營四十里地名野馬川等處敵衆下營人馬不計其數帳窠牛羊遍野内有三百餘騎前來河邊住立吹觱篥一聲向東觀望頓飯時回營去訖本年九月初四日又據石嘴兒墩夜不收王玉等報本月初三日辰時瞭見敵人五騎在於套内到於墩邊荅話不應顯是前項大敵浮水渡河入套等因前來㑹同鎮守太監葛全總兵官署督僉事李祥議看得前項敵衆訪是小王子人馬在大同搶回意欲過套入攻先是走回男子賈羊羔兒報稱山後衆人前去迎接小王子次據夜不收王文奴等報稱瞭見河西敵衆不計其數内有三百餘騎前來看河今夜不收王玉等又報瞭見敵衆五騎巳過套内事果不虚五騎既已過河誠恐醜𩔖源源而來大舉入寇旦夕難保若不請兵策應防範慮恐臨期難便除具題外擬合通行知㑹等因備咨前來續據守備環慶等處地方署都指揮僉事姚震呈為傳報烽火事𢎞治十八年九月十四日酉時據原差花馬池探聴聲息夜不收魏玉供報本月十二日夜三更時分有花馬池夜不收張外頭報稱煖泉墩石嘴兒墩各舉火六把行間本月十六日辰時據環縣城西西河墩守瞭小甲王友走報本時瞭見永河墩舉煙三把十七日又據西河墩小甲王友報火六把又據本官呈前事𢎞治十八年九月二十七日巳時據環縣城西西河墩守瞭小甲王友走報稱沈家山墩小甲唐仲義傳報火三把煙三把等因節呈到臣照得鎮守陜西太監劉雲武安侯鄭英俱在陜城鄭英見今患病不出除移文知㑹外看得巡撫寜夏都御史劉憲咨稱前項邊情係供報之言固難盡信但環慶地方巳有傳舉境外煙火必是此敵將謀入邊先遣輕騎浮渡黄河潛入套中瞰彼窩巢覘我虚實踵襲故智侵犯邊境無厭之欲誠難窺測先事之防不可不謹切詳敵兵去年侵掠陜西今當皇上龍飛御極之初乃敢侵我宣府擾我大同戕賊我士馬魚肉我生民貪得無厭何所底止若再擁衆内侵鼓我積憤之兵乗彼既驕之勢何戰不克何向不前顧部落結聚動稱數萬我邊地里寛漫分兵而守無所不寡以十當百似難急嬰其鋒惟在嚴封疆守要害明斥􅕤謹禁防以佚待勞俟機而動延寜二鎮邊備各該守臣必能先事經理陜西固靖環慶地方先該總制尚書秦紘修築邊塹一道甚於保障有益所患墩堡稀疎聲援隔絶故副總兵曹雄有固原之墻不如無墻之論臣今近墻設墩傍險增堡聲勢相接况填塞溝塹坍塌邊墻次第修補粗皆就緒至於分布人馬使守要害招集土人使自為戰不敢漫易以速罪尤但當久玩極弊之餘人馬寡少又復不精語及戰功臣實不敢自保然而形勢戰守得失利害之機亦嘗籌度寜夏花馬池興武營直抵髙橋三百餘里地方在北是為侵我邊境之門户陜西環慶固原直抵靖邊七百餘里地方在南是為入我腹裏之門户中有山城萌城石溝鹽池韋州等處乃敵兵出没經由之道路然彼之所入雖由寜夏而其所利實在腹裏寜夏邊墻如能捍禦則腹裏可安枕而臥稽今事勢恐未必能倘一旦拆墻而入必以精騎守所入之路綴我官兵使不敢南則腹裏安危所係至重其故不可不講也敵既深入剽掠方張之勢恐非陜西官軍所能當藉諸邊鎮逰兵協力捍禦庶免生民荼毒然欲成克捷之功必在乗其既弊而於中路擊之為便查得臣節該欽奉勅諭倘或事情𦂳急延寜荘涼逰兵俱聴爾調用欽此欽遵及照延綏㕘將王㦸所領土兵二千員名亦係兵部題准聴臣調用之數但寜夏逰兵僅能自守荘涼逰兵彼處四時有警在在乏兵恐難摘調緩急所倚惟延綏逰竒兵㕘將王㦸土兵應援之力臣雖奉有成命竊恐諸鎮官軍各有統屬不即聴調悞事非輕且今西安等府旱災至甚流徙在途萬一時勢危急邊城失守盜賊乗隙而起根本動搖誠非細故况延寜逰竒兵調去大同未回近聞彼處聲息巳寜若不早為掣取直待寇至門庭方纔移文往來之間動經旬月委的緩不及事如蒙乞勅該部計議合無鋪馬䝴文行令延綏副總兵曹雄逰擊將軍羌漢㕘將王㦸作急將所領官軍掣回曹雄竒兵暫於定邊營駐劄以便延寜兩邊策應羌漢逰兵王㦸土兵於花馬池興武營等處按伏如果敵衆入套擁衆近邊與寜夏副總兵衛勇㕘將霍忠恊同保勣靈州守備焦洪并都指揮韓斌等人馬併力捍禦保固邊墻不令入境寜夏總兵官李祥統領人馬過河暫於靈州駐劄以便河南調度陜西亦選逰兵三千員名暫於韋州按伏以為聲援且以防今冬山後乗凍渡河侵犯之謀若是聲勢重大力不能支拆墻入境勢必侵犯腹裏陜西逰兵即當掣回豫旺城防禦延綏逰兵土兵聴臣臨期相機調取應援亦在保固邊墻不令拆入彼進不得逞居無所獲不乆亦將自退若不能阻遏長驅而入勢必分散我軍堅壁清野據險以乗之伺便以圖之縱無大得亦無大失仍先以曹雄李祥衛勇姜漢等各枝精兵分布中路山城萌城石溝鹽池紅寺兒韋州一帶城堡按伏秣馬藏鋒蓄鋭多遣乖覺夜不收逺為哨探彼既深入日久人馬疲敝計其歸途必出前路陜西將官統領官軍徐躡其後毋逼而追待入我彀諸路之兵併起而夾擊之陜西官軍奮而逐之或邀其中或截其尾胸背受敵必敗之道獻俘折馘大功可期計不出此而欲於拆墻之處邀其歸路其勢復合其援亦近成敗利鈍非臣所知再照暫留荘浪左副總兵魯麟驍勇慣戰歴練老成所統土兵畨人素所畏服先年腹裏有警亦曾調用乞勅本官整㮶人馬倘或事情𦂳急聴臣移文調來固原環慶等處與陜西將官協力戰守以壯兵勢以繫人心此臣一得之愚敢用預陳以備采擇乞下陜西延寜諸鎮將官㕘酌行之隨機應變又在各官仍乞速行曹雄姜漢王㦸等各以腹裏根本為重遇調慎勿延緩以失事機等因具本該通政使司官奏奉聖㫖兵部知道欽此遵欽抄出送司查該先為守邊防患地方等事該協同鎮守甘肅左副總兵魯麟奏稱統兵前往寜夏等處截殺得患痢疾况伊男年幼管下土人家口缺人鈐束乞要暫留在家教訓伊男管束土人家口本部議擬題奉孝宗皇帝聖㫖是魯麟准留荘浪撫管土人寫勅與他欽此續為易將官以安邊境事該巡撫甘肅都御史畢亨題稱左副總兵魯麟父祖以來世守荘浪畨人素所畏憚今雖養病在家尚能發縱指示乞要請勅本官今後遇有敵衆侵犯務要運謀設䇿併力𠞰殺等因該部議擬具題奉聖㫖是欽此節經請勅本官欽遵外近為大敵入套請兵防禦事該寜夏鎮巡官太監葛全等題稱大同地方寇巳寜息要乞行令本鎮副總兵衛勇延綏副總兵曹雄逰擊將軍姜漢㕘將王㦸各將前項逰竒等官人馬火速兼程前來花馬池等處併同本鎮人馬布置按伏相機截殺巳該本部議得合無鋪馬䝴文與寜夏太監葛全總兵官李祥都御史劉憲一面選差乖覺夜不收逺為哨探一面嚴督副總兵衛勇㕘將霍忠協同保勣守備焦洪都指揮韓斌等各要用心設策整㮶人馬隨宜按伏以逸待勞本部仍行延綏守臣令㕘將王㦸統領土兵前往花馬池逰擊將軍姜漢統領逰兵前往定邊營曹雄統領竒兵前往寜塞營各要星馳前去秣馬按伏聴候有警併力截殺乃行陜西巡撫都御史楊一清公同固原新任鎮守將官斟酌形勢計議方畧分布腹裏人馬據要防禦督調本處逰兵相機策應等因具題奉聖㫖是欽此又經通行各該鎮巡官欽遵去後今該前因案呈到部看得巡撫都御史楊一清歴究陜西寜夏地方之要各鎮官軍戰守之宜及指陳乗敝邀擊之利論議反復籌度周悉除延綏逰竒官軍與寜夏副總兵衛勇等所領人馬巳該本部題奉欽依通行各該地方戰守亦與本官前項議奏之意大畧相符所據慮恐諸鎮官軍各有統屬不聴調遣合無行移延綏鎮巡等官轉行副總兵逰竒等查照先今事理如果敵巳西行本鎮别無聲息陜西來調兵馬即便依期前去分布防守不許遲延誤事自取罪尤仍通行陜西延綏寜夏鎮巡等官俱要協心運謀相機而動務使功成萬全事無一失圖免陜西腹裏之害用紓皇上西顧之憂毋得秦越自分坐觀成敗以孤委任其稱荘浪左副總兵魯麟慣戰老成邊人畏服先年有警亦曽調用乞要請勅本官整㮶人馬遇警調來固原環慶等處與陜西將官協力戰守一節尤為有見盖魯麟久在邊方委實謀勇頗優於衆今病痊可相應責成合無本部鋪馬䝴文與都御史楊一清轉行左副總兵魯麟將所領土兵嚴加操練固守地方若遇固原環慶有警即聴都御史楊一清移文調用大功有成陞賞不吝不許託故偷安以負朝廷世寵之恩縁係巡撫官員奏處防守邊務及奉欽依兵部知道事理未敢擅便𢎞治十八年十一月二十四日本部尚書劉大夏等具題本月二十五日奉聖㫖是便行與各官着用心協力相機防禦不許自分彼此致誤事機欽此欽遵擬合通行除外合咨前去煩照本部題奉欽依内事理欽遵施行一為預防邊患事兵部覆該巡撫陜西等處地方兼督理馬政都察院左副都御史楊一清題准兵部咨該協守延綏等處地方副總兵都指揮僉事曹雄題稱陜西固原等處近來修築邊塹一道南離固原二百五十里北離花馬池四百餘里敵經花馬池之空深入任其掏穵通不知覺向使固靖地方有久守之將則戎馬之入何以似蹈無人之地為今之計合無固靖環蘭等處添設副總兵一員提督操練有警臨鞏秦平官軍悉聴調遣黄河將凍時月收歛人畜肅清郊野分兵要害秣馬蓄鋭以待敵至萬一邊敵復來侵犯或乗其分散或邀其歸路其陜西鎮守將臣精選在城有馬官軍前來以為聲援如此則戰守兩備責任專一緩急有濟等因具本奏奉孝宗皇帝聖㫖兵部看了來説欽此欽遵該本部覆奏行巡撫陜西都御史楊一清㑹同巡按監察御史從公計議陜西鎮守將官每年冬初例該前去固原等處防守今若於固靖環蘭等處添設副總兵一員必得練達邊務曽經戰陣者常川在彼委的有益但省城鎮守將官遇冬所理何事必須何以處之斯於事體穏便經久可行務在議處停當㑹奏前來以慿上請定奪等因題奉聖㫖是着議處停當來説欽此欽遵備咨到臣㑹同巡按監察御史季春從公計議看得陜西固原環慶靖邊蘭州皆𦂳關要害之地固原土漢雜處内有監牧馬匹所係尤重河套有警寜夏邊墻失守則固原環慶最先受害近來山後殘敵河凍時月多從寜夏中衛鳴沙州一帶踏冰而入竊伏螺山等處鈔掠固靖突來忽去不止河套為當隄防至於蘭州河北一帶節被荘浪明水湖潛住諸番與山後之敵無分春夏不時侵擾又不止河凍為當備禦比者各該地方戰守之具名存實亡守備等官權任輕㣲莫能自展各有信地不相應援陜西鎮守將官遇冬至十一二月方纔提兵西向不過月餘河冰消釋即便掣囘與調來客兵無異山川之險夷關隘之虚實將領之勇怯士卒之强弱茫不與知上下相安因循度日邊備不嚴兵威不振職此之由今聲勢猖獗大非昔比萬一不肯悔過逺遁糾合部黨長驅深入則内郡繹騷根本動搖不止邊民受害而已若得常守之將駐劄固原提督操練各路人馬遇警分兵要害調遣應援截殺委的責任專一曹雄所言盖亦有見其要添設副總兵一員不無官多人擾况人馬有限添官雖多何補於事且既設副總兵提督調兵則主將徒擁虚名置之無用亦恐未宜若將陜西鎮守將官移來固原駐劄則官不加多事為有濟長久利便之策宜無過此議者或謂陜西鎮守之設兼防南山羣盜然陜城巳有鎮守太監巡撫巡按都布按三司又兼撫治巡守等官平時自足防制果有盜賊竊發將官東還不妨𠞰捕但任法不若任人安内乃可攘外使任非其人反生厲階致招後議竊見鎮守陜西武安侯鄭英在鎮年深近又自稱患病日久不出見今寜夏已有傳報聲息倘或邊衆擁衆侵犯本官委的不堪征戰誤事非輕必須更易相應將官鎮守緩急方可倚仗如䝉乞勅兵部計議上請合無將武安侯鄭英行取囘京别推京營都督或邊鎮將官亷靜不擾練達戎務曽經戰陣一員鎮守陜西等處地方常川固原駐劄提調防守遇警往來各邊統率官軍𠞰殺堵截外壯兵勢内繫人心實為便益當此久玩極弊之餘正易轍改絃之日伏望聖明軫念關中重地一方兵民不宜重遭荼毒早賜施行等因與巡按監察御史各具本該通政使司官奏奉聖㫖兵部知道欽此欽遵通抄送司查得先為預防邊患事該延綏副總兵曹雄奏稱固原邊墻曠逺要於固靖環蘭等處添設副總兵提督操練本部議行巡撫都御史楊一清㑹同巡按御史從公計議固靖環蘭等處添設副總兵一員常川在彼委的有益務在議處停當㑹奏前來以慿上請定奪等因題奉聖㫖是着議處停當來説欽此巳行欽遵去後續為易置主將以保固地方事該都御史楊一清奏稱陜西地方軍務廢弛要將武安侯鄭英行取回京别推驍勇將官一員前去更替鎮守陜西地方專在固原駐劄等因前來本部依擬將本官奏内薦舉都督等官楊玉等四員具題奉聖㫖是曹雄陞署都督僉事鎮守陜西地方欽此已行欽遵去後今該前因案呈到部看得各官所奏固原等處地方添設副總兵一員不無官多人擾若將鎮守將官常川固原駐劄則官不加多事為有濟一節既查有本部前項題奉欽依鎮守官員常在固原駐劄事理别無定奪擬合通行除外合咨前去煩為查照施行一為急處救荒事户部覆該本部等衙門㑹題於户科抄出欽差巡撫陜西等處地方兼督理馬政都察院左副都御史楊一清題前事准户部咨該陜西鎮巡等官題切照陜西地方接連邊境糧草徭役比之他處實為浩繁兹者又遇前項蟲旱等灾米價騰貴人民流移誠為可憫難以照常勘處合無不為常例本部移咨都察院轉行巡按陜西監察御史公同都布按三司守巡管糧官嚴督府衛州縣掌印官一面將被灾地畝從公覈實一面將該免錢糧照依分數先行除豁仍將除豁過田地税糧等項有收無收分數各備造文册奏繳仍造清冊一本送部查考本部再行巡撫都御史督同守巡管糧等官嚴督府衛州縣各該官員查勘缺食軍民先儘見在預備倉糧按月放支賑濟如有不敷就將該庫收有見在銀兩等件設法糴買米糓作急賑濟務使人沾實恵事有成效此外别有救荒事宜徑自區處施行事體重大者作急具奏定奪等因具題奉聖㫖是陜西灾傷重大着楊一清好生設法賑濟毋致失所欽此欽遵備咨到臣查得陜西灾傷地方西安府為甚延安府次之慶陽鳯翔二府又次之其餘平漢臨鞏等府雖間有旱雹等灾分數不多但西安一府財賦供億實當七府之半西安府告荒雖七郡全收不足以補况延慶邊郡亦復有灾他府稍登僅能自給巳將被灾地方應該分豁減免税糧縁由節次具題及行委分巡分守等官各帶領府佐能幹官員分投徧歴所屬州縣先將極貧人户今冬開倉驗口給糧賑濟次貧人户明春一體賑濟如倉糧不敷聴將官銀折放去後兹者仰荷聖慈該免税糧准行巡按御史覈實除豁天語叮嚀又以設法賑濟責成愚臣惟恐斯民失所古帝王之用心不是過也顧臣撫巡無狀不能導引和氣以厪宵旰之憂若又不能仰承明詔講求賑濟方畧坐視溝壑轉徙而莫之救其罪安可逃哉查得各該州縣預備倉糧多者不過萬餘石少則三二千石甚至止有數百石陜西布政司查報在庫官銀八萬三千餘兩俱該供邊并折支俸糧布花之數尚恐不敷亦難動支糴買糧米夫以堂堂巨省而倉庫空虚至此臣晝夜思之寢食俱廢竊惟救荒以賑濟為先以儲蓄爲本陜西地方關山環峙舟楫不通重以供給三邊賦役繁重故一年之收僅足以周一年之用加以頻年兵荒瘡痍未復卒遇久旱遂成大饑閭里蕭條逃亡接踵盜賊間起剽掠潛行困敝艱難莫可名狀又恐春夏之交米價益貴民食愈難官廩既空官銀莫措餓夫張口以待哺官司束手而無施民窮盜起勢所必至若麥秋有望猶可支持萬一套衆不出二麥不登賑濟轉輸兩無所賴公私告急内外俱困倉皇狼狽何可勝言臣又竊思陜西成化十九二十年間旱荒彼時承平之餘倉庫有積又無邊患尚且賑貸不敷餓莩填渠人至相食後䝉憲宗皇帝准開救荒事例措置銀糧甚多又將江南漕運糧米數十萬石差官由漢江及河南地方二路轉運移民就食賴以全活而死徙之民巳不可救户口耗彫至今未復今公私匱乏既非昔比邊疆騷擾又昔所無若明年嵗果不登將來事變豈直如成化年間而已及今多方區處尚為臨事有備然糴買既苦於無資開例復拘於犯禁安能忍心坐貽後悔行據陜西布按二司左布政使栁應辰右布政使羅鑒按察使謝罃等㑹同將議處區畫錢糧及停免追徴等項事宜開呈前來臣㕘酌衆論之中求濟一時之急敢用昧死上陳伏望聖明省覽乞勅該部大臣㕘詳可否議擬上請早為施行庶㡬續民命於垂絶奠疆土於無虞關陜安則天下安京師安實宗社萬億年無疆之休也臣不勝激切俟命之至等因題奉聖㫖户部知道欽此欽遵抄出送司案呈到部看得都御史楊一清題稱陜西西安等府地方荒歉太甚人民饑窘條陳區畫救荒八事要行㕘詳可否議擬上請早為施行一節縁前項事情重大多係别衙門掌行本部難擅定擬合無㑹同五府六部都察院通政司大理寺堂上官并六科十三道掌科掌道官公同議處上請定奪本年正月十六日具題次日奉聖㫖是欽此欽遵㑹同太師兼太子太師英國公張懋少師兼太子太師吏部尚書馬文升等議得關陜地方外隣强敵内困供億比年邊鄙多警民不聊生官司庫廩在在空竭徭役科派處處疲弊加以年穀不登赤野千里目今外寇深入大肆搶掠夫以窮迫垂死之民遇此兵荒相仍之嵗人心搖動他變必作正當先事而慮庶㡬保無後愆都御史楊一清身歴目覩心切憂勞條陳數事乞早施行言雖急迫事實可采昔人謂救荒莫如備荒盖以此耳臣等切思天人一理相為流通灾祥感召捷於影響揆厥亢旱之由實由乖氣所致况關陜喉襟重地尢當加意撫䘏大布恵澤以救倒懸之厄用消意外之虞奈何國家多事帑藏虚耗生財之源既塞而不行軍需之費多缺而不繼近者各邊賞賜尚欠大半其宣大二鎮奏討糴買糧草銀兩極力措辦不及三分之一言及於此良可寒心臣等伏覩累朝以來公私匱乏未有甚於此時者也今將本官原擬八事酌處上請伏望聖慈軫念生民俯賜鑒納崇實徳以消天變守清儉以裕國用臣等不勝惓惓憂畏激切之至縁係㑹議急處救荒事理未敢擅便正徳元年正月二十五日本部尚書韓文等具題本月二十九日奉聖㫖是陜西邊方灾傷重大賑濟為急這議處事宜都准行鹽法你每再議來説欽此欽遵擬合通行為此除外合咨前去煩照本部題奉欽依内事理欽遵施行闗中奏議巻五
