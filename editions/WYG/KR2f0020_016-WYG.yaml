body:
  text: 闗中奏議巻十六明楊一清撰提督𩔖一為更易極邊地方將官事欽差提督陜西三邊都御史臣楊一清謹題為更易極邊地方將官事照得寧夏興武營逼臨河套東接花馬池西接清水營乃敵人出沒要衝之地舊例設有協同分守將官一員奉勑在彼駐劄操練軍馬防禦邊敵責任頗重見任協同署都指揮僉事吳雲初本驍徤官員近於嘉靖三年内為因設備欠嚴致敵拆墻入境搶去官馬數多該寧夏廵撫官㕘劾未見處分以此心志隳廢號令不行臣近日廵邊到彼親自閱視軍多逃竄馬皆瘦損一切邊務廢弛殊甚臣公同鎮廵官員都御史林琦總兵官杭雄等議得極邊要害地方而使隳心喪志之人久叨將領見今河套情形難測萬一侵犯深入不無誤事必得急為更易將官一員庶可倚託博訪得延綏榆林城把總都指揮僉事閻武先任河州守備革回榆林衛指揮使梁震俱各閑於武藝熟於邊情屢經戰陣謀勇可取相應舉用如䝉乞勑兵部再為查訪合無將吳雲暫令回還原衛聴候待勘問事完有無干碍另為定奪仍乞於閻武梁震内推用一員請勑協同分守寧夏東路興武營地方如此則政令一新精采自倍而邊城可保無虞矣縁係更易極邊將官事理未敢擅便為此具本謹題請㫖一為禁約妖人邪術扇惑愚民貽患地方事題為禁約妖人邪術扇惑愚民貽患地方事訪得西安鳯翔延安漢中等府地方多有山西等處流來人民呼為端公居士等項名目持齋誦經禳脩善事内懐姦惡妄稱白蓮教宣明教挾持神像播弄幻術揑造妖言專以禍福利害恐動人民城市鄉村愚夫愚婦翕然信之延請供奉無所不至資以財帛結為婚姻嵗時開社招集逺近之人百十為羣夜聚曉散扇惑人心官司明知不行禁約以致承訛襲舛逺近效尤正德年間洛川之變動調官軍多被殺傷雖旋即就擒而所損巳多近日樊紳之禍曾經舉首州官不敢緝挐上司雖知亦不早為根究襲捕及其率衆攻城相顧駭愕移文告急既而羣衆潰散却又相率論功向使禁之於初撲之於早豈至陷百數十愚民於必死之地官府亦免芻糧犒賞之費矣顧樊紳數人之外其所紏聚多係村野白丁信其誑誘實無技能此風不行禁革將來邪說蔓延南山一帯姦黠獷戾之徒倚山附峒乘之為亂其患不止如樊紳而已伏覩大明律一欵凡師巫假降邪神書符呪水扶鸞禱聖自號端公太保師婆及妄稱彌勒佛白蓮社明尊教白雲宗等㑹一應左道亂正之術或隠藏圖像燒香集衆夜聚曉散禳脩善事扇惑人民為首者絞為從者各杖一百流三千里若軍民粧扮神像鳴鑼擊鼓迎神賽㑹者杖一百罪坐為首之人里長知而不首者各笞四十其民間春秋義社不在此限欽此國家之禁令甚明臣下之奉行未至豈獨貽患地方亦且有累風化夫智者防患於未形達人識變於㣲眇星星不已至於燎原毫釐不伐至用斧柯而無所及但此輩鳩集既廣愚民蔽固巳深一旦重法繩之獲罪者衆矣臣愚伏望聖明裁處勑下該衙門查照律令及見行事例備行陜西廵撫廵按着落都布按三司掌印廵守等官刋印榜文發仰所屬各府州縣張掛曉諭但有似前各處流來端公居士妄稱白蓮宣明等教挾持邪術掜造妖言收藏神像圖籍扇惑人心者榜文張掛之後限一箇月以裏聽其自相解散各回原籍寧家生理一切軍民之家不許容留居住若限外仍舊濳住行教惑人許隣佑里老地方總小甲挐送首官并容留之家傳習之人俱依律究治隣佑里老地方總小甲知而不首各該廵捕官兵人役訪挐一體連坐該管府衛州縣官員視常不理聴廵守官應挐應㕘徑自施行甚則以罷軟官撫按衙門具奏黜退如此庶可以杜將來之亂階消未然之隠禍以正人心厚風俗於治道實有補益再照此等邪事惟士大夫生儒之家多不聽信毎有鳴諸官府者亦有因而得禍者坐視隠忍不敢聲言合無行令提學官員廵視學校之時延訪舉人監生槩學生員如境内有前項妖人邪術踵惡未悛許其直言呈禀提學官就行責令所司緝挐究問庶得其真而邪說可息矣其民間春秋義社照舊舉行不許廵禁人役縁此妄挐擾害如違一體查究治罪緣係禁約妖人邪術扇惑愚民貽患地方事理未敢擅便為此具本順差承差馮逺親齎謹題請㫖一為反獄事題為反獄事嘉靖四年十一月二十九日據陜西按察司呈准本司署印副使張宏闗稱嘉靖四年九月内捉獲逆賊樊紳等一百四十三名口公同都布二司掌印官㑹問明白通行呈詳奏請發落因見事干反逆惟恐踈虞倣效刑部式様做成木籠一十二箇將各犯分置其中又用㭱牀滚肚腦鞦肘鐐凡可治囚死命者無不用心毎日下監躬親㸃閲日取獄卒官吏不致疎虞重甘結狀在巻至十一月十七日又親下監㸃視停當分付毎放風一遭止許二名放畢㭱上再放二名叮嚀再三回堂理事本日申時分據本司廵風吏周鎮禀稱有司獄史高獄典侯仲先及獄卒雷厚等放風將樊紳楊朴張合李儒張萬良樊綬樊緯一籠七名一時放風被樊紳楊朴等將别起重犯魏剛周鸞任九子李鎮圓惠等肘鐐磕打脫卸各執骨朶將史髙并禁子張成謝端穆直惠泰王佐閻保彭隆打倒在内侯仲先被傷奔走亦來告禀夲職當時鳴鼓召集闔司吏農承差門𨽻家衆人等各執噐械急去邀捕正遇羣賊將禁子趕打内一賊已出監門本職親督皂𨽻劉江等亂棍打死斬首以滅餘賊不敢出監隨喚本司門前防䕶官軍見在止有軍人四名張得山張濟甫王回兒王來與同各役入監撲捕進入二門至吞口門被賊衆衝突前來將軍人張得山等俱打傷重奪去弓箭一副刀二把遂將皂𨽻王連射訖一箭各役亦不得入賊衆亦不能出本職慮恐突出隨令各役掀揭壓堦石頭將吞口門壘砌牢固及分投差人走報鎮廵衙門督令該道守廵及調陜西都司西安左等四衛咸長二縣官軍民快地方人等各執噐械在於監外圍遶地方總甲周仲其上監墻窺探失脚跌入監内當被各賊亂棍打死各賊計窮隨即舉火燒毁監房延至天明又將監内不肯順從輕罪人犯詹兆等趕打成傷恐傷無辜嚴督官軍把鉞等各率軍兵人等一齊下監樊紳等與官軍格闘西安左衛指揮使把鉞部下擒獲一名楊大學斬獲賊級八顆本衛掌印指揮使任傑部下斬獲賊級二顆城操指揮張鵬部下斬獲賊級九顆榆林城領班指揮僉事田鑑部下斬獲賊級一十一顆指揮田滋等斬獲賊級一顆西安前衛掌印指揮使康壽部下擒獲一名王河斬獲賊級三顆本衛城操指揮僉事魏鎮部下斬獲賊級三顆千户王相部下斬獲賊級五顆本衛千户徐衡任威等擒獲一名侯瓚西安後衛掌印指揮僉事劉啓部下擒獲張合李洪李廷甫三名斬獲賊級一十一顆指揮楊茂劉紳擒獲賊首一名樊紳部下斬獲賊級二顆本衛指揮髙應祥等斬獲賊級一顆西安右䕶衛指揮僉事陸鑄部下斬獲賊級二顆長安縣廵捕主簿楊元明部下擒獲一名薛添雲斬獲賊級二顆本縣皂𨽻周銳等斬獲賊級一顆咸寧縣民快皂𨽻康廷周鄭守巳馬四等擒獲一名趙廷美斬獲賊級二顆禁子趙景雲等斬獲賊級一顆城操軍人陳貴等擒獲一名趙顔承差王平吏張仲文張天錫擒獲一名趙世傑軍人尹政等將婦女劉氏張氏丘氏鄒氏等捉獲并首級賊犯俱送本職躬親審驗明白將生擒樊紳等一十一名分發西安府衛牢固監候首級用㭱裝盛各題寫真正姓名貯庫又將各屍骸埋藏空便地内亦用木牌題寫姓名訖隨即下監查得反獄賊犯樊紳楊朴等俱巳斬獲並無一名得脫及查監簿别巻輕重囚犯詹兆等亦無疎虞妄殺情故緣係反獄事理合闗本司煩為轉達施行等因准此擬合通行呈詳為此今將前項緣由并擒斬獲各犯姓名理合開坐伏乞照詳施行等因到臣案查先據陜西都布按三司呈為萬分𦂳急賊情事將㑹問過賊犯樊紳等招詞呈詳到臣㸔得各犯除原謀首惡樊紳等外其餘或係脅從之人情有輕重則法有全减今一槩坐以極典恐三司官員倉卒鞫問未得其真將貽多殺之悔已經具題乞差給事中刑部郎中前來㑹同廵撫廵按再行審鞫分别輕重議擬中間若有讐攀妄指及審無實跡者亦要從公開釋去後今據前因㕘照陜西按察司署印副使張宏明知逆賊樊紳等係凌遲斬罪重犯不行分發各該衙門牢固收監却將原謀首惡并臨時從逆及各犯家屬聚處一監又不督令司獄吏典禁子人等如法肘鐐釘㭱嚴切闗防以致兇犯結謀反獄俱合有罪㕘詳呈報情詞事既早覺不得出監官兵圍繞於外賊雖兇悍終是在㭱之虎官軍既入當先格闘者固宜斬殺其餘人犯合就一名名擒縛分發各衙門牢固收監待命明正典刑肆諸市朝以正國法顧乃一槩斬首恐在㭱之囚亦所不免况囹圄之内隙地能有幾何雖多亦無容足之所彼兇狠􅂸命之人若果勢猛力齊則格鬬之際官兵禁卒豈無所傷束手待斃之状昭然可見且始既疎於禁防終乃恣夫屠戮既非臨敵對陣之比浪稱斬獲首級之功其拒敵傷人之輩固所宜然而駢首就戮之徒豈無寃濫中間縱有可矜疑當開釋之人死者不可復生有乖朝廷欽恤之意推原各官之心不過以前項人犯黨𩔖寔繁存之恐生他患故欲乘機殺之無遺庶使將來可免防範原情夲為防變論法則有未宜但事在陜城臣相離地逺莫究其詳鎮廵官員必有所處緣臣先有論奏今不得不言如䝉伏乞勑下法司㕘詳前後招報情詞奏行陜西廵撫廵按等官將各該有罪人員依法㕘究其斬獲首級者應否論功徑自奏請定奪縁係反獄事理為此具本專差承差馬廷璋親齎謹題請㫖一為懇乞養病事題為懇乞養病事嘉靖四年十二月初五日據分守肅州等處地方右㕘將都指揮同知雲冐呈前事切照卑職㓜年失父孤弱多疾及襲職以來節年領兵固靖等處備冬截殺於正徳十六年八月内欽銓陜西都司軍政僉書管操廵捕適有白水商南等縣流賊陳克已妖言賊首馬隆等蜂起攻刼城寨荼毒生民卑職領兵跟剿奮不顧身殄㓕前賊多厯艱苦又於嘉靖三年三月内不意庸駑叨陞今職毎思重任無術可勝身心兢業寢食靡安本年八月二十三日忽有土魯番回賊犯順侵掠邊陲肆爾兇殘直抵肅州城下卑職率衆登城晝夜防禦身不觧甲者旬日及賊勢少退尾後追襲邊外赤斤等處斬獲賊首二十顆時值天寒冐霜卧雪因而感寒遂成雜症見今手足麻木頭目眩暈飲食少進形體漸衰抑且邊境藥無全材人少良醫多方調治未得痊可况卑職原係色目事渉嫌疑理當迴避如䝉伏望軫念邊方事重乞委官員代守地方容令回家養病庶地方幸甚巳經具呈定奪去後未䝉明示今照前病自交秋以後日漸増重不能守邊任事若不再乞呈請委官代守誤事未便為此理合具呈伏乞照詳定奪明示施行等因到臣照得肅州係迤西極邊重地嘉峪闗之外番人種𩔖甚多乃控制西域回部之門戸分守將官責任比之他處不同近年節被回酋紏衆犯順直抵甘肅城下戕殺我官兵攻陷我城堡凋傷困敝之狀所不忍言今年七八月間又復驅其醜𩔖窺我邊境雖旋即退遁顧其志在通貢既不得遂明年夏秋之間大舉侵犯之謀難保必無分守㕘將非老成練達不能綏近懐逺非壮勇果毅不能克敵制勝見任㕘將雲冐出自將門長於騎射年方二十九嵗屢曾領軍赴敵立有戰功而駕馭之才綏懐之畧較之老成猶恐不逮今屢陳有病服藥未痊不能任事又以原係色目事渉嫌疑理當廻避為辭王者無外此固不足顧䘏但身既有疾重任實難負荷若不俯順其情早為更昜萬一敵人不肯悔過紏衆入寇將官不能領軍豈不誤事然此等將領若照常格將别鎮官員陞任竊恐地利未知人情未附難責成功愽訪得陜西行都司都指揮僉事王輔守備山丹地方以都指揮體統行事指揮僉事甘禎俱係土著官員諳練夷情熟閑軍務一方武臣號為出色如䝉伏望聖明軫念肅州要害地方防禦邊患為急乞勑兵部訪議上請合無將雲冐取回陜西都司照舊列銜調治前疾痊可撫按官具奏該部查有相應㕘將遊擊等項員缺另行推用仍乞於王輔等二員内奏請簡用一員擢任㕘將請勑分守肅州地方脩舉邊務振揚軍威以安内附以禦外侮邊方幸甚縁係將官懇乞養病事理未敢擅便為此具本順差承差馬廷璋親齎謹題請㫖一為患病將官懇乞休致事題為患病將官懇乞休致事嘉靖四年十一月十五日據分守莊浪西寧等處地方副總兵都督同知魯經呈前事切照本職襲授都指揮以來累立戰功節陞前職正德十四年得患脫甲風疾節次具奏不准嘉靖元年四月内奉勑加陞副總兵仍守前項地方任事外嘉靖三年十月内又疏乞休不䝉俞允奉勑魯經近因回賊侵犯肅州爾世守忠義勇畧著聞即今邊方有警方且委用豈可引疾乞休務須戮力討賊樹立戰功欽此欽遵本年十二月初二日力疾任事外思本職節因本邊番人犯擾本職披堅執銳陸續殺獲首級三百二十一顆嘉靖四年七月以來復冐前疾累醫㒺効見今卧床不能任事本職正在披􅅹肝膽圖報國恩委疾纒綿不堪領軍及思男魯瞻見膺千户之職管束土官軍家口人心信服應該襲替如䝉准呈乞賜俯念曾効㣲勞早為具題容放致仕令男襲授祖職繼管部屬乞推相應將官前來代守便益等因具呈到臣為照莊浪地方為河西要害重鎮番敵人擾嵗無寧月月無寧日近年又有回夷之警防禦保障全在將官若莊浪守將非人密邇蘭靖腹裏豈能宴然無事及照副總兵魯經沉毅有謀驍勇慣戰自襲授都指揮受命分守以來屢立戰功獲賊首級多至三百有餘土漢官軍素所信服敵人邊人素所畏憚頃嘗以疾乞休重荷温㫖勉留及查得本官正德年間曾經總制都御史鄧璋彭澤廵按御史羅玉潘倣許翔鳯奏薦皇上嗣極之初本官因病乞休又該御史許翔鳯奏其年力方壯謀勇夙成果敢有為而地方攸賴恩威並用而軍士自服粤自乃祖乃父以來世有維藩維垣之寄邊陲倚重番達知名况今𦂳急用人之時遽為引病辭避之計乞要特降勑㫖敦諭本官亟出蒞事等因本部議得魯經祖父以來世有勞於國家至經克承先志累見邊功夷部軍民咸知感畏近日權奸蠱惑先帝聖聴害及骨肉委的情有不堪本部亦素悉其謀勇才能且部下都指揮指揮等官多至鎮守分守總兵而本官久以都督同知仍任㕘將嘗欲上請簡用但以其世守莊浪地方土漢軍民久在屬服逺近夷部正怯威名深恐一旦更易不惟魯經動懐土觖望之心且使軍民不安新將之令合無將魯經授以副總兵名目請勑一道照舊分守荷䝉俞允陞副總兵仍守莊浪西寧地方嘉靖元年以來節該欽差户科給事中孟竒御史范永鑾廵按御史劉翀交章奏保近又該欽差提督軍務太監張忠薦稱魯經生長邊方老成持重熟閑韜畧累立戰功堪任主將兵部覆題節該奉欽依魯經等待有相應員缺斟酌推用他欽此欽遵切惟副總兵魯經厯官最久軍功最多臺臣論薦連章累牘温㫖慰留至再至三今河西地方敵人之侵犯無常回酋之窺伺未已豈臣子稱病辭避之日巳經節行本官上體朝廷眷顧之恩下思地方付託之重罄竭心力撫安軍民防禦敵人勿再推避致悞邊防大計去後但恐本官自有陳請情辭懇切萬一聖明俯從所請推任别官夷情未諳土人未附恐失干城之託况後進將官為其服屬聴其指使者率多超陞主將而本官尚為偏禆雖公論在人終當有待而人情向進豈能久堪如䝉伏乞皇上念地方之至重思世將之當惜本官若有陳乞奏章仍照前㫖勉留仍乞勑該部查照節年奏薦章疏遇有本鎮主將員缺將本官奏請陞任若本鎮無缺陜西寧夏等處附近地方主將有缺照依伊祖魯鑑陞任延綏總兵事例具奏擢用以慰將官效忠之心以副邊方軍民之望不勝幸甚縁係患病將官懇乞休致事理未敢擅便為此具本順差承差馬廷璋親齎謹題請㫖一為查探聲息事題為查探聲息事嘉靖四年十二月初五日據鎮守延綏等處地方總兵官署都督僉事彭楧呈前事行准分守東路地方右㕘將署都指揮僉事黃宰手本據永興堡把總千户劉瀾呈據一路原哨夜不收劉端等供嘉靖四年十月初一日從本堡劉家梁墩空出境至初五日哨到地名黃石磕爪見新行人馬踪跡約一百餘道初六日襲踪跟至地名死鞍則瞭見帳房一十三頂馬匹牛羊約三百有餘離邊一百五十餘里及瞭迤北俱有煙火當就旋回初九日到堡又據木𤓰園堡把總千户童璧呈據一路原哨夜不收劉三等供十月初一日從本堡石家塢墩空出境至初五日哨到地名窯兒溝爪得新行馬蹤約三十餘道從東徃西北去訖初六日哨至水頭地名倒栁樹瞭見帳房二十七頂牛羊馬匹約四百五十有餘離邊一百一十餘里及瞭迤北地名沙城兒等處亦有煙棚當就旋回十一日到堡又據中路雙山堡把總都指揮周塘呈據一路原哨夜不收折原甫等供十月初一日從本堡陳家塢墩空出境初二日夜哨到地名深河兒潛伏天明爪見新行馬蹤約五百餘道從西徃東北去訖初三日夜哨至地名嚮海子天明爪見新行馬蹤三十餘道徃西去訖及瞭迤北營巢帳房一十五頂牛羊馬匹約一千五百餘多離邊一百五十餘里欲要前進因天落雪又見地勢平漫當就旋回初八日到堡又據榆林城把總都指揮閻武等呈據西一路原哨夜不收王真等供十月初一日從本城斬敵墩空出境初二日三更時哨至地名丁家灣爪見新行馬蹤一十五道徃東北去訖天亮時哨至地名甫府草灣伏至未時瞭見單樹梁敵衆三十餘騎從西徃東去訖離邊五十餘里酉時旋回初四日到城又據東一路原哨夜不收小孫義等供十月初一日從斬敵墩空出境初二日三更時哨至地名髙崖畔爪見新行馬蹤一十五道徃東去訖初三日戌時哨至地名榆林岔爪見新行馬蹤五十餘道跟舊營路往東去訖相離本邊八十餘里當就旋回初四日到城又據波羅堡把總指揮秦堂呈據一路原哨夜不收王騾子等供十月初一日從夲堡蓮池山墩空出境至初四日哨到地名老瞿營瞭見敵衆帳房一十二頂牛馬羊約一千餘多離邊一百三十餘里不敢深入當就旋回初七日到堡又准分守西路地方左㕘將都指揮僉事袁聰手夲據靖邊營把總指揮孫仁呈據一路原哨夜不收趙四兒等供十月初一日從本營保定墩空出境至初八日哨到地名長湖南畔爪見新行馬蹤約一百餘道徃東行走並無營盤離邊一百七十餘里當就旋回十五日到營又據新安邊營把總指揮李杲呈據一路原哨夜不收王見等供十月初一日從舊安邊營闗門墩空出境至初七日哨到地名菽麥湖爪見新行馬蹤約七十餘道從東徃西北去訖亦無駐劄帳窠離邊一百五十餘里當就旋回十三日到營又據三山堡把總指揮許世忠呈據一路原哨夜不收許佛僧等供十月初一日從本堡西平墩空出境至初六日哨到地名明水湖爪見新行馬蹤約一百餘道徃東北去訖離邊一百八十餘里當就旋回十四日到堡等因各行到職㑹同鎮守太監張紳廵撫右僉都御史張縉議照中東西三路營堡各哨有敵衆住牧營巢帳房馬匹牛羊及敵人行走蹤跡多寡不一煙棚火光逺近不等况今馬肥弓勁正彼便於馳驟之時防範機宜在我當謹除行各該分守按伏將領把總坐堡等官嚴謹烽堠加意隄備如遇有警務要相機戰守外呈乞照驗施行等因到臣為照北人小王子部下頭兒吉納台吉諳達阿布該等帯領賊徒八萬自去年十一月間踏氷在套住牧臣自今年四月到於陜西地方巳經分布各路將官兵馬按伏隄備節經具題外夲年五月以來節據延綏寧夏鎮守分守等官哨報河套敵情自延綏黃甫川起直抵寧夏靈州一帯無處無敵營壘火光逺近相望其近邊者不過三五十人七八十人多至二三百人間有入境零賊一見官軍旋即遁出其大衆知我有備不敢深入七月間率衆二萬前去西海尋收額布勒敵人其在套者當亦不减數萬近於九月間擁衆萬餘自延綏波羅懐逺二堡拆墻入境各該將官追逐雖斬獲不多而地方不曽失事臣十月初旬自固原起程廵邊至寧夏靈州厯清水營興武營花馬池定邊營行令各將官差人出邊逺哨並無敵衆人馬蹤跡烽火寂然盖自靖邊渡河喪敗之後聞風畏遯目今雖延綏中東二路不時見敵而不敢侵犯但恐尋襲西海諸冦回套紏同阿爾托蘓及原在套之衆大舉拆墻入境搶掠之患難保必無仰仗天威逺被皇武布昭我之兵勢既揚軍威既壮守臣恊力士卒用命不敢希克㨗之功但求地方不遭患害而已待後河凍已堅哨探大敵曾否踏氷北遯乃哨套内有無餘敵另行具奏外縁係查探聲息事理為此具本順差承差馬廷璋親齎謹具題知一為大舉敵衆出沒事題為大舉敵衆出沒事嘉靖四年十一月十五日據分守莊浪西寧地方副總兵都督同知魯經呈前事據守備鎮𦍑地方行都指揮事袁英呈本年十月十一日有安逺堡按伏陳指揮傳調人馬迎接齎表人員本職當統備禦官軍指揮匡鍾等三百五十員名行至水泉兒未時迎據夜不收王名報瞭古浪土佛墩舉放煙火得此除分投差人收歛人畜襲爪外申時又據炒來也斤墩夜不收張雄走報瞭見敵衆四五十騎從水泉兒行來本職隨統官軍驟彼敵衆見人馬退徃原路去訖欲追天晚落雪掣軍回堡十二日丑時據西古城夜不收沈興走報十一日亥時聽得大敵不知其數從黒古城順河行來有彼處應哨夜不收吳圭玉不曽飛報不知存亡得此整兵間寅時據炒來也斤墩舉火三把隨據本墩夜不收胡召保報本日早瞭見敵衆七運老小約有七八百喝趕牛羊從西古城順河行來奔骷髏石行去後有四五運精壮約有五六百邀趕馬牛順河徃東行去得此除差夜不收劉榮赴城飛報外本職領兵出堡迎至河灘有賊一百撲來就與交鋒對敵職督官軍齊擁向前鎗扎箭射中傷敵衆人馬數騎敵見官軍勇猛方纔遯徃石板溝出境去訖就陣奪獲賊馬一匹牛三隻敵帳二頂氈衫二領氈襖二件皮襖二領皮可可二箇木盆一箇筐一箇駝鞍一副欲再深追况敵勢重大恐墮奸計掣軍回堡差據夜不收張天兒襲得前賊蹤跡俱由黒古城行來及查彼處應哨夜不收宣興右李遷爪無下落不知存亡得此及照差去報事夜不收劉榮未回顯是被擄查得此外再無搶掠人畜行間又據爪路夜不收王志等收送套中走回男子二名供說前敵俱足西海久住敵酋阿爾托蘓部落等情除差人觧送莊浪聴審外為照此敵分運經過難保不來為患除整兵隄備外理合具呈施行等因據此除將奪獲馬牛照例犒勞奮勇官軍敵噐發仰莊浪衛貯庫外呈乞照騐施行據此又據本官呈為哨探大敵壓境住牧事本年十月十八日據迤北探哨夜不收翁城土軍卯三等四名供報本月十二日䝉差各役哨探敵情依䝉出境晝伏夜行十三日到常山兒伏瞭二日瞭見土豹領敵衆六七十騎順河徃來行走十五日到斬石峽登髙瞭見頭水古城一帯有敵四五千牛馬遍山欲再深入哨探套人阻道不能前進十八日掣回到城及據迤南探哨夜不收宋欽土軍家堂保等四名供報十三日到蘆溝登髙瞭見套人一百餘騎徑奔紅溝行去十四日到一撮毛山登髙瞭見孫官兒湖照壁山槽頭一帯套人約有三四千牛馬遍山撒放伏瞭至晚掣回十七日到城供報得此照得前敵來在莊浪山後占據水頭古城照壁山一帯迤邐住牧時遣輕騎近邊徃來行走雖未深入難保不來為患除行屬墩營站堡守掌官軍謹斥烽堠整兵嚴加隄備外呈乞照驗施行據此又據本官呈為套中走回人口供報夷情事據守備鎮羌地方行都指揮使袁英差擺哨西古城夜不收王志收送套中走回男子三名到官發據莊浪衛申審得一名黒的狗供稱失記年嵗係河州衛左所失記百戸下餘丁尹玉兒弟正德八年四月内在於馬家灘放馬忽遇套衆三百餘騎搶到西海阿爾托蘓營内住坐舊年冬間回子人馬到來將頭口盡行搶去今年九月間小十王人馬前來有衆敵人一千邀趕牛羊馬匹二三千同小十王人馬三百一同起營走了一箇月到荘浪地方上住坐衆敵人商量河凍了回套去黒的狗思想父母脫走撞遇擺哨人役收送前來供報是實一名姚二哥子年二十嵗係甘州左衛左所姚百户下舍人姚清男状供正德四年六月内在於黒泉堡耨田遇賊二百搶到西海營中住坐一名馬閏狗失記年嵗洮州衛巾所十旗寨總旗馬敖男正德十四年五月内在於屯莊遇敵七八十騎搶到營中今年大衆敵人起身來到莊浪地方各思想父母二哥子偷騎赤騍馬一匹馬閏狗偷騎青扇馬一匹一同脫走來報等因備供具申得此行間夲月十九日及據擺哨孤山兒夜不收景奉祥收送男子一名竇荒年供年一十八嵗係西寧衛中左所失記百户下通事竇禮男在於北川毛家寨屯住嘉靖元年九月内入山尋柴遇敵二百餘騎搶到西海阿爾托蘓營内住坐今年衆敵人起營來到莊浪山後住牧荒年思想父母乗黑脱走回還隨據馬塲溝夜不收張顯收送男子一名自兒供年一十八嵗係莊浪衛紅城子總甲石城下土丁他罕保男在於武勝堡屯住正德十五年失記月日在山放牛遇賊二三百搶到西海營中住坐舊年冬間又被纒頭回回將自兒搶到半路上脫走回到原搶營中今年衆敵人害怕回子又來尋搶同小十王人馬起營來在莊浪地方土豹嶺一帯駐劄敵人約有一萬頭畜遍川撒放衆敵殺白馬一匹祭天商量收拾精兵要來城邊厮殺尋搶等語自兒思想父母偷騎赤扇馬一匹脫走撞遇夜不收收送前來供的是實據此除整兵隄備外呈乞照驗施行據此又據本官呈為大勢敵衆犯邊事抄䝉臣鈞帖行據守備紅城子行都指揮事楊和呈據夜不收周伏等四名供報十月二十二日到金莊水登髙瞭見蘆塘照壁山孫官兒湖黃河邊套人約有五十餘騎青白馬匹遍山撒放伏瞭至晚煙霧火光不絶欲便前去撦木硤五方寺等處爪探况敵阻道不能前進二十四日掣回供報得此理合具呈施行等因據此案查套中走回男子張友智供報敵人四五百八月間到黃河沿住牧内有一賊漢語說是小十王頭哨内三百渡河徃靖邊地方上行去其餘復到店子川住牧等情除差人聮絡哨探另報外呈乞照騐施行等因節呈到臣為照阿爾托蘇額布勒二項邊寇正德初年被北部追殺逃躱前來竊伏我西海地方將二十年侵掠莊浪凉州等處不止一次又曾侵入洮州直抵四川松潘境界大為中國腹心之患臣方議調集大兵痛加誅剿已經具題外本年七月以來套衆二萬過河聲言收捕前敵留兵數千在莊浪凉州一帯住牧其餘徑奔西海邊人方幸夷狄相攻地方之利將謂永絶禍根不意先為所覺挈其家口頭畜遯入南山藏躱逼近洮河地方止留精兵在於舊伏險隘去處把截來者千里而趨利住者以逸而待勞反為所挫遯回莊浪先以數百騎從靖邊撦木硤渡河犯我腹裏節被陜西寧夏官軍斬殺敗散其大勢已漸那營東北去訖後節據莊浪守臣哨報阿爾托蘓敵衆陸續跟隨小十王大營前來盖此敵自知結釁巳深恐將來北部大舉復讐力不能敵故先隨從歸順以圖免禍然阿爾托蘓敵衆既離西海獨額布勒在彼勢亦稍衰除行洮岷㕘將邊備守備等官整兵積糧嚴加隄備外但前項邊敵近日源源而來俱在莊浪孫官兒湖蘆塘五方寺等處臨河住劄密邇靖邊地方因懲前敗不敢窺伺俱從洞清溝透過寧夏中衛地方恐其待河氷已堅乘間深入固靖地方搶掠仍從寧夏中路擁衆拆墻歸套亦未可知巳經督發陜西㕘將守備等官統兵於各要害地方防禦及將延綏副總兵趙瑛竒兵調來小鹽池等處與寧夏官軍各按伏堵截并行花馬池興武清水營一帯大小主客將官嚴加防範待後哨探各枝敵人向徃的確消息曾否盡歸河套有無侵犯邊境另行奏報外縁係大舉敵衆出沒事理為此具本順差承差馬廷璋親齎謹具題知一為邊敵聲息事題為邊敵聲息事嘉靖四年十二月初十日據鎮守寧夏地方總兵官都督僉事杭雄呈前事本年十一月二十二日據迤北猪嘴山出哨夜不收莊真保報十九日辰時瞭見境外地名青羊泉敵衆約有二百餘騎隨趕牛羊徃黃河西岸大灣去訖二十日巳時又瞭見野馬川口子敵衆五簇頭畜不知其數俱徃東行又見河東地名石觜兒暖泉兒一帯晝夜焚燒火光不絶又據鎮寧墩夜不收劉敬祖報二十一日夜三更時分境外正北敵衆約二三百騎邀趕頭畜進境順河徃南行至栁門兒墩北空踏氷過徃河東去訖二十三日據賀蘭山打磑口出哨夜不收顧阿半報夲日夜二更時分哨見境外敵衆約有一百餘騎進口徃東過河去訖二十四日據猪觜山出哨夜不收王宗報本日酉時瞭見地名野馬川口子敵衆約有三百餘騎隨趕頭畜徃來奔河行走後面灰塵聮絡不絶二十五日據打磑裏口墩夜不收竇回生常勝墩夜不收傅泰各報境外地名黃草灘敵衆約有一百餘騎邀趕牛羊徃西北踏氷過徃河東去訖十二月初二日據汝箕口出哨夜不收趙王加報初一日寅時哨見境外正西敵衆二十餘騎進境徃東去訖隨據河西瓦窯墩夜不收李昇報本日卯時瞭見境裏敵衆二十餘騎來到本墩北空踏氷過河去訖初三日據迤北鎮逺闗鎮寧墩夜不收杜成報初二日申時瞭見境外敵衆三百餘騎從馬頭沙灘進境南行隨據栁門墩夜不收趙牛兒報稱前賊從本墩南空踏氷過徃河東去訖等因各報到職巻查先為𦂳急聲息事遵照提督軍門節行預防邊患事宜巳將本鎮竒遊兵馬分布沿邊𦂳闗興武清水營設伏截殺去後今據前因㑹同鎮守太監張鎮廵撫都御史林琦議得河西賀蘭山後盤據敵衆衆寡不一分夥邀趕頭畜踏氷轉徙入套住套酋衆又在石觜暖泉一帯順河住牧晝夜焚燒煙火不絶况河氷一合表裏不分紏勢烏合意必侵犯延寧陜固合再整兵隄備防範通行為此除行本鎮各該將領等官魏錕等及延陜二鎮各整兵隄備外今將前項縁由理合具呈伏乞照騐施行等因到臣為照大敵在套一向不敢深入近自靖邊寧夏官軍殺敗之後那營東遯今據所呈前此尋收額布勒大勢敵衆自賀蘭山後而來臨河屯住陸續回套而在套之敵亦復順河住牧紏合入敵之謀難保必無已通行各鎮守臣照舊嚴加隄備遇警相機戰守去後竊料套中之人夏間尋襲西海等處回旋數千里不得利而歸人馬巳多勞乏其邀趕頭畜過河者必是阿爾托蘓殘敵被其收捕歸順而來縁今水冷草枯時月似難深入侵犯而我所以備之者不得不謹但近日敵人以漸那營多在延綏東路地方延綏守臣未據呈報除行令分投差人逺哨敵衆帳窠離邊逺近及待河氷已堅哨探有無出套過河的確消息另行奏報外縁係敵衆聲息事理為此謹具題知一為舉劾有司官員事題為舉劾有司官員事臣聞政之興廢存乎其人得人則興失人則廢天下之事皆然而郡縣親民所繫尤重臣久官陜西近者起廢而來一方之士民多所接見一方之政俗素所渉厯恒於錢糧之盈虛人民之愁樂户口之登耗學校之盛衰盗賊之興息而郡縣官員之賢否可按而知焉大抵才賢者十無二三庸劣者十常六七今當朝覲之年甄别黜陟此其時也除曾經論薦及毁譽相半治行未彰者不開外博訪得臨洮府知府楊應奎催科不妨於撫字通敏兼著乎清聲鞏昌府知府金濓處事人稱其老成當官克慎其操履本府同知丁璿有剸繁舉劇之才有獲上治民之譽延安府同知張志道潔操有聞能聲日著西安府同知李昇喬遷岐通判張岳平凉府張祚俱守已無玷遇事有為西安府推官楊銳噐質端重刑名疏通華州知州甘為霖才通敏而優於治繁性謹飭而嚴於律已武功縣知縣姜恩窮經能達於政守已兼愛夫民盩厔縣知縣王䀻勵精於政事而庭無留案恪守於官箴而人無間言鄠縣知縣康天爵官有循良之風民歌清浄之治長安縣知縣陳謨咸寧縣知縣何鍾俱才不窘於劇縣志不玷於甲科富平縣知縣胡山作教已收成效調繁綽有治才商南縣知縣郝宗儒通才克優於政小邑弗盡厥施延安府保安縣知縣韓佶調簡邑而大著能聲處邊地而不渝素守鳯翔府扶風縣知縣孫昌政平易而近民性剛介而有執以上各官在陜西八郡中號為出色及又訪得慶陽府知府蕭海操履峻潔行事執滯用之邊地則非所宜處之内郡足為良吏延安府知府張錦上玩下慢無自立之能以繁調簡無可更之郡臣廣詢博訪所見如此至於卑官末職可取者亦多撫按官自能備陳臣不敢汎及如䝉乞勑吏部再為訪察合無將楊應奎等酌其年勞量為陞用蕭海改調腹裏簡郡以保全亷官張錦照例罷黜以警䇿庸吏庶幾有司知所勸懲而吏治可以脩舉矣縁係舉劾有司官員事理未敢擅便為此具本順差承差孫傑親齎謹具題請㫖一為旌舉方面官員事題為旌舉方面官員事臣切惟天下民生之休戚係於守令守令之賢否係於藩臬故藩臬者守令之師表而吏治之臧否民生之休戚端必由之臣受命提督陜西三邊軍務毎思師旅之供餉資乎錢榖錢榖之盈縮出自人民因是以求之藩臬有司之賢否可槩知矣有一賢焉足濟公家之事臣既知之不敢不舉也有一不肖焉將貽生民之害臣既知之不敢不劾也舉賢惟恐其不先去不肖惟恐其不速大臣之職亦若是耳若知其賢而姑使之沉淪知其不肖而姑為之隠諱是豈公平正大之體哉今當臣工述職之期正陟明黜幽之日茍有所見豈敢隠黙顧陜西布按二司官員近多得人除左布政使等官宋冕等雖賢能素著而新任日淺不敢遽陳及左㕘政成文右㕘政韓士竒副使唐龍髙公韶陳鼎翟鵬僉事桑溥姚文清王鈞節經臣論薦俱不開外愽訪得陜西布政司右㕘政楊叔通行端而學足潤身性敏而才能集事右㕘議王汝舟臨事有疏通之才督儲有公平之譽陜西按察司副使張宏性資朴實政務疏通近嘗論其一事之失終難掩其平日之長延綏管糧僉事宋璉謹厚老成郭鳯翔風力振作甘肅管糧僉事周汝勤勤慎安詳以上各官年勞雖有淺深才識不無甲乙畢竟皆藩臬之良俱可與旌薦之列如䝉乞勑吏部再為訪察量其年勞遇缺推用則臣工知所奮勵而政務益加脩舉矣縁係旌舉方面官員事理未敢擅便為此具本順差承差孫傑親齎謹題請㫖一為老病不堪重任乞恩辭免新命事奏為老病不堪重任乞恩辭免新命事准吏部咨嘉靖四年十一月十八日該司禮監太監張欽傳奉聖㫖提督陜西三邊軍務楊一清便寫勑行取來京着照舊内閣辦事吏部知道欽此欽遵備咨到臣自天有命局地無容謹披􅅹誠悃者伏念臣正德年間任少傅兼太子太傅吏部尚書武英殿大學士供事内閣以病屢乞休致荷䝉武宗皇帝允令致仕養疴林下八年有餘皇上嗣極之初特勑遣官存問節經大臣科道等官論薦屢奉明㫖待缺起用臣自度老病衰殘之人行將就木豈能復出任事徒懐感恩圖報之誠難效鞠躬盡瘁之節杜門伏枕間忽䝉皇上軫念三邊有警采納廷議起臣提督軍務兵部咨文至臣即備陳衰病懇乞辭免既而欽降勑諭至符驗旗牌闗防俱至又䝉欽賞白金綵幣至伏讀勑詞責以大義期之古人褒諭隆重出乎常格臣感激奮發至於泣下夫葵藿猶能傾陽犬馬尚知報主臣亦人耳敢忘情於造化忍自絶於生成第以疾疢相嬰不能自强再疏辭免續蒙命廵撫都御史吳廷舉即臣家敦遣啓行後兵部以各邊軍情𦂳急節該題奉欽依新推提督三邊軍務官着上𦂳前去節制調遣陜西地方既敵情勢重大便馬上差官催促楊一清前去調度經畫欽此欽遵行臣竊念地方多事臣子豈敢避難况兩次辭章不䝉俞允褒諭至督責愈嚴用是兼程前進到於陜西地方扶疾任事到邊以來倐久逾月屢有論列多荷采行即今士馬頗多精强糧儲頗有積蓄大衆伏套而不敢深入回部雖入而旋退遯是皆仰仗天威受成廟筭臣之薄劣何嘗有勞十月十一月内廵視各邊兩目為風沙所傷昏眊轉甚視物茫然如隔雲霧足膝愈加痿弱歩履湏人攙扶自知鞭䇿不前毎欲求退復念先以套人入邊之奏上厪聖慮今套人去留未定不敢遽及其私豈意垂盡之年再荷非常之眷聞命而懼以榮為憂近聞言官所論奏莫究其詳臣自度行不足以孚人才不足以用世官踰其分事不稱食言官所指必得其真臣不敢辯但聞云臣有窺伺舊任之心警愧不知所自仰惟皇上總攬乾綱萬幾獨斷至於大臣進退皆出宸𠂻臣縱有是心將孰與謀何所致力况位至孤卿已是文臣之極致年過七十自知來日之無多而乃欲徼望外之榮以速官謗誠衣冠之所不齒名教之所不容臣雖庸愚决不為是聖鍳在上何俟臣言但其謂臣兩目漸𦕈精力亦衰邊陲之任亦非所宜數語似為切當臣雖自言不過如此伏願皇上念秘閣要地不宜付之匪人衰朽餘齡不可加之重任鍳臣先今辭免懇誠收回新命容臣休致以全晚節臣雖與世長辭亦有榮矣臣不勝戰兢隕越激切祈恩之至縁係老疾不堪重任乞恩辭免新命事理為此具夲順差承差孫傑親齎謹具奏聞伏候勑㫖一為諮訪羣䇿以禆邊務事題為諮訪羣䇿以禆邊務事案查先據整飭固原等處兵備陜西按察司副使成文呈前事内一件添築城堡以絶邊患行據固原衛指揮符深苑馬寺清平苑圉長張子儀㑹呈勘得固原東路索多城即白馬城委係𦂳要隘口雖與清平苑草塲交界然地處孤懸久不在彼牧放相應脩築城堡斷絶賊路以保地方且本地東至萬安苑草塲桃林坡南至清平苑草塲三岔山西至羣牧所天城山北至阿爾斯蘭要峴四至以内地頗肥饒可作安軍之業以外仍作草塲合用脩築人夫應支口糧應用噐具稍把俱於附近衛所起支措辦防守軍役照先事例召募懸賞仍撥給近堡地一頃令其開種待十年之後量徴子粒仍在白馬井墩改築近水處所展築寛大月城有警撥軍在彼占據水頭使賊馬不得飲水則賊路自可斷絶毎嵗仍量撥糧料草束於本城收貯以備截殺軍馬支用等因㑹呈前來案查先准守備固原地方署都指揮僉事劉文手本前事内開固原地方平漫最當衝要先年敵衆侵犯俱由韋州螺山入預旺城紅古城二處劄為巢穴深入搶掠𢎞治正德年間節䝉總制尚書秦紘都御史楊一清奏議於固靖環蘭一帯挑脩邊墻一道及於中路預旺城添設平邊一所召軍一千餘名西路紅古城添設一堡召軍四百餘名各委官操守地方賴以無虞自此以後敵見彼處有備却由東路地方獅子川毛居士井入寇其白馬城白馬井等處即巢穴之所由此而南深入鎮原平凉涇州等處嘉靖元年大敵正在白馬井白馬城等處劄為巢穴更番搶掠足為証驗前項地方相應脩築城堡召軍防守斷絶賊路等因准此㸔得前項地方與清平苑草塲交界且脩築防守事宜未經議處難便施行巳經闗行陜西苑馬寺㑹委各官勘處去後今呈前因理合呈乞裁處施行等因呈報到臣看得固原地方西路有平邊鎮戎二所及紅古城足堪把截防守東路孤懸寛漫先年全無備禦敵人由環縣地方進入直從虎山溝徑至平凉郭外而人不及知𢎞治十七十八年間因脩復清平萬安二苑馬政展築彭陽城板井堡二處安挿牧軍脩盖官㕔營房選設操丁守城遇冬有警分布官軍在彼按伏稍為有備其獅子川毛居士井一帯相離各堡窵逺水草便利敵衆窺知近年在彼劄營分散搶掠今要於白馬城地方添築城堡及將白馬井墩改築占據水頭俱各相應巳經行仰兵備副使成文㑹同守備都指揮劉文親詣勘處應築城垣若干文門幾座合起倩固原平凉軍衛有司并清平萬安二苑各人夫若干名應支口糧於固原州倉及彭陽板井倉闗支合用脩城噐具稍把城門釘鐵等料官為措辦應用脩築完日有警摘撥官軍在彼防守照例懸賞召募軍人四五百名設為常守之兵毎軍一名撥給近堡地一頃令其開種十年之後量徴子粒收貯夲城備用仍行陜西廵撫衙門行令布政司將原坐附近城堡倉塲糧米量為改撥本城脩盖倉厫收貯以備按伏官軍支用其白馬井墩依擬改築近水處所展拓寛大月城撥軍守瞭阻絶水頭庶使敵馬不能久住待城完召有軍人積有糧草應該立所設官等項另為定奪仍備由具呈陜西廵撫衙門計處去後縁兵備副使成文陞任陜西布政司左㕘政新任兵備官員未到行令帯管兵備兼理前項築城事務續據本官呈開該䝉巡撫陜西右副都御史王藎批據本官呈文内開㸔得所呈添築城堡增軍設所俱係防邊急務又經提督衙門議處周悉兵備官即便㑹同守備官劉文上𦂳親詣勘處不必遷延月日有失事機該用錢糧等項應呈報者通呈定奪等因䝉此㑹同守備都指揮劉文前去白馬城㸔得舊城週圍大城二里八分月城四分共計三里二分似為狹小今議將月城展作八分週圍共四里合用脩築人夫三千名起倩固原衛餘丁五百名固原州民夫五百名羣牧所餘丁五百名靈長二監操丁一千名平凉衛餘丁五百名大約五十日可完毎名日支口糧二升共該糧三千石於附近新豐等倉支用犒勞夫役毎五日一次毎人銀三分計筭五十日該用銀九百兩合用把條查得石澇池孔骨都地方産有稍柴相離白馬城三十餘里就令夫役自行採打應用其土袋鍬钁各夫自備木五十把用行條二十五根毎根用銀五分共銀一兩二錢五分刮板五十副毎副用板一片椽二根共用板五十片毎片用銀三分共用椽一百根毎二根用銀一分共銀二兩合用石杵石硪於固原鎮戎二處撥匠打用南北二門城樓該用禾植椽板釘鐵等項毎座用銀五十四兩眷門并樓磚瓦就將條把督匠燒造裹門鐵葉用銀八兩共銀一百一十六兩本城樓鋪六座每座該用椽木價銀一兩五錢共銀九兩脩盖倉厫二座毎座六間六檩五椽大門樓一合三檁二椽木料甎瓦釘鐵等項共銀四十六兩四分脩盖官㕔前後二座各三間五檁四椽并門格窻毎座用銀二十五兩共銀五十兩廂房四座三檁二椽毎間用銀四兩共銀一十六兩大門樓一座用銀三兩共銀六十九兩通共估計銀一千一百四十三兩二錢九分合於收貯鹽商簽銀内動支及看得固原衛指揮符深平邊千户所百户王玉俱頗能幹濟合委各官前去提調脩理等因具呈到臣看得各官勘處停當依擬行仰起夫辦料興工帖委指揮符深等管理仍令守備劉文徃來提調工完之日通將支用過官錢總𩔖造冊呈報查考續據委官符深呈稱本職依䝉於本年七月十六日帯領固原平凉二衛靈長二監甘州羣牧所固原鎮原二州縣夫役前去白馬城將原丈量城垣督工脩築至本年十一月十四日前項城垣并大城北門俱各築完其南門并官㕔倉厫樓鋪縁冬深土脉結凍未曾築造除將餘剩銀兩待通完之日另行開報先將支用過錢糧數目造冊呈報施行等因前來近該臣廵視延寧等邉回還親詣白馬城閱視得前項城垣髙厚堅固足堪保障新召軍人俱各精銳壯徤亦堪防守隨經查照鎮戎平邊等城事規行令原委指揮符深操守及百戸王玉坐堡各管領召募軍人整飭軍火噐械嚴謹防守外又據分守固靖等處地方㕘將劉文呈為前事開稱本職親詣勘得白馬城脩築完固召集軍士一千一百餘名在彼防守及西路紅古城増召軍士與舊軍共有一千名各委指揮一員操守百户一員坐堡但二處衝要分守墩隘邊塹數多凡有警報操守官領兵截殺坐堡官收歛守城其墩臺邊塹馬隊等項缺官提調管理欲於固原衛所摘撥但本衛見操馬隊俱各缺官委令旗甲管領不堪動調縁二堡軍士俱有千餘若非添官管理人心終恐渙散地方無賴欲待開設所分銓官降印未免待延嵗月又况安挿未定急難舉行合無於延寧二鎮查取新任多餘千百户一十員前來分撥二堡管事如此則軍有統束事體經久不致廢弛其設所事宜待安挿已定另行查舉呈乞定奪施行等因到臣案查前已該臣及陜西廵撫節及各官勘處去後今據前因照得廵撫陜西都御史王藎見在鞏昌洮岷地方防禦邊人除行徑自具奏外臣惟固原為防邊重鎮乃陜西根本之地地里寛漫通賊隘口數多分兵而守則無所不寡賊至發兵則有所不及數十年來敵衆竊伏河套寧夏邊牆不能捍禦必從固原深入平鳯臨鞏地方搶掠生意蕭索戸口凋耗實由於此但防邊之要據險為先設險之䇿必資城守成化年間都御史余子俊建議於預旺城葫蘆硤口二處添設鎮戎平邊二所甚為得策後止設鎮戎所其平邊所因循未舉𢎞治十四年敵衆侵犯固原總制尚書秦紘查奏舉行旋即去任臣接管總制始奏銓官降印召募軍人設倉積糧又於舊紅古城脩盖營房募軍積糧委官操守於是兩城遂為防禦要地敵衆畏避不敢由此而入却從東路獅子川毛居士井一帯在於白馬井趂水草劄營分散搶掠固原平凉村寨城堡直抵涇邠地方所以固原兵備副使成文守備都指揮劉文俱要於舊撒都城即白馬城地方脩築城堡添設官軍并展築白馬墩堡占據水頭斷賊出入之路似為有見臣與廵撫都御史王藎依擬行令勘處今據各官呈報臣又親詣閲視及行委布按二司官㕘政韓士竒等照例召募願投本城軍人及又委令將應給軍人耕種地土丈量四至分撥外但有城有軍必須得官管束固原衛見任官員數少委的不敷差用及照召募軍人止可尋常備禦若大衆入冦必須分調官軍在此按伏供應糧草亦當預備再照前項地方係在靈武監清平苑草塲之内與萬安苑草塲相隣因地土荒逺自來無有官馬在此牧放盖係敵衆出没之衝牧軍亦不敢來此牧馬及义查得靈武監清平苑原額實有草塲地共一萬九千七百九十四頃二十六畆二分見養馬軍人止是二百八十三名見養馬并駒四百三十七匹萬安苑原額實有草塲地一萬七千四百五十二頃三十八畆養馬軍人三百二十三名見養馬并駒一千四百八十八匹地土甚廣牧馬不多不致顧此失彼但恐牧軍因見築有城池足堪保障事定之後或起争端况前項城堡之設不止保障地方亦欲防䕶官馬如䝉乞勑該部計議合無行延綏寧夏二鎮查取新任空閒官員毎鎮各五員改調填註固原衛所分分撥白馬城紅古城二處毎城五員管隊領軍并行陜西布政司將原坐附近城堡該徴民糧量撥新築白馬城脩盖倉厫收貯以備兵馬支用再乞行陜西苑馬寺禁約該苑牧軍草塲地土在今分撥給軍耕種界至之内者向後不許混争告擾及行總兵㕘將兵備操守等官禁約本城軍人不許於界至之外侵越耕種如違各依法究治待安挿既定軍強食足之日與紅古城應該設立所分俱聽後來總制提督廵撫等官奏請定奪如此庶可以壯邊城保障之勢消外敵窺伺之心地方兵民不勝至幸縁係諮訪羣䇿以禆邊務事理未敢擅便為此具本專差承差趙瑤親齎謹題請㫖闗中奏議巻十六
