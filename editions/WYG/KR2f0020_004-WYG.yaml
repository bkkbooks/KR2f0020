body:
  text: 關中奏議巻四明楊一清撰巡撫類一為邊務事題為邊務事准兵部咨伏䝉皇上命臣不妨督理馬政巡撫陜西地方自度不堪負荷已經具本陳情辭免巡撫仍督理馬政俟命外欽奉勅諭委任褒嘉出乎常格揣分度力益深愧懼感恩圗報誓竭心力續准兵部咨該本部題奉欽依陜西寜夏鎮巡等官候差去指揮强宏到彼即将地方緩急情形備細縁由明白具本付與本官星馳具奏不許朦朧遲悮等因臣到固原訪得敵衆自本年正月初五日入境搶掠李旺堡人畜之後並無傳報砲火聲息沿邊豫旺城半箇城上馬房下馬房一帶俱無伏藏㓂盗哨探得韋州螺山賊衆俱已出墻遯回河套寜夏道路人馬商旅俱已通行即今春氣漸深河氷將解此賊料已出套過河陜西地方相離河套遙逺未知端的巳行延綏寜夏二處守臣查探未報節據捉獲奸細供稱敵衆小王子大衆不曽過河前項寜夏拆墻入敵雖未的知多寡其鈔掠陜西邊境者數本不多我軍無截殺之功所在遭搶掠之苦雖云地方廣濶軍馬數少防守不敷大要乃將驕卒惰邊備廢弛士氣餒於剥削軍令傷於姑息所致臣督率兵備守備等官於本月二十七日起馬前去豫旺城等處沿邊一帶城堡閲視邊關振揚威武處置戰守防禦一切事宜必俟辭免允命下臨乃敢照舊専理馬政臣觀陜西武臣非無可用之人邊城卒伍率多敢戰之士况邊民勇徤所在皆兵臣自去冬邊報告急即督令所司将平涼等處下班官軍民壮義勇等項拘集收操聼候守臣調遣臣稍加䇿勵鼓舞輒有欣然赴鬭之志察此事勢縱使敵兵在套不出亦不足憂如果事情𦂳急又有欽奉徵調延寜等處逰兵成命必不悮事且彼之蔑我大甚其志巳驕天實厭之今嵗如不悔過逺遯必當駢首就戮但查得固靖蘭州一帶邊堡糧儲委俱缺乏見在主兵尚難支持客兵所至将何供億拯溺捄焚誠不可緩此正巡撫之責懼非愚臣所克勝堪然亦不敢後期以悞大計已經嚴督三司等官多方計處應施行者徑自施行事體重大者另行奏請定奪然願陛下託巡撫之責任如託臣督理馬政之専采巡撫之謀議如采臣計處馬政之切勿拘之以文法勿撓之以流言而為巡撫者又當以公滅私忘身徇國治官事如家事不以毁譽榮辱動其心則守必固戰必克蠢兹小醜不日於襄九重可無西顧之憂矣縁指揮强宏前去寜夏未回臣今巡撫恐道途相左致悞强宏馳奏除行鎮守武安侯鄭英待查探套敵去留消息明白具本付本官賫進外今将本境哨探無敵在邊縁由合先具奏縁係邊務事理謹具題知一為才不稱任乞恩辭免巡撫事吏部覆本部文選清吏司案呈奉本部送於吏科抄出督理馬政都察院左副都御史楊一清奏𢎞治十八年正月初十日准兵部咨該本部題為大賊拆墻入境事節該奉欽依是楊一清不妨督理馬政就着巡撫陜西地方用心調度防禦賊冦寫勅與他欽此官逾其分方懷負乘之慙任非其才恐貽覆餗之患循墻莫避臨谷増危伏念臣章句迂儒栁蒲弱質歴官三十餘年恒在閒曹以文墨議論為事不自意以虚名承乏督理陜西馬政勅㫖叮嚀以廢墜既久之事責其更新興舉感激難逢之㑹奮勵無能之資倐寒暑之兩更曽涓埃之無補頃屬烽烟未靖邊塞戒嚴皇上過聴廷臣之言俾兼巡撫之寄才薄事煩力小任重臣猶自駭人將謂何近據固原環縣等處傳報炮火聲息不絶臣聞命不敢留滯即往各該地方欽遵一面調度防禦外然犬馬一寸之誠實有不能自隠者竊以天之降才各以區分君之用人必當器使臣深自忖揣實非巡撫之器豈有經畧之才況軍旅之事素未之學若勉强就列終不敢言他日致悞邊事臣之一身糜損不惜如一方生靈何此臣所以夙夜踧踖而不能自安者也且陜西馬政近年俱巡撫官奉勅兼理因是委任不専未見修舉以致三邊戰馬缺乏上厪宵旰之憂簡命専管督理臣雖不肖仰荷廟謨獨斷言聴計行以此得竭股肱之力臣初期以五年之後戰馬完足不煩公帑之財自壯邊兵之勢此臣矢心體國以忠於陛下之職分也今大綱初舉而節目未備宿弊雖祛而成效未臻乃復以巡撫兼督理馬政則仍蹈舊轍而於前日簡命専官之㫖似有不合該部久任責成之議亦復託諸空言况巡撫之職百責所萃臣非優於為政未免顧此失彼深懼獲罪名教舉其平生而盡棄之比臣所以欲言未敢而終不能已於言者也伏望聖明垂念陜西重鎮一方生靈休戚所關乞勅吏兵二部另推才堪經畧素諳軍旅之人巡撫地方防禦外患臣照舊督理馬政茶馬如此則委任得人邊備有託而臣初志獲成前勞不廢雖屏伏田野其榮多矣臣干冐天威無任悚懼待罪之至等因奏奉聖㫖楊一清才望素著簡命已定不允所辭該部知道欽此欽遵抄出送司案呈到部合就移咨前去煩照奏奉欽依内事理欽遵施行一為公舉将材以備擢用事兵部覆該本部職方司案呈奉本部送於兵科抄出欽差督理馬政都察院左副都御史楊一清題近准兵部咨該本部題該保國公朱暉題為預籌邊患戒謹武備以謹不虞事本部議行内外大小衙門若有着實堪為將領之人不拘在官在下開具實跡明白薦揚以慿訪察取用等因題奉欽依備咨前來臣惟兵者國之大事三軍之命實係於将故曰将非其人兵雖衆不足恃今在廷有明揚之典隨取隨足何患乏人豈假愚臣之贅但備員風紀有事邊疆凡所見聞寧忍緘黙然臣久官西土所知者陜西之事故所薦者惟陜西之人陜西延寜甘肅為防邊三大鎮而固原環慶皆敵人所嘗蹂踐之處盖自撤東勝以來河套内地巳非我有深山大沙險顧在彼故每嵗黄河将氷惴惴焉惟敵入套是懼萬一入套則延寜千里時防衝突寜夏外險反南備河腹裏之人不得安枕而臥矣以事勢論之先年深入厚獲未嘗遭挫則入套之謀恐所宜有况蘭州地方今年節被抄掠强弓徤馬直突金城關下我軍隔河相視不敢追逐臣嘗親歴愽訪衆口嗷嗷皆歸咎於守備怯弱士馬寡少所致竊恐彼將蔑我無能利我可掠萬一乘凍過河蘭金安㑹之區必遭荼毒密邇安定苑馬營數千官馬将無保障臣有職事不得不憂為今之計慎擇將領為急將領得人自足以繫兵民之心紓一時之急然陜西用武之地武臣可用者必多臣未深知者不敢輕舉臣所知者如陜西都司都指揮僉事房懐素諳邊務兼有治才軍政佐貳未究厥用署都指揮僉事陳善閑於師旅勇於戰鬭督修邊墻用違其材延綏定邊營把總都指揮同知閻綱知兵慣戰屢立竒功河州衛指揮同知姚震雄﨣過人御軍有法凡此四人雖未敢謂其為真將材在陜西武臣中號為出色臣所知者如此且人材難得必欲責備則目前無全人取其所長則㣲疵在所畧如蒙乞勅兵部再行訪察合無將房懷陳善閻綱姚震量加擢用委任其於邊務不為無補等因具本該通政司官奏奉聖㫖兵部看了來説欽此欽遵抄出送司查得先該保國公朱暉建議本部已經議奏通行各邊及内外大小衙門訪保堪為將領之人去後今該前因案呈到部看得都御史楊一清奏保都指揮房懷等四員堪為将領奏内又稱蘭州地方今年邊人突入官軍隔河不敢追逐衆口嗷嗷歸咎於守備怯弱查得蘭州守備係都指揮張愷既已怯弱不能守禦相應更換合無行令張愷退回原衛聽候量才别用就将楊一清今舉數内都指揮房懷代替張愷守備蘭州候命下之日本部照例請勅前去令其欽遵行事其所舉都指揮陳善等三員本部案候遇有相應員缺另行疏名上請簡任縁係公舉將材議換守備官員及奉欽依兵部看了來説事理未敢擅便𢎞治十八年二月初九日本部尚書劉大夏等具題本月十一日奉聖㫖是房懷着守備蘭州地方欽此欽遵擬合通行為此除外合咨前去煩照本部題奉欽依内事理欽遵施行一為計處官軍保障地方官馬事兵部覆本部職方司呈於兵科抄出督理馬政都察院左副都御史楊一清題𢎞治十七年十二月二十一日據陜西苑馬寺靈武監申為𦂳急聲息入境搶擄人口官私頭畜事據清平苑申據本院循環老人張義呈於本年十二月十七日䝉本苑差義同操丁邵興旺張驢兒楊三前去槩管地方哨探到於地名雙峯臺髙見堡據招募地方老人馬清報説本月十五日有招募新軍羅仲明等將各名下牧放官馬頭畜下堡飲水間忽被敵衆暗撲前來將羅仲明官馬二匹幼男二口馬三官馬二匹幼男一口曹貞保官馬一匹陳能官馬一匹共官馬六匹王繼名牛二隻殺死固原衛唐百户下軍餘周安楊文馬暹楊老軍搶去本衛軍餘沙威馬三匹等因本月二十八日又據本監申為𦂳急聲息搶擄等事據萬安苑申據本苑架塘操丁李海蘇廷茂任浩等報稱於本年十二月初七日被敵衆從草地進入本境打剌胡孫家堡碾盤掌沙井兒蘆草溝青川苦水等處搶擄將官私頭畜人口搶掠并殺死人口縁由呈報本苑至本月十二日又據軍餘謝恕招募軍人何敬等口報被敵衆又將虎家城若水板井等處一帶搶掠官私頭畜人口殺傷軍餘縁由各報到苑俱無告詞難以申逹自搶之後見得敵衆俱在本苑隣近地名澇池等處劄營暗行将隣近地方搶掠俱各不敢前來告報數目有碍申禀欲待被擄各軍告狀到苑之日申報誠恐遲悞理合先將被擄縁由申禀等因備申到臣查得陜西苑馬寺兩監六苑見今牧養官馬數多自敵衆入套傳報聲息以來節經通行收歛隄備為照黒水開城等苑有守備都指揮苖英領軍指揮郭遡等在彼又相離固原大軍不逺料不悞事其清平萬安二苑在固原東北一帶地方無軍防守萬安苑尤為孤懸誠恐自豫旺城徑窺該苑不可不慮防禦之䇿俱宜嚴謹已經手本備行鎮守陜西等處地方武安侯鄭英差官量帶馬步軍兵前去萬安等苑地方防守及通行守備領軍等官各嚴督防禦保障地方守䕶官馬去後今據前因㸔得清平萬安二苑俱係固原守備官所管地方又有鎮守武安侯鄭英在於固原駐劄不能遏絶防禦聽其長驅深入搶掠官私人畜見今該苑道路阻絶難以行勘除候聲息稍寧通查搶殺人馬的確姓名數目另行具奏外切照各苑地方固原平凉鎮原等處軍民雜處近自去年十一月以來敵衆擁衆在於韋州螺山住牧分掠腹裏西則半箇城回回堡海剌都東則自豫旺城徑掠萬安苑直扺馬剛堡清平苑地方或數百人或數十人少則三五人所至輒有搶殺不知的數自𢎞治十四年大舉侵掠之後未及三年軍民何辜重罹荼毒守備都指揮苖英領軍指揮郭遡等専在固原迤西防禦雖有奪回頭畜人口然不過十之一二而已東路甚是空虚有搶殺而無奪獲臣先聞官軍俱在西路萬一自豫旺城乘虚東掠以此節行鄭英計處量撥官軍東路防䕶寂無施行已而二苑官馬及馬剛堡地方軍民人口頭畜果被搶殺各該守臣固難辭責要其事勢亦有由然初螺山之賊竊伏半箇城久而不退河西之寇犯我靖邊者聲勢尤急苖英等只得在於鎮戎千户所西安州等處防守後賊分散醜𩔖隨處拆墻填溝假我逋逃為之鄉導乗隙而入我軍相離動輒數百里人馬有限顧此失彼勢亦不能掣兵東救借使苖英等聞馬剛堡等處有賊東還截殺亦緩不及事而西路之賊又乗隙而入矣即今春初馬瘦尚敢馳突倘河開不出夏秋時月草盛馬肥長驅肆掠各官似前顧此失彼非止官馬被掠平涼鎮原涇州一帶軍民将何保障必須選委専官管領軍馬於固原東路防守庶㡬責任有歸緩急可倚查得前逰擊都指揮楊敬所領逰兵三千員名除西安左前後三衛官軍九百五十員名見隨鄭英截殺及慶陽衛五百員名本處備禦外洮州衛二百五十員名岷州衛三百五十員名河州衛三百員名臨洮衛二百員名鞏昌衛二百員名秦州衛二百員名平涼衛五十員名見今散回本衛俱係挑選精鋭當此多事之秋若管領得人必能勦殺敵人保障地方訪得慶陽衛指揮黄正新陞都指揮空閒本官驍勇慣戰又熟知地里相應委用及照臣新築完清平苑彭陽城山川險固并萬安苑地方有虎家城李馬城等處俱堪屯兵防守如䝉乞勅兵部議處預行陜西鎮巡衙門如果敵衆在套河開不出前項地方急宜防禦合無行委都指揮黄正或另選驍勇慣戰如黄正者一員管領原選洮岷河臨鞏秦平七衛逰兵官軍共一千五百五十員名在固原迤東清平萬安二苑虎家城彭陽城一帶往來駐劄防禦截殺保障軍民守䕶官馬以遏衝要之處平涼鎮原之路在萬安苑地方駐劄之時行糧暫於環縣倉關支在清平苑地方駐劄暫於平涼府雄贍倉關支事寧官軍各回本衛領軍官員果能盡力𠞰殺另行録功陞用今後凡遇冬月防守河套照前施行永為定規免致後期失事仍行陜西巡撫將招商銀買等項糧草量撥於彭陽等城堡收受支放以便屯守固原守備都指揮苗英等專一在於西路防禦以遏其深入固原安㑹靜寧隆徳之路如此則聲勢聯絡而地方不至空虚責任専一而緩急無所推避若有十分𦂳急情事應該動掣應援又在主將臨時相機調度臣軍旅之事非其職業不當預聞但生靈休戚所係不忍坐視又事干官馬臣如不言恐將來為患未已徒竭其力以為寇資臣之罪責亦何所逃等因具本該通政使司官奏奉聖㫖兵部看了來説欽此欽遵抄出送司案呈到部㸔得都御史楊一清所奏除悞事縁由待查報至日另行外所據題稱陜西固原地方東西俱有賊情而東路無兵截遏被搶掠去官私馬匹人口頭畜并殺死軍餘人等西路彼時𦂳急官軍勢難東救欲将原選洮河岷等七衛逰兵官軍共一千五百五十員名行委都指揮黄正管領在於迤東地方截殺苗英等専在西路防禦把守一節縁楊一清擬奏前項縁由之時尚係督理馬政賊情正在彼處擾攘之際今警報已緩而身任巡撫正宜趂此閒暇及時整理武備合無本部仍行本官將所擬軍馬分定防禦地方委用領兵官員支給糧草去處上班放回時月與凡一應防禦機宜俱在議處停當依擬舉行務使隨處兵儲有備遇警戰守不誤仍將議處過一應事宜轉行内外鎮守官員知㑹應具奏者備由奏報縁係議處官軍保障地方及奉欽依兵部看了來説事理未敢擅便𢎞治十八年三月初九日本部尚書劉大夏等具題本月十一日奉聖㫖是着楊一清斟酌計處務要停當事體重大具實奏來定奪欽此欽遵擬合就行為此合咨前去煩照本部題奉欽依内事理欽遵施行一為預處邊儲以備𦂳急供餉事户部覆該本部陜西司案呈奉本部送於户科抄出欽差巡撫陜西等處地方兼督理馬政都察院左副都御史楊一清題節據整飭固原環慶等處兵備陜西按察司副使髙崇熙燕忠各呈繳查勘過沿邊倉塲糧料草束銀兩數目文冊到臣案照先為前項地方節被敵衆侵犯城堡搶掠人畜恐後動調軍馬防禦遏截未審沿邊一帶倉塲糧料草束有無積蓄充實可勾屯聚主客兵馬㡬箇月支用已經劄仰各官查勘的確數目備造手冊呈報去後今據前因查得各該邊倉糧料草束委俱缺少如固原蘭州俱係總㑹屯聚軍馬去處見在倉糧固原州止有九千二十一石九斗九升一合本處主兵共三千五百員名每月該支糧三千六十石蘭州見在糧一萬二千八百二十石一斗八升本處主兵官軍旗校共六千四百餘員名每月該支糧四千三百石俱僅可供三箇月之用倘若添調客兵將何支給其餘倉分或有糧無料無草或有料無草無糧或有草無糧無料或糧料草束俱缺有者僅支主兵不見贏餘無者目前告急後將何望及查得陜西布政司官庫銀止有五萬兩固原州倉先該總制尚書秦紘奏開引鹽收銀一十三萬八千七百九十餘兩近該巡撫都御史孫需行令兵備等官支出招商糴買糧草然分散城堡數亦不多且陜西天下要害之地固靖等邊又陜西要害之地八郡數百萬生靈之命所繫而缺乏至此今雖烽火少息套賊去留猶未可測縱使河開過套將來事勢尤有可憂盖自𢎞治十四年大舉搶掠之後彼既聞知設有總制大臣將以為修築邊墻増兵増糧事事有備以此小王子大衆不曽過河止是火篩等枝入套近日賊人分散醜𩔖潛謀剽掠隨處拆墻填溝如蹈無人之境各該大小領軍官員擁兵坐食未聞運一方畧以挫其鋒時有奸細潛出内地覘我虚實恐其蔑我無能知我無備將來糾合羣酋乗凍度河大舉深入勢須徴調延寧涼荘官軍以為内援若不先事儲蓄臨期缺乏未免穵運勞民貽患地方誠非細故臣惟圗事於平時者易應變於倉卒者難先年陜西為因不曽先事儲蓄及至入套以後動調軍馬奏開課鹽不知若干萬引運送官銀不知若干萬兩舉行納銀冠帶等項事例所得又不知其㡬何待其出套師旅既罷倉庫一空徒為乗時射利者之地而民遭戹運轉輸之苦至於闔門逃竄逮今比屋蕭然生理未復向使比嵗以来兵連禍結内變將作不知何以為計言之可為寒心邊報稍息上下相安遂謂無事儲蓄之䇿廢而不講頃者敵復入套烽火告急㑹計所儲在在不足相顧駭愕仰給朝廷幸而敵人悔禍逺遯設或潛伏河套經年不出乗秋大舉長驅深入縱然不惜府庫之財以充供軍之費而地方所出有限倉卒亦難辦給此皆失於先事儲蓄之過也且如每草一束平時價不過二三分遇急收買至七八分一錢而無措每糧一石平時價不過五六錢遇急轉輸民至費銀二三兩而不足此理明甚人豈不知其因仍玩愒良亦有故今之士夫任耳不任目惡聞人善而樂談人之過失寜倉卒而勞費人無非議平時招糴増糧増草則羣而譁之以為多事甚則疑其因以為利用是凡厥有位卑者矜矜自保茍免罪責尊者循循度日坐待陞遷有能實心為公家任事者寡矣臣聞昔者尚書周忱巡撫江南十有八年一應錢糧任其通融區畫致有紅陳貫朽之積百姓賴之至今以為美談彼固多才非當時委任之専且久何以至此使周忱官於近時以若所為不三二年非被排而去則循次而升矣臣竊恐議者因見延寜小捷地方稍靖遂置邊儲於度外萬一有警又將貽後時之悔深慮却顧不得不極言之查得先年户部擬奏充實邊儲事件非止一端雖出一時權宜中間有益無損經久可行者亦多至於開仕途濫進之門為罪人幸免之地所益者小所傷者大茍非門庭之敵亦正不須如此若發京師帑藏之財雖失居重馭輕之宜終成損上益下之美但京師儲蓄有限各邊仰給無窮恐非可繼之道求其獲利多而取效速者莫如開中引鹽為便盖𣙜鹽之利本為助邊果能絶私販之阻滯杜權貴之請求則生生無窮何憂不給伏望皇上俯念陜西關中重地邊儲缺乏太甚所宜急時預處乞勅户部合無於陜西開中兩淮等運司常股存積等課鹽百餘萬引及今招商於夏秋收成之後糴買糧料草束查撥固靖蘭州環慶各該邊堡屯駐軍馬缺乏去處上納仍要斟酌事情緩急如果盤踞在套盡收本色量寛斗頭使人樂趍不許嫌避誤事若無𦂳急事情又當酌量年嵗豐歉年豐有收則廣為招糴不厭其多如嵗歉收薄則量收一半本色以防目前之急仍存一半銀兩以為來嵗之圗免以不貲之財坐為營利者所得其他充實邊儲事宜擇其有益地方無損治體者為之大要使邊倉各有二三年之儲則遇警不至於告乏布政司常有數十萬兩之積則臨期尚可以有為此在巡撫督同布政司官通融處置次第舉行應具奏者具奏定奪居常勿習於玩臨事勿傷於急則事集而人不及知不必取旦夕之盈為張駭之舉重費其力以資勢利此愚臣迂腐為兵事謀兼為民事謀為治體謀之惓惓也巡撫本股肱之臣又得假便宜之柄何事不可為亦存乎其人耳茍非其人當易其位既授之任當責其成任者不疑疑者不任居其位弗事其事則將焉用彼相矣臣本菲才不堪負荷已嘗具本辭免未奉允命然堂堂天朝豈無真能為巡撫之人陛下慎擇而専委之久任以責其成不使有掣肘之慮如是而奉職不效不能先事預處以致臨期失錯重則身伏斧鑕輕則名削仕籍彼亦何所辭避哉等因具本該通政司官於奉天門奏奉聖㫖户部看了來説欽此欽遵抄送到司案查先該本部右侍郎顧佐題稱䝉差前往陜西三邊整理糧草乞要查照先年事例運送銀兩開中引鹽召納糧草運赴各邊𦂳要缺糧倉塲以備急用及本部近日奏開納銀冠帶贖罪等項事件行移巡撫衙門舉行等因本部查照議擬開中淮浙河東運司鹽課共一百萬引運送折糧等項銀共三十萬兩舉行冠帶等項事例催徴拖欠糧草子粒悉聽右侍郎顧佐㑹同彼處巡撫都御史整理如有不敷星馳奏來再行區處接濟等因具題奉聖㫖是欽此欽遵巳經通行去後今該前因案呈到部㸔得巡撫陜西都御史楊一清奏稱陜西地方固原蘭州環慶一帶糧草缺乏要開中兩淮等運司鹽百餘萬引召買糧料草束查撥各該邊堡屯駐軍馬缺乏去處上納一節縁本部近因侍郎顧佐奏請開鹽一百萬引送銀三十萬兩舉行事例催納拖欠等項通行陜西各巡撫等官公同整理計此時方纔到彼正是議處之際數月之後自有成效無憂匱乏今本官又奏要開中鹽引本難准擬但邊方積蓄以預為先以多為貴若趂今套賊逺遁年嵗頗收不行先事廣儲倘𦂳急調集軍馬倉卒何以為備豈可因延寜小捷地方稍靖遂置邊事於度外哉合無依其所擬再將兩淮運司𢎞治十五年分常股鹽一十二萬一千二百四十八引十六年存積鹽一十二萬八千七百五十二引兩浙運司𢎞治十六年分常股鹽一千八百六十八引一百五十二觔十七年分常股鹽一十三萬三千八百九十六引一百三十二觔四川鹽課提舉司𢎞治十五年分額鹽五萬引長蘆運司𢎞治十六年分存積鹽三萬六千一百六十一引常股鹽二萬八千七十三引一百二十六觔共鹽五十萬引本部行移整理糧草本部右侍郎顧佐并奏帶郎中呂賢陳䇿及彼處巡撫都御史楊一清等將先今二次開去引鹽并運去銀兩定立斗頭召商糴買若有不足再查靈州并西漳二縣變買鹽課銀兩一併召買仍要斟酌地方緩急積蓄有無如某處糧料有餘草束不足則先整理草束如某處草束有餘糧料不足則先措置糧料某處係𦂳要急缺在所當先某處係頗緩稍充在所當後年豐有收則盡數招糴本色不厭其多年歉薄收則量收一半本色以防目前之急仍存一半銀兩以為來嵗之圗務使處置停當邊儲充實緩急有備斯為得䇿事完通行造冊奏繳仍造青冊一本送部查考其開去引鹽合用勘合底簿并流通文簿差官馳驛前往南京户部印編完備勘合徑送陜西布政司收候納獲倉鈔至日辨驗填給其底簿并流通文簿轉發各運司并提舉司收掌如遇各商賫到勘合比對字號相同照例支給縁係預處邊儲以備𦂳急供餉及奉欽依户部看了來説事理未敢擅便𢎞治十八年三月十六日本部尚書韓文等具題本月十九日奉聖㫖是着各官上𦂳趂時整理務要處置停當邊儲充實毋致臨時缺乏欽此欽遵擬合通行為此除外合咨前去煩照本部題奉欽依内事理欽遵施行一為更替守備官員以保障地方事兵部覆職方司呈奉本部送兵科抄出巡撫陜西等處地方兼督理馬政都察院左副都御史楊一清題照得陜西固原環慶俱係𦂳關要害之地而固原土漢雜處内有監牧馬匹所繫尤重守備官員必得其人則緩急可倚地方無虞切見守備固原都指揮僉事苗英騎射雖長才非統馭事多利巳人心不服近日敵衆入境搶掠屢有可乗之機俱被失悞守備環慶署都指揮僉事劉雄年老志衰聞敵怯懦以致下人玩慢威令不行所據各官若不早為更替向後有警必然悞事貽患非輕如䝉乞勅兵部合無將苗英退回原衛閒住劉雄行取回京仍於陜西都指揮中推舉謀勇素聞曾經薦舉者上請簡用作急前來守備操練軍馬防禦邊境地方幸甚其各官失事情罪通候查勘明白另行具奏定奪等因具本該通政使司官奏奉聖㫖兵部知道欽此隨該守備環慶署都指揮僉事劉雄奏為年老官員不堪任職事𢎞治十二年十二月二十一日奉勅命臣守備環慶等處地方欽此除欽遵任事外切縁臣先因𢎞治十四年大舉深入騷擾環慶固靖等處地方搶擄臣統領人馬節次出戰往來追趕截殺睡臥冷地又被天降猛雨淋漓寒暑不均致生疾病調治稍可近於𢎞治十八年正月二十四日忽又得患風病左癱右瘓見今睡床不能動履臣見年六十一嵗例該革退縁臣係軍職守備地方領軍官員誠恐誤事如䝉准奏伏望皇上軫念邊方重務乞勅該部推舉精壯驍勇官一員前來任守環慶地方容臣回家養病等因具本該通政使司官奏奉聖㫖該部知道欽此欽遵通抄送司案呈到部㸔得都御史楊一清所參守備固原都指揮苗英才庸貪利環慶署都指揮劉雄衰老怯懦俱各不堪守備要於陜西都指揮指揮中推舉謀勇素聞曽經薦舉者前來更替一節竊照固原環慶地方要害所係誠非庸劣老病之人所宜居守既該巡撫官員查㕘前來而數内劉雄亦自陳老疾求代相應更換合無通准所奏本部仍行都御史楊一清行令固原守備都指揮苗英環慶署都指揮劉雄各還原衛致仕另將應襲兒男保送替職所據各該守備員缺候命下之日本部就於彼處相應官員内推舉上請簡命二員請勅前去各令代替守備前項地方縁係更替守備将官及奉欽依兵部知道該部知道事理未敢擅便𢎞治十八年三月二十日本部尚書劉大夏等具題本月二十三日奉聖㫖是欽此欽遵擬合通行除外合咨前去煩照本部題奉欽依内事理欽遵施行一為推舉領軍官員事兵部覆該本部送於兵科抄出巡撫陜西地方兼督理馬政都察院左副都御史楊一清題查得陜西都司西安前後等衛原選固原備冬官軍一千二百員名先年俱有都指揮一員管領備禦士馬精强甚得其用後因添設逰擊将數内精鋭官軍挑選去訖又無空閒都指揮可委近該鎮巡官員止委指揮一員管領見在馬步官軍七百餘員名臣近日巡邊㸃檢得前項人馬中間大半疲弱不堪全無紀律徒費芻糧有名無實除將把總指揮邢仁責治革退領軍外縁固原要害地方通邊隘口數多臨冬河凍時月達衆難保不入河套潛謀劫掠備禦之䇿所宜加謹况逰擊巳經革罷所據前項官軍相應歸還原擬備冬之數分布防守但本處查無空閒堪以領軍都指揮等官若仍令指揮把總則體勢大輕難以行事推訪得西安左衛指揮使任璽西安後衛指揮使李佐俱弓馬熟閑諳練戎務堪以委用如䝉乞勅兵部上請於各官内定擬一員照例以都指揮體統行事管領前項官軍一千二百員名遇冬在於固原地方防守聽調截殺河開放回仍要不時㸃閘訓練遇有警報一體調用若果能練兵如法行軍有紀勞效著聞緩急可倚聽鎮巡等官奏保或量陞署職或推補守備以旌其能如此則官軍不至徒設芻糧不至浪費等因具本該通政使司官奏奉大行皇帝聖㫖兵部㸔了來説欽此欽遵抄出送司案呈到部㸔得巡撫陜西都御史楊一清奏稱西安前後等衛原選固原備冬官軍内有選充逰兵者仍歸備冬之數要將指揮任璽李佐定奪一員管領備冬一節縁固原路通畨人地當衝要其備冬官軍必須得人管領緩急庶可調用今指揮任璽李佐既該楊一清奏保前來縁本官親臨在彼必其真知各人才有可用合當准其所奏伏乞聖明於任璽李佐二員内簡用一員候命下之日本部仍行都御史楊一清轉行本官照例以都指揮體統行事管領前項兵馬前去固原地方備冬務要時常㸃閘勤加操練遇警聽調截殺仍聽鎮巡官員節制本官尤須持亷秉公愛惜軍士待後果能操恤軍士修舉職業聴巡撫官員奏薦量陞都司署職縁係推領軍將官及奉大行皇帝欽依兵部㸔了來説事理未敢擅便𢎞治十八年六月初一日本部尚書劉大夏等具題本月初二日奉聖㫖是任璽着管領備冬官軍欽此欽遵擬合就行為此合咨前去煩照本部題奉欽依内事理欽遵施行一為經畧𦂳要地方邊務事兵部覆該本部送於兵科抄出巡撫陜西等處地方兼督理馬政都察院左副都御史楊一清題行據整飭固原等處兵備陜西按察司副使髙崇熙呈奉臣劄付前事備奉查得魏王城即豫旺城開設平邊千户所城池先已修完衙門未曽盖造原擬南方衛分清查解到見在固原衛帶管食糧軍人二百一十四名近年招募新軍九百四十八名内見在本城操守八百一十九名存留固原衛入伍食糧一百二十九名與南方衛分清查解到軍人共有一千一百六十二名俱發本處操守可勾一所之用及查本所比照鎮戎千户所事例合用正千户一員副千户二員所鎮撫一員百户十員吏目一員司吏典吏各一名新設倉分應作新安倉名色合用大使副使各一員攅典一名該用鑄造平邊守禦千户所印信一顆百户所印信一十顆夜巡銅牌三面新安倉條記一顆及㸔得見在暫取管束新軍寜夏中衛中所副千户汪昭生長邊方頗知地里險易軍士艱苦相應存留管事等因據此案查先據副使髙崇熙呈送總制陜西并延綏寜夏甘肅等處軍務户部尚書兼都察院左副都御史秦紘文巻一宗為公務事准兵部咨該本部題該總制軍務尚書秦紘題照得葫蘆硤口魏王城為固原襟喉之地葫蘆硤口已蒙開設鎮戎守禦千户所惟魏王城先年勘議停當及臣勘亦相同况臣已將魏王城城池衙門修葢完備及行據陜西布政司將該解南方四處軍人清查解到二百二十三名俱發固原衛羈管聽候平邊所選官至日發去收伍此處委的𦂳要又况田土寛廣肥饒無人耕種年久荒閒如蒙乞勅兵部計議合無照依原議開設衙門鑄降印信銅牌銓除合用千户百户鎮撫并吏目倉官管束前項解到軍人仍各給撥田地耕種三年之後安挿停當照例徴納子粒仍乞行陜西布按二司清軍官員嚴督各該府州縣清軍官将原奏頂兑軍人逐一清解本所編伍防守庶使軍士得安於鄉土而地方有賴於保障便益等因具本該本部官欽奉聖㫖兵部㸔了來説欽此欽遵查得先為前事該巡撫陜西都御史余子俊題稱葫蘆硤口并魏王城各有古城一座俱路通寜夏韋州等處係敵衆出没要害地方要於葫蘆硤口添設鎮戎守禦千户所魏王城添平邊守禦千户所及將陜西該解南方福建等處逃故軍士行文清出各不必起解一名頂兌一名就發二所守禦等因㑹同部院等衙門議擬題准通行勘議修理頂兌去後續為禦寇防奸等事該陜西鎮巡等官太監歐賢等題稱魏王城衙門未修軍士尚未解到其葫蘆硤口城池衙門倉場已修完備頂兑新軍已有七百餘名乞要鑄降印信銅牌合將固原等衛空閒千百户鎮撫賈泰等一十二員并添所吏目一員改除本所管事及立新豐倉合選撥官攅三員名鑄降印記管理等因本部議得合無准其所奏并將魏王城原擬開設平邊千户所衙門上𦂳修整完備奏報具題奉憲宗皇帝聖㫖是欽此巳經通行欽遵去後今該前因案呈到部看得總制尚書秦紘題稱所屬固原衛葫蘆硤口已䝉開設鎮戎守禦千户所銓官降印惟魏王城先年勘議停當即今城池衙門修完乞要銓官降印并行清軍官員將頂兑軍清解一節查係先年題行開設事理别無定奪但未審原擬軍士有無齊備輒難定擬銓官降印合無本部仍行本官再行陜西布政司查勘除十六年以前清出各府未解江南衛分軍士應該存留本省者已經本部奏准俱發苑馬寺牧馬外要見先年原擬陜西與福建等四布政司彼處照名頂兌軍士實有若干名若是已勾一所之用就查合用官員千百户鎮撫應於何衛所改調所設倉分作何名色鑄造印記銅牌該用若干顆面通行查議停當備由具奏前來以慿依擬上請施行縁係查處開設所分保障地方及奉欽依兵部看了來説事理未敢擅便𢎞治十七年三月十三日本部尚書劉大夏等具題本月十五日奉聖㫖是着查議停當來説欽此欽遵備咨本官已經通行欽遵查勘外又文巻一宗該副使髙崇熙抄䝉尚書秦紘鈞帖前事據寜夏中衛中所副千户汪昭呈稱本所見有正副千户八員俱各空閒乞要改調豫旺城新設平邊千户所管事等因為照查取别衛千百户鎮撫等官未到案候具奏照得寜夏中衛雖在河外平敵所在裏但縁本所新收募軍多係寜夏人民今本所空閒千户員多帖仰本職查照汪昭如果相應取赴豫旺城暫且管束新軍操守待候取齊其别官員一併開奏施行等因在巻為照固原州豫旺城開設平敵守禦千户所查係節奉欽依事理近因總制尚書秦紘取囘未經查議具奏已經劄付本官查勘計處呈來施行去後今據前因臣督同兵備守備領軍等官親詣踏勘得豫旺城地方相離韋州螺山不過百餘里實固原襟喉要害重地敵衆大舉入攻勢必經由於此况地土廣衍肥饒給軍屯種且耕且守最為得䇿在祖宗朝因河套無事地稱腹裏議不及此及至成化年間屢次侵犯都御史余子俊始昌言之既有成命因循不舉者垂二十年𢎞治十四年由此深入固原平涼俱被搶掠尚書秦紘乃申明舉行之臣今受命經畧最為當務之急前項城池俱已築完但衙門未曽建立糧草未曽積蓄及所擬開設平敵守禦千户所官員未曽選出軍人未盡收伍已行兵備等官查支固原等州倉收貯地畝鹽引等項銀兩委官收買木植燒造磚瓦起盖衙門倉厫期在今秋完備又將固原衛帶管食糧軍人二百一十四名存留固原收伍招募軍人一百二十九名通發前去與見操守招募軍人八百一十九名共一千一百六十二名各着伍收操儘勾一所之用不須别議照依秦紘原擬給撥附近地土領種三年之後安挿停當照例徴收子粒臣将今年洮河等衛所易茶馬及苑馬寺多餘種兒馬内撥五百匹給與數内有丁力軍人領養騎操與其餘步軍相兼防禦河套有警於備冬官軍内摘撥二千員名擇委驍勇都指揮一員管領在彼按伏是謂扼其吭而遮其衝東可截遏大小打狼山侵掠萬安清平二苑之寇西可應援葫蘆硤口半箇城深入固原安㑹之路仍行陜西布政司將該運固原腹裏城堡邊糧料草量為改撥及招商糴買每年積糧三萬石料三萬石草三十萬束務勾主客兵馬三千員名一嵗支用各徑自施行外但本所合用千百户鎮撫等官腹裏衛分别無空閒官員堪以改調况草創之區其初未免荒凉恐非腹裏之人所樂要害之地遇警全資戰守又非腹裏之人所堪强而驅之必不盡其用若於延寜甘肅新陞空閒官員内查調彼有量移之喜我得慣戰之人公法私情兩皆利便及照寜夏中衛中所副千户汪昭前該尚書秦紘准令行取見在彼處操守頗得人心相應存留管事并新設吏目倉官吏典鑄降印記銅牌等項查與鎮戎千户所事體相同相應依擬具奏如䝉乞勅兵部議處合無將平敵守禦千户所應設正千户一員副千户二員鎮撫一員百户一十員内見在操守副千户汪昭乞准調補外一十三員乞查延綏寜夏甘肅近年有功新陞官員定擬調除前來管事并行吏部銓除所吏目一員新設新安倉大使副使各一員陜西布政司撥本所司典各一名攅典一名及合用夜巡銅牌三面鑄造千户所印信一顆百户所印信一十顆新安倉條記一顆俱照例奏請施行保障地方防禦邊境甚為有益等因具本該通政使司官奏奉大行皇帝聖㫖該部看了來説欽此欽遵抄出送司查得先該總制尚書秦紘奏前事巳經本部查議題准行勘去後今該前因案呈到部看得巡撫陜西都御史楊一清奏稱勘處過豫旺城原擬開設平敵守禦千户所衙門并新設新安倉俱各修完要乞改調千百户所鎮撫及除授吏目倉大使副使等官鑄造銅牌印記及行布政司撥吏前去管理一節既該本官勘議處置停當合無准其所奏仍行本官將應設千百户等官除見在領軍操備副千户汪昭外仍少一十三員轉行延綏寜夏甘肅鎮巡官員於近年新陞有功官内從公用心查訪守為俱可相應官員就彼定擬仍将各官籍貫姓名具奏前來給與文慿令其到任管事本部仍行吏部除授吏目倉大使副使各一員禮部鑄給印記銅牌付順便人員䝴送陜西都司給與本所各官收掌應用其撥軍給地措置馬匹取撥吏攅悉照原擬施行仍督令兵備守備守巡等官将前項新設衙門官軍時加寛恤凡一應屯糧之利設備之宜當與舉者即與整理舉行務使人安其地足為逺圖縁係添設𦂳要邊方守禦衙門官軍及奉大行皇帝欽依該部看了來説事理未敢擅便𢎞治十八年六月初三日本部尚書劉大夏等具題本月初四日奉聖㫖是欽此欽遵擬合通行除外合咨前去煩照本部題奉欽依内事理欽遵施行一為存留守城官軍以防邊患事兵部覆該本部職方司呈於兵科抄出巡撫陜西等處地方兼督理馬政都察院左副都御史楊一清題據守備蘭州地方都指揮僉事張鎧呈為邊務事據甘蘭二衛指揮使司呈奉鎮守甘肅地方總兵官署都指揮僉事劉勝劄付准巡撫右副都御史畢亨手本准兵部咨該本部題看得甘肅鎮巡等官左少監楊定等所奏秦州等衛原在甘凉輪班官軍係先年奏准之定例𢎞治十四年固原有警調來截殺乃一時用兵之權宜今固靖已無聲息前項官軍仍該發回備禦况甘肅一鎮孤懸河西畨夷接境一路城堡在在要衝敵兵出没無時必須官軍防守即今報有近邊敵情正在𦂳關用人之際合無鋪馬賫文與陜西鎮巡等官再查前項秦州等衛官軍果係先年奏兊輪戍之數近年暫留固靖備禦即便督發前去河西原定地方操守本部仍行甘肅鎮巡官一體移文催調此後固原等處若有重大聲息河西地方無警仍許徴調䇿應如是托故遲延致悞邊事責有所歸縁係調取防邊官軍及奉欽依兵部看了來説事理未敢擅便𢎞治十七年十一月二十一日本部尚書劉大夏等具題本月二十四日奉聖㫖是便鋪馬䝴文與陜西鎮巡等官着上𦂳督發前去操守不許遲延悞事欽此欽遵㑹同鎮守太監楊定等議得前事合行催調劄仰本衛即將前項官軍係該班數内者上𦂳督發起程毋分星夜赴河西原定地方操守係下班數内者督令於四月初一日一齊赴邊換班内有事故之數即為撥補務在齊足不許遲延悞事等因具呈到職照得蘭州地方軍民原額納糧田地俱在河外北去十里極臨邊境漫通寇路實為𦂳關喉襟要害重地本城縁無冬夏防禦軍馬誠恐有警缺軍捍禦備由呈䝉總制軍務尚書秦紘鈞帖將奏准存留固原防守甘蘭二衛原調去甘凉備禦軍餘李勤等一千二百九十員名准兊甘蘭二衛冬操軍餘張海兒陳讓等馬匹騎操就在蘭州按伏冬夏常川防禦䝉此除遵䝉兊領馬匹騎操防禦外今據前因切照本境自舊嵗七月至今正月以來累被敵衆侵犯入境本年正月二十五日敵衆從河北紅城子地名醎水河口突出為害今又據沙井驛聽探夜不收暢陳良走報敵人五十餘騎從薩哈勒圗往下吊行走不時傳報後山聲勢重大潛伏窺探出没為患及照前項軍餘李勤等先已兊領張海兒等馬匹騎操今欲遵奉督發縁張海兒等俱係例該二月春煖放回屯種之數一時有警仍前無軍防䕶未免貽患地方乞為照詳具奏勘處地方險易明白將掣回官軍存留本地冬夏常川防守便益等因具呈到臣查得接管巻内先准兵部咨前事該前巡撫都御史孫需㑹同鎮守太監劉雲議查得秦州等衛甘凉輪班備禦官軍二千餘員名係總制尚書秦紘奏留固靖備禦見今分布各城堡相兼陜西人馬操守近聞侵犯固原靖邊等城地方聲息炮火馳報不絶欲遵來文督發前去不無顧彼失此已經㑹題乞照舊將秦州等衛甘凉備禦官軍存留固靖防守去後今據前因看得蘭州黄河以北俱係本州衛軍民徴納民屯糧草地土天順年間以前設有巡河軍馬冬夏常操以此不敢侵犯承平日久議者視為腹裏將甘蘭二衛食糧正軍盡數摘撥甘凉等處備禦以致敵衆乗虚逓年俱從寜夏中衛凉州荘浪墩空出没竊伏本州紅栁灘等處地方不時馳突侵擾為患兵備守備等官多縁此獲罪落職𢎞治十七年七等月内節次侵入邊境搶掠本處無軍截殺以此總制尚書秦紘將奏留固原防禦官軍李勤等一千二百餘員名准令兊給馬匹在彼冬夏常川按伏防守今甘肅鎮巡衙門奏要照舊徴調輪班備禦巳經該部題奉欽依前來明命赫然孰敢不遵土皆王土亦何敢自分彼此但事勢有緩有急地方安危所係不容隠黙切照陜西固靖環慶等處地方若河套無事止是備冬惟蘭州地土多在河外敵兵出没無時四時皆當防禦與甘凉等處事體不異近據鞏昌府捉獲奸細數人細加盤詰供稱小十王去年十二月内搶掠靖邊囘到河套灣差伊同先年搶去漢人張喇嘛小真達子王喇嘛小三名前來躧㸔肅府雙井兒馬牛又新修馬營馬匹有軍馬無軍馬㸔守要待草飽馬壯時月大衆去搶等情即今沙井驛等處見報聲息正當加謹隄備查得本處甘蘭二衛官軍止有守墩守把河橋把門局匠夜不收共三百五十七員名别無食糧見操正軍其屯田軍餘例該遇冬操練方支行糧春煖放回農種辦納糧草若將李勤等官軍依文督發則本處城池空虚遇警将何支持委的顧彼失此且本州内有宗室外多商販人煙輳集畜産蕃盛比之他處不同相離畨人蹂躪之地止隔黄河一水去年敵騎在於鹽場堡大岔溝等處搶掠直薄東金城關離州城不數百步總制尚書秦紘聞警遽調逰擊楊敬都指揮烏銘陳善指揮郭遡等前來䇿應我軍既集彼巳遯去徒費芻糧緩不及事師旅既還警報復至此葢無常操按伏官軍之故也况狡黠變詐多遣奸細入境窺探恐其知我本城無軍腹裏備冬官軍又各疎放萬一糾合畨衆數千突至河岸拒我城門斷我河橋分散抄掠蘭金安㑹等州縣所傷必多此事理所有豈待氷橋結凍而後可入哉夫智者防患於未形敵人識變於㣲眇厝火積薪之勢君子危之看得河北鹽場堡離河橋五里定火城去河七十餘里俱係敵衆出没𦂳關去處若得官軍在彼按伏以逸待勞庶可遏其深入如䝉乞勅該部議處合無将甘肅原奏掣囘官軍除秦平等衛七百六十餘員名見今固靖巳無聲息欽遵督發前去備禦有警仍前徴調䇿應外其甘蘭二衛官軍李勤等一千二百餘員名照舊存留本處地方聽守備官提調常川操守遇有侵犯聲息即便督率渡河相機截殺趂今四五月間量起軍民人夫修築定火城及添築沿邊隘口空缺去處墩臺臣當親督守備領軍等官統率軍馬在彼防䕶就以揚兵耀武沮其邪謀待修理完備將前項官軍内八百員名分為兩班選擇驍勇指揮一員管領於定火城按伏餘四百員名亦分兩班委官管領於鹽場堡按伏至河凍時月再將陜西備冬官軍摘撥前去協守冬修盖倉厫將原坐派本州倉夏秋税糧馬草并招商糴買糧料草束量撥在彼收積支用如此則敵騎無從而入豈徒蘭州并腹裏臨鞏地方倚以為重而莊浪紅城子一帶聲息應援亦有所資其於甘肅一鎮不為無補前項事情臣屢嘗親歴廣詢博訪得之最真有懷欲吐者久矣今受命經畧若復因循不言他日誤事殃民罪將焉逭除行令守備等官暫留前項官軍防守聽候外等因具本該通政使司官奏奉大行皇帝聖㫖該部看了來説欽此欽遵抄出送司查得先為防邊該甘肅鎮巡等官太監楊定等奏要將存留秦州等衛原在本鎮備邊官軍照舊調囘輪班備禦已該本部題准督發前去操守外今該前因除将坐派本州倉夏税秋糧馬草并招商糴買糧料事宜備行户部查議外案呈到部看得都御史楊一清奏稱蘭州地方四時當防與甘凉無異其甘肅鎮巡官奏調原總制尚書秦紘所留固原備禦官軍除秦平等衛七百六十餘員名相應督發前去要将甘蘭二衛一千二百餘員名照舊存留蘭州一節縁備邊官軍雖有定例而地方緩急亦當斟酌定奪今都御史楊一清親歴蘭州地方身受經畧責任既稱勘得蘭州比甘凉尤為要𦂳要將甘蘭二衛官軍李勤等存留在彼相應准其所奏合無行移都御史楊一清将秦平等衛七百六十餘員名督發前去甘凉備禦李勤等一千二百餘員名聽其存留與夫修築城隘分投按伏等項事情悉依擬施行仍將前項督發存留縁由行移甘肅鎮巡等官知㑹縁係處置邊務存撥官軍及奉大行皇帝欽依該部看了來説事理未敢擅便𢎞治十八年六月初六日本部尚書劉大夏等具題本月初八日奉聖㫖是欽此欽遵擬合通行為此除外合咨前去煩照本部題奉欽依内事理欽遵施行一為使功不如使過事兵部覆該本部送於兵科抄出巡撫陜西地方兼督理馬政都察院左副都御史楊一清題據整飭固原等處兵備陜西按察司副使髙崇熈呈稱固因環慶靖邊蘭州地方俱係𦂳闗要害去處先年被敵衆入境蹂踐不止一次後因深入得利不曽遭挫勢愈猖獗今冬或又踏氷入套則前項地方難保不遭其害見今戰守之具雖已次第修舉但急無相應領軍官員各該守備各有信地其往來截殺隨機應援必得驍勇善戰之人緩急乃可倚仗訪得縁事神木㕘將陜西都司都指揮僉事烏銘驍勇過人慣經戰陣先問充軍後留固原總制衙門聽調殺賊西安左衛指揮使楊宏韜畧熟閑亷謹可取此二人者俱曽守備固原甚得人心當此多事之秋使功不如使過若將二人矜原其罪使之領軍備禦截殺必能忘身徇國著立竒功且使將官平素操持學好之人知所激勸興起本職叨任兵備地方安危所係不敢緘黙呈乞具奏定奪等因具呈到臣查得烏銘先充延綏東路㕘將後被神木縣申該巡按御史燕忠參稱畏縮提問未結楊宏先任西安左衛指揮使被薦守備固原以都指揮體統行事𢎞治十四年敵衆大舉侵犯搶殺軍民丁口數多問擬守備不設充軍後該總制尚書秦紘論奏兵部等衙門題奉欽依免發配所送秦紘處聽調殺敵及查訪得烏銘楊宏俱曽守備固原軍民信服與所呈相同照得臣受命經畧邊務巡撫陜西地方節該兵部題奉欽依或廣收其人物以資其方畧或重懸爵賞以鼓舞人心等因備咨前來夙夜競惕往來各邊城堡講求戰守事宜盡臣之心不敢有遺慮竭臣之才不敢有遺力顧本書生不諳軍旅惟在廣蒐人材庶可兼收羣䇿況邊敵形勢近益驕横㒺所忌畏無厭之欲草枯河凍之時難保不再入套陜西官軍多勇徤可用惟在統領得人見今都指揮指揮中求如烏銘之有勇善戰楊宏之知兵練事者誠不易得烏銘被㕘不知其詳聞之輿論似無根據若楊宏之事臣所深知𢎞治十四年大舉入邊號稱數萬彼時固原無溝墻險阻之隔不能阻遏况花馬池一帶地方主客兵馬營壘聨絡固原等處文武重臣節鉞並臨俱不能遏其方來之鋒截其既歸之路而獨以守備不設之罪坐一楊宏在法相應原情未協雖經總制尚書秦紘論辯荷䝉恩㫖免發配所聽調殺敵但彼乃統馭之才非匹夫之勇終身聽調亦恐無功使當運籌折衝之任必當有以自贖臣聞古之名將以敗北之餘成克㨗之勲者甚多未嘗終身棄絶况當𦂳闗用人之際使功不如使過誠如副使髙崇熙所言如䝉伏望聖明軫念邊事至重用人為急乞勅兵部查照尚書秦紘所論烏銘楊宏事情再行訪察計議當此與民更始之日合無特降綸音湔洗録用烏銘暫復原職於固原等處領軍防禦截殺楊宏比照花馬池㕘將馬隆等事例量為降級聽臣委用随軍殺敵有功一體陞賞彼䝉天地再造之恩必能効死竭忠而邊臣聞之知朝廷愛惜將材亦皆有感發興起之志矣臣又竊思比歲申嚴軍法凡失機者罪不赦所以振起頽綱作新士氣臣何人斯乃敢妄言獨念此二人者委的才有可取情有可矜此外踪跡相同者雖多𩔖皆常流臣不敢泛舉等因具本該通政使司官奏奉聖㫖兵部知道欽此欽遵抄出送司查得先為去不職以禦邊冦等事該巡按陜西監察御史燕忠題稱分守延綏東路右㕘將烏銘縱敵長志貽患地方要乞行提究問選官更替該本部查議相應提問前項員缺照例於相應武職内推舉二員上請簡用等因節該奉孝宗皇帝聖㫖是欽此又為保全將材等事該總制尚書秦紘題稱訪得分守延綏東路縁事參將陜西都司都指揮僉事烏銘才有可取此時正當用人若使朝廷失此良將誠可惜也等因又為軍務事該太師兼太子太師英國公張懋等題節該奉聖㫖將官堪以領兵管操的兵部還多方訪舉五六員來看欽此該本部從公訪舉得陜西都指揮烏銘等俱各生長邊方曽經戰陣堪以領兵管操合無本部鋪馬䝴文前去各該鎮巡官員星馳差人行取各官給與明文令其馳驛前來以慿奏請委用具題奉聖㫖是欽此又為私役軍人濫給驛傳囘還原籍等事准都察院咨該欽差大理寺等衙門少卿等官何鈞等㑹勘問過固原地方失事縁由開稱指揮楊宏犯該守備不設被敵侵入境内擄掠人民者律減等杖九十免杖充軍本院㑹同兵部詳議楊宏委的過多功少難准折贖具題節該奉孝宗皇帝聖㫖楊宏編發邊衛充軍欽此欽遵備咨送司巳經將楊宏編發山丹衛充軍去後續為陳言邊務事該總制尚書秦紘題稱查勘過指揮楊宏平素操履公亷軍民信服失事之愆不全由於本犯乞要從寛且稱褒死可以勵生使功不如使過等因本部議擬具題奉孝宗皇帝聖㫖是楊宏免解配所送秦紘處聴調殺賊欽此已經通行欽遵去後今該前因案呈到部除烏銘已該本部奏奉欽依行取來京聽用難又别為定奪外所據楊宏原係西安左衛指揮使為事問發充軍該總制尚書秦紘奏留在於軍前聽用人數今都御史楊一清又奏前因前後論薦彼此相符必是本官原問充軍未得其情所負才調堪濟邊事伏望皇上俯察二臣論薦之言比照情輕律重之例将楊宏斟酌情罪特賜定奪候命下之日本部行移都御史楊一清隨宜委用調度殺敵仍轉行楊宏務要仰思録用之意勉圖補報之忠若果建功邊境保障地方非特前愆可贖而陞賞亦有期矣縁係巡撫官員保用為事充軍將官及奉欽依兵部知道事理未敢擅便𢎞治十八年八月十九日本部尚書劉大夏等具題本月二十日奉聖㫖是楊宏免充軍照原職降二級聽楊一清隨宜委用欽此欽遵擬合就行為此合咨前去煩為查照施行一為謹服用以崇聖徳事工部覆都水清吏司案呈奉本部送於工科抄出欽差巡撫陜西等處地方兼督理馬政都察院左副都御史楊一清題𢎞治十八年五月初七日奉司禮監印信揭帖本年四月十六日本監太監陳寛等於乾清宫欽奉聖㫖恁司禮監寫帖子去説與陜西鎮巡等官劉雲等知道今該内織染局奏行彼處變染各色銀鼠皮如帖到日爾等即便責委髙手人匠如法染造務要顔色鮮明該用物料從宜處置毋得指此擾民有了差委的當人員管送前來毋得違悮欽此欽遵本監今將奉到㫖意事理備云前去陜西鎮巡等官太監劉雲等欽遵施行隨該内織染局印信揭帖計開䝴去染造各色銀鼠皮拾㭍様柘黄𤣥色真紫大紅深青福靑明黄鵞黄鸚哥緑栁靑翠藍栁黄桃紅天靑明緑墨緑出爐銀等因奉此除遵奉外臣仰惟皇上仁覆寰宇視民如傷一命令之頒未嘗不寓恤民之意故今變染銀鼠皮張數亦不多在物不為費於人不為勞且有不得指此擾民之諭盖日月之明洞見萬里恐彼假公營私之人不能無指一科十之弊故耳然臣區區一寸之忠所患有不在於勞費者臣惟自古明王慎徳服食器用必循常度不貴異物作竒技淫巧者有罰所以謹好尚為天下先也為治莫大於禮禮莫明於服服者身之章視食與器為尤重天子之服自祭祀朝享至於燕閒皆有成式製皮為裘取其輕煖而巳若銀鼠之皮變染一十七色何所取義黄帝堯舜垂衣裳而天下治以五彩彰施於五色作服未聞一十七色也傳曰紅紫不以為䙝服惡其間色不正且近於婦人女子之服也臣觀一十七色之中𩔖多不正至於出爐銀極矣臣愚不知祖宗朝有此服色制度否若創自今日無關名分之等威又非黼黻之絺繡徒傷竒巧以累儉徳臣竊為陛下惜之此舉誠出宸衷亦偶未之思耳然恐喜事貢諛之輩争為異色異服矜竒衒巧或自兹始其所關係甚不細夫人君一身風化本原於凡事之營為物之創造有不合於禮不當於義者天下化之其端甚㣲其流漸不可遏况陜西三邊根本重地頃屬兵荒民窮財盡陛下盖嘗捐内帑以紓外患不經之費加之此地尤非所宜道路相傳恐将來源源不巳聞者以為憂且織染有局天下之良工萃焉染造之藝非陜人所長臣懼無以稱㫖稽之典禮㕘諸時勢無一而可臣是以冐昧上言伏乞聖明乾斷合無將前項銀鼠皮張不必變染已變染者差人䝴進不必再發更乞明示徳音服色宜遵常制今後有以竒技淫巧動上心者悉屏弗用仍置之於法使天下之人知朝廷不作無益不貴異物恭儉之徳有光清明之治無損豈徒陜西一方人民之幸哉臣叨任撫巡與聞兹事心有未安不敢自隠干冒天威無任隕越待罪之至縁係謹服用以崇聖徳事理未敢擅便等因具本該通政使司官於西角門奏奉聖㫖銀鼠皮已染的未染的都着送赴來京該衙門知道欽此欽遵抄出送司案呈到部擬合通行為此合咨前去煩照奏奉欽依内事理欽遵施行關中奏議巻四
