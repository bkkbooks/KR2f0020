body:
  text: 關中奏議卷十三明楊一清撰提督類一為斬獲犯邉回酋首級事欽差提督陜西三邉都御史臣楊一清謹題為斬獲犯邉回酋首級事據平羌將軍鎮守甘肅地方總兵官左軍都督府都督僉事姜奭呈嘉靖四年五月十九日據守備永昌行都指揮事指揮使馬雲呈本月初三日一更時分據山丹夜不收翁全傳報回賊三百餘騎從本境白石崖東走備報整兵隄備間節䝉鎮守總兵官姜奭㑹議鈞帖為屬畨斬獲回賊首級事又為哨報回賊聲息事備行本職速將本城馬步官軍并土兵舍餘督令整㮶軍火器械以備回賊入境堵截調用及絡繹差人逺為哨探回賊棲止處所一面統兵相機截殺一面飛報鎮城調兵䇿應䝉此續䝉巡撫都御史寇天敘明文亦為前事備行職等整㮶兵馬遇警相機截殺及差乖覺夜不收分投出境哨探毋致誤事蒙此行間續據永昌衛呈據經歷司呈抄蒙守巡道案驗亦為前事備行本職精選兵馬以備征戰等因初十日又蒙鎮守總兵官姜奭親統鎮城兵馬隨賊聲勢前來涼州適中地方調度㑹同巡撫都御史寇天敘分布副總兵逰擊守備等官并職等各統所部兵馬速便前去南山一帶通賊路口按伏截殺及差督軍夜不收錢靈保等傳諭職等務將前賊或邀截歸路或設伏出竒跟襲蹤跡務期成功以靖地方除遵依差人哨探整兵待報間十二日午時據差哨四溝打班夜不收范保保報十一日酉時瞭見回賊二百餘騎在於本溝牧馬使賊一人步行登山瞭望本役來報據此本職當即統領本衛馬步各操土兵并各官下舍人家丁共八百餘員名各帶軍火器械前去追襲戌時兵至西沙溝又據差哨劉家莊夜不收童駱報十一日子時前賊到於本莊圍繞越過莊牆居人俱各上墩固守止將牛隻搶趕回往饅頭山去訖隨據饅頭山夜不收李永亦報本日天明時候爪見前賊北往南行徑奔西畨溝行去督軍夤夜趨奔到於考來口堡地方十三日未時迎據原差夜不收張克敬報本日巳時瞭見回賊二百餘騎在於東石門駐劄得報本職統領官軍分為二路至次日黎明時候兵至東石門趕上前賊內有頭目一人張打旗號擊鳴銅鼓率領衆賊撲來迎敵令知漢語一賊稱言我是大頭目托克托穆爾領頭哨人馬前來後頭還有多的人馬來裏本職因見山險申嚴號令督令官軍指揮張經等奮不顧身一半衝彼之前一半擊彼之後各用鎗打箭射鏖戰三十餘合其賊腹背受敵見我官軍勇猛方才四散敗走乘勝追殺就陳斬獲首級三十六顆奪獲原搶頭畜并賊馬夷器等件欲再窮追恐墮賊計掣兵回至考來口堡駐劄查報首級間隨據被虜走回夜不收陸益查認得一大首級約有五十餘嵗左眼枯瞎係賊首托克托穆爾首級及查在陳射死旗軍餘丁六名射死官軍土兵下馬一十三匹征傷官軍四十一員名十五日統兵回城除將首級并賊馬夷器等件聽候解驗并將奪獲原搶頭畜召主認領仍行永昌衛查勘賊經地方此外有無被虜人畜徑自開報理合具呈照驗等因到職案查先准分守肅州右參將雲冒手本為屬畨斬獲回賊首級事據普爾咱族畨人哈布爾等供報本年三月初一日有回賊一百前來撲搶被畨趕上斬獲首級二顆乞請施行四月二十三日卯時又據甘州差哨古佛寺夜不收段興三報二十一日行至孤山河撞遇回賊將本役捉綁到於雪達巴見了回賊頭目問說甘州人馬有多少我是頭哨人馬後面還有多多的人馬來裏搶的你漢人種不的田用鐵繩將興三拴絆見得營內回賊約有五百餘騎夜晚興三乘賊睡熟得脫來報據此職等㑹行本鎮各城分守守備操守等官整兵隄備仍差人絡繹逺為哨探及具題外初三日辰時又據白石崖坐塘夜不收薛文一報初二日巳時瞭見回賊三百餘騎空馬一百從匾都口徑往東諤尼卾齊透永昌地方行去職等議瞭此賊奔往東行不犯涼永必犯莊浪西寧必須各路分投截殺方克𠞰滅議留太監董文忠防守鎮城本職隨賊向往追𠞰本年五月十一日准巡撫都御史寇天敘手本照得本院四月二十九日按臨莊浪五月初一日准分守莊浪西寧副總兵魯經手本准鎮守總兵官姜奭手本為哨報聲息事據甘州差哨古佛寺夜不收段興三所報回賊五百從肅州境外移來我邉山後雪達巴駐劄為照此賊謀為犯邉旦夕難測宜當整兵隄備擬合通行為此除本院兼程赴鎮及具題外合用手本前去煩將鎮城兵馬整㸃齊備遇警統領截殺及差乖覺夜不收分投出境哨探前賊向往回報以憑㑹處准此本職統領兵馬到於涼州地方與巡撫都御史寇天敘相㑹初十日未時又據永昌差哨古廟兒夜不收周黑子報本日巳時瞭見回賊一百五十餘騎從西南栁溝前來往北透古廟兒達巴行走據報職等㑹議調度堵截行分巡僉事李孟旭精選各城兵馬隨處應援管糧右參議王汝舟僉事周汝勤備辦糧餉往來供給分守莊浪副總兵魯經兵備副使陳鼎防守西寧莊浪左副總兵趙鎮在於甘州山丹遏賊西奔之路遊擊將軍嚴鎧在於古浪鎮羌一帶把截右副總兵周尚文守備馬雲在於涼永南山緊要地方設伏撲剿間續准分守莊浪副總兵魯經手本為訪探賊情事抄䝉臣鈞帖訪得西域回賊要在本年五月內復來甘肅地方為患速行職等各要慎守封疆嚴斥烽堠整搠兵馬加謹隄備多差的當人役各逺哨探果有侵犯消息大小將領率領精兵相機戰守徴調鄰境官軍協力剿逐不許推避畏縮失誤事機亦毋得輕率寡謀墮賊奸計若賊勢衆大飛報軍門以憑發兵䇿應施行䝉此又經備行各該將領遵依隄備去後今據前因職㑹同鎮守太監董文忠巡撫右僉都御史寇天敘議照吐魯畨酋蘇勒坦莽蘇爾先於正德十一年間糾合各種番夷前來犯我肅州官軍被其殺害地方遭其荼毒大衆既去仍留大頭目托克托穆爾率領二三百騎在我地方剽掠無處不到擾攘二年間始回去嵗蘇勒坦莽蘇爾糾合二萬餘賊謀取甘肅後雖遭挫遁歸復遣托克托穆爾領三四百騎在我地方擾害蓋此賊驍雄貪很熟知我山川險易故大衆雖去仍敢復來深入我疆場捉我哨瞭人役問我兵力虛實搶掠我莊堡頭畜背天逆理亦已甚矣乃今天厭其惡仰仗朝廷威靈軍門號令方略所以守備官馬雲乃能統領官軍奮勇對敵賊首就戮餘黨失勢在陳斬獲首級共三十六顆奪獲頭畜賊馬旗號夷器數多使回賊大遭挫衄吐魯番衆聞之未必不因此喪氣將來窺覦之心犯邉之舉或可少沮也及照斬托克托穆爾首級雖據夜不收陸益供認是實惟恐不的行仰陜西行都司督令見監沙州夷犯綽埓本及先年搶去吐魯畨肅州衛鎮撫程翥并捉去走回夜不收段興等辨認是的取具不致扶同結狀在官除將各首級轉發斷事司收候復驗奪獲馬匹器械就賞原獲有功之人以作鋭氣牛隻已該守備馬雲召主認領訖及將陳亡旗軍舍餘人等各量給官銀一十兩以為埋葬之資并重傷官軍各分别輕重量給銀兩布匹以備醫藥獲功為首者各量賞三兩銀牌一面段一匹為從者一兩銀牌一面布二匹先示激勵及通行各副參遊擊守備操守等官仍爪探敗散餘賊再加剿殺及具題外再照托克托穆爾土魯番大頭目今被我軍斬首歸營以雪我地方十數年被害之恨比與尋常功次不同如䝉軫念極邉重鎮作養軍氣之始合無將領兵守備官馬雲及斬托克托穆爾首級百户蔡忠比照節年斬獲賊首事例奏請越次升賞其餘為首為從及陳亡征傷領軍等項人員照例奏請升賞優恤庶有功者將來知所奮發而勉圖補報矣等因具呈到臣案照先據鎮守甘肅總兵官署都督僉事姜奭呈前事已將各官斬獲功次具題外今據前因為照總兵官姜奭初報之時亦稱斬獲首級中有大首級一顆係回酋大頭目托克托穆爾臣以未經查勘恐似在先蘇勒坦莽蘇爾之誤止將斬首數目具奏今既該鎮巡官查驗是實比之别項斬獲委有不同參看所呈歷敘各官分布調度勞蹟皆其職分辭涉張大事則頗真但守備永昌行都指揮事指揮馬雲提一旅之孤軍破數百之强敵斬獲既衆渠首伏誅與百户蔡忠俱該殊録及照節據走回人口及沙州夷人之言回賊姦謀誠未可測正宜激勵將士期收大功以保地方且功賞自出朝廷乞勑兵部查照臣及甘肅鎮守官先今奏報早為施行庶使邉軍有所感發興起緣係斬獲犯邉回酋首級事理為此具本順差承差楊鸞親賫謹題請㫖一為敵衆出沒事題為敵衆出沒事據平羌將軍鎮守甘肅地方總兵官署都督僉事姜奭呈前事嘉靖四年四月二十六日准分守涼州右副總兵署都指揮僉事周尚文手本本月十五日巳時據在城東門樓直日軍人崔伯伯走報瞭接城東十三里鋪并大河驛墩各舉煙三把燒柴堆一座放炮一箇備報本職急統在城堪征馬隊官軍把總指揮使徐威等四百員名驟馬前去迎火追截後令把總指揮唐佑等管領步隊官軍襲蹤應援兵至十三里鋪迎據靖邉驛夜不收王忠閻家溝墩夜不收盛全各報本日辰時瞭見敵衆四五十騎東北前來到中壕外因壕阻遏將壕外種田人牛搶往東北復回原路紅栁溝地方去訖馳至大河驛又據舊腦墩夜不收嶽興馳報本日寅時爪見敵衆馬蹤一路約有二三百騎從本墩上空穵壕進境透往土塔兒靖邉驛地方去訖未曽回還據此急督官軍從紅寺兒過壕徑趨舊腦墩穵壕口處所堵截歸路午時馳驟至彼前敵已過邉壕官軍馬匹促弱大半不能馳走本職傳諭收後指揮丁杲催督弱馬官軍在後前來應援本職摘統好馬官軍徐威并千户侯林等馬户經過壕外追上前敵四五十騎迎來衝敵本職督軍一擁向前撲斫前敵迎射數箭彼見官軍勇猛將所搶牛羊斫傷一半並人口頭畜盡行丢棄其衆敗走本職督統官軍復追前去至地名閻王溝地方壕內又有前敵三百餘騎穿戴盔甲撲來射斫一處本職見得官軍止有二百五十餘名離城一百三十餘里兵寡敵衆申嚴號令督勵官軍下馬結營兩面靠住溝灣兩面被敵攻衝軍用挨牌鎗炮弓箭排定自午時戰至未時數十餘陳後有指揮丁杲率領弱馬官軍共一百五十餘名下馬結營前來奮勇䇿應前賊摘分少半迎敵射斫本職那營一處彼見官軍奮勇夾攻齊力死戰方才稍退我兵合為一處且戰且行移至壕邉倚墩相拒戰至酉時又有指揮唐佑急領步兵將近灰塵大起敵見我兵漸增彼此俱有中傷數多方才退遁欲再深追況離邉壕窵逺天晚兵孤沙大馬弱恐墮其計當差夜不收張安定等密覘敵向往掣兵方回至二更時馬步官兵俱到暖泉營安歇據把總指揮使徐威呈查得就陳射斫身死軍人二名吳景朱晟并大河驛千户侯林馬户卜子英二員名中傷官軍一十一名射死官馬三匹走死一匹射傷一十三匹隨營奪獲原搶男婦樊佑等二十四名口通共牛羊三十八隻仍差夜不收齊成馬户費廣等查得戰場斫傷牛七隻羊九隻收回敵箭五百三十一枝十六日兵回靖邉驛駐劄十七日據原差張安定等爪得前敵由大草灘徑透扒沙逺遁去訖本日掣軍回城除將牛羊查給失主認領並收回敵箭發庫收候聽驗仍委官前去所經地方查勘此外再有被掠人畜明白徑自通行開報外合具手本乞請施行間五月二十一日又准分守涼州右副總兵署都指揮僉事周尚文手本本月初九日辰時據東門樓直日軍人張五走報瞭接城東十三里鋪墩舉煙二把燒柴堆一座整兵間隨據探哨青石硤夜不收陳貴等馳報初八日未時瞭見敵衆灰塵一路約有三里窵逺從東小海子往西大草灘地方行走據報得此本職先統涼州堪征馬隊官軍把總指揮徐威等三百餘員名并接管甘州都指揮趙經守備鎮畨行都司指揮使胡玢遊兵千總指揮趙軻等各部好馬官軍共有七百餘員名前去迎火追敵傳令步操千總及弱馬官軍指揮唐佑等管領步軍繼後應援兵至大河驛地方迎據紅寺兒夜不收封記兒馳報敵衆三十餘騎從東前到紅寺兒填穵壕口內敵一十餘騎過壕進境因見兵馬灰塵來急復過壕外往南去訖得此急督官軍趨彼追逐馳至地名亂冢子追見前兵回往頭墩原路奔走襲蹤前至乾湖地方南北溝內突出伏兵三四百騎穿帶紅黃盔甲兩面夾攻齊來衝敵職督官軍各用弓矢銃炮鎗刀挨牌一擁向前撲斫射打賊見官軍勇猛中傷敵衆人馬數多方才退走復追壕邉沙窩又有伏兵三百餘騎聚齊一處仍來攻敵職見前寇勢衆督令官軍下馬結營戰至午時敵見遊擊將軍嚴鎧統兵繼後步兵灰塵接連來近前敵徑過邉壕出境仍往大草灘地方去訖欲再窮追况臨邉外沙大賊衆恐墮姦計兵馬掣於頭墩營住劄隨據把總指揮徐威等呈查得征傷軍人李保兒等六名射死軍人何達等馬九匹沿途走死于定等馬六匹射傷尤旺馬一匹收獲達箭二百三十五枝當差夜不收吳清等哨前敵仍往扒沙地方去訖又令夜不收羅寧等襲其向往因已逺遁本職㑹同遊擊嚴鎧掣軍回城本月十一日辰時據原差夜不收羅寧等爪得前敵於青石硤栁溝等處住牧本役回還供報得此照得前敵去嵗由苦水墩大明沙二處經過被我涼州聚有調到各路主客官軍奮勇斬獲首級奪獲馬牛頭畜數多前敵大遭銼衄遁去莊浪山後五方寺一帶今復那營見今蘆溝青石硤等處住牧今遣精騎敵人六七百騎從境外扒沙夤夜前來因我墩塘并探哨人役哨報早知官軍急趨追敵中傷前敵數多不曽進境遭銼未曽得利而歸緣其情譎詐變態不常况此青草長茂賊馬臕壯糾衆復讐旦夕難測除督屬整兵嚴謹隄備及行涼州衛委官前去所經地方查勘有無被掠人畜明白徑自通行開報合具手本乞請照驗施行等因到職㑹同鎮守太監董文忠巡撫右僉都御史寇天敘議照得凉州二次敵衆入境右副總兵周尚文領兵追剿其奪獲人畜情固可原而損折兵馬責亦難辭除具題外呈乞照驗施行等因具呈到臣照得前項敵衆竊伏西海地方殘害我屬番寇掠我邉境去年冬間被回賊驚散一半越過官路之北被各鎮官軍相遇斬獲數多今在北者自今春以來醜類數百騎在於莊浪涼州五方寺蘆塘等處往來寇掠或出或沒聚散不常已經節行各該將官慎固封疆嚴斥烽堠秣馬勵兵嚴備以待如遇侵犯即便督率官軍相機剿逐重則飛報鄰境官軍發兵䇿應不許逗遛畏縮貽患地方亦毋得輕率寡謀墮其姦計及節經具題外今據前因看得涼州地方二次敵衆入境右副總兵周尚文雖稱領兵追剿奪獲人畜未聞斬殺之功亦有損折之罪參詳所呈某處夾攻某處拒戰張大聲勢自敘勞伐無功有過欲蓋彌彰似難逃責但本官去年冬間斬獲敵衆數多近日回賊入境又曽被其斬首遁歸功可掩過况前項敵衆數雖不多俱係精兵健馬涼州士馬寡少又復不精糧儲缺乏軍無鋭氣以此難於成功若不大為祛除地方未免被其荼毒又恐旦夕與西海邊寇相合愈難支持除督令各官比前加謹防範外如䝉乞勑兵部查照將臣近日所上計處用兵機宜之數早為議處施行及行巡按陜西監察御史將涼州賊火地方查勘有無被掠入畜隱匿别情徑自具奏外緣係敵衆出沒事理為此具本順差承差楊鸞親賫謹題請㫖一為傳報回賊聲息事題為傳報回賊聲息事准巡撫甘肅地方都察院右僉都御史寇天敘揭帖嘉靖四年六月初五日准分守肅州右參將雲冒手本開送原差沙州回還通事夷人馬能等四名并沙州隨來探親番人一名到官發據肅州衛撫夷指揮劉雲等㑹審得通事馬能等供稱本年四月初一日䝉差同夷人圗嚕台布巴爾嘉額森四名騎牽馬匹賫帶犒賞於本月十一日前到沙州撫集頭目特穆爾圗卜台等到彼宣布朝廷恩威順生逆死殺伐利害諭畢當將賞賜段布茶斤交給各番有特穆爾圗卜回說比前我祖翁翁手裏朝廷討饋了衛分印信輩輩把後門出力氣來如今吐魯番王子蘇勒坦莽蘇爾力氣大我的軍馬小沒奈何跟著他來到甘肅州地方為了歹又到魚海上搶了外國回來到於山後留下頭目托克托穆爾領人馬在山後住著教他常往漢人地方上去搶捉漢人問他聲息王子往吐魯畨去了有頭目雅穆拉領人馬見在哈密住著裏老爺每計較要殺他便多收拾些軍馬來到沙州我每做一箇氣力殺他去若軍馬不來便差著人來我特穆爾親往吐魯畨和王子謫和去如今若人馬不來又不謫和差人來調我每往肅州城根前坐去做一箇氣力若不用我便老爹每也不要差著人來我也不差著人去有回子說到七八月裏馬壯了的時候和黃敵人還要往漢人地方上來裏這是實話我每先差了綽埓本等三箇人報去了一向不見來有能又見回子一十五名在彼向問特穆爾等回說他是頭目雅穆拉差來他先前搶的漢人馬匹著沙州的人隱藏下了因這是差他每來追尋隨有特穆爾等將回子叫來與能相見認係吐魯番小頭目實德亨等有能數說你王子如何領人馬來到甘肅搶殺各夷回說有王子和頭目每計較因見漢人殺了大頭目和卓塔濟迪音兄弟和卓實濟爾和舍音華珊父子二人收拾了人馬故來報讐到了肅州城根前把和卓塔濟迪音射死後頭我每打魚海上回來王子回往吐魯番去了雅穆拉領著人馬在哈密坐著裏我每人都怨裏若漢人和王子和了便好若不和了便到七八月裏馬壯了的時候有雅穆拉領著哈密北山衛拉特敵人還要往漢人地方上去裏得說有回子將尋出原搶漢人男婦馬匹於本月二十六日起身往哈密去訖本役等欲再停住探聽圗卜等有無向背實情恐回夷傳報雅穆拉得知將能等拘執有失大事於是同日起程并帶隨來探親都督日郭拉部下番人一名多爾濟急速前來所供是實等因連人開送到院復審相同等因開具揭帖到臣查得先據分守肅州等處右參將雲冒呈前事嘉靖四年三月初七日據守把嘉峪關千户曹敞呈驗送沙州頭目特穆爾等差來報事畨人綽埓本等三名賫遞畨文一紙到官發據肅州衛申准掌印指揮李堂撫夷指揮劉雲關依䝉督同百户錢岫陳剛令通事馬勝㑹審得畨人綽埓本係都督日郭拉弟沁巴克博囉係頭目特穆爾部下番人俱供係罕都左衛沙州住牧舊年七月裏有蘇勒坦莽蘇爾領大勢軍馬來到沙州把頭目特穆爾圗卜叫到根前說你們收拾一千軍馬跟著我漢人地方上搶去若你不跟我們去從你往那裏去罷特穆爾圖卜因見他的氣力大我每氣力小沒奈何收拾了軍馬跟著他來到肅州東南城角底下著漢人把大頭目和卓塔濟迪音射死䭾到臨水堡子根前捉了一箇苦峪的人阿納巴有我綽埓本饋他說大城上射死是和卓塔濟迪音若漢人軍馬多便出來和他厮殺少便不要出來你往老爹上稟去我把他黑地裏放著稟來了軍馬起身到了甘州南門上又把一箇大頭目阿拉克巴圗爾著神鎗打死了䭾到南山裏打開了一箇堡子回子搶東西去來後頭漢人軍馬來了殺了三二十箇穿甲的回子又殺了一箇不知名大頭目回到營裏做了三箇棺材駱駝上䭾著來看見漢人的軍馬來的多了就起營連夜到了西寧魚海搶了巴拜岱回來到了沙州蘇勒坦莽蘇爾差了頭目托克托穆爾瞎子領著三百人馬順山回往山後避靜去處住著餵馬不要教沙州人投順著肅州去你往漢人地方上常去搶捉住漢人問他甘肅州有無調到人馬著人報著來我先差雅穆拉和黃敵人的軍馬先去搶殺收田禾的漢人頭畜有王子蘇勒坦莽蘇爾兄弟三箇的大軍馬隨後來報他老子一般的大頭目和卓塔濟迪音讐去裏把搶去的乏弱馬頭口都丢饋我沙州的人把我們的但是臕壯的馬牛羊驢駱駝都換著去了又收拾了二百石多糧麥送饋了蘇勒坦莽蘇爾領著軍馬先去了留下雅穆拉帶人馬在沙州守著種田蘇勒坦莽蘇爾到了吐魯番把他的兒打發著哈密裏來了又差了三箇人來到沙州把雅穆拉帶人馬這二月十五日調著哈密裏去了特穆爾圗卜差我綽埓本沁巴克博囉三箇人饋了一紙文書老爺上遞來了教我們快些兒回來有事便還要打發著人來裏不敢說謊供的是實據此除將發下番文一紙令畨僧結斯多卜譯云欽差鎮守衆老爺面前遞文書罕都左衛沙州的王子頭目特穆爾圗卜賞巴爾嘉且琳沁巴桑巴鄂特五箇頭目人民遞文書緣故我在前永樂年間往後嘉靖年間往前邉上地方坐來如今底下的回子莽蘇爾王子岱人出來沙州衛上頭抱著生的人殺了儹的錢搶我沒奈何肅州衛投降著去饋了賞賜又饋了倉裏的糧我們的人多過不的日子回往沙州去了有莽蘇爾王子欺負我裏頭去不放進來我上打饋城沒有打饋說都督日郭拉肅州去時沒有放進去王子莽蘇爾王子軍馬來裏說著聽見了人民肅州上來不放進來回坐了又說圗嚕台通事上話說著去來回子的岱人來裏說來不要報怨我又說蘇勒坦莽蘇爾王子來便要殺我裏我答裏來了老爹每不要怪我我沙州的人主子朝廷老爹每主子我說回子殺我的不是不殺我便守著沙州坐如今老爹每心裏怎麼算計著裏黑漢兒人上有人便算計著你上頭回子的軍馬沒數兒的雞年裏來裏回子的人馬要不來便老爹每心裏算計著回子的進貢的放出來便好放不放老爹每知道要緊要緊又說老爹每謫和便好不謫和便不好的來裏這一夏裏軍馬多來裏我沒有說的不要說要回子上軍馬來便如今來一來不來便你上頭軍馬來裏你們知道我特穆爾蘇都魯克繖阿巴兄弟阿倫本身上段子衣裳饋穿著沒奈何的說多說著去來又說莽蘇爾王子上跪著黃達子上領著去來我不跪便西寧坐三年我要肅州逃走著去想著來上頭回子托克托穆爾監著裏有五百人都督日郭拉的兄綽埓本等三箇人著去了前頭差的人上沒有饋賞賜如今差的人上好賞賜饋他鈞㫖知道路上害怕著去的人沒有三月十七日的文書三月三十日要我的人到那裏好歹有是麼話再說著來朝廷是天一般老爹每是日月一般據此審供據謫備關到衛今將前項緣由同原發番文一紙理合申繳施行等因備呈到臣已行甘肅鎮巡官撫處防禦去後今該前因竊照吐魯番蘇勒坦莽蘇爾先於正德十一年近於嘉靖三年兩次率領畨賊寇我甘肅殘壞我邉堡掠殺我軍民地方被其荼毒瘡痍困苦所不忍言雖被官軍追逐出境不曽大遭銼衄狼子野心必無懲戒今據沙州夷人供稱回酋莽蘇爾已往吐魯番留下頭目雅穆拉見在哈密要到七八月馬壯之時領哈密北山衛拉特黃達子等賊往漢人地面搶捉一節容或有之觀其先差頭目托克托穆爾領人馬三百在我邉住牧乘間寇我永昌地方見被官軍斬殺此其明驗但沙州頭目特穆爾圗卜等係中國屬畨受恩深重去年回賊入寇已率衆跟隨侵犯肅州去順從逆罪不勝誅今所供報言若效順心實難測恐其自知身負滔天之罪恐將來無容足之所設為張大之辭窺我賞賚之利又或吐魯畨酋見我閉關絶貢與之通謀窺我意向亦未可知觀其言將進貢的放出來便好及謫和便好不謫和便不好等語大略可見且此回窮凶極惡神人共怒去嵗甘肅蘇勒坦莽蘇爾不曽伏誅而大頭目和卓塔濟迪音阿拉克巴圗爾及不知名大頭目三人俱死於箭射鎗打之手彼雖强悍豈得不懼而近日所遣頭目托克托穆爾精鋭先鋒初入我境即被斬獲其後一犯涼州而副總兵周尚文禦之再犯山丹而指揮王佐禦之俱有斬首奪獲之功其鋒必銼其氣必沮况蘇勒坦莽蘇爾已回吐魯番止留頭目雅穆拉在於哈密料是未敢深入前項供報之言恐未可信然王者不治邊人固亦不必深究臣惟禦戎無上䇿自治為上䇿攘外無良計安內為良計今甘肅地方兵馬寡少錢糧空乏城堡無金湯之固戰馬無充廏之良原額戎伍逃亡接踵而其名徒存見在軍人飢寒困憊而其形徒在已且未治何以治人內之不安何能攘外兵法曰無恃其不來恃吾有以待之無恃其不攻恃吾之不可攻且今西海逋寇鴟張跋扈竊伏我邉莊涼劇賊狶突豕奔剽掠官路比之回賊尤當急備已經節行彼處鎮巡副參遊擊等官各須申明紀律訓練士馬修葺城堡整備器械振威武以警外敵之心明賞罰以作我軍之氣又節行陜西布政司將該解甘肅一鎮邉儲銀兩分投差官督發過河行令管糧參議僉事等官趂收成時月作急糴買糧料草束派發各城堡上納并將近日户部奏准開中各運司課鹽三十萬引內撥發七萬五千引彼鎮召商報納及候戶部委官運到銀兩內再發五萬兩前去足可供應但馬匹缺少之甚近日莊浪副總兵魯經節呈賊情緊急無馬出戰已將先任總制右都御史李鉞奏帶用剩馬價寄放陜西苑馬寺庫內銀二萬七千七百三十九兩內先支五千兩給與西寧莊浪官軍買馬騎征但查甘肅鎮城涼州等處馬匹尚缺數多近添設遊擊將軍李義官軍三千員名就該馬三千匹雖云於茶馬苑馬寺牧養馬內俵給終恐不敷及行據延綏總兵官都督彭楧呈開延綏一鎮原額官軍操馬三萬七千五十匹實有馬一萬五千六百六十三匹事故倒折馬一萬五千八十八匹近雖追補查給不過十之二三見今大敵在套用馬為急雖未能盡復原額之數亦合量為查補臣近日所奏兵部題准送到馬價銀五萬兩又該専備召募之用用剩銀兩聽給陜西固原等處官軍買馬騎征勢難及於他鎮如䝉聖明憫念甘肅孤懸重地即今回賊各處俱有警報及延綏正在緊關防禦套衆之時乞勑兵部再於太僕寺馬價內動支五萬兩分給甘肅延綏二鎮令將缺少馬匹買補完足軍勢自强軍威日振蠢兹套衆是惟不來來則必無善歸之理甘涼地方欲調陜西延寧軍馬䇿應防遏臣當酌量套衆聲勢緩急輕重隨宜調發不敢顧此失彼以貽後艱緣係傳報回賊聲息事理為此具本専差承差孫傑親賫謹題請㫖一為問革姦官謀求掌印賣放邉軍等事題為問革姦官謀求掌印賣放邉軍科取局匠月糧等事嘉靖四年七月初五日據陜西按察司副使韓士竒呈問得犯人㬊灝招年四十嵗係陜西都司固原衛指揮僉事原籍湖廣景陵縣人髙祖㬊英從軍洪武十一年殺賊有功歷升府軍左衛左所實授百户故曽祖㬊保替洪武三十年升本衛後所副千戶永樂元年間升本所正千户老疾祖㬊貴替故父㬊進襲成化元年地名潘村山寨等處節次殺賊有功升本衛指揮僉事老疾灝替前職狀招𢎞治十七年七月內灝違例用財謀求守備事發該刑部山西清吏司將灝問調固原衛帶俸差操遇䝉𢎞治十八年五月十八日詔書一款在京在外文武職官有因緣事及公錯并公事詿誤等項特㫖降調并為民充軍者該部通行查出調者復還原職降者俱照原品先任外用為民者冠帶閒住充軍者放回為民彼時灝要得回還原衛不合將前詔條內調者復還原職擅自改添作調衛者復還原職字樣移關本衛灝又恐本衛先問發今未到署印指揮趙昶不從備銀五兩送趙昶枉法接受准關給文起送原衛䝉兵部查出灝係原奉欽依調衛人員比與前項詔書事例不同將灝差人押發固原衛照舊帶俸差操聽候參提及備行都察院類行陜西巡按秦御史轉行陜西按察司提問間灝又營求督牧官馬正德三年六月二十日灝見得催提緊急不合將原領牧官馬一匹拐騎逃躲不行出官本司止將趙昶提問枉法雜犯絞罪准徒五年立功解發訖照提灝又不合仍前不肯出官正德六年十月內灝方才投衛解赴本司問擬雜犯斬罪查係遇革招呈巡按周御史奏行本司正德七年五月內䝉將灝仍發固原衛帶俸差操間正德八年正月內有順天府昌平州未到商人劉浩劉桂將伊報中靈州鹽課司鹽引一千七百道分與在官李朝陽今故父李宣支鹽李宣就將伊上過糧草銀六百八十兩兊與劉浩等支領訖正德九年正月內李宣因少在官胡璽先未故兄指揮胡琮本利銀三百二十兩無還就將前引內一千五百道憑在官馬鑑趙連管見付與胡琮准還前銀訖彼時計算胡琮該貼李朝陽銀八十兩一向未與李朝陽將情告䝉固原兵備道追還訖後李朝陽將前剩鹽引二百道立約順帶與胡琮家人胡秀名下待候人支鹽分用正德十三年十月內䝉分巡關西道差灝前往寧夏等處公幹回還不合一向不行赴衛正德十四年十月內胡琮令胡秀將前李朝陽父李宣准還鹽引一千五百道并李朝陽順帶鹽引二百道憑在官單鎰作中立約與寧夏小鹽池未到商人康贇合夥支鹽分用已支鹽四百九十七引未支鹽二百三引灝前罪遇䝉正德十六年四月二十二日赦宥訖本年八月內灝方才赴衛訖嘉靖元年䝉帶管關西道李卿給與灝官銀一百兩每兩定易料豆二石四斗赴固原州倉上納灝將前銀內八十一兩二錢五分陸續糴豆上倉外銀一十八兩七錢五分該易豆四十五石灝自合給付與人糴買料豆赴倉完納為當不合故違軍職有犯監收盜滿貫律該斬罪者發邉方立功五年滿日還職仍於原衛帶俸差操事例將銀侵欺入已嘉靖二年四月二十六日灝用財禮娶故軍路朝義在官妻杜氏為妾後灝因見杜氏淫蕩受財賣與在官朱趨為妾在官郭永知證本年十一月內䝉固原兵備道明文行灝暫管雜造局事嘉靖三年五月內放支局匠月糧灝因前侵欺官銀料豆未完要得乘此科取完納就不合向在官局匠黨經等共九十名每名科取料豆五斗共四十五石補數上倉完納訖本年八月內劉浩因見胡琮病故不合巧計將前李朝陽父李宣准還過胡琮鹽引揑作伊故兄劉淮寄在胡琮家內被伊弟胡璽冒名支鹽虛情狀赴兵備道告批灝問報灝將胡璽并康贇未到男康國冒行拘到官灝不合不審的實止憑告詞將前支鹽引一千二百三道斷給劉浩領訖比時康國冒畏懼刑責備銀二兩綿布五匹絨襪一雙驢一頭鹽十石送灝不合索收入已在官楊塔孩知證前事未曽回報本年十月內本道查得缺官署掌衛印行衛令灝暫管間本年十二月初十日本衛在官充發軍人楊斌畏懼當軍辛苦要得用錢買求回伊保定府慶都縣原籍不合備銀五兩二錢送灝就不合枉法接收入已給與楊斌收買藥餌印信批文收拏影射本月十四日楊斌行至地名腰祿墩遇逢在官巡墩總甲王本盤獲連批送與固原守備劉文處帖行本衛查問間嘉靖四年五月內蒙分巡關西道紙牌為勑諭事奉勘合將灝見提解問間本月十三日胡璽不甘將情并不合添揑灝違例全支俸糧及纍逃四次挾制官府打詐財物又得復職等項虛實情詞并將未到陳完牽寫開單具狀赴提督軍務楊尚書處告䝉牌行守備劉文差人將灝捉拏到官呈解提督衙門䝉批查得㬊灝係分巡關西道見提解問人犯仰陜西按察司副使韓士竒將胡璽所告情詞提人與本犯對理明白備招解審發落呈狀併繳䝉將一干人卷并劉浩在官歇主李昂通行提弔到官與灝逐一對審前情明白恐有不的復又查審得灝帶俸支糧數目委該全支並無月支食米一石事例各無異詞將灝等取問罪犯外結得銀每兩值鈔八十貫招結是實議得㬊灝等所犯㬊灝除革前并受財枉法滿貫及求索科斂等罪名不坐外合依官物當應給付與人已出庫而未給付但有人收掌在官若有侵欺者計贓以監守自盜論四十貫律斬係雜犯准徒五年楊斌依有事以財行求得枉法者計所與財坐贓論四百貫律杖九十徒二年半胡璽依不應得為之事理重者律杖八十楊斌等俱有大誥減等楊斌杖八十徒二年胡璽杖七十㬊灝係贓官楊斌係軍胡璽係舍餘各照例㬊灝定發邉方立功五年滿日仍於原衛帶俸差操不許管軍管事楊斌審無力定撥缺人墩臺照徒年限哨瞭胡璽審有力納米贖罪各完滿日踈放與供明李朝陽王本楊塔孩郭永趙連黨經胡秀馬鑑單鎰朱趨杜氏李昂各查發著伍隨住寧家內㬊灝係軍職論功定議發落查得本犯先該分巡關西道奉勘合見提解問合行固原衛備由轉行該道查照完報施行照出供明李朝陽等并雜犯死罪㬊灝俱免紙胡璽告紙楊斌民紙各一分照例每分內除二十張存留公用其餘折米告紙四斗民紙二斗并胡璽贖罪米七石及㬊灝名下枉法受要楊斌銀五兩二錢又侵欺原領易買料豆官銀一十八兩七錢五分并索受康國目銀二兩綿布五匹絨襪一雙驢一頭鹽一十石主無見在與枉法侵欺銀兩俱合入官又㬊灝科取局匠黨經等九十名每名料豆五斗共四十五石合給主中間王無見在者入官俱發固原州監追完足罪紙米石并主無見在料豆俱送本州官倉上納綿布絨襪驢鹽易銀并枉法侵欺索受銀兩俱貯庫與米豆俱作正支銷科取有主料豆查給收領通取收管實收領狀附卷及未到劉浩妾告爭過胡琮原受李朝陽父李宣少銀准還鹽引一千二百三道仍行固原衛拘拏劉浩追給胡琮弟胡璽并家人胡秀收領同順帶李朝陽鹽引二百道省令徑自收支照約分用有罪劉浩另行弔來文卷發回備照等因具呈到臣案查先據固原衛已故指揮胡琮下舍餘胡璽狀告本衛指揮僉事㬊灝原任北京為事問調本衛後因改寫詔書事發逃走著兄挨獲肘送按察司問擬永逺不許管軍管事帶俸差操後又復逃三次文卷可查至今隱情掌印管局以此懷讐主令商人李宣劉浩等揑詞具狀赴兵備官處告兄先年合夥中鹽寄放引目等項事情蒙批㬊灝問理就彼拘璽偏情酷拷妄認虛供及開單訐告㬊灝賣放軍人枉法受財侵欺官銀科取財物多支俸糧等情查得㬊灝係陜西按察司分巡關西道僉事鍾錫見提解問人犯已經批行陜西按察司副使韓士竒提問明白備招解審去後今據前因覆審無異參照犯人㬊灝先係平涼衛官員緣事改調不思改悔自贖卻乃稔過不悛始因擅改詔書字樣被提不出又拐帶官馬在逃後假以公差為由出外逰蕩至三年有餘曠職兩次遇䝉恩宥尚猶不圖自新侵欺守掌官銀乃科斂局匠以償還受要軍人財物又枉法給批而賣放及訪得本犯平昔在衛假公覔利倚勢害人不止一端官司被其挾制下人苦其凌虐雖問前罪尚有餘辜合無照依原擬定發邉方立功五年滿日仍於本衛帶俸差操不許管軍管事惟復逺加謫調以為軍官怙終稔惡屢犯不悛者之戒緣係軍職論功定議未敢擅便為此具本順差承差孫傑親賫謹題請㫖一為舉用賢才以裨政化事題為舉用賢才以裨政化事臣惟人才難得自古為然故通經學古者多致用而不達獨立自信者多矯枉而過正志存乎道德行或不掩其言取給於事功久或漸渝其守外內之相符終始之一揆今豪傑之士布列中外其人必多臣久處林下今任邉方未能深知不敢泛舉竊見陜西按察司提學副使唐龍早得金華文獻之傳志窺聖賢理性之學及出而登仕作令郯城首挫流賊之鋒兩為巡按茂著激揚之操今提學陜西動必循軌言不悖道多士賴以陶成人材因之益盛是蓋輿論所許清議所歸非臣一人之私言也且今之用人自有常格臣竊謂資格所以待衆人不次所以拔英傑古之帝王暨我朝列聖率由是道如唐龍者文行俱優體用相孚內可以佐臺寺備清華之選外可以任撫巡受干城之寄若長憲之官固所優為亦其常格選衡必有所處豈俟臣言但念備位大臣以人事君臣之職也薦賢為國臣之志也儻知而不言實重蔽賢之責如䝉乞勑吏部廣詢博訪驗其平生參之公議若果臣言不誣將本官待之以不次加之以殊擢遇缺奏請簡用於國家政化必有裨補如其奉職不效或晚節有虧則臣失人謬舉之罪無所辭避矣緣係舉用賢才以裨政化事理未敢擅便為此具本順差承差孫傑親賫謹題請㫖一為急缺邉方都司官員事題為急缺邊方都司官員事照得各處邊方各有行都司衙門統領衛所惟寧夏榆林無之榆林鎮城止轄一衛寧夏在城設有五衛在外二衛二守禦千户所軍務浩繁內有慶藩及郡王將軍等府數多又兼夷漢雜處難以撫馭先年舊規鎮巡官推選老成練達都指揮一員管理各衛事務號為掌印方面官員城池鎖鑰夜巡銅牌皆其執事各衛所官軍馬匹數目冊籍皆其管領地方聽其約束墩臺屬其提調關係不為不重茍得其人事有統紀不致顛錯近日鎮巡委用都指揮安世民本官行事過當起釁招怨貽患未息况今本鎮太監總兵巡撫管糧僉事等官俱各緣事被提新除官員不知何日到任闔城空虛事無統紀誠恐因而别起釁端深為可慮已經劄仰陜西按察司分巡關西道僉事鍾錫前去鎮城住劄收放錢糧稽察奸弊問理刑名及帖委先任甘肅遊擊將軍今革在閒都指揮同知王爵暫去管理都司事務提調各衛官員收掌門禁鎖鑰稽察姦盜外緣舊規相承止是鎮巡選委都指揮一員管理今查本鎮别無都指揮可委若令指揮署管職任相同難以行事臣竊謂地方事重前項官員責任比與各行都司事體相同必得老成都指揮奏奉欽依委用庶幾人心協服訪得陜西都司見任空閒都指揮僉事張鵬霄孫昌二員俱曽久任守備領軍等官委皆老成練達事務善於處謀雖先曽有過被革今皆砥礪自新比之新進出仕之人相去逺甚如蒙乞勑兵部查議奏請合無於張鵬霄孫昌內定委一員作為提調寧夏等衛名目令其掌管城池門禁夜巡銅牌軍馬冊籍一切政務庶使鎮巡衙門可以委任責成上下相承體統不紊庶事不勞而集矣仍乞著為定例今後有缺聽鎮巡選委相應都指揮奏請委用則體勢稍重易於行事實為便益緣係急缺邉方都司官員事理未敢擅便為此具本順差承差孫傑親賫謹題請㫖一為易置邉方將官事題為易置邉方將官事照得寧夏花馬池地方逼臨邉牆係套衆侵犯腹裏必由之地先年止設一營調撥西安慶陽官軍輪班備禦成化年間奏設守禦千户所添撥改編官軍一千員名正德元年間臣為總制因見地方要害套衆不時侵犯官軍數少難以截遏奏改為寧夏後衛添設四千户所選撥召募軍人四千員名常川住守與原撥官軍相兼備禦又展拓城池修蓋營房數千間人居稠密市㕓貿易遂為樂土今經二十年矣城垣損壞不行修補新舊軍人逃亡居半每遇敵至不過閉門自守禁斷居人不許樵牧致將原蓋營房拆毁焚燒殆盡詢問其故蓋因近年分守將官不得其人上下交征務為掊克以致如此訪得見任分守寧夏東路地方右參將都指揮僉事劉謹貪刻性成誅求無厭以營家為得䇿視戎政為末務指稱公用尅扣軍士糧賞每遇解到新軍搜索裝囊空竭方才發伍衛所官員因而挾持爭為科斂以肥身家致令軍日逃馬日耗邉務日廢城堡蕭索幾不能守及照陜西設有遊兵官軍三千員名不止防禦本鎮兼為延寧甘肅各路應援之兵此等將官必得素有膽力慣經戰陳之人遇警身先士卒眠霜宿草不憚苦勞摧鋒陷堅無往不前乃克勝任見任逰擊將軍署都指揮僉事陶文頗能自守亦善處事但年力已衰膽氣素弱居常無事幹理戎務若無大失遇警出戰衝鋒破敵決所不能今大敵擁衆在套秋冬之間難保深入為患而甘肅莊浪一帶地方回達二敵節有警報領軍截剿全在將官劉謹衆叛親離豈能得其效用陶文則上玩下慢安能驅之赴敵臣又博訪得先任分守大同西路地方右參將延綏都指揮僉事髙時先任遊擊延綏將軍養病痊可陜西署都指揮僉事夏欽俱曉暢軍情熟諳戎務馭下有恩臨敵不懼堪任分守先任延綏援兵團操參將都指揮僉事瞿江延綏定邉營把總指揮僉事魏錕皆體貌魁梧膽氣猛厲弓馬有出衆之能膂力有兼人之勇堪任遊擊且人之才各有所長其用各有所宜指垢摘瑕則舉世無全人舍短取長則中人皆可用如夏欽魏錕固未嘗有過髙時瞿江雖曽緣事黜革終難掩其所長使功不如使過在今日尤為急務伏望聖明軫念邉事至重求才甚難乞勑兵部再加詢議如臣言不妄乞將劉謹革回原衛閒住陶文候腹裏閒靜地方有相應員缺乞將所舉各官具名上請簡用髙時等內用一員充寧夏東路參將分守花馬池地方瞿江等內用一貟充陜西遊擊將軍如此則委任得人戰守有備士氣自奮邉方有托蕞爾醜類不足為中國患矣緣係易置邉方將官事理未敢擅便為此具本順差承差孫傑親賫謹題請㫖一為申明勑諭陳言邉務以禦寇患事題為申明勑諭陳言邉務以禦寇患事該户部議覆查照先年舊規通將納銀事例並革不開中馬匹俱聽環靈兵備官督同原管鹽場通判等官從公召商照依原定引數開中馬匹先儘甘肅次及延綏又次寧夏輪管相兼西寧洮河茶易馬匹兊給應用周而復始著為定例及稱見今延綏邉情未寧合無併行各鎮通融扣算量其邉務緩急大小俱聽見差經略三邉軍務衙門隨宜處分不必拘執原額事寧之日輪中備奉遵依間續准本司延綏管糧僉事張宏關奉巡撫延綏地方都察院右副都御史姚謨劄付內開召到商人楊騰霄等四十四名納完上中馬一百六十二匹共該鹽一萬四千六百引緣由前來又准陜西布政司照㑹將填完正德十年商人張大海等納完鹽引一萬四千三百三十七引正德十一年商人劉鎮等納完鹽引一萬四千三百三十七引正德十二年商人豆達等納完鹽引一萬四千三百三十七引并楊騰霄等前項引目各賫領到道俱經封發行仰慶陽府轉行管鹽通判李敏忠查照上年事例相兼放支仍納新課去後其正德十三年見今陸續止召納過二百一十引赴布政司填給引目外其餘至今未見上納節經催行慶陽府督納間今䝉前因隨拘原告商人并節年商人張大海李鎔等到道審據各執稱各商大池自𢎞治十二年起小池自正德元年起俱至嘉靖元年止在池引目約有二十餘萬俱未關支為因連年冦患及天時旱潦鹽路不通及節次事例不常分派股頭不定况且復能支出前引抑又勒納新課以此坑陷資本纒延不絶守候日久困苦難堪等情張礦等一起則告要仍前隨到隨支不論諸引之新舊李鎔等一起則告要照舊挨年挨名不分股頭之三七大抵年名在前者利於挨次而原擬隨支者憚於分股各惟圖便己私不顧紛更鹽法俱難准聽但勒納鹽課一節中間商人資本有昔豐今嗇守支有昔旺今衰必使其舉貸以納於情不堪若令其轉易而支在法有禁委的官商兩未為便益且今在池未放鹽引既多再欲設法另召商人必少欲要暫停新課以疏通舊引不無虧損額課遲誤邉儲合無將在池鹽引自正德七年以前俱為舊引正德八年以後俱為新引新舊平分各為五分股頭兩股各挨年挨名止論鹽引數目不拘商人多寡相兼放支如上名不到下名挨放其新課合無將正德十四十五十六年嘉靖二年三年俱免開中自嘉靖四年起不拘是否舊商每引照𢎞治十二年事例納銀一錢七分量加三分共二錢或照近例仍納三錢五分俱於本道報名發慶陽府收取實收類赴布政司填給引目取自關放暫准於鳯漢二府地方與河東鹽相兼發賣限二三年或五年候前項舊引盡絶至四年分起止挨年挨名放支不必分擬新舊股頭仍照原擬於平慶地方發賣永為定規不許再生異議變亂庶幾鹽法不致紛更而商情亦為便利矣呈乞照詳定奪等因具呈到臣查得𢎞治十八年間臣巡撫陜西議奏靈州鹽課司大小鹽池所産鹽斤與解池相類不勞煎煮不煩人力為利甚博取之無窮舊例止是召商中納馬匹分給邉鎮騎操後因各邉交爭互取多寡不均故有間年關領之例又因中馬之人勢囑賄通濫收不堪馬匹不得實用故有收價解邉之例畢竟為馬而設未嘗别用後因放鹽委官作弊多端奏添陜西按察司副使一員在於慶陽駐劄職雖整飭邉備實兼督理鹽法𢎞治年間寧夏鎮巡衙門先因修理河渠借去𢎞治十四年十五年二年鹽課後因措置糧草借去𢎞治十六十七十八年三年鹽課河渠工程既未就緒倉場糧草亦未充足而鹽馬之制遂廢私鹽盛行姦豪得利𢎞治十五年間該總制尚書秦紘題准於慶陽府添設通判一員兼理鹽課將紅德堡批驗所移改慶陽府聽環慶兵備提督𢎞治十八年以後引目送監收通判開放每引收銀四錢五分准裝鹽五石或六石銀兩分發慶陽固原官庫分送各邉買馬續該苑馬寺卿車霆奏要增靈州鹽課納銀給買邊馬兵部題奉孝宗皇帝欽依陜西茶鹽易馬備邉係是舊制今後不許别項奏討欽此欽遵行臣查處臣督同兵備副使燕忠髙崇熙等親詣鹽池查勘二池鹽利委有餘饒今將大池增一萬五千引小池增三萬引每引納銀二錢五分照鹽一車以六石為則外有多餘依律掣墊至固原慶陽二鹽厰缷所每引仍照舊收卧引銀一錢通共每引得銀三錢五分每年該銀二萬七百六十餘兩儻遇旱潦鹽生不及或邉報緊急鹽路不通除舊額課鹽外新增鹽課明白除豁不可膠於一定嵗嵗取盈行鹽地方許於鳯漢二府通行與河東鹽相兼發賣兩不相阻其𢎞治八九年以前中馬鹽引久弊多莫可查考所宜一切革罷𢎞治十三年以前召中商人彼皆奉例納銀輸官後因寧夏借課耽遲數年怨聲載道合准相兼支放新引七分舊引三分𢎞治十四年以後寧夏所借若有未支未中之數年分已滿中間勢豪之人展轉影射難再復支未中引目陜西截取開中庶幾物論稱平所收鹽引銀兩俱送慶陽固原官庫寄放聽慶陽兵備兼理鹽法副使及固原兵備副使提督稽察如遇各邊缺馬聽臣斟酌通融給發買馬支用不必拘定間年之例等因具題荷䝉武宗皇帝俞允舉行彼時鹽法流行所得鹽銀數多未及二年臣謝病回還自此之後各該衙門節有論奏正德三年戶部題准靈州鹽課解送太倉以備緊急支用各邉缺馬奏請定奪其後巡撫陜西侍郎馮清奏准將正德七年以前至元年鹽引暫且停止正德八年九年鹽課俱借與甘肅上納糧料草束完足赴場隨到隨支正德十年以後照舊新引七分舊引三分兼放輪解各邉買馬糴糧正德十二年督理甘肅軍餉右侍郎楊旦奏准將十二十三年鹽課俱聽甘肅召商報中糧草備用事寧照舊買馬是年巡按御史師存智題准將十四年分鹽課除供邉外量留一半補給韓府祿糧十三年鎮守延綏太監許全奏准除正德十四年引鹽一半補祿米其餘并十五年分盡數歸本鎮買馬其十六年以後三邉照舊輪給正德十六年兵部議准先該臣處置牧馬茶馬鹽馬實濟邉用合行巡茶御史查照開中馬事宜次第舉行是年御史王杲奏靈州鹽法大壞欲行設法召中收價買馬均給三邉户部題奉欽依這地方鹽課著巡茶御史查明數目將各奏年分未開未關并未撈的照例停止欽此嘉靖二年户科給事中王瑄奏處邉儲户部議得靈州鹽課停革買馬専一召商報納糧草二十年來事例紛紜更革不一鹽法為之大壞無益邉儲有虧馬政所以近時議者多欲革去納糧専令中馬不為無見臣竊惟靈州大小鹽池鹽法祖宗朝本供各邉買馬之用後因中馬有弊改議納銀輪發各邉買馬立法未嘗不善奈何正德年間當事者各出意見奏行新例紛紜變亂新舊混淆弊端百出後任者不體前官之意新納者罔念舊商之苦以致各年各項報中俱未支掣完足鹽引堆積多至二千餘萬商人虧陷資本節次召中並無一人報納卻乃搜刷舊商勒報新課監禁箠楚如追逋負在情與法俱不相應夫天地自然之利人自失之而徒為姦人私販之資深為可惜查得近該户部題奉欽依革去納銀専令中馬固係舊例但先年中馬弊多始改納銀且各鎮官員趨向不同行事亦異如是禁防疏濶或因將官之要求或徇勢豪之請托將中下不堪馬匹揑作上等支鹽一百引以致物議沸騰若欲於腹裏地方納馬解邉則秣飼屬之何人運送不勝其擾似皆未便臣愚以為不若仍納銀兩解邊易馬則事省人便官商兩為有益且如鹽馬舊例上馬一匹給鹽一百引中馬一匹給鹽八十引二池舊課止有一萬四千三百三十七引盡納上馬止該馬一百四十三匹兼納中馬大約不過一百五十餘匹正德元年臣召報納過七萬二千五百引每引價銀二錢五分共得銀一萬八千一百二十五兩每馬一匹用銀十兩可買馬一千八百一十二匹正德二年臣召納未完去任今查納過鹽三萬八千七百引每引價銀如前該銀九千六百七十五兩以後年分多者萬餘兩少亦不減數千兩嘉靖元年延綏超前召報納馬止是一百六十二匹較其所得多寡之數昭然可知致將正德十四年十五十六三年俱誤召納今據副使髙公韶所呈在池未放鹽引既多欲再設法另召商人必少欲暫停新課以疏通舊引不無虧損額課遲誤邉儲一節查得節年報納商人嵗月既多頭項不一中間展轉影射冒支盜賣等弊難保必無本當通行革罷但念各商俱已奉例出其資本助我邉儲官本失信商則何辜况前商既已失利後商愈加疑阻誰肯以固有之財而希覬必不可得之利哉緣前事該部已經題有明命臣當具奏上請定奪乃敢施行但六七月間正在放鹽之際誠恐又誤一嵗額課已經遵照欽奉勑諭便宜處置事理劄仰副使髙公韶備云出給告示曉諭自正德元年以前鹽引俱各革罷不許放支仍令將引目赴官投告燒燬若仍留在身以圖影射許各項商人并鄰佑里長旗甲首告拏問治罪自正德二年至正德十二年止俱為舊引正德十三年見開未完并以後年分開中者俱作新引另召不拘新舊商人許令告報每引照正德元年事例納銀二錢五分到於缷鹽處所仍納卧引銀一錢願中商人俱於環慶兵備處報名銀兩發慶陽府收貯取實收類赴布政司填給引目下池舊引三分新引七分俱挨次開放止論鹽引數目不拘商人多寡如上名不到下名挨支每引照鹽一車以六百石為則外有多餘依律掣墊追問去後近據副使髙公韶呈稱示出之後召納過鹽引一萬一千餘引作正德十三年之數餘尚召納未完臣聞之先正云法立而能守則德可久業可大天下之事皆然如總制尚書秦紘等先年所擬循而行之於三邉馬政實有裨益惟是接管官員専務更張以致法無定守官無依據每更一官輒奏改一例出於己者患其不多出於人者惟欲其止行之未久他官相繼又復如是且納銀納馬所取既殊買馬買糧所用各異乍行乍革倐舊倐新規近利以失大信前車之覆後車之戒宜商人之不樂從也但前此納銀各該衙門往往借取别用有妨馬政見今三邉多警正在缺馬之際如䝉乞勑户兵二部查議合無依臣所擬將正德元年以前不拘納馬納銀商人一切革罷將引目赴官投告燒燬正德二年起至正德十二年止俱為舊引正德十三年見開未完并嘉靖二年三年接連嘉靖元年之後者俱作新引正德十四十五十六三年已有嘉靖元年阻隔不必開中徒為紊亂煩擾每鹽一引照正德元年事例納銀二錢五分到於缷鹽處所仍納卧引銀一錢共每引得銀三錢五分以舊額鹽課計之可得銀五千餘兩較之納馬已是三倍况新課之數又未可預料乎原中商人俱於環慶兵備處報名銀兩發慶陽府收貯取實收類赴布政司填給引目下池舊引三分新引七分俱挨次開放止論鹽引數目不拘商人多寡如上名不到下名挨支照鹽車石及多餘掣墊等項俱照舊施行所收銀兩仍照例正德十三年為始先延綏次及寧夏次及甘肅輪年解發前去専備買馬不許别項支用若别鎮果有邉情緊急聽提督總制衙門如無提督總制聽巡茶御史各通融派給仍乞天語丁寧著為定例毋再紛更庶成畫一之功以濟邉方之急再照靈州二池夏秋之間水面凝結如雪如霜隨取隨足十餘萬之課亦不難辦但地鄰邉境或聲息緊急鹽路不通又或旱潦相仍鹽花不結照臣先年議奏新課明白除豁不可膠於一定嵗嵗取盈但行鹽地方舊例止在平慶一府及寧夏等衛榆林寧塞營迤西城堡似乎太狹鹽生者多民食者少鹽商何從售賣而私販固未嘗絶以此尚書秦紘御史王錯先後具奏俱要將靈州鹽課與河東行鹽地方相兼發賣正為此也合無今後每年舊額鹽課一萬四千三百三十七引之數斷不可少其新增鹽課不拘多寡儘數撈辦支掣以池內無鹽之日為止其行鹽地方除西安延安等府照例嚴禁外許暫於鳯漢二府地方與河東相兼發賣兩不相妨待三年之後舊引支盡鹽法疏通照舊施行實為便益緣係分理鹽法事理為此具本謹題請㫖一為敵衆聲息事題為敵衆聲息事嘉靖四年七月二十一日據延綏總兵官署都督僉事彭楧呈為敵衆掏牆入境官軍對敵斬獲首級事據舊安邉營把總指揮僉事趙璽呈䝉分守西路參將袁聰鈞帖准總兵彭楧手本該䝉臣鈞帖為套中走回人口供報夷情事備仰本職務要嚴謹斥堠整㮶軍馬鋒利器械常如賊在目前不許一時怠惰仍差人逺哨如果敵衆近邉即便㑹合各將官同心協力相機剿逐飛報鄰堡官軍發兵䇿應務使大遭銼衄不致貽害地方䝉此卑職於通賊要路墩空量添夜不收步軍在彼按伏本年六月十七日巳時據守粕糟店墩夜不收林三走報粕糟店四墩直日軍人范濚二瞭見境外敵衆約有二百餘騎穿戴盔甲聚到本墩西空內扶四十餘敵上牆擺射餘賊掏牆當傳左右鄰墩甲軍按伏夜不收步軍互相戰守據此卑職一面飛報協守副總兵趙瑛分守參將袁聰遊擊將軍張鳯一面即㑹按伏逰兵營千總官王升等各領官軍馳去截殺敵已掏開牆口一處進入邉裏劄立窺見兵馬將近張弓衝突前來職等奮不顧身嚴督官軍各用弓銃一齊射打戰敵數合我兵奮勇撲斫一處就陳斬獲首級一顆奪獲敵馬一匹射死敵馬一匹王升等督軍同陳斬獲首級一顆奪獲敵馬二匹前敵仍復攻戰嚴令官軍敵戰間彼見迤西迤東遊擊張鳯等人馬灰塵將近退從原口出邉去訖查得卑職步下收獲敵器一十二件敵箭一百一十枝中傷旗軍六名射死戰馬一匹王升部下中傷旗軍七名射死戰馬二匹收獲敵器一十二件敵箭七十五枝等因具呈到職及准逰擊將軍張鳯手本據千總指揮王升呈報相同准此准行各該分守按伏將領把總等官整兵隄備所獲功次㑹行按察司僉事郭鳯翔照例勘報及具題外呈乞照驗等因到臣又據延綏總兵官彭楧呈為聲息事據靖邉營把總指揮同知孫仁呈本年六月十四日辰時據坐堡百户紀鏜報有聲息本職當領有馬官軍一百五十員名同竒兵營千總指揮桑林等官軍九百員名馳至地名許仲義梁迎遇永固墩夜不收柯能報據軍人王志㑹瞭見敵衆六十餘騎到本墩邉外劄立職督官軍馳至墩澗彼從墩北迎敵前來督令官軍一齊向前射打其衆遁退去訖收獲敵箭二十枝又據龍州城把總指揮僉事劉鉞呈據坐堡百户周淮呈據水腦墩夜不收髙思義報六月十七日未時該軍人徐伏瞭見敵衆三十餘騎到墩東空拆牆進入一半在水腦澗一半往東清平堡錢兒梁去訖本職當同本城經過遊兵營千户趙聰帶領馬步官軍四百五十員名馳至龍州墩梁敵見官軍追逐又見清平堡把總指揮周繼勳亦領兵前來出邉遁去查得蘆草溝餘丁賈海男賈捨兒小龍州餘丁劉毛哇哇在彼打草被敵搶去隨據清平堡把總指揮使周繼勳亦呈相同查得清水河捉去秦家畔餘丁黨奈使女一口米脂縣民人李彪幼女一口又據常樂堡把總指揮僉事胡定呈據坐堡百户潘靖呈據白崖兒墩夜不收趙成報六月十八日卯時據軍人曹孜瞭見敵衆一百餘騎到墩東空掏開牆口八騎進入海湖畔劄本職當同按伏指揮何大經帶令馬步官軍馳至原掏牆口敵見兵馬急至遁出邉外去訖查得本堡餘丁韓安兒劉小和尚及餘丁鍾山妻許氏俱割草被敵捉去又據木瓜園堡把總正千户童壁呈據大山墩夜不收任進報六月十八日巳時據軍人孫思慶瞭見敵衆二十餘騎到墩東空拆邊牆進入本職當領有馬官軍一百五十員名前進百户孫欽帶領步軍一百七十名相繼馳至趙家梁又據夜不收小王成報添敵衆五十餘騎督軍馳至劉家梁遇敵衝突前來督軍齊力射打就陳奪獲射重敵馬二匹俱倒死敵退從原口出邉去訖查得在陳射傷總甲王聰墩軍李大朋李伯英收獲敵箭二十八枝又據嚮水堡把總副千户朱鏜呈據百戶張官生呈據六月十八日午時據軍人馮江瞭見敵衆五十餘騎前來口墩掏開牆口二十騎在口簇立三十騎進入在髙阜沙梁站立向南瞭無人畜當從原口出邉去訖又據波羅堡把總指揮同知秦鏜呈據坐堡百户許聰呈據鎮逺山墩夜不收余茂興報六月二十日寅時據軍人袁朝兒瞭見敵衆一百餘騎到墩西空掏開牆口一半進入牆裏馳至甎窯梁瞭探本職領軍馳去截剿從原口遁去查得本堡舍餘馮雄在路射死又據靖邉營指揮同知孫仁呈據坐堡百戶紀鏜呈據威逺山墩夜不收趙川關報六月二十二日寅時輪該軍人楊守愛吳思玉前去迤東爪問火炮行至趙官人澗忽遇箭杆梁山渠藏伏敵衆前來將楊守愛等撲捉過壕本職當領官軍一百五十員名與同按伏竒兵營千總指揮桑林等官軍六百員名馳至井澗岔迎遇夜不收倪仲良報有一十餘騎過壕撲捉墩軍北去本職等回兵防守又據波羅堡把總指揮同知秦鏜呈據坐堡百户許聰呈據樊家梁墩夜不收黑六報六月二十三日寅時據軍人李良兒瞭見敵衆八十餘騎到墩拆開牆口進入一半馳往硬地梁墩本職領軍追𠞰敵見兵臨當從原口出去隨據守硬地梁墩夜不收髙真定亦報前賊四十餘騎到本墩對敵射重墩軍張彪至晚身死又據秦鏜呈據蓮池山墩夜不收席整報六月二十五日寅時據軍人髙四瞭見敵衆六十餘騎到墩東空拆開牆口進入一半徑往東南夾道去訖一半在牆堵口將墩軍張觀音保射重身死職領官軍馳至河北其衆退從原口去訖又據嚮水堡把總千户朱鏜呈六月二十五日卯時據嚮水界墩夜不收郭馬兒報據軍人劉貴瞭見敵衆三十餘騎從南來到本墩拆牆出境去訖查得前敵自波羅堡蓮池山墩出沒至本堡大桑坪射傷遞送公文夜不收吳彥成搶去騾一頭并公文射死軍人周演及行路男子一人等因又據本官呈為聲息事據嚮水堡把總副千户朱鏜呈據坐堡百戶張官生呈准提墩百戶張聰報本年六月二十六日申時據軍人竇鉞瞭見敵衆五十餘騎到防湖墩東掏開牆口舉放煙炮二十騎在口簇立三十騎進入牆裏往東南仃走本職帶領馬步官軍一百五十員名追至本堡沙河掌墩東空嚮水界墩西空各拆牆口出境去訖又據波羅堡把總指揮同知秦鏜呈據坐堡百户許聰呈據提墩總甲陳合卷兒報本年六月二十七日巳時據軍人閻銘瞭見敵衆二百餘騎到蓮池山墩東空掏開牆口舉放煙炮五十餘騎在於牆口一百五十騎進入邉裏沙窩簇立本職當領馬步官軍同按伏都指揮馬政領兵馳至河畔前敵伏內二騎往來引誘職督官軍前進敵見兵勢聨絡當從原口遁去等因行據榆林衛副千户張鵬呈前去嚮水堡查得把總千户朱鏜帶領馬步官軍到於蕎家莊因晚未曽進襲前敵侵至櫻桃山殺死本堡餘丁吳江何傑搶去幼男劉和尚石廟兒溝搶去軍人張友妻于氏雞子莊殺死屯住餘丁王俊王定搶去幼軍王十一使女王妙順又去波羅堡查得並無搶掠人畜等因又據榆林城坐堡指揮使王夀呈據本堡管隊千户徐世臣呈查得本隊紀録幼軍王世美應役王十一於六月二十六日前去嚮水堡雞子莊屯內送飯米忽遇敵衆搶去又據龍州城把總指揮僉事劉鉞呈據坐堡百户周淮呈據提墩總甲王洪呈據平灘墩夜不收楊萬三報六月二十七日申時據軍人王鑑瞭見敵衆五十餘騎到本墩東空拆開牆口一半在口簇立一半進入往東清平堡地方中沙墩去訖舉放煙炮本職當領馬步官軍一百五十員名馳至水腦墩梁瞭見清平堡人馬追敵前來卑職合兵夾追敵從原口出邉去訖又據清平堡把總指揮使周繼勳呈報相同行據百户馮相查得前敵到中沙梁墩空將本墩軍梁田加左膊射訖一箭盧志興後腰射訖一箭捉去楊家畔餘丁藺連男藺存得等因本年七月二十九日又據本官呈前事據髙家堡把總副千户丁麟呈據坐堡百户潘鋭呈據碾兒梁墩夜不收萬英報本年七月初九日據軍人胡聰瞭見敵衆二十餘騎驟到本墩掏開水口進入本職當領有馬官軍七十員名到彼據本墩小甲李子貴報稱敵衆一十二騎在於營口八騎徑到本墩攻圍射死墩軍孟田驢賊見人馬將近出境去訖又據榆林城把總都指揮僉事閻武呈本年七月十五日丑時據本城馬神山墩傳接迤西烟火當䝉鎮守總兵官彭楧統領職等官軍七百員名至嚮水堡新添墩西空敵衆掏開牆口一處瞭見邉外沙梁簇立敵衆二十餘騎爪得馬蹤三十餘道徑往腹裏西南去訖䝉總兵官彭楧分布官軍各衝要地方按伏堵截本官統領官軍襲蹤追趕至波羅堡硬地梁墩合兵夾擊前敵就陳奪獲敵馬五匹敵器六件達箭三十二枝被敵射重墩軍二名身死敵奔從硬地梁墩東空水口出邉去訖等因節呈到臣為照延綏地方敵人在套日久臣自到陜西以來不次行令各該將官加意隄備遇有侵犯即便督軍襲𠞰不許畏縮誤事已將節報聲息具題外今據前因看得套人自本年六月以來侵犯延綏近邉不止一次止是遊擊將軍張鳯舊安邊營把總指揮趙璽各部下斬獲首級二顆奪獲馬匹夷器功雖不多亦曽督軍臨陳與之對敵其餘城堡把總坐堡等官雖稱出兵追逐並無斬獲之功龍州城常樂嚮水波羅清平髙家等堡各被搶去軍民男女射死墩軍軍人餘丁各數不一雖是不曽深入而地方已被其害顯是各官平時失於設備臨事不能效力廢弛怯懦之狀昭然可知况止據所報如此此外隱匿不報之弊難保必無俱各參究但自東至西千里之逺處處有敵目今大衆敵人已報西行深入之謀旦夕難測延綏遊擊兵馬俱在西路按伏其中東二路城堡星散無所不備無所不寡理勢則然正當緊急用人之際合候事寧之日通行查參定奪緣前項聲息延綏鎮巡官各經具題及有功并失事官員照例行巡按御史查勘明白另行外緣係達衆入境邉鎮節報聲息事理為此具本順差承差趙禎親賫謹具題知關中奏議卷十三
