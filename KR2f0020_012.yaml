body:
  text: 關中奏議卷十二明楊一清撰提督類一為被虜走回人口供報回賊聲息事欽差提督陜西三邊都御史臣楊一清謹題為被虜走回人口供報回賊聲息事嘉靖四年五月二十日據平羌將軍鎮守甘肅地方總兵官左軍都督府署都督僉事薑奭呈前事嘉靖四年四月二十三日準分守肅州右參將都指揮同知雲冒手本本月十九日據守把嘉峪關千戶曺敞呈送哈密走回漢人婦女一口到關發據肅州衛申準撫夷指揮劉雲關依奉公同掌印指揮路忠百戶錢岫陳剛審得朱氏供年二十七嵗係甘州失記所分百戶軍人何宣戶內餘丁何玘妻嘉靖三年九月內有回子王子領人馬來到甘州有氏與夫湖內採草有先不知後知是濟喇實地方回子把我搶去隨營到了魚海搶了黃敵人順山回到哈密城外住歇將氏賣與哈密不知名回子家裏使喚與了馬三匹有衆回子害怕漢人軍馬來城上穿著盔甲火著等了四五日不見人馬來方才下城有王子巴勒濟喇實的人先打發去了哈密的人説如今把路斷了再不得做買賣去後頭漢人軍馬來便我哈密的人少先殺我們裏衆人都暴怨王子聽見這話把吐魯番的留下了一半和王子還在哈密造盔甲翎箭修哈密城上土垜等到青草大了時還要往甘肅州搶來裏有氏因買我的回子的娘子將氏日每打罵作踐過不得半夜裏跳下城來走脫沿途走了一箇月多來到肅州邊外迎著夜不收送來所供是實據供備關到衛理合具申施行等因據申到職會同甘肅行太僕寺帶管肅州兵備道寺丞張鶚覆審前情相同除行肅州衛將走回婦女朱氏差人管送陜西行都司交割查發該衛所給親收領外但本處孤懸乞為早發兵糧協濟防守擬合通行等因行間本月二十四日卯時據甘州差哨夜不收段興三報稱蒙差本役同陳驢兒前去古佛寺哨探本月二十一日行至孤山河撞遇回賊將本役等捉綁到於雪打班見了回賊頭目將我打著問説甘州人馬有多少我是頭哨先來後面還有多多的人馬來裏搶的你漢人收不的田用鐵繩拴絆見得營內回賊約有五百餘騎夜晚睡熟得脫來報二十五日辰時又據山丹紅嶺兒坐塘夜不收劉興報二十四日五更時候瞭見回賊約有五百餘騎在於山後雪達巴牧馬本役來報等因到職案查先因去年吐魯番回酋率衆前來甘肅謀奪地方被我官軍追殺出境回遁去訖本年三月初十日該分守肅州右參將雲冒手本據迤北觀音山口住牧屬番頭目普爾咱等族頭目哈布爾等告遞番文一紙供係這今年三月初一日天亮時候有回賊一百多人馬從口子裏邉撲到我每住處殺了我每四固人搶了一箇娃娃馬牛羊五十箇我每收拾了人馬趕上和他厮殺我每殺了他五箇回子兩箇頭割著來了三箇死人回子馱著去了為照前賊若非舊歲犯邊境外遺留之數必是吐魯番酋新近差來驍騎使之窺探邊情欲以擾我耕牧俾我坐困將來復欲擁衆入寇俱難測度除行本鎮各該分守守備等官整搠兵馬鋒利器械遇警相機戰守及將低薄小堡人畜併入髙厚大堡固守已將前項斬獲首級并本鎮缺兵徴調原擬陜西延寧遊竒兵馬會本具題外今準前因職會同鎮守太監董文忠巡撫右副都御史陳九疇議得走回婦女朱氏供稱去年九月內被回賊搶去回到哈密城外轉賣與回回使喚聽得衆賊議説如今把路斷了再不得做買賣去遺留一半人馬和王子還在哈密造盔甲翎箭等到青草大了時還要復來甘肅搶來今走回夜不收段興三亦報回賊約有五百潛在甘州境外古佛寺地方駐劄一節為照前賊見入我境撲捉差哨人役則朱氏供報之言誠為不虛復寇之舉朝夕難測查得本鎮一十五衛所兵馬實有不滿三萬除公差事故老弱伏塘傳報等項受甲馬步不足二萬餘人又分守於各該地方今回酋侵犯大衆雖未發露但去年未遂其姦必是先遣精騎探我虛實然後舉衆前來勢所必有又况絶彼買賣道路不得我土麝黃等物生命所係此來復冦必與别部糾合進取謀為比前尤為不同本邊兵馬孤弱錢糧缺乏若不預請救濟臨期緩不及事職等一身一家萬死固不足惜其如地方生靈何合無準將何項糧草發運來邊務足五七年主客兵馬支用及行陜西延寧鎮巡等官備行各該將領將各部竒遊兵馬作急督發前來聽職等調度會合截殺庶不誤事而地方可保無虞等因具呈到臣看得鎮守甘肅地方總兵官署都督僉事薑奭呈稱前項回賊入境撲捉差哨人役大衆雖未發露但去年未遂其姦必是先遣精騎探我虛實然後舉衆前來及稱絶彼買賣道路不得我土麝黃等物生命所係此來復寇必與别部糾合進取謀為比前尤為不同本邊兵馬孤弱錢糧缺乏乞要將糧草發運來邊及行陜西延寧鎮巡等官將各部竒遊兵馬作急督發前來會合截剿等因為照豺狼之性貪得無厭去嵗深入被官軍追殺遁回不曾得利又絶其貢道奪其所以為命復冦之舉難保必無且恐其糾合西海額布勒諸敵共謀侵犯彼處兵馬寡弱實難支持先事預防不可不謹兵法曰無恃其不來恃吾有以待之無恃其不攻恃吾之不可攻查得先為調度邊兵預防寇患事節因延寧守臣哨報套內賊情已經行令延綏遊擊將軍張鳳統領新遊兵於定邊營副總兵趙楧統領竒兵於寧塞營各住劄遊擊將軍劉淵所領舊遊兵又該偏頭關地方徴調去訖及行寧夏副總兵劉玉遊擊將軍周倫參將苗鑾各統所部兵馬於本鎮興武營小鹽池等處駐劄前項分布專為隄備套衆往向未定旦夕莫測難以掣調已經行仰鎮守陜西都督鄭卿先調陜西遊擊將軍陶文率領所部遊兵三千員名前去會寧安定蘭州地方隨便按伏以備應援待後甘肅賊情如果緊急即調張鳳苗鑾二枝兵馬前去協力截剿其餘軍馬并陜西主將守備官兵俱照舊駐劄以防盜賊入冦之謀各施行去後但師行糧從彼鎮各該城堡糧料草束委的缺少又經咨行陜西巡撫將該解甘肅銀兩上緊催督解發仍行甘肅巡撫督令管糧分巡等官作急召商糴買務勾主客兵馬支用及待候查探賊情緩急另行具奏外緣係被虜走回人口供報回賊聲息事理為此具本專差承差杜廷選親賫謹具題知一為斬獲犯邊回賊首級事題為斬獲犯邊回賊首級事嘉靖四年六月初三日據平羌將軍鎮守甘肅總兵官署都督僉事薑奭呈本年五月初三日據山丹白石崖夜不收薛文一報初二日巳時瞭見回賊三百餘騎空馬一百從南匾都口往東行走徑透永昌五奴五赤地方去訖據報本職統領鎮城兵馬前來涼永分布副參遊擊守備等官一面分投差人各路哨探一面領兵隨賊向往截殺去後本月十六日丑時據守備永昌行都指揮使馬雲差夜不收張安報十四日黎明時候有回賊三百餘騎入境搶掠領兵追至考來口東石門地方與賊對敵就陳斬獲首級三十六顆奪回賊馬二十四匹夷器銅鍋五口鐵鍋六口明甲一付馬鞍九十二付并弓箭撒袋氊襖帳房等件其賊敗遁西南去訖掣軍回還據此除查明另行外理合先行呈報等因到臣案查先為哨報回賊聲息事本年五月十四日準巡撫甘肅等處地方都察院右僉都御史冦天敘咨前事內開該甘州差哨古佛寺夜不收段興三報稱蒙差本役同陳驢兒前去古佛寺哨探四月二十一日行至孤山河撞遇回賊將本役捉綁到於雪達巴見了回賊頭目將我用鐵繩拴絆見得營內回賊約有五百餘騎夜晚乘賊睡熟脫走來報等因備咨前來看得咨開前項供報賊情顯是回賊貪心無厭姦謀未已若果止是五百餘騎料亦不敢深入侵犯但恐是打探先鋒後賊源源而來亦未可知在我防禦不可不謹已經咨行本官會同鎮守太監總兵轉行副參遊擊兵備守備等官各差人逺為哨探果有前賊侵犯會合大小將官協力剿逐如是賊情重大差人馳報軍門以憑施行及咨巡撫陜西右副都御史王藎行陜西布政司將該解甘肅一鎮各項糧銀逐一查取委官解發該鎮糴買糧料草束應用去後續據總兵官都督薑奭呈為被虜走回人口供報夷情聲息事先準肅州參將雲冒手本呈送走回漢人婦女一口朱氏供土魯番夷人還在哈密造盔甲翎箭説到青草大了時還要往甘肅州搶來今走回夜不收段興三亦報回賊約有五百餘騎前在甘州境外古佛寺地方住劄撲捉差哨人役則朱氏供報之言誠為不虛復冦之舉朝夕難測本邊兵馬孤弱錢糧缺乏要得發運糧草及行陜西延寧鎮巡等官將各部竒遊兵馬督發前來會合截殺等因到臣查得陜西延寧竒遊等兵已經分布花馬池等邊及中路小鹽池等處駐劄專為隄備套敵今套內敵情向往未定聲息傳報絡繹不絶難以掣調又經行仰鎮守陜西都督鄭卿先調陜西遊擊將軍陶文率領所部遊兵三千員名前去會寧安定蘭州地方以備甘肅應援待候賊情如果緊急即便掣調延寧遊竒兵馬前去協力截剿并行陜西巡撫將該解甘肅銀兩督催解發仍行甘肅巡撫督令管糧分巡等官作急召商糴買糧料務勾主客兵馬支用及具題外今據前因為照土魯番回賊去年擁衆深入侵犯甘肅圍困城堡皇上軫念邊方欽命文武重臣督兵征剿先聲所動節被官軍追逐遁回却又不知改悔復謀入寇先據走回人口朱氏所供後據被捉夜不收段興三所供則其姦謀誠難測識今果侵入永昌地方總兵官署都督僉事薑奭聞報提兵親至涼州分布大小將官隄備戰守守備永昌以都指揮體統行事指揮馬雲奮勇督戰就陳擒斬首級三十六顆及奪獲戰馬盔甲夷器等件功俱可録及照鎮守甘肅太監董文忠獨守鎮城居中制外巡撫右僉都御史寇天敘撫鎮之初䇿勵將士亦與有功竊詳此賊一入我境即遭銼衄必然褫魂喪志在彼有雉伏鼠竄之勢在我亦不須草剃禽獮之勞實惟皇上聖武布昭德威逺被之所致也邊方幸甚臣等幸甚但狼子野心終難必其悔禍又節經通行該鎮將官仍要加意隄備倘再侵犯協力痛加誅剿毋得恃此小捷輒生慢易以致誤事并獲功官軍姓名及中間有無隱匿别情俱待查明另行奏報外如蒙乞勑該部查議合無將總兵官薑奭守備官馬雲先行量為賞勞照例行巡按陜西監察御史將斬獲首級審驗明白有功官軍查勘造册奏繳升賞中間若有隱匿别項事情徑自參究庶邊官有所激厲邊務可以振興矣緣係回賊入境官軍斬獲首級奪獲戰馬夷器事理為此具本專差百戶吉升親賫謹題請旨一為整理邊務以備敵患事題為整理邊務以備敵患事案照先準兵部咨該本部題該提督軍務尚書金獻民題前事一件議處防守照得固靖甘蘭等衛所靜寧安定等州縣每嵗冬初調集陜西西安等衛所官軍臨鞏所屬等州縣民壯人等共一萬五千有餘分布各城堡防守蓋恐乘凍踏氷過河深入侵犯之計也訪得前項軍士多非正役非鄉野愚民則市井子弟武藝未習戰陳未經或有盔無甲或有矢無弓多被領軍官員貪圗糧米賣放回家見在者百無二三任情肆志虛應故事如此若不嚴加查處非惟無益地方抑且虛費糧草合無轉行陜西鎮巡等官今後如遇調集官軍分布各處防守預行各該衛所州縣掌印官嚴加㨂選人要壯健馬要肥大器械俱要精好將選過官軍馬匹年貌齒色類造小册送鎮巡衙門以憑稽考或行兵備道或行守巡官不時查驗點閘如或軍士有不足及軍器有不精者分别等第將各該官吏參提究問庶人心知所警懼而防守不致虛設矣一件議處兵將切惟禦敵以兵馬為先以糧草為急固原一鎮為三邊喉襟要衝總兵官所領官軍見在不過五百員名守備官見在不過六百員名兵馬之寡弱也甚矣倉卒有警委難支持訪得敵衆自𢎞治十四年入侵得利每年深入搶掠必由固原各該將領因兵馬數少不過嬰城自守任其出入以此地方多被殘破人畜多被殺掠見今敵人擁衆入套侵犯之舉又在旦夕若止照往年故事未免復遭荼毒合無將總兵官部下除見在五百名并死馬官軍二百名共七百名外再於各城堡各衛禦冬防守官軍內選擇精壯二千三百員名共輳三千員名總兵官統領防守官軍仍照例每年十月初一日依期赴操二月河開無事放回有警留住本城支與行糧與見在官軍如法操練預備截殺守備官部下除見在官軍六百員名并死馬三百員名與今擬增糧并各城堡挑選死馬官軍共二千員名外未及之數照例懸賞於有丁人戶內召募一千名亦輳三千之數將守備改為參將名色統領殺賊仍聽總兵官調度該用馬匹於茶馬并苑馬寺給領或行太僕寺收貯官價支買召募銀兩於司府官庫查有無礙銀兩動支等因該本部覆題節該奉聖旨固原守備照舊其餘準擬欽此欽遵備咨前來案候議處間近準兵部該本部題為陳言邊務事該御用監太監張忠題前事內一件足邊兵以備警急切照各邊鎮總兵副參遊擊及各城守備巡邊備冬備禦防守等項每額原有官軍或三千員名或一二千員名或三五百名纍年禦冬出戰陳亡逃故等項數多見在者其間又多老弱不堪各該官員因循不行充補以致禦敵多無效用合無乞勑兵部行移各邊鎮巡及清軍兵備等官將各該將領部下官軍從公揀選精壯者存留戰伐老弱者退撥守城逃亡事故者清查充補請自命下文書到邊之日為始限三箇月以裏務足原額之數如有過限不完者著巡按御史指實劾奏問罪數足之後各該經管官員仍要加意撫恤毋役使以耗其力毋刻削以傷其心紀律嚴明訓練如法兵力既足緩急有備而邊境可保無虞矣一件添設軍馬將官以固守衝要照得陜西固原地方極鄰邉境實敵衆出沒喉襟要路雖已設有總兵官一員統領人馬三千在彼住劄如往年敵衆糾衆萬餘由此進境搶過平涼直至邠州方還前項兵馬勢孤力寡僅足保守城池本境禦敵若令轉戰未免顧彼失此臣愚以為合無乞勑兵部計議停當轉行該鎮撫巡等官於固原衛并附近衛所軍士每軍戶下有三丁以上者抽一壯丁充當軍役仍取具衛所地方鄰佑保結不許容無藉之徒冒濫收充以致因無恆産易於逃竄選足三千之數每人給賞銀十兩置買軍裝什物馬鞍鞦轡編成隊伍定擬衛所管轄所謂重賞之下必有勇夫是也仍照數處給馬匹騎征按月關支實米一石并馬匹草料務圗經久及照陜西先年曽設有副總兵分守地方後因事寧裁革當此思患預防之際合無照舊添設謀勇副總兵一員統領前項軍馬用心撫恤如法操練就領分守固原等處往來駐劄應援遇警相機戰守庶邊人知我有備不敢大肆深入衝要之地可以固守而無患矣等因兵部議擬覆題節該奉聖旨是邊兵著鎮巡等官揀選精壯的專備征戰逃亡的作急清勾固原地方應否添設軍馬將官還著提督尚書從長議處奏來定奪欽此欽遵備咨到臣照得陜西地方固靖環蘭沿邊一帶城堡東西延袤幾二千里多係通邊要路分兵而守無所不寡每遇邊寇侵犯如數不多尚可支持捍禦倘似𢎞治十四年正德十三年嘉靖元年擁衆數萬長驅而入實難阻遏平涼臨鞏靜寧安定會寧隆德一帶州縣俱被蹂踐後又侵及涇邠地方屠戮之慘所不忍言至今凋傷未復舉目蕭然各該守臣不能奮勇殺敵固難辭責揆厥所由實因兵馬寡少又復不精以此不能克敵制勝且如鎮守總兵官及守備官所領官軍俱不過數百員名不及延寧等鎮遊竒將官統領各有三千之數太監張忠尚書金獻民皆親歷其地目擊其狀後先具奏俱要增添整飭兵馬議論周悉上厪天語丁寧凡為守臣敢不祇率况今敵衆在套侵犯之舉旦夕難測除各府州縣民壯義勇督令巡守官揀選及召募抽選等事俱議處另行外查得沿邊兵馬各有信地征操防禦已有定規此外别無兵馬可以掣調惟是鎮城西安左前後右護等衛原擬分布禦冬官軍除總兵官鄭卿操下見在徴調及榆林寧夏領班官軍不開外一枝固原鎮戎所備冬原額馬隊官軍一千員名實有官軍五百九十八員名事故在逃官軍四百二十員名一枝哈喇圖西安州備冬原額馬步官軍一千一十員名實有馬步官軍五百八十一員名事故在逃等項官軍四百二十九員名一枝靖邉等四城堡備冬原額馬步官軍一千七百六十一員名實有馬步官軍一千三員名事故在逃等項官軍七百五十八員名一枝環慶備冬原額馬步官軍一千九十四員名實有馬步官軍九百七十二員名事故在逃軍餘一百二十二名一枝䇿應聽調原額馬步官軍五百四十九員名實有馬步官軍五百三十七員名事故在逃等項軍餘一十二名備冬之外又有中軍守城馬步原額軍餘三百名實有馬步軍餘二百八十四名事故在逃等項軍餘一十六名城操原額馬步官軍四千一百八十三員名內實有馬步官軍三千二百一十二員名事故等項官軍九百七十一員名看得各枝兵馬原額數目雖多中間逃故多寡不等該管官員不行清查解補以致行伍空虛其見在之數精鋭堪用者固有懦弱不堪者實多弓矢盔甲既多不備軍裝什物又皆不整或金鼓旗幟之不設或坐作部伍之不知名為聽征之兵多與村野編民無異倒死馬匹既不立法追補見在馬匹又多駑小瘦弱議者遂槩指前項官軍為無用緣西人性氣剛徑向義尚勇成化年間巡撫都御史項忠馬文升近年總兵都督曺雄皆藉以克敵成功止因後來官司因循玩慢不行教練約束遂致如此及訪得前項逃軍多不曽逺離鄉井非影射於屯寨則包占於私門已經案仰都布按三司各行分守關內道參政楊叔通分巡關西道僉事王鈞會同都指揮僉事張鎬將在城四衛各枝官軍查取原額見在逃故的確數目文册到官拘取各正身隨帶盔甲弓矢軍器及馬匹逐一查點選驗若有老弱病疾之人拘取戶下壯丁更換或原係壯丁今替幼弱者仍拘拏原操正身應役軍裝什物不備責令修整馬匹瘦損令其儧餧臕壯及貼換易買好馬其在逃軍人出給告示許其自首免罪發隊收操未首未補者各督令該管屯寨老甲及應捕人員上緊挨拏務在得獲病故者拘取戶丁及空間軍餘補伍務足原額之數如各該掌印管操衛所官員逃故軍餘數多不行清補即將俸糧住支重則治以軍法查選畢日限九月初一日各到固原以憑覆選照依兵部題準事理輳撥二千三百員名連舊在操下共三千員名聽總兵官統領防守有警留聽操練預備截殺無事之日照例放回其餘仍分布各城堡按伏防守其固原守備官所領已有固原衛甘州羣牧所并秦平等府衛州縣實有馬隊官軍舍餘土達二千三百六十四員名仍依該部原擬懸賞召募亦輳三千之數以備戰守及照陜西鎮城密邇南山盜賊不時竊發根本重地不宜空虛䇿應城操官軍一體查選存留防守邊方果有緊急賊情方才調用及在外各衛所并延寧甘肅三鎮逃故未補軍人各行令巡守清軍等官分投清查勾補責限完解外臣切思陜西地方固原環慶靖邉蘭州俱係防邊重地而固原最為要衝且土漢雜處易於生變內有監牧馬匹尤為賊所窺伺守備之官責任甚重先年議者欲添副總兵一員臣為巡撫之時議奏將陜西鎮守將官移來固原駐劄提調防守其副總兵不必添設蓋因兵馬寡少添官無益兵部議擬覆奏至今遵行但鎮守官統轄地方廣濶不特防禦敵衆如洮岷有西戎之警南山有羣盜之虞皆其責任萬一事變不測未免顧此失彼太監張忠尚書金獻民皆欲於固原添設兵馬將官深慮曲防蓋有所見但固原守備改為將官職銜權任似不相稱皇上洞見其然未蒙俞允臣查得延綏寧夏甘肅三鎮各有分守東西二路參將各一員陜西近因番人侵犯已於洮岷河州等處設分守參將一員今固原兵馬既已增添比前稍為精強合無照依各官所議添設參將一員分守固原環慶靖邉蘭州地方仍在固原駐劄操練軍馬修理關隘撫安土人如各處有警往來應援截殺各守備防守等官俱聽調遣如此不獨固原增重而靖邉環蘭皆有倚賴實為便益然添官非難得人為難任非其人權任雖重徒生厲階看得見任固原守備署都指揮僉事劉文老成練達曉暢軍旅以精勤理邉務以廉慎得人心衆口一辭並無非議倘蒙采納許設分守官員乞勑兵部再為查訪合無就將都指揮劉文擢任參將分守固靖環蘭等處則委任得人地方有託而邊官亦知所感發興起矣及照固原既設參將與主將同處一鎮守備官似不必再設合無選委都指揮一員操守如無相應都指揮於指揮內選用奏請以都指揮體統行事庶無官多政分之弊惟復仍設守備官員臣愚所見如此伏惟聖明裁察緣係整理邊務以備敵患及奉欽依固原地方應否添設軍馬將官還著提督尚書從長議處奏來定奪事理未敢擅便為此具本順差百戶吉升親賫謹題請旨一為欽奉事題為欽奉事嘉靖四年五月十六日欽奉勑近該巡撫都御史王藎奏稱延寧所屬花馬池定邊營一帶地方接連河套地形寬漫見今敵衆在套駐牧號稱八萬有餘旦夕大舉入冦亦未可測乞勑各邊鎮巡等官早為防禦及要分調兵馬及差官處置糧草無非先事預防之意朕以欲專提督之任兹特降勑諭卿宜即嚴督陜西延寧甘肅各該鎮巡官通將副參遊擊守備守巡等官查照先今事理各要操練軍馬齊整器械謹斥烽堠堅固城堡各於敵衆經行去處申嚴號令加謹隄備多差乖覺夜不收逺為哨探有警則星馳傳報收斂人畜堅壁清野互相應援不許因循怠忽自分彼此致誤事機其分調兵馬俱依藎所擬仍要酌量軍數多寡地里逺近務俾戰守兩無所失緩急不致誤事及將聽探敵情的確消息星夜差人具奏以憑議處卿威名著聞敵所懾服朕方倚賴以紓西顧之憂尚其勉之故勑欽此欽遵案查先為調度邊兵以防敵患事行據延綏寧夏陜西各鎮總兵官都督彭楧种勛鄭卿節次呈報查探套衆近邊聲息前來已經行仰各官查照原行差人哨探套人多寡逺近回報如果衆多行令遊擊將軍張鳳統領遊兵於花馬池營駐劄遊擊將軍劉淵統領遊兵於定邊營駐劄副總兵趙瑛統領竒兵暫於寧塞營住劄若哨探前敵有西行之勢遊兵二枝俱於花馬池副總兵趙瑛移於定邊營各住劄量分人馬於安定栁楊等附近城堡寧夏副總兵劉玉統領竒兵於興武營遊擊將軍周倫參將苗鑾於紅寺兒韋州鹽池石溝等處住劄總兵官种勛待有的確警報統領正兵於靈州住劄與各該守備等官各按兵秣馬以逸待勞加謹隄備如敵大至即便會合截殺相機應援去後續據延綏總兵官彭楧寧夏總兵官种勛節次將本鎮各路敵兵近邊緣由具呈到臣看得各鎮所呈節據各堡夜不收爪探套內敵衆新行蹤迹多至二三百道少則百十餘道或自西而東又或自東而西其數亦必不少及寧夏走回男子王巴圗爾供稱在套敵衆一萬內有三箇頭兒一箇濟農一箇納延説要過河與黃毛達子讐殺一箇阿克塔布哈説要先搶漢人等情緣今黃河開消已久要搶漢人之言或恐是真竊料此敵頻年得利不曽遭銼必無懲戒今雖不露大衆形迹夏秋之間乘機大舉入寇不可不防又經申明行仰各鎮總兵官轉行各副參遊擊把總坐堡守備等官照依原擬分布按伏防禦若果敵衆向西切近定邊營花馬池境外必有深入之意延寧竒遊等兵除遊擊劉淵已該山西偏頭關調去應援外其餘將官各照原行按伏聽調不許自分彼此陜西主將督令守備等官各領兵駐劄要害地方防禦臣於固原慶陽居中調度及具題外今奉前因臣欽遵帖行陜西延寧甘肅各總兵官鄭卿彭楧种勛薑奭轉行各該鎮巡官并副參遊擊兵備守巡等官各遵照欽奉勑內事理操練軍馬齊整器械謹嚴烽堠堅固城堡各於敵衆經行去處申嚴號令加謹隄備多差乖覺夜不收逺為哨探有警星馳傳報收斂人畜堅壁清野互相應援不許因循怠忽自分彼此致誤事機除待各鎮探聽邊情的確消息呈報至日另行具奏外今將欽奉到勑書及督行過各鎮將官緣由先行奏報為此具本專差承差席宗吉親賫謹具題知一為查報邊情事題為查報邊情事臣節該奉勑將探聽邊情的確消息星夜差人具奏以憑議處欽此欽遵查得嘉靖四年六月十二日據延綏遊擊將軍都指揮使張鳳呈為聲息事本職調統本部官軍前來原擬定邊營住劄防禦本年六月初七日辰時據三山堡西平三墩爪空夜不收王安馳報本日卯時分瞭見境外敵衆一百餘騎從北驟馬前到本墩西空拆墻得報一面督令定邉營把總指揮魏錕帶領本管官軍順邊堵截歸路本職統率本部官軍趨進邀擊馳騁將近前寇已拆墻二處進入邊裏簇立窺見官軍合兵來勇急從原口遁去欲要追逐緣地方平漫恐中誘計督軍砌完墻口收兵回營防禦外呈報施行等因又據寧夏遊擊將軍都指揮僉事周倫呈稱該分守東路右參將都指揮僉事劉謹手本差夜不收哨探得離邊一百五十里地名大沙子見敵衆二簇約有四十餘騎往東行走又紅泉地方見敵五十餘騎往西行走又該協同分守興武營署都指揮僉事吳雲手本差夜不收哨探得離邊九十里地名喜鵲湖等處俱有敵衆新行蹤迹又該守備平邊城以都指揮體統行事指揮使史經呈差夜不收哨探得地名千家村苦水河有牧放牛羊一千有餘石觜兒沙溝有青白馬三百餘騎帳窠七座圈子河有敵衆帳窠一十二座牛羊馬匹四五千有餘住牧等因本月十四日又據延綏總兵官署都督僉事彭楧呈為查探聲息事開稱節據中東等路黃甫川等堡把總千百戶等官沈杲等呈及準分守東路右參將署都指揮僉事黃宰分守西路左參將都指揮僉事袁聰手本各差夜不收哨探得各邊外地名南城離邉二百三十餘里有敵衆接連下營帳房二十餘頂敵衆一千有餘牛羊馬匹三千有餘及紅城子崔臼灘等處俱有敵衆營巢帳房牛羊馬匹數目不等在彼住牧榆林岔九股水等處俱有敵新行馬蹤或二三百道或百十餘道黑石磕石山兒等處俱有敵衆或一二百騎或四五十騎往來行走等因本月二十日又據鎮守寧夏總兵官署都督僉事种勛呈為走回男子供報大敵住套事嘉靖四年六月十三日據寧夏衛指揮使司申據守堡百戶丁勇呈送走回男子二名到衛審得一名金佐供年二十二歲係甘州中護衛前所崔百戶下軍人金龍戶內餘丁正德十一年失記月日在莊生理被敵搶去一名金保松供年二十歲亦係本衛軍人金龍戶內餘丁正德十五年失記月日在鹽場堡地方大沙溝打草被人搶去住內營內聼放牛羊使喚有小十王下敵人三萬餘騎去年冬裏未到套內住坐佐等思想家鄉各偷馬一匹騎走四晝夜到邊收送前來據供備申各呈到臣為照前項敵衆自嘉靖三年十一月內延綏地方據套中走回男子路駒等供報小王子叔叔台吉領一枝精兵敵人四萬哥哥吉納領一枝精兵敵人四萬共八萬餘多踏氷過河在套住牧等語守臣上聞仰厪宵旰之憂節奉勑旨督責各該鎮巡加謹隄備又命愚臣提督三邊軍務節制調遣臣欽遵於四月初一日到於陜西地方節次差人賫文前去各鎮查探聲息及分布副參遊等官各於要害地方住劄操練防守聽候調遣今經兩月有餘不見大敵近邊間有拆墻進入及邊外行走或二三十人或七八十人多則二三百人但自延綏東路黃甫川起至寧夏靈州地方千有餘里無處無敵帳窠火光絡繹不斷牛羊頭畜散被原野新行馬蹤在處數百餘道東西行走向往不一查得先據寧夏守臣呈稱據走回男子王巴圗爾供稱在套敵衆一萬餘騎一説要與黃毛敵人讐殺一説要先搶漢人今走回男子金佐等又稱小十王下敵人三萬餘騎在套住坐等情相度事勢原報八萬之説初亦不虛二月河開半已渡河今在套者當亦不減數萬分散固少輳合則多切料敵人姦謀不露大衆形迹乘間俟時大舉深入亦未可知况沿邊直抵固原一帶自春徂夏久旱不雨邊草不茂馬匹臕息尚弱以此未敢長驅近日雨澤頗足青草長茂入冦之舉旦夕難測且套內地方廣逺差哨人役不過百里其二三百里之外消息豈能盡知緣此敵頻年犯順罪惡貫盈臣仰仗皇上天威謹當督率將士揚兵耀武以伐其謀於未入之先出竒設伏以乘其弊於將遁之際雖不敢為窮兵黷武之舉亦欲收執訊獲醜之功但克敵固資乎兵養兵必資乎食腹裏地方近日鹽商報中委官易買稍足供應惟是沿邊一帶甚為缺乏且如寧夏沿邊花馬池興武營清水營一帶及中路靈州小鹽池韋州等處俱係緊要該屯兵馬地方查得花馬池見在料豆一千二百六十八石約量可勾本城主兵馬四百六十匹三箇月支用若添客兵馬三千匹止勾一十二日支用草五萬八千六百餘束可勾本城主兵馬四箇月支用若添客兵馬三千匹止勾五日半支用興武營糧三千二百四十八石約量可勾本營主兵二箇月支用若添客兵三千員名止勾一箇月零六日支用料八千六百二十九石三斗除主兵外若添客兵馬三千匹止勾三箇月支用草四萬二千三百六十束除本營主客外若添客兵馬三千匹止勾一十四日支用清水營糧米全無料四千八百五十三石八斗原無主兵馬若添客兵馬三千匹止勾一箇月零二十五日支用靈州糧一千五百四十一石二斗可勾主兵二十一日支用若添客兵三千員名止勾一十三日支用料一千二百四十七石四斗約量可勾本城主兵馬四箇月支用若添客兵馬三千匹止勾一十二日支用草六萬二千四百八十七束約量可勾本城主兵馬五箇月支用若添客兵馬三千匹止勾一十九日支用其餘營堡糧料各不滿千石草不滿萬束或有糧無料或有料無草小鹽池韋州尤為緊要小鹽池料三千一百三十二石約量可勾本營主兵馬數月支用若添客兵馬三千匹止勾一箇月支用草一萬七千一百五十束約量可勾本營主兵馬數月支用若添客兵馬三千匹止勾五日支用韋州料豆全無糧止有一百三十一石二斗草止有三千三百一十九束若調客兵馬三千俱止勾一日支用缺乏至此可謂極矣且本邊亦有年例銀兩亦曽報中引鹽不知前該鎮巡等官所幹何事倘果大敵侵犯會調延綏陜西遊竒兵馬截剿每枝各有三千將何支費臣節經劄仰寧夏管糧僉事劉淮令其轉呈巡撫衙門近方發銀差官分投糴買若敵人稍緩事或可辦倘旦夕入寇斷然失誤供應及查得延綏各路糧料草束亦多無積而甘肅一鎮尤為匱乏臣前所上疏欲乞開中淮浙等運司鹽一百萬引乞發官銀五十萬兩蓋不專為陜西為寧夏為延綏為甘肅也至今未奉明旨今將查探過套人聲息緣由遵照欽依奏報伏望聖明軫念邊方事重乞勑戶部將臣前所乞請鹽銀早為照數給發以濟各邊急用仍乞勑下寧夏新任巡撫等官將沿邊一帶倉場糧料草束上緊督處務令充實以備調兵庶幾藩籬可固根本不搖臣愚幸甚兵民幸甚緣係遵照欽依探聽邊情奏報事理為此具本順差承差席宗吉親賫謹題請旨一為回賊出沒事題為回賊出沒事嘉靖四年六月十八日據分守涼州地方右副總兵署都指揮僉事周尚文呈為回賊出沒官軍追敵斬獲首級奪回人畜事本年六月初一日寅時據黃城兒夜不收蔡俊水磨溝夜不收胡俊各報五月三十日寅時爪見本溝馬迹一路約有八九十餘騎往東行走髙透朵鸞口低透井兒溝金塔寺據報三處不知從何山口出沒差人分投爪哨傳諭收斂及整兵隄備間本日辰時據在城南門樓直日軍人劉兔兒走報瞭見城南土山墩舉煙二把燒柴堆一座本職即時舉號統領在城馬隊官軍千總指揮徐威等四百名出城迎火追襲間隨據金塔等山口石觜兒墩爪哨夜不收易奴兒馳報本日卯時分有回賊一百餘騎從南山溝突出撲到把截營地方四散搶掠彼有本營馬哨夜不收康咬兒赴城馳報被賊邀截射死官馬搶去本役取路來報本職急督官軍驟馬先去追趕傳令千總指揮唐佑管領步軍繼後本日午時追到地名大水腦天池地方一百五六十里趕上前賊迎來對敵職督官軍止有三百餘員名奮勇一齊撲斫向前就陳斬獲賊首一顆奪回連鞍戰馬一匹射死二匹賊見官軍勢猛各將原搶人畜盡行丢棄四散敗走上山軍趕上嶺其賊遇髙且戰得平且行又追三十餘里彼此中傷人馬數多欲再深追况彼山險樹林稠密官軍馬匹一時奔馳一百八九十里賊逺馬促又臨敵境恐墮姦計當差夜不收蕭住兒跟襲前賊向往收軍回到原奪人畜天池結營歇馬隨據千總指揮徐威呈稱查得斬獲前項首級一顆奪獲賊馬一匹夷器盔甲等物一百九十六件副及被搶男婦三十八名口夜不收一名牛驢九十二頭隻射死軍人鄒升等馬五匹走死孫成等馬三匹射傷吳安等馬二匹射傷軍舍魏祥等七名俱輕傷據此至初二日掣軍回城整兵隄備及將斬獲首級器械發仰涼州衛官庫收貯馬匹撥人寄養俱候明文施行奪獲人畜著令指揮王憲等查給失主認領及委官前去賊經地方查勘此外再有被敵搶殺人畜體勘明白徑自通行開報外呈乞施行等因到臣為照前項回賊近於本年五月十四日侵入永昌地方被守備官馬雲督軍追殺斬獲首級三十六顆奪獲戰馬夷器等件已經具題外今尚不知悔禍逺遁又侵至涼州大水腦天池等處顯是此賊因去嵗侵犯甘肅地方不曽大遭挫衄遺留醜類伏我近邊意在窺伺我人畜妨我耕作雖是不敢深入終亦被其撓害副總兵周尚文雖稱督兵逺追止是斬獲首級一顆奪獲戰馬夷器及奪獲被搶人畜不能痛加誅勦况中間隱匿不報情弊難保必無除行甘肅鎮巡官行委巡守等官查勘的確具奏及行各該主副參遊守備操守等官俱要用心防範整兵秣馬若復仍前侵掠即便會合截剿務使挫衄逺遁勿令貽患地方外緣係回賊出沒官軍追敵斬獲首級奪回人畜事理為此具本順差承差席宗吉親賫謹具題知一為敵衆出沒計處用兵機宜事題為敵衆出沒計處用兵機宜事嘉靖四年六月初四日據分守莊浪等處地方副總兵都督同知魯經呈為敵衆出沒事開稱本年五月十四日等日節據松林墩等處夜不收蘇欽等報於寡婦溝等處爪探得敵衆或三五十騎或百十餘騎或五六百騎或在邊外住牧或穵壕入境撲捉差哨人役節報前來為照敵人久在五方寺為窠近日那在蘆塘等處住牧分遣輕騎瞧撲應哨人役及聲言要尋西海敵人意在糾合入寇旦夕難測除謹斥堠整兵隄備外緣本城兵馬數少不敷分布而鎮羌岔口尤為衝要已將缺兵緣由纍行甘肅鎮巡衙門議處至今未見明示倘敵萬一糾犯臨期誤事非輕今照甘肅遊擊嚴鎧統兵見在莊浪乞要暫留併力截殺及將已到邊守禦蘭州中護等衛官軍照例分發一千前來鎮江岔堡防守等因據此又據分守涼州地方右副總兵署都指揮僉事周尚文亦呈前事開稱本年五月初一日據報紅寺兒地方敵衆三十餘騎穵壕進境官軍追至亂壕子追見前敵原路奔走襲蹤前至乾湖地方南北溝內突出伏賊三四百騎與官軍對敵中傷敵衆人馬數多方才退走後追至壕邊沙窩又有伏賊三百餘騎聚集攻敵因見遊擊將軍嚴鎧統兵前來賊出境去訖查得征傷軍人李保兒等六名射死軍人何達等馬九匹走死于定等馬六匹射傷尤旺馬一匹收獲達箭三百三十五枝等因各呈報到臣為照前項邊敵數亦不多各官雖稱出兵追截不聞斬殺之功反將軍人射傷及射死馬匹中間隱匿别情難保必無已經行仰副總兵魯經周尚文等各整搠兵馬嚴斥烽堠加謹隄備果有侵犯即便督率官軍奮勇力戰毋得攖城自守殘害地方亦要相機而行知彼知己不可輕進窮追被其引誘遊擊將軍嚴鎧既見在莊浪暫留在彼併力截殺若涼州聲息緊急亦要領兵前去䇿應其備禦蘭州中護等衛官軍如已到邊查照舊例分發鎮羌岔口二堡防守外照得前項敵衆自正德三四年間被小王子人馬讐殺殘敗遁往河西莊浪涼州蘇海圗斬石峽明水湖扒沙一帶潛藏住牧時出剽掠阻截道路敵傷官軍臣起廢西征復總制陜西軍務之時建議欲調集大兵痛加誅剿彼時規置已定惟候成命不意旋即奉勑取回兵部題奉欽依行令甘肅鎮巡官整理緣兹事重大豈甘肅一鎮所能了辦因循養患十有餘年敵既那營竊伏西海逼脅楚遜阿敦各處敵人烏合為巢歲復一歲醜類漸繁乃敢寇我洮河深入松潘地界自是虎踞青海蠶食屬番遂釀成甘肅陜西腹心肘腋之患去年冬間被回賊驚散一半越往官路之北被各鎮官軍相遇斬殺數多其大營仍在西海剌剌山江零口住牧雖未見侵犯而禍胎實深除督令各該守臣哨探尋襲計處方略另行具奏外其在北者多不過一二千俱係精兵十可當百因無老小棲止不定自今春以來多則五六百騎少則二三百騎或在莊浪五方寺尖山蘆溝或在涼州松山蘆塘等處聲東擊西或出或入河西衛所官軍防禦三處敵人無所不備無所不寡經年纍月不得解甲若不先其所急早為祛除緣前賊切近腹裏恐其尋搶月久野無所掠水橋結凍之後將有窺伺蘭州靖邊之謀彼處軍馬數少不能支持乘虛而入則會寧安定狄道金縣地方難保不遭搶掠臣愚欲趂今與西海敵人離析之時量調陜西延綏精鋭兵馬五六千名與莊浪涼州副總兵遊擊等官會合尋襲痛加誅剿以除門庭之害則西海敵衆聞之亦將禠魂破膽有不戰而走之勢區區回賊又不足憂也但今河套情形未定沿邊腹裏俱未敢掣兵又莊浪一帶倉場糧草處處空虛方為逐漸經理須待套中無警糧草有積方可舉事然兵貴神速機難預定必待臨期奏請非惟緩不及期且恐事機先泄如蒙聖明裁處乞勑兵部計議倘此言可采乞早行臣密會各該守臣不拘何月日相機取便行事俟大兵既集詢謀僉同因而撲剿西海之賊至期計處定奪務在計出萬全若無可乘之機或軍馬錢糧未備照常戰守不敢輕舉妄動以貽後艱緣係敵衆出沒計處用兵機宜事理未敢擅便為此具本謹題請旨一為乞留方面賢能官員共濟時艱事題為乞留方面賢能官員共濟時艱事照得陜西地方乃邊境之樞衡中源之鎖鑰北有河套之敵警報無時西有回賊之寇姦謀罔測比年以來旱霜之災變相仍摽掠之瘡痍未復民窮財盡盜賊因而竊發文恬武嬉邊務日加廢弛雖鎮之以撫臣巡之以臺察然催徴錢糧修飭邊備拊循凋瘵招撫流亡必在二司得人庶可倚賴近年升補官員或憚地方之險逺而不來或取便道以還家而延住官多虛位事無統紀即今河西關南二道俱缺分巡官員其見任賢能者又或遷轉無常更代不一如右布政使郭韶右參政潘塤皆久任兹方足堪付託循資各已升去臣所知者尚有數員若又升遷别任新任官員縱有才能事體未即周知人心何所係屬如按察司按察使袁擯廉公有威剛明克斷副使陳鼎翟鵬才略足以濟變威惠足以服戎副使髙公韶韓士竒以慎密持官守以平易得衆心僉事桑溥政嚴明而執守堅定性聰察而聽斷如流之數官者年勞漸深臣慮其升遷别省緩急無可倚賴事關地方休戚不容隱默其他年資尚淺升遷未及者不敢槩陳如蒙伏望聖明俯念陜西三邊重鎮用人為難乞勑吏部采臣所言參之輿論待本省員缺將各官奏請簡用如本省無缺暫留照舊任事免升别省地方待其績效益彰特加超擢各官既得以罄其才愚臣亦得以資其用不勝至願緣係乞留方面賢能官員共濟時艱事理為此具本謹題請旨一為急缺管糧方面官員事題為急缺管糧方面官員事照得陜西布政司管糧右參政姚文淵近日聞母喪丁憂回籍去訖所有員缺未曽銓補切緣陜西八府民屯錢糧外供陜西固靖等邊及延綏寧夏甘肅三鎮官軍之用內則秦韓肅慶等王府祿糧并官吏師生俸廪等糧皆所仰給因是前官玩慢不肯及時催徴以致倉廪空虛中外困竭臣初到陜城查得各府拖欠未完各邊民糧共一百四十九萬六千四百三十四石馬草一百九十五萬八千八百八十八束已經具奏續到平涼府查得韓府各郡王將軍中尉郡縣主君儀賓自正德四年起至正德十五年止共欠本色祿糧三十一萬一千三百七石七斗又欠折色糧二萬六千七十五石其餘未經查報不知的數及據西安左等四衛官軍告稱正德八年起至嘉靖四年三月終止共拖欠本色月糧四十二萬四千八十石折色三十一萬六千六百九十石三斗平涼衛官軍共欠節年本色月糧六萬七千八百一十四石四斗折色糧六萬三千五百一十九石三斗及據固原兵備副使成文呈查得所管固靖甘蘭等衛所纍歲拖欠官軍月糧共二十八萬九千九百九十九石二斗五升其餘衛所拖欠應支糧數亦多類此每遇上司到彼喧攘訴告百十成羣人心窮迫蓋不得已節奉明旨督催巡撫官極力處補不及十之一二臣觀天下各鎮十三省地方險逺要害無如陜西之難公私匱乏亦無如陜西之甚近得參政姚文淵到任未及數月巡歷催督不避艱險催完逋負十餘萬石臣方仗其有為不意忽以丁憂去將來升補官員未知何方恐其到任稽遲雖各行令巡守官督理終非專職不能盡心所事博訪得西安府知府趙伸由兵部職方司郎中升任今職到官方及二年政譽甲於諸郡查據陜西按察司開報本官才能異常當繁劇而有餘力公廉服衆合士民而無間言巡守等官開報所屬賢能官員俱在優選臣嘗聽其議論察其設施委的才足濟時力堪舉劇付以督儲之任必能修舉職業振起頽廢若謂其年資尚淺臣以為求稱繁難之任不須常格之拘且本官先任兵部車駕職方二司郎中若稍遲不升則參政之官亦所當得如蒙乞勑吏部再行訪察合無將本官升任陜西布政司右參政督理糧儲屯種賫憑令其到任管事庶使官不久曠事得早完緣係急缺管糧方面官員事理未敢擅便為此具本順差承差席宗吉親賫謹題請旨一為斬獲犯邊敵衆首級事題為斬獲犯邊敵衆首級事嘉靖四年七月初三日據分守莊浪等處地方副總兵都督同知魯經呈前事節奉臣鈞帖為傳報聲息事備仰本職各要慎固封疆謹斥烽堠整搠人馬若有前寇侵犯大小將官領兵相機戰守協力剿逐蒙此及準本鎮手本備由開稱莊浪地方有賊已行甘肅遊擊將軍嚴鎧領軍在彼併力截殺準此除整兵隄備外嘉靖四年六月十一日亥時據水泉兒夜不收馬驥走報本日未時瞭見敵衆五六百騎邀趕馬牛四五百從青山兒灣行來往東行去報與守備袁英出兵迎敵本役來報本時又據鎮羌堡隨馬夜不收徐鎮報有守備袁英領軍追至石板溝與敵對敵差本役來報隨據石板溝夜不收尚禮報本日申時前寇邀趕牛馬從鎮羌河行來徑奔柏楊溝出境去訖備報得此會同遊擊嚴鎧議得先日有敵一百突至鎮羌聲言要尋西海敵人今果糾衆而來必有烏合侵犯之勢若不截其歸路誠恐久住為患一面差人調取下場馬匹及傳報南北西三路收斂人畜堅壁清野一面行調紅城子守備楊和統兵前來與同本城無馬步軍聽調䇿應十二日寅時職等統領漢土遊兵官軍二千六百員名由分水嶺抄敵歸路本日申時兵至火牌水迎據孤頭嘴夜不收羅文秀走報前寇從排坑行至小水兒飲馬來報得此夤夜馳至常山兒三更時分迎據原差夜不收李玄同彼哨夜不收錢亨一各報瞭見前寇到紅嘴兒河住歇即會遊擊嚴鎧分布遊兵千總指揮趙軻莊浪把總指揮陳璽土官指揮蒙順左哨遊兵千總指揮冶珍土官指揮李昊右哨職等掎角相擊驅兵驟至紅嘴兒河次口黎明時分迎遇前敵五六百騎內一半穿戴青明盔甲迎衝前來就與交鋒對敵連衝數合職等申嚴號令分遣旗牌催鋒督陳我軍奮勇當先齊力用命箭射刀斫鎗炮相攻當有千戶魯瞻等身先士卒就陳斬首三顆遊兵部下斬首四顆獲其馬牛器械戰至已時敵見官軍勇猛射死馬匹中傷人數衆多方才退遁况彼相離莊浪二百餘里恐有伏兵收軍結營當會遊擊嚴鎧查得遊兵莊浪陳亡官軍三員名征傷各衛旗軍一十七名射死馬一十七匹走死馬七匹各查明白掣兵回城差據襲蹤夜不收馬真等供報襲得前敵奔往回水徑透土豹嶺去訖行間及據暫守備鎮羌行都指揮事袁英呈為敵衆出沒事本年六月十一日未時據水泉兒爪探夜不收馬驥走報本時瞭見青山兒灣敵衆五六百邀趕馬牛四五百順河行來得此疾統備禦蘭州等衛官軍千戶王受等三百出兵迎遇前賊一半邀趕馬牛順河往東行去一半穿戴青明盔甲迎衝前來就與交鋒對敵賊見官軍齊力退往石板溝行去復又追至本溝與之交戰射中敵人人馬數騎奪獲牛一隻氊衫二領戰至酉時敵兵退往柏林溝去逺欲再深追天晚落雨掣軍回堡查一得收獲敵箭六十枝敵帽一頂敵鞭一把被敵射死蘭州衛馬二匹走死馬一匹及查本堡並無搶殺人畜理合具呈施行等因得此為照此寇雖被官軍殺敗逺遁復讐之謀旦夕難測除整兵嚴加隄備外呈乞照驗施行隨據甘肅遊擊將軍署都指揮僉事嚴鎧亦呈前事各造册開稱共斬獲敵衆首級七顆獲賊器械等件五百二十一副件奪獲頭畜馬騾牛七十八匹頭隻陳亡遊兵莊浪官軍三員名征傷旗軍一十七名被敵射死走死馬二十四匹等因各呈到臣案查先據副總兵魯經呈為敵衆出沒事節次爪探得前項敵衆或二五十騎或百十餘騎或五六百騎或在邉外住牧或穵壕入境緣此賊久住五方寺為巢近日那在蘆塘等處住牧分遣輕騎撲捉差哨人役及聲言要尋西海敵人意在糾合入冦旦夕難測等因已經節行各官各要整搠兵馬嚴謹烽堠遇有前敵侵犯即便督率官軍相機剿殺毋得攖城自守貽患地方及將計處用兵事宜具題外今據前因為照前項邊敵竊伏莊浪涼州地方不時出沒妨擾耕牧阻截道路官軍晝夜隄備不得解甲實與西海敵人聲勢相倚將來糾合入寇之謀難保必無雖經節次督行各將官用心戰守終是兵馬寡弱不敢逺追陜西延寧等處官軍又因敵衆在套分布防禦各有信地難以輕掣計處間今副總兵都督同知魯經遊擊將軍署都指揮僉事嚴鎧乃能親督官軍奮勇力戰斬獲首級獲其器械頭畜等項功雖不多軍威頗揚敵勢少銼除行令比前加謹隄備不可倚恃小捷輒生慢易致失事機及將俘獲頭畜令其照例給賞有功之人首級敵器發仰莊浪衛貯庫聽候覆驗并咨甘肅巡撫行守巡官查勘賊入地方有無隱匿别情另行外乞勑兵部照例行巡按陜西監察御史將各官軍功次勘驗是實早為升賞以勵後人若有隱匿别情徑自參奏緣係斬獲犯邊達衆首級事理未敢擅便為此具本專差承差楊鸞親賫謹題請旨一為套中走回男子供報緊急敵情事題為套中走回男子供報緊急敵情事嘉靖四年七月初十日據鎮守延綏等處地方總兵官署都督僉事彭楧呈前事據榆林城把總都指揮閻武呈蒙鎮巡衙門發下柏林堡解到套中走回男子趙四斤隨拘通事張祿等到司審據趙四斤供年一十九歲係平涼趙總兵家人狀供嘉靖元年六月失記的日前往地名沙塘川牧放牛羊忽遇敵人瑪哈拉等搶去營中住過四年舊年十二月間跟隨小王子頭兒吉納台吉等部落敵人約有八萬餘多踏氷過河在套今年六月間有衆敵人精兵前去與烏梁海敵人讐殺去了半箇月説到黃河岸邊扎筏浮渡因水大將敵人淹死約有三十餘敵人不敢過去復回在套住牧聽得我們帳房裏敵人説頭兒吉納等會了事八萬敵人每人殺羊一隻晒乾整置鞍仗轡頭指著南邊地方都要出來不知幾時搶至本月二十七日四斤見得衆敵人睡熟思想家鄉遇夜脫走步行三晝夜至七月初一日辰時到於柏林堡崔臼澗墩走回收送到堡解送前來今蒙發審再不知别項敵情所供是實等因據此理合具呈照驗施行等因據此會同鎮守太監張紳巡撫右僉都御史張縉議照套中走回男子趙四斤供報前情雖係傳聞事頗有因况今秋涼馬肥謀為入冦正在此時防範機宜不可不備查得先因本鎮東路缺兵防守已經會呈提督軍務衙門乞將副總兵趙瑛那來中東二路營堡防禦蒙批趙瑛兵馬仍於寧塞營駐劄便於東西應援果有緊急賊情方許掣回截殺等因除遵依外今供前因為照西路鎮靖等堡係敵衆常年出沒處所况副總兵趙瑛相離該堡不逺合行本官整搠所部兵馬如遇前敵侵犯鎮靖龍州地方星馳應援以遏邊患若犯巴圗等堡及有西行之勢遵照提督軍務衙門分布兵馬防禦事理隨賊援剿庶不誤事擬合通行為此除行各城營堡整搠兵馬嚴謹烽堠及行臨近州縣各將所管近邊夾道住居人畜起那腹裏百里之逺深險牢固崖窯堡寨去處安插仍於每堡各選差乖覺夜不收相兼熟知地里餘丁共二名輪流出境離邊二三十里及五七十里於敵衆住牧水頭處所潛伏哨探若有聚衆入寇之勢一面傳報左右鄰堡及腹裏居人收斂人畜肅清四野一面飛報本職斟酌用兵及行副參遊擊把總等官加意隄備勿致誤事外呈乞照驗施行等因到臣為照前項敵衆自嘉靖三年十一月內據走回男子路駒等供報小王子叔叔台吉領一枝精兵敵人四萬哥哥吉納領一枝精兵敵人四萬共八萬餘多踏氷過河在套住牧等情臣到陜西地方行據延寧守臣差人哨探並無大寇近邊但自延綏黃甫川堡直抵寧夏靈州千數百里無處無之或七八十人或一二百人帳窠火光逺近相望後據走回男子王巴圗爾供稱在套敵衆一萬餘騎一説要與黃毛敵人讐殺一説要先搶漢人又據走回男子金佐等供稱小十王下敵人三萬餘騎在套住坐相度事勢原報八萬之説初亦不虛後一半渡河一半在套其數當不減數萬切料此賊姦謀不露大衆形迹乘間俟時大舉亦未可知巳經節次督行各該將官加謹隄備及具題外近日方據延綏總兵官彭楧呈稱走回男子谷世安供於舊年十一月內跟隨小王子叔叔諳達阿布該等部落敵人踏氷過河在套住牧止知他們一枝敵人約有三千其餘不知多少五月間聽得衆敵人説會了事七月間精兵多半要扎筏過河與烏梁海敵人讐殺少半看守老小在套住牧又不知過去不過去一名鍾那孩則亦供十一月內跟隨小王子部下三箇頭兒台吉吉納諳達阿布該部落三枝敵人踏氷過河在套住牧止知他們敵人一枝約有三萬其餘敵兵不知多少聽得衆敵人説摘一半精兵過河與烏梁海敵人讐殺不知去不去又一名馮石城兒亦供跟隨小王子部下頭兒吉納等部落敵人約有八萬餘多踏氷過河在套住牧聽得衆敵人説將牛羊馬匹老小丢在河畔精兵好馬要扎筏過河與烏梁海敵人讐殺又説等馬壯了要來搶掠等語議處間今走回力子趙四斤供稱被搶跟隨小王子頭兒吉納台吉等部落敵人約有八萬餘多踏氷過河在套今年六月間有衆敵人精兵前去與烏梁海敵人讐殺去了半箇月説到黃河岸邊扎筏浮渡因水大將敵人淹死約有三十其餘敵人不敢過去復回在套住牧聽得我們帳房裏敵人説頭兒吉納等會了事八萬敵人每人殺羊一隻晒乾整置鞍仗轡頭指著南邊地方都要出來不知幾時搶至等情看與節次走回人口所供相同况今秋涼馬肥正係馳驟時月大舉之謀旦夕難保臣受命節制諸軍此賊倘果侵犯仰仗天威謹當䇿勵將士恭行天罰殱厥醜類以雪兵民之憤以寬西顧之憂但延綏中東二路城堡聨絡各據險隘敵雖侵犯止在本境不能深入惟寧夏花馬池至靈州一帶地里寬漫城堡稀疏兵馬單弱敵若大舉必從此拆墻而入其所利不在寧夏而在腹裏已行令延綏遊擊張鳳於定邊營副總兵趙瑛於寧塞營各住劄便於東西應援仍留遊擊劉淵所統遊兵三千延綏東路按伏防守近據甘肅鎮巡官節報回達二敵侵犯兵力不支要將陜西延寧遊竒等兵調來莊浪駐劄應援為照套衆向往未定不敢輕掣而河西事情已急難以坐視又將遊擊張鳳掣調附近地方待其再有緊急重大敵情發去䇿應副總兵趙瑛竒兵那調定邊營花馬池駐劄與彼處分守協同守備人馬禦防河套各施行去後切見近日陜西固原一帶士馬頗為精強糧草稍有積蓄但沿邊延綏寧夏營堡缺乏如故每議調兵輒為糧少所阻近該戶部題準開中引鹽方將召商報納尚恐緩不及期及照花馬池興武營清水營靈州小鹽池韋州等處俱係寧夏所轄見今主將缺人軍無統紀新除將官及新推巡撫都御史未知何日到鎮及又查得舊例陜西延綏與大同宣府遊竒兵馬俱該互相應援近日山西偏頭關有警已將延綏遊擊劉淵兵馬調去䇿應續因無事掣回今陜西敵情難測倘果大舉深入延綏遊竒三營人馬俱該調去西路截遏其中東二路未免空虛亦合量調鄰鎮官軍防守如蒙伏乞聖明軫念關中三邊根本重地所繫匪輕乞勑兵部行催寧夏新任總兵官及巡撫官兼程赴任統率官軍防禦邊冦及預行山西大同鎮巡衙門將偏頭關官軍大同遊兵整點聽候若陜西果有重大賊情彼鎮無警延綏鎮巡官來調即便領軍前去聽總兵官彭楧調度戰守事寧即回本鎮如此則內地無虞邊境亦有賴矣緣係套中走回男子供報緊急敵情事理為此具本專差承差楊鸞親賫謹題請旨關中奏議卷十二
