body:
  text: 闗中奏議巻八明楊一清撰總制類一爲預防邊患事兵部覆該本部於兵科抄出總制陜西延寧甘肅邊務兼督理馬政都察院左副都御史楊一清題近該兵部咨該總制大同宣府偏頭闗等處邊務都察院右都御史劉宇奏要會集邊兵以勦滅套冦該本部看得各鎮有事俱宜彼此相濟合無再行總制都御史楊轉行各處守臣知會今若大同賊勢衆大十分告急延綏總兵官合量帶精兵赴援不許坐觀成敗儻後延綏亦有十分警急宣大二鎮總兵官亦要親自將兵䇿應不可顧今日自巳之利忘他日隣境之憂庶幾事體不偏人心可服等因題奉欽依備咨前來案照先准兵部咨爲大冦臨邊整兵防禦事亦該總制都御史劉宇奏要徴調延綏兵馬巳經併行延綏總兵官張安整搠聽候如遇大同聲息十分𦂳急移文徴調即便量帶精兵赴援外查得延綏副總兵姜漢所領竒兵三千餘員名遊擊將軍戴欽所領遊兵三千餘員名俱於本年三月内大同調去䇿應至今五箇餘月未回切緣近年套衆恃其桀黠河凍則西行以冦闗陜河開則東渡以窺宣大不曽痛遭誅勦肆無忌憚今年自正月間陜西靜寧隆德地方搶掠回套渡河之後雖在大同宣府近邊住牧不曽入境侵掠想因總制都御史劉宇蒐選强兵要行會勦先聲所傳全部畏遯今秋髙馬肥時月既不得志於北冬寒河凍必將垂涎於西部落種類既繁動稱數萬會計陜西延綏甘肅三鎮見在人馬不足以當大同一鎮之數且甘肅地方四時警報不絶官軍難以掣調寧夏兵勢餒弱山後之衆不時侵擾僅能支持所恃以捍禦邊陲保障腹裏惟延綏一鎮士馬精强緩急可倚但自遊竒二兵調去之外所遺老家并新募有馬官軍不過八千餘員名東接偏頭闗西寧夏千有餘里大小營堡三十四處分兵而守無所不寡勢須自保難再輕掣及查得𢎞治十八年九月内臣巡撫陜西因恐套衆踏氷入冦延綏遊竒人馬調去大同未回奏巳行令延綏副總兵遊擊將軍姜漢叅將王㦸作急將所領官軍掣回曹雄竒兵暫於定邊營駐劄以便延寧兩境䇿應姜漢遊兵王㦸土兵於花馬池興武營等處按伏如果敵衆入套擁衆近邊與寧夏副總兵叅將恊同守備等官人馬併力捍禦保固邉牆不令入境該兵部議擬覆奏奉聖㫖是便行與各官着同心恊力相機防禦不許自分彼此致悞事機欽此欽遵通行去後本年十二月内敵人擁衆自花馬池拆牆深入腹裏搶掠止是調到王㦸土兵猝與敵遇交鋒失利其延綏副總兵竒兵遊擊將軍遊兵俱未到邉臣不次移文督調終是緩不及期蓋因各該官軍初自大同掣回未及休息遽遭大敵以此應援不及向使各枝兵馬早得掣回如臣所擬分守地方駐劄套衆未必敢爾長驅深入縱不能遏其初入之鋒襲蹤而進㑹合陜西官軍取便截邀未必無功徃事無可説已今不早爲之處冬間套衆設復有警不無仍前誤事臣惟大同宣府爲北門鎻鑰果有重大聲息乃京師門庭之敵臣亦當親提師旅前去應援豈敢輒議掣兵但聞今年套衆實不曽侵犯二鎮而延綏遊竒兵馬在彼乆駐師老力竭人馬疲敝非惟坐縻彼處粮草亦恐將失本處事機况宣大偏頭闗三鎮總制挑選精鋭援兵巳有五萬六百餘員名足勾截勦似亦不藉延綏數年官軍之力臣有地方安危之責不敢不言如䝉乞勅兵部計議合無齎文總制都御史劉宇并各該守臣查勘如果套衆不曽犯邉别無重大聲息速將延綏遊竒二兵發回本鎮暫時休息收拾軍裝衣鞋聽候調遣防禦套衆仍乞通行大同宣府偏頭闗三鎮鎮巡官員各照兵部節次題奉欽依事理彼此相濟互相應援待十月間哨探若是套衆西行遊竒將官即便那至本境陜西交界去處駐劄敵果入套延綏守臣徴調即便前來㑹合應援截殺如是聲息十分𦂳急宣大二鎮總兵官亦照該部今次所奏親自將兵䇿應以寛皇上西顧之憂以祛闗陜兵民之患庶得彼此相濟地方可保無虞等因具本該通政使司官奏奉聖㫖兵部知道欽此欽遵抄出送司查得先爲㑹集邉兵以勦滅套敵事該總制大同都御史劉宇題稱延寧地界與本鎮相連乞行各鎮守臣知㑹今後如遇有警預調軍馬毋分彼此就便督發起程㑹合截殺等因具本前來該本部議行總制陜西都御史楊轉行各該守臣若遇大同敵勢重大十分告急延綏總兵官量帶精兵赴援以後延綏亦有十分𦂳急宣大二鎮總兵官亦要親自將兵䇿應等因題奉聖㫖是欽此已經通行欽遵去後續爲軍務事該延綏副總兵姜漢遊擊將軍戴欽各題稱抄䝉總制大同都御史劉宇鈞帖行令將所領遊竒兵馬俱各掣回本鎮蓄養軍鋭聽候遇警徴調巳於八月十七日掣回等因具本前來本部又經案候外今該前因案呈到部除延綏遊竒兵巳經掣回操候别無定奪外看得總制都御史楊奏稱套衆桀黠河凍則西冦闗陜河開則東窺宣大今嵗宣大地方俱未入境侵掠冬寒河凍必將垂涎於西及稱陜西等處兵力所在不足欲要通行宣大偏頭闗各該守臣待有警報遊竒兵馬那至本境交界去處駐劄以備徴調截殺若是聲息十分𦂳急二鎮總兵官亦照該部先次所奏親自將兵䇿應共紓邉患一節切縁邊人之性專以搶掠爲生今既不得於東則西冦之謀勢所難免即今天寒在邇先事之防不可不慮况查與本部先次奏行事理大意相同合無本部一面行移陜西等處總制都御史楊轉行各路守臣督令各該將官當此河冰未凍事勢稍緩之時將各項馬歩官軍招募土兵人等用心操練聽候調用各該通敵要害如花馬池等處嚴明斥堠慎固封守及一切防禦事宜俱要計慮周悉萬一故智復逞擁衆入侵即便分布將士或戰或守隨宜相機調度務使此敵大遭挫衂用靖地方毋得輕忽貽患有孤委任一面行移宣大等處總制都御史劉宇轉行各路守臣將遊竒二項軍馬整㸃齊備聽候徴調如果敵已渡河西行延綏報至即便起程前去㑹同彼處官軍相兼戰守若是聲息十分重大二鎮總兵官仍要查照先次本部奏行事理量帶精兵親去䇿應共濟邉務不許秦越相視託故遲延設有妨誤厥罪惟均縁係總制官員奏要徴兵禦敵及奉欽依兵部知道事理未敢擅便正德元年九月十九日本部尚書許進等具題本月二十一日奉聖㫖是便行與各官果有重大聲息務要互相䇿應不許自分彼此致誤事機欽此欽遵擬合通行除外合咨前去煩爲轉行彼處各該鎮巡等官一體欽遵施行一爲薦賢爲國事題爲薦賢爲國事臣惟今天下邉鎮皆有武臣以總戎事要害重地則掛印充總兵官然必用巡撫都御史一員贊理紏察之文武並用犬牙相制立法之善度越前古奈何近年以來邉備漸弛兵威不振以致敵勢驕横民遭荼毒有識之士痛心切齒陜西各邉士馬臣所親閱其間堪戰之兵數非不多而練兵之將實不多見大抵以軍法則不嚴以軍令則不明以軍容則不整以軍威則不揚無事則玩愒相安遇警則倉皇失措竊恐他鎮亦或相類如是而望敵人懾服邉境肅清不可得也若此者蓋不獨將官之過而凡爲巡撫者有厚責焉今之巡撫非不極一時之選但人才難得而邉鎮巡撫得人尤難且近代用人未免較其年勞限於資格舍是則躁進之門寖啟失人之弊轉甚若以年資待常格以不次㧞異等二者並行而不相悖庶㡬真才出乎其間邉事可從而理臣又思得近年邉事之廢皆起於因循成於姑息而極於䝉蔽必用剛明果斷尚氣節輕富貴之人庶㡬頺惰之俗可矯軟美之習可變誕謾之風可除兹當太平全盛之世賢俊林立隨取隨足不可謂無其人但臣局於職守聞見有限臣所知者陜西按察司副使王雲鳳以儒飾吏正而不迂以刑弼教剛而不虐有凛然不可犯之風有介然不可奪之操陜西行太僕寺卿王琰耿介自持言笑不茍爲户曹而執守素著司馬政則卿寺生風養病吏部文選司郎中張綵懐抱磊落才識疏通生長西方素諳邉事頃者一遭言論毅然求歸杜門却掃無復仕進之意即此一節可激頺懦此三人者王雲鳳王琰皆陜西屬官張綵陜西鄉宦故臣知之爲真使當邉鎮之寄授巡撫之任必皆有虎豹在山之勢竊念薦賢爲國非爲私也但臣任總戎務不敢出位而思故以職業所及者言之况以人事君大臣之責舉爾所知求賢之要臣雖無状承乏重位茍有所見豈敢緘黙伏望聖明察臣朴忠恕臣僣妄乞勅吏部詢之輿論如果王雲鳳王琰張綵材有可取遇有各邉巡撫員缺照例推舉上請簡用必不負朝廷任使而愚臣尸素之罪亦將藉是以少逭萬一矣縁係薦賢爲國事理謹題請㫖一爲乞恩停免進貢紅花以恤邉兵事工部覆都水清吏司案呈奉本部送於工科抄出欽差總制陜西延綏寧夏甘肅等處邉務兼督理馬政都察院左副都御史楊題行據鎮守寧夏總兵官右軍都督僉事李祥呈行准鎮守都知監太監葛全手本查得寧夏城并中衛所種進貢紅花空閒地三頃三十畝逓年額撥空閒餘丁老幼一百名播種澆灌水利立夏之際乞討冬操餘丁一百九十名薅鉏至六月終花蘂開綻一時急不能摘恐被雨水日色淋曬不便先儘種花餘丁一百名并乞討餘丁七百九十名次第採摘約二十餘日花蘂開放將盡疎放每年採過鮮花洗曬每五斤八兩做乾花一斤𢎞治十七年分收過紅花一千四百零二斤𢎞治十八年分收過紅花一千五百五十二斤今正德元年收過一千二十五斤俱遵照欽依事理差的當人員給脚力管送赴京進貢交納等因及查得本職處接管進貢紅花寧夏空閒地三頃四十二畝額撥空閒老幼餘丁一百三名春初耕種澆灌立夏乞撥冬操餘丁八百名相兼種花耘鉏六月花開次第差撥餘丁八百名挨次採摘二十餘日待花開盡疎放𢎞治十七十八二年共收乾花一千八百八十五斤一兩七錢進貢外今正德元年收過紅花七百七十斤二兩七錢亦照欽奉勅㫖差官管送進貢交納等因開呈到臣案查先爲前事訪得寧夏鎮守衙門逓年採摘進貢紅花撥用官軍數多恐有别項私役情弊已行查報去後今據前因切照惟正之供在聖王不能廢畢獻方物亦臣子所當爲寧夏鎮守太監總兵進貢紅花未知起自何年及稱節奉欽依事例各該官司亦無案巻可查以臣度之既不經由司府衛所衙門又無額徴一定斤數其非任土常貢明矣先年或以其土産之良暫時取用又恐喜事貢諛之輩倡而爲之逓年相承以爲故事夫紅花之爲物取之以供服用固非竒技淫巧之比但播種澆灌薅鉏採摘之役撥用軍丁動以千計前項查報猶恐未的經該人員藉是以耘種私田營幹私事者難保必無計其所進之數兩鎮守衙門每嵗共不過二千餘斤裝盛櫃扛差官賫進起撥車輛人夫寧夏距京師㡬四千里未免騷擾驛逓中間指稱盤費打㸃等項使用莫可查考利之歸於官者甚少害之及於人者實多且寧夏地方孤懸河外與敵爲隣在先年間邉境寧謐年榖豐登軍有餘力似不為虐近年以來山後之敵不時窺伺河套之敵乘凍侵擾按伏截殺徴調無休正兵兼有守墩守牆守堡之勞餘丁又有修邉修渠修壩之役加之頻年荒旱衣食不繼屯糧重大輸運孔艱原領軍伍凋耗居半逃者未復存者又逃不得巳而抽選招募求以實邉所得不償所亡空虚轉甚陜西各鎮邉兵未有若寧夏之最貧且弱者將來事勢臣切憂之及今正宜多方寛恤扶衰補羸以圖元氣之復一切不急之務似應停止臣切惟聖明軫念邉鎮重地嵗發帑藏之銀易買粮草馬匹不知若干萬兩前項紅花京師所值價銀不過數百餘兩若蠲每嵗數百兩之銀寛每嵗數千人之役所失者小所得者大亦何足惜如䝉乞勅工部查議合無將寧夏鎮守太監總兵進貢紅花特降德音停免額撥播種餘丁聽當别差果有欽奉先朝著爲常貢勅㫖亦乞暫停三五年以恤邊兵用成損上益下之美且免假公營私之弊所謂寛一分則受一分之賜邉人雲霓之望此其一端也等因奏奉聖㫖該部知道欽此欽遵抄出送司案呈𢎞治十四年爲進貢事該鎮守寧夏太監張僴署都督僉事郭鍧各題節奉勅諭朝廷公用紅花今民間艱難不欲科買勅至即依永樂年中量撥老幼餘丁責令老成清正官員提督於空閒田地内布種俟收成後差的當人官給脚力管送赴京交納欽此欽遵照得今年本鎮河套大勢敵衆俱在邉外下營不時拆牆出没又沿途人車扛擡運送接逓繁多疲勞已甚若照常年進貢誠恐中途不便如䝉聖恩愍念邉方多事民夫困苦乞將該進紅花待候聲息稍寜差人進貢俱節奉孝宗皇帝聖㫖是欽此欽遵案呈到部臣等看得左副都御史楊題稱寧夏兩鎮守衙門毎嵗所進紅花共不過二千餘斤播種澆灌薅鉏摘採之役撥用軍丁動以千計裝盛櫃扛差官賫進起撥車輛人夫寧夏距京畿四千里未免搔擾驛逓中間指稱盤費打㸃等項使用莫可查考利之歸於官者甚少害之及於人者實多兼且地方孤懸河外與敵爲隣近年以來山後之賊不時窺伺河套之冦乘凍侵擾按伏截殺徴調無休正兵兼有守墩守牆守堡之勞餘丁又有修邉修渠修壩之役加之頻年旱荒衣食不繼屯糧重大輸運孔艱原額軍伍凋耗居半及今正宜多方寛恤扶衰補羸一切不急之務似應停止又况邉鎮重地嵗發帑藏之銀易買粮草馬匹不知若干萬兩前項紅花京師所值價銀不過數百餘兩若蠲每嵗數百兩之銀寛每嵗數千人之役所失者小所得者大乞降德音停免額撥播種餘丁聽當别差果有欽奉先朝著爲常貢勅㫖乞暫停三五年以恤邉兵一節切照寧夏係要害邉鎮况近年以來兵荒交集所在軍民艱苦萬狀正宜寛恤以保邉防本官親歴其地不爲無見今雖查有先年勅㫖亦不係常貢之物其染造衙門所用自有河南等布政司去處嵗辦輸納並不缺乏伏望皇上軫念邉防俯從本官所擬將前項紅花永蠲進貢以蘇軍困如果用度浩繁着令該衙門計出臣等斟酌腹裏出産地方從宜科買以足原數仍將原種紅花地土行移户部改爲屯田徴收子粒少濟邉儲原撥軍丁悉令各還衛聽當别差如此庶供應不失邉困少甦便益縁係停免進貢紅花以恤邉兵及奉欽依該部知道事理未敢擅便正德元年十月十三日本部尚書曽鑑等具題次日奉聖㫖紅花照舊進欽此欽遵擬合通行除外合咨前去煩照本部題奉欽依内事理欽遵施行一爲應詔陳言原情宥罪保全將官等事題爲應詔陳言原情宥罪保全將官以勵人心事行據整飭固原等處兵備陜西等處提刑按察司副使髙崇熈呈抄奉臣劄付前事依奉親詣孔壩溝楊琳交戰去處拘集地方知因人李通楊鑑等前來審據李通等供稱𢎞治十四年間七月内巡撫御史周季麟在於固原駐劄聞知敵衆侵犯韋州地方隨差陜西都司都指揮僉事楊琳率領官軍九百九十四員名前徃黒水口按伏截殺本月二十四日楊琳據夜不收馬黒兒走報敵衆進至打狼川本日至午時敵衆萬餘先巳攻圍鎮戎所彼時楊琳以衆寡不敵與隨征西安左衛指揮朱鼎等議要仍駐黒水口以避其鋒有朱鼎等回説若不進兵被周都堂打一百也只是死不如進戰便死也有名楊琳當即發軍本日未時分行至孔壩溝率遇大勢敵衆約五六萬騎連山遍野滿川前來迎敵占在四面髙崗將官軍圍在溝南兩陣相離不上三十餘歩楊琳在中軍發放如今彼衆我寡且又陷在死地須是大家力戰求生當令指揮朱鼎妙齡武臣許慶千户楊璽各分一面督軍當先對敵因是兩鎮相近矢無虚發戰至戌時官軍死者三百餘人敵衆死者亦有百十餘人官軍在前者奮死力戰在内者擠㧜不得展手彼時心慌目亂莫辨誰何直至昏晚罷戰敵衆俱在周圍劄營又值夜雨如注不息至天明二十五日軍火器具皆濕又復交鋒彼説不要殺了只與我馬罷官軍叱罵固拒捨死力戰至已時官軍死者又約三百餘人敵死者亦有八九十人俱在溝中重疊枕藉敵見朱鼎妙齡武臣許慶楊璽善戰當先讎視四面攅合擁擠向前將朱鼎等鈎攙下馬俱支解訖楊琳與見在中傷官軍三百餘員名各中鎗箭血流糢糊俱在死屍内掩藏敵退方纔走出回城今䝉審供是實等因備供具呈到臣案照先准兵部咨該本部題該貴州道監察御史楊儀題稱𢎞治十四年七月内陜西敵衆大舉入攻直抵固原衛葫蘆硤口官軍莫敢當鋒都指揮楊琳提一千之弱兵當十萬之强敵奮不顧身輸心死戰人疲力竭矢盡手空致傷官軍數多事非得巳彼時居民賴以逃避敵衆多被殺傷其抵敵之勇亦爲可嘉比之閉門不出臨陣在逃怯懦無爲者萬萬不同要乞免其充軍或降級或立功或復其舊官戴罪出征等因具本該本官題奉孝宗皇帝聖㫖兵部看了來說欽此欽遵抄出送司案呈到部看得充軍都指揮楊琳先該大理寺少卿何鈞等官叅稱輕率交鋒全軍覆敗問擬斬罪後以總制尚書秦紘奏稱彼衆我寡情有可矜欽䝉寛宥止着充軍續該㑹官議奏奉欽依免解配所送秦紘處聽用征戰前後俱據各官所奏議處情法似已兩盡今御史楊儀又奏前因縁楊儀係耳目官員生長邉方反覆懇言必有所見合無本部仍行巡撫都御史楊親詣楊琳交鋒去處拘集地方知因之人詳䆒始末斟酌情勢如果楊琳彼時功罪相當難以成敗例論前項節次議處未當其情備細從實奏報以憑定奪若是情法已是兩盡止令可圖後功聽其查照原擬從宜委用俟其立有功勲另行奏請陞賞等因題奉欽依是着從實查勘明白來説欽此欽遵備咨准此巳經劄委整飭固原兵備副使高崇熈前去彼處拘集地方知因之人從公體勘具實回報去後今據前因照得臣自領馬政改巡撫及今總制邉務乆駐固原𢎞治十四年敵衆入侵官軍失事情由廣詢愽訪知之頗悉近又親詣孔壩溝楊琳交戰去處拘集住人相度形勢審勘至于再三看得楊琳以寡禦衆奮死對敵又值夜雨如注弓矢銃砲火藥俱濕不堪使用官軍雖多損折敵衆亦多殺傷阻遏抗拒至於一日夜之乆不但山野居民得以逃避而固原各城堡官軍聞警戒嚴方得保全不然地方之患尤有不可言者較其功罪似亦相當且孔壩溝南至黒水口三十餘里北至鎮戎所僅七八里彼時黒水鎮戎俱有按伏人馬而鎮巡重臣又在固原駐劄相去不逺初傳敵衆攻圍鎮戎人心震恐楊琳領軍急趍而進意欲與鎮戎所主客官軍合兵拒守且料固原援兵必至不期未到鎮戎驟遇强敵外無救援只得奮勇對敵事勢至此無可奈何比之怯懦逗遛者委的不同以此總制尚書秦紘監察御史楊儀先後論辯而楊儀之言尤爲激切蓋以近日各邉將官動以楊琳藉口宼至則嬰城自守杜門不出坐視深入不交一矢以圖全軍致令敵騎蔑我無人肆行無忌戕害生靈搶掠頭畜其數無筭元氣爲之蕭索流弊至此故欲寛彼覆軍之罪用勵敢戰之人臣聞勝負兵家之常成敗利鈍誠難逆覩古之名將不能保其無敗若使沿邉小大將官咸懐以身徇國之忠遇敵量力以戰不先爲退怯縱不能保其常勝亦豈得全然無功彼既知我處處有敢戰之兵未必不少沮其方張之勢故欲正朝廷之軍法則楊琳之罪不可恕而前項議處巳是從寛欲振今日之頺風則楊琳之情有可矜而言官論列不爲無見况其數年以來械繫之苦戌役之勞飢寒迫身窘辱巳甚原情度勢委的人共惜之如䝉乞勅該部通查楊琳始末事狀及各官奏辯縁由再爲詳議具奏伏望聖慈察功過於心跡之中惜人材於成敗之外特降恩典或量爲降級或限年立功以爲將官敢死奮勇者之勸如此則戰將生氣而邊敵不足憂矣縁係言官奏辯保全將官又該部題奉欽依着從實查勘明白來説事理未敢擅便爲此具本順差承差姚達親賫謹題請㫖一爲急缺領軍官員事兵部覆該本部送於兵科抄出總制陜西延寧甘肅等處邉務兼督理馬政都察院左副都御史楊題准兵部咨該臣題據鎮守延綏等處地方總兵官都督僉事張安呈爲停補添設領兵官員事據威武堡把總指揮周昇呈據本堡住坐延綏領軍署都指揮僉事傅釗下舍人傅越告稱有父傅釗於正德元年五月二十二日得患傷寒病症請醫用藥調治不痊至本年六月二十二日因前病身故等因看得傅釗原係奉勅管領土兵聽調截殺人員㑹同鎮守太監劉保巡撫右副都御史文貴議查得本鎮土兵自𢎞治十四年來各有原招陞任指揮千百户管束俱在各該營堡聽從把總坐營等官管領操備遇有聲息調遣領兵將官一例挑選率領與同遊竒老家官軍恊力追勦䇿應巳是定規後於𢎞治十七年七月内該兵部行取先致仕後委領軍叅將王㦸到部聽用本官奏准給領土兵二千聽調截殺正德元年二月内本官奏准致仕本部又將綏德衛指揮同知傅釗推陞署都指揮僉事領勅接管縁前項土兵係是招募之數各有把總坐堡及原招指揮千百户管束又有分守叅將并鎮守太監總兵巡撫等官統領若再添官管理政出多門實爲難堪今照傅釗已故合無將本官員缺停革免行推補將所領土兵仍令各該營堡管束照舊操守遇有徴調臨期擇委相應都指揮指揮統領前去䇿應截殺實爲良便除具題外呈乞照驗施行等因具呈到臣看得鎮守延綏總兵官都督僉事張安呈稱領軍署都指揮僉事傅釗病故要將本官員缺停革免行推補將所領土兵仍令各該營堡管束照舊操守遇有徴調臨期擇委相應官員統領前去䇿應截殺一節切照前項招募義勇土兵生長邉方勇悍善鬭但既招之後不曽操練所司因要存省粮儲分班疎放日就散逸𢎞治十七年叅將王㦸奏准統領二千員名聽調截殺去嵗應援大同斬獲首級與遊竒二兵相等冬間䇿應寧夏猝遇敵衆入冦雖有虧折而保全花馬池官軍之功實多是難以無用之兵目之矣今敵勢驕横我軍寡少節該科道等官建白皆以招募爲言若巳招之兵置之不用又安用新招爲哉臣愚方欲將前項土兵増選輳足三千員名擇官統領操練東可以應援大同勦京師門庭之患西可以禦防寧夏弭陜西腹心之患而延綏鎮巡官員乃欲停革散遣推原其意實以此兵之設徒應别鎮而無益於延綏又恐𦂳急徴調搶兌老家馬匹是蓋知爲延綏謀而不知爲大同謀爲陜西謀也且延綏挑去遊竒二千之外老家人馬委俱缺少但此數千之兵聚爲一枝則有餘而可用散之各堡則不足而無益臣近日巡邉閲視得延綏地方官軍驍健山澗險阻一時守臣號爲得人近該巡撫都御史文貴修造甎墩制度精巧賊難攻穵足以伐其邪謀不敢輕犯犯則易於阻截惟寧夏花馬池直抵靈州三百餘里最爲受敵要害彼處邉備乆弛兵威不振全仗延綏遊竒等兵䇿應萬一大同之嚴未解河套之警已至顧此失彼何以處之延綏老家之兵勢須自保難再輕掣若不急如前議將招募義勇土兵増選精練擇官統領以備非常非計之得者也查得叅將王㦸原領招募二千員名搶兌正䭾馬共二千一百七十二匹後該都指揮傅釗奏稱見在官軍止有一千九百四十員名陣亡傷損軍人六十名見在正䭾馬一千四百九十四匹花馬池被敵射死奪去及倒死馬六百七十八匹除瘡瘸瘦損不堪外堪以出戰馬止有一千二百五十二匹前項缺少馬匹若不另爲處置臨期搶兑委的虧累舊軍臣巳將今年洮河二衛茶馬給與一千補足前數騎操但急缺統領官軍誠恐人心渙散遇警急難收拾然此等新集土兵紀律進止終不閑習必得老成官員管束訓練緩急乃可倚賴此等官員不時徴調援别鎮必須量與將官名目庶㡬便於行事博訪得榆林城把總都指揮僉事王勛知兵持重綏德衛指揮同知藍海善戰有名此二人者延綏之兵素所信服相應擢用領軍如䝉乞勅兵部叅詳訪察合無於王勛藍海内推用一員上請量與將官名目照例請勅統領前項土兵仍令除見領官兵外再於各營堡原招土兵一萬數内著實挑選精壯勇鋭務輳足三千名原選不堪者即爲挑補該用正䭾馬匹除見在并新給外不敷之數臣另爲查處給用毋令搶兌老家軍人馬匹挑選停當擇委相應官員把總管隊嚴立規格精加訓練今年秋末冬初調赴花馬池操備儻敵人入套與遊竒二兵併力捍禦若賊衆拆牆深入腹裏聽臣隨宜調遣截殺以後大同宣府有警遊竒之外此兵可以聽調延綏總兵官張安人馬若非十分𦂳急不宜輕動如臣所擬豈但有益諸鎮其於延綏兵勢不爲無補何必急爲散遣之舉以遂目前自便之計哉等因具本該通政使司官奏奉聖㫖兵部知道欽此欽遵抄出送司查得先爲停補添設領兵官員事該延綏鎮巡官奏稱管領土兵都指揮傅釗病故乞要免再推補前項土兵止令各該營堡管束操守遇有警調臨期委官統領該本部議擬行移總制都御史楊查勘前項官員應否裁革巳經題奉欽依欽遵查勘去後未報今該前因案呈到部看得總制都御史楊題稱前項添設領軍官員極於邉方有益今都指揮傅釗病故仍要將前項土兵増足三千員名照舊擇官統領操練一節縁查有前項題奉欽依行勘事理本部難便議擬合行併勘爲此合咨前去煩爲查照先今事理從公查勘前項領軍官員如果有益邉方相應照舊設官管領操練明白具奏前來以憑上請定奪若有窒碍官多事擾應該裁革亦希咨報前來施行等因備咨到臣案查先爲前事巳經具題去後續准兵部咨該延綏鎮守等官太監劉保等題爲停補添設領兵官員事該本部覆題奉欽依備咨前來勘議間今准前因切照延綏寧夏皆防邉大鎮城堡星分原額軍人數少中間又多逃故不敷防禦近年敵衆入攻動號數萬我軍以一當十惴惴自保不聞克捷之功先帝采納廷議遣官招募兩鎮共得土兵二萬之上每名給領官銀五兩優免一丁幇貼招首人員又皆論功陞授但既募之後不聞操練僅供土水接逓之役殊非招軍本意兩鎮所募之人臣多親閲大半勇壯可用而延綏新軍尤爲慓悍練而將之悉皆精兵叅將王㦸所選二千員名馬匹盔甲軍器俱已給領東西應援行伍坐作方始就緒得人相繼統領約束於地方實爲有補而延綏守臣散遣之意臣固已論之於前矣且今敵情難測各鎮以延綏遊竒二千爲援萬一大同延綏俱有警報或入套之衆分冦延寧未免顧此失彼臣愚欲不廢此兵者實欲藉其與遊竒二兵共成掎角之功以備各鎮緩急徴調之需耳若欲散還各堡所各把總坐堡官操練有警調用臣竊謂聚爲一枝擇官領之軍令素行人情素附可責成効散之各堡多者百餘名少者數十名倉卒輳合將不知兵兵不知將而欲恃以成功難矣况寧夏土兵逺不及延綏寧夏已奏設都指揮韓斌統領土兵三千員名備冬防守而延綏土兵乃欲散遣其材事體似亦有偏臣斟酌事勢熟思審處前項土兵仍宜設官統領爲便如䝉乞勅兵部計議合無將延綏招募義勇土兵俯從前議照依寧夏事例選輳三千員名惟復照舊二千員名仍推舉相應官員統領照例請勅行事以備各鎮調用則邉兵増重地方幸甚等因具本該通政使司官奏奉聖㫖兵部知道欽此欽遵抄出送司查得先爲前事巳行查勘去後今該前因案呈到部看得陜西等處總制都御史楊所奏反覆論辯大意謂延綏前項土兵擇官統領聽調極於邉方有益不宜散遣乞要查照寧夏事例選輳三千員名或止照舊數仍推舉相應官員管束照例請勅行事以備各鎮調用一節既該總制官員查勘前來必其事體相應叅酌停當况今敵衆在套正宜練習强兵以備不虞合無本部依其所奏仍行本官轉行延綏鎮巡官員將前項土兵選輳一千員名通前三千之數仍舊團聚操練用濟邉務但原管都指揮傅釗先已病故見今缺人管理今查得本官原保都指揮王勛指揮同知藍海俱合相應縁王勛近該本部議擬奏奉欽依協同分守寧夏西路去訖所據藍海知兵善戰人素信服堪以委用伏乞聖明裁處仍量加都司署職以便行事候命下之日請勅一道齎付本官統領前項官軍操練聽調務要律已奉公撫恤軍士奮勇効勞以副委任如或貪黷僨事罪有所歸一應軍務仍聽總制鎮巡等官節制不許偏執致有妨悞縁係議處土兵及奉欽依兵部知道事理未敢擅便正德元年十二月二十七日本部尚書閻仲實等具題二十九日奉聖㫖藍海陞署都指揮僉事統領土兵操練聽調寫勅與他欽此欽遵擬合通行除外合咨前去煩照本部題奉欽依内事理欽遵施行一爲分布邉兵預防敵患事兵部覆該本部送於兵科抄出總制陜西延綏寧夏甘肅等處邉務兼督理馬政都察院左副都御史楊一清題照得黄河將凍敵衆雖未見入套備禦之計在我不得不嚴看得延綏定邉營迤西直抵寧夏靈州地方廣袤平漫無險可據邉牆低薄壕塹淤塞不堪保障敵毎從此拆牆深入陜西環慶固原地方搶掠上厪九重宵旰之憂臣切詳敵衆頻年犯順其氣方張不曽遭挫必無懲戒然其志已驕其欲無厭天實怒之今嵗若復不肯悔禍决當重遭殛罰臣受命總制各路兵馬謹當申嚴號令分布主客官軍揚兵耀武以伐其謀於未入之先出竒設伏以乘其弊於將歸之際然須脱畧常法隨事達變乃克有功且善戰者必知分合善守者必審常變我邉兵患於備多將病於權分各據利便自分彼此機可乘而不乘兵當合而不合其輕率寡謀者則又知常而不知變徃徃墮其計中以致我武不揚寇氛日肆職此之由今將沿邉至腹裏分爲四路以定邉營花馬池興武營靈州一帶爲藩籬以石溝鹽池韋州萌城山城一帶爲門户以固原黒水口鎮戎所西安州海剌都一帶爲庭除以安定㑹寧靜寧隆德平凉一帶爲堂室行令延綏副總兵姜漢統領竒兵遊擊將軍戴欽統領遊兵及暫委綏德衛指揮藍海管領土兵各限十一月初一日起程遊兵於花馬池營駐劄竒兵暫於定邉營駐劄土兵暫於寧塞營駐劄寧夏副總兵衛勇統領竒兵官軍於興武營都指揮韓斌統領土兵於清水營亦限十一月初一日到彼駐劄敵果入套西行延綏竒兵那至花馬池量分於安定栁楊二堡土兵那至定邉營量分於鹽塲三山等各聨絡駐劄與分守叅將葉椿閻綱恊同都指揮保勣等振揚威武併力防禦以壯藩籬寧夏總兵官李祥統領戰鋒竒正官軍先期於靈州駐劄有警那至石溝分守寧夏西路叅將馮禎統領寧夏中衛廣武營選鋒竒兵官軍前來鳴沙州陜西遊擊將軍陳善領兵於韋州環慶守備都指揮姚震領兵於山城各駐劄以嚴門户鎮守陜西署都督僉事曹雄統兵於鎮戎所調度固原靖邊蘭州一帶主客官軍以保庭除仍預行甘肅遊擊將軍徐謙統領甘凉遊兵并千户魯經土兵各於莊浪操候河套有警調至安定㑹寧與甘凉備禦下班官軍併謀齊力以守堂室前項分布既定沿邉守將嚴謹斥堠多差夜不收逺爲接哨沿邉多設塘馬但有套敵烟塵消息或走回人口供説即便傳塘走報隣境官軍隄備敵果近邉各該主客官兵分據要害占守水頭從宜阻遏冦小至則擊之不可輕進逺追仍要互相應援不許自分彼此如敵大至切勿與之爭鋒各取便歛入城堡以避之待其擁衆深入延綏遊竒土兵寧夏副總兵都指揮韓斌等枝人馬各襲踪而進若犯固原陜西遊兵即便掣回應援李祥衛勇馮禎韓斌等各領兵於紅寺兒堡按伏姜漢戴欽藍海等兵各於韋州鹽池石溝按伏環慶官軍移至萌城各休兵秣馬以逸待勞曹雄相機調遣腹裏官軍據險以扼其衝張疑以分其勢一面馳報安㑹靜隆官軍堅壁清野勿露形跡多用鄉導指引藏兵於崖窑堡洞險要阨塞之處伺彼分散搶掠出其不意發兵擊之敵既不得逞必將遁去曹雄陳善重兵衝其腹心又與徐謙遊兵俱襲踪而出比至紅寺兒石溝鹽池等處延寧環慶官軍分據營盤待其前鋒稍逺先後掎角夾而攻之陜西主將遊兵出其後背奮而逐之晝則選鋒以截其路夜則銜枚以刼其營彼深入疲弊又腹背受敵必然大遭挫衂若犯環慶則延綏遊竒官軍掣至紅德堡山城㑹合陜西遊兵尋襲截殺倘或事情𦂳急都督曹雄領兵自三角城沙井溝而出寧夏主副將官兵馬掣至萌城甜水堡以遏其破喪西走之勢敵既敗走其氣巳奪諸軍仍躡其後併力追勦至邉牆而止沿邉主兵將官閻綱保勣等以逸待勞或邀其中或截其尾以我四路應敵之兵當彼千里趨利之衆豈有善歸之理如此庶可振我國之威禠敵人之魄爲今之計似不出此然兵無常形敵有萬變隨機運用難以預度因時制宜又在各官再照延綏遊竒土兵既皆掣至西路其中東二路城堡空虚倘敵乘隙而入爲患非輕已行延綏鎮巡官照例徴調大同遊竒官軍先期於交界去處駐劄敵果入套調來中東二路應援截遏如是敵衆俱在迤東近邉拆牆謀犯延綏地方即將本鎮遊竒兵掣回若事情𦂳急寧夏陜西遊兵俱應調去䇿應臨期斟酌定奪凡客兵所至之處在陜西地方悉聽署都督曹雄節制在寧夏地方聽總兵官李祥節制在延綏地方聽總兵官張安節制俱不許偏執違抝致悞事機除通行各該將官查照依奉施行及行陜西巡撫都御史張泰前來固原慶陽隨宜駐劄防禦臣遵照欽奉勅㫖徃來環縣韋州居中調度外等因具本該通政使司官奏奉聖㫖兵部知道欽此欽遵抄出送司查得先爲預防邊敵事該大同鎮巡等官與總制都御史劉宇奏本部議得即今氷凍已堅敵衆勢必入套乘間爲侵竊恐難免合無鋪馬齎文陜西等處總制都御史楊宜當先其未發行令各鎮鎮巡等官督屬各要用心操練人馬振揚威武使先聲有以奪敵之心如果侵犯跡露即便奬勵主客官兵隨宜調度何將使領某軍何軍使屯某地何地爲寇所必入當嚴兵以遏之何路爲敵所必歸當按甲以邀之務在計出萬全事無一失大挫其鋒圖成偉績下以副三邉之望上以紓九重之憂毋致疎虞有孤委任已經題奉欽依行令欽遵去後今該前因案呈到部爲照邊烽不靖動肆兇殘每冬渉氷入套輒便深入陜西腹裏地方搶掠沿邉軍民連遭荼毒今總制都御史楊憤彼猖獗之甚因畫戰守之謀叅詳奏内事宜其爲計慮亦既周悉本部難再别議但兵貴有名事當持重合無請勅一道仍鋪馬齎付楊務要仰思分閫之責俯念窮邉之憂凡有益於安攘悉依原擬隨宜調度惟在先事而備好謀而成使我國之威大振敵人之魄盡禠若彼潛伏河套不窺我邉亦毋輕易出兵以開邉隙仍行各該鎮巡等官各要同舟共濟併力恊謀如大功克就則陞賞不遺倘事機有悞厥罪惟鈞縁係議勦邊敵及奉欽依兵部知道事理未敢擅便正德元年十二月十八日本部尚書閻仲實等具題本月二十日奉聖㫖禦防邊患應悉依楊一清籌䇿調度恁部裏便上𦂳差人鋪馬裏齎文與他知㑹欽此欽遵擬合通行爲此除外合咨前去煩照本部題奉欽依内事理欽遵施行一爲預計兵機事兵部覆於兵科抄出總制陜西延綏寧夏甘肅等處邉務兼督理馬政都察院左副都御史臣楊題據鎮守延綏總兵官都督僉事張安呈切見近年以來敵衆驕横肆志勢甚猖獗動輒深入腹裏諸鎮被其蹂躙地方盡皆殘毁未嘗有一挫彼鋒鋭切齒含恨無所施爲且如𢎞治十八年十二月初旬套中走回人口傳報酋首㑹議每人殺羊一隻牽馬二匹前徃迤西地方搶掠彼時得此消息欲集官軍乘夜出境撲搗巢穴破彼南侵西掠之勢但恐又有引惹邉釁之説有爲首尾之畏束手忍忿掣肘難行以故敵人得利而歸動搖内外言及於此實可寒心若不預爲處置使之痛遭挫衂以回邉患何時得息地方何時得寧合無將敵衆仍前恣意侵掠不拘何鎮探聽聲息選定馬歩官軍住守先差乖覺夜不收出境宻切哨爪敵兵逺近帳巢多寡果離邉牆一二百里之逺的實回報然後將馬隊官軍分爲左右哨掖歩軍駕御兵車隨同出境挨邉劄營作爲家當聲勢聨絡遥振兵威馬軍晝伏夜行徐徐前進約至其巢分兵四面齊起驚擊散亂擒拿老小勦殺强壯邀趕生畜縱有徼倖逃命脱走者冬則凍餓死傷夏則困渴疲敝自有不戰而亡且又致使深入腹裏搶掠之敵得知前後不顧急趨回營見其巢破營空妻子散亂無所顧藉生畜被刼無所收集加之腹裏按伏官軍追擊内外夾攻手足無措未免魂喪膽落號哭奔遯敵衆所顧戀者妻子生畜如此謀爲使再不敢返顧輕犯庶保内外軍民得安縁係預計兵機事理合行具呈乞爲叅詳可否明示施行等因到臣看得鎮巡延綏總兵官都督張安呈稱近年達衆勢甚猖獗動輒深入腹裏蹂躙地方未嘗一挫其鋒要待將來敵衆仍前肆意侵掠探聽聲勢選定馬歩官軍乘夜出境撲搗巢穴使之手足無措魂散膽落再不敢輕犯邉境又恐有引惹邉釁之説畏首畏尾掣肘難行一節切縁前項敵衆自𢎞治十三年延綏大同官軍失利之後志驕氣横肆無忌憚𢎞治十四年深入陜西腹裏殘害生靈動以萬計𢎞治十八年宣大遊兵全軍覆没又河凍之後連年窺伺陜西既未遭挫必無懲戒今冬踏氷入套之舉難保必無既入河套必不安静臣方部署將士振揚威武巳將沿邉直抵腹裏分爲四路布置主客官軍相機邀截及具題外但兵少備多未免以一當十出竒制變似不得巳前項撲搗巢穴之議不爲無見臣非不知來戰去守乃禦敵之常道窮兵黷武非聖王之本心縁商髙宗之伐鬼方唐太宗之擒頡利是非薄伐昭然可知况河套本我内地而彼據以爲巢由是以窺我近邉犯我内郡此正田中之禽利用搏執固非稱兵於隂山之窟濺血於不毛之地喜功好大者之所爲也臣愚以爲今冬深河凍敵果入套宜照兵部奏行事理徴調宣大二鎮遊竒官兵前來延綏中東二路駐劄並聽總兵官張安節制若止在套駐牧不曽擁衆内侵我則嚴兵自守决不輕挑强敵自起釁端如是仍前深入固慶等處搶掠合無行令延綏鎮巡官一面選帶乖覺夜不收分殺出境哨探敵營逺近衆寡一面㑹合主客官兵預先分布逼近敵營城堡待哨探回還如在一二百里之間有機可乘原擬沿邉中路邀擊之兵照舊不動以延綏東路叅將時源領本鎮三路臣近日挑選先鋒竒兵官軍三千員名爲戰兵總兵官張安領本鎮選定頭等官軍三千員名次之以爲中軍大同遊竒兵爲左右二哨宣府遊竒兵又次之爲兩覆太監劉保都御史文貴領本鎮無馬并歩隊官軍於牆外二三十里列車營為家當分布停當晝伏夜行各相去二三十里擇形勢利便之地爲營以待務使聲勢連絡後騎相望前鋒戰兵既近賊壘奮勇疾進衝其腹心寇既潰亂捨其羸老而戮其壯徤奪其鎧馬而縱其牛羊大同之兵堅正嚴備不許貪利輕動如前鋒勝負未决進爲聲援待其既回以爲翼衛彼若紏聚餘孽追襲我軍張安合大同之兵專為殿後宣府官兵相機爲援我雖退而兵漸増彼既逺而勢自屈前軍勞而退則先行使無繫累後軍逸而回則殿後使有餘力如此布置較之先年出境部分疎逺孤兵無繼迄無成功者不同彼既千里趨利日乆疲敝聞我傾其巢穴必自遯歸我腹裏之兵躡之中路之兵刼之沿邉之兵又夾而邀之彼戀巢之心既勝欲戰之志不堅必然潰敗比至套中見其妻孥傷殘禠魂破膽振中國之威洩生民之憤安邉制敵之計莫快於此昔者孫臏直走大梁而解邯鄲之圍攻其所必救古人遺法具在顧用之者何如耳但兵貴神速機防先露進止之間不容髮若待臨期奏請定奪誠恐緩不及事如䝉乞勅兵部詳議倘有可采作急行臣及延綏鎮巡官宻切㑹議相機而動必期成功若套人勢重兵力不敵或賊營迂逺勢難輕進機無可乘照常戰守不敢輕舉妄動以貽後艱等因具本該通政使司官奏奉聖㫖這本所言禦敵方畧兵部便看了來説欽此欽遵抄出送司案呈到部看得陜西等處總制都御史楊奏稱敵衆頻年入冦未嘗一遭挫衂以此志益驕横恣行侵掠沿邉地方盡被蹂躙今冬河凍入套若再擁衆内侵差人出境宻切哨探賊營逺近多寡欲要㑹合主客官軍部分將領駐劄要害選鋒潛行直搗其巢待敵聞知遯歸又令腹裏按伏官兵追擊夾攻使其進退驚惶坐見疲敝以致邉患永絶如止在套駐牧不敢倡亂及兵力不敵賊營險逺仍前照舊戰守因反覆問難備陳方畧仰冀聖明採擇施行一節為達衆近年以來動輒深入腹裏殘害我生靈致勞官軍西征北戰曽無虚嵗罪惡已盈神人共憤今河凍入套則窺伺固慶等處之謀勢恐難免今都御史楊慮其將來為患不巳邉境無時可寧欲要紏集大兵乘間掃穴其所以振驚氊裘之心發舒華夏之氣誠足為快及照奏内區處事宜亦既周悉詳其論議似可求成但兵貴出於萬全事須圖厥所終雖取子必入虎穴尚有遺謀而探珠幸值龍眠亦爲危道今逺離邉城懸軍敵境少有蹉跌闗係非輕况臨機制變非臣等所能遥度合無本部仍鋪馬齎文本官將奏内事情再加詳議審已量敵長慮却顧如果事機可乘筭無遺䇿兵力可勝保無後艱聽依原擬徑自施行大興神武之師用紓疆場之患若是哨探不的險逺難進彼無可圖之釁我有自危之形只合振揚軍威激勵將士候彼深入分兵邀擊以期成功務須不見是圖為謀孔臧以副重託毋得率意輕動致有疎虞仍行大同等處總制都御史劉宇及宣大二鎮鎮巡官員各將遊竒官軍整㸃齊備候陜西總制有事徴調即便依期督發前去共濟邉務毋得遲延悞事自干憲典縁係總制官員奏議出境勦冦事宜及奉欽依這本所言禦寇方畧兵部便看了來説事理未敢擅便正德元年十二月初九日本部尚書閻仲實等具題本月十一日奉聖㫖是閫外之寄卿等所專出竒制勝事難遥度務要計出萬全以除邉患毋致疎虞欽此欽遵擬合通行除外合咨前去煩照本部題奉欽依内事理欽遵施行一爲遵明詔更置將官以甦乆疲邉人事兵部覆本部送於兵科抄出總制陜西延綏寧夏甘肅等處邉務兼督理馬政都察院左副都御史楊題行據鎮守陜西署都督僉事曹雄呈准陜西等處地方都察院右副都御史張泰手本行據陜西都司掌印都指揮僉事房懐呈稱㑹同陜西布按二司掌印左布政使胡富按察使謝罃查議得洮岷河州西固城階文五處地方切隣邉境番賊先年不時侵犯陸續奏設守備官各一員職專操練軍馬撫治番夷保障地方近年以來仗賴朝廷恩威諸番順服但邊人居處進退無定反覆不常禍患難保况岷州相離階州五百里文縣七百里西固城三百里洮州一百餘里河州五百里河州直抵階文一千二百餘里且又山溝陡峻道路﨑嶇若將各該守備官員盡行裁革止設叅將一員常在岷州駐劄邉備副使常在河州駐劄有事公同計處倘遇有警直待呈報各官方纔調用人馬不惟緩不及事抑恐所喪滋多其稱前項守備官每人常帶家屬四五十口莫肯自出已財養贍分外供億何勝其繁甚有不守法度肆爲剥削漁獵誠有所見但征勦截殺之際若非親人跟隨不可合無將各官隨帶家人量為查革各止許存留十數名跟用其餘俱發回原籍隨住各官仍照舊存留於各地方守備若有人口過多甚或廢弛邉情剥削軍士等項姦弊聽邉備官用心訪察具實詳呈撫按衙門叅奏拿問庶幾不失事體且免後艱呈乞定奪施行等因據此看得陜西都布按三司掌印官都指揮僉事房懐左布政使胡富按察使謝罃等㑹同查議得前項事情誠爲有見原設守備官員委的難以裁革備由用手本前去煩爲徑自回報施行等因准此案查先抄䝉總制陜西延綏寧夏甘肅等處邉務兼督理馬政都察院左副都御史楊鈞帖前事已經計議去後今准前因理合備由呈乞照詳施行等因據此案查先准兵部咨前事看得巡按陜西監察御史杜旻奏稱洮岷河州西固階文五處地方先年因諸夷入境侵掠各設守備官一員使之控制今諸番俱已向化畏威要將各守備官盡行裁革另設叅將一員分守一節具見本官省官惜軍之意但前項地方俱各切隣番境守備官員未審應否裁革擬合查勘為此合咨前去煩查前項各該地方守備官員即今應否盡行裁革止設叅將一員揆之人情事體有無經久利便逐一查明咨報以憑上請定奪等因備咨准此巳經備行陜西鎮巡官員查勘議處去後今准前因看得巡撫陜西都御史張泰行據三司等官議稱岷州相離階州五百里文縣七百里西固城三百里洮州一百餘里河州五百里河州直抵階文一千二百餘里山溝陡峻道路﨑嶇若將各該守備官員盡行裁革止設叅將一員常在岷州駐劄邉備副使常在河州駐劄倘遇有警直待呈報各官方纔調用人馬緩不及事要將各官照舊存留守備但隨帶家人止許十數名跟用其餘發回原衛各官若仍舊存留人口數多剥削軍士等弊聽邉備副使指實具呈撫按衙門叅拿一節切縁前項地方宻邇諸番深山大谷恃險難制先年不次紏集醜類入境侵掠動調官軍誅勦經年方得寧息近雖不敢恣肆桀驁之性叛服不常撫馭稍有失宜難保不復為患巡按御史杜旻所奏乃省事惜費以甦邉人之意但干碍地方事體重大况先朝設立守備官員似有深意行之年乆若便議令裁革恐貽後艱臣竊謂任法不若任人任得其人官雖多不為害任非其人委的有損無益近年守備官員不止家口衆多分外供億中間剥削軍士侵尅粮賞交通番夷勾引邉患者實不為無藉以安邉反以擾人誠有如御史杜旻所言臣訪查得守備洮州都指揮僉事趙寧貪而且老懦而無爲人情稔熟事多掣肘守備岷州署都指揮僉事閻縉才雖通敏性實虚浮行事乖方下人不附此二人者委的擁虚坐食廢事虐人非惟無益邉備且恐貽患地方所據前項守備官五員固難裁革其不職官員則當革罷内趙寧年力巳衰難再别用閻縉年力精壯猶堪領軍如䝉乞勅兵部再議奏請合無將前項守備五員俱不必裁革内將洮州守備都指揮趙寧岷州守備都指揮閻縉俱各革退趙寧令其替職閻縉令回原衛聽候别用聽臣㑹同陜西巡撫於都司各衛官中推舉有才幹有行止知番情者具奏擢用守備前項地方仍通行各該守備官隨帶家人止許存留十數名跟用其餘俱發回原衛若有仍舊存留人口數多剥削侵尅交通番夷等弊聽巡按御史分巡邉備等官舉劾叅拿如此則事無紛更人無勞擾後艱可免實為便益等因具本該本部官欽奉聖㫖兵部看了來説欽此欽遵抄出送司案查先該巡按陜西監察御史杜旻奏前事已經查勘去後今該前因案呈到部看得陜西總制都御史楊奏稱查勘過洮岷河州西固階文等五處地方宻邇諸番叛服靡常原設守備官員難以裁革但守備洮州都指揮趙寧岷州都指揮閻縉俱各不職欲要革罷另行推用一節縁前項各該地方守備官員既該總制官員勘稱裁革不便合無依其所奏本部行移本官除將趙寧行令替職閻縉令回原衛仍另推相應官員前來上請簡用其餘俱各照舊存留守備其稱各官家屬衆多未免分外供億甚又肆意侵漁潛交番賊誠為貽患地方相應禁治亦合通行本官轉行前該守備各官今後跟用家人止許存留十數名在彼其餘俱發回原衛不許仍前多帶以致供應太繁軍士受害及敢有侵尅交通等情聽總制巡按等官指實叅奏拿問决不輕貸縁係總制官議奏存留守備官員及奉欽依兵部看了來説事理未敢擅便正德二年正月二十六日本部尚書閻仲實等具題本年閏正月初一日奉聖㫖是欽此欽遵擬合就行為此合行移咨前去煩照本部題奉欽依内事理欽遵施行一爲急缺領軍官員事兵部覆本部職方司案呈奉本部送於兵科抄出總制陜西甘肅延綏寧夏等處邉務兼督理馬政都察院右都御史楊題查得寧夏管領土兵都指揮僉事韓斌近該巡按陜西監察御史邢纓奉都察院勘合劄付為捷音事行提本官與守備焦洪併問去訖案查先為慎固地方以遏邊冦事准兵部咨該本部題該鎮守寧夏地方都知監太監葛全等題前事本部看得寧夏鎮巡等官太監葛全等奏稱花馬池等四營俱各隔逺備禦等項人馬不多徃徃被寇擁衆深入毒虐要將寧夏義勇土兵内挑選三千員名闗給馬匹令靈州土官都指揮韓斌統領清水營按伏遇警㑹合截殺一節縁花馬池委係敵衆經由腹内喉襟之處今既該各官㑹奏前來必其計籌停當有益邉方合無准其所奏本部仍行各官照數挑選精鋭義勇土兵三千員名給與馬匹着令都指揮韓斌統領依期專在清水營按伏遇警徃來相機䇿應務要撫恤軍士如法操練不許虐害致令失所其欠少馬匹仍行都御史楊查照給用若果十分不敷明白奏來以憑定奪等因題奉欽依備咨前來查得前項義勇土兵已該寧夏鎮巡官挑選精壯三千員名欽遵行委都指揮韓斌統領及馬匹臣陸續處置給領將及三千之數逓年照依兵部原擬在於清水營按伏遇警㑹合主客官兵截殺外今該前因切縁清水營在於寧夏横城之東興武營之西最為孤懸要害敵衆出没必由之地自設前項人馬以來頗壯邉城聲勢今敵衆在套未出正當𦂳闗隄備之際縱使河開出套遇冬難保不來原設領軍官員既已縁事被提未知何日完結雖委官暫領終是權任不專難責成効臣又訪察得都指揮韓斌雖才識通敏有治事之能而性資嚴刻非統馭之器頃縁虐用其下以致土人奏許違法事情多端見該兵部奏行勘問未結雖虚實未可知但彼為土官而失土人之心至於如此安望其樂為効用以成戰伐之功哉必須另擇將官統領庶使此軍不為徒設竊見寧夏衛指揮使新陞都指擇僉事仇鉞出自將門素諳戎務驍勇善戰曽立竒功寧夏一鎮武臣號為出色相應委用但所領官軍三千員名與各鎮遊竒兵事體不異况今三邉多事前項土兵若得人教養操習豈徒清水營按伏花馬池䇿應而他鎮有事亦可備緩急之援若非稍加優遇不無事重權輕如䝉乞勅兵部叅詳議處合無乞將仇鉞具奏量與將官名目請勅統領前項義勇土兵三千員名令其用心操練撫䘏仍照原擬遇冬分布清水營按伏花馬池靈州一帶地方有警俱聽鎮巡官調遣䇿應訓練既精各鎮有事亦可徴調應援如此則軍威増重軍容改觀邉方大計不為無補韓斌待事完如果無礙另行推委管理别項官軍庶使土官與土人不致互相猜疑實為便益等因具本該本部官欽奉聖㫖兵部知道欽此欽遵抄出送司案查先為慎固地方以遏邊敵事該寧夏鎮巡官奏稱花馬池等四營俱各隔逺備禦等項人馬不多徃徃被敵擁衆深入毒虐要將寧夏義勇土兵内挑選三千員名闗給馬匹令靈州土官都指揮韓斌統領清水營按伏遇警㑹合截殺本部議得花馬池委係敵人經由腹裏喉襟之處今既該各官㑹奏前來必其計籌停當有益邉方合無准其所奏仍行各官照數挑選精鋭義勇土兵三千員名給與馬匹着令都指揮韓斌統領依期專在清水營按伏遇警徃來相機䇿應已經題奉欽依内行令欽遵去後今該前因案呈到部看得陜西總制都御史楊奏稱寧夏管領土兵都指揮僉事韓斌才識優於治事統馭非其所長近因虐用下人以致奏訐違法事情多端雖勘問未結而人心已失難再委用及訪得都指揮僉事仇鉞諳練驍勇俱在一鎮武臣之右欲要本官量加將官名目請勅令其代替韓斌管領前項土兵以備按伏徴調一節為照前項土兵俱係挑選精鋭人數然須統領得人庻幾操縱有法緩急可用既該總制官員奏處前來必有斟酌停當合無本部依其所擬將都指揮僉事仇鉞改充遊擊將軍候命下之日請勅一道齎付本官代替韓斌統領前項土兵常年依期分布清水營按伏如遇花馬池靈州一帶地方有警俱聽鎮巡官調遣䇿應防禦邊冦務須撫䘏軍士如法操練期副委任不許殘虐致令失所責既有歸罪其容逭仍行總制官員及寧夏鎮巡等官一體知㑹欽遵施行縁係定奪領軍將官及奉欽依兵部知道事理未敢擅便正德二年二月十八日本部尚書閻仲實等具題本月二十日奉聖㫖是仇鉞着充遊擊將軍寫勅與他欽此欽遵擬合通行除外合咨前去煩照本部題奉欽依内事理欽遵施行闗中奏議巻八
