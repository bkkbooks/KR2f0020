body:
  text: 關中奏議卷七明楊一清撰總制類一為陳情乞恩辭免總制重任事欽差督理馬政左副都御史臣楊一清謹奏為陳情乞恩辭免總制重任事正德元年二月十五日准兵部咨為邊務事該本部等衙門題會同太師兼太子太師英國公張懋少師兼太子太師吏部尚書馬文升等議得關陜重地夷夏要防今河凍將開大敵深入後來之患誠有可憂況彼處荒歉非常別難調度所賴以應援截遏者惟延寧甘肅三鎮兵馬但事分統屬人無專權倉卒調遣不無彼此推避若不添設總制重臣終難集事查得起用兵部左侍郎許進并見任陜西巡撫都御史楊一清俱經言官交章論薦物議推允伏望簡命一員令其總制陜西延綏寧夏甘肅等處地方庶幾事權歸一後效可圖等因具題節該欽奉聖㫖是楊一清著總制陜西延綏寧夏甘肅等處邊務兼督理各該地方馬政寫勑與他欽此欽遵備咨到臣伏念臣本書生不諳軍旅誤䝉先皇帝擢任憲職督理馬政巡撫陜西地方自度才不稱任具本辭免未䝉俞允續因災異自劾求退仰荷皇上聖恩仍留辦事頃者大敵擁衆深入侵掠靜寧隆德等處地方臣不能阻遏及徵調諸鎮兵馬追截又不及期巳經具本認罪俟命間渙汗自天戰兢無地駑駘何力心欲奮而步不前天地能容威未加而恩巳至省躬驚愧不知所云且今之聲勢號為驕橫今之邊備號為廢弛雖云難為未嘗無可為者亦存乎其人耳至于陜西三鎮休戚相關事有攸分人無專制誠得重臣居中調度庶幾戰守可望成功臣比有所見不敢自隱然意任大責重必屬諸威望素著之人豈謂臣愚可以辦此夫任賢使能君之大要賞功罰過國之大權臣匪賢匪能久塵任使在平時已徼非分之寵在今日又操非據之權懼將清議之干以為新政之纍況總制之與巡撫職任加重三邊之與腹裏事勢加難臣撫巡無效何能堪總制之居腹裏無功豈足副三邊之託茍負乘之不恥將覆餗之是憂臣是以昧死自陳伏望聖明收回成命鍳臣先次認罪愚衷罷歸田里以彰國法別求兼資文武者總制三邊軍務地方幸甚臣愚幸甚緣係陳情乞恩辭免總制重任事理謹具奏聞奉聖㫖楊一清才望素優練達邊務特兹簡命宜勉副委任不允所辭吏部知道欽此一為乞恩認罪辭免重任事兵部覆准吏部咨該本部送于吏科抄出總制陜西延綏寧夏甘肅等處邊務兼督理馬政都察院左副都御史楊一清奏准兵部咨為經略邊務事該本部題該兵科都給事中艾洪等題臣等竊見敵勢大張邊事孔棘陜西寧夏等處官軍巳被其挫衄隆德會寧等縣地方俱被其搶掠肆無忌憚直至秦州西南等處約有三百餘里之逺國步艱難人心危懼殆如一髮之引千鈞勢不可救藥道路傳聞畿甸驚懼十分緊急危及宗社且大勢敵衆在王府衙下駐劄聲勢聮絡火光相望逺近不一傳聞寧夏分守東路右參將霍忠人馬約有七百餘騎俱被損折無遺參將王㦸所領土兵中途偶遇敵衆又被殺傷數多總兵官曹雄人馬約有五百俱被殘滅仍將曹雄圍困在紅城子略無一人一馬救援勢甚猖獗人頗愴惶鎮巡匿不以報地方失陷咎歸于誰萬一不虞延及宗社雖萬死何贖等因該本部覆題奉欽依行巡按御史查勘奏報備咨到臣照得先因敵衆大舉深入靜寧會隆地方搶掠臣不能阻遏巳經具本認罪續䝉聖恩命臣總制陜西延綏寧夏甘肅等處邊務兼督理各該地方馬政自度不堪負荷恐誤大事又經具本辭免俟命待罪間今准前因查得前項敵衆𢎞治十八年十二月二十一二等日到鎮戎所黑水口等處劄營答話要搶各苑官馬聲言要搶秦州等處直到陜西地方因見固原一帶人畜俱巳收斂遂從地名須彌寺口進入西南搶掠臣與鎮守署都督僉事曹雄按兵瓦亭堡彼時陜西官軍俱巳分布在外曹雄止領西安等衛官軍指揮王昭等六百員名臣領平涼衛官軍指揮趙文等四百員名隨即差人分投徵調延綏遊兵土兵河西左副總兵魯麟土兵及本處各路按伏官兵指揮李佐郭遡等前來䇿應截殺二十三日亥時得報達衆巳到隆德縣地方相離瓦亭五十里臣與曹雄計議若徑過隆德下六盤山則平涼華亭涇州一帶人民俱遭殘害蔓延難制二十四日寅時臣等率領前項官軍急趨隆德本日巳時到縣據土民嚮導報稱大勢敵衆俱在舊隆德縣地方及地名王府衙等處下營搶掠本日午時曹雄統領官軍王時趙文等九百員名前去截殺臣止留一百餘員名與本縣鄉導民壯二百名拒守本城前哨敵騎到于縣西大路神林堡地方聞官軍在隆德地方遁歸大營擡營西走且行且掠不復分散臣見曹雄孤軍恐墮詭計不次催調各枝官軍及賞募土人往來軍營左右探看消息故其進止臣皆知之二十六日探知郭遡所領土達八百餘名巳調到曹雄軍營臣心稍安時敵西向會寧臣恐其從西路出境而延綏人馬仍來固原緩不及用臣急還固原各鎮官軍尚未調到連夜差人阻回行令前去鹽池石溝中路邀擊二十七等日仍從西安州地方陸續出境曹雄領兵襲至韋州移文會合延寧諸將官于鹽池石溝歸路按伏邀擊又挑選陜西各枝官軍三千員名俱聽遊擊陳善調度與各路將官會兵截殺時固原城中俱無見在人馬臣調取廣寧黑水等苑操兵三百餘名就將本苑孳生官馬暫與給領騎坐隨臣前去鎮戎所紅古城等處以助聲勢不料各鎮將官心力不齊因見形勢重大莫敢發兵正德元年正月初三初四等日敵衆從原拆牆花馬池清水營等處出境去訖查得官軍節與交戰止是豫旺城搶殺爪探夜不收軍人共十一名靖邊乾鹽池地方陳亡官軍一十八員名此外並無虧折各州縣搶殺人畜巳經會行分守分巡官查勘的數至今尚未造冊回報惟萬安苑地方搶去官馬人畜委官查報前來俱節經具題外竊照陜西入境敵衆近據走回人口傳是和碩托羅該等枝雖未的知若干委的勢甚猖獗其在靜寧隆德搶掠之時委的營壘聮絡火光相望曹雄領兵不及千數入山追襲數日之間道路阻絶人情洶洶咫尺莫能相保節調各鎮官軍路逺難以猝集固原平涼止隔三程尚有傳言官軍被圍殺傷損折者蓋出于億度者之言彼時臣恐逺近驚疑以此連日冒險往來視若無事以安人心曹雄孤軍尋襲邀奪蓋亦慿藉崖寨之險兼藉土人為之嚮導土人亦仗官軍聲勢遇輒敢相拒敵敵衆見所在寨堡俱有人拒敵將謂處處有軍以此晝夜擡營西行不肯久停內地若知我軍虛實成敗利鈍誠難逆覩後因出境官軍掣回俱得保全識者以為天幸非人力也其稱搶至秦州一節當時入境委的屣問秦州地方道路相傳不為無據緣前項情形巳䝉欽命錦衣衛千户屠璋前來訪探及行巡按監察御史勘報當得其實至于花馬池之事非臣所能悉知伏念臣身為撫臣受恩深重不能先事設䇿致敵入境搶掠流言傳聞震驚朝野上貽宵旰之憂罪誠萬死莫贖分宜明正法典以謝地方豈可復加之重權以來物議臣是以昧死瀝血再陳懇悃伏願皇上𢎞天地之量寬雷霆之威鍳臣先後認罪辭免實情早乞罷歸田里別選相應之人以居總制之任則邊事有託地方無虞不勝幸甚等因具本該通政使司官奏奉聖㫖該衙門知道欽此欽遵抄出用手本連抄送司查得先為乞恩認罪罷黜以謝地方事該巡撫陜西都御史楊一清奏奉聖㫖楊一清巳命總制彼處邊務著盡心供職以圖後效不必引咎求退該部知道欽此巳行本官欽遵去後今該前因案呈到部看得都御史楊一清奏稱敵衆入攻之時聲勢甚大人情震恐前項傳言蓋為有據但官軍苑馬雖幸保全而先事失防豈容辭責乞要罷職放歸一節為照前項敵衆當時擁衆深入貪得非小本官分布將士振揚威武而又身率餘卒拒守孤城用能扼彼猖獗之勢保我軍民之衆功亦可嘉今又深自引咎力求罷歸尤見不失為臣之義況查有前奉欽依事理難准所奏合無本部仍行本官仰思聖明委任之意逺效前哲許身之忠照舊用心供職務期邊備修舉戎兵簡練使外畨寒心而地方安堵緣係總制官員自劾求退及奉欽依該衙門知道事理未敢擅便正德元年五月初八日本部尚書劉大夏等具題次日奉聖㫖是楊一清巳有前㫖了著用心整理邊務以副委任欽此欽遵擬合就行為此除外合咨前去煩照本部題奉欽依內事理欽遵施行一為處置招募土兵事兵部覆該本部送於兵科抄出總制陜西延寧甘肅等處邊務兼督理馬政都察院左副都御史楊一清題案查先准兵部咨為預防邊患事該本部題看得往年敵衆河開之後俱各出套即今譎變非常事勢難料若果在套住未免肆意侵掠為患不巳況陜西一帶嵗遭大歉民財巳窮合用軍馬除本省三邊之外别處客兵決難輕動況彼處土人生長邊方材力勇徑便于戰鬭若欲鼓舞用命必須激之以利故云重賞之下必有勇夫合無本部于太僕寺寄收馬價銀內借支五萬兩差官賫送陜西聽都御史楊一清支用或隨勢給賞得用官軍或懸利招募本處土人務使精壯之民皆占行伍之籍勇敢之士悉為麾下之兵凡可以激勵各項之人使之殺敵以取功利者悉聽從宜處置必能得其樂于用命振揚軍武以禦邊寇再照陜西延寧官軍舍餘土民人等或恐未知朝廷賞罰條格不肯盡心用命合將近年題行宣大二鎮軍務相應事例通查行移彼中鎮巡等官揭示一應人役務使遵信庶幾隨地寓兵不假别項調遣等因題奉聖㫖是欽此欽遵備咨前來巳經通行備由出榜張掛曉諭去後續准兵部咨為經略邊務事該本部題該兵科都給事中艾洪題稱敵勢大張邊事孔棘要行差官會同各鎮巡官從公多方招募土人本部議擬覆奏節該奉聖㫖招募土兵不必差官只著總制并巡撫官隨宜設法整理欽此欽遵竊照近日戎心驕橫大非昔比今雖出套過河至冬難保不來侵擾糾合團聚動稱數萬我軍寡少以一當十不敷征戰若欲逺請京兵委的徒勞無益本鎮各路兵馬雖可調用然倐來忽去蹤跡無常緩不及事惟招集鄉兵隨處可備調發節該科道言官建議往往以招募為言蓋深有見于此但往年陜西延寧各鎮招軍升官頗來物議以為不得其用緣此等邊民有勇善鬭恐初招之時不曾精核既招之後不曽操練是誠有之豈得一切以為無益如延綏土兵二千近來東西征調與遊竒二兵無異去嵗大同之援亦嘗斬獲首級明效可徴先該臣奉命經略陜西邊務曽經劄仰各兵備官曉諭土著之人有膂力膽氣者報名在官自備弓弩器械遇敵入境搶掠隨便于崖窯堡洞厄塞路口埋伏邀擊後大敵擁衆內侵原招土人斬獲首級報官雖止八顆其在山射擊死傷數目實多俱被鈎䭾殘毁隨即擡營遄歸不敢久住未必不由于此但所招止就各居住堡洞防禦邀擊其報效隨軍𠞰殺人多不肯應募蓋因節年軍舍抽選既無遺力土人招集又多失信以此人不樂從今雖兵部題有欽依事例著為升賞條格然其間事情猶有當酌處者臣有所見不敢自隱其愚謹用條陳于後如䝉乞勑兵部詳議如或可采奏請施行庶幾人心樂從應募日廣鄉兵可集軍勢自揚其于禦戎大計不為無補等因具本該通政使司官奏奉聖㫖兵部知道欽此欽遵抄出送司案呈到部看得總制都御史楊一清所奏備言外畨驕橫之極土兵濟用之效因而條陳四事俱係防禦要務理合開立前件議擬上請伏乞聖明裁處緣係總制官議奏邊務及奉欽依兵部知道事理未敢擅便正德元年七月初一日本部尚書許進等具題次日奉聖㫖准議欽此欽遵擬合通行除外合咨前去煩照本部題奉欽依內事理欽遵施行計開一順土民之情據平涼府固原州固原里鎮戎所迤北李旺堡居住土民李讓狀告𢎞治十四年䝉陜西鎮巡等官遵奉兵部明文招諭各邊軍民舍餘人等臨陳有功一體升賞若係一家三人斬獲首級二三顆願併功升授一人者准令併功至千户而止等因比有姪孫李聰同讓并姪李通等兄弟親族應例自備鞍馬報效本年月日不等節被敵衆入境搶掠守備指揮楊宏統領官軍前去截殺有讓同姪孫等跟隨管隊土官百户楊洪哨至地名哲思口遇敵追至西山掌對敵就陳射死讓姪孫李涼州射傷李玉王海二名李聰與土官百户楊洪舍人楊潔各為首李森楊深楊會各為從斬獲首級三顆李榮等奪獲敵馬三匹并弓箭皮襖靴帽等件本年閏七月十六日又跟隨楊洪前去紅溝卜兒古山與敵對壘李聰同楊洪等奮勇當先衝開陳勢讓為首就陳斬獲首級一顆本月二十四日大敵擁衆深入平涼搶掠八月初三日讓同李聰等跟隨楊洪追至印子山與敵相過俱被射傷李聰與買玉各為首李諒買祥各為從又斬首級二顆後䝉將讓升小旗一名李聰一人二次首級二顆升小旗二名俱注臨洮衛中所陳亡絶嗣李涼州升小旗一名注蘭州衛後所備行固原州依文前去原定衛所著役切思讓等援例報效斬獲首級今䝉升授前役恩典但使一家親族逺當旗役拋棄父母家業離徙鄉井永編户籍名雖旗役實為邊軍求榮反辱人情不堪乞賜轉達照例併功實為便益又據本州在城里軍籍買玉狀告𢎞治十四年間大勢敵衆侵犯有玉同本户買祥買斌買開路保并本堡土民李聰等各應例報名在官自備鞍馬跟隨土官百户楊洪遇警引路前哨節䝉守備指揮楊宏統領截殺纍次奪獲馬匹器械報官本年八月初三日楊洪帶領玉等追襲至印子山對敵被其將買斌買開路保及李讓等八名射傷玉等奮不顧身捨命死戰玉與李聰為首買祥李諒為從斬獲首級二顆并敵器等件報功後䝉將玉升授小旗注臨洮衛中所相離千百餘里拋棄家業田産父母妻子不能相顧及思本户原有洮州衛祖軍一名平涼固原土軍二名俱各領馬聽征原籍止玉等四丁又納夏秋糧草差徭重大苦纍無伸乞賜可憐將玉原斬首級功次記收在官免發該衛或改調臨近固原衛補伍著役便益又據本州在城里土民楊沙的狀告𢎞治十四年八月初一日有搶回敵衆一十七騎前來到莊要搶頭畜是沙的同父楊鐸本户人丁奮勇當先與敵對戰有沙的為首父楊鐸為從斬獲首級一顆并弓箭達帽褐襖等件後將沙的奏升小旗注蘭州衛前所思得沙的親兄楊祿見在固原衛右所王宣百戶下應當祖父卜延卜花小旗身役前項功次情願併與親兄楊祿遺民供幫祖軍實為便益等因各告到臣看得李讓李聰李涼州買玉楊沙的等俱係固原土民奉例糾率親屬自備鞍馬軍器為官軍鄉導奮勇殺敵並無關支糧賞李讓買玉楊沙的各為首斬獲首級一顆李聰二次為首斬獲首級二顆李涼州陳亡其餘弟男子姪為從及被陳傷數多後造冊論功將李讓買玉俱升小旗一名李聰一人升小旗二名俱注臨洮衛楊沙的及陳亡李涼州各升小旗一名注蘭州衛緣臨洮蘭州俱相離固原七八百里之程名雖為升實則拋離骨肉遺棄産業致令含寃吞聲皆謂以功獲罪無故遷發土民灰心以前事為鍳戒臣今年正月初間率兵追襲經過本堡各民舉家呼訴願免發遣照舊應當民差緣此等土民强悍善鬭與畨相等加以血屬田産所在䇿勵有道使肯盡其心力必能效力成功若不俯徇改圖將來非惟不得其力且恐遂失其心審得李讓年老李涼州絶嗣情願併功李聰合無查照原行事例將李讓一門首級四顆俱併與李聰量授一職就便約束本堡土人遇有邊人侵犯率領𠞰截及買玉楊沙的旗役俱改填注固原衛鎮戎千户所將臨洮蘭州二衛旗籍開除仍乞申明著為定例今後官舍軍民父子兄弟協力報效者准令併功至千户而止土民應升官旗職役者俱填注本處附近衛所如此彼上思補報國恩下思保全家業勇氣自倍庶幾隨地寓兵不假別處調遣矣前件查得先該總制大同宣府都御史劉宇題一件一更法以作士氣該本部議查得近年併功升賞之例係一時緊急招軍而設以後慮其勢要貪功流弊難救以故自來不曽舉行合無行令本官仰思祖宗立法之良朝廷委託之重遵守成憲以濟邊事等因題奉聖㫖是欽此巳行欽遵去後今都御史楊一清奏稱往年敵衆入境有土民李讓買玉楊沙的等率領家衆截殺連獲首級各䝉議升旗役但原係固原州人氏今俱注蘭州臨洮衛中後等所不免棄家失業要將買玉楊沙的改注固原衛鎮戎千户所及稱李讓年老李涼州絶嗣又要將各功併與李聰升職仍乞著為定例一節緣併功之舉雖係舊例但查有近日題行宣大等處事理難便更張所據各旗新升衛分既與本州相離太逺委於人情不堪合無准其所奏將小旗李聰買玉楊沙的俱各改注前擬衛所補伍著役仍行臨洮蘭州二衛開除各役旗籍其李讓李涼州行令該衛所查勘親房弟姪人等保送代替前役以後各該土民有能協力征戰斬獲功次者俱照此例填注附近相應衛分庶情法兩盡而事體歸一矣一處失額之地據整飭環慶兵備陜西按察司副使燕忠呈為清查失額官地招募土人報效守戰事䝉臣批據慶陽衛左所千户萬章下舍餘萬爵狀告為欺隱田地事䝉批本職查勘處分依䝉行委慶陽府衛知事曹江張瑊帶領各犯親詣地名長掌等處地方丈量得前項田地約有三千頃俱被彼處軍民人等占種為業此外隱匿之數尚多為照本鎮地方廣濶官軍數少遇警不敷防守近奉事例招募欲將前項地土募軍撥給承種但投充者俱係外郡逃來遊手遊食之人一時虛應充數無益于用看得彼處地方接連西陽三川雜居土達率多熟間騎射較之召募軍人驍健逺甚合無將前量出田地并未丈量之數盡行清查明白招募彼中住居不拘軍民舍餘人等報效殺戰量給前地耕種如此庶幾人心樂從軍伍充實呈乞照詳施行等因照得慶陽地方延袤千里密邇延寧二鎮邊境軍馬數少委的防守不敷西陽三川一帶生畜繁殖恐為敵所窺伺環慶守備官相離地逺應援不及應合就彼增兵操守今據告人萬爵所訐安化縣長掌等處地方及西陽三川中山一帶閒田萬頃多被住人開墾占種為業不曽升科納糧臣嘗推求其故國初開設陜西苑馬寺靈武監所轄清平萬安慶陽安邊四苑俱在慶陽府安化縣環慶地方慶陽苑即今西陽三川之地安邊苑即今安邊定邊等營之地後將靈武監清平萬安二苑徙置平涼地方革去慶陽安邊二苑而其草場故地猶在官司失於稽考處分土人因而占據為業因循至今不曽改正怨爭讐訐訟獄屢興緣此地各人種牧年久俯仰所繫一旦清而革之則彼遂為失業之人置之不問則天下未有無糧之地欲依法照頃增糧承種則地有肥磽嵗有豐凶糧額一定恐貽邊民將來之害若依副使燕忠所據招募土人給地籍名使之報效以見種之田土守見住之地方官得可用之人民無失業之苦人情事體委的穩便近准兵部咨該兵科都給事中艾洪等建言要將沿邊地土丈量的確頃畝招軍給地授為恆産免納子粒使其安心應役其意正與此同除仍行副使燕忠委官清查丈量外合無將前項長掌地方及西陽三川中山一帶舊監苑草場見種拋荒無糧田地就于彼中住居軍民舍餘人等戶內各招募膂力過人熟間騎射者開報在官酌量户丁多寡田土肥磽從寬給撥聽其種牧為業勿拘一定頃畝願騎馬者倍之永不徵納子粒招定之人編成隊伍選委謹慎守法官員管領約束弓矢軍器令其自置官為量給盔甲閒暇之時操習武藝遇冬就在附近槐安堡等處與慶陽衛選操軍餘相兼上班防守給與口糧二月以後即放歸農並不別項調遣如遇敵衆侵犯斬獲首級照例升賞仍將招集過報效土兵姓名年甲并給撥過田土數目造冊繳部查考亦充實邊伍之一䇿也前件看得都御史楊一清奏稱安化縣長掌等處地方及西陽三川中山一帶閒田萬頃緣繫舊苑草場遺下故地土人因而占據為業今被舍餘萬爵告訐巳經案仰副使燕忠丈量前項占種田地約有三千頃其餘隱匿之數尚多欲要盡行清查明白招募彼中住居軍民舍餘人等籍名在官給地分種不必徵收子粒使之自置軍裝以時操練遇冬摘撥槐安堡等處與慶陽衛軍餘相兼戍守一節參照本官所奏以遺閒之田畝招土著之精兵官既不費地因獲守誠為安邊至計但前項地土各人占種巳將百年一家俯仰賴以為天若使所招之軍就繫所業之主彼亦甘心無詞萬一種地之夫難充荷戈之卒未免人心撼搖合無仍行本官再行從長計議如果此舉官得可用之兵民無失業之苦事體人情俱各穩便日後不致他虞宜從區處停當明白具奏前來以慿上請定奪若是中間尚有窒礙亦要謹始慮終用圖可久毋得輕率貽患一廣募軍之途兵部奏行招募事例明白詳盡雖有榜文揭示但邊方村野土著軍民字且不識意何由解必得能言曉事之人開諭庶幾人心樂從查得往時招募多委軍官非獨為途不廣未能盡收且恐立心不一因而作弊近據慶陽衛聽選監生王經呈要率領宗人自備鞍馬出力報效倡引鄉民招募土人以備操守等情巳經委用去後緣西人素尚氣節豪傑之士恐不獨王經一人合無通行各該邊方出榜曉諭不拘軍民職官見任致仕監生生員省祭官義官人等有能招集隨軍報效領馬𠞰殺及著伍食糧之人至一隊者官給賞銀三十兩二隊三隊遞加至四隊二百名以上具奏論功軍民職官各升一級軍職至都指揮僉事文職至五品為止納粟軍官亦照原職加升一級閒住文職或不升官給與應得誥勑致仕官止照數給賞仍進階一級監生省祭官就送吏部入選生員起送入監義官與正七品散官原係七品散官者進階一級俱先將招過軍人貫址相貌造冊連人送兵備官無兵備處送巡守官試驗果係精壯得用發伍食糧收操方才給賞論功巡撫巡按仍要閲視稽考若有將老弱不堪之人妄報扺數查出追奪升賞前後事情比與納粟幸進不同納粟升官富者獲利所得甚少而所損巳多若能招集鄉兵至二百名之上其人決非昏暗齷齪者使之居官臨民必有可觀前件查得先為乞恩比例量授招首職役事該遼東鎮巡等官奏要將招首唐生一等乞要比例升職該本部議得前項招軍事例止開臨陳有功之日一體升賞不曾開有招首升職緣由況係逺年事例難便依擬合無將招過二百名以上者各賞紵絲四表裏一百名以上者各賞二表裏內無冠帶者仍給與冠帶有冠帶者該賞四表裏者加賞二表裏該賞二表裏者加賞一表裏其一百名以下者止各賞一表裏前項所招軍士若各招首願管者仍令管領協同官軍常川操守遇有警調隨同分布臨陳有功之日一體照例升賞等因題奉欽依巳經欽遵去後今都御史楊一清又奏前因固雖激勸人心用廣招募之意但查有前題奉欽依事理各鎮體例不宜異同合無本部仍行本官查照遼東事例一體遵依施行一溥賞軍之典兵部奏行事例各路土著軍民舍餘人等有能奮義設謀斬獲首級一顆隨即賞銀三十兩願升者給與冠帶名為義勇永免本身差徭此例似專為招諭土著之人而設其見在征操備禦官軍及調來客兵不曽開載意以官軍升賞自有常格朝廷終嵗養軍正為緩急之用比與土人素無糧賞者不同但鋒刃之下與死為鄰欲作其輕生之氣必以重利激之況常人之情見利則趨以速為貴今之論功行賞往復核勘動經一二年之上夫決死生于斯須之間而要功利于嵗月之逺斯固常情之所難也臣觀各邊自總旗而上利于得升若軍人升小旗小旗升總旗殊不以為意邊軍艱難萬狀俯仰不能聊生者十常八九雖冒死獲功有以數十兩之銀啖之則欣然而畀之矣故斬獲多繫旗軍而升賞輒歸官舍買功賣功之弊雖有嚴禁而卒莫能禁者職此之由使彼自得厚賞孰肯舍固有之利以犯必禁之法哉且敵人所以能死其衆者正以各利其利故其來也不勸其喪也不悔中國之兵異于是近日言官建白或有以毋拘買賣功次為言意蓋有見于此臣請自今以後敵衆入境除職官外一應操守征哨及調來客兵不問旗軍軍餘舍餘招募土兵民壯義勇等項有能斬獲首級一顆驗繫真正敵衆為首者隨即賞銀三十兩生擒敵衆一人者賞銀五十兩為從者各量加賞勞籍名記功仍照例造冊奏請擬升奪獲敵馬夷器就給有功之人奪回被虜牛羊等物以四分充賞無主識認者盡行給賞如先巳受賞以後查勘得不係親斬首級照數追奪仍問擬應得罪名如此既可鼓士卒立功之勇又可杜官豪買功之弊且斬首級一顆賞銀三十兩以百顆計之賞銀三千兩千顆計之賞銀三萬兩數十年來斬獲首級至百顆以上者能幾何哉若能成此大功使敵人遭挫知所畏憚則亦何惜此重賞使三軍不利于斬獲戎心益驕用兵無虛日所費豈止億萬而巳前件查得先為邊務事該本部議查得臨邊軍民斬獲首級不願升者給銀三十兩奪獲被搶頭畜者以二分充賞此例雖在官府鄉人多未知悉合無行宣府大同省諭各路土著之民舍餘人等有能奮勇設謀斬獲首級一顆隨即賞銀三十兩願升者給與冠帶名為義勇永免本身差徭若能糾集鄉丁協力𠞰殺斬首至五顆以上為首者加升署所鎮撫奪獲被搶牛羊等項以四分充賞事寧停止不為常例等因題奉孝宗皇帝聖㫖是便鋪馬賫文與各該巡撫官著好生省諭鄉村軍民人等果有設謀奮勇斬獲首級的照例重加升賞欽此巳行欽遵去後今都御史楊一清奏稱前項事例止為招募之人而設不曾開載各該官軍要得通照前例論功升賞以作士氣緣本部原議有能斬獲首級一顆不願升者許賞銀三十兩今本官却稱斬首一顆者賞銀三十兩生擒一名者賞銀五十兩又行造冊擬升非特與前例相背抑且輕重不倫查得軍前有功官軍俱有銀牌給賞其數少輕合無本部仍行本官今後各該官軍有能斬獲首級一顆為首者當賞銀牌十兩生擒一人者賞二十兩各為從者量為給賞仍將各人功次另行造冊奏繳擬升所據後開奪獲敵馬敵器并被搶牛羊等物要行等分給賞及要追究冒功之弊悉令查照原擬徑自施行如此庶賞罰允當而人知勸懲矣一為急缺兵備官員事兵部覆准吏部咨本部文選清吏司案呈奉本部送于吏科抄出總制陜西延綏寧夏甘肅等處邊務兼督理馬政都察院左副都御史楊一清題據西寧衛指揮使司申稱整飭西寧等處兵備陜西按察司副使蕭翀于正德元年四月初二日聞父喪丁憂守制回還原籍去訖等因到臣照得西寧僻在萬山之中地方廣濶敵人雜處管轄罕都安定察遜鄂端四衛實納隆本布斡等一十三族敵人辦納金牌茶馬限隔中外為隴右之藩籬先年既設守備將官又設按察司副使一員在彼整飭兵備防禦撫安責任至重近于本年正二等月以來節被安定王管下伊楞古敵人頭目結糾特穆蘇喇嘛衮確蘇木喇勒智達爾嘉勒盼等及齊勤等處番衆頭目吹嘉勒等糾引敵將巴斡協咱倫本等族番人帳房攻打人畜搶殺番民驚走躲避雖經鎮守太監總兵督調守備撫夷都指揮等官徐亷苪寧等各領官軍通事前去外境會合追趕撫治緣番性生拗難保寧帖無事守備官既巳出境追撫本衛若無兵備憲臣駐劄控制誠恐鄰近諸番乘機為寇人心驚疑致生他變且西寧兵備兼管莊浪涼州地方見今敵衆不時出沒相離鎮巡衙門地逺整飭兵馬䇿勵官軍皆繫兵備之責必得老練疏通之人庶幾恩威兼濟上下相安若照常格一概推用在京及各省官員恐其到任稽遲不無誤事臣博采得陜西按察司管屯僉事胡經陜西行太僕寺少卿郭珠俱性資明敏才識優長官不廢法事能達變陜西軍民素所信服揆之年資亦應擢用如䝉伏乞聖明垂念地方番境不寧邊患方急正在緊關用人之際乞勑吏部再行訪察合無于胡經郭珠二人中推用一員銓補整飭西寧兵備副使員缺作急請勑令其前去西寧莊浪等處行事等因具本該通政使司官奏奉聖㫖吏部知道欽此欽遵抄出送司查得胡經年四十四嵗山東濟南府濵州人由進士𢎞治四年二月除户部山西清吏司主事守制起服復除本部四川清吏司主事𢎞治十一年九月升本部江西清吏司署員外郎事主事本年十二月遇例實授𢎞治十四年四月升陜西按察司僉事及查得郭珠年五十三嵗四川敘州府富順縣人由進士𢎞治四年二月除南京山西道監察御史守制起復𢎞治十二年九月升山西按察司僉事𢎞治十七年正月升陜西行太僕寺少卿今該前因案呈到部看得總制陜西左副都御史楊一清題稱西寧等處兵備陜西按察司副使蕭翀丁憂去任照得西寧僻在萬山之中其兵備副使必得老練疏通之人庶幾恩威兼濟上下相安舉保陜西按察司僉事胡經太僕寺少卿郭珠俱各才識優老乞要于二人中推用一員請勑前去行事一節既該總制陜西左副都御史楊一清奏保前來必是事體相應合無依其所擬于僉事胡經少卿郭珠簡用一員升授整飭西寧兵備副使候命下之日照例行移兵部請勑本部給慿令其到任管事緣係急缺兵備官員及奉欽依吏部知道事理未敢擅便正德元年七月初七日本部尚書焦芳等具題次日奉聖㫖胡經升本司副使整飭西寧等處兵備欽此欽遵當將胡經填注陜西按察司副使整飭西寧等處兵備訖擬合通行除外移咨前去照依題奉欽依內事理欽遵施行等因備咨送司查得本部先年奏擬西寧兵備副使責任常在西寧居住兼管莊浪古浪涼州鎮番五衛所不時往來巡歷地方撫治番夷整飭兵備修理城池剖理詞訟興革利弊及糾察不公不法事情凡事俱與布按二司分巡分守并守備官員計議停當而行不許各分彼此致有誤事仍聽總制鎮巡官節制若分守守備并把總撫夷等官敢有掊尅漁獵苦害軍士搔擾邊人者聽其指實呈禀總制鎮巡衙門參奏提問本官職司風紀尤須守法奉公潔巳恤下如或貪縱怠忽法不輕貸今該前因案呈到部擬合通行為此除外合咨前去煩照前該題奉欽依內事理欽遵知會施行一為易置要害地方守臣事兵部覆該本部送于兵科抄出總制陜西延綏寧夏甘肅等處邊務兼督理馬政都察院左副都御史楊一清題查得協同分守寧夏西路署都指揮僉事張翼先因打死人命及地方失事被參提問節經奏辨近日方才復職守備靈州都指揮僉事焦洪節因守備不設被敵入境搶掠人畜攻陷清水營堡虧折官軍參問未結臣親詣各該地方會同巡按陜西監察御史邢纓議得廣武營孤懸平漫與敵為鄰山後敵衆不時窺伺靈州北臨廣套西控大河土漢雜處尤為要害前項重地守臣得人方可倚託今照張翼緣事將及六年鋭氣消沮下人玩慢罪雖可辨用則非宜焦洪連年失事貽患地方雖有微勞難盡折罪此二人者久擁虛名自救不暇委的人情不附物議沸騰況防秋伊邇邊患難測若不早為易置將來重誤邊事雖死莫贖但廣武營守將惟取其驍勇善戰足可支持靈州控制夷夏必得才堪經畫志存綏懷者乃可勝任臣等博訪得延綏舊安邊營把總慶陽衛指揮僉事魏鎮寧夏領軍指揮使仇鉞俱弓馬過人慣經戰陳顯武營協贊見在陜西聽用署都指揮僉事楊義寧夏都指揮僉事史鏞俱勤勵幹固善撫下人如䝉乞勑兵部計議合無將張翼取回別用焦洪待問完具奏定奪仍訪察臣等所舉四人果有可取早為上請于魏鎮仇鉞內擢用一員分守廣武營地方楊義史鏞內用一員守備靈州地方各照例請勑行事庶幾耳目一新兵政可舉用弭將來之患少寬西顧之憂等因具本該通政使司官奏奉聖㫖兵部知道欽此欽遵抄出送司案呈到部看得總制都御史楊一清奏稱分守寧夏西路都指揮張翼節年為事參問鋭氣消沮守備靈州都指揮焦洪近因守備不設見被參提俱難再用及稱防秋伊邇邊患難測欲要蚤為更置一節切照前項地方委繫臨邊重地各該分守將官俱巳纍經為事若再令其在彼非惟威令難行亦恐緩急難倚今既該總制官具奏前來相應依擬合無本部仍行本官將張翼徑自起送回京其焦洪待問完之日具奏定奪所據各官員缺候命下之日本部照例于相應武職內各推舉二員上請簡命前去代替各官分守前項地方緣係總制官員奏要銓補為事將官及奉欽依兵部知道事理未敢擅便正德元年八月初一日本部尚書許進等具題次日奉聖㫖是欽此欽遵擬合通行除外合咨前去煩照本部題奉欽依內事理欽遵仍行協同分守西路署都指揮僉事張翼守備靈州都指揮僉事焦洪一體欽遵施行一為邊務事兵部覆本部於兵科抄出總制延寧甘肅邊務兼督理馬政都察院左副都御史楊一清題據鎮守甘肅總兵官都督僉事劉勝呈據管束莊浪土官軍餘副千户魯經呈有父魯麟存日節奉勑命充左副總兵協同鎮守甘肅地方暫留莊浪撫綏部屬運謀𠞰殺近于本年正月內得患痰嗽纍醫調治不痊于本年三月二十一日病故等因轉呈到臣案查先據副千戶魯經呈前事巳經具題外查得巳故協守甘肅左副總兵魯麟先因病患奏准暫留莊浪撫管土人續因莊浪地方有警該巡撫都御史畢亨題稱本官父祖以來世守莊浪外畨素所畏憚今雖養病在家尚能發縱指示該兵部奏請勑本官今後遇有敵衆侵犯務要運謀設䇿勦殺追趕等因又為預防邊患以保固地方事該臣奏河套有警要調本官統領土兵前來固原環慶等處與陜西將官協同戰守本部覆奏魯麟久在邊方委的謀勇頗優于衆今病痊可相應責成合無轉行魯麟將所管土兵嚴加操練固守地方若遇固原環慶有警即聽都御史楊一清移文調用等因各題奉欽依備咨前來節經通行欽遵外照得莊浪繫河西要害地方先年土漢官軍同心捍禦外畨畏憚不敢恣肆近因分守參將蘇泰不能善處致有異同遇警不能成功該部有見于此奏調涼州右副總兵把琮分守莊浪參將蘇泰調守涼州處置固巳停當去冬套人大舉深入腹裏臣移文調取魯麟應援本官隨即統兵啓行因敵巳出境臣又差官阻回行令整搠操候調用去後緣河西土兵委的驍健善鬭外畨畏憚魯麟父祖以來世受國恩勳烈茂著本官替廕年久節䝉推升委用纍立戰功今邊患方殷正欲遵照成命調用責成不料本官病故及看得伊男副千户魯經年少守法弓馬熟間見奉欽依管束土官軍餘似堪付託且此兵非世將不能控馭但魯經名位尚輕須聽分守將官節制緩急乃可倚賴然此等將官必得氣度宏濶才識優裕恩撫威制兩無所失庶得人心相安博訪得右副總兵把琮亷謹驍勇但駕馭之才綏懷之量非其所長及又訪得分守甘肅西路右參將吳鈜才氣比衆獨優行事寬嚴相濟當此事勢難為之秋必須隨宜更調庶免用違其才因而別起釁端不便此中關繫頗重臣不得不預言如蒙乞勑該部計議奏請合無將把琮仍分守涼州蘇泰調分守肅州吳鈜調分守莊浪操練土漢官軍防禦邊寇遇警相機截殺其待土兵務先懷之以恩不許分毫科刻擾害有功照例具奏升賞勿得自分彼此如有觸法干紀之人亦不許輕貸致長桀驁之風仍乞查照魯麟生前勳勞上請恩典量為褒恤以勵後人魯經于例應該襲授何官亦乞早為查處使名位既正責任有歸令其用心操練約束所管兵馬遇警聽分守將官調遣會合截殺如河套有警聽臣調來腹裏地方防守勉立事功以報國恩以不辱其先世如此則土兵之心既安漢兵之勢益壯敵人聞風畏憚地方可保無虞矣等因具本該通政使司官奏奉聖㫖該部知道欽此欽遵抄出送司查得先為邊務事該暫留莊浪左副總兵魯麟奏稱伊男副千户魯經日漸知訓習練兵馬頗諳事體庶衆信服乞要請勑管束所部家口該本部議擬題奉欽依請勑本官欽遵去後又為易將官以安邊境事該巡撫甘肅都御史畢亨奏稱分守莊浪參將蘇泰因與土兵不協乞將本官改調相應地方及照左副總兵魯麟見今養病尚能發縱指示其子魯經本官教訓亦有成立乞勑本官今後遇有侵犯多發人馬併力戰守該本部議蘇泰改去涼州把琮調來莊浪各依原職分守前項地方及請勑魯麟但遇邊方有警即便督令伊男魯經統領土兵併力戰守等因題奉欽依請勑各官欽遵行事去後又為病故官員事該管束莊浪土官軍餘副千户魯經奏稱伊父魯麟病故該本部議擬行移總制都御史楊一清查勘巳死左副總兵魯麟應該作何褒異所部土兵家口今該作何優恤等因題奉欽依又經查勘去後今該前因案呈到部看得總制都御史楊一清奏稱莊浪係邊方要地防禦必資土漢官軍即今副總兵魯麟巳故伊男魯經名位尚輕所遺土官軍餘必須分守將官得人庶幾撫制有方緩急可倚因訪得甘肅西路右參將吳鈜才器行事俱有可取欲將副總兵把琮仍分守涼州參將蘇泰調守肅州吳鈜調守莊浪一節緣莊浪地方實河西要害之地前項土兵尤宜料理況當邊方有事之時正守臣預防之際事體攸繫誠不可緩今本官見在彼處總制事皆耳聞目擊及所訪各官才能料亦鑑衡有素合無准其所奏候命下之日本部仍行總制都御史楊一清轉行各官各照前項地方欽遵行事其撫制莊浪土兵事宜吳鈜悉要查照原擬施行既不可銜勒大弛長彼偷安之風亦不可嚴刻相加失彼效力之意所據要行褒恤魯麟生前勳勞早正魯經自今名位查與本部近日奏行勘處事理相同合無再行本官即便作急查勘巳故副總兵魯麟應該作何褒異所遺家口土兵見今作何優恤從實具奏前來以慿上請定奪仍將魯經該襲父祖職事緣由行令該衛保勘明白作急起送赴部襲職之後另行議處以正名位施行緣係總制官議處邊務及奉欽依該部知道事理未敢擅便正德元年七月初一日本部尚書許進等具題初二日奉聖㫖是欽此欽遵擬合就行移咨前去煩照本部題奉欽依內事理欽遵施行一為經理要害邊防保固疆場事兵部覆該本部題先該總制陜西延寧甘肅等處邊務兼督理馬政都察院左副都御史楊一清題據委官陜西布政司管糧右參政安惟學陜西按察司管屯僉事胡經呈各准本司咨關抄䝉臣案驗會同分守分巡關西河西二道右參議張勛副使邢義僉事郝本寧夏領軍都指揮使劉端勘議過花馬池一帶邊防應合經理事宜開具會呈到臣查得節該欽奉勑若敵衆出套軍情稍寧即便經略沿邊花馬池等處一帶邊防用心設法整飭保固疆埸欽此欽遵續准兵部咨為大勢敵衆擁衆入境官軍對敵解圍事該本部議擬行臣督同寧夏鎮巡官將花馬池地方上緊用心設法經略務使兵力充實威武振揚用防將來入侵之患以副三邊委任之責等因具題奉聖㫖是花馬池係要害地方纍年整飭邊備緣何仍前疏略動輒失利著楊一清好生用心整理務要停當欽此欽遵備咨前來伏念臣本菲才謬膺重託夙夜兢惕不遑寧處切見陜西各邊延綏城堡據險寧夏甘肅河山阻隔寇雖侵犯止在本境為患猶淺惟寧夏花馬池至靈州一帶地里寬漫城堡稀疏兵力單弱一或失守乘勢拆牆而入其所利不在寧夏而在腹裏必將犯我環慶侵我固原深入我平鳯臨鞏等府州縣其間土漢雜處倘兵連禍結內變或因之而作根本動搖誠非細故此所謂膏肓之疾腹心之害也成化初年河套一𢃄彼時未有邊墻恣肆出入後該巡撫寧夏都御史徐廷章等奏修今邊牆二百餘里開濬溝塹一道延綏地方邊牆壕塹又該巡撫延綏都御史余子俊修濬完固彼知不能侵犯遂不復入套者二十餘年世平人玩邊備稍疏牆既日薄溝又日淺𢎞治十四年由花馬池拆毁邊牆入寇內郡戕敗我士卒魚肉我生民得志而去始蔑我邊牆為不足畏連年擁衆拆入我軍動輒失利先該寧夏鎮巡等官太監張僴總兵官郭鍧都御史王珣等節經議奏要將舊邊牆幫築髙厚邊塹挑濬深濶又節該提督軍務都御史史琳等建言要于花馬池韋州設立營衛摘撥腹裏官軍防守兵部奏行總制尚書秦紘勘處本官泥于所見止添修四五小堡及于靖邊至環慶地方挑穵邊塹一道七百餘里自謂可以阻遏保障工完回奏訖𢎞治十七十八二年冬間復行大舉仍自花馬池清水營拆牆深入搶掠前項邊塹營堡不能捍禦阻遏及又將清水營城堡攻陷花馬池官軍殘害上厪宵旰之憂特命愚臣整飭經理臣雖暗劣歷官陜西有年敵情邊事頗嘗究心但腹裏頻年旱荒倉廪空虛饋餉不繼達衆動號數萬倐聚忽散出沒不常未至而廣徵士馬則徒費芻糧既至而調兵應援則緩不及事縱使大兵既集務速則彼或不來持久則我師先老恐終無以伐其深入之謀沮其方張之勢嘗聞防邊之計莫危於戰莫安於守前人經畫具在巳經選委西安左衛指揮僉事楊宏平涼府同知嶽思忠前去各該地方約會分守花馬池參將閻綱協同分守興武營都指揮保績守備靈州都指揮焦洪查勘計處續據各官將勘處過應該幫築邊牆添設衛所等事會呈前來為照事體重大未經鎮巡三司官員詳議難便定奪又經行委布按二司參政安惟學等會同守巡等官覆勘再議去後今據前因臣恐坐談不如親見本年五月間自慶陽環縣歷延綏定邊寧夏花馬池興武清水營直抵靈州一帶邊牆城堡墩臺逐一躬親閲視及將原勘議事情會同巡撫陜西都御史張泰巡撫延綏都御史文貴總兵官張安巡撫寧夏都御史劉憲總兵官李祥巡按陜西監察御史邢纓面議所見所處大抵略同臣廣集衆思兼收羣䇿參酌損益始有定論其大要有四修濬牆塹以固邊防增設衛所以壯邊兵經理靈夏以安內附整飭韋州以遏外侵當務之急莫先于此但修邊一節陜西各該地方財匱民勞興此大役必多異議然利害有重輕關繫有大小土木之害較之搶殺為小動搖之患比之勞費為大大事可成則小費不足計逺效可圖則近怨不足恤此臣區區犬馬一寸之忠也且今河套即古朔方之地唐張仁願攝御史大夫代朔方總管築三受降城置烽堠千八百所自是突厥不敢踰山牧馬朔方無警嵗省費億計減鎮兵數萬受降逺在河外古之舉大事者未嘗不一勞而後永佚類如此受降據三面之險當千里之蔽國初舍受降而衛東勝巳失一面之險其後又撤東勝以就延綏則以一面之地遮千餘里之衝遂使河套沃壤棄之邊外深山大沙勢顧在彼而寧夏外險反南備河此陜西侵掠之患所以相尋而莫之能解也兹欲復守東勝因河為固東接大同西接寧夏使河套方千里之地歸我耕牧開屯田數百萬用省內郡轉輸斯為上䇿顧今之力有未能未敢議及使敵人不恆入套或如近年入而遄出猶可支持萬一擁衆在套經年不出則陜西用兵殆無虛日八郡之人疲於奔命民窮盜起雖有智者不能善其後矣及今將延綏寧夏一帶邊防設法整飭來則有以待之雖不得為上計猶愈於無䇿然邊防既固雖中人可守敵人聞知或數十年未敢輕犯饋餉可省休養生息于十數年之後東勝之議未必終不可復天祚皇明其將有待於他日乎世之論邊事者或專主於戰伐臣亦非敢忘戰者方將搜選官軍䇿勵將士修車馬備器械儲糗糧明斥堠若使今冬復來侵犯仰仗神武之威謹當督率諸將恭行天罰雪恥除凶臣之志也以身徇國臣之分也成功在天臣不敢必凡所當為臣不敢避今首以築牆挑塹為言宜必增兹多口但受恩深重自當為國逺圖今年套內無警腹裏有秋人民稍安正可以有為之日失此不為縱今目前無事後患有所不免臣何敢幸一時之安而委患于他人哉所有應合經理邊防事宜條具于後伏望聖明俯垂省覽乞下兵部會同大臣科道計議倘有可采上請施行仍乞降勑陜西延綏寧夏三鎮撫臣與臣同心協力及時經理專委都布按三司堂上官各一員總蒞其事工完通將修濬邊牆壕塹添設衛所城堡起倩過人夫支用過銀糧數目畫圖貼說造冊奏繳等因具本該通政使司官奏奉聖㫖該衙門看了來說欽此欽遵抄出送司查得先為大勢敵衆擁衆入境官軍對敵解圍事該本部議行總制都御史查照節次奏行事理督同寧夏鎮巡官員將花馬池地方上緊用心設法經略烽堠不明作何整理軍伍不足作何輳調務使兵力充實威武振揚用防將來入寇之患以副三邊委任之責等因正德元年二月二十八日題奉聖㫖是花馬池係要害地方纍年整飭邊備緣何仍前疏略動輒失利著楊一清好生用心經理務要停當欽此巳經通行去後今該前因案呈到部看得陜西等處總制都御史楊一清奏稱花馬池一帶地方俱係緊要處所邊防既疏勢難阻遏一勞永佚所宜急圖因條陳幫築邊牆添設衛所等六事乞要勑令廷臣會議施行一節緣係經理邊務事體重大臣等委難定擬合無依其所奏本部會同府部等衙門各堂上官并掌科掌道等官將本官所陳事件逐一從長計處停當明白開奏以俟聖裁等因題奉聖㫖是這邊防重事你每便會議停當來說欽此欽遵臣等會同太師兼太子太師英國公張懋吏部尚書焦芳等議得花馬池東西一帶地方敵衆頻年謀侵內地皆從此入蓋由牆薄溝淺既無以懾其輕犯之心兵寡力分又無以遏其遽來之勢今總制都御史楊一清所奏後開六事謀慮既周區畫尤當誠于邊防有益理合逐一議擬開立前件上請伏乞聖明裁處及照前項邊務事體重大倘䝉俞允俟命下之日請勑各該總制并鎮巡官員依擬施行緣係會議總制官員議處防邊事宜及奉欽依是這邊防重事你每便會議停當來說事理未敢擅便開坐正德元年九月二十一日本部等衙門尚書等官許進等具題次日奉聖㫖是都准議行欽此欽遵除外合咨前去煩照本部等衙門題奉欽依內事理欽遵施行計開一查得應築邊牆自延綏定邊營以東石潦池地界起至寧夏地方橫城止共三百里沿邊舊有墩臺七十一座舊築邊牆髙一丈連垜牆三尺共一丈三尺底濶一丈收頂三尺五寸內除垜墻根占一尺五寸止剩二尺官軍難以擺列拒敵牆外墩塹一道深八尺口濶一丈底濶四尺中間多有填塞平漫止存形跡牆裏除興武營清水營毛十剌紅山兒四堡切近邊牆易于護守其餘大小城堡俱各離邊地逺聲勢隔越切緣前項邊防委的壕塹窄淺牆垣低薄墩臺稀疏節被大勢敵衆入套近邊窺伺牆裏既無大兵阻遏牆上又無官軍拒敵敵衆填溝而進掏穵邊牆一日可開二三十處本處官兵自保不暇安能截勦墩軍懼其攻穵往往棄墩而逃烽火不接縱使徵調客兵前來應援牆內牆外俱平漫廣衍黃沙白草彌望無際敵衆動稱數萬我軍衆寡不敵無險可據難以遏其初來之鋒逮既入境馳驟長驅一日夜可至固原地方無復邀阻連年失利職此之由為今之計合無查照寧夏先經鎮巡等官都御史王珣劉憲等擬奏量為斟酌損益將舊牆內外幫築髙厚各二丈收頂一丈二尺兩面俱築垜牆髙五尺連牆共髙二丈五尺除垜牆根占兩面共四尺尚餘八尺之地每牆一丈開垜口一處安置轉關遮板牆外每里添築敵臺三座每座相離一百二十步底濶周圍四丈五尺收頂周圍二丈二尺上蓋暖鋪一間傍牆于空濶要害有水頭去處增添小堡髙厚丈尺略與邊牆相等墩空去處仍酌量添築墩臺牆外壕塹挑濬深二丈口濶二丈二尺底濶一丈五尺前項敵臺九百座暖鋪九百間每間用五人守之該用軍四千五百名無事之時止守舊墩每冬月河凍不拘敵衆曽否入套即便調撥鋪軍上牆防護仍添撥軍人于新墩守哨河開無事疏放回營牆上設置籌牌梆鈴晝夜往來巡警廣張旗幟聮絡相應分委的當官員各定鋪分護守參將協同守備官各照所管地方提調若果長驅入套必似前窺伺侵犯原擬徵調延綏遊竒土兵及寧夏副總兵等人馬各于定邊花馬池興武營清水營靈州等處駐劄仍各分兵于新舊小堡內按伏䇿應其間應分應合事宜又在臨期調度如此則邊備嚴密威武振揚足以伐其邪謀不敢輕易近牆若是仍前填壕近牆攻穵官軍出列牆上敵臺兩邊鎗炮矢石攻擊來者愈衆則所傷愈多步兵擊之于牆上騎兵待之于牆內其鋒必沮其氣必喪彼自逺來利于速戰入既無䇿勢必遁歸縱使執迷不肯悔禍結聚攻圍邊牆受敵不支然相持之間未免少延時日烽火傳接環慶固原一帶人畜既斂兵備既嚴可保無失事不得巳則我邊兵姑斂入大小城堡以避其鋒如果深入速將原拆牆口補塞量留官軍堅壁固守各挑精兵襲蹤而入陜西官軍撓之于內俟其將遁躡蹤而出延寧精兵邀之于中沿邊官軍拒之于外彼雖梟雄豈有善歸之理就令小有侵掠比至邊牆我軍仍于牆上裏面垜口用鎗炮矢石攻擊勢必潰亂諸軍乘之縱不能使其匹馬不旋亦必大遭挫衄可保數十年不敢入套犯邊經略之計宜無出此但興此大役未免勞人費財行據原委三司府衛大小官員參政安惟學等及沿邊守臣參將閻綱等各將邊牆壕塹城堡墩臺丈量估計折算定擬除延綏一鎮延安一府軍民人夫修理延綏邊牆外計算得寧夏五衛東西二路應起人夫一萬五千名固靖環慶西安漢中寧羌鳯翔秦鞏臨平洮岷河蘭等衛所并各護衛量起軍夫共二萬五千名其有馬頭挨次撥軍人俱免起用各令蓄鋭待敵西安鳯翔平涼慶陽臨洮鞏昌等府共起民夫五萬名漢中府在棧道之外道途險阻服役不便合令量徵夫價解送工所以備賞勞人夫鹽菜之用俱聽陜西寧夏二處巡撫衙門督令該道守巡該府衛掌印官酌量派發應役每夫一名日支糧米一升五合計算做工四個月該用口糧米一十六萬餘石欲于各該邊倉關支查得見在倉糧所積不多恐誤主客官兵支用必須趁今年成有收時月另為招商上納夫糧為便但腳價髙貴每糧一石須用價銀一兩有餘方肯上納計糧十六萬餘石該銀十六萬餘兩陜西司府庫藏空虛别無相應官銀支用查得先為急處救荒事該户部奏送賑濟官銀二十萬兩緣各該被災州縣地方該徵稅糧既巳蠲免二麥又皆成熟人心巳安流移復業不須賑濟近准該部明文暫收陜西布政司官庫以備各邊緊急糴買糧草合無於內動支十萬兩專聽修邊項下招商糴糧支用外十萬兩仍收布政司官庫以備緊急糴買糧草不敷之數行管糧參政量將各起運存留糧米通融改撥及聽陜西巡撫官再查别項無礙官錢支用前項人夫錢糧須在今年處置科理停當明年春正二月哨探套內安靖三四月內興工務在八月以裏完備合用防護官軍并提調工程大小官員應支廪給口糧馬匹料草于該邊官倉內支給其餘一應事情應該自處者徑自從宜施行前件議得都御史楊一清奏稱自延綏定邊營迤東石潦池地界起至寧夏地方橫城止俱各壕塹窄淺牆垣低薄墩臺稀疏以致敵衆攻穵甚易出入無阻欲將舊牆幫築髙厚壕塹挑濬深濶并添設敵臺暖鋪小堡分撥官軍防守可緩深入之鋒可邀逃歸之勢及稱該用軍民人夫口糧若干欲要於賑濟官銀內動支十萬兩以備招商上納俱於今年措置停當期以明春邊方少靖四月興工八月完備一節切緣敵性桀驁擁衆而來非得溝牆深髙墩臺聮絡鮮不坐受其弊況前項地方廣濶兵分實難防遏連年失利可為明鑒今都御史楊一清所陳曲盡經營之計事非得已但今年民遭荒歉來嵗便未蘇息若將邊牆墩堡敵臺一時併修誠恐民不堪命合無令兵部仍行本官准令於前項官銀內動支十萬兩先行分委廉幹官員隨宜招商上納糧米務在充實足勾夫役關支待明年八月哨探河套無事年成有收起倩軍民人夫將邊牆壕塹先行依擬幫築挑濬其敵臺暖鋪小堡待候民力有餘然後漸次興工此外一切處置事宜悉依原擬施行其用工夫役嚴督管理官員加意撫恤使忘其勞所築牆垣等件務須比舊堅久有益防守不為徒費財力工完之日通將用過錢糧數目修過工程丈尺備造文冊奏繳以慿稽考一行准巡撫延綏都御史文貴咨稱准臣咨前事會同鎮守太監劉保總兵官都督僉事張安議查得本鎮東自黃甫川堡至西定邊營接連寧夏東路花馬池地界止東西直去共有一千二百餘里俱係緊關衝要地方內寧塞營迤東一千餘里設有二十五堡各境界連絡平漫之處各有築打邊牆山崖溝澗之處各有剷削巖崖挑穵壕塹頗堪保障惟是寧塞營迤西至定邊營止中間空濶一百八十餘里俱未築打邊牆止是挑有窄淺壕塹一道訪得往來敵衆常自花馬池一帶深入寇掠者一則以其營堡稀疏墩臺無備兵馬餒弱一則道路平坦與腹裏固靖等處直捷易于往回故耳今若止將彼處經營牆垣髙厚墩臺稠密營堡連絡軍馬充盛敵衆必然有所畏憚不敢侵犯若安邊營一帶如故不修敵若從此突入往花馬池南畔長驅亦可撓阻則腹裏地方不無猶如往年受害近來本鎮在于彼處添新改舊造成中空外方置有箭窗銃眼可以伏兵制勝墩臺共有六十四座奈緣人力不敷不能多造地廣墩疏止堪守瞭難以遏阻為今之計合無將寧塞營自歡喜梁墩起往西直抵定邊營延寧地界墩止與花馬池地方一樣整理平漫去處築打邊牆山川險阻之處剷削懸崖挑穵深濶壕塹再于見造墩臺空中每三百餘步各添造前項式樣小樣墩臺一座安在邊牆居中各中間再設上土築護牆敵臺一座如此則邊牆髙厚而有備墩臺稠密而有機烽火易知警急易援與花馬池同一金城湯池之固沿邊腹裏均堪保障而無虞矣等因備咨到臣案照先因勘處寧夏花馬池等處地方邊備臣切慮邊情重大變態難測若西路寧夏邊牆修築完固敵衆或從迤東延綏地方進入搶掠則延慶固原不免仍前受害未審彼處邊牆溝塹有無髙深嚴密足堪保障巳經移咨延綏巡撫官勘議去後今准前因看得延綏地方寧塞營之東有險可據或難馳突寧塞營迤西至舊安邊營舊安邊營迤西至定邊營各九十里川原平漫與花馬池地方相類既無邊牆雖有溝塹二道俱為沙土壅塞平滿萬騎馳驟不能阻遏前此敵衆每從花馬池清水營地方拆牆深入取其捷徑今若將花馬池一帶邊防整飭完固萬一敵衆自定邊安邊之間擁衆而入西向花馬池邊牆以裏地方自西而南不過稍迂百餘里則修邊工程歸於無用誠如巡撫都御史文貴所言行據三司委官參政安惟學僉事胡經等勘量得定邊營迤西石潦池地界起至寧塞營迤西地界止共長一百六十三里三百四十五步內平漫相應築牆挑壕者一百三十一里三百四十九步山崖險峻堪以剷削者三十一里三百五十六步合無責成巡撫都御史文貴照依所擬應築牆者築牆應剷削者剷削但前項地方巳該文貴新築甎墩制度精巧非惟便於瞭望亦可按兵擊殺所患墩空隔越稀疏合准本官所擬于中空量為添築小墩臺安在邊牆居中墩依于牆尤便防守其餘溝塹敵臺暖鋪俱照寧夏邊防一體整飭修理但邊牆髙厚丈尺比之寧夏地方稍省合用人夫除本鎮外聽於延安一府所屬州縣量數起用務令沿邊有備腹裏無虞前件議得都御史楊一清奏稱寧塞營迤西直至定邊營川原平漫與花馬池地方相類俱無邊牆可恃兼且墩臺隔越勢難救援今花馬池一帶巳整飭完固而此處不經理萬一大敵擁衆西入則延慶固原未免仍前受害誠有如巡撫都御史文貴所言欲要責成本官俱照寧夏邊防整理一節緣邊寇譎詐此沒則彼出東備則西侵必須在在戒嚴庶彼無間可投前項地方既該總制官員議處前來相應議擬但當嵗荒之餘而興此浩大之役民力或恐不勝合無令兵部仍行本官轉行彼處巡撫查勘本境地方今年果無災傷軍民安堵亦照花馬池事體起倩軍民人夫將邊牆壕塹先行依擬幫築挑濬其餘敵臺等項亦候年嵗豐稔民力有餘然後漸次興工中間一切處置事宜悉依原擬施行務使工程堅完民不告勞常絶西入之望而我享永久之計斯為盛舉工完之日通將用過錢糧數目修過工程丈尺備造文冊奏繳以慿查考一行據委官西安左衛指揮僉事楊宏平涼府同知嶽思忠呈稱親詣花馬池興武營靈州等處會同參將協同守備等官閻綱保績等議得寧夏一鎮西有河山之險東無溝巖之阻西路設立寧夏中衛東路止是新設花馬池守禦千户所似為偏重況敵衆大舉必從東路拆牆而入非惟無險可恃實因兵力單寡敵至境上每仰客兵應援近年徵調官兵失時後期迄無成功合無將花馬池守禦千户所改設一衛除本所外再添四所共五所其興武營相離花馬池一百二十里孤懸急難應援止是備禦客兵戰守不足合無添設守禦千户所照依延綏事例委把總官一員提調防守新設衛所合用官于陜西都司官多衛分摘調旗軍于寧夏并靈州及東西二路新舊招募額外土兵內摘撥有警之時專一守城守牆守墩無事之際邊裏閒田聽其開墾以近就近且耕且守如此則勢不偏重而邊牆可久兵皆土著而人情可安等因各呈到臣參詳所擬花馬池一帶地方委的無險難守花馬池止是新設守禦千戶所軍數尚未補足一千之額其餘俱是各處分班備禦軍人興武營止有備禦官軍七百餘員名緣備禦客兵往來更代不一終無固志今若比照寧夏中衛事例花馬池改立一衛增添四所興武營設守禦千户所各添撥旗軍與備禦官軍相兼防守兵力强盛足堪保障且衛所常備之兵既有定居各思保其血屬守其業産比之客兵計日思歸者不同合用旗軍五千名要于新舊招募額外土兵內摘撥查得寧夏一鎮舊招募甲軍三千名𢎞治十五年間該大理寺左寺丞劉憲招募土兵一萬一千名近巳挑選三千員名給與官馬委都指揮韓斌管領於清水營按伏及中間或有事故紀録之數大約見在新舊招募土兵尚有一萬餘名中間多係精壯勇健之人堪以挑選撥用所據前議添設衛所摘撥招募土軍防守人情事體委俱相應續行都布按三司委官參政安惟學僉事胡經都指揮劉端等勘處相同行准巡撫寧夏本院右僉都御史劉憲咨報亦無異議近該臣巡邊到于靈州各招募軍髙海等自行投狀情願起調改撥河東衛所行據整飭環慶兵備副使燕忠親詣寧夏查選丁力相應情願調撥旗軍共四千名造冊案候合無將花馬池守禦千户所改設寧夏後衛興武營添設守禦千户所將選定新舊招募土兵起調前去入伍食糧永逺操備撥與地基蓋造營房住坐附近閒田任其開墾耕種不收子粒有警則操戈以戰無事則執耒而耕守牆守墩分番撥用待安插巳定擇其驍鋭量給馬匹領養騎征五年之外方將所種田地照輕則起科量收子粒以助邊儲合用衛所指揮千百户鎮撫先查寧夏招軍相應官員及行陜西延寧甘肅四鎮查新升空閒官各具奏改調銓注管事經歷知事吏目等項文官行吏部銓選印信銅牌照例請給但旗軍合用五千名今止挑選得四千名尚缺一千名及查得花馬池守禦千户所額設軍人舊缺三百六十四名俱應撥用合無照依榆林靖邊等衛并陜西苑馬寺事例將陜西西安等八府正德元年以前清出該解南方衛所軍人免其發解各改編前項新設衛所應當軍役待軍伍數足具奏停止議者以為改編事例未免損此益彼緣北人應當南軍畏其煙瘴炎熱終是不肯應役隨到隨逃州縣清解雖勤衛所空虛如故徒為里書官旗漁獵之資今若改編本省地方人心樂從官多實用前件議得都御史楊一清奏稱花馬池東路雖設有守禦千户所兵力單寡其興武營相距一百二十里孤懸絶境有警俱難救援欲要將花馬池守禦所改設寧夏後衛興武營添設守禦所就將選定新舊招募土兵調去入伍食糧永逺操備撥與地基蓋造房屋住坐待安插巳定擇其驍鋭給領馬匹騎征附近閒田任其自行耕種五年之外量徵子粒以助邊儲合用衛所指揮等官查奏改調經歷等項文官欲行吏部銓選印信銅牌照例請給及稱軍數不足要將陜西延安等八府正德元年以前清出該解南方衛所軍人改編前項新設衛所應當數足奏請停止一節緣前項地方委係要害處所必須兵力强盛庶克保障今總制官員奏要改設衛所委于事體相應但官軍所種閒田五年之外量收子粒似為太狹合無令兵部仍行本官將花馬池守禦所改立寧夏後衛興武營添設守禦所文職等官并印信銅牌行各衙門照例銓選奏請給用及官軍所種閒田必待十年之後從輕奏請徵收子粒仍行陜西清軍官將正德元年以後清出雲南貴州兩廣湖廣軍人改編今設衛所著役數足奏請停止其餘彼處事情悉令查照原擬施行務期威武克振邊防有賴一靈州千户所北臨廣套西控大河實寧夏之喉襟中原之門户原額土漢馬步官軍四千八百餘員名備禦西安右護衛官軍七百五十一員名所管地方東至萌城北至興武營方數百餘里大小城堡二十餘座誠為敵衆出沒要害重地靈州不守則寧夏隔為外境環固勢孤無援無環固則無陜西矣內有土民四里并土達軍餘六百戶俱係洪武年間山後節次歸附人數我祖宗嘉其誠款收而羈縻之給與田地草場使其任意耕牧後因有警土人自備鞍馬出力報效纍有斬獲最為勇悍近年以來所司不知存恤草場被人侵奪莫為理斷馬匹一槩走站死則追賠戎馬外侵科差內擾人畜雕耗死徙居半臣頃者巡邊閲視得彼處地方城池壕塹一切兵政因守備非人悉皆廢弛節據土民土達馬俊郭斌等連名具狀訴稱科差重繁生理蕭索乞為分豁情詞十分激切臣觀寧夏地方如此邊務如此人情上無有備之形下有可畏之勢今不為之所將來懼有內變不止邊患當慮而巳傳曰不見是圖況機緘外見巳非一日之故耶又據漢土舍餘軍民劉澄等各具狀告稱靈州相離寧夏動經百里隔越黃河本所月報循環糧草軍務等項俱該寧夏衛提督或聲息河渡有阻該役官吏經月不回公務有失又兼本衛不時差人來所搔擾不過告乞復設守禦千戶所衙門便益等情查得靈州洪武年間原設守禦所徑屬陜西都司管轄後因拜進表箋官員數多不敷差用奏革守禦名目隸寧夏衛帶管原遺肅字號夜巡銅牌六面尚存土民亦屬寧夏衛經歷司帶管路阻黃河科差拘擾委多不便先該巡撫衙門奏設州治建學立師訓誨土官土人子弟用夏變夷似亦有見但寧夏軍餘改設編氓未免損此益彼近又革去州治仍隸寧夏衛管轄夫州治固不可設緣本所軍非不足官有剩員復守禦之舊當無不可且今之管軍官員多一層則受一層之害靈州軍民甚以為害而寧夏之人則因以為利貪豪恣肆上下交征衆暴强凌無所控訴必須復設守禦千戶所專設憲臣一員在彼常川駐劄庶幾夙弊可革土人獲安但陜西按察司添設兵備副使巳多若再添除又啓官多人擾之議查得環慶兵備副使止管慶陽一衛事務甚簡況又兼理靈州鹽法慶陽相離大小鹽池各數日之程實難遙制靈州相離鹽池不逺易于提調合無將靈州千戶所改設守禦千戶所換鑄印信用使徑隸陜西都司所轄土民聽本所吏目帶管將環慶兵備改作整飭環慶靈州等處兵備自環慶迤西寧夏花馬池興武營清水營直抵靈州一帶地方俱聽提調約束常川在于靈州駐劄操練軍馬問理詞訟撫安土人禁革姦弊兼理靈州鹽課司大小鹽池鹽法仍聽陜西寧夏巡撫官員節制如此而又委任得人則軍民免十羊九牧之擾土人有趨利避害之望而一帶地方邊備錢糧有所稽考不為無益前件議得都御史楊一清奏稱靈州地方係要害重地內有土民四里并土達軍民六百户俱係先年山後歸附人數安住前地令其任意耕種後因報效有功頗為忠勇可用近年所司不知存恤科差重繁以致纍行告理誠恐變生不測及稱漢土舍餘軍民告稱靈州相離寧夏河道險逺公務文移每多阻悮兼以本衛公差拘擾乞要查照洪武年間舊例將靈州千户所改設守禦千户所鑄換印信徑屬陜西都司管轄土民止聽本所吏目帶管并要將環慶兵備改作整飭環慶靈州等處兵備迤西一帶地方俱聽提調時常在于靈州駐劄練兵理刑撫夷革弊兼理前項鹽課仍聽陜西寧夏巡撫官員節制緣前項土民舊令自種自食本為羈縻之術近既垜集軍伍自備鞍馬征戰益當厚加撫恤使其樂為我用若又重以差徭使不聊生逸柙之患不可不慮誠有如總制官員之所論者及稱靈州徑隸陜西都司管轄係洪武年間舊例見存肅字號夜巡銅牌在彼今改隸寧夏軍民皆稱不便亦合俯順人情況擬改兵備官員時加綜理尤為周悉合無令兵部通行本官將靈州千户所改設守禦千户所徑隸陜西都司管轄今後土民止令本所吏目帶管照舊辦納差糧仍行禮部改鑄印信降用其環慶兵備副使就行改作環慶靈州等處兵備常川在於靈州駐劄候命下之日另請勑一道備載原擬責任賫付兵備官員欽遵行事務使土人效用地方鞏固一行據平涼衛把總指揮趙文呈䝉臣委會同寧夏都指揮韓斌踏勘過韋州四面城垣敵臺更鋪坍塌損毁數多城上各有通人行走道路門無鐵葉不堪保障及查得本城羣牧千户所官軍盔甲軍器火器事事不堪等因具呈到臣看得韋州地方廣衍平漫四通八達乃大敵出沒經由要衝處所正宜髙城深池戒嚴武備以潛消其窺伺之患今乃坍塌廢弛至此守既不嚴戰又無兵倘敵衆窺知擁衆攻圍則城內生靈慿何保障腹裏人民必致驚擾況密邇螺山慶府墳塋所在𢎞治十四十七年間敵衆入境多在螺山駐宿近日被人將慶恭王墳掘發開棺看守人員通不知覺慶王父子至情豈不痛心所據韋州重地若不將城垣壕塹上緊修理添設常備之兵日後貽患恐不止此查得本城羣牧千戶所官軍數目不多實難倚託寧夏一鎮城堡墩臺緊關要路甚多官軍數少亦難摘撥行據寧夏領軍陜西都司都指揮使劉端查得寧夏中護衛旗軍除選調廣武營鳴沙洲操備外見在官軍舍餘五千三百二十二名儀衛司旗校舍餘一千一百九十七名俱在本府别無差占比之秦肅二府大有不同若將前項軍校餘丁摘撥韋州設官操守保障地方衛護墳塋最為長便且秦肅二府官軍旗校千里赴邊備禦今以慶府擁衛之人保其先王托體之地慶王體國之忠奉先之孝大義兩繫決難他辭除修理城垣壕塹另行外合無請勑寧夏鎮巡等官太監葛全都御史劉憲總兵官李祥等啓王知會督委亷幹官員將寧夏中護衛儀衛司軍校舍餘照冊清查明白挑選家道殷實丁力有餘者一千名選擇本衛能幹千百户等官管領前去韋州常川駐劄撥給空閒田地耕種王府差役盡行蠲免專令在彼操習武藝與羣牧千户所官軍相兼防禦仍于寧夏等衛中選委有謀勇有行止指揮一員提督操守振揚威武保障城池衛護王墳遇警相機戰守遏截則敵騎經行有所忌憚不敢恣肆腹裏人心有所繫屬不至動搖前件議得都御史楊一清奏稱韋州地方平原通衢大敵出沒之所兵備廢弛保障不堪況與螺山相近慶府墳塋所在連年入境俱在彼處結營駐劄及慶恭王墳近又被人開掘深為可慮欲要添設官軍防守無處摘撥查得寧夏中護衛見在旗軍舍餘五千三百二十二名儀衛司旗校舍餘一千一百九十七名俱無別項差占乞要行令寧夏鎮巡官員啓王知會督委廉幹官員將前項軍校人等清查明白挑選家道丁力相應者一千名委官管領前去韋州駐劄給撥空閒地土耕種王府差役盡行蠲免專令在彼與羣牧千户所官軍相兼操備防禦仍令于寧夏等衛選委亷能指揮一員提督既可衛護王墳又可保障城池一節參照前項地方委係緊關要路雖設有羣牧千户所官軍兵力單弱實難支持況又密邇慶府墳墓誠不可不為之處及照中護衛并儀衛司軍校人等通計六千有零俱在本府閒住今擬撥守前該地方則以本府擁衛之人保其先王托體之地忠孝大義兩繫誠如總制官員所言況摘撥之外尚存五千有餘儘勾差用事體亦為相應合依其所奏令兵部行令本官轉行寧夏守臣啓王知會務思體國之忠奉先之孝即便督令能幹官員將前項軍校人等如法挑選一千名委官管領前去韋州相兼戍守其餘事宜悉照原擬施行務使威武振揚王墳保固不至似前貽患一行據委官陜西布按二司參政安惟學僉事胡經各呈稱靈州橫城以北西抵黑山營鎮逺關係寧夏一帶緊關要路敵衆見我邊防嚴備既不能入花馬池必將從此而入踏冰過河東西任意侵掠河西城堡雖有官軍數亦不多不能阻遏合無將橫城以北直抵鎮逺關邊牆壕塹一體幫築挑濬及稱黑山營先年屯有人馬後因路逺難援廢而不守今河東邊防既嚴敵必從此入境宜於黑山營仍屯兵按伏等因案查先該臣看得原擬寧夏邊牆至黃河東岸今築橫城而止恐敵衆見我河東邊牆髙厚不能掏穵冬深河凍於牆盡頭處踏冰過西岸自西而東仍謀入侵未審河西城堡兵力堪否捍禦巳行勘議去後今據各官俱呈前因臣按圖考冊廣詢博訪寧夏橫城北黃河東岸舊有邊牆一百八十五里壕塹一道髙厚深濶悉如花馬池一帶城塹之數自南而北有長城十八墩後守臣恐稀疏每墩空內添設一墩共見在墩臺三十六座墻裏套內地方又設石嘴暖泉二墩瞭守其第十八墩與河西黑山營鎮逺關相對每年于黑山營屯聚人馬阻遏敵騎以為寧夏北門鎖鑰前人綜理周密深有所見節因寧夏守臣怯懦士馬削弱河東墩軍纍被劫掠撲捉既將石嘴暖泉二墩廢棄遂將新舊三十六墩俱廢而不守謂之備夏不備冬却止於河西築立墩臺一十五座守瞭由是敵人多寡逺近消息通不知覺又因黑山營曽被虜掠攻圍遂將官軍那入平邊城操備由是平邊城為極邊要害居人往往不得耕牧殊不知撲捉墩軍窺伺城堡乃邊人常事顧吾所以待之者何如耳吾能往彼亦能往我退一尺則彼進一尺河東墩臺既不可守使彼乘凍渡河則西岸之墩獨不可掏穵乎黑山營有備則平邊為腹裏今廢黑山營而不守假使近窺平邊亦將併廢之乎是皆不通之論也今花馬池一帶邊墻既欲幫築髙厚又於牆盡頭橫城之南添築一堡量屯兵馬防禦河開之後縱有強敵不能為患但恐冬深河凍踏冰而西仍謀入侵容或有之意外之防不可不謹所據河東三十六墩邊牆壕塹誠宜幫築修濬河西黑山營誠宜屯宿重兵但明年既修延綏花馬池一帶邊牆工程浩大力不能及合無行令寧夏守臣明年將河東新舊三十六墩坍塌損壞者量為修補照依舊規撥軍守瞭與河西墩臺烽火相接不至失誤官軍應援稍俟一二年仍將前項橫城以北三十六墩牆塹悉照花馬池一帶邊防幫築髙厚挑濬深濶敵臺暖鋪護守官軍一體處置整理仍挑選精鋭人馬於黑山營按伏以為平邊城聲援如此則封守慎固而地方可保無虞矣前件議得都御史楊一清奏稱花馬池一帶邊牆今既議幫築髙厚屯兵防禦或可以偹侵患但靈州橫城以北西抵黑山營鎮逺關邊防頗疏誠恐敵衆不得于東必謀於西及查黃河東岸原設邊牆壕塹并墩臺三十六座與河西黑山營相對遞年屯聚人馬阻遏過河敵騎最為周密後因小有失利棄而不守遂至深入無忌今宜照舊修復但東西工役一時併興民力弗堪欲要行令寧夏守臣暫且修補撥軍守瞭候各該工程稍暇悉照花馬池一帶整理一節切緣河東三十六墩并河西黑山營若使戍守嚴備踏冰欲渡不敢輕忽平邊地方益重保障今若棄而不守是撤藩籬而守門庭堂陛之患勢將必至今總制官員奏要修復舊制誠得前人綜理至計相應依擬但大功併作民力委有不堪合無令兵部行令本官轉行寧夏守臣將前項河東新舊墩臺坍塌損壞者照依舊規暫且量為修補撥軍守瞭與河西墩臺烽火相接以備敵衆過河候各該工程稍集仍依原擬修築施行關中奏議卷七
