body:
  text: 關中奏議卷六明楊一清撰巡撫類一為地方事兵部覆准禮部咨於禮科抄出巡撫陜西地方兼督理馬政都察院左副都御史楊一清題准兵部咨該本部題前事照得各處巡撫等項都御史舊例在邊方者四月在腹裏者八月俱該赴京議事其遼東宣府大同山西延綏陜西寧夏甘肅俱與敵境相鄰見今達衆不時出沒正在用人之際不可暫時缺人督理合無行移巡撫等官今年俱免赴京議事各在地方修舉本等職業若有重大應議事件明白預先條陳差人齎奏照依舊例經該衙門會議奏請施行等因題奉欽依備咨到臣除將陜西重大地方事情另行具奏及瑣屑常事應該自處者不敢一一煩瀆聖聽徑自從宜處置外今將事干各處地方益于政體宜于軍民不係見行事例該載者條陳數事乞勑該衙門會議倘有可取奏請施行等因題奉聖㫖禮部知道欽此欽遵抄出備咨送司案呈到部看得巡撫陜西等處地方兼督理馬政都察院左副都御史楊一清所奏後開事件俱係裨益軍民有關政體重務應合逐一議擬開列前件上請定奪緣係地方及奉欽依禮部知道事理未敢擅便正德元年二月初一日本部尚書劉大夏等具題次日奉聖㫖准議欽此欽遵擬合通行為此除外合咨前去煩照本部題奉欽依內事理欽遵施行計開一復馬夫舊例查得洪武年間舊例在外司府州縣官員俱有欽給馬匹僉選中等三丁民戶每馬一匹定撥十戶計人丁三十丁出備草科輪流養馬如馬倒死就令各戶買補行之百三十年並無別議後因不才貪官需索馬夫供給數多𢎞治七年該御史建言兵部奏准比照柴薪皂隸定議出銀則例每戶四兩十戶共銀四十兩給與各官自行買馬及雇人餧養𢎞治十四年間又該給事中建言本部奏革去銀二十兩每戶出銀二兩共銀二十兩仍送各官自買草料餧養馬匹如有倒死申禀上司支給在庫官銀買馬是皆因時救弊之術未為不善奈何新例既行所得銀兩收為囊橐中物誰肯支用且買草糴料紛紛與市㕓交易亦多不便至于餧飼未免屬之在官之人孰肯雇役久之有馬不復愛惜馬死不復買補人夫有擡轎之勞驛馬有借騎之勞不借之驛傳則借之里甲甚至又令里甲置買傘轎鞍轡及出草料餧馬者比比有之弊端橫出蓋至于今而諸司之馬廏空矣近又許令無馬者支給在庫銀兩買馬于是乞討之移文相望而買馬者十無二三在官之出給無窮而在民之勞費如故本以息民而反病民本欲省費而反增費乃知我祖宗之良法美意不宜輕議變更蓋不但此事為然耳況凡厥有官亷者恆少不亷者恆多彼誠亷官必不需索馬夫銀物彼誠不亷所取正亦不在馬夫而巳需索馬夫財物當坐贓罪彼猶不知警畏而謂擅騎驛馬私借里甲馬匹有禁足以保其必不犯乎徒失朝廷優禮臣下之意而顧有損于官民無益于政體邇者陜西山東等處巡撫官各嘗具奏乞復舊規該部以行之未久難又更改臣竊謂一法立一弊生因時制宜更之以復祖宗之舊無所不可此亦皇上初政率由舊章之一端也除陜西司府州縣官員前項弊端臣通行嚴加禁約訪察外如䝉乞敕兵部從長議處合無仍照洪武年間事例通行南北直隸并浙江等十三布政司將各官騎坐馬匹定撥中戶十戶每户三丁共三十丁就令輪流在官餧養馬匹置買鞍轡若馬匹倒死各丁自行買補官有事故升調去任前馬收存新官騎坐此外但有一毫科索馬夫財物等項許巡撫巡按訪察輕則報以不謹重則參提問罪罷黜如此官民實為兩便前件查得在外司府州縣官每員撥市民三十丁買馬餧養以備官員騎坐此是洪武年間以來舊例近因言官建議更改納銀令其自行養馬法屢變弊愈滋本欲息民而反病民本欲省費而反增費誠如本官所言者合無本部通行各該巡撫巡按將納銀事例革去悉照祖宗舊例輳撥市民三十丁置買馬匹鞍轡輪流餧養如馬倒死就令各丁買補舊官去任前馬存留新官騎坐敢有餘外需索馬夫財物分毫許被害之人指實具告巡撫巡按官處應拿問者拿問應參奏者參奏施行一定支應則例查得陜西鎮守太監處每日京兆驛支應銀八兩四錢以一嵗計之該銀三千餘兩鎮守總兵處每日支應銀五兩六錢以一嵗計之該銀二千餘兩通計二處嵗該銀五千餘兩買辦油鹽醬醋柴炭所費未必如是之多況不時之需又有不在此數者乎以此該驛站糧價銀之取較之舊時其多數倍所司纍欲裁減掣肘中止訪得各處鎮守衙門該驛支應輕重多寡不一然亦無有如陜西京兆之多者陜西往年支應亦無此數不知添自何時恐日後恃為合得月增嵗益民何以堪且陜西三邊經費所出大半仰給西安州縣兵荒之餘奄奄喘息苛征浮費此其一端既往不須深究方來當為之所除行陜西布政司查禁裁省外誠恐各處亦有此弊輕重不均亷貪莫辨民受其患不獨陜西為然如䝉乞勑該部查議各處鎮守太監總兵等官除本等廪給外應否折支調和蔬菜柴炭油燭等項價銀若干如果相應合無定與則例通行遵守使亷者有養贍之資貪者無漁獵之害敢有慿藉驕橫仍前額外勢逼威索者聽巡撫巡按指實糾舉如此則站價可減民困少蘇地方幸甚前件查得祖宗舊制差使大小官員經過者日支廪米三升有事地方者日支米五升連下飯油醬等項俱在其內近年各處鎮守內臣或稱日用不足别加柴肉鹽醬等項者然亦未聞有如陜西前項之甚必是先該司府州縣驛遞不才官員止知承奉小人不顧小民患害日增月益以致如此況日逐使客數多總計費用無算該驛庫子必至破家陜西連嵗天災此其咎徵一端也今該巡撫官奏發相應查處合無本部移咨陜西巡撫都御史并行巡按御史行令所屬州縣驛遞衙門今後本省鎮守內臣除本等廪米五升外每日猪肉不得過五斤雞不得過二隻柴七十斤炭二十斤油一斤鹽醬各一碗燭三對小菜三樣若是逐日供送勞攘十日半月總計聽從其便所司敢有仍前分外剝民脂膏曲意諂奉者許巡撫巡按官嚴加訪察拿問黜罷仍通行各處巡撫巡按查勘凡有不遵祖宗舊制濫取害民之事務要禁約改正若舊能遵守成法不許因此倣效分外加增其餘公差官員人等并奏帶頭目等項該支廩給口糧悉遵舊制而行一為地方事戶部覆云云看得督理馬政都御史楊一清所題事件係隸各衙門掌行擬合通行除外合就開咨前去煩為徑自查照施行計開一稽考軍衛錢糧據陜西按察司提學副使王雲鳯呈查得陜西西安左等衛除額設正軍之外有曰寄名舍餘冬操夏放每年自十月至來年二月每日口糧一升每月食糧三斗小月二斗九升若有騎操馬者食糧一石本色六斗折色四斗每年布二匹綿花一斤有曰抽選武備常操舍餘有馬該糧一石本色六斗折色四斗布一匹花一斤無馬止食糧六斗有曰舊招募義勇每月食糧四斗有曰招募土兵即新招募義勇每年冬操每月食糧三斗自十月起至次年三月止布一匹有曰屯軍有馬食糧一石本色六斗折色四斗布二匹花一斤八兩無馬每月食糧四斗每年十月起至次年二月止布一匹花一斤八兩有曰起調護衛遺留餘丁內投充常操者食糧一石本色六斗折色四斗備冬者每年十月起每月本色糧四斗至次年二月止中間又有逃而復回回而不行投首當差却收糧而又逃者有死而勾補補而不當原差食糧于別項下者其寄名屯軍禦冬備邊者十月內起身赴邊之日隨身每日行糧一升五合在衛月糧就該截日住支頭緒繁多未易悉數雖有智者莫能卒解因此久慣識字人等及本所掌印千戶遇關支糧賞造冊之時作姦百端或將無馬混作有馬或將冬操槩為常操或將寄名并屯軍赴邊之後不行住糧及逃故不除姓名暫除旋揑見在并詭名重名等項每年一衛盜支糧千餘石布千餘匹軍士頭緒每衛亦不盡同陜西共該四十餘衛所其弊殆不可勝計上司官員若非因人告發安能得其肯綮間有知者又因人衆往往置而不問即今在在倉庫空虛此亦所致一端近將查出盜支識字人役并衛所及該倉官吏治罪監追若不專官管理則民日飢而士終不可飽糧日進而倉終不可實及官軍俸糧折色錢鈔馬價均徭贓罰銀物預備倉糧并馬匹草料其弊類此合無差委按察司管屯官員兼管稽考所屬各衛所月糧布花馬匹草料及馬價錢鈔均徭贓罰銀物預備倉糧等項一應錢糧姦弊仍於本官勑書內載入以便行事則每年當得數萬錢糧于侵盜之手軍足食而姦弊革矣等因具呈到臣案查近該臣訪得西安在城三衛官軍俸糧布花及在庫官錢多被經該官旗軍吏人等盜支盜賣侵尅數多積弊有年干礙人衆難盡稽考巳經劄委按察司提學副使王雲鳯會同管屯僉事胡經弔取近時卷簿查究呈來施行去後續據各官會呈查出盜支倉糧二千三百五十二石八斗一升七合折銀一百三兩一錢七分三釐七毫銅錢八萬九千九百二十六文折色銅錢三千二百三文鈔三千五百一十貫侵尅賞賜冬衣布花大布七百五十四匹折花銀三十二兩七錢三分此外侵欺科斂求索局騙枉法等贓不止一端且據一時卷簿所查尚有此數嵗復一嵗所侵盜不知幾何近而省城附郭衛分尚有此弊逺而在外及各邊衛所其為弊不知幾何是皆百姓膏血之餘軍士不得實惠而徒為姦人漁獵之資深可痛恨夫利之所在人必趨之錢糧出納之際姦弊易生固不止軍衛為然而軍衛為尤甚如前各項軍人頭緒如此之多該關糧賞則例不一至於備邊輪戍之數逃故不常該關該扣日異而月不同以至積年旗吏夤緣為姦不才官員通同作弊勢使然也此非細心稽查何由知其詳悉布按二司巡守管糧等官政務繁多案牘填委不無顧此失彼副使王雲鳯所呈欲委按察司管屯兼管稽考所屬各衛所錢糧姦弊不為無見竊恐此弊不獨陜西為然天下衛所大抵相同如䝉乞勑該部詳議合無通行南北直隸及各按察司各委管屯官員兼管稽考所屬各衛所月糧布花馬匹草料及馬價錢鈔均徭贓罰銀物預備倉糧等項一應錢糧姦弊仍於本官勑書內載入以便行事其馬價均徭預備倉糧贓罰銀物等項錢糧俱委經歷專一經手經歷缺官知事署印帶管經歷知事俱缺從管屯官暫委别衛首領官或文職雜職官管理不許本衛徑委千百戶鎮撫等官每年終將稽考查過軍衛錢糧姦弊拿問過人犯開報巡撫巡按用以驗其職業修否其巡守管糧等官仍要照舊詢訪稽考若有姦弊徑自施行亦不許恃有管屯官專管推托不理如此則弊端漸革軍食稍充而軍人不得肆志稔惡矣等因備咨送司案查先為缺官事准吏部咨該本部題准巳經照例請勑一道付僉事胡經親賫前去陜西按察司到任專一提督陜西都司所屬各衛所管屯官員人等務要及時耕種完足屯糧禁革姦弊去後續為分巡事該陜西按察司奏稱甘肅地方添設僉事一員請勑往來甘肅等六倉并行都司廣盈庫監督收放錢糧禁革姦弊兼管屯田水利三年一換該本部題准又經請勑一道馳驛賫付僉事官員欽遵於甘肅等六倉管理糧儲兼管水利并提督陜西行都司所屬甘州一十五衛所屯田務要倉糧無弊水利疏通屯糧及時子粒完足各倉收糧官攢人等有弊各衛所管屯官員軍士耕斂失時以致倉糧有虧子粒拖缺屯軍失所水利壅滯應拿問者就便拿問應參奏者具實參奏去後今該前因案呈到部看得都御史楊一清奏稱陜西西安在城等衛官軍俸糧布花及在庫官錢等項多被經該官吏人等盜支盜賣侵尅漁獵積弊有年非止一端又恐此弊不獨陜西為然天下衛所大抵相同要行詳議通行南北直隸及各按察司各委管屯官員兼管稽考所屬一應錢糧姦弊仍于本官勑書內載入以便行事及各衛所錢糧俱委經歷知事掌管不許本衛所徑委千百户等官一節深為有見合無依其所奏將各處管屯官員各另請勑一道將各該衛所月糧布花馬匹草料及馬價錢鈔均徭贓罰銀物預備倉糧等項錢糧姦弊俱令兼管稽考不獨屯田水利官吏旗軍人等有犯不分軍政掌印管屯管倉應拿問者聽本官徑自拿問應參奏者參奏拿問其馬價均徭預備倉糧贓罰銀物等項錢糧俱委經歷專一經手經歷缺官知事署印代管經歷知事俱缺聽該道守巡并管屯官選委別衛首領官或文職官管理不許本衛徑委千百户鎮撫等每年終將稽考過軍衛錢糧提問過人犯數目開報巡撫官驗其職業庶錢糧易於查考姦弊易於革除緣係專官稽考軍衛錢糧事理未敢擅便正德元年二月十八日本部尚書韓文等具題次日奉聖㫖是欽此欽遵擬合通行為此除行都察院轉行浙江等十三按察司并南北直隸地方各管屯副使等官將原領勑書差人徑自具奏更換外合行備由移咨前去煩照本部題奉欽依內事理欽遵施行一為地方事題為地方事准兵部咨該本部題前事照得各處巡撫等項都御史云云等因題奉欽依備咨到臣除將陜西地方重大事情另行具奏外今將事干各處地方不係見行事例該載者條陳數事乞勑該衙門照例會議可否奏請施行緣係條陳地方應議事件事理謹題請㫖計開一維持憲體照得在內監察御史在外按察司皆風憲官為朝廷耳目關國家元氣御史巡按一方吏治臧否民生休戚所繫其責尤重鋤貪祛暴乃其職任近年以來問發及奏劾文武官員多被反訐毛舉細小過失托拾不干巳無根之詞輒䝉併勘查得見行條例文武官吏人等犯該為民等項罪名不分巳未結正伸訴寃枉者准行辨理其有妄奏寃枉托拾原問官員勘問涉虛原問為民者發口外為民原問充軍者發極邊衛所充軍前項禁例不為不嚴但人安得無過既行併勘勘官意得兩全往往遷就出脫奸人恣為得計夫人莫不好榮而惡辱此風若行其不相率而為姑息避事者鮮矣使風憲失職姦貪得志民受其害豈朝廷之福哉且御史出巡回日自有本院考核京官又有十年一考察之例按察司賢否自有巡撫巡按開報考語三年又有朝覲黜陟之典豈慿所問發舉劾之人言詞以為輕重哉臣請今後監察御史按察司官巳經問發為民文武官吏人等及舉劾官豪勢要人員果有寃枉止許將所枉之事明白開陳奏訴照例行無礙衙門勘問辨理敢有托拾原問官員過失不拘事情輕重將原詞立案不行仍查照原擬從重歸結庶可杜絶小人姦計而內外憲臣皆得展布肆體以事其事矣一稽核新軍照得各處清理軍伍舊例各州縣委掌印官各府委同知布按二司又各有堂上官一員以總理之又勑遣監察御史一員以董其事三年一換定與分數以驗功績立法防範可謂甚嚴然行伍日見消耗邊堡未聞充實彼推移版籍埋沒姓名變亂于里書之手莫之能稽者其弊固多然有司嵗所清解十常四五而衛所見在收役百無一二蓋因原籍原衛相離地逺兩不相照清軍憲臣但知此有清出解過之數又焉知彼無著伍應役之實該管官旗既不依例存恤却乃任情作弊有方出收管隨即得錢賣放者有將盤費搜索殆盡只得隨逃者亦有著伍之後被其侵尅糧賞百般科害貧不能存以致在逃者故批解方獲原軍巳回今次解補之人即下次清勾之數以為常事以官司經年督責之勞小民闔門津貼之費殘民肌體剝民脂膏而徒為官旗漁獵之地深可痛恨及今不為之處將來其弊滋甚臣請令天下清軍御史清解州縣軍丁之外兼督察稽核該管地方衛所新軍先期通行各處清軍御史每年終將清出南北直隸各布政司巳解出軍人某衛若干某所若干開造文冊差人分投賫送各該清軍御史各該御史按臨但有衛所去處照冊比較查考如某處冊開解補新軍某某該衛所不見投到即繫原籍有司官吏里老故縱不解虛文搪塞如巳解到務拘本軍正身審問有無存恤剝削情由如正身在逃即將該衛所官旗比較各行原該清軍御史務追究出州縣容縱衛所賣放剝削實情應提者提應參者參各從重問結其無清軍御史去處按察司清軍官一體照例施行開報功績務將取有衛所收管軍人方准作數仍乞將前項事宜增入清軍御史欽奉勑內以便行事如此則事體相須彼此相制人知警畏宿弊可以漸除行伍可以漸充矣一處置軍生嵗貢據陜西按察司提學副使王雲鳯呈照得天下各府州縣儒學嵗貢皆于廪膳年深數內考選惟都司衛所學校原無廪膳直于闔學生員內論入學年深因此軍生既得入學多不讀書茍嵗考免于黜發則計日得膺嵗貢提學官員間有不論年深取曾經考中科舉者充貢然軍生得與科舉者甚少恐致入學年深不曽科舉者老于無用徒有不均之歎殊無振勵之意合無將天下都司衛所學校照府州學廪膳名數從提學官考定儲養挨次起貢號為挨貢名色仍不食糧該貢之年照例考選及嵗考驗其問學消長以為去留如此則軍生有階級漸進自此始奮發讀書之志而應貢者皆精選素教勤學可用之人矣等因備呈到臣看得都司衛學因無食糧之例止以入學年深者起貢中間文學雖優籍名在後茍不得志于科場比老無階身之路委的賢愚同滯士氣無由振興欲令食糧則邊儲有限供給不敷若依副使王雲鳯所擬將天下都司衛所學校照府州縣廪膳名數從提學官考定儲養挨次起貢號為挨貢名色仍不食糧如原繫一年一貢如府學者定為挨貢四十名四年三貢如州學者定為挨貢三十名兩年一貢如縣學者定為挨貢二十名該貢之年照例考選及嵗考驗其學問消長以為去留如初考堪取挨貢不及前數不必拘泥止儘見在相應之人餘缺之以俟來考如此既可振勵人才又不縻費糧餉乞勑禮部計議採擇施行一為地震事題為地震事據陜西布政司呈據慶陽府環縣申據本縣隂陽學牒呈據直日隂陽生郝雲呈照得本縣𢎞治十八年六月初十日癸亥約午時分忽從東北地震二次響聲往西南去訖搖動軍民房屋理合呈乞施行等因到學擬合就行為此合行牒呈本縣乞為轉達施行等因據此擬合通行為此今將地震緣由理合各另申報伏乞照驗施行據此擬合通行為此除外理合備由呈乞照驗施行等因具呈到臣案查先據平涼府固原州申稱本年六月初十日午時正二刻地震緣由前來巳經具題外今據陜西布政司呈備環縣申稱前項日時地震二次有聲搖動軍民房屋等因照得陜西固原環慶二處最為要害重地先年河套入寇不窺環慶必犯固原創傷困苦之餘生意未復今二處地方同日地震竊恐邊人侵伐之患或不能無且災變之來必有攸自人事乖違則隂陽舛錯今一嵗之中災異疊見地道不寧皆由百司庶職曠官怠事所致而臣濫總風憲不能奉宣德意振肅紀綱撫安兵民其責尤重除通行一體痛加修省及督令各邊關隘城堡嚴謹武備防禦邊患外緣繫地震災異事理謹具題知一為旱災事題為旱災等事據陜西布政司呈據西安府申備邠州并涇陽咸寧長安三原盩厔臨潼武功鄠縣申又據本府所屬乾州并咸陽富平醴泉蒲城四縣申各據里老趙剛等呈𢎞治十七年八九月間雨澤少降土脈乾燥安種麥豆俱未長茂至𢎞治十八年三月內才得微雨麥豆正當吐花秀穗之時四月又旱無雨兼被狂風吹刮不得堅實青乾無收其有收者多不過二三分即今五月芒種時候為因無雨土乾秋田不得安種人民驚惶無所依仰見今徵派稅糧委的辦納不敷必致小民逃竄乞為轉達分豁便益等因各備呈轉申到司又據延安府申備鄜綏葭三州膚施甘泉安塞保安安定清澗延長延川宜川洛川中部宜君吳堡神木府谷米脂一十六縣慶陽府申備寧州安化合水真寧環縣鞏昌府申備隴西寧逺伏羌西和漳縣等州縣申并據西安左前後延安慶陽鞏昌六衛及西安右甘州中二護衛各呈同前事又據平涼府所屬靜寧州隆德莊浪靈臺崇信四縣各申自本年四月十四日至二十等日連降嚴霜致將麥豆殺傷多半又被日久無雨風吹日晒以十分為率約有八九分枯死乞要分豁稅糧等因案查先為處置災傷事承准戶部陜字四百二十四號勘合該本部題合無通行天下司府州衛等衙門今後遇災先行合干上司類總奏報委官之際務要親詣被災處所從實檢踏不許因而受財聽囑以熟作荒一面行移巡按御史及按察司官再行從公核實將有災該徵該免田糧分數定擬明白造冊奏繳本部再行斟酌區處奏請免徵等因題准備行前來巳經通行遵依去後今據前因緣繫民情災傷事理理合呈乞照驗施行等因據此查得前項府衛州縣陸續申報前情到臣俱各相同切照陜西各府衛地方供給三邊糧草重大差役浩繁節因邊敵侵犯兼天年薄收饑饉逃亡生氣未復即今欽命大臣處置邊儲催徵積年拖缺未完糧草幸得年豐有收方可供辦今所在告報災傷夏田既多無收秋成恐亦難望雖中間輕重不同虛實難保終是實有災傷去處為多而西安府所屬附近州縣被災尤甚且民惟邦本賦由民出今公私匱竭倉廪空虛各邊軍士張口待哺急之則有民窮盜起之憂緩之則貽後時失事之悔夙夜警惕不知所處除行陜西都布按三司轉行各該守巡等官親詣前項申報災傷衛所州縣選委隔别廉幹官員會同各掌印官從公踏勘如果災重即便多方設法賑濟毋令失所稅糧暫停追徵待具奏定奪若災不甚重將該徵稅糧酌量處分從輕改派折納或撥附近倉分上納其不成災及災輕去處糧草責令依時追徵不許延捱失誤中間如有受財聽囑以熟作荒情弊就便拿問取具踏勘過災傷輕重稅糧該徵該免分數緣由回報另行具奏外緣繫地方災傷事理謹具題知一為旱災事題為旱災事據陜西布政司呈據西安府申節據華耀同邠乾商六州并咸寧長安髙陵淳化渭南蒲城白水永夀朝邑涇陽藍田郃陽華隂三原澄城臨潼興平武功三水同官韓城醴泉咸陽富平鄠縣二十五縣申據各該州縣人民田愷等各告稱境內地方𢎞治十八年四月五月無雨夏田薄收稅糧辦納不前六月初旬才得微雨安種秋苗未及長茂自本月至八月初旬六十餘日一向亢旱無雨又兼狂風晝夜不息官司竭誠祈禱止獲微雨灑塵致將各民所種糜粟菽豆等苗俱各吹晒焦枯秋成無望人民十分飢荒陸續逃移出外趁食去訖糧草無從辦納乞為轉達合干上司踏勘分豁賑濟撫恤等因備由轉申到司又據本府所屬洛南縣延安府所屬綏德州并中部吳堡宜君米脂四縣慶陽府寧州并真寧縣鞏昌府階州并文縣臨洮府蘭州鳯翔府岐山郿縣二縣甘州中護并綏德蘭州山丹四衛階州鳯翔二千戶所各亦申呈前事案查先為處置災傷事承准户部陜字四百二十四號勘合該本部題合無通行天下司府州縣衛等衙門今後遇災先行合干上司類總奏報委官之際務要親詣被災處所從實檢踏不許因而受財聽囑以熟作荒一面行移巡按御史及按察司官再行從公核實將有災該徵該免田糧分數定擬明白造冊奏繳本部再行斟酌區處奏請免徵等因題准備行前來巳經通行遵依去後今據前因照得陜西延綏寧夏甘肅三邊并固靖環慶一帶倉場糧草仰給八府人民挽輸而延安府就近供給延綏慶陽府就近供給寧夏西安一府地廣糧多計其嵗徵之數將及通省之半遞年供給諸邊所賴尤重三府不收則別府雖是全稔尚且所補不多況鳯翔府鄰近西安縣分旱與西安相同所司稽於申報其平漢臨鞏四府所屬未報災傷州縣得雨亦遲必非全熟今西安等府人民因見旱災異常米價騰貴流移就食者接踵于道查其預備倉糧又俱存積數少官府帑藏類多空虛皆由𢎞治十四年以來連遭邊患穵運修邊等項糜費不資所致兼以陸地不通舟航民俗鮮尚儲蓄縱使傾倉出賑亦難盡遏流亡若至來年春夏之間私糴官廪皆空寧免相視轉死竊聞之救荒之政賑濟不如免糧蓋賑濟則人或容姦免糧則民沾實惠故賑濟雖未敢後而免糧尤所當先呈乞照驗施行等因到臣案查先據陜西布政司呈備西安等府州縣申報夏田災傷緣由前來巳經具題去後今據前因查得前項府州縣陸續申報前情俱各相同及訪得西安府所屬州縣災傷尤甚竊緣陜西為天下重地西安一府又陜西根本重地三邊仰給多繫于此兵荒之後民窮財盡加以邊方多事糧草催徵勢不可緩不幸亢陽為虐雨澤愆期夏麥既巳不登秋田又失播種百姓嗷嗷流離載道延至明年春二三月青黃不接溝壑轉徙之患何可勝言方求賑恤事宜又苦倉無積蓄該司所呈賑濟不如免糧深為有見蓋邊儲固當急圖邦本尤須深植假令百姓逃亡失業向後邊儲愈虧所謂皮之不存毛將安附言之痛心但就中論之災傷不能無輕重人户不能無髙下惟在稽核得實庶不虧官損民除行分巡分守委官驗踏明白災重地方極貧人户多方設法賑濟稅糧暫停追徵取具踏勘過災傷輕重稅糧該納該免分數回報另行具奏外緣繫旱災事理謹具題知一為地震事題為地震事節據陜西布政司呈據西安府同州郃陽縣申准本縣隂陽學牒呈據直日隂陽生張輅呈𢎞治十八年九月二十日巳正三刻不意從西北上地震響聲如暗雷動往東南去訖具呈到學轉呈到縣理合申乞施行據此又據本州韓城縣申據本縣直日隂陽生馬景彛呈本日巳時初刻從西南地震往東北去己未又震二次亦往東北去俱有聲又據延安府申據本府隂陽學申據直日隂陽生張文達呈本月二十一日巳時分本處地方從西北方向東南地震二次將軍民房屋牆壁搖動又據本府洛川縣申准隂陽學牒呈據隂陽生武政呈本月二十日巳時初刻忽然地震有聲如風牆屋俱動頃刻方定又據慶陽府申據本府隂陽學申據本學隂陽生張祿呈本日午正三刻忽從東南地動往東北去訖本日戌初三刻仍前復動一次等因各備申到司轉呈到臣照得鎮守陜西武安侯鄭英患病會同鎮守陜西太監劉雲議查得陜西西安平涼等府朝邑固原等州縣自今年二月以來地震有聲非止一次節經具題及通行所屬司府州縣衛所官員修省去後今前項府縣地方又節申地震有聲如雷如風搖動軍民房屋一方地道在在不寧是皆軍民愁苦之象兵戈擾攘之徵臣等備員鎮巡不能督率諸司修舉職業以回天意其罪莫贖況西安延安慶陽三府所屬州縣今年俱被災傷人民饑饉流移不能聊生且密邇邊方警報未寧敵情難測除痛加修省及通行軍衛有司沿邊城堡賑恤饑荒撫安軍民修舉武備防禦邊患外緣繫地震災異事理謹具題知一為處置災傷流移事題為處置災傷流移事照得西安府所屬華耀同乾等州咸陽臨潼三原渭南髙陵華隂朝邑富平等縣地方今年四五月間雨澤少降夏麥被晒枯死者多收成甚薄六月七月一向亢陽不雨秋田不得安種間有種者多不出土人民憂惶貧民無底業無手藝者往往扶老攜幼逃入南山商洛漢中等處趁食自八月下旬以來方才得雨秋田雖巳不救二麥幸皆安種人心稍安若得今冬瑞雪霑足來春時雨調勻可無大患但奄奄喘息之民即今巳不能堪欲便通行賑濟倉糧有限恐明年青黃不接之際無以為繼查得各處預備倉之設本為凶荒之備見行事例量州縣大小里分多寡定擬積糧數目以為勸懲及三年一次委官盤查立法非不嚴密奈何有司官員多不留意于此且陜西頻荒大兵之後民窮財盡供邊修邊等費徵斂不給勢難別項措置又因折錢折銀之例行而贖罪抵價之糧遂少倉廪空虛職此之由臣待罪巡撫外防邊患內憂民難夙夜驚懼不知所處巳經播告司府衛所州縣大小官員痛加修省勉盡職業省事節用一切工作悉皆停止一夫不許擅役一應浮費悉皆查革一錢不許妄用其人民十分貧難眼前不能存活者取勘的確就便驗口給糧不使失所及將各王府文武衙門官吏旗軍人等應支粟米照依時價折與銀錢存省見在倉糧以備明春賑濟并勸諭積有糧米得過之家照常放糶不許阻遏仍行問刑衙門經問有力人犯贖罪紙價暫照舊例納米以少充倉儲逃移人民分投差人招撫復業其貧病饑餓不能即回者暫于南山所在州縣報名在官量為給糧賑救免致填委溝壑待春暖稍蘇發遣回還與凡救災恤患事宜應施行者徑自施行災重應免稅糧并重大事情另行具奏定奪外緣繫處置災傷流移事理謹具題知一為慶賀事題為慶賀事據西安府申承奉陜西布政司劄付抄䝉臣案驗仰本府轉行同知任奎照舊管理捕盜事務另委相應官員賫進慶賀表文如無相應堪委官員徑自申禀定奪奉此案查先為前事巳行同知任奎賫進今奉前因查得本府同知沈理清軍通判梁國用管糧推官田春理刑俱委遍歷所屬賑濟貧民惟有知府馬炳然掌管印信再無空閒堪委官員理合申乞照詳定奪等因到臣仰惟皇上嗣登寶位在外司府州五品以上衙門例該行委堂上官一員賫捧慶賀表文投進除都布按三司并各府州衛俱委堂上官一員賫進外查得西安府原委進表同知任奎近因本府所屬州縣人民飢荒流移盜賊生發本官繫撫民官巳經行令暫且照舊撫民捕盜以防意外之患別委相應官員賫進去後今申前因臣切惟賫進慶賀表文乃臣子敬君之禮天下之事莫重於此但西安一府外供三邊為陜西根本重地奈何今嵗夏秋田禾俱各災傷無收人民十分饑饉扶老攜幼流徙他方盜賊乘機剽掠人心憂惶況河凍在邇戎心驕橫難保不入河套為患萬一擁衆近邊兵戈外擾人民內困根本搖動事變難測及查得近准戶部咨為旱災救荒事該陜西鎮巡等官具奏地方災傷緣由本部題奉聖㫖是陜西災傷重大著楊一清好生設法賑濟毋致失所欽此欽遵臣受命兢惕不遑寧處即令分巡分守等官督委本府同知通判推官等官沈理等分投前去三十六州縣公同各掌印官查放倉糧銀兩設法賑濟及行同知任奎嚴督禁捕盜賊撫安流移地方廣濶尚慮顧理不周別無空閒官員堪以委用倘或誤事關繫不小欲待各官事完方才賫進表文又恐有誤慶賀之期如䝉伏乞聖明俯念地方事重保障為急乞勑該部計議合無將西安府堂上官不為常例俱存留在任整理前項事務行委首領官一員賫捧慶賀表文投進惟復待地方人民稍安之日仍行堂上官賫進不勝幸甚緣繫乞留官員賑恤人民保障地方事理未敢擅便謹題請㫖一為考選軍政官員事題為考選軍政官員事准兵部咨該本部題稱𢎞治十八年又及五年之期內外軍政官員例該通行嚴加考選每都司各要掌印一員佐二二員等因題奉欽依備咨前來照得鎮守陜西武安侯鄭英患病臣會同鎮守陜西太監劉雲巡按陜西監察御史季春議查得陜西都司原選軍政掌印都指揮使楊敬佐二都指揮僉事房懷把琮俱推升去任看得陜西地方廣濶內連八郡外控三邊為根本機要重地都指揮使司管轄三十餘衛所軍馬數多掌印官必得通敏老練之人然後事有統紀人無玩易本司見有都指揮僉事費梁等用之佐二雖有可觀用之掌印則多不及推訪得原選軍政佐二今守備蘭州都指揮僉事房懷事體練達才識優長陜西官軍素所信服且守備之任固在得人而都司掌印一方兵政修否所關事體尤重緣繫兵部推舉奉勑守備官員臣等難擅定擬如䝉乞勑兵部訪察合無將房懷改任本都司軍政掌印使之約束官軍修舉兵政就乞於陜西武臣中推舉相應官一員守備蘭州地方嚴加防禦居重馭輕既適其宜安內攘外兩無所失不勝幸甚緣繫推舉方面軍政掌印官員事理未敢擅便謹題請㫖一為分理誣枉事題為分理誣枉事據陜西按察司呈問得犯人孟統招繫陜西西安府咸陽縣知縣𢎞治十五年九月失記的日有在京錦衣衛周指揮帶領旗校前來陜西地方勘事因遇冬寒各旗校共輳銀五兩央凂先任本布政司左布政使文貴要買羊羔皮襖有文布政訪得咸陽縣出産羔皮自合差人照依時價兩平收買為當不合輒差巳發落承差王機將前銀牌發本縣責令統亦不合要得奉承上司就拘今在官皮行王祿并欽等一十九名到縣并欽亦不合將今在官一般皮行王名并伊父王志善弟王泰姓名俱供報在內統與先問發今未到工房典吏淡友智各明知彼時時估大羔皮一張值銀二分以上至二分五釐小羔皮一張值銀一分五釐以上至二分大小不等約計每張值銀二分統等各不合估作一分王機亦又揀要一色大皮每張各值銀二分五釐以致王祿等買皮二百張每張賠銀一分五釐除給前銀二兩仍共賠銀三兩本年十月內統將買完前皮并剩銀三兩差今在官老人髙俊解送文布政處驗得皮好價輕仍將剩銀三兩令髙俊帶回本縣給與王祿等領補原賠銀兩訖𢎞治十六年正月失記的日文布政又因本家要做皮襖亦明知繫監臨官不該發價下縣買物因查巳問革今在官本司候缺吏魏勝繫本縣人不合就差本役賫銀一十兩仍發與統易買不拘大小羔皮五百張統不合又拘皮行王祿等二十三名并先問發今在官皮匠眺安到縣驗皮大小給價照數買完大約每張用銀二分不曾賠價魏勝在縣親收不合每皮一張乘機索要王祿等銀一分共索銀五兩入巳統不合不行具申究治仍差髙俊同魏勝將皮解送文布政收用本年五月初八日文布政因前買皮張破壞數多不敷做用不合又將銀二兩付與先問革今巳故候缺吏竇景暘賫送與統不合仍照前價行拘王祿等二十四名給買羔皮一百張竇景暘在縣親收亦不合倣效魏勝于王祿等名下每皮一張索要銀一分共索銀一兩入巳統亦不合不申究就差今在官醫生邊錫同竇景暘將皮解送文布政收用訖本年十二月初二日有按察司見任僉事胡經出巡不在伊未到官義男胡清不合將銀一兩四錢差巳問發今未到皂隸姚旺并𢎞治十七年四月失記的日有本布政司右布政使今升貴州左布政使致仕陳孜未到官男陳大綱不合將銀二兩使令先問發今未到皂隸吕岩各亦不合依聽將銀賫送統處又不合仍拘王祿等二十四名各照前價將胡清銀一兩四錢買大小羔皮七十張令差在官老人王昶送與胡清陳大綱銀二兩買大小羔皮一百張亦差王昶送與陳大綱各收用彼時胡經陳孜各亦不合失于鈐束本年閏四月內又有不知姓名二人稱係吏部馬尚書舍人馬須巡撫大同都御史舍人劉瓉各來本縣收買筏木因無皮襖不合共將銀三兩央凂統不合依聽替伊亦拘王祿等收買羔皮三百張每張虧價銀一分共虧銀三兩本年六月二十九日王志善思得父子三人俱充皮行負纍不過將情告䝉巡按季御史將統等行提取供案發按察司掌印副使張黻究問行提王機等到司王祿并欽等各因上司節次發價買皮要得乘機阻絶不合將各起皮價任意髙擡內將先次每張值銀二分五釐擡作三分五釐妄招文布政虧價五兩後次每張值銀二分擡作五分或四分妄招文布政一次虧價一十五兩一次虧價二兩陳大綱虧價三兩等虛詞在官副使張黻亦不合失于詳審輒便依供問罪呈䝉季御史先將統與魏勝等各依擬發落次將文布政等備招參奏間文布政先巳升任都察院右副都御史巡撫延綏等處地方聞知前情不甘要得改行隔別衙門弔取布政司所收時價冊籍查審分辨又不合不行從實奏訴添揑先買羔皮之時訪得民間出賣每張不過價銀半分及查咸長二縣時估每羔皮一張值銀二分據此給價今聞御史季春勢逼孟統等取供似有羅織之意及訪得季春舉止浮躁行事妄為動輒作威沽名等項虛詞混同具本奏行間又該通政使司連狀送據吏部馬尚書家人馬浦告稱本族各門並無馬須名字亦無差人陜西買木等情俱送都察院連季御史參奏前情併行督理馬政今巡撫陜西楊都御史處勘問䝉行布政司及轉行西安府并咸長二縣各查無𢎞治十五九等年月分時估冊籍止將以後各月時估文冊并行陜西按察司提解間遇䝉𢎞治十八年五月十八日赦宥䝉將統等解送本院查無羔皮一張值銀二分時估在冊及審據王祿等各供前情當將承差王機供明省發馬須劉瓉另行外將統等取供連人劄發本司再行審問明白如果所供是實依律議擬備招回報干礙應參官員具實參呈前來依䝉將統等連日查審與供相同取問罪犯王祿等二名招同魏勝等八名供同議得孟統王祿并欽所犯合依不應得為而為之事理重者律減等各杖七十孟統繫官王祿并欽俱民俱犯在革前免科與先問結魏勝供明王志善王泰王名髙俊邊錫王昶眺安各發還職寧家生理照出供明髙俊等七名與先問結魏勝俱免納紙孟統官紙王祿并欽俱民紙各一分照到折米發咸陽縣追送預備倉上納以備賑濟取實收附卷文貴陳孜張黻胡經陳大綱胡清俱遇革人合免參提備招連人呈解到臣查得先為官買擾民事該巡按陜西監察御史季春奏稱都御史文貴節次低價易買羊羔皮張數多致纍小民賠價二十餘兩右布政使陳孜僉事胡經各縱家人低價于部內買物略無禁止所據各官俱合有罪等因奏本該通政使司奏奉欽依都察院知道欽此續該都御史文貴奏為分理誣枉事開稱御史季春勢逼孟統等取供似有羅織之意及訪得季春舉止浮躁行事妄為動輒作威沽名等情亦該通政使司奏奉欽依法司看了來說欽此又該吏部尚書馬文升家人馬浦告為分豁事開稱本族各門並無馬須名字亦無差人陜西買木等情俱該都察院議擬覆奏併行臣提調參奏內有干人卷到官從公審勘務要的確明白有罪人犯依律照例施行馬須劉瓉如巳回還宜從移文河南巡撫衙門追勘各犯正身是否假充詐取備由連人解報歸結果礙應參官員重別據實具奏究問等因題奉欽依是欽此欽遵備行前來除馬須劉瓉移文河南巡撫衙門追勘正身歸結及行據陜西按察司呈解犯人孟統等到臣審取供詞發仰問報去後今問前罪除查相同及將孟統等准擬發落外參照陜西布政司先任左布政使今升巡撫延綏都察院右副都御史文貴明知係是監臨官員不合節次發價于所部內易買羊羔皮張數多事發却又奏辨不實本布政司先任右布政使今升貴州左布政使致仕陳孜陜西按察司僉事胡經各不合失于鈐束以致家人在于按屬買物本司署印副使張黻既承勘問事情亦不合失于詳審致不輸服俱屬違法律合提問但文貴陳孜俱在任犯罪去任事發與張黻胡經又俱係遇革人數伏乞聖明裁處緣文貴係在京堂上官陳孜致仕與張黻胡經俱係方面官及該奏奉欽依行令審勘據實具奏事理未敢擅便謹題請㫖一為邊務事題為邊務事照得本年十二月二十日以來邊人擁衆大舉深入搶掠聲言要搶各苑官馬自豫旺城至黑水口處處有兵聮絡結營本處官軍數少固原備禦官領軍五百名在石硤口紅古城按伏指揮任璽管領備冬馬步官軍九百餘員名在豫旺城按伏指揮郭遡管領土達八百有餘并新任遊擊陳善調集遊兵才得二千餘員名在于鎮戎所俱被攔路阻截不相應援臣與新任鎮守署都督曹雄聞得巳入靜寧隆德會寧等處恐其東冦平鳯即時提兵西上臣在隆德駐劄曹雄領兵隨路𠞰殺追截本月二十四日已屯聚於隆德縣西三十里因見我兵奄至退回大營緣曹雄所領官軍才得九百餘員名巳差人乘夜間道調取陳善郭遡會合并量掣蘭州守把河橋官軍李佐等前來䇿應各該將士感恩圖報人懷鬬志但彼衆我寡以一當百未敢必其成功查得先為預防邊患以保固地方事該臣題稱寧夏花馬池興武營直抵髙橋三百餘里地方在北即為犯我邊境之門户蓋寇之所入雖由寧夏而其所利實在腹裏寧夏邊牆如能捍禦則腹裏可安枕而卧儻一旦折牆而入必以精騎守所入之路綴我官兵使不敢南則腹裏安危所繫至重彼既深入剽掠方張之勢恐非陜西官軍所能當必藉諸邊鎮遊兵協力捍禦然欲成克捷之功必在乘其既弊而於中路擊之為便該本部覆奏查得先該寧夏鎮巡官太監葛全等題為大寇入套請兵防禦事本部議得合無鋪馬賫文與寧夏太監葛全總兵官李祥都御史劉憲一面選差乖覺夜不收逺為哨探一面嚴督副總兵衛勇參將霍忠協同保績守備焦洪都指揮韓斌等各用心設䇿整㮶人馬隨宜按伏以逸待勞本部仍行延綏守臣令參將王㦸統領土兵前往花馬池遊擊將軍姜漢統領遊兵前往定邊營曹雄統領竒兵前往寧塞營各要星馳前去秣馬按伏聽候有警併力截殺及行巡撫陜西都御史楊一清公同固原新任鎮守將官斟酌形勢計議方略分布腹裏人馬據要防守督調本處遊兵相機䇿應等因題奉欽依通行欽遵及看臣所奏與前項議奏之意大略相符合無行移延綏鎮守等官轉行副總兵遊擊等官查照先今事理如果巳西行本鎮别無聲息陜西來調兵馬即便依期前去布分防守不許遲延誤事自取罪尤仍通行陜西寧夏延綏鎮巡等官俱要協心運謀相機而動務使功成萬全事無一失圖免陜西腹裏之害用紓皇上西顧之憂毋得秦越自分坐觀成敗以孤委任等因題奉聖㫖是便行與各官著同心協力相機防禦不許自分彼此致誤事機欽此欽遵本年十二月二十一日備行到臣切緣寧夏鎮巡等官與臣先後論奏之意正恐大敵入套窺伺腹裏寧夏地方軍馬寡弱不能捍禦故乞早調延綏遊竒兵馬參將王㦸土兵併力布置按伏保固邊牆不令入境及查得先于本年十一月十七日據定邊營把總都指揮閻綱呈據走回男子張智說稱達衆四營約有二萬入套要搶固原等情巳經具題及行延綏巡撫都御史文貴催調遊兵并行寧夏巡撫都御史劉憲轉行各邊遇有入套聲息差人飛報去後本年十二月十三日臣差人于花馬池等處探問並無原擬延綏人馬到邊想因延綏遊竒兵參將王㦸土兵俱自大同初來未得休息且恐原奉㫖意公文到遲又各該將官新舊交代事勢使然決非敢為延緩又查寧夏花馬池等處亦不曽傳報在套近邊的實消息今前項大寇忽然擁衆拆墻突入腹裏巳遵照成命急調延綏遊兵土兵前來截殺及中路邀擊之議通行賫文延綏副總兵姜漢寧夏總兵官李祥等會合行事但道途阻滯文移往來彼此抵牾事勢可否猶未可知臣切詳此時巳逼新春尚在腹裏恐渡河不及其志必將恃其大衆潛伏套中夏秋草飽馬肥時月又謀入寇縱使出套過河冬間必復踵襲故智且陜西地方兵苦于各邊之備禦民疲于三鎮之轉輸竭中土之力以供外邊為其能為我藩籬也今花馬池大敵臨邊通不知覺雖有如無何所倚仗將來之事臣實憂之至于用兵機要似不出臣前所擬奏但事關各鎮若無總制重臣居中調度則甲可乙否終難濟事議論多而成功少無怪乎其然也伏望聖明垂念西土重地乞勑多官會議簡命在廷威望素著大臣前來總制陜西延綏寧夏甘肅等處軍務授以便宜賞罰之柄臣等各鎮巡三司以下官員悉聽節制無事在于慶陽駐劄有警前去環縣韋州等處居中調度各路將官用命者賞不用命者罰如身使臂如臂使指孰敢延緩以失事機如巳經出套速就經略花馬池一帶邊務設何籌䇿可以保固邊境使全陜西生民不致頻年大遭荼毒實宗社萬億年無疆之休也臣備員巡撫不能遏其深入之機又論列不早致有今日若復不言後患恐不止此臣不勝待罪俟命之至緣係急處邊務事理未敢擅便謹題請㫖一為敵人擁衆大舉入境事題為敵人擁衆大舉入境事准協守延綏等處地方副總兵都指揮僉事姜漢手本𢎞治十八年十一月二十九日准鎮守延綏總兵官張安手本准寧夏總兵官李祥手本前事內開徵調遊竒二兵照依原擬信地駐劄以俟應援等因准此本職統領榆林以西兵馬于本年十二月十一日到寧塞營按伏駐劄本月十八日申時據定邊營把總都指揮閻綱差夜不收葉章報稱花馬池敵衆臨邊拆牆備報得此本職隨統前項官軍二千二百四十五員名到萌城伏兵駐劄二十七日寅時本城傳報煙火隨差夜不收馬福等前去石子溝等處爪探襲見蹤跡掠獲頭畜往北行走備報到職親率官軍追至隰寧堡地名大千户井等處前敵約有一百餘騎見我官軍馳驟奔急聲勢勇猛將搶掠頭畜盡行棄擲易馬北遁復追二十餘里因見天晚黑暗恐墮奸計隨即收兵將所獲頭畜至隰寧堡行委指揮薛麟備查知數發仰守堡百户劉亨暫令收候巳經開報外三十日酉時承准陜西都御史楊一清手本為預防邊患以保固地方事查照原文作急統領兵馬兼程前來萌城石溝等處按伏會合寧夏總兵官李祥副總兵衛勇等人馬哨探截殺緣由巳經備行知會外本日戌時亦准寧夏總兵官李祥手本為軍務事開稱本職所統人馬移于韋州等處會參將王㦸遊擊戴欽餧飼馬匹遇敵併力截殺等因准此依文正德元年正月初一日移兵韋州駐劄本月初三日丑時該寧夏總兵官李祥差鄉導陸寬等前來報稱大敵巳于本月初二日未時俱從白塔兒往北去訖等因得此本職會同參將王㦸遊擊戴欽各領所部官軍從韋州起行奔馳到於地名紅寺兒地方爪得前蹤跡掃往北去巳追襲到白塔兒迎遇總兵官李祥副總兵衛勇等人馬在彼追趕當同領好馬官軍馳騁襲蹤追趕三十餘里因見天夜風霧黑暗恐墮詭計總兵官李祥副總兵衛勇收兵石溝兒按伏本職等四更時分到小鹽池伏兵隨即㑹差百户趙璽等帶領夜不收二十名前去所經道路密切哨探至初四日辰時據本官差夜不收郭其馳報瞭見本處煙燉迤東有數十人騎牽馬匹往南瞭望據報得此當會參將王㦸為左哨遊擊戴欽為右哨本職中哨及會合守備都指揮侯勛指揮郭遡各統兵馬相繼而行到于地名石溝池迎遇前敵擺列攻敵職等申嚴號令督併官軍各用鎗炮弓箭一齊射打其衆潰亂就陳斬獲首級一顆奪獲戰馬二匹速督官軍追至火山迤北地名啞叭湖等處又添伏兵三百餘騎糾合前衆一處衝擊前來職等親督官軍奮不顧身持刀向前劈砍又斬首一顆奪獲戰馬二匹軍士奪獲敵器共七十九件臨陳射死官馬三匹彼見我軍齊至換馬奔走北遁欲要窮追及因天晚況離花馬池邊牆不逺慮恐牆外救兵糾衆前來以此收兵回還至初五日天明到小鹽池仍差人於出入要路哨探遇警合兵截殺外查得獲功并當先重傷官軍另行造報今將節次就陳斬獲首級奪獲戰馬達衆兵器等項差百户曹聰先行解報為此理合開坐施行等因隨據延綏遊擊將軍戴欽呈𢎞治十八年十二月二十七日未時承准陜西巡撫都御史楊一清手本調卑職作急統領遊兵取便兼程從甜水堡下馬房等處徑赴固原豫旺城鎮戎所等處會合陜西遊擊將軍陳善領軍指揮郭遡等截殺承此卑職就于本月三十日到韋州本日申時承准都御史楊一清手本行卑職斟酌相機行事若巳到豫旺城鎮戎所地方即便會合本處遊擊將軍陳善等相機應援截殺若不曾前來就于石溝鹽池韋州等處會合寧夏主副總兵李祥等及延綏副總兵姜漢取便邀擊截其歸路共成大功承此于正德元年正月初二日到韋州初三日四更時分到小鹽池會差百户趙璽等哨探初四日辰時本官差夜不收郭其馳報瞭見本處煙燉迤東有數十人牽騎馬匹往南瞭望當會副總兵姜漢參將王㦸及會合都指揮侯勛等各統兵到于地名石溝兒迎遇前敵擺列攻戰職等申嚴號令督併官軍各用鎗炮弓箭一齊射打就陳奪獲敵馬三匹射死我軍馬二匹追至火山迤南地名啞叭湖等處又奪獲敵馬五匹敵器一百二十一件彼見我軍齊至換馬奔走等因又據參將王㦸亦呈相同開部下奪獲敵馬五匹敵器共二十四件緣由前來續准鎮守寧夏總兵官右軍都督府都督僉事李祥副總兵衛勇手本正德元年正月初一日夜丑時分據嗚沙州迤東棗山墩夜不收周翊同靈州擺撥夜不收劉瑛報三十日未時瞭見敵衆精兵約有五六萬俱穿戴明盔明甲張打旗號三路擺列臺營從地名石把都來後面灰塵不絶又據紅寺兒夜不收潘關一等報初一日未時分瞭見地名虎巴山灰塵約長三十餘里亦結營陳聮絡而行初二日申時分據哨探夜不收王洪報未時哨見敵衆灰塵漲天結營行走從南往舊白塔兒去訖當會同副總兵衛勇議看得敵勢十分擁衆擺列營陳而行又兼天晚援兵不能猝至難以發兵一面急差鄉導陸寬等飛調韋州按伏副總兵姜漢等人馬前來併力追殺戌時又據杏園墩擺塘鄉導陳演亦報本日未時瞭見敵衆灰塵從地名白塔兒東空過至黃昏時分未盡初三日黎明時分出兵副總兵衛勇人馬為左哨本職為右哨指揮楊瑛周冕統兵車繼後襲追中途遇據白塔兒墩瞭髙小旗張英報初二日未時有寧夏差來夜不收徐禮保魏成爪探聲息到于本墩空被前哨敵衆殺死馬二匹搶去追至白塔兒後有延綏副總兵姜漢遊擊戴欽參將王㦸人馬到彼會合襲蹤追趕隨有固靖遊擊將軍陳善亦領人馬俱到地名猫兒頭山因見天晚風霧昏黑難追彼衆我寡力不能支恐墮詭計三更時分延綏兵馬往小鹽池本職等至五更時分到石溝兒駐劄初五日節據靈州守備焦洪差夜不收張華等報稱初四等日大衆韃靼從清水營木井等墩空及花馬池原拆墻口出境去訖為此今將會兵截殺緣由用手本前來知會施行等因到臣案照前事先因大勢敵衆于𢎞治十八年十二月十七等日擁衆大舉深入固原隆德會寧地方搶掠缺軍禦敵臣遵照欽奉勑諭及兵部節該題奉欽依事理移文調取延綏遊擊將軍戴欽參將王㦸統領遊兵土兵前來腹裏應援副總兵姜漢統領竒兵會合寧夏總兵官李祥等人馬聮絡駐劄小鹽池石溝韋州等處邀截歸路因是道途阻滯遊兵土兵日久徵調不至本月二十九日據西安州海剌都操守指揮陳晟等差人走報前項敵衆于二十七等日由西路麻張堡西安州錦雞口出境恐前調遊兵土兵仍來固原緩不及事又經差人阻回行令前去石溝鹽池一帶按兵密切會合寧夏主副將官及陜西遊擊將軍陳善等官相機邀截巳經具題外今據前因照得前項敵衆自𢎞治十八年十二月十七日擁衆大舉從花馬池地方拆墻進入分守參將霍忠兵敗被圍殺傷官軍數多遂至乘勝長驅深入腹裏搶掠至正德元年正月初二等日從石溝鹽池兩界地方出境雖經會行延寧二鎮將官合兵追截止是延綏副總兵姜漢竒兵斬獲首級二顆參將王㦸遊擊將軍戴欽人馬俱無斬獲又查得各官不遵兵部原擬到邊稽遲但係新舊將官交代之際況王㦸當大寇入境之初衝鋒解圍有功于花馬池官軍實多戴欽𢎞治十八年十二月十六日方才任事十七日隨即統領官軍啓行千里赴援未嘗後期寧夏主副將官李祥等各稱聲勢十分擁衆擺列營陳而行難以發兵緣事關各鎮中間事機委曲非臣所能悉知除將姜漢等解到首級敵器看驗收庫敵馬給軍領養及陜西官軍獲功誤事緣由俱另行外緣大舉敵人出境客兵追截獲功事理謹題請㫖一為謝恩事奏為謝恩事近准吏部咨為才不稱任乞恩辭免巡撫地方事該臣奏乞辭免巡撫陜西地方照舊督理馬政等因奏奉聖㫖楊一清才望素著簡命巳定不允所辭該部知道欽此欽遵案查先准兵部咨該本部題為大冦拆墻入境事節該奉欽依是楊一清不妨督理馬政就著巡撫陜西地方用心調度防禦邊患寫勑與他欽此欽遵臣時聞命有驚措躬無所雖防禦之事竭力就道不敢少緩而巡撫之任揣量度分終非所堪謹瀝愚誠上干天聽未䝉俞允顧荷褒嘉愧與憂并榮非意及伏念臣少䝉作育長被甄收弄筆墨者半生志有餘而才不逮綴班行于三品年漸老而業無成且盛平之世賢俊滿朝如臣之愚何足比數非惟膺拔擢之殊渥抑且受特達之深知天地之恩在人巳極涓埃之報于國何施敢不勉竭庸愚用酬眷注經營士馬庶少裨修內攘外之功撫安兵民期不負後樂先憂之學臣無任瞻仰感戴之至緣係謝恩事理為此具本謹具奏聞一為災異自劾乞恩罷黜以回天意事奏為災異自劾乞恩罷黜以回天意事案查先節據陜西布政司呈為地震事節據西安平涼慶陽等府朝邑髙陵固原環慶等州縣各申稱𢎞治十八年二三四六等月日時不等各地震響聲如雷搖動軍民房屋及據臨洮衛申為異風暴雨淹沒人畜田禾事據右前後三所申稱各屯田地方𢎞治十八年自四月初間一向亢旱夏田被晒焦枯本月二十八日夜偶然天昏黑暗大作惡風迅雷暴雨如注頃間洪水馳至約有二丈寨牆衝倒房屋傾塌男婦漂流淹死軍餘李彪等一十六名口馬牛驢羊等畜三百餘隻樹株拔根田禾淤墊又據臨洮府申為山被猛雨雷震傾塌壓沒人畜不見蹤跡事據河州申本州俺哥里沙子溝地方坐南向北土山一座𢎞治十八年六月二十三日夜忽被猛雨雷震山塌將本山居住民人顔廣等三户人口男婦二十一口并莊田頭畜等産俱被壓沒又據本司呈為旱災等事節據西安府申備邠乾等州咸寧長安等二十五縣各申稱𢎞治十八年三月四月天旱無雨兼被狂風吹刮所種麥豆不得堅實青乾無收六月初旬才得微雨安種秋苗自本月起至八月初旬一向亢旱無雨又兼狂風晝夜不息致將糜粟菽豆等苗各吹晒焦枯秋成無望人民十分饑荒陸續逃移趁食去訖又據延安府申備鄜綏膚施等一十九州縣慶陽府申備寧州安化等五縣鞏昌府申備階秦隴西等州縣鳯翔府申備鳯翔岐山等縣臨洮府申備蘭金等州縣又節據西安左前後延綏平慶臨鞏甘蘭等衛各呈前事相同等因節呈到臣切見陜西各府州縣今年二月以來地震山傾之變屢見于敵人出沒之區夏旱秋乾之災遍滿于關輔根本之地節經具題及行各該官司踏勘撫恤外臣聞天人相為流通休咎關乎得失故未有不召而自至之災亦未有巳出而無應之變陜西災異迭見是皆生民愁苦之象兵戈擾攘之徵不早圖修改將禍患難測仰惟皇上龍飛御極之初恩澤覃布庶政肅清是宜海嶽效靈雨暘時若凡此咎徵責在臣下以一方論之軍民各有攸司大小各有專職而綱紀之任實係巡撫災異之來皆由巡撫不職所致洪範曰王省惟嵗卿士惟月師尹惟日蓋以休咎之輕重繫職任之大小也臣本庸愚濫膺重寄既非安內攘外之才又無揚清激濁之勇見賢不能進見不肖不能退知民之害不能祛知民之困不能救上下交征不能革公私匱竭不能補以致軍民怨咨感傷和氣隂陽愆伏動靜乖違巡撫方逾半年災異遍乎一省上天示譴罪實在臣且食人之食者事人之事陳力就列不能者止臣今名浮於實處非其據事不稱食心有未安顛而不扶焉用彼相伏望聖明體天行罰乞將臣罷歸田里別選相應之人巡撫陜西地方必能扶持綱紀綏輯兵民彈壓羣邪肅清弊政庶幾天意可回化災為祥轉禍為福不難矣緣係災異自劾乞恩罷黜以回天意事理未敢擅便為此具本謹具奏聞伏候勑㫖該吏部官欽奉聖㫖陜西地方多事巡撫正要得人楊一清不准辭著用心辦事欽此一為謝恩事奏為謝恩事正德元年正月二十七日節該欽奉勑諭朕即位之初念爾等效職勤勞宜有頒賜以隆恩典爾其體朕至意益盡忠誠用副委任欽此欽遵九霄垂露勑降天文萬里飛軺物頒御帑歡聲所動邊徼增輝恭惟皇上誕膺休命光紹丕圖慶洽普天恩覃率土臣身以職羈既阻天廷之拜寵緣例得遂承帝賚之加絲綸春溫金帛霞爛雖雲雨之施在物無遺而渥澤所流于臣為幸榮加慶外感在懼中捧而珍藏實抱無功之愧服以拜賜徒深逾分之憂謹當以金自盟焚灼不渝其性顧服思稱曵婁誓委其身臣無任瞻仰感戴激切屏營之至除將賫捧到欽賞銀十兩紵絲二表裏望闕叩頭領受外緣係謝恩事理為此具本謹具奏聞一為乞恩認罪罷黜以謝地方事兵部覆該本部職方清吏司案呈奉本部送于兵科抄出巡撫陜西等處地方兼督理馬政都察院左副都御史楊一清奏臣本孱愚誤䝉先帝聖恩擢任憲職督理馬政𢎞治十八年正月內為因大敵拆墻入境節該欽奉勑諭不妨督理馬政巡撫陜西等處地方欽此欽遵自度不堪負荷具本辭免未䝉俞允勉强供職臣遭際殊常寵榮踰分誓竭駑鈍仰酬眷知奔走驅馳不敢自怠竊見固原地里寬漫處處通敵最為難守先該總制尚書秦紘修築邊塹一道踰時閲嵗湮廢巳多又防守無兵墩堠不接雖有如無不堪保障臣督令守臣修補完備依塹添墩傍險增堡定為烽火號令招集土人使隨便捍禦臨冬時月會同鎮守太監等官分布人馬據要防守復慮一方兵政廢弛名存實亡剝削之餘困敝巳極昧死上陳仰荷廟謨獨斷易置主將增設遊擊方將一新紀律期收戰守全功不意大敵乘凍渡河潛伏套內逼近花馬池地方彼處將官通不知覺𢎞治十八年十二月十七日衆號數萬自花馬池清水營兩處折牆進入守將兵敗被圍虧折官軍致乘勝長驅直入腹裏隨即收斂隄備我軍迎戰衆寡不敵不能遏阻敵至固原野無所獲本月二十三日遂深入靜寧隆德會寧地方搶掠鎮守署都督僉事曹雄止領官軍九百餘員名尋襲蹤跡截殺臣恐孤軍無援急調延綏遊兵土兵及本邊官軍前來會合䇿應道途阻隔兵難猝集巳於本月二十七等日遽從西安州地方出境邀之不及臣又約會寧夏王副將官延綏遊竒兵馬邀之石溝鹽池諸將以聲勢重大莫敢發兵坐視其出竟無功查得固原環慶一帶並無所失監苑官馬幸得保全此皆仰仗宗社神靈朝廷威福敵兵遄歸被禍猶淺但靜寧隆德會寧三處搶掠殺傷人畜數多巳行各該州縣查數未報陜西官軍節與交戰斬獲首級不多幸不虧折惟乾鹽池操守官張瑛等墮其奸計陳亡一十八人除將寇衆入境出境日期官軍誤事獲功緣由節經會題及搶掠人畜的數查明另行外照得鎮守太監劉雲常在固原駐劄署都督僉事曹雄初到固原地方臣叨任巡撫巳及一年經略調度乃其職業況受恩深重言聽計行比之各路撫臣不同奈何器質庸凡智慮疏淺未諳軍旅之務實無安攘之才以致大敵擁衆長驅侵掠為患拆牆而入既不能遏其初來之鋒得利而去又不能截其既歸之路藩籬失守雖花馬池之過而內有邊防不能自固咎將誰執領兵出戰雖各將官之事而遇警徵調多不及期責亦難辭上不能寬九重西顧之憂下無以慰一方軍民之望臣委的有辜委任罪當萬死且今大冦去留邊情緩急俱未可測臣誤事貽患之人誠宜早正法典罷歸田里別推才力有餘者巡撫經略則凡受任方隅皆知警戒能者竭力自效不能者無地自容矣等因具本該通政使司官奏奉聖㫖楊一清巳命總制彼處邊務著盡心供職以圖後效不必引咎求退該部知道欽此欽遵抄出送司查得先為邊務事該本部會官具題節該奉聖㫖是楊一清著總制陜西延綏寧夏甘肅等處邊務兼督理各該地方馬政欽此巳行欽遵去後今該前因案呈到部看得本官巡撫陜西經略有方威望素著近雖被敵深入緣無損傷大重輒乃自陳誤事之人欲正罷歸之典既查有本部巳經會官題奉總制成命及今欽依勉留事理難再別議合咨前去煩為查照欽遵施行關中奏議卷六
